<?xml version="1.0" encoding="UTF-8"?>
<!--
  KBVE Minecraft banner — 468x60 (IAB Full Banner). Same palette as the
  server icon; left-aligned mini KBVE icon + project title for use in
  Modrinth project descriptions and any web embed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 468 60" width="468" height="60">
    <rect width="468" height="60" fill="#0a0e27"/>

    <!-- Mini 40x40 KBVE icon (left, 10px padding) -->
    <g transform="translate(10, 10)">
        <rect width="40" height="40" fill="#0a0e27" stroke="#1e293b" stroke-width="1"/>
        <line x1="20" y1="2" x2="20" y2="38" stroke="#1e293b" stroke-width="0.5"/>
        <line x1="2" y1="20" x2="38" y2="20" stroke="#1e293b" stroke-width="0.5"/>
        <g font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900"
           font-size="16" fill="#22c55e" text-anchor="middle" dominant-baseline="central">
            <text x="10" y="11">K</text>
            <text x="30" y="11">B</text>
            <text x="10" y="31">V</text>
            <text x="30" y="31">E</text>
        </g>
    </g>

    <!-- Title -->
    <g font-family="Arial, Helvetica, sans-serif" fill="#e2e8f0">
        <text x="65" y="27" font-size="20" font-weight="700">KBVE Minecraft</text>
        <text x="65" y="46" font-size="12" font-weight="400" fill="#94a3b8">
            behavior_statetree · Fabric 1.21.11
        </text>
    </g>

    <!-- Right-edge accent: tiny KBVE-green vertical bar -->
    <rect x="464" y="0" width="4" height="60" fill="#22c55e"/>
</svg>
