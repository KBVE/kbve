# Local dev stack for the MC server — mirrors the prod topology of a
# Velocity proxy fronting two backends (a PaperMC lobby and a Fabric
# survival server). Required because the Fabric image ships with
# FabricProxy-Lite hackOnlineMode=true, which rejects any connection
# that didn't come through Velocity.
#
# Topology:
#   host:25565  → mc-velocity:25565 (Velocity proxy, modern forwarding)
#                   ├─ mc-lobby:25565  (Paper lobby, default try + fallback)
#                   └─ mc-fabric:25565 (Fabric survival, 50-player cap)
#   host:25574  → mc-lobby:25575      (Paper RCON, password=dev)
#   host:25575  → mc-fabric:25575     (Fabric RCON, password=dev)
#
# Usage:
#   nx run mc:dev        # builds both images + brings the stack up (attached)
#   nx run mc:dev:down   # stops the stack, keeps the volumes
#   nx run mc:dev:clean  # stops the stack AND wipes both world PVCs
#
# Boot time: ~4 minutes cold for Fabric, ~45s cold for lobby. Velocity
# is Ready in ~30s and will hold connections until at least one backend
# is up; lobby comes up first so new connections land there quickly.
#
# Secrets / env — the nx `mc:dev` target invokes docker compose with
# `--env-file ../../.env`, pointing at the gitignored root `.env` for
# ${VAR} substitution in the blocks below. That file already holds
# SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY for other projects in the
# monorepo, so `nx run mc:dev` picks them up with zero copy/paste.
# Missing or empty vars are fine: the bevy_supa client falls through
# to graceful mode and players are treated as Unlinked.

name: kbve-mc-dev

services:
    mc-velocity:
        # Custom Velocity image built from apps/mc/velocity. Bundles the
        # kbve-velocity-commands Kotlin plugin (teleport aliases, cross-
        # server chat bridge with /chat local|global, last-server
        # persistence). Runtime is still itzg/bungeecord under the hood,
        # so all the usual PLUGINS / LUCKPERMS_* env vars continue to work.
        image: kbve/mc-velocity:latest
        container_name: kbve-mc-dev-velocity
        ports:
            - '25565:25565'
        environment:
            TYPE: VELOCITY
            VELOCITY_VERSION: '3.4.0-SNAPSHOT'
            MEMORY: '512M'
            REPLACE_ENV_VARIABLES: 'true'
            # LuckPerms-Velocity — downloaded at container start. Matches the
            # prod velocity-deployment.yaml PLUGINS env var so the dev stack
            # exercises the same plugin-loading path.
            PLUGINS: 'https://cdn.modrinth.com/data/Vebnzrzj/versions/GZjsuCmU/LuckPerms-Velocity-5.5.17.jar'
            LUCKPERMS_MESSAGING_SERVICE: 'pluginmsg'
            LUCKPERMS_STORAGE_METHOD: 'h2'
        volumes:
            - ./velocity-dev/velocity.toml:/config/velocity.toml:ro
            - ./velocity-dev/forwarding.secret:/config/forwarding.secret:ro
        depends_on:
            - mc-lobby
            - mc-fabric
        networks:
            - mc-dev

    mc-lobby:
        # PaperMC lobby — Velocity's default landing target and fallback
        # when mc-fabric disconnects. Superflat peaceful world, minimal
        # plugin set (LuckPerms + EssentialsX suite + WorldEdit +
        # AdvancedPortals). RCON exposed on host port 25574 so e2e tests
        # and manual debugging don't collide with mc-fabric's 25575.
        image: kbve/mc-lobby:latest
        container_name: kbve-mc-dev-lobby
        ports:
            - '25574:25575'
        environment:
            EULA: 'TRUE'
            # Velocity handles Mojang auth; backend runs offline-mode and
            # trusts the forwarding signature from the proxy.
            ONLINE_MODE: 'false'
            MEMORY: '1G'
            ENABLE_RCON: 'true'
            RCON_PORT: '25575'
            RCON_PASSWORD: 'dev'
            MOTD: 'KBVE Dev Lobby'
            MAX_PLAYERS: '50'
            DIFFICULTY: 'peaceful'
            LEVEL_TYPE: 'minecraft:flat'
            GENERATE_STRUCTURES: 'false'
            SPAWN_MONSTERS: 'false'
            SPAWN_ANIMALS: 'false'
            SPAWN_NPCS: 'false'
        volumes:
            - mc-lobby-data:/data
        networks:
            - mc-dev

    mc-fabric:
        image: kbve/mc:latest
        container_name: kbve-mc-dev-fabric
        # RCON exposed on the host for e2e tests and manual debugging.
        # Game port (25565) is NOT exposed — clients must connect through
        # Velocity to exercise the modern-forwarding handshake.
        ports:
            - '25575:25575'
        # host.docker.internal fallback — only needed if a developer
        # overrides SUPABASE_URL to point at a host-side port-forward
        # (e.g. `kubectl port-forward -n kilobase svc/kong 8000:8000`
        # → http://host.docker.internal:8000). The default root .env
        # already uses the public https://supabase.kbve.com endpoint,
        # so this alias is a safety net, not the primary path.
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            EULA: 'TRUE'
            # Velocity handles Mojang auth on the proxy side; Fabric must
            # be offline-mode to accept forwarded sessions.
            ONLINE_MODE: 'false'
            MEMORY: '3G'
            ENABLE_RCON: 'true'
            RCON_PORT: '25575'
            RCON_PASSWORD: 'dev'
            MOTD: 'KBVE Dev Server'
            MAX_PLAYERS: '10'
            DIFFICULTY: 'normal'
            VIEW_DISTANCE: '8'
            SIMULATION_DISTANCE: '6'
            # mc_auth → Supabase. Pulled from apps/mc/.env via Compose's
            # automatic variable substitution. Both values default to an
            # empty string if unset, which makes the bevy_supa client fall
            # through to graceful "treat everyone as unlinked" mode so
            # local dev without Supabase still works end-to-end.
            SUPABASE_URL: ${SUPABASE_URL:-}
            SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
        volumes:
            # Named volume so mods + libraries + world persist across
            # `nx run mc:dev:down` cycles. Use `nx run mc:dev:clean` to wipe.
            - mc-fabric-data:/data
        networks:
            - mc-dev

networks:
    mc-dev:
        name: kbve-mc-dev

volumes:
    mc-fabric-data:
        name: kbve-mc-dev-fabric-data
    mc-lobby-data:
        name: kbve-mc-dev-lobby-data
