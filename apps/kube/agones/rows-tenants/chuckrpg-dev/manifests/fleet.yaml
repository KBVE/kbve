apiVersion: agones.dev/v1
kind: Fleet
metadata:
    name: ows-chuckrpg-dev
    namespace: arc-runners
    labels:
        app: ows-gameserver
        app.kubernetes.io/part-of: ows
        app.kubernetes.io/instance: chuckrpg-dev
spec:
    replicas: 0
    scheduling: Packed
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 25%
            maxUnavailable: 25%
    template:
        metadata:
            labels:
                app: ows-gameserver
                app.kubernetes.io/part-of: ows
                app.kubernetes.io/instance: chuckrpg-dev
        spec:
            ports:
                - name: game
                  portPolicy: Dynamic
                  containerPort: 7777
                  protocol: UDP
            health:
                initialDelaySeconds: 30
                periodSeconds: 15
                failureThreshold: 5
            template:
                spec:
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                        runAsGroup: 1000
                        fsGroup: 1000
                    containers:
                        - name: ue5-server
                          image: ubuntu:24.04
                          command:
                              - /bin/bash
                              - -c
                              - |
                                  SERVER_DIR=$(find /server -maxdepth 2 -name "LinuxServer" -type d | sort -V | tail -1)
                                  if [ -z "${SERVER_DIR}" ]; then
                                    echo "ERROR: LinuxServer directory not found on PVC"
                                    ls -la /server/ 2>/dev/null
                                    exit 1
                                  fi
                                  SERVER_BIN=$(find "${SERVER_DIR}" -maxdepth 1 -name "*Server.sh" | head -1)
                                  if [ -z "${SERVER_BIN}" ]; then
                                    SERVER_BIN="${SERVER_DIR}/ChuckServer.sh"
                                  fi
                                  if [ ! -f "${SERVER_BIN}" ]; then
                                    echo "ERROR: Server binary not found at ${SERVER_BIN}"
                                    ls -la "${SERVER_DIR}/" 2>/dev/null
                                    exit 1
                                  fi
                                  echo "Starting UE5 dedicated server from ${SERVER_BIN}"
                                  exec "${SERVER_BIN}" \
                                    -server \
                                    -log \
                                    -nosteam \
                                    -unattended \
                                    -port=${GAME_PORT:-7777} \
                                    -GameMode=/Script/Chuck.ChuckGameMode \
                                    ${OWS_EXTRA_ARGS:-}
                          env:
                              - name: GAME_PORT
                                value: '7777'
                              - name: OWS_API_PATH
                                value: http://rows.rows-chuckrpg-dev.svc.cluster.local:4322/
                              - name: OWS_INSTANCE_MANAGEMENT_PATH
                                value: http://rows.rows-chuckrpg-dev.svc.cluster.local:4322/
                              - name: OWS_CHARACTER_PERSISTENCE_PATH
                                value: http://rows.rows-chuckrpg-dev.svc.cluster.local:4322/
                              - name: OWS_GLOBAL_DATA_PATH
                                value: http://rows.rows-chuckrpg-dev.svc.cluster.local:4322/
                              - name: OWS_API_CUSTOMER_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: ows-gameserver-secrets-chuckrpg-dev
                                        key: customer-guid
                              - name: OWS_ENCRYPTION_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: ows-gameserver-secrets-chuckrpg-dev
                                        key: encryption-key
                              - name: OWS_SERVICE_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: ows-service-key-chuckrpg-dev
                                        key: service-key
                                        optional: true
                          resources:
                              requests:
                                  memory: 2Gi
                                  cpu: '1'
                              limits:
                                  memory: 4Gi
                                  cpu: '2'
                          volumeMounts:
                              - name: server-binary
                                mountPath: /server
                    volumes:
                        - name: server-binary
                          persistentVolumeClaim:
                              claimName: ows-server-build
