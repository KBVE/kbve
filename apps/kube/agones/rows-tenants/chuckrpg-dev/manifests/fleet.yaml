apiVersion: agones.dev/v1
kind: Fleet
metadata:
    name: ows-chuckrpg-dev
    namespace: arc-runners
    labels:
        app: ows-gameserver
        app.kubernetes.io/part-of: ows
        app.kubernetes.io/instance: chuckrpg-dev
spec:
    replicas: 0
    scheduling: Packed
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 25%
            maxUnavailable: 25%
    template:
        metadata:
            labels:
                app: ows-gameserver
                app.kubernetes.io/part-of: ows
                app.kubernetes.io/instance: chuckrpg-dev
        spec:
            ports:
                - name: game
                  portPolicy: Dynamic
                  containerPort: 7777
                  protocol: UDP
            health:
                initialDelaySeconds: 180
                periodSeconds: 15
                failureThreshold: 5
            template:
                spec:
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                        runAsGroup: 1000
                        fsGroup: 1000
                    containers:
                        - name: ue5-server
                          image: ubuntu:24.04
                          command:
                              - /bin/bash
                              - -c
                              - |
                                  UPROJECT="${OWS_UPROJECT:-/server/latest/EditorServer/chuck/chuck.uproject}"
                                  if [ ! -f "${UPROJECT}" ]; then
                                    UPROJECT=$(find /server -maxdepth 5 -name '*.uproject' -path '*EditorServer*' | sort -V | head -1)
                                  fi
                                  if [ -z "${UPROJECT}" ] || [ ! -f "${UPROJECT}" ]; then
                                    echo "ERROR: no .uproject found on PVC (expected /server/latest/EditorServer/chuck/chuck.uproject)"
                                    ls -la /server/ /server/latest/ 2>/dev/null
                                    exit 1
                                  fi
                                  EDITOR_BIN=$(find /server -maxdepth 7 -type f -path '*/Engine/Binaries/Linux/UnrealEditor' | sort -V | head -1)
                                  if [ -z "${EDITOR_BIN}" ]; then
                                    echo "ERROR: UnrealEditor binary not found under /server (editor build must bundle the engine)"
                                    ls -la /server/latest/ 2>/dev/null
                                    exit 1
                                  fi
                                  chmod +x "${EDITOR_BIN}" 2>/dev/null || true
                                  echo "Starting UnrealEditor server: ${EDITOR_BIN} ${UPROJECT}"
                                  exec "${EDITOR_BIN}" "${UPROJECT}" \
                                    -server \
                                    -log \
                                    -nosteam \
                                    -unattended \
                                    -port=${GAME_PORT:-7777} \
                                    -GameMode=${OWS_GAME_MODE} \
                                    ${OWS_EXTRA_ARGS:-}
                          env:
                              - name: GAME_PORT
                                value: '7777'
                              - name: OWS_GAME_MODE
                                value: /Script/Chuck.ChuckGameMode
                              - name: OWS_API_PATH
                                value: http://rows.rows-chuckrpg-dev.svc.cluster.local:4322/
                              - name: OWS_INSTANCE_MANAGEMENT_PATH
                                value: http://rows.rows-chuckrpg-dev.svc.cluster.local:4322/
                              - name: OWS_CHARACTER_PERSISTENCE_PATH
                                value: http://rows.rows-chuckrpg-dev.svc.cluster.local:4322/
                              - name: OWS_GLOBAL_DATA_PATH
                                value: http://rows.rows-chuckrpg-dev.svc.cluster.local:4322/
                              - name: OWS_API_CUSTOMER_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: ows-gameserver-secrets-chuckrpg-dev
                                        key: customer-guid
                              - name: OWS_ENCRYPTION_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: ows-gameserver-secrets-chuckrpg-dev
                                        key: encryption-key
                              - name: OWS_SERVICE_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: ows-service-key-chuckrpg-dev
                                        key: service-key
                                        optional: true
                          resources:
                              requests:
                                  memory: 3Gi
                                  cpu: '1'
                              limits:
                                  memory: 8Gi
                                  cpu: '2'
                          volumeMounts:
                              - name: server-binary
                                mountPath: /server
                                subPath: chuckServerDev
                    volumes:
                        - name: server-binary
                          persistentVolumeClaim:
                              claimName: ows-server-build
