# RBAC: allow agones-ows-external-secrets to read OWS secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: ows-secrets-reader-for-agones
    namespace: ows
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['ows-customer-guid', 'ows-encryption-key']
      verbs: ['get', 'list', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: agones-read-ows-secrets
    namespace: ows
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: ows-secrets-reader-for-agones
subjects:
    - kind: ServiceAccount
      name: agones-ows-external-secrets
      namespace: arc-runners
---
# Sync OWS secrets into arc-runners for Agones GameServer pods.
# The Fleet runs in arc-runners but needs CustomerGUID + EncryptionKey from ows namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: agones-ows-external-secrets
    namespace: arc-runners
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: ows-secrets-store
    namespace: arc-runners
spec:
    provider:
        kubernetes:
            remoteNamespace: ows
            auth:
                serviceAccount:
                    name: agones-ows-external-secrets
                    namespace: arc-runners
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: ows-gameserver-secrets
    namespace: arc-runners
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: ows-secrets-store
        kind: SecretStore
    target:
        name: ows-gameserver-secrets
        creationPolicy: Owner
    data:
        - secretKey: customer-guid
          remoteRef:
              key: ows-customer-guid
              property: customer-guid
        - secretKey: encryption-key
          remoteRef:
              key: ows-encryption-key
              property: encryption-key
