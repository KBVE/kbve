# Nexus Defense Agones Fleet
#
# Phase 1 of #11294. Replicas start at 0; the upcoming lobby endpoint in
# `jedi` calls the Agones Allocator API to spin a `Ready` GameServer per
# match. Each replica is a long-lived axum WS host backed by the bevy
# headless sim.
#
# nd-server now speaks the Agones SDK directly (`apps/godot/nexus-defense/
# server/src/agones.rs`): it marks the GameServer `Ready` as soon as the
# WS listener binds and pings `Health()` every 2s. The plain HTTP
# `/healthz` endpoint stays as a belt-and-suspenders kubelet probe so
# pod restarts still happen if the process wedges before the SDK loop
# can stop sending heartbeats.
apiVersion: agones.dev/v1
kind: Fleet
metadata:
    name: nd-server
    namespace: nexus-defense
    labels:
        app: nd-server
        app.kubernetes.io/part-of: nexus-defense
spec:
    replicas: 0
    scheduling: Packed
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 25%
            maxUnavailable: 25%
    template:
        metadata:
            labels:
                app: nd-server
                app.kubernetes.io/part-of: nexus-defense
        spec:
            ports:
                - name: ws
                  portPolicy: Dynamic
                  containerPort: 7878
                  protocol: TCP
            health:
                initialDelaySeconds: 10
                periodSeconds: 10
                failureThreshold: 5
            sdkServer:
                # Sidecar is the primary health surface — nd-server's
                # in-process loop calls Ready() then pings Health() every
                # 2s (HEALTH_PING_INTERVAL). Agones reaps the pod if the
                # health channel goes silent for failureThreshold *
                # periodSeconds.
                logLevel: Info
            template:
                spec:
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 10001
                        runAsGroup: 10001
                        fsGroup: 10001
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: nd-server
                          image: ghcr.io/kbve/nd-server:0.0.2
                          imagePullPolicy: IfNotPresent
                          env:
                              # Bind to the Dynamic-allocated port the SDK
                              # injects as $AGONES_SDK_HTTP_PORT companion.
                              # Until the SDK call is wired we fall back to
                              # the static container port; Agones still NATs
                              # the external Dynamic port to it.
                              - name: TD_SERVER_ADDR
                                value: '0.0.0.0:7878'
                              - name: TD_SERVER_SEED
                                value: '0'
                              - name: RUST_LOG
                                value: 'info,nd_server=debug,q=info'
                              - name: SUPABASE_JWT_SECRET
                                valueFrom:
                                    secretKeyRef:
                                        name: nd-server-supabase-jwt
                                        key: SUPABASE_JWT_SECRET
                          ports:
                              - name: ws
                                containerPort: 7878
                                protocol: TCP
                          readinessProbe:
                              httpGet:
                                  path: /healthz
                                  port: 7878
                              initialDelaySeconds: 3
                              periodSeconds: 5
                              failureThreshold: 3
                          livenessProbe:
                              httpGet:
                                  path: /healthz
                                  port: 7878
                              initialDelaySeconds: 10
                              periodSeconds: 15
                              failureThreshold: 5
                          resources:
                              requests:
                                  cpu: '250m'
                                  memory: '256Mi'
                              limits:
                                  cpu: '1500m'
                                  memory: '1Gi'
                          securityContext:
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                  drop:
                                      - ALL
