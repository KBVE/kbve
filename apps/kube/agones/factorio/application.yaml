apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: agones-factorio
    namespace: argocd
    labels:
        app.kubernetes.io/part-of: factorio
    annotations:
        kbve.com/source-path: kube/agones/factorio
        kbve.com/manifest-path: apps/kube/agones/factorio/manifests
        kbve.com/application-file: kube/agones/factorio/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: game-server
        kbve.com/stack: agones
spec:
    project: default
    source:
        repoURL: https://github.com/kbve/kbve
        targetRevision: main
        path: apps/kube/agones/factorio/manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: factorio
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=false
            - ServerSideApply=true
