apiVersion: v1
kind: ServiceAccount
metadata:
    name: factorio-rotator
    namespace: factorio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: factorio-rotator
    namespace: factorio
rules:
    - apiGroups: ['']
      resources: ['pods']
      verbs: ['get', 'list']
    - apiGroups: ['agones.dev']
      resources: ['gameservers']
      verbs: ['get', 'list', 'delete']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: factorio-rotator
    namespace: factorio
subjects:
    - kind: ServiceAccount
      name: factorio-rotator
      namespace: factorio
roleRef:
    kind: Role
    name: factorio-rotator
    apiGroup: rbac.authorization.k8s.io
