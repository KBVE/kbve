apiVersion: v1
kind: ServiceAccount
metadata:
    name: factorio-external-secrets
    namespace: factorio
    labels:
        app.kubernetes.io/part-of: factorio
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: vector-remote-secret-store
    namespace: factorio
spec:
    provider:
        kubernetes:
            remoteNamespace: vector
            auth:
                serviceAccount:
                    name: factorio-external-secrets
                    namespace: factorio
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: clickhouse-credentials
    namespace: factorio
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: vector-remote-secret-store
        kind: SecretStore
    target:
        name: clickhouse-credentials
        creationPolicy: Owner
    data:
        - secretKey: endpoint
          remoteRef:
              key: clickhouse-vector-credentials
              property: endpoint
        - secretKey: username
          remoteRef:
              key: clickhouse-vector-credentials
              property: username
        - secretKey: password
          remoteRef:
              key: clickhouse-vector-credentials
              property: password
