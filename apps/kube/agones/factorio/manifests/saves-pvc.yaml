apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: factorio-saves
    namespace: factorio
    labels:
        app.kubernetes.io/part-of: factorio
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 10Gi
