apiVersion: v1
kind: ServiceAccount
metadata:
    name: factorio-ctl
    namespace: factorio
    labels:
        app: factorio-ctl
        app.kubernetes.io/part-of: factorio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: factorio-ctl
    namespace: factorio
    labels:
        app.kubernetes.io/part-of: factorio
rules:
    - apiGroups:
          - agones.dev
      resources:
          - gameservers
      verbs:
          - get
          - list
          - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: factorio-ctl
    namespace: factorio
    labels:
        app.kubernetes.io/part-of: factorio
subjects:
    - kind: ServiceAccount
      name: factorio-ctl
      namespace: factorio
roleRef:
    kind: Role
    name: factorio-ctl
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
    name: factorio-ctl
    namespace: factorio
    labels:
        app: factorio-ctl
        app.kubernetes.io/part-of: factorio
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
spec:
    selector:
        app: factorio-ctl
    ports:
        - name: http
          port: 9002
          targetPort: 9002
          protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: factorio-ctl
    namespace: factorio
    labels:
        app: factorio-ctl
        app.kubernetes.io/part-of: factorio
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
spec:
    replicas: 0
    selector:
        matchLabels:
            app: factorio-ctl
    template:
        metadata:
            labels:
                app: factorio-ctl
                app.kubernetes.io/part-of: factorio
        spec:
            serviceAccountName: factorio-ctl
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: factorio-ctl
                  image: ghcr.io/kbve/factorio-ctl:0.0.1
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 9002
                        protocol: TCP
                  env:
                      - name: FACTORIO_CTL_PORT
                        value: '9002'
                      - name: FACTORIO_NAMESPACE
                        value: factorio
                      - name: FACTORIO_GAMESERVER
                        value: factorio
                      - name: FACTORIO_SERVER_ID
                        value: factorio-1
                      - name: CLICKHOUSE_DATABASE
                        value: gameops
                      - name: CLICKHOUSE_ENDPOINT
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-credentials
                                key: endpoint
                                optional: true
                      - name: CLICKHOUSE_USER
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-credentials
                                key: username
                                optional: true
                      - name: CLICKHOUSE_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-credentials
                                key: password
                                optional: true
                      - name: RUST_LOG
                        value: factorio_ctl=info,tower_http=warn
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 9002
                      initialDelaySeconds: 5
                      periodSeconds: 15
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 9002
                      initialDelaySeconds: 3
                      periodSeconds: 10
                  resources:
                      requests:
                          cpu: 25m
                          memory: 32Mi
                      limits:
                          cpu: 250m
                          memory: 128Mi
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
