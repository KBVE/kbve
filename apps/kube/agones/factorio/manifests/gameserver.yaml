apiVersion: agones.dev/v1
kind: GameServer
metadata:
    name: factorio
    namespace: factorio
    labels:
        app: factorio
        app.kubernetes.io/part-of: factorio
spec:
    container: factorio
    ports:
        - name: game
          portPolicy: Static
          hostPort: 34197
          containerPort: 34197
          protocol: UDP
    health:
        initialDelaySeconds: 60
        periodSeconds: 15
        failureThreshold: 5
    sdkServer:
        logLevel: Info
    template:
        metadata:
            labels:
                app: factorio
                app.kubernetes.io/part-of: factorio
        spec:
            securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault
            volumes:
                - name: factorio-saves
                  persistentVolumeClaim:
                      claimName: factorio-saves
                - name: log-spool
                  emptyDir:
                      medium: Memory
                      sizeLimit: 64Mi
                - name: config
                  emptyDir:
                      medium: Memory
                      sizeLimit: 8Mi
            containers:
                - name: factorio
                  image: ghcr.io/kbve/agones-factorio:0.0.3
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: FACTORIO_RCON_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: factorio-rcon
                                key: rcon_password
                      - name: FACTORIO_RCON_BIND
                        value: '127.0.0.1'
                      - name: FACTORIO_RCON_PORT
                        value: '27015'
                      - name: FACTORIO_LOG_DIR
                        value: '/shared/log'
                      - name: FACTORIO_CONSOLE_LOG
                        value: '/shared/log/console.log'
                      - name: AGONES_SDK_HTTP
                        value: 'http://127.0.0.1:9358'
                      - name: AGONES_READY_DELAY
                        value: '45'
                      - name: FACTORIO_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: factorio-credentials
                                key: username
                                optional: true
                      - name: FACTORIO_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: factorio-credentials
                                key: token
                                optional: true
                      - name: FACTORIO_GAME_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: factorio-credentials
                                key: game_password
                                optional: true
                      - name: FACTORIO_PUBLIC
                        value: 'true'
                      # - name: FACTORIO_SAVE
                      #   value: 'Robots.zip'
                  ports:
                      - containerPort: 34197
                        protocol: UDP
                      - containerPort: 27015
                        protocol: TCP
                  volumeMounts:
                      - name: factorio-saves
                        mountPath: /factorio/saves
                      - name: log-spool
                        mountPath: /shared/log
                      - name: config
                        mountPath: /factorio/config
                  resources:
                      requests:
                          cpu: '1'
                          memory: '2Gi'
                      limits:
                          cpu: '4'
                          memory: '6Gi'
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                - name: factorio-relay
                  image: ghcr.io/kbve/agones-factorio-relay:0.0.2
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: FACTORIO_CONSOLE_LOG
                        value: '/shared/log/console.log'
                      - name: FACTORIO_RCON_ADDR
                        value: '127.0.0.1:27015'
                      - name: FACTORIO_RCON_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: factorio-rcon
                                key: rcon_password
                      - name: FACTORIO_SERVER_ID
                        value: 'factorio-1'
                      - name: IRC_SERVER
                        value: 'ergo-irc-service.irc.svc.cluster.local'
                      - name: IRC_PORT
                        value: '6667'
                      - name: IRC_USE_TLS
                        value: 'false'
                      - name: IRC_NICK
                        value: 'factorio-bot'
                      - name: IRC_CHANNEL
                        value: '#general'
                      - name: RUST_LOG
                        value: 'info,agones_factorio_relay=debug'
                  volumeMounts:
                      - name: log-spool
                        mountPath: /shared/log
                        readOnly: true
                  resources:
                      requests:
                          cpu: '50m'
                          memory: '64Mi'
                      limits:
                          cpu: '500m'
                          memory: '256Mi'
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
