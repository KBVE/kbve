# Single GameServer for Phase 1.
#
# Two containers in one pod:
#   factorio        — kbve/agones-factorio (factoriotools/factorio rootless +
#                     KBVE scenario + agones-shim). Writes the --console-log
#                     stream into the shared `log-spool` emptyDir; the relay
#                     sidecar tails it. Mounts the `factorio-saves` PVC at
#                     /factorio/saves so the map survives pod restarts.
#   factorio-relay  — kbve/agones-factorio-relay (Rust). Tails the same
#                     emptyDir, talks RCON to the factorio container over
#                     pod loopback, bridges chat to #general on the kbve IRC
#                     network. ClickHouse writer stays disabled until
#                     Phase 4d wires the gameops insert.
#
# Port policy `Static` so the game UDP port is a known 34197 on every node.
# A sibling LoadBalancer Service in service.yaml selects on the
# `agones.dev/gameserver` label and routes the public UDP listener through
# the Cilium LB.
#
# RCON stays loopback-only — the shim binds 127.0.0.1:27015, only the relay
# container shares the pod netns. RCON_PASSWORD lands via SealedSecret
# (rcon-sealed-secret.yaml, generated by ../seal-rcon.sh).

apiVersion: agones.dev/v1
kind: GameServer
metadata:
    name: factorio
    namespace: factorio
    labels:
        app: factorio
        app.kubernetes.io/part-of: factorio
spec:
    container: factorio
    ports:
        - name: game
          portPolicy: Static
          hostPort: 34197
          containerPort: 34197
          protocol: UDP
    health:
        initialDelaySeconds: 60
        periodSeconds: 15
        failureThreshold: 5
    sdkServer:
        logLevel: Info
    template:
        metadata:
            labels:
                app: factorio
                app.kubernetes.io/part-of: factorio
        spec:
            securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault
            volumes:
                - name: factorio-saves
                  persistentVolumeClaim:
                      claimName: factorio-saves
                - name: log-spool
                  emptyDir:
                      medium: Memory
                      sizeLimit: 64Mi
                - name: config
                  configMap:
                      name: factorio-server-settings
                      optional: true
            containers:
                - name: factorio
                  image: ghcr.io/kbve/agones-factorio:0.0.3
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: FACTORIO_RCON_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: factorio-rcon
                                key: rcon_password
                      - name: FACTORIO_RCON_BIND
                        value: '127.0.0.1'
                      - name: FACTORIO_RCON_PORT
                        value: '27015'
                      - name: FACTORIO_LOG_DIR
                        value: '/shared/log'
                      - name: FACTORIO_CONSOLE_LOG
                        value: '/shared/log/console.log'
                      - name: AGONES_SDK_HTTP
                        value: 'http://127.0.0.1:9358'
                      - name: AGONES_READY_DELAY
                        value: '45'
                      # Public matchmaking credentials — produced by
                      # ../seal-credentials.sh and decrypted by the
                      # sealed-secrets controller. All three keys are
                      # optional: with `username` + `token` unset the
                      # server stays LAN/IP-only; with FACTORIO_PUBLIC
                      # unset it stays unlisted even when creds are set.
                      - name: FACTORIO_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: factorio-credentials
                                key: username
                                optional: true
                      - name: FACTORIO_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: factorio-credentials
                                key: token
                                optional: true
                      - name: FACTORIO_GAME_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: factorio-credentials
                                key: game_password
                                optional: true
                      - name: FACTORIO_PUBLIC
                        value: 'true'
                      # Optional: load a save instead of the scenario. The
                      # save file must already exist under /factorio/saves on
                      # the PVC — seed it once via `kubectl cp` (see
                      # apps/kube/agones/factorio/README.md) or leave unset
                      # to boot the kbve scenario.
                      # - name: FACTORIO_SAVE
                      #   value: 'Robots.zip'
                  ports:
                      - containerPort: 34197
                        protocol: UDP
                      - containerPort: 27015
                        protocol: TCP
                  volumeMounts:
                      - name: factorio-saves
                        mountPath: /factorio/saves
                      - name: log-spool
                        mountPath: /shared/log
                      - name: config
                        mountPath: /factorio/config
                        readOnly: true
                  resources:
                      requests:
                          cpu: '1'
                          memory: '2Gi'
                      limits:
                          cpu: '4'
                          memory: '6Gi'
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                - name: factorio-relay
                  image: ghcr.io/kbve/agones-factorio-relay:0.0.2
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: FACTORIO_CONSOLE_LOG
                        value: '/shared/log/console.log'
                      - name: FACTORIO_RCON_ADDR
                        value: '127.0.0.1:27015'
                      - name: FACTORIO_RCON_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: factorio-rcon
                                key: rcon_password
                      - name: FACTORIO_SERVER_ID
                        value: 'factorio-1'
                      - name: IRC_SERVER
                        valueFrom:
                            secretKeyRef:
                                name: factorio-irc
                                key: irc_server
                                optional: true
                      - name: IRC_PORT
                        valueFrom:
                            secretKeyRef:
                                name: factorio-irc
                                key: irc_port
                                optional: true
                      - name: IRC_NICK
                        valueFrom:
                            secretKeyRef:
                                name: factorio-irc
                                key: irc_nick
                                optional: true
                      - name: IRC_CHANNEL
                        value: '#general'
                      - name: IRC_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: factorio-irc
                                key: irc_password
                                optional: true
                      - name: RUST_LOG
                        value: 'info,agones_factorio_relay=debug'
                  volumeMounts:
                      - name: log-spool
                        mountPath: /shared/log
                        readOnly: true
                  resources:
                      requests:
                          cpu: '50m'
                          memory: '64Mi'
                      limits:
                          cpu: '500m'
                          memory: '256Mi'
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
