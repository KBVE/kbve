# Public UDP listener for Factorio multiplayer (port 34197/udp).
#
# Selects on the agones.dev/gameserver label so the Service follows whichever
# pod is currently `Allocated`/`Ready`. Static portPolicy in gameserver.yaml
# guarantees the host-port is always 34197 — DNS record `factorio.kbve.com`
# points at the LB IP this Service gets, and players connect to the default
# 34197 without needing per-allocation discovery.

apiVersion: v1
kind: Service
metadata:
    name: factorio-public
    namespace: factorio
    labels:
        app.kubernetes.io/part-of: factorio
    annotations:
        # Cilium LB IPAM — pool with the .74 ingress-nginx-friendly subnet
        # per the kbve_lb_split note. UDP only, no CF in front, so the .71
        # gateway pool would also work, but stay consistent with new public
        # services going on .74.
        lbipam.cilium.io/sharing-key: 'gameops-udp'
spec:
    type: LoadBalancer
    externalTrafficPolicy: Local
    selector:
        agones.dev/gameserver: factorio
    ports:
        - name: factorio
          protocol: UDP
          port: 34197
          targetPort: 34197
