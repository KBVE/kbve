apiVersion: batch/v1
kind: CronJob
metadata:
    name: factorio-rotator
    namespace: factorio
spec:
    schedule: '*/2 * * * *'
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 3
    jobTemplate:
        spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 3600
            template:
                spec:
                    serviceAccountName: factorio-rotator
                    restartPolicy: Never
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 10001
                        runAsGroup: 10001
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: rotator
                          image: ghcr.io/kbve/kubectl:0.1.3
                          imagePullPolicy: IfNotPresent
                          securityContext:
                              allowPrivilegeEscalation: false
                              capabilities:
                                  drop:
                                      - ALL
                              readOnlyRootFilesystem: true
                          command:
                              - kbve-kubectl
                              - rotate-gameserver
                              - --namespace=factorio
                              - --gameserver=factorio
                              - --container=factorio
                              - --delete-timeout=180
                          resources:
                              requests:
                                  cpu: 25m
                                  memory: 64Mi
                              limits:
                                  cpu: 100m
                                  memory: 128Mi
