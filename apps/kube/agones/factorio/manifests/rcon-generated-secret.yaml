# RCON password — generated at first reconcile by the ExternalSecrets
# Operator and persisted into a regular K8s Secret. Both pods in the
# GameServer (factorio + relay) read from the same Secret, so they share
# a password no human ever has to type.
#
# Why a generator instead of a SealedSecret:
#   - RCON is consumed only by the relay sidecar over pod loopback. No
#     operator ever needs to RCON in by hand, so requiring a human to
#     type / paste / rotate a password is friction for no benefit.
#   - The generator + ExternalSecret combo produces the K8s Secret with
#     the right name + key automatically — no kubeseal CLI, no shell
#     script, no extra file under manifests/ besides this one.
#
# Why refreshInterval: 0:
#   - Re-rolling the password mid-flight breaks the running relay (it
#     authed with the old password at startup) and would require a pod
#     restart to recover.
#   - deletionPolicy: Retain keeps the Secret around if the generator or
#     ExternalSecret CR ever gets pruned — same belt-and-suspenders the
#     mc fleet uses for the JWT signing key.
#
# To rotate manually: delete the `factorio-rcon` Secret, ExternalSecret
# regenerates on next reconcile, then `kubectl rollout restart` (or just
# delete the GameServer pod — Agones respawns it).

apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
    name: factorio-rcon-pw
    namespace: factorio
spec:
    length: 48
    digits: 8
    symbols: 0
    symbolCharacters: ''
    noUpper: false
    allowRepeat: true
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: factorio-rcon
    namespace: factorio
spec:
    refreshInterval: '0'
    target:
        name: factorio-rcon
        creationPolicy: Owner
        deletionPolicy: Retain
        template:
            engineVersion: v2
            data:
                rcon_password: '{{ .password }}'
    dataFrom:
        - sourceRef:
              generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: Password
                  name: factorio-rcon-pw
