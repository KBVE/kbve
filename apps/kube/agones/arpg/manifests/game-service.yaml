apiVersion: v1
kind: Service
metadata:
    name: arpg-game
    namespace: arpg
    labels:
        app: arpg-server
        app.kubernetes.io/part-of: arpg
spec:
    type: ClusterIP
    selector:
        app: arpg-server
    sessionAffinity: ClientIP
    ports:
        - name: ws
          port: 7979
          targetPort: 7979
          protocol: TCP
