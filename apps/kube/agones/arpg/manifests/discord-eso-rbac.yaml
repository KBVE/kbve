apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: kbve-arpg-discord-access
    namespace: arpg
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['arpg-discord-credentials']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: kbve-arpg-discord-access-binding
    namespace: arpg
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: kbve-arpg-discord-access
subjects:
    - kind: ServiceAccount
      name: kbve-external-secrets
      namespace: kbve
