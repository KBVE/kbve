apiVersion: v1
kind: Service
metadata:
    name: arpg-game-udp
    namespace: arpg
    labels:
        app: arpg-server
        app.kubernetes.io/part-of: arpg
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
spec:
    type: LoadBalancer
    selector:
        app: arpg-server
    sessionAffinity: ClientIP
    ports:
        - name: udp
          port: 7977
          targetPort: 7977
          protocol: UDP
