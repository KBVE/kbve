# SecretStore + ExternalSecret rendering supabase-shared in the arpg
# namespace. Mirrors the cryptothrone / rentearth pattern: the SecretStore
# authenticates as arpg-external-secrets and reads the supabase-jwt and
# supabase-postgres source secrets in kilobase, then composes them into a
# single supabase-shared Secret with the env-var keys the arpg-server
# GameServer expects (fleet.yaml secretKeyRefs).
#
# Activation requires arpg-external-secrets to appear in the
# notification-bot-read-secrets RoleBinding subjects list in
# apps/kube/kilobase/manifests/cross-namespace-rbac.yaml. Until that binding
# lands the ExternalSecret fails to render and the GameServer stays in
# CreateContainerConfigError on the non-optional SUPABASE_JWT_SECRET ref.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: arpg-external-secrets
    namespace: arpg
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: kilobase-remote-secret-store
    namespace: arpg
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: arpg-external-secrets
                    namespace: arpg
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: arpg-supabase-secrets
    namespace: arpg
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: supabase-shared
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                SUPABASE_URL: 'http://kong.kilobase.svc.cluster.local:8000'
                SUPABASE_ANON_KEY: '{{ .anonkey }}'
                SUPABASE_SERVICE_ROLE_KEY: '{{ .servicekey }}'
                SUPABASE_JWT_SECRET: '{{ .jwtsecret }}'
                DATABASE_URL: 'postgres://postgres:{{ .dbpassword }}@supabase-cluster-rw.kilobase.svc.cluster.local:5432/supabase'
                # jedi PgCluster pool URLs (RW primary + RO replica). Consumed
                # by the arpg-server gameserver.
                KBVE_PG_RW_URL: 'postgres://postgres:{{ .dbpassword | urlquery }}@supabase-cluster-rw.kilobase.svc.cluster.local:5432/supabase?sslmode=disable'
                KBVE_PG_RO_URL: 'postgres://postgres:{{ .dbpassword | urlquery }}@supabase-cluster-ro.kilobase.svc.cluster.local:5432/supabase?sslmode=disable'
    data:
        - secretKey: jwtsecret
          remoteRef:
              key: supabase-jwt
              property: secret
        - secretKey: anonkey
          remoteRef:
              key: supabase-jwt
              property: anon-key
        - secretKey: servicekey
          remoteRef:
              key: supabase-jwt
              property: service-key
        - secretKey: dbpassword
          remoteRef:
              key: supabase-postgres
              property: password
---
# Second SecretStore + ExternalSecret reaching into the valkey namespace for the
# shared Valkey password, composed into a full KBVE_KV_URL (jedi KvCache reads
# KBVE_KV_URL / REDIS_URL only) so the arpg-server gameserver gets its L2 cache
# instead of running L1-only. Requires arpg-external-secrets to be granted get on
# valkey-auth in the valkey namespace
# (apps/kube/valkey/manifests/arpg-valkey-rbac.yaml).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: valkey-remote-secret-store
    namespace: arpg
spec:
    provider:
        kubernetes:
            remoteNamespace: valkey
            auth:
                serviceAccount:
                    name: arpg-external-secrets
                    namespace: arpg
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: arpg-valkey-secrets
    namespace: arpg
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: valkey-remote-secret-store
        kind: SecretStore
    target:
        name: arpg-valkey
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                KBVE_KV_URL: 'redis://:{{ .valkeypassword | urlquery }}@valkey.valkey.svc.cluster.local:6379'
    data:
        - secretKey: valkeypassword
          remoteRef:
              key: valkey-auth
              property: valkey-password
