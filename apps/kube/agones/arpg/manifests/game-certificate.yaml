    namespace: arpg
    labels:
        app.kubernetes.io/part-of: arpg
spec:
    secretName: arpg-game-tls
    dnsNames:
        - arpg.kbve.com
    issuerRef:
        name: letsencrypt-http
        kind: ClusterIssuer
        group: cert-manager.io
