apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: agones-arpg
    namespace: argocd
    labels:
        app.kubernetes.io/part-of: arpg
spec:
    project: default
    source:
        repoURL: https://github.com/kbve/kbve
        targetRevision: main
        path: apps/kube/agones/arpg/manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: arpg
    ignoreDifferences:
        - group: agones.dev
          kind: Fleet
          jsonPointers:
              - /spec/replicas
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
