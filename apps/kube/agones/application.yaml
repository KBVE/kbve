apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: agones
    namespace: argocd
spec:
    project: default
    sources:
        - repoURL: https://agones.dev/chart/stable
          targetRevision: 1.56.0
          chart: agones
          helm:
              releaseName: agones
              valueFiles:
                  - $values/apps/kube/agones/values.yaml
        - repoURL: https://github.com/kbve/kbve
          targetRevision: main
          ref: values
    destination:
        server: https://kubernetes.default.svc
        namespace: agones-system
    ignoreDifferences:
        # Agones Helm generates TLS certs and webhook configs at install time.
        # These are not in git and should not cause drift.
        - group: ''
          kind: Secret
          jsonPointers:
              - /data
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jsonPointers:
              - /webhooks
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jsonPointers:
              - /webhooks
        - group: apiregistration.k8s.io
          kind: APIService
          jsonPointers:
              - /spec/caBundle
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
        retry:
            limit: 3
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
