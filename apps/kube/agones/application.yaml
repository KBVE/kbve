apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: agones
    namespace: argocd
    annotations:
        kbve.com/source-path: kube/agones
        kbve.com/manifest-path: kube/agones
        kbve.com/application-file: kube/agones/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: game-server
        kbve.com/stack: agones
spec:
    project: default
    sources:
        - repoURL: https://agones.dev/chart/stable
          targetRevision: 1.58.0
          chart: agones
          helm:
              releaseName: agones
              valueFiles:
                  - $values/apps/kube/agones/values.yaml
        - repoURL: https://github.com/kbve/kbve
          targetRevision: main
          ref: values
    destination:
        server: https://kubernetes.default.svc
        namespace: agones-system
    ignoreDifferences:
        - group: ''
          kind: Secret
          jsonPointers:
              - /data
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jsonPointers:
              - /webhooks
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jsonPointers:
              - /webhooks
        - group: apiregistration.k8s.io
          kind: APIService
          jsonPointers:
              - /spec/caBundle
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
        retry:
            limit: 3
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
