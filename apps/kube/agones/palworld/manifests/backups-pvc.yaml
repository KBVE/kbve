apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: palworld-backups
    namespace: palworld
    labels:
        app.kubernetes.io/part-of: palworld
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 5Gi
