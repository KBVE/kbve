# Headless backend Service — selects the Agones gameserver pods.
# Velocity uses this DNS name to forward connections to the dynamically
# allocated Fabric server pods.
# Headless (clusterIP: None) so DNS returns pod IPs directly,
# bypassing kube-proxy load balancing.
apiVersion: v1
kind: Service
metadata:
    name: mc-fabric-backend
    namespace: arc-runners
    labels:
        app: mc-gameserver
        app.kubernetes.io/part-of: mc
spec:
    type: ClusterIP
    clusterIP: None
    selector:
        app: mc-gameserver
    ports:
        - name: minecraft
          port: 25565
          targetPort: 25565
          protocol: TCP
