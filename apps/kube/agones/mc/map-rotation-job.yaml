# One-shot Job for MC map rotation.
#
# PREREQUISITES — run these BEFORE creating the Job:
#   1. Scale the fleet to 0 so no server is using the PVC:
#        kubectl -n arc-runners scale fleet mc-fabric --replicas=0
#   2. Wait for all GameServer pods to terminate:
#        kubectl -n arc-runners get pods -l agones.dev/fleet=mc-fabric -w
#
# AFTER the Job completes:
#   3. Scale the fleet back (or let the FleetAutoscaler handle it):
#        kubectl -n arc-runners scale fleet mc-fabric --replicas=1
#   4. Clean up the completed Job:
#        kubectl -n arc-runners delete job mc-map-rotation
#
# DRY RUN — to preview what would be deleted without touching files:
#   Add an env override: DRY_RUN=true
#   kubectl -n arc-runners create job mc-map-rotation-dry \
#     --from=job/mc-map-rotation -- /bin/bash -c "DRY_RUN=true /scripts/map-rotation.sh"
apiVersion: batch/v1
kind: Job
metadata:
    name: mc-map-rotation
    namespace: arc-runners
    labels:
        app.kubernetes.io/part-of: mc
spec:
    backoffLimit: 0
    ttlSecondsAfterFinished: 86400
    template:
        metadata:
            labels:
                app: mc-map-rotation
                app.kubernetes.io/part-of: mc
        spec:
            restartPolicy: Never
            nodeSelector:
                node.kbve.com/type: dedicated-server
            containers:
                - name: map-rotation
                  image: ghcr.io/kbve/mc:1.0.13
                  command:
                      - /bin/bash
                      - /scripts/map-rotation.sh
                  envFrom:
                      - configMapRef:
                            name: mc-map-rotation-config
                  env:
                      - name: WORLD_DIR
                        value: /data/world
                      - name: BACKUP_DIR
                        value: /data/backups
                      - name: DRY_RUN
                        value: 'false'
                  volumeMounts:
                      - name: mc-data
                        mountPath: /data
                      - name: rotation-script
                        mountPath: /scripts
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
            volumes:
                - name: mc-data
                  persistentVolumeClaim:
                      claimName: mc-world-data
                - name: rotation-script
                  configMap:
                      name: mc-map-rotation-script
                      defaultMode: 0755
---
# The rotation script packaged as a ConfigMap so the Job can mount it.
# This avoids rebuilding the Docker image just to update rotation logic.
apiVersion: v1
kind: ConfigMap
metadata:
    name: mc-map-rotation-script
    namespace: arc-runners
    labels:
        app.kubernetes.io/part-of: mc
data:
    map-rotation.sh: |
        #!/usr/bin/env bash
        set -euo pipefail

        WORLD_DIR="${WORLD_DIR:-/data/world}"
        BACKUP_DIR="${BACKUP_DIR:-/data/backups}"
        CENTER_X="${CENTER_X:-0}"
        CENTER_Z="${CENTER_Z:-0}"
        PROTECT_RADIUS="${PROTECT_RADIUS:-512}"
        RESET_NETHER="${RESET_NETHER:-true}"
        RESET_END="${RESET_END:-true}"
        RESET_PLAYERDATA="${RESET_PLAYERDATA:-false}"
        DRY_RUN="${DRY_RUN:-false}"

        log() { echo "[map-rotation] $(date -u +%H:%M:%S) $*"; }

        floor_div() {
            local num=$1 div=$2
            if (( num >= 0 )); then
                echo $(( num / div ))
            else
                echo $(( (num - div + 1) / div ))
            fi
        }

        region_is_protected() {
            local rx=$1 rz=$2
            local region_min_x=$(( rx * 512 ))
            local region_max_x=$(( rx * 512 + 511 ))
            local region_min_z=$(( rz * 512 ))
            local region_max_z=$(( rz * 512 + 511 ))
            local protect_min_x=$(( CENTER_X - PROTECT_RADIUS ))
            local protect_max_x=$(( CENTER_X + PROTECT_RADIUS ))
            local protect_min_z=$(( CENTER_Z - PROTECT_RADIUS ))
            local protect_max_z=$(( CENTER_Z + PROTECT_RADIUS ))
            if (( region_max_x < protect_min_x || region_min_x > protect_max_x )); then
                return 1
            fi
            if (( region_max_z < protect_min_z || region_min_z > protect_max_z )); then
                return 1
            fi
            return 0
        }

        process_region_dir() {
            local dir=$1 label=$2
            local kept=0 deleted=0
            if [[ ! -d "$dir" ]]; then
                log "$label: directory not found, skipping"
                return
            fi
            for f in "$dir"/r.*.*.mca; do
                [[ -f "$f" ]] || continue
                local basename
                basename=$(basename "$f")
                local rx rz stripped
                stripped="${basename#r.}"
                stripped="${stripped%.mca}"
                rx="${stripped%%.*}"
                rz="${stripped#*.}"
                if [[ -z "$rx" || -z "$rz" || "$rx" == "$rz" && "$stripped" != "$rx.$rz" ]]; then
                    log "$label: skipping unparseable file: $basename"
                    continue
                fi
                if region_is_protected "$rx" "$rz"; then
                    log "$label: KEEP   $basename (region $rx,$rz)"
                    (( kept++ )) || true
                else
                    if [[ "$DRY_RUN" == "true" ]]; then
                        log "$label: DELETE (dry-run) $basename (region $rx,$rz)"
                    else
                        rm -f "$f"
                        log "$label: DELETE $basename (region $rx,$rz)"
                    fi
                    (( deleted++ )) || true
                fi
            done
            log "$label: kept=$kept deleted=$deleted"
        }

        if [[ ! -d "$WORLD_DIR" ]]; then
            log "ERROR: world directory not found: $WORLD_DIR"
            exit 1
        fi

        log "=== MC Map Rotation ==="
        log "World:           $WORLD_DIR"
        log "Center:          ($CENTER_X, $CENTER_Z)"
        log "Protect radius:  $PROTECT_RADIUS blocks"
        log "Reset nether:    $RESET_NETHER"
        log "Reset end:       $RESET_END"
        log "Reset playerdata:$RESET_PLAYERDATA"
        log "Dry run:         $DRY_RUN"

        min_rx=$(floor_div $(( CENTER_X - PROTECT_RADIUS )) 512)
        max_rx=$(floor_div $(( CENTER_X + PROTECT_RADIUS )) 512)
        min_rz=$(floor_div $(( CENTER_Z - PROTECT_RADIUS )) 512)
        max_rz=$(floor_div $(( CENTER_Z + PROTECT_RADIUS )) 512)
        log "Protected regions: r.[$min_rx..$max_rx].[$min_rz..$max_rz].mca"

        if [[ "$DRY_RUN" != "true" ]]; then
            mkdir -p "$BACKUP_DIR"
            backup_name="world-pre-rotation-$(date -u +%Y%m%d-%H%M%S).tar.gz"
            log "Creating backup: $BACKUP_DIR/$backup_name"
            tar -czf "$BACKUP_DIR/$backup_name" -C "$(dirname "$WORLD_DIR")" "$(basename "$WORLD_DIR")"
            log "Backup complete: $(du -sh "$BACKUP_DIR/$backup_name" | cut -f1)"
        fi

        process_region_dir "$WORLD_DIR/region"   "overworld/region"
        process_region_dir "$WORLD_DIR/entities" "overworld/entities"
        process_region_dir "$WORLD_DIR/poi"      "overworld/poi"

        if [[ "$RESET_NETHER" == "true" && -d "$WORLD_DIR/DIM-1" ]]; then
            if [[ "$DRY_RUN" == "true" ]]; then
                log "nether: DELETE (dry-run) entire DIM-1/"
            else
                rm -rf "$WORLD_DIR/DIM-1"
                log "nether: DELETED entire DIM-1/"
            fi
        fi

        if [[ "$RESET_END" == "true" && -d "$WORLD_DIR/DIM1" ]]; then
            if [[ "$DRY_RUN" == "true" ]]; then
                log "end: DELETE (dry-run) entire DIM1/"
            else
                rm -rf "$WORLD_DIR/DIM1"
                log "end: DELETED entire DIM1/"
            fi
        fi

        if [[ "$RESET_PLAYERDATA" == "true" ]]; then
            for subdir in playerdata stats advancements; do
                if [[ -d "$WORLD_DIR/$subdir" ]]; then
                    if [[ "$DRY_RUN" == "true" ]]; then
                        log "playerdata: DELETE (dry-run) $subdir/"
                    else
                        rm -rf "$WORLD_DIR/$subdir"
                        log "playerdata: DELETED $subdir/"
                    fi
                fi
            done
        fi

        log "=== Map rotation complete ==="
        if [[ "$DRY_RUN" == "true" ]]; then
            log "This was a DRY RUN — no files were modified."
        fi
