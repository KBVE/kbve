# Project the kilobase-owned Supabase service-role JWT into arc-runners
# so the mc_auth bridge inside each Agones fleet pod can authenticate
# against the self-hosted PostgREST (Kong → PostgREST → mc.* RPCs).
#
# Single source of truth: the JWT lives exactly once, in
# kilobase/supabase-jwt (field: service-key), the same secret every
# other Supabase component in the kilobase stack already reads from.
# This file does not create a copy — it just teaches the existing
# external-secrets controller to project the value into arc-runners
# under a new key name that fleet.yaml consumes.
#
# When the JWT rotates in the kilobase stack, this pipeline auto-
# refreshes within `refreshInterval` (15m). Fleet pods still need a
# restart to pick up new env values because Kubernetes does not
# hot-reload secretKeyRef env vars into running containers.
#
# Cross-namespace wiring:
#   - Role + RoleBinding in the kilobase namespace whitelist the
#     `supabase-jwt` secret for a ServiceAccount living in arc-runners.
#   - SecretStore in arc-runners uses that ServiceAccount to read from
#     the kilobase namespace via the in-cluster Kubernetes API.
#   - ExternalSecret in arc-runners reads the `service-key` field of
#     that secret and projects it into a new arc-runners Secret named
#     `mc-supabase-credentials` under the key `service-role-key`.

---
# RBAC: allow the agones-side ExternalSecrets ServiceAccount to read
# ONLY the supabase-jwt secret from the kilobase namespace. Narrowest
# possible grant — any other kilobase secret stays invisible.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: supabase-jwt-reader-for-agones
    namespace: kilobase
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['supabase-jwt']
      verbs: ['get', 'list', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: agones-read-supabase-jwt
    namespace: kilobase
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: supabase-jwt-reader-for-agones
subjects:
    - kind: ServiceAccount
      # Reuses the ServiceAccount already declared in gameserver-secrets.yaml
      # for the existing mc-rcon-password pipeline. One SA, two Roles in
      # two different namespaces — the ClusterRole approach was rejected
      # to keep the blast radius tight.
      name: agones-mc-external-secrets
      namespace: arc-runners
---
# SecretStore: second store pointing at the kilobase namespace. The
# existing `mc-secrets-store` in gameserver-secrets.yaml points at the
# `mc` namespace for rcon-password; we can't reuse it because the
# kubernetes provider's remoteNamespace is fixed per store.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: kilobase-supabase-jwt-store
    namespace: arc-runners
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: agones-mc-external-secrets
                    namespace: arc-runners
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: reads kilobase/supabase-jwt.service-key and projects
# it into arc-runners/mc-supabase-credentials.service-role-key.
# Refresh every 15m so a JWT rotation in kilobase lands on the next
# fleet restart within a reasonable window.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: mc-supabase-credentials
    namespace: arc-runners
spec:
    refreshInterval: 15m
    secretStoreRef:
        name: kilobase-supabase-jwt-store
        kind: SecretStore
    target:
        name: mc-supabase-credentials
        creationPolicy: Owner
    data:
        - secretKey: service-role-key
          remoteRef:
              key: supabase-jwt
              property: service-key
