# MC RCON password — SealedSecret placeholder
# Generate the actual sealed value with:
#   echo -n 'your-rcon-password' | \
#     kubectl create secret generic mc-gameserver-secrets \
#       --from-literal=rcon-password=/dev/stdin \
#       -n arc-runners --dry-run=client -o yaml | \
#     kubeseal --controller-name=sealed-secrets --controller-namespace=kube-system -o yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
    name: mc-gameserver-secrets
    namespace: arc-runners
    labels:
        app: mc-gameserver
        app.kubernetes.io/part-of: mc
spec:
    encryptedData:
        rcon-password: '<SEALED_VALUE>'
    template:
        metadata:
            name: mc-gameserver-secrets
            namespace: arc-runners
