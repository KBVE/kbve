# RBAC: allow agones-mc-external-secrets to read MC secrets from mc namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: mc-secrets-reader-for-agones
    namespace: mc
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames:
          - mc-rcon-password
          - mc-supabase-credentials
      verbs: ['get', 'list', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: agones-read-mc-secrets
    namespace: mc
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: mc-secrets-reader-for-agones
subjects:
    - kind: ServiceAccount
      name: agones-mc-external-secrets
      namespace: arc-runners
---
# ServiceAccount used by the SecretStore to read from mc namespace
apiVersion: v1
kind: ServiceAccount
metadata:
    name: agones-mc-external-secrets
    namespace: arc-runners
---
# SecretStore: reads secrets from mc namespace into arc-runners
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: mc-secrets-store
    namespace: arc-runners
spec:
    provider:
        kubernetes:
            remoteNamespace: mc
            auth:
                serviceAccount:
                    name: agones-mc-external-secrets
                    namespace: arc-runners
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# Sync mc-rcon-password from mc namespace into arc-runners as mc-gameserver-secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: mc-gameserver-secrets
    namespace: arc-runners
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: mc-secrets-store
        kind: SecretStore
    target:
        name: mc-gameserver-secrets
        creationPolicy: Owner
    data:
        - secretKey: rcon-password
          remoteRef:
              key: mc-rcon-password
              property: rcon-password
        # Supabase service-role credentials for the mc_auth bridge.
        # The raw secret lives in mc/mc-supabase-credentials and is created
        # manually (one-shot, out-of-band) so the key never lands in git.
        #
        # Self-hosted kilobase stack — supabase-url points at Kong inside
        # the cluster, NOT at supabase.com. Kong routes /rest/v1/rpc/*
        # through PostgREST with the db-schema headers that bevy_supa's
        # rpc_schema() helper sets.
        #
        #   kubectl create secret generic mc-supabase-credentials -n mc \
        #     --from-literal=supabase-url=http://kong.kilobase.svc.cluster.local:8000 \
        #     --from-literal=supabase-service-role-key=<service-role-jwt>
        #
        # Rotation: re-run the same command with --dry-run=client -o yaml | kubectl apply -f -
        # then force-sync with: kubectl annotate externalsecret mc-gameserver-secrets \
        #   -n arc-runners force-sync=$(date +%s) --overwrite
        # Fleet pods need to be restarted to pick up the new env values.
        - secretKey: supabase-url
          remoteRef:
              key: mc-supabase-credentials
              property: supabase-url
        - secretKey: supabase-service-role-key
          remoteRef:
              key: mc-supabase-credentials
              property: supabase-service-role-key
