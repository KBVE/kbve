apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: agones-mc
    namespace: argocd
    labels:
        app.kubernetes.io/part-of: mc
spec:
    project: default
    source:
        repoURL: https://github.com/kbve/kbve
        targetRevision: main
        path: apps/kube/agones/mc
    destination:
        server: https://kubernetes.default.svc
        namespace: arc-runners
    ignoreDifferences:
        # FleetAutoscaler manages replica count — ArgoCD should not fight it.
        - group: agones.dev
          kind: Fleet
          jsonPointers:
              - /spec/replicas
    syncPolicy:
        automated:
            prune: true
        syncOptions:
            - CreateNamespace=false
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
