apiVersion: apps/v1
kind: Deployment
metadata:
    name: mc-lobby
    namespace: arc-runners
    labels:
        app: mc-lobby
        app.kubernetes.io/part-of: mc
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
spec:
    replicas: 1
    selector:
        matchLabels:
            app: mc-lobby
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                app: mc-lobby
                app.kubernetes.io/part-of: mc
        spec:
            nodeSelector:
                node.kbve.com/type: dedicated-server
            containers:
                - name: mc-server
                  image: ghcr.io/kbve/mc-lobby:1.0.11
                  env:
                      - name: TYPE
                        value: PAPER
                      - name: VERSION
                        value: 1.21.11
                      - name: EULA
                        value: 'TRUE'
                      - name: MEMORY
                        value: 1G
                      - name: ENABLE_RCON
                        value: 'true'
                      - name: RCON_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: mc-gameserver-secrets
                                key: rcon-password
                      - name: MOTD
                        value: KBVE Lobby
                      - name: MAX_PLAYERS
                        value: '50'
                      - name: DIFFICULTY
                        value: peaceful
                      - name: VIEW_DISTANCE
                        value: '8'
                      - name: SIMULATION_DISTANCE
                        value: '4'
                      - name: SPAWN_PROTECTION
                        value: '16'
                      - name: ONLINE_MODE
                        value: 'false'
                      - name: SERVER_PORT
                        value: '25565'
                      - name: PAUSE_WHEN_EMPTY_SECONDS
                        value: '0'
                      - name: LEVEL_TYPE
                        value: minecraft:flat
                      - name: GENERATE_STRUCTURES
                        value: 'false'
                      - name: SPAWN_ANIMALS
                        value: 'false'
                      - name: SPAWN_MONSTERS
                        value: 'false'
                      - name: SPAWN_NPCS
                        value: 'false'
                      - name: ALLOW_NETHER
                        value: 'false'
                      - name: ALLOW_END
                        value: 'false'
                      - name: CFG_VELOCITY_ENABLED
                        value: 'true'
                      - name: CFG_VELOCITY_ONLINE_MODE
                        value: 'true'
                      - name: CFG_VELOCITY_SECRET
                        value: kbve-velocity-forwarding-secret-change-me
                      - name: MODRINTH_PROJECTS
                        value: luckperms,essentialsx:Oa9ZDzZq,essentialsx-spawn:RVbLg2Am,essentialsx-antibuild:gjXSrVNQ,worldedit,advanced-portals
                      - name: LUCKPERMS_MESSAGING_SERVICE
                        value: pluginmsg
                      - name: LUCKPERMS_STORAGE_METHOD
                        value: h2
                      - name: OPS
                        value: b1897cef-8c27-45cb-b7fd-af139291ed6e,7e7b3993-e79a-41a9-9b26-fe90997cc273
                      - name: EXISTING_OPS_FILE
                        value: SYNCHRONIZE
                  ports:
                      - name: minecraft
                        containerPort: 25565
                        protocol: TCP
                  resources:
                      requests:
                          memory: 1Gi
                          cpu: 250m
                      limits:
                          memory: 2Gi
                          cpu: '1'
                  volumeMounts:
                      - name: mc-lobby-data
                        mountPath: /data
                  readinessProbe:
                      tcpSocket:
                          port: 25565
                      initialDelaySeconds: 120
                      periodSeconds: 10
                      failureThreshold: 3
                  livenessProbe:
                      exec:
                          command:
                              - mc-health
                      initialDelaySeconds: 180
                      periodSeconds: 30
                      failureThreshold: 3
            volumes:
                - name: mc-lobby-data
                  persistentVolumeClaim:
                      claimName: mc-lobby-world
