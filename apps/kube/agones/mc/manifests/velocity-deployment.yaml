apiVersion: apps/v1
kind: Deployment
metadata:
    name: mc-velocity
    namespace: arc-runners
    labels:
        app: mc-velocity
        app.kubernetes.io/part-of: mc
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
    annotations:
        configmap.reloader.stakater.com/reload: mc-velocity-config
        secret.reloader.stakater.com/reload: mc-discord-relay
spec:
    replicas: 1
    selector:
        matchLabels:
            app: mc-velocity
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                app: mc-velocity
                app.kubernetes.io/part-of: mc
        spec:
            nodeSelector:
                node.kbve.com/type: dedicated-server
            containers:
                - name: velocity
                  image: ghcr.io/kbve/mc-velocity:1.1.12
                  env:
                      - name: TYPE
                        value: VELOCITY
                      - name: VELOCITY_VERSION
                        value: 3.4.0-SNAPSHOT
                      - name: MEMORY
                        value: 512M
                      - name: REPLACE_ENV_VARIABLES
                        value: 'true'
                      - name: PLUGINS
                        value: https://cdn.modrinth.com/data/Vebnzrzj/versions/GZjsuCmU/LuckPerms-Velocity-5.5.17.jar
                      - name: LUCKPERMS_MESSAGING_SERVICE
                        value: pluginmsg
                      - name: LUCKPERMS_STORAGE_METHOD
                        value: h2
                      - name: DISCORD_BOT_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: mc-discord-relay
                                key: DISCORD_BOT_TOKEN
                  ports:
                      - name: minecraft
                        containerPort: 25565
                        hostPort: 25565
                        protocol: TCP
                  resources:
                      requests:
                          memory: 512Mi
                          cpu: 250m
                      limits:
                          memory: 1Gi
                          cpu: 500m
                  volumeMounts:
                      - name: velocity-config
                        mountPath: /config/velocity.toml
                        subPath: velocity.toml
                      - name: velocity-config
                        mountPath: /config/forwarding.secret
                        subPath: forwarding.secret
                  livenessProbe:
                      tcpSocket:
                          port: 25565
                      initialDelaySeconds: 30
                      periodSeconds: 30
                      failureThreshold: 5
                  readinessProbe:
                      tcpSocket:
                          port: 25565
                      initialDelaySeconds: 10
                      periodSeconds: 10
            volumes:
                - name: velocity-config
                  configMap:
                      name: mc-velocity-config
