apiVersion: v1
kind: ConfigMap
metadata:
    name: mc-map-rotation-script
    namespace: arc-runners
    labels:
        app.kubernetes.io/part-of: mc
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
data:
    map-rotation.sh:
        "#!/usr/bin/env bash\nset -euo pipefail\n\nWORLD_DIR=\"${WORLD_DIR:-/data/world}\"\
        \nBACKUP_DIR=\"${BACKUP_DIR:-/data/backups}\"\nCENTER_X=\"${CENTER_X:-0}\"\nCENTER_Z=\"\
        ${CENTER_Z:-0}\"\nPROTECT_RADIUS=\"${PROTECT_RADIUS:-512}\"\nRESET_NETHER=\"${RESET_NETHER:-true}\"\
        \nRESET_END=\"${RESET_END:-true}\"\nRESET_PLAYERDATA=\"${RESET_PLAYERDATA:-false}\"\
        \nDRY_RUN=\"${DRY_RUN:-false}\"\n\nlog() { echo \"[map-rotation] $(date -u +%H:%M:%S)\
        \ $*\"; }\n\nfloor_div() {\n    local num=$1 div=$2\n    if (( num >= 0 )); then\n\
        \        echo $(( num / div ))\n    else\n        echo $(( (num - div + 1) / div\
        \ ))\n    fi\n}\n\nregion_is_protected() {\n    local rx=$1 rz=$2\n    local region_min_x=$((\
        \ rx * 512 ))\n    local region_max_x=$(( rx * 512 + 511 ))\n    local region_min_z=$((\
        \ rz * 512 ))\n    local region_max_z=$(( rz * 512 + 511 ))\n    local protect_min_x=$((\
        \ CENTER_X - PROTECT_RADIUS ))\n    local protect_max_x=$(( CENTER_X + PROTECT_RADIUS\
        \ ))\n    local protect_min_z=$(( CENTER_Z - PROTECT_RADIUS ))\n    local protect_max_z=$((\
        \ CENTER_Z + PROTECT_RADIUS ))\n    if (( region_max_x < protect_min_x || region_min_x\
        \ > protect_max_x )); then\n        return 1\n    fi\n    if (( region_max_z <\
        \ protect_min_z || region_min_z > protect_max_z )); then\n        return 1\n \
        \   fi\n    return 0\n}\n\nprocess_region_dir() {\n    local dir=$1 label=$2\n\
        \    local kept=0 deleted=0\n    if [[ ! -d \"$dir\" ]]; then\n        log \"\
        $label: directory not found, skipping\"\n        return\n    fi\n    for f in\
        \ \"$dir\"/r.*.*.mca; do\n        [[ -f \"$f\" ]] || continue\n        local basename\n\
        \        basename=$(basename \"$f\")\n        local rx rz stripped\n        stripped=\"\
        ${basename#r.}\"\n        stripped=\"${stripped%.mca}\"\n        rx=\"${stripped%%.*}\"\
        \n        rz=\"${stripped#*.}\"\n        if [[ -z \"$rx\" || -z \"$rz\" || \"\
        $rx\" == \"$rz\" && \"$stripped\" != \"$rx.$rz\" ]]; then\n            log \"\
        $label: skipping unparseable file: $basename\"\n            continue\n       \
        \ fi\n        if region_is_protected \"$rx\" \"$rz\"; then\n            log \"\
        $label: KEEP   $basename (region $rx,$rz)\"\n            (( kept++ )) || true\n\
        \        else\n            if [[ \"$DRY_RUN\" == \"true\" ]]; then\n         \
        \       log \"$label: DELETE (dry-run) $basename (region $rx,$rz)\"\n        \
        \    else\n                rm -f \"$f\"\n                log \"$label: DELETE\
        \ $basename (region $rx,$rz)\"\n            fi\n            (( deleted++ )) ||\
        \ true\n        fi\n    done\n    log \"$label: kept=$kept deleted=$deleted\"\n\
        }\n\nif [[ ! -d \"$WORLD_DIR\" ]]; then\n    log \"ERROR: world directory not\
        \ found: $WORLD_DIR\"\n    exit 1\nfi\n\nlog \"=== MC Map Rotation ===\"\nlog\
        \ \"World:           $WORLD_DIR\"\nlog \"Center:          ($CENTER_X, $CENTER_Z)\"\
        \nlog \"Protect radius:  $PROTECT_RADIUS blocks\"\nlog \"Reset nether:    $RESET_NETHER\"\
        \nlog \"Reset end:       $RESET_END\"\nlog \"Reset playerdata:$RESET_PLAYERDATA\"\
        \nlog \"Dry run:         $DRY_RUN\"\n\nmin_rx=$(floor_div $(( CENTER_X - PROTECT_RADIUS\
        \ )) 512)\nmax_rx=$(floor_div $(( CENTER_X + PROTECT_RADIUS )) 512)\nmin_rz=$(floor_div\
        \ $(( CENTER_Z - PROTECT_RADIUS )) 512)\nmax_rz=$(floor_div $(( CENTER_Z + PROTECT_RADIUS\
        \ )) 512)\nlog \"Protected regions: r.[$min_rx..$max_rx].[$min_rz..$max_rz].mca\"\
        \n\nif [[ \"$DRY_RUN\" != \"true\" ]]; then\n    mkdir -p \"$BACKUP_DIR\"\n  \
        \  backup_name=\"world-pre-rotation-$(date -u +%Y%m%d-%H%M%S).tar.gz\"\n    log\
        \ \"Creating backup: $BACKUP_DIR/$backup_name\"\n    tar -czf \"$BACKUP_DIR/$backup_name\"\
        \ -C \"$(dirname \"$WORLD_DIR\")\" \"$(basename \"$WORLD_DIR\")\"\n    log \"\
        Backup complete: $(du -sh \"$BACKUP_DIR/$backup_name\" | cut -f1)\"\nfi\n\nprocess_region_dir\
        \ \"$WORLD_DIR/region\"   \"overworld/region\"\nprocess_region_dir \"$WORLD_DIR/entities\"\
        \ \"overworld/entities\"\nprocess_region_dir \"$WORLD_DIR/poi\"      \"overworld/poi\"\
        \n\nif [[ \"$RESET_NETHER\" == \"true\" && -d \"$WORLD_DIR/DIM-1\" ]]; then\n\
        \    if [[ \"$DRY_RUN\" == \"true\" ]]; then\n        log \"nether: DELETE (dry-run)\
        \ entire DIM-1/\"\n    else\n        rm -rf \"$WORLD_DIR/DIM-1\"\n        log\
        \ \"nether: DELETED entire DIM-1/\"\n    fi\nfi\n\nif [[ \"$RESET_END\" == \"\
        true\" && -d \"$WORLD_DIR/DIM1\" ]]; then\n    if [[ \"$DRY_RUN\" == \"true\"\
        \ ]]; then\n        log \"end: DELETE (dry-run) entire DIM1/\"\n    else\n   \
        \     rm -rf \"$WORLD_DIR/DIM1\"\n        log \"end: DELETED entire DIM1/\"\n\
        \    fi\nfi\n\nif [[ \"$RESET_PLAYERDATA\" == \"true\" ]]; then\n    for subdir\
        \ in playerdata stats advancements; do\n        if [[ -d \"$WORLD_DIR/$subdir\"\
        \ ]]; then\n            if [[ \"$DRY_RUN\" == \"true\" ]]; then\n            \
        \    log \"playerdata: DELETE (dry-run) $subdir/\"\n            else\n       \
        \         rm -rf \"$WORLD_DIR/$subdir\"\n                log \"playerdata: DELETED\
        \ $subdir/\"\n            fi\n        fi\n    done\nfi\n\nlog \"=== Map rotation\
        \ complete ===\"\nif [[ \"$DRY_RUN\" == \"true\" ]]; then\n    log \"This was\
        \ a DRY RUN — no files were modified.\"\nfi\n"
