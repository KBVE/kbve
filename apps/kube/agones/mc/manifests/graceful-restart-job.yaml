apiVersion: batch/v1
kind: Job
metadata:
    name: mc-graceful-restart
    namespace: arc-runners
    annotations:
        argocd.argoproj.io/hook: PreSync
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
        argocd.argoproj.io/sync-wave: '1'
    labels:
        app.kubernetes.io/part-of: mc
        app.kubernetes.io/component: graceful-restart
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
spec:
    ttlSecondsAfterFinished: 3600
    backoffLimit: 0
    template:
        metadata:
            labels:
                app.kubernetes.io/part-of: mc
                app.kubernetes.io/component: graceful-restart
        spec:
            restartPolicy: Never
            containers:
                - name: rcon-restart
                  image: alpine:3.20
                  command:
                      - sh
                      - -c
                  args:
                      - "set -eu\n\n# Install mcrcon (lightweight C RCON client)\napk add --no-cache\
                        \ gcc musl-dev git > /dev/null 2>&1\ngit clone --depth 1 https://github.com/Tiiffi/mcrcon.git\
                        \ /tmp/mcrcon\ngcc -std=gnu11 -pedantic -Wall -Wextra -O2 -s \\\n    -o\
                        \ /usr/local/bin/mcrcon /tmp/mcrcon/mcrcon.c\nrm -rf /tmp/mcrcon\n\n# Resolve\
                        \ target — find any running mc-gameserver pod\n# via DNS. If none are running,\
                        \ exit cleanly.\nRCON_HOST=\"${RCON_HOST:-mc-fabric-rcon.arc-runners.svc.cluster.local}\"\
                        \nRCON_PORT=\"${RCON_PORT:-25575}\"\n\nrcon() {\n    mcrcon -H \"$RCON_HOST\"\
                        \ -P \"$RCON_PORT\" -p \"$RCON_PASSWORD\" \"$@\" 2>/dev/null\n}\n\n# Test\
                        \ connectivity — if no server is running, skip gracefully\nif ! rcon \"\
                        list\" > /dev/null 2>&1; then\n    echo \"No MC server reachable on $RCON_HOST:$RCON_PORT\
                        \ — skipping graceful restart.\"\n    exit 0\nfi\n\necho \"Connected to\
                        \ MC server. Starting graceful restart sequence...\"\n\n# Phase 1: 30-second\
                        \ warning\nrcon 'tellraw @a {\"text\":\"[Server] \",\"color\":\"gold\",\"\
                        extra\":[{\"text\":\"Restarting for an update in 30 seconds...\",\"color\"\
                        :\"white\"}]}'\nrcon 'title @a times 10 70 20'\nrcon 'title @a title {\"\
                        text\":\"Server Update\",\"color\":\"gold\"}'\nrcon 'title @a subtitle {\"\
                        text\":\"Restarting in 30 seconds\",\"color\":\"white\"}'\necho \"Broadcast:\
                        \ 30 seconds\"\nsleep 20\n\n# Phase 2: 10-second warning\nrcon 'tellraw\
                        \ @a {\"text\":\"[Server] \",\"color\":\"gold\",\"extra\":[{\"text\":\"\
                        Restarting in 10 seconds!\",\"color\":\"red\"}]}'\nrcon 'title @a times\
                        \ 10 70 20'\nrcon 'title @a title {\"text\":\"Server Update\",\"color\"\
                        :\"red\"}'\nrcon 'title @a subtitle {\"text\":\"Restarting in 10 seconds!\"\
                        ,\"color\":\"white\"}'\necho \"Broadcast: 10 seconds\"\nsleep 10\n\n# Phase\
                        \ 3: Kick all players (Velocity routes them to lobby)\nrcon 'kick @a Server\
                        \ is restarting for an update. Returning to lobby...'\necho \"All players\
                        \ kicked. Graceful restart complete.\"\n"
                  env:
                      - name: RCON_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: mc-gameserver-secrets
                                key: rcon-password
                  resources:
                      requests:
                          memory: 32Mi
                          cpu: 50m
                      limits:
                          memory: 128Mi
                          cpu: 200m
