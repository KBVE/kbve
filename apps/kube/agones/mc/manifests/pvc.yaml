apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: mc-world-data
    namespace: arc-runners
    labels:
        app: mc-gameserver
        app.kubernetes.io/part-of: mc
        kbve.com/category: game-server
        kbve.com/stack: agones
        kbve.com/managed-by: argocd
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 10Gi
