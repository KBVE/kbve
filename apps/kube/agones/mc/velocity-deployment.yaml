# Velocity proxy deployment
# Receives all player connections on port 25565 and forwards them to
# the Agones-managed Fabric MC server pods.
apiVersion: apps/v1
kind: Deployment
metadata:
    name: mc-velocity
    namespace: arc-runners
    labels:
        app: mc-velocity
        app.kubernetes.io/part-of: mc
    annotations:
        # Stakater Reloader — auto rolling-restart when mc-velocity-config
        # ConfigMap changes (velocity.toml or forwarding.secret).
        configmap.reloader.stakater.com/reload: 'mc-velocity-config'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: mc-velocity
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    template:
        metadata:
            labels:
                app: mc-velocity
                app.kubernetes.io/part-of: mc
        spec:
            # Pin to the dedicated-server node so hostPort 25565 is
            # reachable on the same IP that mc.kbve.com resolves to.
            nodeSelector:
                node.kbve.com/type: dedicated-server
            containers:
                - name: velocity
                  image: itzg/bungeecord:latest
                  env:
                      - name: TYPE
                        value: VELOCITY
                      - name: VELOCITY_VERSION
                        value: '3.4.0-SNAPSHOT'
                      - name: MEMORY
                        value: '512M'
                      - name: REPLACE_ENV_VARIABLES
                        value: 'true'
                      # LuckPerms-Velocity — downloaded at container start via
                      # itzg's PLUGINS env var. Makes Velocity the authoritative
                      # owner of LuckPerms user data (keyed by the real online
                      # UUID from Mojang auth) and pushes updates to the backend
                      # LuckPerms-Fabric over the plugin-message channel. This
                      # fixes the pre-login UUID mismatch kick that was caused
                      # by FabricProxy-Lite swapping UUIDs after LuckPerms on
                      # the backend had already tried to pre-load user data.
                      # 5.5.17 is the latest Velocity release; 5.5.x versions
                      # share a stable plugin-messaging wire format so the
                      # 4-patch gap to Fabric 5.5.21 is safe.
                      - name: PLUGINS
                        value: 'https://cdn.modrinth.com/data/Vebnzrzj/versions/GZjsuCmU/LuckPerms-Velocity-5.5.17.jar'
                      # Matches the LuckPerms env vars on the Fabric fleet pod.
                      # EnvironmentVariableConfigAdapter overrides the on-disk
                      # luckperms.conf without touching the PVC.
                      - name: LUCKPERMS_MESSAGING_SERVICE
                        value: 'pluginmsg'
                      - name: LUCKPERMS_STORAGE_METHOD
                        value: 'h2'
                  ports:
                      # hostPort exposes Velocity directly on the node IP at
                      # the standard Minecraft port 25565. Bypasses Service /
                      # LoadBalancer / Gateway entirely. Players connect to
                      # the node's external IP (mc.kbve.com:25565).
                      - name: minecraft
                        containerPort: 25565
                        hostPort: 25565
                        protocol: TCP
                  resources:
                      requests:
                          memory: 512Mi
                          cpu: 250m
                      limits:
                          memory: 1Gi
                          cpu: 500m
                  volumeMounts:
                      - name: velocity-config
                        mountPath: /config/velocity.toml
                        subPath: velocity.toml
                      - name: velocity-config
                        mountPath: /config/forwarding.secret
                        subPath: forwarding.secret
                  livenessProbe:
                      tcpSocket:
                          port: 25565
                      initialDelaySeconds: 30
                      periodSeconds: 30
                      failureThreshold: 5
                  readinessProbe:
                      tcpSocket:
                          port: 25565
                      initialDelaySeconds: 10
                      periodSeconds: 10
            volumes:
                - name: velocity-config
                  configMap:
                      name: mc-velocity-config
