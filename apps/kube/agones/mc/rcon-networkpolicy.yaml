# NetworkPolicy for MC game servers (lobby + Fabric survival).
#
# Allows:
#   - Velocity proxy → game port 25565 (player traffic)
#   - Edge functions + MC pods → RCON port 25575 (admin commands)
#
# Without the game-traffic rule, Cilium's default-deny-on-policy
# blocks Velocity from reaching the backend servers on 25565.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: mc-rcon-ingress
    namespace: arc-runners
    labels:
        app.kubernetes.io/part-of: mc
spec:
    podSelector:
        matchExpressions:
            - key: app
              operator: In
              values:
                  - mc-lobby
                  - mc-gameserver
    policyTypes:
        - Ingress
    ingress:
        # Velocity proxy → game port (player traffic)
        - from:
              - podSelector:
                    matchLabels:
                        app: mc-velocity
          ports:
              - port: 25565
                protocol: TCP
        # Edge functions (kilobase namespace) → RCON
        - from:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: kilobase
                podSelector:
                    matchLabels:
                        app: functions
          ports:
              - port: 25575
                protocol: TCP
        # MC pods talking to each other → RCON
        - from:
              - podSelector:
                    matchExpressions:
                        - key: app
                          operator: In
                          values:
                              - mc-lobby
                              - mc-gameserver
          ports:
              - port: 25575
                protocol: TCP
