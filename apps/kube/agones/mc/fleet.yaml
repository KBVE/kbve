# MC Fabric Server Fleet — managed by Agones
# Spawns Fabric Minecraft server instances from the itzg/minecraft-server image.
# Fleet starts at 0 replicas — FleetAutoscaler or manual allocation spins up servers.
#
# Performance mods: c2me, vmp, lithium, ferritecore, servercore
# Gameplay mods: old-combat-mod (1.8-style combat)
# Chunk pre-gen: Chunky (run via RCON after first boot)
# Port: TCP 25565 (Agones Dynamic policy, mapped to host port range 7000-8000)
apiVersion: agones.dev/v1
kind: Fleet
metadata:
    name: mc-fabric
    namespace: arc-runners
    labels:
        app: mc-gameserver
        app.kubernetes.io/part-of: mc
spec:
    replicas: 0
    scheduling: Packed
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 25%
            maxUnavailable: 25%
    template:
        metadata:
            labels:
                app: mc-gameserver
                app.kubernetes.io/part-of: mc
        spec:
            ports:
                - name: mc
                  portPolicy: Dynamic
                  containerPort: 25565
                  protocol: TCP
            health:
                # Fabric + 8 mods + library unpacking takes ~3-4 minutes on cold start
                initialDelaySeconds: 240
                periodSeconds: 30
                failureThreshold: 10
            template:
                metadata:
                    labels:
                        # Pod-level label so the Velocity backend Service
                        # can select MC gameserver pods (Agones doesn't
                        # propagate Fleet template labels to pods).
                        app: mc-gameserver
                spec:
                    nodeSelector:
                        node.kbve.com/type: dedicated-server
                    # Force-sync FabricProxy-Lite.toml from the Docker image
                    # onto the PVC on every pod start. itzg's /config/ → /data/config/
                    # copy is first-boot-only, so any change to the template
                    # (like flipping hackEarlySend to true for the LuckPerms
                    # pre-login UUID fix) would otherwise be ignored by existing
                    # PVCs. This initContainer pulls the template from the same
                    # image the main container uses and overwrites the PVC copy
                    # so the Docker template is the single source of truth.
                    initContainers:
                        - name: sync-fabricproxy-config
                          image: ghcr.io/kbve/mc:1.0.8
                          command:
                              - sh
                              - -c
                              - |
                                  set -eu
                                  mkdir -p /data/config
                                  cp /config/FabricProxy-Lite.toml /data/config/FabricProxy-Lite.toml
                                  echo "synced FabricProxy-Lite.toml from image template"
                          volumeMounts:
                              - name: mc-data
                                mountPath: /data
                    containers:
                        - name: mc-server
                          image: ghcr.io/kbve/mc:1.0.8
                          env:
                              - name: TYPE
                                value: FABRIC
                              - name: VERSION
                                value: '1.21.11'
                              - name: EULA
                                value: 'TRUE'
                              - name: MEMORY
                                value: '3G'
                              - name: ENABLE_RCON
                                value: 'true'
                              - name: RCON_PASSWORD
                                valueFrom:
                                    secretKeyRef:
                                        name: mc-gameserver-secrets
                                        key: rcon-password
                              - name: MOTD
                                value: 'KBVE Minecraft Server'
                              - name: MAX_PLAYERS
                                value: '50'
                              - name: DIFFICULTY
                                value: 'normal'
                              - name: VIEW_DISTANCE
                                value: '12'
                              - name: SIMULATION_DISTANCE
                                value: '8'
                              # Velocity proxy handles Mojang auth — backend
                              # must be offline-mode to accept forwarded sessions.
                              - name: ONLINE_MODE
                                value: 'false'
                              # Allow connections only from the Velocity proxy
                              # via the cluster network (private addresses).
                              - name: PREVENT_PROXY_CONNECTIONS
                                value: 'false'
                              - name: SERVER_PORT
                                value: '25565'
                          resources:
                              requests:
                                  memory: 2Gi
                                  cpu: '1'
                              limits:
                                  memory: 4Gi
                                  cpu: '2'
                          volumeMounts:
                              # Mount entire /data so Fabric libraries, mods,
                              # and world all persist across restarts
                              - name: mc-data
                                mountPath: /data
                    volumes:
                        - name: mc-data
                          persistentVolumeClaim:
                              claimName: mc-world-data
