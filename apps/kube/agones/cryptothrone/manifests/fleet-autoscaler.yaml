apiVersion: autoscaling.agones.dev/v1
kind: FleetAutoscaler
metadata:
    name: cryptothrone-server-autoscaler
    namespace: cryptothrone
    labels:
        app: cryptothrone-server
        app.kubernetes.io/part-of: cryptothrone
spec:
    fleetName: cryptothrone-server
    policy:
        type: Buffer
        buffer:
            bufferSize: 1
            minReplicas: 0
            maxReplicas: 20
    sync:
        type: FixedInterval
        fixedInterval:
            seconds: 30
