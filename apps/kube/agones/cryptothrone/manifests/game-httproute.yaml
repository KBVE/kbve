apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: cryptothrone-game-route
    namespace: cryptothrone
    labels:
        app.kubernetes.io/part-of: cryptothrone
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - game.cryptothrone.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          timeouts:
              # Long-lived WebSocket — override Envoy's ~15s default backend
              # timeout so wss connections survive (matches kbve /ws rule).
              backendRequest: 3600s
          backendRefs:
              - name: cryptothrone-game
                port: 7979
