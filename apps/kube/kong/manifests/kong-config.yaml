apiVersion: v1
kind: ConfigMap
metadata:
    name: kong-config
    namespace: kilobase
    labels:
        kbve.com/category: networking
        kbve.com/stack: core
        kbve.com/managed-by: argocd
data:
    kong.yml:
        "_format_version: '2.1'\n_transform: true\n\n###\n### Global Plugins\n\
        ###\nplugins:\n  - name: cors\n    config:\n      origins:\n        - https://([a-z0-9-]+\\\
        .)?discord\\.sh\n        - https://([a-z0-9-]+\\.)?meme\\.sh\n        - https://([a-z0-9-]+\\\
        .)?kbve\\.com\n        - https://([a-z0-9-]+\\.)?chuckrpg\\.com\n        - https://([a-z0-9-]+\\\
        .)?cryptothrone\\.com\n        - http://localhost:4321\n        - http://localhost:3000\n\
        \        - http://localhost:3333\n      methods:\n        - GET\n        - POST\n\
        \        - PUT\n        - DELETE\n        - OPTIONS\n        - PATCH\n       \
        \ - HEAD\n      headers:\n        - Accept\n        - Accept-Version\n       \
        \ - Accept-Profile\n        - Content-Profile\n        - Authorization\n     \
        \   - Content-Length\n        - Content-MD5\n        - Content-Type\n        -\
        \ Date\n        - Origin\n        - User-Agent\n        - X-Auth-Token\n     \
        \   - X-Requested-With\n        - x-client-info\n        - x-supabase-api-version\n\
        \        - apikey\n        - DNT\n        - Cache-Control\n        - X-Mx-ReqToken\n\
        \        - Keep-Alive\n        - If-Modified-Since\n        - Range\n      exposed_headers:\n\
        \        - \"*\"\n      credentials: true\n      max_age: 86400\n      preflight_continue:\
        \ false\n\n###\n### Consumers / Users\n###\nconsumers:\n  - username: anon\n    keyauth_credentials:\n      - key: ${anon_key}\n  - username:\
        \ service_role\n    keyauth_credentials:\n      - key: ${service_key}\n\n###\n\
        ### Access Control List\n###\nacls:\n  - consumer: anon\n    group: anon\n  -\
        \ consumer: service_role\n    group: admin\n\n###\n### API Routes\n###\nservices:\n  ## Open Auth\
        \ routes\n  - name: auth-v1-open\n    url: http://auth:9999/verify\n    routes:\n\
        \      - name: auth-v1-open\n        strip_path: true\n        paths:\n      \
        \    - /auth/v1/verify\n  - name: auth-v1-open-callback\n    url: http://auth:9999/callback\n\
        \    routes:\n      - name: auth-v1-open-callback\n        strip_path: true\n\
        \        paths:\n          - /auth/v1/callback\n  - name: auth-v1-open-authorize\n\
        \    url: http://auth:9999/authorize\n    routes:\n      - name: auth-v1-open-authorize\n\
        \        strip_path: true\n        paths:\n          - /auth/v1/authorize\n\n  - name: auth-v1-open-oidc-discovery\n    _comment: 'OIDC discovery — public, no apikey'\n    url: http://auth:9999/.well-known/openid-configuration\n    routes:\n      - name: auth-v1-open-oidc-discovery\n        strip_path: true\n        paths:\n          - /auth/v1/.well-known/openid-configuration\n  - name: auth-v1-open-oidc-asmeta\n    url: http://auth:9999/.well-known/oauth-authorization-server\n    routes:\n      - name: auth-v1-open-oidc-asmeta\n        strip_path: true\n        paths:\n          - /auth/v1/.well-known/oauth-authorization-server\n  - name: auth-v1-open-oidc-jwks\n    url: http://auth:9999/.well-known/jwks.json\n    routes:\n      - name: auth-v1-open-oidc-jwks\n        strip_path: true\n        paths:\n          - /auth/v1/.well-known/jwks.json\n  - name: auth-v1-open-oauth\n    _comment: 'OAuth2 server: authorize/token/userinfo/register — public, no apikey'\n    url: http://auth:9999/oauth\n    routes:\n      - name: auth-v1-open-oauth\n        strip_path: true\n        paths:\n          - /auth/v1/oauth\n\n  ## Secure Auth routes\n  - name: auth-v1\n    _comment: 'GoTrue: /auth/v1/*\
        \ -> http://auth:9999/*'\n    url: http://auth:9999/\n    routes:\n      - name:\
        \ auth-v1-all\n        strip_path: true\n        paths:\n          - /auth/v1/\n\
        \    plugins:\n      - name: key-auth\n        config:\n          hide_credentials:\
        \ false\n          run_on_preflight: false\n      - name: acl\n        config:\n\
        \          hide_groups_header: true\n          allow:\n            - admin\n \
        \           - anon\n\n  ## Secure REST routes\n  - name: rest-v1\n    _comment:\
        \ 'PostgREST: /rest/v1/* -> http://rest:3000/*'\n    url: http://rest:3000/\n\
        \    routes:\n      - name: rest-v1-all\n        strip_path: true\n        paths:\n\
        \          - /rest/v1/\n    plugins:\n      - name: key-auth\n        config:\n\
        \          hide_credentials: true\n          run_on_preflight: false\n      -\
        \ name: acl\n        config:\n          hide_groups_header: true\n          allow:\n\
        \            - admin\n            - anon\n\n  ## Secure GraphQL routes\n  - name:\
        \ graphql-v1\n    _comment: 'PostgREST: /graphql/v1/* -> http://rest:3000/rpc/graphql'\n\
        \    url: http://rest:3000/rpc/graphql\n    routes:\n      - name: graphql-v1-all\n\
        \        strip_path: true\n        paths:\n          - /graphql/v1\n    plugins:\n\
        \      - name: key-auth\n        config:\n          hide_credentials: true\n \
        \         run_on_preflight: false\n      - name: request-transformer\n       \
        \ config:\n          add:\n            headers:\n              - Content-Profile:graphql_public\n\
        \      - name: acl\n        config:\n          hide_groups_header: true\n    \
        \      allow:\n            - admin\n            - anon\n\n  ## Secure Realtime\
        \ routes\n  - name: realtime-v1-ws\n    _comment: 'Realtime: /realtime/v1/* ->\
        \ ws://realtime:4000/socket/*'\n    url: http://realtime-prod:4000/socket\n  \
        \  protocol: ws\n    routes:\n      - name: realtime-v1-ws\n        strip_path:\
        \ true\n        paths:\n          - /realtime/v1/\n    plugins:\n      - name:\
        \ key-auth\n        config:\n          hide_credentials: false\n          run_on_preflight:\
        \ false\n          \n      - name: acl\n        config:\n          hide_groups_header:\
        \ true\n          allow:\n            - admin\n            - anon\n  - name: realtime-v1-rest\n\
        \    _comment: 'Realtime: /realtime/v1/api/* -> http://realtime:4000/api/*'\n\
        \    url: http://realtime-prod:4000/api\n    protocol: http\n    routes:\n   \
        \   - name: realtime-v1-rest\n        strip_path: true\n        paths:\n     \
        \     - /realtime/v1/api\n    plugins:\n      - name: key-auth\n        config:\n\
        \          hide_credentials: false\n          run_on_preflight: false\n      -\
        \ name: acl\n        config:\n          hide_groups_header: true\n          allow:\n\
        \            - admin\n            - anon\n\n  ## Storage routes: the storage server\
        \ manages its own auth\n  - name: storage-v1\n    _comment: 'Storage: /storage/v1/*\
        \ -> http://storage:5000/*'\n    url: http://storage:5000/\n    routes:\n    \
        \  - name: storage-v1-all\n        strip_path: true\n        paths:\n        \
        \  - /storage/v1/\n\n  ## Edge Functions routes\n  - name: functions-v1\n    _comment:\
        \ 'Edge Functions: /functions/v1/* -> http://functions:9000/*'\n    url: http://functions:9000/\n\
        \    routes:\n      - name: functions-v1-all\n        strip_path: true\n     \
        \   paths:\n          - /functions/v1/\n\n  ## Secure\
        \ Database routes\n  - name: meta\n    _comment: 'pg-meta: /pg/* -> http://meta:8080/*'\n\
        \    url: http://meta:8080/\n    routes:\n      - name: meta-all\n        strip_path:\
        \ true\n        paths:\n          - /pg/\n    plugins:\n      - name: key-auth\n\
        \        config:\n          hide_credentials: false\n          run_on_preflight:\
        \ false\n      - name: acl\n        config:\n          hide_groups_header: true\n\
        \          allow:\n            - admin\n\n  ## Protected Dashboard - catch all\
        \ remaining routes\n  - name: dashboard\n    _comment: 'Studio: /* -> studio-gate (kbve-gate JWT is_staff) -> http://studio:3000/*'\n\
        \    url: http://studio-gate:5678/\n    routes:\n      - name: dashboard-all\n    \
        \    strip_path: true\n        preserve_host: true\n        paths:\n          - /\n"
