apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: discordsh-bot-redis-store
    namespace: discordsh-bot
spec:
    provider:
        kubernetes:
            remoteNamespace: redis
            server:
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
            auth:
                serviceAccount:
                    name: discordsh-bot-external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: discordsh-bot-supabase-store
    namespace: discordsh-bot
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            server:
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
            auth:
                serviceAccount:
                    name: discordsh-bot-external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: discordsh-bot-redis
    namespace: discordsh-bot
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: discordsh-bot-redis-store
        kind: SecretStore
    target:
        name: discordsh-bot-redis
    data:
        - secretKey: redis-password
          remoteRef:
              key: redis
              property: redis-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: discordsh-bot-supabase
    namespace: discordsh-bot
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: discordsh-bot-supabase-store
        kind: SecretStore
    target:
        name: discordsh-bot-supabase
    data:
        - secretKey: service-role-key
          remoteRef:
              key: supabase-service-role
              property: service-role-key
