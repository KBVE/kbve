apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: discordsh-bot
    namespace: argocd
spec:
    project: default
    source:
        repoURL: https://github.com/KBVE/kbve
        targetRevision: HEAD
        path: apps/kube/discordsh-bot/manifest
    destination:
        server: https://kubernetes.default.svc
        namespace: discordsh-bot
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - PrunePropagationPolicy=foreground
            - PruneLast=true
        retry:
            limit: 5
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
