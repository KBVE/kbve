apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: letsencrypt-dns
spec:
    acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: cert@kbve.com
        privateKeySecretRef:
            name: letsencrypt-dns-private-key
        solvers:
            - selector:
                  dnsZones:
                      - kbve.com
              dns01:
                  cloudflare:
                      apiTokenSecretRef:
                          name: cloudflare-api-token-secret
                          key: api-token
