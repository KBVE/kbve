apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: letsencrypt-http
spec:
    acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: cert@kbve.com
        privateKeySecretRef:
            name: letsencrypt-http-private-key
        solvers:
            # All solvers use the Cilium kbve-gateway HTTP listener for
            # ACME HTTP-01 challenges. ingress-nginx was removed in
            # PR #11551; the old nginx solver template silently created
            # Ingress resources that no controller picked up, so every
            # cert that hit a renewal afterwards landed back on the
            # placeholder "Kubernetes Ingress Controller Fake Certificate"
            # — which is what Cloudflare 526 on cryptothrone.com surfaced.

            # --- Solver 1: KBVE.COM domains ---
            - selector:
                  dnsZones:
                      - kbve.com
              http01:
                  gatewayHTTPRoute:
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            group: gateway.networking.k8s.io

            # --- Solver 2: DISCORD.SH domains ---
            - selector:
                  dnsZones:
                      - discord.sh
              http01:
                  gatewayHTTPRoute:
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            group: gateway.networking.k8s.io

            # --- Solver 3: HERBMAIL.COM domains ---
            - selector:
                  dnsZones:
                      - herbmail.com
              http01:
                  gatewayHTTPRoute:
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            group: gateway.networking.k8s.io

            # --- Solver 4: MEME.SH domains ---
            - selector:
                  dnsZones:
                      - meme.sh
              http01:
                  gatewayHTTPRoute:
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            group: gateway.networking.k8s.io

            # --- Solver 5: CRYPTOTHRONE.COM domains ---
            - selector:
                  dnsZones:
                      - cryptothrone.com
              http01:
                  gatewayHTTPRoute:
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            group: gateway.networking.k8s.io

            # --- Solver 6: CHUCKRPG.COM domains ---
            - selector:
                  dnsZones:
                      - chuckrpg.com
              http01:
                  gatewayHTTPRoute:
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            group: gateway.networking.k8s.io

            # --- Solver 7: RAREICON.COM domains ---
            - selector:
                  dnsZones:
                      - rareicon.com
              http01:
                  gatewayHTTPRoute:
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            group: gateway.networking.k8s.io

            # --- Solver 8: CITYVOTE.COM domains ---
            - selector:
                  dnsZones:
                      - cityvote.com
              http01:
                  gatewayHTTPRoute:
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            group: gateway.networking.k8s.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: selfsigned-issuer
spec:
    selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: internal-ca-issuer
spec:
    ca:
        secretName: internal-ca-key-pair
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: internal-ca
    namespace: cert-manager
spec:
    isCA: true
    commonName: internal-ca
    secretName: internal-ca-key-pair
    privateKey:
        algorithm: ECDSA
        size: 256
    issuerRef:
        name: selfsigned-issuer
        kind: ClusterIssuer
        group: cert-manager.io
