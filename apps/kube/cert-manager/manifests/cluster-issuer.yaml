apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: letsencrypt-http
spec:
    acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: cert@kbve.com
        privateKeySecretRef:
            name: letsencrypt-http-private-key
        solvers:
            # --- Solver 1: KBVE.COM domains ---
            - selector:
                  dnsZones:
                      - kbve.com
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 2: DISCORD.SH domains ---
            - selector:
                  dnsZones:
                      - discord.sh
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 3: HERBMAIL.COM domains ---
            - selector:
                  dnsZones:
                      - herbmail.com
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 4: MEME.SH domains ---
            # Migrated to Cilium Gateway HTTPRoute solver post-Phase-2 cutover.
            # meme.sh CNAME -> gateway.kbve.com (.71); nginx no longer serves it.
            - selector:
                  dnsZones:
                      - meme.sh
              http01:
                  gatewayHTTPRoute:
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            group: gateway.networking.k8s.io

            # --- Solver 5: CRYPTOTHRONE.COM domains ---
            - selector:
                  dnsZones:
                      - cryptothrone.com
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 6: CHUCKRPG.COM domains ---
            # Stays on the nginx solver until the Cilium gateway VIP (.71)
            # is reachable from Let's Encrypt; until then nginx-on-.74 is
            # the only path that completes HTTP-01.
            - selector:
                  dnsZones:
                      - chuckrpg.com
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 7: RAREICON.COM domains ---
            # Stays on the nginx solver until the Cilium gateway VIP (.71)
            # is reachable from Let's Encrypt; until then nginx-on-.74 is
            # the only path that completes HTTP-01.
            - selector:
                  dnsZones:
                      - rareicon.com
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: selfsigned-issuer
spec:
    selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: internal-ca-issuer
spec:
    ca:
        secretName: internal-ca-key-pair
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: internal-ca
    namespace: cert-manager
spec:
    isCA: true
    commonName: internal-ca
    secretName: internal-ca-key-pair
    privateKey:
        algorithm: ECDSA
        size: 256
    issuerRef:
        name: selfsigned-issuer
        kind: ClusterIssuer
        group: cert-manager.io
