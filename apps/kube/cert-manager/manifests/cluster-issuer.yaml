apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: letsencrypt-http
spec:
    acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: cert@kbve.com
        privateKeySecretRef:
            name: letsencrypt-http-private-key
        solvers:
            # --- Solver 1: KBVE.COM domains ---
            - selector:
                  dnsZones:
                      - kbve.com
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 2: DISCORD.SH domains ---
            - selector:
                  dnsZones:
                      - discord.sh
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 3: HERBMAIL.COM domains ---
            - selector:
                  dnsZones:
                      - herbmail.com
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 4: MEME.SH domains ---
            - selector:
                  dnsZones:
                      - meme.sh
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 5: CRYPTOTHRONE.COM domains ---
            - selector:
                  dnsZones:
                      - cryptothrone.com
              http01:
                  ingress:
                      ingressClassName: nginx
                      ingressTemplate:
                          metadata:
                              annotations:
                                  cert-manager.io/http01-ingress-path-type: 'Prefix'

            # --- Solver 6: CHUCKRPG.COM domains (Cilium Gateway API) ---
            # Uses gatewayHTTPRoute solver — cert-manager creates an HTTPRoute
            # that attaches to the HTTP listener on the Cilium-managed gateway.
            # sectionName: http ensures the route binds to port 80 (not HTTPS).
            - selector:
                  dnsZones:
                      - chuckrpg.com
              http01:
                  gatewayHTTPRoute:
                      serviceType: ClusterIP
                      parentRefs:
                          - name: kbve-gateway
                            namespace: kbve
                            kind: Gateway
                            sectionName: http
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: letsencrypt-dns
spec:
    acme:
        email: cert@kbve.com
        server: https://acme-v02.api.letsencrypt.org/directory
        privateKeySecretRef:
            name: letsencrypt-dns-account-key
        solvers:
            - selector:
                  dnsZones:
                      - kbve.com
              dns01:
                  cloudflare:
                      apiTokenSecretRef:
                          name: cloudflare-api-token-secret
                          key: api-token

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: selfsigned-issuer
spec:
    selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: internal-ca-issuer
spec:
    ca:
        secretName: internal-ca-key-pair
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: internal-ca
    namespace: cert-manager
spec:
    isCA: true
    commonName: internal-ca
    secretName: internal-ca-key-pair
    privateKey:
        algorithm: ECDSA
        size: 256
    issuerRef:
        name: selfsigned-issuer
        kind: ClusterIssuer
        group: cert-manager.io
