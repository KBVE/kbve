apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: cryptothrone-ingress
    namespace: cryptothrone
    annotations:
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/rewrite-target: /
spec:
    rules:
        - host: cryptothrone.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: cryptothrone-service
                            port:
                                number: 4321
