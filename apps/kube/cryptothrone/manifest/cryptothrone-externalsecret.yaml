# SecretStore + ExternalSecret rendering supabase-shared in the
# cryptothrone namespace. Mirrors the herbmail / memes / rentearth
# pattern: the SecretStore authenticates as
# cryptothrone-external-secrets and reads the supabase-jwt and
# supabase-postgres source secrets in kilobase, then composes them
# into a single supabase-shared Secret with the env-var keys this
# Deployment expects.
#
# Activation requires cryptothrone-external-secrets to appear in the
# kilobase-secrets-reader-for-discord RoleBinding subjects list in
# apps/kube/kilobase/manifests/cross-namespace-rbac.yaml. Until that
# binding lands the ExternalSecret will fail to render and the
# Deployment's envFrom secretRef stays optional — the pod still boots,
# it just runs without the Supabase env block.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: kilobase-remote-secret-store
    namespace: cryptothrone
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: cryptothrone-external-secrets
                    namespace: cryptothrone
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: cryptothrone-supabase-secrets
    namespace: cryptothrone
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: supabase-shared
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                SUPABASE_URL: 'http://kong.kilobase.svc.cluster.local:8000'
                SUPABASE_ANON_KEY: '{{ .anonkey }}'
                SUPABASE_SERVICE_ROLE_KEY: '{{ .servicekey }}'
                SUPABASE_JWT_SECRET: '{{ .jwtsecret }}'
                DATABASE_URL: 'postgres://postgres:{{ .dbpassword }}@supabase-cluster-rw.kilobase.svc.cluster.local:5432/supabase'
    data:
        - secretKey: jwtsecret
          remoteRef:
              key: supabase-jwt
              property: secret
        - secretKey: anonkey
          remoteRef:
              key: supabase-jwt
              property: anon-key
        - secretKey: servicekey
          remoteRef:
              key: supabase-jwt
              property: service-key
        - secretKey: dbpassword
          remoteRef:
              key: supabase-postgres
              property: password
