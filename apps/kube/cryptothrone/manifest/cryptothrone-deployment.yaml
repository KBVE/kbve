apiVersion: apps/v1
kind: Deployment
metadata:
    name: cryptothrone-deployment
    namespace: cryptothrone
    labels:
        app: cryptothrone
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: cryptothrone
    template:
        metadata:
            labels:
                app: cryptothrone
                version: 0.1.0
        spec:
            serviceAccountName: cryptothrone-sa
            automountServiceAccountToken: true
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: cryptothrone
                  image: ghcr.io/kbve/cryptothrone:0.1.51
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 4321
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  env:
                      - name: HTTP_PORT
                        value: '4321'
                      - name: CT_AGONES_NAMESPACE
                        value: cryptothrone
                      - name: CT_AGONES_FLEET
                        value: cryptothrone-server
                      - name: KBVE_PG_APPLICATION_NAME
                        value: axum-cryptothrone
                      - name: GOTRUE_INTERNAL_URL
                        value: http://auth.kilobase.svc.cluster.local:9999
                  envFrom:
                      - secretRef:
                            name: supabase-shared
                            optional: true
                      - secretRef:
                            name: cryptothrone-valkey
                            optional: true
                      - secretRef:
                            name: cryptothrone-discord
                            optional: true
                  resources:
                      requests:
                          memory: 256Mi
                          cpu: 500m
                      limits:
                          memory: 512Mi
                          cpu: 2000m
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
            volumes:
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
    name: cryptothrone-service
    namespace: cryptothrone
    labels:
        app: cryptothrone
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: cryptothrone
    ports:
        - port: 4321
          targetPort: 4321
          protocol: TCP
