apiVersion: apps/v1
kind: Deployment
metadata:
    name: cryptothrone-deployment
    namespace: cryptothrone
    labels:
        app: cryptothrone
    annotations:
        # Reloader rolls this Deployment whenever the supabase-shared
        # Secret (rendered by cryptothrone-supabase-secrets ExternalSecret)
        # rotates. Today the deployment only consumes HTTP_PORT, but the
        # envFrom + secretRef block is wired now so future KBVE / Supabase
        # integration adds become a Secret edit, not a manifest rewrite.
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: cryptothrone
    template:
        metadata:
            labels:
                app: cryptothrone
                version: '0.1.0'
        spec:
            serviceAccountName: cryptothrone-sa
            automountServiceAccountToken: true
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: cryptothrone
                  image: ghcr.io/kbve/cryptothrone:0.1.45
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 4321
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  env:
                      - name: HTTP_PORT
                        value: '4321'
                      - name: CT_AGONES_NAMESPACE
                        value: 'cryptothrone'
                      - name: CT_AGONES_FLEET
                        value: 'cryptothrone-server'
                      # jedi PgCluster pool identity (KBVE_PG_RW_URL / RO_URL
                      # arrive via the supabase-shared envFrom below).
                      - name: KBVE_PG_APPLICATION_NAME
                        value: 'axum-cryptothrone'
                      # GoTrue admin (fast-register) talks to the auth service
                      # directly, bypassing Kong's /auth/v1/admin gateway ACL.
                      - name: GOTRUE_INTERNAL_URL
                        value: 'http://auth.kilobase.svc.cluster.local:9999'
                  envFrom:
                      # Optional so the pod still boots before the
                      # ExternalSecret has rendered or the kilobase
                      # RBAC has been wired. Once supabase-shared
                      # exists Reloader rolls the Deployment automatically.
                      - secretRef:
                            name: supabase-shared
                            optional: true
                      # KBVE_KV_URL (jedi KvCache → Valkey). Optional for the
                      # same boot-before-render reason.
                      - secretRef:
                            name: cryptothrone-valkey
                            optional: true
                      # DISCORD_CLIENT_ID + DISCORD_CLIENT_SECRET for the
                      # /api/discord/session OAuth bridge (SealedSecret).
                      # Optional so the pod boots before it is applied.
                      - secretRef:
                            name: cryptothrone-discord
                            optional: true
                  resources:
                      requests:
                          memory: '256Mi'
                          cpu: '500m'
                      limits:
                          memory: '512Mi'
                          cpu: '2000m'
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
            volumes:
                # Writable scratch for the axum binary while the rootfs
                # itself stays read-only.
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
    name: cryptothrone-service
    namespace: cryptothrone
    labels:
        app: cryptothrone
spec:
    type: ClusterIP
    selector:
        app: cryptothrone
    ports:
        - port: 4321
          targetPort: 4321
          protocol: TCP
