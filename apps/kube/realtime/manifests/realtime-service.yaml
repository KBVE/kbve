apiVersion: v1
kind: Service
metadata:
    name: realtime-prod
    namespace: kilobase
    labels:
        app: realtime-prod
        component: websocket
        kbve.com/category: application
        kbve.com/stack: supabase
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    ports:
        - port: 4000
          targetPort: 4000
          protocol: TCP
          name: http
    selector:
        app: realtime-prod
