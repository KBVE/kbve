apiVersion: v1
kind: Service
metadata:
    name: realtime-prod-headless
    namespace: kilobase
    labels:
        app: realtime-prod
        component: websocket
        kbve.com/category: application
        kbve.com/stack: supabase
        kbve.com/managed-by: argocd
spec:
    clusterIP: None
    publishNotReadyAddresses: true
    ports:
        - port: 4000
          targetPort: 4000
          protocol: TCP
          name: http
        - port: 4369
          targetPort: 4369
          protocol: TCP
          name: epmd
        - port: 5369
          targetPort: 5369
          protocol: TCP
          name: gen-rpc
        - port: 9105
          targetPort: 9105
          protocol: TCP
          name: dist-port
    selector:
        app: realtime-prod
