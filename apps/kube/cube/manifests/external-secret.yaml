apiVersion: v1
kind: ServiceAccount
metadata:
    name: cube-external-secrets
    namespace: cube
---
# Reads the Postgres superuser password from kilobase.
# RBAC granted in apps/kube/kilobase/manifests/cube-external-secrets-rbac.yaml
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: cube-kilobase-store
    namespace: cube
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: cube-external-secrets
                    namespace: cube
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# Reads the ClickHouse admin password from the clickhouse namespace.
# RBAC granted in apps/kube/clickhouse/manifests/cube-external-secrets-rbac.yaml
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: cube-clickhouse-store
    namespace: cube
spec:
    provider:
        kubernetes:
            remoteNamespace: clickhouse
            auth:
                serviceAccount:
                    name: cube-external-secrets
                    namespace: cube
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: cube-pg-credentials
    namespace: cube
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: cube-kilobase-store
        kind: SecretStore
    target:
        name: cube-pg-secret
        creationPolicy: Owner
    data:
        - secretKey: pg-password
          remoteRef:
              key: supabase-postgres
              property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: cube-ch-credentials
    namespace: cube
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: cube-clickhouse-store
        kind: SecretStore
    target:
        name: cube-ch-secret
        creationPolicy: Owner
    data:
        - secretKey: ch-password
          remoteRef:
              key: clickhouse-admin-credentials
              property: password
