---
apiVersion: v1
kind: ConfigMap
metadata:
    name: observability-ch-setup-script
    namespace: vector
data:
    setup.sh: |
        #!/bin/sh
        set -eu

        echo "Verifying ClickHouse connectivity..."
        CH_TEST=$(curl -sf --max-time 10 \
          "${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}" \
          -d "SELECT 1" 2>&1) || {
          echo "ERROR: Cannot connect to ClickHouse at ${CLICKHOUSE_ENDPOINT}"
          exit 1
        }
        echo "ClickHouse connection OK."

        echo "Creating observability database..."
        curl -sf --max-time 10 \
          "${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}" \
          -d "CREATE DATABASE IF NOT EXISTS observability ON CLUSTER 'cluster'" || {
          echo "ERROR: Failed to create observability database"
          exit 1
        }
        echo "Database 'observability' ready."

        echo "Creating logs_raw table (ReplicatedMergeTree)..."
        curl -sf --max-time 30 \
          "${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}" \
          -d "
        CREATE TABLE IF NOT EXISTS observability.logs_raw ON CLUSTER 'cluster'
        (
            timestamp       DateTime64(3, 'UTC'),
            service         LowCardinality(String),
            level           LowCardinality(String),
            message         String,
            metadata        String DEFAULT '{}',
            pod_name        String DEFAULT '',
            pod_namespace   LowCardinality(String) DEFAULT '',
            ingested_at     DateTime64(3, 'UTC') DEFAULT now64(3)
        )
        ENGINE = ReplicatedMergeTree('/clickhouse/tables/{shard}/observability/logs_raw', '{replica}')
        ORDER BY (service, timestamp)
        PARTITION BY toYYYYMMDD(timestamp)
        TTL toDateTime(timestamp) + INTERVAL 8 DAY
        " || {
          echo "ERROR: Failed to create logs_raw table"
          exit 1
        }
        echo "Table 'observability.logs_raw' ready."

        echo "Enforcing 8-day TTL on existing logs_raw (no-op on fresh table)..."
        curl -sf --max-time 30 \
          "${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}" \
          -d "ALTER TABLE observability.logs_raw ON CLUSTER 'cluster' MODIFY TTL toDateTime(timestamp) + INTERVAL 8 DAY" || {
          echo "ERROR: Failed to apply TTL to logs_raw"
          exit 1
        }
        echo "TTL on 'observability.logs_raw' enforced at 8 days."

        echo "Creating logs_distributed table (Distributed)..."
        curl -sf --max-time 30 \
          "${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}" \
          -d "
        CREATE TABLE IF NOT EXISTS observability.logs_distributed ON CLUSTER 'cluster'
        AS observability.logs_raw
        ENGINE = Distributed('cluster', 'observability', 'logs_raw', rand())
        " || {
          echo "ERROR: Failed to create logs_distributed table"
          exit 1
        }
        echo "Table 'observability.logs_distributed' ready."

        echo "Creating alerts_raw table (ReplicatedMergeTree, 30d TTL)..."
        curl -sf --max-time 30 \
          "${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}" \
          -d "
        CREATE TABLE IF NOT EXISTS observability.alerts_raw ON CLUSTER 'cluster'
        (
            timestamp       DateTime64(3, 'UTC'),
            status          LowCardinality(String),
            alertname       LowCardinality(String),
            severity        LowCardinality(String) DEFAULT '',
            namespace       LowCardinality(String) DEFAULT '',
            pod             String DEFAULT '',
            service         LowCardinality(String) DEFAULT '',
            summary         String DEFAULT '',
            description     String DEFAULT '',
            labels          String DEFAULT '{}',
            annotations     String DEFAULT '{}',
            fingerprint     String,
            starts_at       DateTime64(3, 'UTC'),
            ends_at         Nullable(DateTime64(3, 'UTC')),
            generator_url   String DEFAULT '',
            source          LowCardinality(String) DEFAULT 'webhook',
            ingested_at     DateTime64(3, 'UTC') DEFAULT now64(3)
        )
        ENGINE = ReplicatedMergeTree('/clickhouse/tables/{shard}/observability/alerts_raw', '{replica}')
        ORDER BY (timestamp, alertname, fingerprint)
        PARTITION BY toYYYYMMDD(timestamp)
        TTL toDateTime(timestamp) + INTERVAL 30 DAY
        " || {
          echo "ERROR: Failed to create alerts_raw table"
          exit 1
        }
        echo "Table 'observability.alerts_raw' ready."

        echo "Enforcing 30-day TTL on alerts_raw..."
        curl -sf --max-time 30 \
          "${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}" \
          -d "ALTER TABLE observability.alerts_raw ON CLUSTER 'cluster' MODIFY TTL toDateTime(timestamp) + INTERVAL 30 DAY" || {
          echo "ERROR: Failed to apply TTL to alerts_raw"
          exit 1
        }
        echo "TTL on 'observability.alerts_raw' enforced at 30 days."

        echo "Creating alerts_distributed table (Distributed)..."
        curl -sf --max-time 30 \
          "${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}" \
          -d "
        CREATE TABLE IF NOT EXISTS observability.alerts_distributed ON CLUSTER 'cluster'
        AS observability.alerts_raw
        ENGINE = Distributed('cluster', 'observability', 'alerts_raw', cityHash64(fingerprint))
        " || {
          echo "ERROR: Failed to create alerts_distributed table"
          exit 1
        }
        echo "Table 'observability.alerts_distributed' ready."

        echo ""
        echo "Observability schema setup complete."

---
apiVersion: batch/v1
kind: Job
metadata:
    name: observability-ch-setup
    namespace: vector
    labels:
        app: observability-ch-setup
        component: vector
    annotations:
        kbve.sh/last-updated: '2026-05-11'
        argocd.argoproj.io/hook: PostSync
spec:
    ttlSecondsAfterFinished: 86400
    backoffLimit: 3
    template:
        metadata:
            labels:
                app: observability-ch-setup
        spec:
            restartPolicy: OnFailure
            containers:
                - name: setup
                  image: curlimages/curl:8.12.1
                  command: ['/bin/sh', '/scripts/setup.sh']
                  env:
                      - name: CLICKHOUSE_ENDPOINT
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-vector-credentials
                                key: endpoint
                      - name: CLICKHOUSE_USER
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-vector-credentials
                                key: username
                      - name: CLICKHOUSE_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-vector-credentials
                                key: password
                  volumeMounts:
                      - name: setup-script
                        mountPath: /scripts
                        readOnly: true
                  resources:
                      requests:
                          memory: '32Mi'
                          cpu: '50m'
                      limits:
                          memory: '64Mi'
                          cpu: '100m'
                  securityContext:
                      runAsNonRoot: true
                      runAsUser: 1000
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
            volumes:
                - name: setup-script
                  configMap:
                      name: observability-ch-setup-script
                      defaultMode: 0555
