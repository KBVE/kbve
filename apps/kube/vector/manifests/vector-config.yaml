---
apiVersion: v1
kind: ConfigMap
metadata:
    name: vector-config
    namespace: vector
    annotations:
        kbve.sh/last-updated: '2026-03-16'
data:
    vector.yml: |
        api:
          enabled: true
          address: 0.0.0.0:9001

        sources:
          kubernetes_logs:
            type: kubernetes_logs
            self_node_name: "${VECTOR_SELF_NODE_NAME}"
            extra_namespace_label_selector: "kubernetes.io/metadata.name=kilobase"
            exclude_paths_glob_patterns:
              - "**/supabase-vector-*/**"
              - "**/vector/**"
            auto_partial_merge: true
            data_dir: "/vector-data-dir"

        transforms:
          project_logs:
            type: remap
            inputs:
              - kubernetes_logs
            source: |-
              .project = "default"
              .event_message = del(.message)
              .appname = del(.container_name)
              .pod_name = del(.pod_name)
              .pod_namespace = del(.pod_namespace)
              del(.container_created_at)
              del(.container_id)
              del(.source_type)
              del(.stream)
              del(.label)
              del(.image)
              del(.host)
              del(.stream)
          router:
            type: route
            inputs:
              - project_logs
            route:
              kong: '.appname == "supabase-kong" || .appname == "kong-kong" || .appname == "proxy"'
              auth: '.appname == "supabase-auth" || .appname == "gotrue"'
              rest: '.appname == "supabase-rest" || .appname == "postgrest"'
              realtime: '.appname == "supabase-realtime" || .appname == "realtime"'
              storage: '.appname == "supabase-storage" || .appname == "storage"'
              functions: '.appname == "supabase-functions" || .appname == "functions"'
              db: '.appname == "supabase-db" || .appname == "postgres"'
              analytics: '.appname == "logflare" || .appname == "supabase-analytics"'
              meta: '.appname == "postgres-meta" || .appname == "supabase-meta"'
              studio: '.appname == "studio" || .appname == "supabase-studio"'
          kong_logs:
            type: remap
            inputs:
              - router.kong
            source: |-
              req, err = parse_nginx_log(.event_message, "combined")
              if err == null {
                  .timestamp = req.timestamp
                  .metadata.request.headers.referer = req.referer
                  .metadata.request.headers.user_agent = req.agent
                  .metadata.request.headers.cf_connecting_ip = req.client
                  .metadata.request.method = req.method
                  .metadata.request.path = req.path
                  .metadata.request.protocol = req.protocol
                  .metadata.response.status_code = req.status
              }
              if err != null {
                abort
              }
          kong_err:
            type: remap
            inputs:
              - router.kong
            source: |-
              .metadata.request.method = "GET"
              .metadata.response.status_code = 200
              parsed, err = parse_nginx_log(.event_message, "error")
              if err == null {
                  .timestamp = parsed.timestamp
                  .severity = parsed.severity
                  .metadata.request.host = parsed.host
                  .metadata.request.headers.cf_connecting_ip = parsed.client
                  url, err = split(parsed.request, " ")
                  if err == null {
                      .metadata.request.method = url[0]
                      .metadata.request.path = url[1]
                      .metadata.request.protocol = url[2]
                  }
              }
              if err != null {
                abort
              }
          auth_logs:
            type: remap
            inputs:
              - router.auth
            source: |-
              parsed, err = parse_json(.event_message)
              if err == null {
                  .metadata.timestamp = parsed.time
                  .metadata = merge!(.metadata, parsed)
              }
          rest_logs:
            type: remap
            inputs:
              - router.rest
            source: |-
              parsed, err = parse_regex(.event_message, r'^(?P<time>.*): (?P<msg>.*)')
              if err == null {
                  .event_message = parsed.msg
                  .timestamp = parse_timestamp!(parsed.time, "%+")
                  .metadata.host = .project
              }
          realtime_logs:
            type: remap
            inputs:
              - router.realtime
            source: |-
              .metadata.project = del(.project)
              .metadata.external_id = .metadata.project
              parsed, err = parse_regex(.event_message, r'^(?P<time>\d+:\d+:\d+\.\d+) \[(?P<level>\w+)\] (?P<msg>.*)')
              if err == null {
                  .event_message = parsed.msg
                  .metadata.level = parsed.level
              }
          storage_logs:
            type: remap
            inputs:
              - router.storage
            source: |-
              .metadata.project = del(.project)
              .metadata.tenantId = .metadata.project
              parsed, err = parse_json(.event_message)
              if err == null {
                  .event_message = parsed.msg
                  .metadata.level = parsed.level
                  .metadata.timestamp = parsed.time
                  .metadata.context[0].host = parsed.hostname
                  .metadata.context[0].pid = parsed.pid
              }
          db_logs:
            type: remap
            inputs:
              - router.db
            source: |-
              .metadata.host = "db-default"
              .metadata.parsed.timestamp = .timestamp

              parsed, err = parse_regex(.event_message, r'.*(?P<level>INFO|NOTICE|WARNING|ERROR|LOG|FATAL|PANIC?):.*', numeric_groups: true)

              if err != null || parsed == null {
                .metadata.parsed.error_severity = "info"
              }
              if parsed != null {
               .metadata.parsed.error_severity = parsed.level
              }
              if .metadata.parsed.error_severity == "info" {
                  .metadata.parsed.error_severity = "log"
              }
              .metadata.parsed.error_severity = upcase!(.metadata.parsed.error_severity)

          analytics_logs:
            type: remap
            inputs:
              - router.analytics
            source: |-
              .metadata.service = "analytics"
              parsed, err = parse_json(.event_message)
              if err == null {
                  .metadata = merge!(.metadata, parsed)
              }

          meta_logs:
            type: remap
            inputs:
              - router.meta
            source: |-
              .metadata.service = "meta"
              parsed, err = parse_json(.event_message)
              if err == null {
                  .metadata = merge!(.metadata, parsed)
              }

          studio_logs:
            type: remap
            inputs:
              - router.studio
            source: |-
              .metadata.service = "studio"
              .metadata.host = .project

          # Normalize all service logs into the ClickHouse schema
          ch_normalize:
            type: remap
            inputs:
              - kong_logs
              - kong_err
              - auth_logs
              - rest_logs
              - realtime_logs
              - storage_logs
              - db_logs
              - analytics_logs
              - meta_logs
              - studio_logs
              - router.functions
            source: |-
              # Extract level from metadata or severity field
              .level = string(.severity) ??
                       string(.metadata.level) ??
                       string(.metadata.parsed.error_severity) ??
                       "info"
              .level = downcase!(.level)

              .service = string(.appname) ?? "unknown"
              .message = string(.event_message) ?? ""
              .metadata = encode_json(object(.metadata) ?? {})

              # Keep only the columns the CH table expects
              del(.event_message)
              del(.appname)
              del(.severity)
              del(.project)
              del(.file)
              del(.pod_labels)
              del(.kubernetes)

        sinks:
          clickhouse:
            type: clickhouse
            inputs:
              - ch_normalize
            endpoint: "${CLICKHOUSE_ENDPOINT}"
            database: observability
            table: logs_raw
            auth:
              strategy: basic
              user: "${CLICKHOUSE_USER}"
              password: "${CLICKHOUSE_PASSWORD}"
            skip_unknown_fields: true
            date_time_best_effort: true
            batch:
              max_bytes: 10485760
              timeout_secs: 5
            buffer:
              type: memory
              max_events: 10000
            encoding:
              timestamp_format: rfc3339
