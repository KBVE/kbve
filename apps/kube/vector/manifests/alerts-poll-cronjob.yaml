apiVersion: v1
kind: ConfigMap
metadata:
    name: alerts-poll-script
    namespace: vector
    labels:
        kbve.com/category: observability
        kbve.com/stack: core
        kbve.com/managed-by: argocd
data:
    poll.py:
        "#!/usr/bin/env python3\n# Pure-python alerts poller. Reads /api/v1/alerts\
        \ from Prometheus,\n# normalizes each alert into the observability.alerts_distributed\n\
        # schema, and posts JSONEachRow to ClickHouse. No curl, no jq —\n# works on python:3.12-alpine\
        \ with readOnlyRootFilesystem + non-root.\nimport datetime\nimport hashlib\nimport\
        \ json\nimport os\nimport sys\nimport urllib.error\nimport urllib.parse\nimport\
        \ urllib.request\n\nPROM_URL = os.environ.get(\n    \"PROM_URL\",\n    \"http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090\"\
        ,\n).rstrip(\"/\")\nSOURCE_LABEL = os.environ.get(\"SOURCE_LABEL\", \"poll\")\n\
        CH_ENDPOINT = os.environ[\"CLICKHOUSE_ENDPOINT\"].rstrip(\"/\")\nCH_USER = os.environ[\"\
        CLICKHOUSE_USER\"]\nCH_PASSWORD = os.environ[\"CLICKHOUSE_PASSWORD\"]\n\nprom_url\
        \ = f\"{PROM_URL}/api/v1/alerts\"\nprint(f\"Polling Prometheus alerts at {prom_url}\
        \ ...\", flush=True)\n\ntry:\n    with urllib.request.urlopen(prom_url, timeout=15)\
        \ as r:\n        payload = json.load(r)\nexcept (urllib.error.URLError, TimeoutError,\
        \ json.JSONDecodeError) as e:\n    print(f\"ERROR: Prometheus /api/v1/alerts unreachable:\
        \ {e}\", file=sys.stderr)\n    sys.exit(1)\n\nalerts = payload.get(\"data\", {}).get(\"\
        alerts\", []) or []\nprint(f\"Prometheus reports {len(alerts)} active alert(s).\"\
        , flush=True)\nif not alerts:\n    print(\"Nothing to insert.\")\n    sys.exit(0)\n\
        \nnow_iso = (\n    datetime.datetime.now(datetime.timezone.utc)\n    .isoformat(timespec=\"\
        milliseconds\")\n    .replace(\"+00:00\", \"Z\")\n)\nlines = []\nfor a in alerts:\n\
        \    labels = a.get(\"labels\", {}) or {}\n    anno = a.get(\"annotations\", {})\
        \ or {}\n    fp = hashlib.sha256(\n        (\"|\".join(f\"{k}={v}\" for k, v in\
        \ sorted(labels.items()))).encode()\n    ).hexdigest()\n    row = {\n        \"\
        timestamp\": now_iso,\n        \"status\": a.get(\"state\", \"firing\"),\n   \
        \     \"alertname\": labels.get(\"alertname\", \"unknown\"),\n        \"severity\"\
        : labels.get(\"severity\", \"\"),\n        \"namespace\": labels.get(\"namespace\"\
        , \"\"),\n        \"pod\": labels.get(\"pod\", \"\"),\n        \"service\": labels.get(\"\
        service\", \"\"),\n        \"summary\": anno.get(\"summary\", \"\"),\n       \
        \ \"description\": anno.get(\"description\", \"\"),\n        \"labels\": json.dumps(labels,\
        \ sort_keys=True),\n        \"annotations\": json.dumps(anno, sort_keys=True),\n\
        \        \"fingerprint\": fp,\n        \"starts_at\": (a.get(\"activeAt\") or\
        \ now_iso).replace(\"+00:00\", \"Z\"),\n        \"ends_at\": None,\n        \"\
        generator_url\": anno.get(\"runbook_url\", \"\"),\n        \"source\": SOURCE_LABEL,\n\
        \    }\n    lines.append(json.dumps(row))\n\nbody = \"\\n\".join(lines).encode(\"\
        utf-8\")\nq = urllib.parse.urlencode({\n    \"user\": CH_USER,\n    \"password\"\
        : CH_PASSWORD,\n    \"date_time_input_format\": \"best_effort\",\n    \"query\"\
        : \"INSERT INTO observability.alerts_distributed FORMAT JSONEachRow\",\n})\ninsert_url\
        \ = f\"{CH_ENDPOINT}/?{q}\"\nprint(f\"Inserting {len(lines)} rows into observability.alerts_distributed\
        \ ...\", flush=True)\nreq = urllib.request.Request(insert_url, data=body, method=\"\
        POST\")\ntry:\n    with urllib.request.urlopen(req, timeout=30) as r:\n      \
        \  if r.status >= 300:\n            print(f\"ERROR: ClickHouse insert returned\
        \ {r.status}\", file=sys.stderr)\n            sys.exit(1)\nexcept urllib.error.HTTPError\
        \ as e:\n    try:\n        detail = e.read().decode(\"utf-8\", errors=\"replace\"\
        )[:500]\n    except Exception:\n        detail = \"\"\n    print(f\"ERROR: ClickHouse\
        \ insert failed: {e.code} {e.reason} :: {detail}\", file=sys.stderr)\n    sys.exit(1)\n\
        except (urllib.error.URLError, TimeoutError) as e:\n    print(f\"ERROR: ClickHouse\
        \ unreachable: {e}\", file=sys.stderr)\n    sys.exit(1)\nprint(\"Insert OK.\"\
        )\n"
---
apiVersion: batch/v1
kind: CronJob
metadata:
    name: alerts-poll
    namespace: vector
    labels:
        app: alerts-poll
        component: vector
        kbve.com/category: observability
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    schedule: '*/5 * * * *'
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 3
    jobTemplate:
        spec:
            backoffLimit: 2
            ttlSecondsAfterFinished: 3600
            template:
                metadata:
                    labels:
                        app: alerts-poll
                spec:
                    restartPolicy: OnFailure
                    containers:
                        - name: poll
                          image: python:3.12-alpine
                          command:
                              - python3
                              - /scripts/poll.py
                          env:
                              - name: PROM_URL
                                value: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
                              - name: SOURCE_LABEL
                                value: poll
                              - name: CLICKHOUSE_ENDPOINT
                                valueFrom:
                                    secretKeyRef:
                                        name: clickhouse-vector-credentials
                                        key: endpoint
                              - name: CLICKHOUSE_USER
                                valueFrom:
                                    secretKeyRef:
                                        name: clickhouse-vector-credentials
                                        key: username
                              - name: CLICKHOUSE_PASSWORD
                                valueFrom:
                                    secretKeyRef:
                                        name: clickhouse-vector-credentials
                                        key: password
                          volumeMounts:
                              - name: poll-script
                                mountPath: /scripts
                                readOnly: true
                          resources:
                              requests:
                                  memory: 64Mi
                                  cpu: 50m
                              limits:
                                  memory: 128Mi
                                  cpu: 200m
                          securityContext:
                              runAsNonRoot: true
                              runAsUser: 1000
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                  drop:
                                      - ALL
                    volumes:
                        - name: poll-script
                          configMap:
                              name: alerts-poll-script
                              defaultMode: 365
