# Shared Longhorn PVC for staging ISOs, installers, etc.
# Mounted as a data disk on the Windows builder VM.
# Upload files via virtctl or kubectl cp, then access from inside the VM.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: builder-shared-storage
    namespace: angelscript
    labels:
        app: angelscript
        component: shared-storage
spec:
    accessModes:
        - ReadWriteMany
    storageClassName: longhorn
    resources:
        requests:
            # 50Gi: Windows ISO ~6Gi + Xcode .xip ~12Gi + misc installers
            storage: 50Gi
