# RBAC for the CDI bootstrap Job
apiVersion: v1
kind: ServiceAccount
metadata:
    name: cdi-bootstrap
    namespace: cdi
    annotations:
        argocd.argoproj.io/sync-wave: '-2'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: cdi-bootstrap
    annotations:
        argocd.argoproj.io/sync-wave: '-2'
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: cluster-admin
subjects:
    - kind: ServiceAccount
      name: cdi-bootstrap
      namespace: cdi
