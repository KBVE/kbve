# RBAC for the bootstrap Job — needs cluster-admin to apply the operator CRDs + RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
    name: kubevirt-bootstrap
    namespace: kubevirt
    annotations:
        argocd.argoproj.io/sync-wave: '-2'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: kubevirt-bootstrap
    annotations:
        argocd.argoproj.io/sync-wave: '-2'
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: cluster-admin
subjects:
    - kind: ServiceAccount
      name: kubevirt-bootstrap
      namespace: kubevirt
