apiVersion: batch/v1
kind: CronJob
metadata:
    name: vm-autologon-windows
    namespace: angelscript
    labels:
        app: angelscript
        component: vm-autologon
spec:
    schedule: '*/30 * * * *'
    timeZone: UTC
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 2
    startingDeadlineSeconds: 180
    jobTemplate:
        spec:
            backoffLimit: 3
            ttlSecondsAfterFinished: 3600
            template:
                metadata:
                    labels:
                        component: vm-autologon
                spec:
                    serviceAccountName: vm-scaler
                    restartPolicy: OnFailure
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 10001
                        runAsGroup: 10001
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: autologon
                          image: ghcr.io/kbve/kubectl:0.1.8
                          command: ['/bin/sh', '/scripts/autologon.sh']
                          securityContext:
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                  drop: ['ALL']
                          env:
                              - name: VM_NAME
                                value: windows-builder
                              - name: NAMESPACE
                                value: angelscript
                              - name: ADMIN_PASSWORD
                                valueFrom:
                                    secretKeyRef:
                                        name: windows-builder-admin
                                        key: password
                          volumeMounts:
                              - name: script
                                mountPath: /scripts
                              - name: tmp
                                mountPath: /tmp
                    volumes:
                        - name: script
                          configMap:
                              name: vm-autologon-script
                              defaultMode: 0755
                        - name: tmp
                          emptyDir: {}
