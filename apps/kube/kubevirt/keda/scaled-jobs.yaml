# KEDA ScaledJobs for KubeVirt VM lifecycle.
#
# Scale UP: removed — VMs are now started via workflow_dispatch from CI.
# Scale DOWN: cron trigger (every hour) → stop VM if idle + no sessions.
#
# The github-runner trigger was removed to eliminate GitHub API rate limit
# pressure. CI workflows dispatch VM starts directly instead.
---
# ──────────────────────────────────────────────────────────────
# SCALE DOWN — KEDA cron-triggered idle shutdown
# Runs every hour, checks: age > 30min + no active sessions
# GitHub API check removed — VMs are stopped based on age + connections only.
# ──────────────────────────────────────────────────────────────

# Windows VM shutdown
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
    name: vm-stop-windows-builder
    namespace: angelscript
spec:
    jobTargetRef:
        parallelism: 1
        completions: 1
        backoffLimit: 1
        ttlSecondsAfterFinished: 300
        template:
            spec:
                serviceAccountName: vm-scaler
                restartPolicy: OnFailure
                containers:
                    - name: idle-checker
                      image: registry.k8s.io/kubectl:v1.33.2
                      command: ['/bin/sh', '/scripts/idle-shutdown.sh']
                      env:
                          - name: VM_NAME
                            value: windows-builder
                          - name: RUNNER_LABEL
                            value: UE5-Win
                          - name: NAMESPACE
                            value: angelscript
                          - name: IDLE_THRESHOLD_MINUTES
                            value: '30'
                      volumeMounts:
                          - name: script
                            mountPath: /scripts
                volumes:
                    - name: script
                      configMap:
                          name: vm-idle-shutdown-script
                          defaultMode: 0755
    pollingInterval: 900
    minReplicaCount: 0
    maxReplicaCount: 1
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    triggers:
        - type: cron
          metadata:
              timezone: UTC
              start: '0 */1 * * *'
              end: '15 */1 * * *'
              desiredReplicas: '1'
---
