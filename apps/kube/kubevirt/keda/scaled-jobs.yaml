---
# ──────────────────────────────────────────────────────────────
# SCALE DOWN — KEDA cron-triggered idle check (activity-aware)
# The idle-shutdown script stops the VM only when ALL hold:
#   age > 30min, no queued/in-progress GitHub jobs for the runner label
#   (GITHUB_TOKEN below re-enables this check), no VNC/RDP sessions.
# A few GitHub API calls per check window — negligible rate-limit cost.
# ──────────────────────────────────────────────────────────────

# Windows VM shutdown
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
    name: vm-stop-windows-builder
    namespace: angelscript
spec:
    jobTargetRef:
        parallelism: 1
        completions: 1
        backoffLimit: 1
        ttlSecondsAfterFinished: 300
        template:
            spec:
                serviceAccountName: vm-scaler
                restartPolicy: OnFailure
                containers:
                    - name: idle-checker
                      image: ghcr.io/kbve/kubectl:0.1.7
                      command: ['/bin/sh', '/scripts/idle-shutdown.sh']
                      env:
                          - name: VM_NAME
                            value: windows-builder
                          - name: RUNNER_LABEL
                            value: UE5-Win
                          - name: NAMESPACE
                            value: angelscript
                          - name: IDLE_THRESHOLD_MINUTES
                            value: '30'
                          - name: GITHUB_ORG
                            value: KBVE
                          - name: GITHUB_TOKEN
                            valueFrom:
                                secretKeyRef:
                                    name: github-arc-token
                                    key: github_token
                      volumeMounts:
                          - name: script
                            mountPath: /scripts
                volumes:
                    - name: script
                      configMap:
                          name: vm-idle-shutdown-script
                          defaultMode: 0755
    pollingInterval: 900
    minReplicaCount: 0
    maxReplicaCount: 1
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    triggers:
        - type: cron
          metadata:
              timezone: UTC
              start: '0 */1 * * *'
              end: '15 */1 * * *'
              desiredReplicas: '1'
