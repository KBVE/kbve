# KEDA ScaledJob: (re)register/heal the GitHub Actions runner whenever the
# windows-builder VM boots. Triggered by the VM pod existing (same pattern as
# autologon). The install script is idempotent — on a normal boot the runner
# service is already installed on the persistent disk and running as
# .\Administrator, so it exits fast (ALREADY_OK) without minting a token or
# downloading anything. It only re-registers on first install, runner-version
# change, or to switch the service off NETWORK SERVICE onto .\Administrator.
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
    name: vm-runner-install-windows-on-boot
    namespace: angelscript
    labels:
        app: angelscript
        component: vm-runner
spec:
    pollingInterval: 30
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 2
    maxReplicaCount: 1
    triggers:
        - type: kubernetes-workload
          metadata:
              podSelector: 'vm.kubevirt.io/name=windows-builder'
              value: '1'
    jobTargetRef:
        parallelism: 1
        completions: 1
        backoffLimit: 3
        ttlSecondsAfterFinished: 600
        template:
            metadata:
                labels:
                    component: vm-runner
            spec:
                serviceAccountName: vm-scaler
                restartPolicy: OnFailure
                securityContext:
                    runAsNonRoot: true
                    runAsUser: 10001
                    runAsGroup: 10001
                    seccompProfile:
                        type: RuntimeDefault
                containers:
                    - name: runner-install
                      image: ghcr.io/kbve/kubectl:0.1.6
                      command: ['/bin/sh', '/scripts/install-runner.sh']
                      securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities:
                              drop: ['ALL']
                      env:
                          - name: VM_NAME
                            value: windows-builder
                          - name: NAMESPACE
                            value: angelscript
                          - name: GITHUB_ORG
                            value: KBVE
                          - name: RUNNER_NAME
                            value: windows-builder
                          - name: RUNNER_LABELS
                            value: UE5-Win
                          - name: RUNNER_VERSION
                            value: '2.333.0'
                          - name: RUNNER_LOGON_ACCOUNT
                            value: LocalSystem
                          - name: GITHUB_TOKEN
                            valueFrom:
                                secretKeyRef:
                                    name: github-arc-token
                                    key: github_token
                          - name: ADMIN_PASSWORD
                            valueFrom:
                                secretKeyRef:
                                    name: windows-builder-admin
                                    key: password
                      volumeMounts:
                          - name: script
                            mountPath: /scripts
                          - name: tmp
                            mountPath: /tmp
                volumes:
                    - name: script
                      configMap:
                          name: vm-runner-install-script
                          defaultMode: 0755
                    - name: tmp
                      emptyDir: {}
