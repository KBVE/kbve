apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: kubevirt-operator
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: '1'
        kbve.com/source-path: kube/kubevirt
        kbve.com/manifest-path: apps/kube/kubevirt/manifests
        kbve.com/application-file: kube/kubevirt/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: virtualization
        kbve.com/stack: core
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: default
    source:
        repoURL: https://github.com/KBVE/kbve
        targetRevision: main
        path: apps/kube/kubevirt/manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: kubevirt
    syncPolicy:
        automated:
            prune: false
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
        retry:
            limit: 5
            backoff:
                duration: 10s
                factor: 2
                maxDuration: 5m
    revisionHistoryLimit: 3
