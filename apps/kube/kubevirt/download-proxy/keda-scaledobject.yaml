# KEDA ScaledObject for download-proxy.
#
# Previously used github-runner triggers (removed to save API quota).
# Now scaled manually or via workflow_dispatch from CI.
# The proxy can also be started manually:
#   kubectl scale deploy download-proxy -n angelscript --replicas=1
#
# Kept as a ScaledObject with no triggers so KEDA manages scale-to-zero
# after the cooldown period when no longer needed.
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    name: download-proxy-scaler
    namespace: angelscript
    labels:
        app: download-proxy
        component: kubevirt-tooling
spec:
    scaleTargetRef:
        name: download-proxy
    pollingInterval: 300
    cooldownPeriod: 300
    idleReplicaCount: 0
    minReplicaCount: 0
    maxReplicaCount: 1
    triggers:
        # Placeholder cron trigger — keeps KEDA managing the ScaledObject so
        # cooldown-to-zero still applies after CI workflows scale up.
        # `desiredReplicas` must be > 0 to pass KEDA's cron validator
        # (`'0'` is rejected with `error parsing cron metadata: no
        # desiredReplicas specified`), so set it to '1' but pick a window
        # that never fires — Feb 30 doesn't exist on any calendar.
        - type: cron
          metadata:
              timezone: UTC
              start: '0 0 30 2 *'
              end: '5 0 30 2 *'
              desiredReplicas: '1'
