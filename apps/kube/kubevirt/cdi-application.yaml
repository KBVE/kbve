# CDI (Containerized Data Importer) — imports disk images (Windows ISO) into PVCs
# Bootstrap Job applies upstream CDI operator + CR YAML.
# SkipDryRunOnMissingResource handles CRD chicken-and-egg ordering.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: kubevirt-cdi
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: '2'
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: default
    source:
        repoURL: https://github.com/KBVE/kbve
        targetRevision: main
        path: apps/kube/kubevirt/cdi
    destination:
        server: https://kubernetes.default.svc
        namespace: cdi
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - PruneLast=true
            - SkipDryRunOnMissingResource=true
        retry:
            limit: 10
            backoff:
                duration: 15s
                factor: 2
                maxDuration: 10m
    revisionHistoryLimit: 3
