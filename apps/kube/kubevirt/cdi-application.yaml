# CDI (Containerized Data Importer) — imports disk images (Windows ISO) into PVCs
# CDI operator is installed manually via:
#   export VERSION=$(curl -sI https://github.com/kubevirt/containerized-data-importer/releases/latest | grep location | awk -F/ '{print $NF}' | tr -d '\r')
#   kubectl apply -f https://github.com/kubevirt/containerized-data-importer/releases/download/${VERSION}/cdi-operator.yaml
# ArgoCD manages the namespace + CDI CR.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: kubevirt-cdi
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: '2'
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: default
    source:
        repoURL: https://github.com/KBVE/kbve
        targetRevision: main
        path: apps/kube/kubevirt/cdi
    destination:
        server: https://kubernetes.default.svc
        namespace: cdi
    syncPolicy:
        automated:
            prune: false
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - SkipDryRunOnMissingResource=true
        retry:
            limit: 5
            backoff:
                duration: 10s
                factor: 2
                maxDuration: 5m
    revisionHistoryLimit: 3
