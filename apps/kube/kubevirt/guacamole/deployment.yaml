apiVersion: apps/v1
kind: Deployment
metadata:
    name: guacd
    namespace: angelscript
    labels:
        app: guacd
        component: guacamole
spec:
    replicas: 1
    selector:
        matchLabels:
            app: guacd
    template:
        metadata:
            labels:
                app: guacd
                component: guacamole
        spec:
            containers:
                - name: guacd
                  image: guacamole/guacd:1.5.5
                  ports:
                      - containerPort: 4822
                        name: guacd
                        protocol: TCP
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          cpu: '2'
                          memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
    name: guacd
    namespace: angelscript
    labels:
        app: guacd
        component: guacamole
spec:
    selector:
        app: guacd
    ports:
        - port: 4822
          targetPort: 4822
          name: guacd
          protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: guacamole
    namespace: angelscript
    labels:
        app: guacamole
        component: guacamole
    annotations:
        configmap.reloader.stakater.com/reload: 'guacamole-user-mapping'
        secret.reloader.stakater.com/reload: 'windows-builder-admin'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: guacamole
    template:
        metadata:
            labels:
                app: guacamole
                component: guacamole
        spec:
            initContainers:
                - name: inject-rdp-password
                  image: busybox:1.37
                  command: ['sh', '-c']
                  args:
                      - |
                          PASSWORD=$(cat /secrets/password)
                          sed "s|</connection>|<param name=\"password\">${PASSWORD}</param>\n</connection>|" \
                            /template/user-mapping.xml > /config/user-mapping.xml
                  volumeMounts:
                      - name: user-mapping-template
                        mountPath: /template
                        readOnly: true
                      - name: admin-password
                        mountPath: /secrets
                        readOnly: true
                      - name: user-mapping-rendered
                        mountPath: /config
            containers:
                - name: guacamole
                  image: guacamole/guacamole:1.5.5
                  env:
                      - name: GUACD_HOSTNAME
                        value: guacd.angelscript.svc.cluster.local
                      - name: GUACD_PORT
                        value: '4822'
                      - name: GUACAMOLE_HOME
                        value: /etc/guacamole
                  ports:
                      - containerPort: 8080
                        name: http
                        protocol: TCP
                  volumeMounts:
                      - name: user-mapping-rendered
                        mountPath: /etc/guacamole/user-mapping.xml
                        subPath: user-mapping.xml
                        readOnly: true
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          cpu: '1'
                          memory: 512Mi
            volumes:
                - name: user-mapping-template
                  configMap:
                      name: guacamole-user-mapping
                - name: admin-password
                  secret:
                      secretName: windows-builder-admin
                - name: user-mapping-rendered
                  emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
    name: guacamole
    namespace: angelscript
    labels:
        app: guacamole
        component: guacamole
spec:
    selector:
        app: guacamole
    ports:
        - port: 8080
          targetPort: 8080
          name: http
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
    name: windows-builder-rdp
    namespace: angelscript
    labels:
        app: angelscript
        component: windows-builder
spec:
    type: ClusterIP
    selector:
        vm.kubevirt.io/name: windows-builder
    ports:
        - name: rdp
          port: 3389
          targetPort: 3389
          protocol: TCP
