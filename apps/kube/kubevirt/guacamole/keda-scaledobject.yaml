# KEDA ScaledObjects for Guacamole stack.
#
# Guacamole scales to 1 replica when the Windows VM is likely in use
# (weekdays 06:00–22:00 UTC) and back to 0 outside that window.
# Manual override: kubectl scale deploy guacd guacamole -n angelscript --replicas=1
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    name: guacd-scaler
    namespace: angelscript
    labels:
        app: guacd
        component: guacamole
spec:
    scaleTargetRef:
        name: guacd
    pollingInterval: 300
    cooldownPeriod: 300
    idleReplicaCount: 0
    minReplicaCount: 0
    maxReplicaCount: 1
    triggers:
        - type: cron
          metadata:
              timezone: UTC
              start: 0 6 * * 1-5
              end: 0 22 * * 1-5
              desiredReplicas: '1'
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    name: guacamole-scaler
    namespace: angelscript
    labels:
        app: guacamole
        component: guacamole
spec:
    scaleTargetRef:
        name: guacamole
    pollingInterval: 300
    cooldownPeriod: 300
    idleReplicaCount: 0
    minReplicaCount: 0
    maxReplicaCount: 1
    triggers:
        - type: cron
          metadata:
              timezone: UTC
              start: 0 6 * * 1-5
              end: 0 22 * * 1-5
              desiredReplicas: '1'
