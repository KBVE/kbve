# KEDA ScaledObjects for Guacamole stack.
#
# Previously used github-runner triggers (removed to save API quota).
# Guacamole now scales based on whether the VM is running — CI workflows
# that start VMs should also scale up guacd + guacamole via kubectl.
# Manual override: kubectl scale deploy guacd guacamole -n angelscript --replicas=1
#
# Kept as ScaledObjects with no active triggers so KEDA manages scale-to-zero.
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    name: guacd-scaler
    namespace: angelscript
    labels:
        app: guacd
        component: guacamole
spec:
    scaleTargetRef:
        name: guacd
    pollingInterval: 300
    cooldownPeriod: 300
    idleReplicaCount: 0
    minReplicaCount: 0
    maxReplicaCount: 1
    triggers:
        - type: cron
          metadata:
              timezone: UTC
              start: '0 6 * * 1-5'
              end: '0 7 * * 1-5'
              desiredReplicas: '0'
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    name: guacamole-scaler
    namespace: angelscript
    labels:
        app: guacamole
        component: guacamole
spec:
    scaleTargetRef:
        name: guacamole
    pollingInterval: 300
    cooldownPeriod: 300
    idleReplicaCount: 0
    minReplicaCount: 0
    maxReplicaCount: 1
    triggers:
        - type: cron
          metadata:
              timezone: UTC
              start: '0 6 * * 1-5'
              end: '0 7 * * 1-5'
              desiredReplicas: '0'
