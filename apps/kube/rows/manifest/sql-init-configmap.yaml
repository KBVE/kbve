apiVersion: v1
kind: ConfigMap
metadata:
    name: ows-sql-init
    namespace: rows
    labels:
        kbve.com/category: game-server
        kbve.com/stack: rows
        kbve.com/managed-by: argocd
data:
    init-hubworldmmo.sql:
        "-- HubWorldMMO database initialization for OWS\n-- CustomerGUID\
        \ must be replaced with the actual GUID from the customers table\n-- Run: kubectl\
        \ exec -n kilobase supabase-cluster-1 -- psql -U postgres -d openworldserver <\
        \ init-hubworldmmo.sql\n\nDO $$\n    DECLARE _CustomerGUID UUID;\n    DECLARE\
        \ _CountOfHubWorldMaps INT;\n    DECLARE _DefaultCharacterValuesID INT;\n    DECLARE\
        \ _CountOfDefaultCharacterValues INT;\nBEGIN\n    -- Replace this GUID with the\
        \ one returned from INSERT INTO customers\n    _CustomerGUID := 'be92671d-af96-4a6b-bdf7-6a3b6270dae6';\n\
        \n    _CountOfHubWorldMaps := 0;\n    _DefaultCharacterValuesID := 0;\n    _CountOfDefaultCharacterValues\
        \ := 0;\n\n    SELECT CONCAT(COUNT(*), 0)\n    FROM Maps\n    WHERE CustomerGUID\
        \ = _CustomerGUID\n        AND ZoneName = 'HubWorld'\n    INTO _CountOfHubWorldMaps;\n\
        \n    IF _CountOfHubWorldMaps < 1 THEN\n        INSERT INTO Maps (CustomerGUID,\
        \ MapName, MapData, Width, Height, ZoneName, WorldCompContainsFilter, WorldCompListFilter,\
        \ MapMode, SoftPlayerCap, HardPlayerCap, MinutesToShutdownAfterEmpty)\n      \
        \  VALUES (_CustomerGUID, 'HubWorldMap', NULL, 1, 1, 'HubWorld', '', '', 1, 60,\
        \ 80, 1);\n    END IF;\n\n    SELECT CONCAT(COUNT(*), 0)\n    FROM Maps\n    WHERE\
        \ CustomerGUID = _CustomerGUID\n        AND ZoneName = 'SouthGate'\n    INTO _CountOfHubWorldMaps;\n\
        \n    IF _CountOfHubWorldMaps < 1 THEN\n        INSERT INTO Maps (CustomerGUID,\
        \ MapName, MapData, Width, Height, ZoneName, WorldCompContainsFilter, WorldCompListFilter,\
        \ MapMode, SoftPlayerCap, HardPlayerCap, MinutesToShutdownAfterEmpty)\n      \
        \  VALUES (_CustomerGUID, 'HubWorldMap', NULL, 1, 1, 'SouthGate', '', '', 1, 60,\
        \ 80, 1);\n    END IF;\n\n    SELECT CONCAT(COUNT(*), 0)\n    FROM DefaultCharacterValues\n\
        \    WHERE CustomerGUID = _CustomerGUID\n        AND DefaultSetName = 'Default'\n\
        \    INTO _CountOfDefaultCharacterValues;\n\n    IF _CountOfDefaultCharacterValues\
        \ < 1 THEN\n        INSERT INTO DefaultCharacterValues (CustomerGUID, DefaultSetName,\
        \ StartingMapName, X, Y, Z, RX, RY, RZ)\n        VALUES (_CustomerGUID, 'Default',\
        \ 'HubWorld', 1510, -160, 100, 0, 0, 0);\n\n        _DefaultCharacterValuesID\
        \ := CURRVAL(PG_GET_SERIAL_SEQUENCE('defaultcharactervalues', 'defaultcharactervaluesid'));\n\
        \n        INSERT INTO DefaultCustomCharacterData (CustomerGUID, DefaultCharacterValuesID,\
        \ CustomFieldName, FieldValue)\n        VALUES (_CustomerGUID, _DefaultCharacterValuesID,\
        \ 'BaseCharacterStats', '{\"Strength\": 10, \"Agility\": 10, \"Constitution\"\
        : 10 }');\n        INSERT INTO DefaultCustomCharacterData (CustomerGUID, DefaultCharacterValuesID,\
        \ CustomFieldName, FieldValue)\n        VALUES (_CustomerGUID, _DefaultCharacterValuesID,\
        \ 'BaseCharacterSkills', '{ \"Skill1\": 1 }');\n        INSERT INTO DefaultCustomCharacterData\
        \ (CustomerGUID, DefaultCharacterValuesID, CustomFieldName, FieldValue)\n    \
        \    VALUES (_CustomerGUID, _DefaultCharacterValuesID, 'SupplyPodsOpened', '{}');\n\
        \        INSERT INTO DefaultCustomCharacterData (CustomerGUID, DefaultCharacterValuesID,\
        \ CustomFieldName, FieldValue)\n        VALUES (_CustomerGUID, _DefaultCharacterValuesID,\
        \ 'BagInventory', '{   \"items\":  }');\n    END IF;\nEND $$;\n"
