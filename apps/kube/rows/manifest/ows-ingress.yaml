# Ingress: api.chuckrpg.com routing via ingress-nginx
#
# Mirrors the ows-api-routes HTTPRoute (httproute.yaml) so traffic
# reaches the ROWS backend whether DNS points at the nginx LoadBalancer
# or the Cilium Gateway. Until DNS is cut over to the Cilium gateway,
# this Ingress is the path that actually serves api.chuckrpg.com.
#
# Cloudflare proxies api.chuckrpg.com to the ingress-nginx LoadBalancer.
# cert-manager mints the origin cert via letsencrypt-http (secret: chuckrpg-api-tls).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: ows-api-ingress
    namespace: ows
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http
        nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
    ingressClassName: nginx
    tls:
        - hosts:
              - api.chuckrpg.com
          secretName: chuckrpg-api-tls
    rules:
        - host: api.chuckrpg.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: rows
                            port:
                                number: 4322
