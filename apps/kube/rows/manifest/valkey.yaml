apiVersion: apps/v1
kind: Deployment
metadata:
    name: ows-valkey
    namespace: rows
    labels:
        app: ows-valkey
        app.kubernetes.io/part-of: ows
        kbve.com/category: game-server
        kbve.com/stack: rows
        kbve.com/managed-by: argocd
spec:
    replicas: 1
    selector:
        matchLabels:
            app: ows-valkey
    template:
        metadata:
            labels:
                app: ows-valkey
                app.kubernetes.io/part-of: ows
        spec:
            containers:
                - name: valkey
                  image: valkey/valkey:8-alpine
                  # Intentional volatile cache (routing/affinity/occupancy only — no durable state).
                  # `--appendonly yes` on an emptyDir was a no-op (the AOF is wiped on every
                  # reschedule), so it's dropped. maxmemory + allkeys-lru cap usage below the 256Mi
                  # limit so valkey self-evicts within budget instead of being OOMKilled by the
                  # kubelet (which wipes the whole keyspace). When the server-lifecycle feature adds
                  # hot-path *durable* claims (SETNX party anchors / reserved-instance markers),
                  # switch to a PVC + `--maxmemory-policy noeviction`, or keep this cache and make
                  # those consumers provably fail-safe. See the lifecycle spec (B2/B3).
                  command:
                      - valkey-server
                      - --maxmemory
                      - 192mb
                      - --maxmemory-policy
                      - allkeys-lru
                      - --save
                      - ''
                      - --appendonly
                      - 'no'
                  ports:
                      - name: valkey
                        containerPort: 6379
                        protocol: TCP
                  resources:
                      requests:
                          memory: 64Mi
                          cpu: 50m
                      limits:
                          memory: 256Mi
                          cpu: 250m
                  livenessProbe:
                      exec:
                          command:
                              - valkey-cli
                              - ping
                      initialDelaySeconds: 10
                      periodSeconds: 10
                  readinessProbe:
                      exec:
                          command:
                              - valkey-cli
                              - ping
                      initialDelaySeconds: 5
                      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
    name: ows-valkey
    namespace: rows
    labels:
        app: ows-valkey
        app.kubernetes.io/part-of: ows
        kbve.com/category: game-server
        kbve.com/stack: rows
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: ows-valkey
    ports:
        - name: valkey
          port: 6379
          targetPort: 6379
          protocol: TCP
