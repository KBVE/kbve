apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: kilobase-remote-secret-store
    namespace: rows
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: ows-external-secrets
                    namespace: rows
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: ows-db-secrets
    namespace: rows
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: ows-db-credentials
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                db-connection-string: 'Host=supabase-cluster-rw.kilobase.svc.cluster.local;Port=5432;Database=supabase;Username=ows;Password={{ .dbpassword }};Options=-c search_path=ows,extensions,public;Maximum Pool Size=6;'
                db-url: 'postgres://ows:{{ .dbpassword }}@supabase-cluster-rw.kilobase.svc.cluster.local:5432/supabase'
    data:
        - secretKey: dbpassword
          remoteRef:
              key: ows-db-password
              property: password
---
# RabbitMQ credentials — pulled from operator-managed secret in rabbitmq-system
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: rabbitmq-remote-secret-store
    namespace: rows
spec:
    provider:
        kubernetes:
            remoteNamespace: rabbitmq-system
            auth:
                serviceAccount:
                    name: ows-external-secrets
                    namespace: rows
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: ows-rabbitmq-secrets
    namespace: rows
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: rabbitmq-remote-secret-store
        kind: SecretStore
    target:
        name: ows-rabbitmq-credentials
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                username: '{{ .username }}'
                password: '{{ .password }}'
                host: '{{ .host }}'
                amqp-url: 'amqp://{{ .username }}:{{ .password }}@{{ .host }}:5672'
    data:
        - secretKey: username
          remoteRef:
              key: rabbitmq-default-user
              property: username
        - secretKey: password
          remoteRef:
              key: rabbitmq-default-user
              property: password
        - secretKey: host
          remoteRef:
              key: rabbitmq-default-user
              property: host
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: rows-supabase-jwt
    namespace: rows
spec:
    refreshInterval: 15m
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: rows-supabase-jwt
        creationPolicy: Owner
    data:
        - secretKey: jwt-secret
          remoteRef:
              key: supabase-jwt
              property: secret
