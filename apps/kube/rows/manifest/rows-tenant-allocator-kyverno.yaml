# Per-tenant Agones allocator RBAC for ROWS, generated by Kyverno.
#
# Each ROWS tenant runs in its own namespace (rows-<slug>) under the
# `rows-instancelauncher` ServiceAccount (created by apps/kube/rows/tenants/base/secrets.yaml).
# To allocate game servers it must be able to create GameServerAllocations and watch
# GameServers in the `arc-runners` namespace, where the Agones fleets live.
#
# The Role `agones-allocator-for-ows` (arc-runners) already carries the right rules
# (see launcher-agones-rbac.yaml). What was missing is a RoleBinding for each tenant's
# `rows-instancelauncher` SA — the legacy binding targets `ows-instancelauncher`, a
# pre-multi-tenant name, so every rows-<slug>:rows-instancelauncher was denied (403 on
# gameserverallocations / gameservers).
#
# Rather than hand-maintain one RoleBinding per tenant, a Kyverno ClusterPolicy generates
# the binding for every `rows-instancelauncher` SA and keeps it in sync — matching the
# valkey-auth-sync pattern (apps/kube/valkey/manifests). `generateExisting: true` covers the
# tenants that already exist; new tenants are covered automatically when their SA is created.
#
# Pre-req: kyverno installed (apps/kube/kyverno).
---
# Grant Kyverno's controllers permission to manage the generated RoleBindings and to `bind`
# the allocator Role. RoleBindings are subject to RBAC privilege-escalation checks, so the
# `bind` verb on the referenced Role is required (unlike the valkey Secret clone, which needs
# no such grant). Aggregated into the admission/background/reports controllers.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: kyverno:rows-agones-allocator
    labels:
        app.kubernetes.io/part-of: ows
        rbac.kyverno.io/aggregate-to-admission-controller: 'true'
        rbac.kyverno.io/aggregate-to-background-controller: 'true'
        rbac.kyverno.io/aggregate-to-reports-controller: 'true'
rules:
    - apiGroups: ['rbac.authorization.k8s.io']
      resources: ['rolebindings']
      verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
    # Escalation guard: to create a RoleBinding to `agones-allocator-for-ows`, the principal
    # must hold `bind` on that exact Role (least-privilege form per the RBAC docs).
    - apiGroups: ['rbac.authorization.k8s.io']
      resources: ['roles']
      resourceNames: ['agones-allocator-for-ows']
      verbs: ['bind']
    # The background controller must read the trigger SAs to reconcile generateExisting.
    # Kyverno's default background-controller role usually covers this; granted explicitly
    # so the policy does not depend on the install's read scope.
    - apiGroups: ['']
      resources: ['serviceaccounts']
      verbs: ['get', 'list', 'watch']
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
    name: rows-agones-allocator-binding
    annotations:
        policies.kyverno.io/title: rows-agones-allocator-binding
        policies.kyverno.io/category: RBAC
        policies.kyverno.io/severity: medium
        policies.kyverno.io/description: >-
            Generates a RoleBinding in arc-runners for each ROWS tenant's
            rows-instancelauncher ServiceAccount, granting the Agones
            allocator Role (agones-allocator-for-ows) so the tenant can
            create GameServerAllocations and watch GameServers.
spec:
    generateExisting: true
    rules:
        - name: generate-allocator-rolebinding
          match:
              any:
                  - resources:
                        kinds: ['ServiceAccount']
                        names: ['rows-instancelauncher']
          generate:
              apiVersion: rbac.authorization.k8s.io/v1
              kind: RoleBinding
              # Unique per tenant — all bindings live in the shared arc-runners namespace.
              name: rows-allocator-{{request.object.metadata.namespace}}
              namespace: arc-runners
              synchronize: true
              data:
                  metadata:
                      labels:
                          app.kubernetes.io/part-of: ows
                          rows.kbve.com/tenant-namespace: '{{request.object.metadata.namespace}}'
                  roleRef:
                      apiGroup: rbac.authorization.k8s.io
                      kind: Role
                      name: agones-allocator-for-ows
                  subjects:
                      - kind: ServiceAccount
                        name: rows-instancelauncher
                        namespace: '{{request.object.metadata.namespace}}'
