apiVersion: apps/v1
kind: Deployment
metadata:
    name: rows
    namespace: rows
    labels:
        app: rows
        app.kubernetes.io/part-of: ows
        kbve.com/category: game-server
        kbve.com/stack: rows
        kbve.com/managed-by: argocd
    annotations:
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 0
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: rows
    template:
        metadata:
            labels:
                app: rows
                app.kubernetes.io/part-of: ows
        spec:
            serviceAccountName: ows-instancelauncher
            containers:
                - name: rows
                  image: ghcr.io/kbve/rows:0.1.38
                  imagePullPolicy: Always
                  env:
                      - name: HTTP_HOST
                        value: 0.0.0.0
                      - name: HTTP_PORT
                        value: '4322'
                      - name: DOCS_PORT
                        value: '4323'
                      - name: RUST_LOG
                        value: 'warn,tower_http=warn'
                      - name: DATABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: ows-db-credentials
                                key: db-url
                      - name: RABBITMQ_URL
                        valueFrom:
                            secretKeyRef:
                                name: ows-rabbitmq-credentials
                                key: amqp-url
                      - name: OWS_API_KEY
                        valueFrom:
                            secretKeyRef:
                                name: ows-customer-guid
                                key: customer-guid
                      - name: SUPABASE_JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: rows-supabase-jwt
                                key: jwt-secret
                      - name: SUPABASE_SERVICE_KEY_HASH
                        valueFrom:
                            secretKeyRef:
                                name: rows-supabase-service-key
                                key: hash
                                optional: true
                      # Gateway-held bearer token gating POST /fleet-restart/trigger (and, once
                      # set, the legacy RestartFleet). GameServers must NOT receive this value.
                      # optional so a missing secret can't block rollout — the trigger just 401s.
                      - name: ROWS_FLEET_RESTART_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: ows-fleet-restart-token
                                key: token
                                optional: true
                      - name: SUPABASE_URL
                        value: https://supabase.kbve.com
                      - name: AGONES_NAMESPACE
                        value: arc-runners
                      - name: AGONES_FLEET
                        value: ows-hubworld
                      - name: AGONES_API_TIMEOUT_SECS
                        value: '10'
                      - name: AGONES_CIRCUIT_BREAKER_THRESHOLD
                        value: '5'
                      - name: AGONES_CIRCUIT_BREAKER_RESET_SECS
                        value: '30'
                      - name: ROWS_SPINUP_TIMEOUT_SECS
                        value: '60'
                      - name: ROWS_SPINUP_POLL_INTERVAL_MS
                        value: '2000'
                      - name: ROWS_SPINUP_INITIAL_DELAY_MS
                        value: '3000'
                      - name: METRICS_PORT
                        value: '4324'
                  ports:
                      - name: http
                        containerPort: 4322
                        protocol: TCP
                      - name: docs
                        containerPort: 4323
                        protocol: TCP
                      - name: metrics
                        containerPort: 4324
                        protocol: TCP
                  resources:
                      requests:
                          memory: 1Gi
                          cpu: 500m
                      limits:
                          memory: 4Gi
                          cpu: 2000m
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /ready
                          port: http
                      initialDelaySeconds: 3
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
    name: rows
    namespace: rows
    labels:
        app: rows
        app.kubernetes.io/part-of: ows
        kbve.com/category: game-server
        kbve.com/stack: rows
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: rows
    ports:
        - name: http
          port: 4322
          targetPort: 4322
          protocol: TCP
        - name: docs
          port: 4323
          targetPort: 4323
          protocol: TCP
        - name: metrics
          port: 4324
          targetPort: 4324
          protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
    name: rows-pdb
    namespace: rows
    labels:
        app: rows
        app.kubernetes.io/part-of: ows
spec:
    # maxUnavailable (not minAvailable): with a single replica, minAvailable:1 blocks every
    # voluntary eviction and hangs node drains. maxUnavailable:1 always permits the drain; run
    # replicas >= 2 before enabling the fleet-restart reconcile live so one pod is always serving
    # (the per-tenant advisory lock makes multi-replica safe).
    maxUnavailable: 1
    selector:
        matchLabels:
            app: rows
