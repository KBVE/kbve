---
# Per-tenant public routing. Hostname + cert names are patched by the overlay.
# The matching gateway listener lives in apps/kube/kbve/manifest/kbve-gateway.yaml.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: rows-api-tls
spec:
    secretName: rows-api-tls
    issuerRef:
        name: letsencrypt-http
        kind: ClusterIssuer
    dnsNames:
        - REPLACE.example.com
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: ows-api-routes
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - REPLACE.example.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: rows
                port: 4322
