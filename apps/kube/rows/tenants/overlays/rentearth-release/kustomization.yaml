apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rows-rentearth-release

resources:
    - namespace.yaml
    - ../../base

labels:
    - pairs:
          app.kubernetes.io/instance: rentearth-release
      includeSelectors: false

patches:
    - target:
          kind: Deployment
          name: rows
      patch: |-
          - op: add
            path: /spec/template/spec/containers/0/env/-
            value:
                name: OWS_TENANT_SLUG
                value: rentearth-release
          - op: add
            path: /spec/template/spec/containers/0/env/-
            value:
                name: OWS_ENV
                value: release
          - op: add
            path: /spec/template/spec/containers/0/env/-
            value:
                name: AGONES_FLEET
                value: ows-rentearth-release
    - target:
          kind: Job
          name: rows-seed
      patch: |-
          - op: add
            path: /spec/template/spec/containers/0/env/-
            value:
                name: CUSTOMER_NAME
                value: RentEarth
          - op: add
            path: /spec/template/spec/containers/0/env/-
            value:
                name: CUSTOMER_EMAIL
                value: admin@rentearth.com
          - op: add
            path: /spec/template/spec/containers/0/env/-
            value:
                name: MAP_NAME
                value: Lvl_Entry
          - op: add
            path: /spec/template/spec/containers/0/env/-
            value:
                name: ZONE_NAME
                value: Origin
