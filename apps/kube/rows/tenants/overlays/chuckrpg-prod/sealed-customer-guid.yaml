---
# STUB — re-seal before deploy. SealedSecrets are scoped to namespace + name, so this
# placeholder will NOT decrypt; the sealed-secrets controller leaves the target Secret
# uncreated until you replace it. Generate a real value (run once, do NOT commit the GUID):
#
#   SLUG=chuckrpg-prod; NS=rows-chuckrpg-prod
#   GUID=$(uuidgen | tr 'A-Z' 'a-z')
#   kubectl create secret generic rows-customer-guid \
#     --namespace "$NS" --from-literal=customer-guid="$GUID" --dry-run=client -o yaml \
#   | kubeseal --format yaml --controller-namespace sealed-secrets --controller-name sealed-secrets \
#   > apps/kube/rows/tenants/overlays/$SLUG/sealed-customer-guid.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
    name: rows-customer-guid
    namespace: rows-chuckrpg-prod
spec:
    encryptedData:
        customer-guid: PLACEHOLDER_RESEAL_BEFORE_DEPLOY
    template:
        metadata:
            name: rows-customer-guid
            namespace: rows-chuckrpg-prod
