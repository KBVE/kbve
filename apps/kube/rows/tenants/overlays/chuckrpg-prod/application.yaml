apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: rows-chuckrpg-prod
    namespace: argocd
    finalizers:
        - resources-finalizer.argocd.argoproj.io
    annotations:
        kbve.com/source-path: kube/rows/tenants/overlays/chuckrpg-prod
        kbve.com/manifest-path: apps/kube/rows/tenants/overlays/chuckrpg-prod
        kbve.com/application-file: kube/rows/tenants/overlays/chuckrpg-prod/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: game-server
        kbve.com/stack: rows
        kbve.com/deployment-model: multi-tenant-overlay
        kbve.com/tenant: chuckrpg-prod
spec:
    project: default
    source:
        repoURL: https://github.com/KBVE/kbve
        targetRevision: main
        path: apps/kube/rows/tenants/overlays/chuckrpg-prod
    destination:
        server: https://kubernetes.default.svc
        namespace: rows-chuckrpg-prod
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - PrunePropagationPolicy=foreground
            - PruneLast=true
        retry:
            limit: 5
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
    revisionHistoryLimit: 3
