apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
    name: kube-applications
    annotations:
        description: 'Main kustomization for all Kubernetes applications managed by ArgoCD'
        maintainer: 'kbve'
        updated-by: 'h0lybyte'
        last-updated: '2025-07-31'

resources:
    - argocd/application.yaml
    - namespace/application.yaml
    - cnpg/application.yaml
    - cnpg/plugins-application.yaml
    - cert-manager/application.yaml
    - sealed-secrets/application.yaml
    # Stakater Reloader — auto-restart deployments when configmaps/secrets change
    - reloader/application.yaml
    # CA staleness monitor — detects pods with stale serviceaccount CA mounts
    # after a cluster CA rotation. Read-only CronJob, emits JSON to Vector.
    - ca-staleness-monitor/application.yaml
    - keda/application.yaml
    - kyverno/application.yaml
    - crossplane/application.yaml
    - crossplane/providers-application.yaml
    - external-secrets/application.yaml
    - monitoring/application.yaml
    # Valkey — open-source Redis fork (Linux Foundation), secondary key-value store
    - valkey/application.yaml
    - storage/application.yaml
    - irc/application.yaml
    - kilobase/application.yaml
    - kong/application.yaml
    - auth/application.yaml
    - postgrest/application.yaml
    - realtime/application.yaml
    - storage-api/application.yaml
    - meta/application.yaml
    - studio/application.yaml
    - vector/application.yaml
    - discordsh/application.yaml
    - functions/application.yaml
    - kbve/application.yaml
    - clickhouse-crds/application.yaml
    - clickhouse-operator/application.yaml
    - clickhouse/application.yaml
    - cube/application.yaml

    - cityvote/application.yaml
    - herbmail/application.yaml
    - memes/application.yaml
    - jobboard/application.yaml
    - metrics/application.yaml
    # Windmill — workflow engine (replaced n8n), windmill.kbve.com
    - windmill/application.yaml
    - rabbitmq/application.yaml
    # rows = shared ROWS infra (ns `rows`): ows-valkey, externalsecrets, servicemonitor,
    # and the `rows-agones-allocator-binding` Kyverno ClusterPolicy that grants every
    # tenant's rows-instancelauncher SA GameServerAllocation rights (without it tenants 403).
    # Live in-cluster but was applied out-of-band; declare it here so app-of-apps owns it
    # and a rebuild-from-git reproduces it. Tenant overlays below layer on top.
    - rows/application.yaml
    - rows/tenants/overlays/chuckrpg-dev/application.yaml
    - rows/tenants/overlays/chuckrpg-beta/application.yaml
    - agones/application.yaml
    - agones/rows-tenants/chuckrpg-dev/application.yaml
    - agones/rows-tenants/chuckrpg-beta/application.yaml
    # - agones/rows-tenants/chuckrpg-prod/application.yaml  # DISABLED: prod fleet scaffolded; enable per chuckrpg-prod/application.yaml steps
    - agones/mc/application.yaml
    - agones/cryptothrone/application.yaml
    - agones/arpg/application.yaml
    - agones/factorio/application.yaml
    - chuckrpg/application.yaml
    # RareIcon — bullet-hell roguelite website + API
    - rareicon/application.yaml
    # KASM — VPN-tunneled desktop workspaces (Gluetun + WireGuard)
    - kasm/application.yaml
    - rentearth/application.yaml
    - cryptothrone/application.yaml
    # AngelScript UE dedicated server
    - angelscript/application.yaml
    # GitHub Actions Runner Controller (ARC)
    # Consolidated: controller includes helm chart + sealed secret + RBAC
    # Consolidated: runners includes helm chart + ExternalSecret/SecretStore
    - github/controller/application.yaml
    - github/runners/application.yaml

    # Gateway API CRDs (must sync before Cilium — sync-wave: -1)
    - gateway-api/application.yaml
    # Cilium CNI + WireGuard + Gateway API
    - cilium/application.yaml
    # Cilium LB IPAM — IP pools + L2 announcements
    - cilium/lb-application.yaml

    # ECK (Elastic Cloud on Kubernetes) fully retired — ES + Kibana were
    # unused (Vector ships to ClickHouse, no Kibana route, no consumers).

    # Forgejo — Git LFS server + Actions runner, UE asset storage on sdb
    - forgejo/application.yaml

    # Security Profiles Operator — SeccompProfile CRDs for Talos (no Localhost profiles)
    # CRDs split into their own app (sync-wave 1) so a CRD apiVersion graduation
    # applies ahead of the operator (wave 2) instead of wedging the whole app.
    - security-profiles-operator/application-crds.yaml
    - security-profiles-operator/application.yaml

    # Firecracker — microVM runtime service (edge function Tier 2 isolation)
    - firecracker/application.yaml

    # Multus CNI — multiple network interfaces for KubeVirt VMs
    - multus/application.yaml

    # KubeVirt — VM workloads on Talos (KVM in kernel, no extensions needed)
    # Operators installed manually: kubectl apply -f <upstream-operator.yaml>
    # ArgoCD manages namespace + KubeVirt CR + shared storage
    - kubevirt/application.yaml
    - kubevirt/cr-application.yaml
    # KEDA-driven VM scaling — start/stop VMs based on GitHub Actions queue
    - kubevirt/keda-application.yaml
    # File server — scale up to transfer files to VMs, scale down when done
    - kubevirt/file-server-application.yaml
    # Guacamole — browser-based RDP gateway for Windows VMs
    - kubevirt/guacamole-application.yaml
    - kubevirt/autologon-application.yaml
    # Runner — (re)register the GitHub Actions runner as Administrator on VM boot
    - kubevirt/runner-application.yaml
