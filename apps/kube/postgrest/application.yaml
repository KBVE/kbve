apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: postgrest
    namespace: argocd
    finalizers:
        - resources-finalizer.argocd.argoproj.io
    annotations:
        kbve.com/source-path: kube/postgrest
        kbve.com/manifest-path: apps/kube/postgrest/manifests
        kbve.com/application-file: kube/postgrest/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: application
        kbve.com/stack: supabase
spec:
    project: default
    source:
        repoURL: https://github.com/KBVE/kbve
        targetRevision: HEAD
        path: apps/kube/postgrest/manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: kilobase
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
            allowEmpty: false
        syncOptions:
            - CreateNamespace=false
            - PrunePropagationPolicy=foreground
            - PruneLast=true
            - ServerSideApply=true
            - Replace=true
        retry:
            limit: 5
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
    revisionHistoryLimit: 3
