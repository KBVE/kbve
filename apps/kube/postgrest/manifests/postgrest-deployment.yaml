apiVersion: apps/v1
kind: Deployment
metadata:
    name: postgrest
    namespace: kilobase
    labels:
        app: postgrest
        component: rest
        kbve.com/category: application
        kbve.com/stack: supabase
        kbve.com/managed-by: argocd
spec:
    replicas: 2
    selector:
        matchLabels:
            app: postgrest
    template:
        metadata:
            labels:
                app: postgrest
                component: rest
        spec:
            serviceAccountName: postgrest-sa
            containers:
                - name: postgrest
                  image: postgrest/postgrest:v14.12
                  command:
                      - postgrest
                  ports:
                      - containerPort: 3000
                        name: http
                  env:
                      - name: PGRST_DB_URI
                        valueFrom:
                            secretKeyRef:
                                name: postgrest-db-config
                                key: PGRST_DB_URI
                      - name: PGRST_DB_SCHEMAS
                        value: public,storage,graphql_public,tracker,profile,rentearth,meme,discordsh,forum,mc,gh,authz
                      - name: PGRST_DB_ANON_ROLE
                        value: anon
                      - name: PGRST_DB_USE_LEGACY_GUCS
                        value: 'false'
                      - name: PGRST_SERVER_PORT
                        value: '3000'
                      # Accept-both JWKS (oct HS256 + EC ES256 public) for the
                      # signing-key transition. PostgREST validates either alg;
                      # PGRST_APP_SETTINGS_JWT_SECRET stays the raw HS256 secret
                      # (exposed to DB functions, not a verification key).
                      - name: PGRST_JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: supabase-jwt-vendor
                                key: postgrest-jwks
                      - name: PGRST_APP_SETTINGS_JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: supabase-jwt
                                key: secret
                      - name: PGRST_APP_SETTINGS_JWT_EXP
                        valueFrom:
                            secretKeyRef:
                                name: supabase-jwt
                                key: expiry
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 3000
                      initialDelaySeconds: 30
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 3000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  resources:
                      requests:
                          memory: 256Mi
                          cpu: 200m
                      limits:
                          memory: 1Gi
                          cpu: 1000m
                  securityContext:
                      runAsUser: 1000
                      runAsGroup: 1000
                      runAsNonRoot: true
