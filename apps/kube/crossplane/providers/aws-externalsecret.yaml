# ServiceAccount for ExternalSecrets cross-namespace access
apiVersion: v1
kind: ServiceAccount
metadata:
    name: crossplane-external-secrets
    namespace: crossplane-system
    annotations:
        argocd.argoproj.io/sync-wave: '1'
---
# SecretStore: kilobase namespace (for AWS S3 credentials)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: crossplane-kilobase-secret-store
    namespace: crossplane-system
    annotations:
        argocd.argoproj.io/sync-wave: '1'
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: crossplane-external-secrets
                    namespace: crossplane-system
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: Pull AWS credentials from kilobase-s3-secret and
# reformat into INI format required by Crossplane ProviderConfig
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: crossplane-aws-credentials
    namespace: crossplane-system
    annotations:
        argocd.argoproj.io/sync-wave: '2'
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: crossplane-kilobase-secret-store
        kind: SecretStore
    target:
        name: aws-secret
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                creds: |
                    [default]
                    aws_access_key_id = {{ .keyId }}
                    aws_secret_access_key = {{ .accessKey }}
    data:
        - secretKey: keyId
          remoteRef:
              key: kilobase-s3-secret
              property: keyId
        - secretKey: accessKey
          remoteRef:
              key: kilobase-s3-secret
              property: accessKey
