apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: kilobase-remote-secret-store
    namespace: ows
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: ows-external-secrets
                    namespace: ows
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: ows-db-secrets
    namespace: ows
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: ows-db-credentials
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                db-connection-string: 'Host=supabase-cluster-rw.kilobase.svc.cluster.local;Port=5432;Database=supabase;Username=ows;Password={{ .dbpassword }};Options=-c search_path=ows,extensions,public;Maximum Pool Size=6;'
    data:
        - secretKey: dbpassword
          remoteRef:
              key: ows-db-password
              property: password
---
# RabbitMQ credentials — pulled from operator-managed secret in rabbitmq-system
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: rabbitmq-remote-secret-store
    namespace: ows
spec:
    provider:
        kubernetes:
            remoteNamespace: rabbitmq-system
            auth:
                serviceAccount:
                    name: ows-external-secrets
                    namespace: ows
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: ows-rabbitmq-secrets
    namespace: ows
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: rabbitmq-remote-secret-store
        kind: SecretStore
    target:
        name: ows-rabbitmq-credentials
        creationPolicy: Owner
    data:
        - secretKey: username
          remoteRef:
              key: rabbitmq-default-user
              property: username
        - secretKey: password
          remoteRef:
              key: rabbitmq-default-user
              property: password
        - secretKey: host
          remoteRef:
              key: rabbitmq-default-user
              property: host
