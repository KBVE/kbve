apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: kilobase-remote-secret-store
    namespace: ows
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: ows-external-secrets
                    namespace: ows
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: ows-db-secrets
    namespace: ows
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: ows-db-credentials
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                db-connection-string: 'Host=supabase-cluster-rw.kilobase.svc.cluster.local;Port=5432;Database=openworldserver;Username=postgres;Password={{ .dbpassword }};Maximum Pool Size=6;'
    data:
        - secretKey: dbpassword
          remoteRef:
              key: supabase-postgres
              property: password
