---
# OWS Public API — player login, registration, character creation
apiVersion: apps/v1
kind: Deployment
metadata:
    name: ows-publicapi
    namespace: ows
    labels:
        app: ows-publicapi
        app.kubernetes.io/part-of: ows
spec:
    replicas: 1
    selector:
        matchLabels:
            app: ows-publicapi
    template:
        metadata:
            labels:
                app: ows-publicapi
                app.kubernetes.io/part-of: ows
        spec:
            containers:
                - name: ows-publicapi
                  image: ghcr.io/kbve/ows-publicapi:0.10.4
                  imagePullPolicy: Always
                  env:
                      - name: OWSStorageConfig__OWSDBBackend
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: DATABASE
                      - name: OWSStorageConfig__OWSDBConnectionString
                        valueFrom:
                            secretKeyRef:
                                name: ows-db-credentials
                                key: db-connection-string
                      - name: OWSAPIPathConfig__InternalPublicApiURL
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: InternalPublicApiURL
                      - name: OWSAPIPathConfig__InternalInstanceManagementApiURL
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: InternalInstanceManagementApiURL
                      - name: OWSAPIPathConfig__InternalCharacterPersistenceApiURL
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: InternalCharacterPersistenceApiURL
                      - name: OWSAPIPathConfig__InternalGlobalDataApiURL
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: InternalGlobalDataApiURL
                      - name: UserSessionCacheOptions__HostName
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: UserSessionCacheHostName
                      - name: UserSessionCacheOptions__Port
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: UserSessionCachePort
                  ports:
                      - name: http
                        containerPort: 80
                        protocol: TCP
                  resources:
                      requests:
                          memory: '128Mi'
                          cpu: '100m'
                      limits:
                          memory: '512Mi'
                          cpu: '500m'
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 15
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
