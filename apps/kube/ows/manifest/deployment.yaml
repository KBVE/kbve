---
# OWS Management — admin web dashboard (Vue 3)
apiVersion: apps/v1
kind: Deployment
metadata:
    name: ows-management
    namespace: ows
    labels:
        app: ows-management
        app.kubernetes.io/part-of: ows
spec:
    replicas: 1
    selector:
        matchLabels:
            app: ows-management
    template:
        metadata:
            labels:
                app: ows-management
                app.kubernetes.io/part-of: ows
        spec:
            containers:
                - name: ows-management
                  image: ghcr.io/kbve/ows-management:0.10.4
                  imagePullPolicy: Always
                  env:
                      - name: OWSManagementOptions__OWSAPIKey
                        valueFrom:
                            secretKeyRef:
                                name: ows-customer-guid
                                key: customer-guid
                      - name: OWSStorageConfig__OWSDBBackend
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: DATABASE
                      - name: OWSStorageConfig__OWSDBConnectionString
                        valueFrom:
                            secretKeyRef:
                                name: ows-db-credentials
                                key: db-connection-string
                      - name: OWSAPIPathConfig__InternalPublicApiURL
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: InternalPublicApiURL
                      - name: OWSAPIPathConfig__InternalInstanceManagementApiURL
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: InternalInstanceManagementApiURL
                      - name: OWSAPIPathConfig__InternalCharacterPersistenceApiURL
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: InternalCharacterPersistenceApiURL
                      - name: OWSAPIPathConfig__InternalGlobalDataApiURL
                        valueFrom:
                            configMapKeyRef:
                                name: ows-config
                                key: InternalGlobalDataApiURL
                  ports:
                      - name: http
                        containerPort: 80
                        protocol: TCP
                  resources:
                      requests:
                          memory: '128Mi'
                          cpu: '100m'
                      limits:
                          memory: '512Mi'
                          cpu: '500m'
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 15
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
