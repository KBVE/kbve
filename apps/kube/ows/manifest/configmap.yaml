apiVersion: v1
kind: ConfigMap
metadata:
    name: ows-config
    namespace: ows
data:
    DATABASE: postgres
    InternalPublicApiURL: 'http://ows-publicapi.ows.svc.cluster.local/'
    InternalInstanceManagementApiURL: 'http://ows-instancemanagement.ows.svc.cluster.local/'
    InternalCharacterPersistenceApiURL: 'http://ows-characterpersistence.ows.svc.cluster.local/'
    InternalGlobalDataApiURL: 'http://ows-globaldata.ows.svc.cluster.local/'
    RabbitMQHostName: 'rabbitmq.rabbitmq-system.svc.cluster.local'
    RabbitMQPort: '5672'
    UserSessionCacheHostName: 'ows-valkey.ows.svc.cluster.local'
    UserSessionCachePort: '6379'
    # External hostname for game clients connecting to dedicated servers
    GameServerExternalHost: 'game.chuckrpg.com'
