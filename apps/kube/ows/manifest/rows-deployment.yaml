---
# ROWS — Rust OWS single-binary game backend (REST + gRPC)
apiVersion: apps/v1
kind: Deployment
metadata:
    name: rows
    namespace: ows
    labels:
        app: rows
        app.kubernetes.io/part-of: ows
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: rows
    template:
        metadata:
            labels:
                app: rows
                app.kubernetes.io/part-of: ows
        spec:
            serviceAccountName: ows-instancelauncher
            # TODO(security): Enable after verifying ROWS doesn't write to filesystem
            # securityContext:
            #     runAsNonRoot: true
            #     runAsUser: 1000
            #     runAsGroup: 1000
            #     fsGroup: 1000
            # TODO(graceful-shutdown): Increase after session drain is implemented
            # terminationGracePeriodSeconds: 60
            containers:
                - name: rows
                  image: ghcr.io/kbve/rows:0.1.22
                  imagePullPolicy: Always
                  # TODO(security): Enable after verifying compatibility
                  # securityContext:
                  #     allowPrivilegeEscalation: false
                  #     readOnlyRootFilesystem: true
                  #     capabilities:
                  #         drop: ["ALL"]
                  env:
                      # ─── Core ───────────────────────────────
                      - name: HTTP_HOST
                        value: '0.0.0.0'
                      - name: HTTP_PORT
                        value: '4322'
                      - name: DOCS_PORT
                        value: '4323'
                      - name: RUST_LOG
                        value: 'info'
                      # ─── Secrets ─────────────────────────────
                      - name: DATABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: ows-db-credentials
                                key: db-url
                      - name: RABBITMQ_URL
                        valueFrom:
                            secretKeyRef:
                                name: ows-rabbitmq-credentials
                                key: amqp-url
                      - name: OWS_API_KEY
                        valueFrom:
                            secretKeyRef:
                                name: ows-customer-guid
                                key: customer-guid
                      # ─── Agones ──────────────────────────────
                      - name: AGONES_NAMESPACE
                        value: 'arc-runners'
                      - name: AGONES_FLEET
                        value: 'ows-hubworld'
                      - name: AGONES_API_TIMEOUT_SECS
                        value: '10'
                      - name: AGONES_CIRCUIT_BREAKER_THRESHOLD
                        value: '5'
                      - name: AGONES_CIRCUIT_BREAKER_RESET_SECS
                        value: '30'
                      # ─── Spinup Tuning ───────────────────────
                      - name: ROWS_SPINUP_TIMEOUT_SECS
                        value: '60'
                      - name: ROWS_SPINUP_POLL_INTERVAL_MS
                        value: '2000'
                      - name: ROWS_SPINUP_INITIAL_DELAY_MS
                        value: '3000'
                  ports:
                      - name: http
                        containerPort: 4322
                        protocol: TCP
                      - name: docs
                        containerPort: 4323
                        protocol: TCP
                  resources:
                      requests:
                          memory: '1Gi'
                          cpu: '500m'
                      limits:
                          memory: '4Gi'
                          cpu: '2000m'
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /ready
                          port: http
                      initialDelaySeconds: 3
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
    name: rows
    namespace: ows
    labels:
        app: rows
        app.kubernetes.io/part-of: ows
spec:
    type: ClusterIP
    selector:
        app: rows
    ports:
        - name: http
          port: 4322
          targetPort: 4322
          protocol: TCP
        - name: docs
          port: 4323
          targetPort: 4323
          protocol: TCP
---
# PodDisruptionBudget — ensure at least 1 pod during rolling updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
    name: rows-pdb
    namespace: ows
    labels:
        app: rows
        app.kubernetes.io/part-of: ows
spec:
    minAvailable: 1
    selector:
        matchLabels:
            app: rows
