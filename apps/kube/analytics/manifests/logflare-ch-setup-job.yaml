apiVersion: v1
kind: ConfigMap
metadata:
    name: logflare-ch-setup-v5-script
    namespace: kilobase
    labels:
        kbve.com/category: observability
        kbve.com/stack: supabase
        kbve.com/managed-by: argocd
data:
    setup.sh:
        "#!/bin/sh\nset -eu\n\nLOGFLARE_API=\"http://analytics.kilobase.svc.cluster.local:4000\"\
        \nMAX_RETRIES=30\nRETRY_INTERVAL=10\n\n# --- Wait for Logflare to be healthy ---\n\
        echo \"Waiting for Logflare to be healthy...\"\nattempt=0\nuntil curl -sf \"${LOGFLARE_API}/health\"\
        \ > /dev/null 2>&1; do\n  attempt=$((attempt + 1))\n  if [ \"$attempt\" -ge \"\
        $MAX_RETRIES\" ]; then\n    echo \"ERROR: Logflare not healthy after ${MAX_RETRIES}\
        \ attempts\"\n    exit 1\n  fi\n  echo \"  Attempt ${attempt}/${MAX_RETRIES} —\
        \ waiting ${RETRY_INTERVAL}s...\"\n  sleep \"$RETRY_INTERVAL\"\ndone\necho \"\
        Logflare is healthy.\"\n\n# --- Verify ClickHouse admin connectivity ---\necho\
        \ \"Verifying ClickHouse admin connectivity...\"\nCH_TEST=$(curl -sf --max-time\
        \ 10 \"${CH_ADMIN_URL}/?user=${CH_ADMIN_USERNAME}&password=${CH_ADMIN_PASSWORD}\"\
        \ \\\n  -d \"SELECT 1\" 2>&1) || {\n  echo \"ERROR: Cannot connect to ClickHouse\
        \ at ${CH_ADMIN_URL} with admin user\"\n  exit 1\n}\necho \"ClickHouse admin connection\
        \ OK.\"\n\n# --- Create the logflare database ---\necho \"Creating logflare database...\"\
        \nDB_RESULT=$(curl -sf --max-time 10 \"${CH_ADMIN_URL}/?user=${CH_ADMIN_USERNAME}&password=${CH_ADMIN_PASSWORD}\"\
        \ \\\n  -d \"CREATE DATABASE IF NOT EXISTS ${CH_DATABASE} ON CLUSTER 'cluster'\"\
        \ 2>&1) || {\n  echo \"ERROR: Failed to create database: ${DB_RESULT}\"\n  exit\
        \ 1\n}\necho \"Database '${CH_DATABASE}' ready.\"\n\n# --- Create logflare SQL\
        \ user (idempotent) ---\necho \"Creating logflare SQL user...\"\nUSER_RESULT=$(curl\
        \ -sf --max-time 10 \"${CH_ADMIN_URL}/?user=${CH_ADMIN_USERNAME}&password=${CH_ADMIN_PASSWORD}\"\
        \ \\\n  -d \"CREATE USER IF NOT EXISTS ${CH_USERNAME} ON CLUSTER 'cluster' IDENTIFIED\
        \ WITH sha256_password BY '${CH_PASSWORD}'\" 2>&1) || {\n  echo \"ERROR: Failed\
        \ to create logflare user: ${USER_RESULT}\"\n  exit 1\n}\necho \"User '${CH_USERNAME}'\
        \ ready.\"\n\n# Grants are owned by the ch-ingest-grants Job (apps/kube/clickhouse)\
        \ —\n# it issues CLUSTER + per-database privileges (logflare/telemetry/observability)\n\
        # as the shared `logflare` ingest user. Canonical list: packages/data/ch/schemas/grants.sql\n\
        \n# --- Verify logflare user connectivity ---\necho \"Verifying logflare user\
        \ connectivity...\"\nLF_TEST=$(curl -sf --max-time 10 \"${CH_URL}/?user=${CH_USERNAME}&password=${CH_PASSWORD}\"\
        \ \\\n  -d \"SELECT 1\" 2>&1) || {\n  echo \"ERROR: Cannot connect to ClickHouse\
        \ as logflare user\"\n  exit 1\n}\necho \"Logflare user connection OK.\"\n\n#\
        \ --- Remove existing ClickHouse backend if present ---\necho \"Checking for existing\
        \ ClickHouse backends...\"\nEXISTING=$(curl -sf \"${LOGFLARE_API}/api/backends\"\
        \ \\\n  -H \"Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}\" \\\n  -H \"Accept:\
        \ application/json\" || echo \"[]\")\n\nOLD_TOKEN=$(echo \"$EXISTING\" | grep\
        \ -o '\"type\":\"clickhouse\"[^}]*\"token\":\"[^\"]*\"' \\\n  | sed -n 's/.*\"\
        token\":\"\\([^\"]*\\)\".*/\\1/p' || true)\n\nif [ -n \"$OLD_TOKEN\" ]; then\n\
        \  echo \"Removing old ClickHouse backend (token: ${OLD_TOKEN})...\"\n  curl -sf\
        \ -X DELETE \"${LOGFLARE_API}/api/backends/${OLD_TOKEN}\" \\\n    -H \"Authorization:\
        \ Bearer ${LOGFLARE_PRIVATE_TOKEN}\" > /dev/null 2>&1 || \\\n    echo \"  WARNING:\
        \ Failed to delete old backend, proceeding anyway\"\n  echo \"Old backend removed.\"\
        \nfi\n\n# --- Create ClickHouse backend via Logflare API (using logflare user)\
        \ ---\necho \"Creating ClickHouse backend...\"\nBACKEND_RESPONSE=$(curl -sf -X\
        \ POST \"${LOGFLARE_API}/api/backends\" \\\n  -H \"Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}\"\
        \ \\\n  -H \"Content-Type: application/json\" \\\n  -d \"{\n    \\\"name\\\":\
        \ \\\"ClickHouse cluster\\\",\n    \\\"type\\\": \\\"clickhouse\\\",\n    \\\"\
        config\\\": {\n      \\\"url\\\": \\\"${CH_URL}\\\",\n      \\\"username\\\":\
        \ \\\"${CH_USERNAME}\\\",\n      \\\"password\\\": \\\"${CH_PASSWORD}\\\",\n \
        \     \\\"database\\\": \\\"${CH_DATABASE}\\\",\n      \\\"port\\\": ${CH_PORT}\n\
        \    }\n  }\")\n\nif [ -z \"$BACKEND_RESPONSE\" ]; then\n  echo \"ERROR: Failed\
        \ to create ClickHouse backend\"\n  exit 1\nfi\n\nBACKEND_TOKEN=$(echo \"$BACKEND_RESPONSE\"\
        \ | sed -n 's/.*\"token\":\"\\([^\"]*\\)\".*/\\1/p')\necho \"ClickHouse backend\
        \ created with token: ${BACKEND_TOKEN}\"\n\n# --- Test backend connection via\
        \ Logflare ---\necho \"Testing backend connection...\"\nTEST_RESULT=$(curl -sf\
        \ \"${LOGFLARE_API}/api/backends/${BACKEND_TOKEN}/test\" \\\n  -H \"Authorization:\
        \ Bearer ${LOGFLARE_PRIVATE_TOKEN}\" || echo \"skipped\")\necho \"Connection test:\
        \ ${TEST_RESULT}\"\n\n# --- Assign all sources to the ClickHouse backend ---\n\
        echo \"Fetching sources...\"\nSOURCES=$(curl -sf \"${LOGFLARE_API}/api/sources\"\
        \ \\\n  -H \"Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}\" \\\n  -H \"Accept:\
        \ application/json\")\n\necho \"$SOURCES\" | grep -o '\"token\":\"[^\"]*\"' |\
        \ sed 's/\"token\":\"//;s/\"//' | while read -r SOURCE_TOKEN; do\n  echo \"  Assigning\
        \ source ${SOURCE_TOKEN} to CH backend...\"\n  curl -sf -X POST \"${LOGFLARE_API}/api/sources/${SOURCE_TOKEN}/backends/${BACKEND_TOKEN}\"\
        \ \\\n    -H \"Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}\" \\\n    -H \"\
        Content-Type: application/json\" > /dev/null 2>&1 || \\\n    echo \"    WARNING:\
        \ Failed to assign source ${SOURCE_TOKEN}\"\ndone\n\necho \"\"\necho \"Setup complete.\
        \ ClickHouse backend configured and sources assigned.\"\necho \"Logflare will\
        \ auto-create OTEL tables on first log ingest.\"\n"
---
apiVersion: batch/v1
kind: Job
metadata:
    name: logflare-ch-setup-v5
    namespace: kilobase
    labels:
        app: logflare-ch-setup-v5
        component: analytics
        kbve.com/category: observability
        kbve.com/stack: supabase
        kbve.com/managed-by: argocd
    annotations:
        kbve.sh/last-updated: '2026-03-16'
        argocd.argoproj.io/hook: PostSync
spec:
    ttlSecondsAfterFinished: 86400
    backoffLimit: 3
    template:
        metadata:
            labels:
                app: logflare-ch-setup-v5
        spec:
            restartPolicy: OnFailure
            containers:
                - name: setup
                  image: curlimages/curl:8.12.1
                  command:
                      - /bin/sh
                      - /scripts/setup.sh
                  env:
                      - name: LOGFLARE_PRIVATE_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: logflare-config
                                key: private-access-token
                      - name: CH_ADMIN_URL
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-admin-credentials
                                key: url
                      - name: CH_ADMIN_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-admin-credentials
                                key: username
                      - name: CH_ADMIN_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-admin-credentials
                                key: password
                      - name: CH_URL
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-url
                      - name: CH_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-username
                      - name: CH_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-password
                      - name: CH_DATABASE
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-database
                      - name: CH_PORT
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-port
                  volumeMounts:
                      - name: setup-script
                        mountPath: /scripts
                        readOnly: true
                  resources:
                      requests:
                          memory: 32Mi
                          cpu: 50m
                      limits:
                          memory: 64Mi
                          cpu: 100m
                  securityContext:
                      runAsNonRoot: true
                      runAsUser: 1000
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
            volumes:
                - name: setup-script
                  configMap:
                      name: logflare-ch-setup-v5-script
                      defaultMode: 365
