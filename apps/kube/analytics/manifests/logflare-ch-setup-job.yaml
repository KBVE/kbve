---
apiVersion: v1
kind: ConfigMap
metadata:
    name: logflare-ch-setup-v5-script
    namespace: kilobase
data:
    setup.sh: |
        #!/bin/sh
        set -eu

        LOGFLARE_API="http://analytics.kilobase.svc.cluster.local:4000"
        MAX_RETRIES=30
        RETRY_INTERVAL=10

        # --- Wait for Logflare to be healthy ---
        echo "Waiting for Logflare to be healthy..."
        attempt=0
        until curl -sf "${LOGFLARE_API}/health" > /dev/null 2>&1; do
          attempt=$((attempt + 1))
          if [ "$attempt" -ge "$MAX_RETRIES" ]; then
            echo "ERROR: Logflare not healthy after ${MAX_RETRIES} attempts"
            exit 1
          fi
          echo "  Attempt ${attempt}/${MAX_RETRIES} — waiting ${RETRY_INTERVAL}s..."
          sleep "$RETRY_INTERVAL"
        done
        echo "Logflare is healthy."

        # --- Verify ClickHouse admin connectivity ---
        echo "Verifying ClickHouse admin connectivity..."
        CH_TEST=$(curl -sf --max-time 10 "${CH_ADMIN_URL}/?user=${CH_ADMIN_USERNAME}&password=${CH_ADMIN_PASSWORD}" \
          -d "SELECT 1" 2>&1) || {
          echo "ERROR: Cannot connect to ClickHouse at ${CH_ADMIN_URL} with admin user"
          exit 1
        }
        echo "ClickHouse admin connection OK."

        # --- Create the logflare database ---
        echo "Creating logflare database..."
        DB_RESULT=$(curl -sf --max-time 10 "${CH_ADMIN_URL}/?user=${CH_ADMIN_USERNAME}&password=${CH_ADMIN_PASSWORD}" \
          -d "CREATE DATABASE IF NOT EXISTS ${CH_DATABASE} ON CLUSTER 'cluster'" 2>&1) || {
          echo "ERROR: Failed to create database: ${DB_RESULT}"
          exit 1
        }
        echo "Database '${CH_DATABASE}' ready."

        # --- Create logflare SQL user (idempotent) ---
        echo "Creating logflare SQL user..."
        USER_RESULT=$(curl -sf --max-time 10 "${CH_ADMIN_URL}/?user=${CH_ADMIN_USERNAME}&password=${CH_ADMIN_PASSWORD}" \
          -d "CREATE USER IF NOT EXISTS ${CH_USERNAME} ON CLUSTER 'cluster' IDENTIFIED WITH sha256_password BY '${CH_PASSWORD}'" 2>&1) || {
          echo "ERROR: Failed to create logflare user: ${USER_RESULT}"
          exit 1
        }
        echo "User '${CH_USERNAME}' ready."

        # --- Grant permissions to logflare user ---
        echo "Granting permissions..."
        GRANT_RESULT=$(curl -sf --max-time 10 "${CH_ADMIN_URL}/?user=${CH_ADMIN_USERNAME}&password=${CH_ADMIN_PASSWORD}" \
          -d "GRANT ALL ON ${CH_DATABASE}.* TO ${CH_USERNAME} ON CLUSTER 'cluster'" 2>&1) || {
          echo "ERROR: Failed to grant permissions: ${GRANT_RESULT}"
          exit 1
        }
        echo "Permissions granted to '${CH_USERNAME}' on '${CH_DATABASE}'."

        # --- Verify logflare user connectivity ---
        echo "Verifying logflare user connectivity..."
        LF_TEST=$(curl -sf --max-time 10 "${CH_URL}/?user=${CH_USERNAME}&password=${CH_PASSWORD}" \
          -d "SELECT 1" 2>&1) || {
          echo "ERROR: Cannot connect to ClickHouse as logflare user"
          exit 1
        }
        echo "Logflare user connection OK."

        # --- Remove existing ClickHouse backend if present ---
        echo "Checking for existing ClickHouse backends..."
        EXISTING=$(curl -sf "${LOGFLARE_API}/api/backends" \
          -H "Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}" \
          -H "Accept: application/json" || echo "[]")

        OLD_TOKEN=$(echo "$EXISTING" | grep -o '"type":"clickhouse"[^}]*"token":"[^"]*"' \
          | sed -n 's/.*"token":"\([^"]*\)".*/\1/p' || true)

        if [ -n "$OLD_TOKEN" ]; then
          echo "Removing old ClickHouse backend (token: ${OLD_TOKEN})..."
          curl -sf -X DELETE "${LOGFLARE_API}/api/backends/${OLD_TOKEN}" \
            -H "Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}" > /dev/null 2>&1 || \
            echo "  WARNING: Failed to delete old backend, proceeding anyway"
          echo "Old backend removed."
        fi

        # --- Create ClickHouse backend via Logflare API (using logflare user) ---
        echo "Creating ClickHouse backend..."
        BACKEND_RESPONSE=$(curl -sf -X POST "${LOGFLARE_API}/api/backends" \
          -H "Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "{
            \"name\": \"ClickHouse cluster\",
            \"type\": \"clickhouse\",
            \"config\": {
              \"url\": \"${CH_URL}\",
              \"username\": \"${CH_USERNAME}\",
              \"password\": \"${CH_PASSWORD}\",
              \"database\": \"${CH_DATABASE}\",
              \"port\": ${CH_PORT}
            }
          }")

        if [ -z "$BACKEND_RESPONSE" ]; then
          echo "ERROR: Failed to create ClickHouse backend"
          exit 1
        fi

        BACKEND_TOKEN=$(echo "$BACKEND_RESPONSE" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
        echo "ClickHouse backend created with token: ${BACKEND_TOKEN}"

        # --- Test backend connection via Logflare ---
        echo "Testing backend connection..."
        TEST_RESULT=$(curl -sf "${LOGFLARE_API}/api/backends/${BACKEND_TOKEN}/test" \
          -H "Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}" || echo "skipped")
        echo "Connection test: ${TEST_RESULT}"

        # --- Assign all sources to the ClickHouse backend ---
        echo "Fetching sources..."
        SOURCES=$(curl -sf "${LOGFLARE_API}/api/sources" \
          -H "Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}" \
          -H "Accept: application/json")

        echo "$SOURCES" | grep -o '"token":"[^"]*"' | sed 's/"token":"//;s/"//' | while read -r SOURCE_TOKEN; do
          echo "  Assigning source ${SOURCE_TOKEN} to CH backend..."
          curl -sf -X POST "${LOGFLARE_API}/api/sources/${SOURCE_TOKEN}/backends/${BACKEND_TOKEN}" \
            -H "Authorization: Bearer ${LOGFLARE_PRIVATE_TOKEN}" \
            -H "Content-Type: application/json" > /dev/null 2>&1 || \
            echo "    WARNING: Failed to assign source ${SOURCE_TOKEN}"
        done

        echo ""
        echo "Setup complete. ClickHouse backend configured and sources assigned."
        echo "Logflare will auto-create OTEL tables on first log ingest."

---
apiVersion: batch/v1
kind: Job
metadata:
    name: logflare-ch-setup-v5
    namespace: kilobase
    labels:
        app: logflare-ch-setup-v5
        component: analytics
    annotations:
        kbve.sh/last-updated: '2026-03-16'
        argocd.argoproj.io/hook: PostSync
spec:
    ttlSecondsAfterFinished: 86400
    backoffLimit: 3
    template:
        metadata:
            labels:
                app: logflare-ch-setup-v5
        spec:
            restartPolicy: OnFailure
            containers:
                - name: setup
                  image: curlimages/curl:8.12.1
                  command: ['/bin/sh', '/scripts/setup.sh']
                  env:
                      - name: LOGFLARE_PRIVATE_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: logflare-config
                                key: private-access-token
                      # Admin credentials (for SQL bootstrapping)
                      - name: CH_ADMIN_URL
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-admin-credentials
                                key: url
                      - name: CH_ADMIN_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-admin-credentials
                                key: username
                      - name: CH_ADMIN_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-admin-credentials
                                key: password
                      # Logflare user credentials (for Logflare API backend config)
                      - name: CH_URL
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-url
                      - name: CH_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-username
                      - name: CH_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-password
                      - name: CH_DATABASE
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-database
                      - name: CH_PORT
                        valueFrom:
                            secretKeyRef:
                                name: logflare-ch-config
                                key: ch-port
                  volumeMounts:
                      - name: setup-script
                        mountPath: /scripts
                        readOnly: true
                  resources:
                      requests:
                          memory: '32Mi'
                          cpu: '50m'
                      limits:
                          memory: '64Mi'
                          cpu: '100m'
                  securityContext:
                      runAsNonRoot: true
                      runAsUser: 1000
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
            volumes:
                - name: setup-script
                  configMap:
                      name: logflare-ch-setup-v5-script
                      defaultMode: 0555
