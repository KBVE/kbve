apiVersion: v1
kind: ServiceAccount
metadata:
    name: studio-gate-sa
    namespace: kilobase
    labels:
        app: studio-gate
        kbve.com/category: application
        kbve.com/stack: supabase
        kbve.com/managed-by: argocd
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: studio-gate
    namespace: kilobase
    labels:
        app: studio-gate
        kbve.com/category: application
        kbve.com/stack: supabase
        kbve.com/managed-by: argocd
    annotations:
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: studio-gate
    template:
        metadata:
            labels:
                app: studio-gate
        spec:
            serviceAccountName: studio-gate-sa
            automountServiceAccountToken: false
            securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: kbve-gate
                  image: ghcr.io/kbve/kbve-gate:0.1.8
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: gateway
                        containerPort: 5678
                        protocol: TCP
                  env:
                      - name: GATE_LISTEN
                        value: 0.0.0.0:5678
                      - name: GATE_UPSTREAM
                        value: http://studio:3000
                      - name: GATE_AUTHZ
                        value: is_staff
                      - name: GATE_STAFF_SCHEMA
                        value: authz
                      - name: GATE_STAFF_RPC
                        value: is_superadmin
                      - name: GATE_LOGIN_REDIRECT
                        value: https://kbve.com/login
                      - name: GATE_COOKIE_DOMAIN
                        value: .kbve.com
                      - name: SUPABASE_URL
                        value: http://kong.kilobase.svc.cluster.local:8000
                      - name: SUPABASE_JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: supabase-jwt
                                key: secret
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-jwt
                                key: anon-key
                      - name: RUST_LOG
                        value: warn
                  resources:
                      requests:
                          memory: 64Mi
                          cpu: 50m
                      limits:
                          memory: 128Mi
                          cpu: 500m
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: gateway
                      initialDelaySeconds: 5
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: gateway
                      initialDelaySeconds: 3
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
    name: studio-gate
    namespace: kilobase
    labels:
        app: studio-gate
        kbve.com/category: application
        kbve.com/stack: supabase
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: studio-gate
    ports:
        - name: http
          port: 5678
          targetPort: 5678
          protocol: TCP
