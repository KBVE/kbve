apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: argocd-route
    namespace: argocd
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - argo.kbve.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: argocd-server
                port: 443
