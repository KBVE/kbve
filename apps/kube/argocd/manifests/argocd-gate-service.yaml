apiVersion: v1
kind: Service
metadata:
    name: argocd-gate
    namespace: argocd
    labels:
        app: argocd-gate
        kbve.com/category: infrastructure
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: argocd-gate
    ports:
        - name: http
          port: 5678
          targetPort: 5678
          protocol: TCP
