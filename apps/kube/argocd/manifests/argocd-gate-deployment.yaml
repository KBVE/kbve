apiVersion: apps/v1
kind: Deployment
metadata:
    name: argocd-gate
    namespace: argocd
    labels:
        app: argocd-gate
        kbve.com/category: infrastructure
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: argocd-gate
    template:
        metadata:
            labels:
                app: argocd-gate
        spec:
            serviceAccountName: argocd-gate-sa
            automountServiceAccountToken: false
            securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: kbve-gate
                  image: ghcr.io/kbve/kbve-gate:0.1.7
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: gateway
                        containerPort: 5678
                        protocol: TCP
                  env:
                      - name: GATE_LISTEN
                        value: 0.0.0.0:5678
                      - name: GATE_UPSTREAM
                        value: https://argocd-server.argocd.svc.cluster.local:443
                      - name: GATE_UPSTREAM_CA_CERT_PATH
                        value: /etc/ssl/argocd/ca.crt
                      - name: GATE_UPSTREAM_BEARER
                        valueFrom:
                            secretKeyRef:
                                name: argocd-gate-argo-token
                                key: token
                      - name: GATE_AUTHZ
                        value: is_staff
                      - name: GATE_STAFF_SCHEMA
                        value: forum
                      - name: GATE_LOGIN_REDIRECT
                        value: https://kbve.com/login
                      - name: GATE_COOKIE_DOMAIN
                        value: .kbve.com
                      - name: SUPABASE_URL
                        value: http://kong.kilobase.svc.cluster.local:8000
                      - name: SUPABASE_JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: argocd-gate-supabase-jwt
                                key: SUPABASE_JWT_SECRET
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: argocd-gate-supabase-jwt
                                key: anon-key
                      - name: RUST_LOG
                        value: info
                  resources:
                      requests:
                          memory: 64Mi
                          cpu: 50m
                      limits:
                          memory: 128Mi
                          cpu: 500m
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: argocd-ca
                        mountPath: /etc/ssl/argocd
                        readOnly: true
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: gateway
                      initialDelaySeconds: 5
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: gateway
                      initialDelaySeconds: 3
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
            volumes:
                - name: argocd-ca
                  secret:
                      secretName: argocd-server-tls
                      items:
                          - key: ca.crt
                            path: ca.crt
