apiVersion: v1
kind: ServiceAccount
metadata:
    name: argocd-gate-sa
    namespace: argocd
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: argocd-gate-external-secrets
    namespace: argocd
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: argocd-gate-supabase-secret-store
    namespace: argocd
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: argocd-gate-external-secrets
                    namespace: argocd
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: argocd-gate-supabase-jwt
    namespace: argocd
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: argocd-gate-supabase-secret-store
        kind: SecretStore
    target:
        name: argocd-gate-supabase-jwt
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                SUPABASE_JWT_SECRET: '{{ .jwt_secret }}'
                anon-key: '{{ .anonkey }}'
    data:
        - secretKey: jwt_secret
          remoteRef:
              key: supabase-jwt
              property: secret
        - secretKey: anonkey
          remoteRef:
              key: supabase-jwt
              property: anon-key
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: argocd-gate-argo-token-store
    namespace: argocd
spec:
    provider:
        kubernetes:
            remoteNamespace: kbve
            auth:
                serviceAccount:
                    name: argocd-gate-external-secrets
                    namespace: argocd
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: argocd-gate-argo-token
    namespace: argocd
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: argocd-gate-argo-token-store
        kind: SecretStore
    target:
        name: argocd-gate-argo-token
        creationPolicy: Owner
    data:
        - secretKey: token
          remoteRef:
              key: argocd-auth
              property: argocd-auth-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: argocd-gate-supabase-access
    namespace: kilobase
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['supabase-jwt']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: argocd-gate-supabase-access-binding
    namespace: kilobase
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: argocd-gate-supabase-access
subjects:
    - kind: ServiceAccount
      name: argocd-gate-external-secrets
      namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: argocd-gate-argo-token-access
    namespace: kbve
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['argocd-auth']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: argocd-gate-argo-token-access-binding
    namespace: kbve
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: argocd-gate-argo-token-access
subjects:
    - kind: ServiceAccount
      name: argocd-gate-external-secrets
      namespace: argocd
