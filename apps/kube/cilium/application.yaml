apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: cilium
    namespace: argocd
    annotations:
        kbve.com/source-path: kube/cilium
        kbve.com/manifest-path: kube/cilium
        kbve.com/application-file: kube/cilium/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: networking
        kbve.com/stack: cilium
spec:
    project: default
    sources:
        - repoURL: https://helm.cilium.io
          targetRevision: 1.19.4
          chart: cilium
          helm:
              releaseName: cilium
              valueFiles:
                  - $values/apps/kube/cilium/values.yaml
        - repoURL: https://github.com/kbve/kbve
          targetRevision: main
          ref: values
    destination:
        server: https://kubernetes.default.svc
        namespace: kube-system
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=false
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
        retry:
            limit: 3
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
