## Cilium Helm values for Talos Linux (v1.8.0+)
## Reference: https://docs.siderolabs.com/kubernetes-guides/cni/deploying-cilium

# CNI — allow Multus to coexist with Cilium
cni:
    exclusive: false

# Device — pin Cilium external/native device to br0 after bridge setup.
# br0 holds the node IP (142.132.206.74) and default route.
# Without this, Cilium auto-detects flannel.1 (legacy) which can't serve external LB traffic.
devices:
    - br0

# NodePort direct routing device — must match the external-facing interface.
nodePort:
    directRoutingDevice: br0

ipam:
    mode: kubernetes

# kube-proxy replacement — ENABLED. Phase 1 CNI swap completed 2026-03-19.
# Talos machine config: cluster.proxy.disabled=true, cni.name=none.
kubeProxyReplacement: true
k8sServiceHost: localhost # KubePrism (already enabled on port 7445)
k8sServicePort: 7445

# Talos cgroup v2 — do not auto-mount, use host path
cgroup:
    autoMount:
        enabled: false
    hostRoot: /sys/fs/cgroup

# Talos security — SYS_MODULE not allowed, must be explicitly excluded
securityContext:
    capabilities:
        ciliumAgent:
            - CHOWN
            - KILL
            - NET_ADMIN
            - NET_RAW
            - IPC_LOCK
            - SYS_ADMIN
            - SYS_RESOURCE
            - DAC_OVERRIDE
            - FOWNER
            - SETGID
            - SETUID
        cleanCiliumState:
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_RESOURCE

# WireGuard encryption — pod-to-pod + node-to-node
encryption:
    enabled: true
    type: wireguard
    nodeEncryption: true

# Observability — Hubble network flow visibility
hubble:
    enabled: true
    relay:
        enabled: true
    ui:
        enabled: true

# Gateway API — LB service mode (working on 1.18.0)
gatewayAPI:
    enabled: true
    enableAlpn: true
    enableAppProtocol: true

# L2 announcements — replaces MetalLB
# Includes ^br.* for bridge interface support
l2announcements:
    enabled: true

externalIPs:
    enabled: true

operator:
    replicas: 1
