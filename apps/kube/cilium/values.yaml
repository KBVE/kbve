## Cilium Helm values for Talos Linux (v1.8.0+)
## Reference: https://docs.siderolabs.com/kubernetes-guides/cni/deploying-cilium

# CNI — allow Multus to coexist with Cilium
cni:
    exclusive: false

ipam:
    mode: kubernetes

# kube-proxy replacement — ENABLED. Phase 1 CNI swap completed 2026-03-19.
# Talos machine config: cluster.proxy.disabled=true, cni.name=none.
kubeProxyReplacement: true
k8sServiceHost: localhost # KubePrism (already enabled on port 7445)
k8sServicePort: 7445

# Talos cgroup v2 — do not auto-mount, use host path
cgroup:
    autoMount:
        enabled: false
    hostRoot: /sys/fs/cgroup

# Talos security — SYS_MODULE not allowed, must be explicitly excluded
securityContext:
    capabilities:
        ciliumAgent:
            - CHOWN
            - KILL
            - NET_ADMIN
            - NET_RAW
            - IPC_LOCK
            - SYS_ADMIN
            - SYS_RESOURCE
            - DAC_OVERRIDE
            - FOWNER
            - SETGID
            - SETUID
        cleanCiliumState:
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_RESOURCE

# WireGuard encryption — pod-to-pod + node-to-node
encryption:
    enabled: true
    type: wireguard
    nodeEncryption: true

# Observability — Hubble network flow visibility
hubble:
    enabled: true
    relay:
        enabled: true
    ui:
        enabled: true

# Gateway API — host-network mode bypasses broken LB→Envoy TPROXY path in 1.19.x
# Envoy binds directly on the node, no LoadBalancer service needed.
# Host-network and LB service modes are mutually exclusive.
# Ref: https://docs.cilium.io/en/stable/network/servicemesh/gateway-api/gateway-api/#host-network-mode
gatewayAPI:
    enabled: true
    enableAlpn: true
    enableAppProtocol: true
    hostNetwork:
        enabled: true
        nodes:
            matchLabels:
                node.kbve.com/type: dedicated-server

# Envoy — NET_BIND_SERVICE required for privileged ports (80/443) in host-network mode
envoy:
    enabled: true
    securityContext:
        capabilities:
            keepCapNetBindService: true
            envoy:
                - NET_BIND_SERVICE

# L2 announcements — replaces MetalLB
l2announcements:
    enabled: true

externalIPs:
    enabled: true

operator:
    replicas: 1
