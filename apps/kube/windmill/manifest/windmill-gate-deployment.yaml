# kbve-gate runs as a standalone deployment (not a sidecar) because the
# Windmill helm chart owns the app Deployment. HTTPRoute -> gate -> windmill-app.
apiVersion: apps/v1
kind: Deployment
metadata:
    name: windmill-gate
    namespace: windmill
    labels:
        app: windmill-gate
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: windmill-gate
    template:
        metadata:
            labels:
                app: windmill-gate
        spec:
            automountServiceAccountToken: false
            securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: kbve-gate
                  image: ghcr.io/kbve/kbve-gate:0.1.8
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: gateway
                        containerPort: 5678
                        protocol: TCP
                      - name: gate-metrics
                        containerPort: 9090
                        protocol: TCP
                  env:
                      - name: GATE_LISTEN
                        value: 0.0.0.0:5678
                      - name: GATE_METRICS_PORT
                        value: '9090'
                      - name: GATE_UPSTREAM
                        value: http://windmill-app.windmill.svc.cluster.local:8000
                      - name: GATE_AUTHZ
                        value: is_staff
                      - name: GATE_STAFF_SCHEMA
                        value: forum
                      - name: GATE_LOGIN_REDIRECT
                        value: https://kbve.com/login
                      - name: GATE_COOKIE_DOMAIN
                        value: .kbve.com
                      - name: SUPABASE_URL
                        value: http://kong.kilobase.svc.cluster.local:8000
                      - name: SUPABASE_JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: windmill-gate-supabase-jwt
                                key: SUPABASE_JWT_SECRET
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: windmill-gate-supabase-jwt
                                key: anon-key
                      # Windmill session bridge: enabled by token presence. Until
                      # seal-superadmin-token.sh writes the SealedSecret the ref is
                      # absent (optional) and the gate proxies without the bridge.
                      - name: WINDMILL_SUPERADMIN_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: windmill-superadmin-token
                                key: token
                                optional: true
                      - name: GATE_WINDMILL_WORKSPACE
                        value: kbve
                      - name: RUST_LOG
                        value: warn
                  resources:
                      requests:
                          memory: 64Mi
                          cpu: 50m
                      limits:
                          memory: 128Mi
                          cpu: 500m
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: gateway
                      initialDelaySeconds: 5
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: gateway
                      initialDelaySeconds: 3
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
    name: windmill-gate
    namespace: windmill
    labels:
        app: windmill-gate
spec:
    type: ClusterIP
    selector:
        app: windmill-gate
    ports:
        - name: gateway
          port: 5678
          targetPort: 5678
          protocol: TCP
