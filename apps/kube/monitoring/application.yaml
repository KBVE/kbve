apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: monitoring
    namespace: argocd
    annotations:
        kbve.com/source-path: kube/monitoring
        kbve.com/manifest-path: kube/monitoring
        kbve.com/application-file: kube/monitoring/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: observability
        kbve.com/stack: core
        argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
spec:
    project: default
    sources:
        - repoURL: https://prometheus-community.github.io/helm-charts
          targetRevision: 75.15.1
          chart: kube-prometheus-stack
          helm:
              releaseName: monitoring
              valueFiles:
                  - $values/apps/kube/monitoring/manifests/values.yaml
        - repoURL: https://github.com/kbve/kbve
          targetRevision: main
          ref: values
        - repoURL: https://github.com/kbve/kbve
          targetRevision: main
          path: apps/kube/monitoring/manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
