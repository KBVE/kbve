apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: reloader
    namespace: argocd
    annotations:
        kbve.com/source-path: kube/reloader
        kbve.com/manifest-path: kube/reloader
        kbve.com/application-file: kube/reloader/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: infrastructure
        kbve.com/stack: core
spec:
    project: default
    source:
        repoURL: https://stakater.github.io/stakater-charts
        targetRevision: 2.2.11
        chart: reloader
        helm:
            releaseName: reloader
            values:
                "reloader:\n  watchGlobally: true\n  reloadStrategy: env-vars\n  deployment:\n\
                \    replicas: 1\n    resources:\n      requests:\n        cpu: 10m\n    \
                \    memory: 64Mi\n      limits:\n        cpu: 100m\n        memory: 128Mi\n\
                \  serviceMonitor:\n    enabled: false\n"
    destination:
        server: https://kubernetes.default.svc
        namespace: reloader
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
        retry:
            limit: 5
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
