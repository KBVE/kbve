# Stakater Reloader — watches ConfigMaps/Secrets and triggers rolling
# restarts on Deployments/StatefulSets/DaemonSets when they change.
#
# Usage on a Deployment:
#   metadata:
#     annotations:
#       configmap.reloader.stakater.com/reload: "mc-velocity-config"
#       secret.reloader.stakater.com/reload: "mc-gameserver-secrets"
#
# Or auto-watch all referenced configmaps/secrets:
#   metadata:
#     annotations:
#       reloader.stakater.com/auto: "true"
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: reloader
    namespace: argocd
spec:
    project: default
    source:
        repoURL: https://stakater.github.io/stakater-charts
        targetRevision: 2.1.6
        chart: reloader
        helm:
            releaseName: reloader
            values: |
                reloader:
                  watchGlobally: true
                  reloadStrategy: env-vars
                  deployment:
                    replicas: 1
                    resources:
                      requests:
                        cpu: 10m
                        memory: 64Mi
                      limits:
                        cpu: 100m
                        memory: 128Mi
                  serviceMonitor:
                    enabled: false
    destination:
        server: https://kubernetes.default.svc
        namespace: reloader
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
        retry:
            limit: 5
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
