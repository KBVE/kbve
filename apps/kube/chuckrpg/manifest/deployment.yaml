apiVersion: apps/v1
kind: Deployment
metadata:
    name: chuckrpg-deployment
    namespace: chuckrpg
    labels:
        app: chuckrpg
    annotations:
        # Stakater Reloader watches every ConfigMap/Secret referenced by
        # this Deployment (envFrom, env.valueFrom, volumes) and triggers a
        # rolling restart on change. Currently only chuckrpg-config exists;
        # chuckrpg-secrets is optional until SealedSecret is added.
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: chuckrpg
    template:
        metadata:
            labels:
                app: chuckrpg
        spec:
            serviceAccountName: chuckrpg
            automountServiceAccountToken: false
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: chuckrpg
                  image: ghcr.io/kbve/chuckrpg:0.1.7
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 4322
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  envFrom:
                      - configMapRef:
                            name: chuckrpg-config
                      # Optional so the pod still boots before the
                      # SealedSecret lands. Once chuckrpg-secrets exists
                      # Reloader will roll the Deployment automatically.
                      - secretRef:
                            name: chuckrpg-secrets
                            optional: true
                  resources:
                      requests:
                          memory: '128Mi'
                          cpu: '100m'
                      limits:
                          memory: '256Mi'
                          cpu: '500m'
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
            volumes:
                # Writable scratch for the axum binary while the rootfs
                # itself stays read-only. Sized small — chuckrpg does not
                # cache anything significant at runtime.
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
    name: chuckrpg-service
    namespace: chuckrpg
    labels:
        app: chuckrpg
spec:
    type: ClusterIP
    selector:
        app: chuckrpg
    ports:
        - name: http
          port: 4322
          targetPort: 4322
          protocol: TCP
