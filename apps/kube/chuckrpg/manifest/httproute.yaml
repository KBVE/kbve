---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: chuckrpg-routes
    namespace: chuckrpg
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - chuckrpg.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: chuckrpg-service
                port: 4322
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: chuckrpg-api-routes
    namespace: ows
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - api.chuckrpg.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: ows-publicapi
                port: 80
