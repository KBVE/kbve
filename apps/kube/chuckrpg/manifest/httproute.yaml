---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: chuckrpg-tls
    namespace: chuckrpg
spec:
    secretName: chuckrpg-tls
    issuerRef:
        name: letsencrypt-dns
        kind: ClusterIssuer
    dnsNames:
        - chuckrpg.com
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: chuckrpg-api-tls
    namespace: chuckrpg
spec:
    secretName: chuckrpg-api-tls
    issuerRef:
        name: letsencrypt-dns
        kind: ClusterIssuer
    dnsNames:
        - api.chuckrpg.com
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: chuckrpg-routes
    namespace: chuckrpg
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - chuckrpg.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: chuckrpg-service
                port: 4322
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: chuckrpg-api-routes
    namespace: chuckrpg
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - api.chuckrpg.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: chuckrpg-service
                port: 4322
