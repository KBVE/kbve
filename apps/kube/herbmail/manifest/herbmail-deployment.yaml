apiVersion: apps/v1
kind: Deployment
metadata:
    name: herbmail-deployment
    namespace: herbmail
    labels:
        app: herbmail
    annotations:
        # Reloader rolls this Deployment whenever the supabase-shared
        # Secret (rendered by herbmail-supabase-secrets ExternalSecret)
        # changes — Supabase JWT/key rotations now propagate without a
        # manual kubectl rollout restart.
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: herbmail
    template:
        metadata:
            labels:
                app: herbmail
                version: '0.1.1'
        spec:
            serviceAccountName: herbmail-sa
            automountServiceAccountToken: false
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: herbmail
                  image: ghcr.io/kbve/herbmail:0.1.1
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 4321
                        protocol: TCP
                  env:
                      - name: PORT
                        value: '4321'
                      - name: SUPABASE_URL
                        value: 'http://kong.kilobase.svc.cluster.local:8000'
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: service-role-key
                  resources:
                      requests:
                          memory: '512Mi'
                          cpu: '250m'
                      limits:
                          memory: '1024Mi'
                          cpu: '2000m'
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
            volumes:
                # Writable scratch for the axum binary while the rootfs
                # itself stays read-only.
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
    name: herbmail-service
    namespace: herbmail
    labels:
        app: herbmail
spec:
    type: ClusterIP
    selector:
        app: herbmail
    ports:
        - port: 4321
          targetPort: 4321
          protocol: TCP
