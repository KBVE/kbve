# ServiceAccount used by ExternalSecrets to read source secrets out of
# the kilobase namespace via the kilobase-remote-secret-store
# SecretStore. Bound by Roles in apps/kube/kilobase manifests.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: herbmail-external-secrets
    namespace: herbmail
---
# ServiceAccount used by the herbmail Deployment pod. The pod does not
# call the kube API, so the projected token is unused weight — disable
# it here at the SA level. The pod spec also re-states the field so
# any future template binding this SA inherits the safe default.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: herbmail-sa
    namespace: herbmail
automountServiceAccountToken: false
