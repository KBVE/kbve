apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: kilobase
    namespace: argocd
    labels:
        app.kubernetes.io/name: kilobase
        app.kubernetes.io/component: database
    annotations:
        kbve.com/source-path: kube/kilobase
        kbve.com/manifest-path: apps/kube/kilobase/manifests
        kbve.com/application-file: kube/kilobase/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: application
        kbve.com/stack: core
        argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
spec:
    project: default
    source:
        repoURL: https://github.com/kbve/kbve
        targetRevision: main
        path: apps/kube/kilobase/manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: kilobase
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
        retry:
            limit: 3
            backoff:
                duration: 10s
                factor: 2
                maxDuration: 5m
    ignoreDifferences:
        - group: postgresql.cnpg.io
          kind: Cluster
          jsonPointers:
              - /status
              - /metadata/generation
        - kind: Pod
          jsonPointers:
              - /spec/containers/*/resources
              - /metadata/labels/role
              - /metadata/annotations
        - kind: Secret
          jsonPointers:
              - /data
        - kind: Service
          jsonPointers:
              - /spec/selector
        - kind: PersistentVolumeClaim
          jsonPointers:
              - /status
