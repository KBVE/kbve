---
# arc-runner-dbmate — RBAC binding the arc-runner-set SA in
# arc-runners namespace to a tight Role in kilobase. Lets
# .github/workflows/ci-dbmate-deploy.yml run kubectl from inside
# the runner pod against the dbmate Job + ConfigMap surface, and
# nothing else.
#
# The runner pod's SA `arc-runner-set-gha-rs-no-permission` is
# created by the GitHub Actions Runner Controller with zero baked
# permissions; this Role/RoleBinding is what gives it the exact
# verbs the workflow needs (and only those).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: arc-runner-dbmate
    namespace: kilobase
    labels:
        app.kubernetes.io/name: dbmate-runner
        app.kubernetes.io/component: arc-rbac
rules:
    # Manage the migrations ConfigMap.
    # delete is required because the workflow uses delete-then-create
    # (kubectl apply blows past the 262144 byte annotation limit when
    # the migrations dump is inlined as last-applied-configuration).
    # resourceNames pins write/read verbs to the single CM the
    # workflow owns; bootstrap `create` is unscoped because RBAC
    # ignores resourceNames on create.
    - apiGroups: ['']
      resources: ['configmaps']
      verbs: ['get', 'list', 'patch', 'update', 'delete']
      resourceNames:
          - dbmate-migrations
    - apiGroups: ['']
      resources: ['configmaps']
      verbs: ['create']
    # Create + read dbmate Jobs. No delete — the Job's
    # ttlSecondsAfterFinished handles cleanup.
    - apiGroups: ['batch']
      resources: ['jobs']
      verbs: ['get', 'list', 'create', 'watch', 'patch']
    - apiGroups: ['']
      resources: ['pods']
      verbs: ['get', 'list', 'watch']
    - apiGroups: ['']
      resources: ['pods/log']
      verbs: ['get', 'list']
    - apiGroups: ['']
      resources: ['events']
      verbs: ['get', 'list']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: arc-runner-dbmate
    namespace: kilobase
    labels:
        app.kubernetes.io/name: dbmate-runner
        app.kubernetes.io/component: arc-rbac
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: arc-runner-dbmate
subjects:
    - kind: ServiceAccount
      name: arc-runner-set-gha-rs-no-permission
      namespace: arc-runners
