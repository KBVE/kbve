apiVersion: v1
kind: ServiceAccount
metadata:
    name: backup-watchdog
    namespace: kilobase
    labels:
        app.kubernetes.io/name: kilobase
        app.kubernetes.io/component: backup-watchdog
        app.kubernetes.io/managed-by: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: backup-watchdog
    namespace: kilobase
    labels:
        app.kubernetes.io/name: kilobase
        app.kubernetes.io/component: backup-watchdog
        app.kubernetes.io/managed-by: argocd
rules:
    - apiGroups:
          - postgresql.cnpg.io
      resources:
          - backups
      verbs:
          - get
          - list
          - delete
    - apiGroups:
          - postgresql.cnpg.io
      resources:
          - scheduledbackups
      verbs:
          - get
          - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: backup-watchdog
    namespace: kilobase
    labels:
        app.kubernetes.io/name: kilobase
        app.kubernetes.io/component: backup-watchdog
        app.kubernetes.io/managed-by: argocd
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: backup-watchdog
subjects:
    - kind: ServiceAccount
      name: backup-watchdog
      namespace: kilobase
---
apiVersion: batch/v1
kind: CronJob
metadata:
    name: backup-watchdog
    namespace: kilobase
    labels:
        app.kubernetes.io/name: kilobase
        app.kubernetes.io/component: backup-watchdog
        app.kubernetes.io/managed-by: argocd
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    schedule: 30 3 * * *
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    jobTemplate:
        metadata:
            labels:
                app.kubernetes.io/name: kilobase
                app.kubernetes.io/component: backup-watchdog
        spec:
            activeDeadlineSeconds: 300
            ttlSecondsAfterFinished: 86400
            backoffLimit: 0
            template:
                metadata:
                    labels:
                        app.kubernetes.io/name: kilobase
                        app.kubernetes.io/component: backup-watchdog
                spec:
                    serviceAccountName: backup-watchdog
                    automountServiceAccountToken: true
                    restartPolicy: Never
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                        runAsGroup: 1000
                        fsGroup: 1000
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: watchdog
                          image: ghcr.io/kbve/kubectl:0.1.6
                          securityContext:
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                  drop:
                                      - ALL
                          resources:
                              limits:
                                  cpu: 100m
                                  memory: 128Mi
                              requests:
                                  cpu: 50m
                                  memory: 64Mi
                          command:
                              - /bin/bash
                              - -c
                              - "set -euo pipefail\n\nNAMESPACE=\"kilobase\"\nMAX_FAILED_AGE_DAYS=7\n\
                                MAX_COMPLETED_AGE_DAYS=60\nHEALTH_WINDOW_SECONDS=$((48 * 3600))\n\n\
                                echo \"=== Backup Watchdog ===\"\necho \"Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)\"\
                                \necho \"\"\n\n# ── Step 1: Health Check ──────────────────────\necho\
                                \ \"Step 1: Checking backup health (48h window)...\"\n\nNOW=$(date +%s)\n\
                                HEALTHY=false\n\n# Get all completed backups with their completion times\n\
                                COMPLETED_BACKUPS=$(kubectl get backups.postgresql.cnpg.io \\\n    -n\
                                \ \"${NAMESPACE}\" \\\n    -o jsonpath='{range .items[?(@.status.phase==\"\
                                completed\")]}{.metadata.name},{.status.startedAt}{\"\\n\"}{end}' \\\
                                \n    2>/dev/null || echo \"\")\n\nif [ -z \"${COMPLETED_BACKUPS}\"\
                                \ ]; then\n    echo \"  WARNING: No completed backups found at all!\"\
                                \nelse\n    LATEST_COMPLETED=\"\"\n    LATEST_AGE_HUMAN=\"\"\n\n   \
                                \ while IFS=',' read -r name timestamp; do\n        [ -z \"${timestamp}\"\
                                \ ] && continue\n        # Parse ISO timestamp to epoch\n        BACKUP_EPOCH=$(date\
                                \ -d \"${timestamp}\" +%s 2>/dev/null || \\\n                      \
                                \ date -j -f \"%Y-%m-%dT%H:%M:%SZ\" \"${timestamp}\" +%s 2>/dev/null\
                                \ || \\\n                       echo \"0\")\n        AGE_SECONDS=$((NOW\
                                \ - BACKUP_EPOCH))\n\n        if [ \"${AGE_SECONDS}\" -lt \"${HEALTH_WINDOW_SECONDS}\"\
                                \ ]; then\n            HEALTHY=true\n            LATEST_COMPLETED=\"\
                                ${name}\"\n            LATEST_AGE_HUMAN=\"$((AGE_SECONDS / 3600))h ago\"\
                                \n            break\n        fi\n\n        # Track the most recent even\
                                \ if outside window\n        if [ -z \"${LATEST_COMPLETED}\" ]; then\n\
                                \            LATEST_COMPLETED=\"${name}\"\n            LATEST_AGE_HUMAN=\"\
                                $((AGE_SECONDS / 3600))h ago\"\n        fi\n    done <<< \"$(echo \"\
                                ${COMPLETED_BACKUPS}\" | sort -t',' -k2 -r)\"\nfi\n\nif [ \"${HEALTHY}\"\
                                \ = \"true\" ]; then\n    echo \"  HEALTHY: Last successful backup:\
                                \ ${LATEST_COMPLETED} (${LATEST_AGE_HUMAN})\"\nelse\n    echo \"  UNHEALTHY:\
                                \ No successful backup in the last 48 hours!\"\n    echo \"  Last known\
                                \ successful: ${LATEST_COMPLETED:-none} (${LATEST_AGE_HUMAN:-unknown})\"\
                                \n    echo \"\"\n    echo \"  Recent backup statuses:\"\n    kubectl\
                                \ get backups.postgresql.cnpg.io -n \"${NAMESPACE}\" \\\n        --sort-by=.metadata.creationTimestamp\
                                \ \\\n        --no-headers | tail -5\n    echo \"\"\n    echo \"CRITICAL:\
                                \ Backup health check failed — no successful backup in 48h window\"\n\
                                \    exit 1\nfi\n\necho \"\"\n\n# ── Step 2: Metadata Cleanup ───────────────────\n\
                                echo \"Step 2: Cleaning up old Backup CRDs...\"\n\nDELETED_FAILED=0\n\
                                DELETED_COMPLETED=0\n\n# Get all backups with status and creation timestamp\n\
                                ALL_BACKUPS=$(kubectl get backups.postgresql.cnpg.io \\\n    -n \"${NAMESPACE}\"\
                                \ \\\n    -o jsonpath='{range .items[*]}{.metadata.name},{.status.phase},{.metadata.creationTimestamp}{\"\
                                \\n\"}{end}' \\\n    2>/dev/null || echo \"\")\n\nwhile IFS=',' read\
                                \ -r name phase created; do\n    [ -z \"${name}\" ] && continue\n  \
                                \  [ -z \"${created}\" ] && continue\n\n    CREATED_EPOCH=$(date -d\
                                \ \"${created}\" +%s 2>/dev/null || \\\n                    date -j\
                                \ -f \"%Y-%m-%dT%H:%M:%SZ\" \"${created}\" +%s 2>/dev/null || \\\n \
                                \                   echo \"0\")\n    AGE_DAYS=$(( (NOW - CREATED_EPOCH)\
                                \ / 86400 ))\n\n    if [ \"${phase}\" = \"failed\" ] && [ \"${AGE_DAYS}\"\
                                \ -ge \"${MAX_FAILED_AGE_DAYS}\" ]; then\n        echo \"  Deleting\
                                \ failed backup: ${name} (${AGE_DAYS}d old)\"\n        kubectl delete\
                                \ backup.postgresql.cnpg.io \"${name}\" \\\n            -n \"${NAMESPACE}\"\
                                \ --ignore-not-found\n        DELETED_FAILED=$((DELETED_FAILED + 1))\n\
                                \    elif [ \"${phase}\" = \"completed\" ] && [ \"${AGE_DAYS}\" -ge\
                                \ \"${MAX_COMPLETED_AGE_DAYS}\" ]; then\n        echo \"  Deleting old\
                                \ completed backup: ${name} (${AGE_DAYS}d old)\"\n        kubectl delete\
                                \ backup.postgresql.cnpg.io \"${name}\" \\\n            -n \"${NAMESPACE}\"\
                                \ --ignore-not-found\n        DELETED_COMPLETED=$((DELETED_COMPLETED\
                                \ + 1))\n    fi\ndone <<< \"${ALL_BACKUPS}\"\n\necho \"  Deleted: ${DELETED_FAILED}\
                                \ failed, ${DELETED_COMPLETED} completed\"\necho \"\"\n\n# ── Step 3:\
                                \ Status Report ──────────────────────\necho \"Step 3: Backup status\
                                \ summary\"\n\nTOTAL=$(kubectl get backups.postgresql.cnpg.io -n \"\
                                ${NAMESPACE}\" --no-headers 2>/dev/null | wc -l | tr -d ' ')\nCOMPLETED_COUNT=$(kubectl\
                                \ get backups.postgresql.cnpg.io -n \"${NAMESPACE}\" --no-headers 2>/dev/null\
                                \ | grep -c \"completed\" || echo \"0\")\nFAILED_COUNT=$(kubectl get\
                                \ backups.postgresql.cnpg.io -n \"${NAMESPACE}\" --no-headers 2>/dev/null\
                                \ | grep -c \"failed\" || echo \"0\")\n\necho \"  Total Backup CRDs:\
                                \ ${TOTAL}\"\necho \"  Completed: ${COMPLETED_COUNT}\"\necho \"  Failed:\
                                \ ${FAILED_COUNT}\"\necho \"  Cleaned this run: ${DELETED_FAILED} failed\
                                \ + ${DELETED_COMPLETED} completed\"\necho \"\"\n\n# Check ScheduledBackup\
                                \ is active\nSB_COUNT=$(kubectl get scheduledbackups.postgresql.cnpg.io\
                                \ -n \"${NAMESPACE}\" --no-headers 2>/dev/null | wc -l | tr -d ' ')\n\
                                echo \"  Active ScheduledBackups: ${SB_COUNT}\"\n\necho \"\"\necho \"\
                                === Backup Watchdog PASSED ===\"\necho \"Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)\"\
                                \n"
