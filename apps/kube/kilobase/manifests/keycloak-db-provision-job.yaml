apiVersion: v1
kind: ServiceAccount
metadata:
    name: keycloak-db-provision
    namespace: kilobase
    labels:
        app: keycloak-db-provision
        kbve.com/category: security
        kbve.com/stack: core
automountServiceAccountToken: false
---
apiVersion: batch/v1
kind: Job
metadata:
    name: keycloak-db-provision
    namespace: kilobase
    labels:
        app: keycloak-db-provision
        kbve.com/job: keycloak-db-provision
        kbve.com/category: security
        kbve.com/stack: core
    annotations:
        argocd.argoproj.io/hook: Sync
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
        argocd.argoproj.io/sync-wave: '5'
spec:
    backoffLimit: 6
    activeDeadlineSeconds: 300
    ttlSecondsAfterFinished: 600
    template:
        metadata:
            labels:
                app: keycloak-db-provision
                kbve.com/job: keycloak-db-provision
        spec:
            restartPolicy: Never
            serviceAccountName: keycloak-db-provision
            automountServiceAccountToken: false
            securityContext:
                runAsNonRoot: true
                runAsUser: 101
                fsGroup: 101
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: provision
                  image: ghcr.io/kbve/postgres:17.4.1.069-kilobase
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  env:
                      - name: PGHOST
                        value: supabase-cluster-rw.kilobase.svc.cluster.local
                      - name: PGPORT
                        value: '5432'
                      - name: PGDATABASE
                        value: supabase
                      - name: PGSSLMODE
                        value: disable
                      - name: PGUSER
                        valueFrom:
                            secretKeyRef:
                                name: supabase-postgres
                                key: username
                      - name: PGPASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: supabase-postgres
                                key: password
                      - name: KC_PW
                        valueFrom:
                            secretKeyRef:
                                name: keycloak-db-password
                                key: password
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -eu
                        psql -v ON_ERROR_STOP=1 -v kc_pw="$KC_PW" <<'SQL'
                        DO $$
                        BEGIN
                            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'keycloak') THEN
                                CREATE ROLE keycloak LOGIN;
                            END IF;
                        END
                        $$;
                        ALTER ROLE keycloak WITH LOGIN PASSWORD :'kc_pw';
                        CREATE SCHEMA IF NOT EXISTS keycloak AUTHORIZATION keycloak;
                        GRANT ALL ON SCHEMA keycloak TO keycloak;
                        ALTER DEFAULT PRIVILEGES FOR ROLE keycloak IN SCHEMA keycloak GRANT ALL ON TABLES TO keycloak;
                        ALTER DEFAULT PRIVILEGES FOR ROLE keycloak IN SCHEMA keycloak GRANT ALL ON SEQUENCES TO keycloak;
                        SQL
