---
# Placeholder for the dbmate-creds SealedSecret. The real version
# carries the encrypted DATABASE_URL pointing at the in-cluster
# CNPG primary service:
#
#   postgresql://postgres:<password>@supabase-cluster-rw.kilobase.svc.cluster.local:5432/supabase?sslmode=disable&search_path=dbmate,public
#
# Generate with:
#   echo -n 'postgresql://...' | kubectl create secret generic dbmate-creds \
#     --namespace=kilobase --dry-run=client \
#     --from-file=DATABASE_URL=/dev/stdin -o yaml \
#     | kubeseal --controller-namespace=sealed-secrets -o yaml \
#     > apps/kube/kilobase/manifests/dbmate-runner-secret.yaml
#
# The Job's RBAC restricts secret access to this exact name.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
    name: dbmate-creds
    namespace: kilobase
spec:
    encryptedData:
        DATABASE_URL: PLACEHOLDER_RUN_KUBESEAL_THEN_REPLACE_THIS_FILE
    template:
        metadata:
            name: dbmate-creds
            namespace: kilobase
        type: Opaque
