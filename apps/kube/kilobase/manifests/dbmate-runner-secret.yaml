---
# dbmate-creds is rendered by External Secrets Operator from the
# CNPG-managed `supabase-postgres` Secret in the same namespace —
# no hand-sealed blob in git, password rotates automatically when
# CNPG rotates it. Pattern matches kbve / n8n / clickhouse.
#
# Pieces:
#   1. ServiceAccount       — auth identity for the SecretStore
#   2. Role + Binding       — read-only on supabase-postgres only
#   3. SecretStore          — kubernetes provider, in-cluster lookup
#   4. ExternalSecret       — templates DATABASE_URL into dbmate-creds

apiVersion: v1
kind: ServiceAccount
metadata:
    name: dbmate-runner-external-secrets
    namespace: kilobase
    labels:
        app.kubernetes.io/name: dbmate-runner
        app.kubernetes.io/component: schema-migrations
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: dbmate-runner-external-secrets
    namespace: kilobase
rules:
    - apiGroups: ['']
      resources: ['secrets']
      verbs: ['get']
      resourceNames:
          - supabase-postgres
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: dbmate-runner-external-secrets
    namespace: kilobase
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: dbmate-runner-external-secrets
subjects:
    - kind: ServiceAccount
      name: dbmate-runner-external-secrets
      namespace: kilobase
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: dbmate-runner-store
    namespace: kilobase
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: dbmate-runner-external-secrets
                    namespace: kilobase
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: dbmate-creds
    namespace: kilobase
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: dbmate-runner-store
        kind: SecretStore
    target:
        name: dbmate-creds
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                # Service DNS keeps traffic in-cluster, never via the
                # apiserver tunnel or LoadBalancer. search_path keeps
                # dbmate's tracker table out of the public schema so it
                # doesn't get exposed via PostgREST.
                DATABASE_URL: 'postgresql://postgres:{{ .password }}@supabase-cluster-rw.kilobase.svc.cluster.local:5432/supabase?sslmode=disable&search_path=dbmate,public'
    data:
        - secretKey: password
          remoteRef:
              key: supabase-postgres
              property: password
