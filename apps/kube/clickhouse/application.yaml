apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: clickhouse
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: '3'
        kbve.com/source-path: kube/clickhouse
        kbve.com/manifest-path: kube/clickhouse
        kbve.com/application-file: kube/clickhouse/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: database
        kbve.com/stack: clickhouse
spec:
    project: default
    sources:
        - repoURL: https://github.com/kbve/kbve
          targetRevision: main
          path: apps/kube/clickhouse/manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: clickhouse
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
