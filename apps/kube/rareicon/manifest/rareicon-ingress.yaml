# Ingress: rareicon.com routing via ingress-nginx
#
# Mirrors the rareicon-routes HTTPRoute (httproute.yaml) so traffic
# reaches rareicon-service whether DNS points at the nginx LoadBalancer
# or the Cilium Gateway. Until DNS is cut over to the Cilium gateway,
# this Ingress is the path that actually serves rareicon.com.
#
# Cloudflare proxies rareicon.com to the ingress-nginx LoadBalancer.
# cert-manager mints the origin cert via letsencrypt-http (secret: rareicon-tls).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: rareicon-ingress
    namespace: rareicon
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http
        nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
    ingressClassName: nginx
    tls:
        - hosts:
              - rareicon.com
          secretName: rareicon-tls
    rules:
        - host: rareicon.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: rareicon-service
                            port:
                                number: 4323
