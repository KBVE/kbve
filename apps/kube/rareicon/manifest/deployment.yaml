apiVersion: apps/v1
kind: Deployment
metadata:
    name: rareicon-deployment
    namespace: rareicon
    labels:
        app: rareicon
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: rareicon
    template:
        metadata:
            labels:
                app: rareicon
        spec:
            automountServiceAccountToken: false
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: rareicon
                  image: ghcr.io/kbve/rareicon:0.1.3
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 4323
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  env:
                      - name: HTTP_HOST
                        value: 0.0.0.0
                      - name: HTTP_PORT
                        value: '4323'
                      - name: RUST_LOG
                        value: warn
                  resources:
                      requests:
                          memory: 128Mi
                          cpu: 100m
                      limits:
                          memory: 256Mi
                          cpu: 500m
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
            volumes:
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
    name: rareicon-service
    namespace: rareicon
    labels:
        app: rareicon
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: rareicon
    ports:
        - name: http
          port: 4323
          targetPort: 4323
          protocol: TCP
