apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: rareicon
    namespace: argocd
    annotations:
        kbve.com/source-path: kube/rareicon
        kbve.com/manifest-path: apps/kube/rareicon/manifest
        kbve.com/application-file: kube/rareicon/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: application
        kbve.com/stack: core
spec:
    project: default
    source:
        repoURL: https://github.com/KBVE/kbve
        targetRevision: main
        path: apps/kube/rareicon/manifest
    destination:
        server: https://kubernetes.default.svc
        namespace: rareicon
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - PrunePropagationPolicy=foreground
            - PruneLast=true
            - RespectIgnoreDifferences=true
    revisionHistoryLimit: 3
