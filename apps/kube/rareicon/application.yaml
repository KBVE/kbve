apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: rareicon
    namespace: argocd
spec:
    project: default
    source:
        repoURL: https://github.com/KBVE/kbve
        targetRevision: main
        path: apps/kube/rareicon/manifest
    destination:
        server: https://kubernetes.default.svc
        namespace: rareicon
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - PrunePropagationPolicy=foreground
            - PruneLast=true
            - RespectIgnoreDifferences=true
    revisionHistoryLimit: 3
