apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: cnpg-operator
    namespace: argocd
    annotations:
        kbve.com/source-path: kube/cnpg
        kbve.com/manifest-path: kube/cnpg
        kbve.com/application-file: kube/cnpg/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: database
        kbve.com/stack: core
spec:
    project: default
    sources:
        - repoURL: https://cloudnative-pg.github.io/charts
          targetRevision: 0.25.0
          chart: cloudnative-pg
          helm:
              releaseName: cnpg-operator
              valueFiles:
                  - $values/apps/kube/cnpg/manifests/values.yaml
        - repoURL: https://github.com/kbve/kbve
          targetRevision: main
          ref: values
    destination:
        server: https://kubernetes.default.svc
        namespace: cnpg-system
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - Replace=true
            - Force=true
            - RespectIgnoreDifferences=true
        retry:
            limit: 3
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
