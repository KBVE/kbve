apiVersion: v1
kind: ServiceAccount
metadata:
    name: ca-staleness-monitor
    namespace: kube-system
    labels:
        app.kubernetes.io/name: ca-staleness-monitor
        app.kubernetes.io/component: cluster-ops
        app.kubernetes.io/managed-by: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: ca-staleness-monitor
    labels:
        app.kubernetes.io/name: ca-staleness-monitor
        app.kubernetes.io/component: cluster-ops
        app.kubernetes.io/managed-by: argocd
rules:
    - apiGroups:
          - ''
      resources:
          - pods
      verbs:
          - get
          - list
    - apiGroups:
          - ''
      resources:
          - configmaps
      verbs:
          - get
      resourceNames:
          - kube-root-ca.crt
    - apiGroups:
          - argoproj.io
      resources:
          - applications
      verbs:
          - get
          - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: ca-staleness-monitor
    labels:
        app.kubernetes.io/name: ca-staleness-monitor
        app.kubernetes.io/component: cluster-ops
        app.kubernetes.io/managed-by: argocd
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: ca-staleness-monitor
subjects:
    - kind: ServiceAccount
      name: ca-staleness-monitor
      namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
    name: ca-staleness-monitor
    namespace: kube-system
    labels:
        app.kubernetes.io/name: ca-staleness-monitor
        app.kubernetes.io/component: cluster-ops
        app.kubernetes.io/managed-by: argocd
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    schedule: '*/15 * * * *'
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    jobTemplate:
        metadata:
            labels:
                app.kubernetes.io/name: ca-staleness-monitor
                app.kubernetes.io/component: cluster-ops
        spec:
            activeDeadlineSeconds: 180
            ttlSecondsAfterFinished: 86400
            backoffLimit: 0
            template:
                metadata:
                    labels:
                        app.kubernetes.io/name: ca-staleness-monitor
                        app.kubernetes.io/component: cluster-ops
                spec:
                    serviceAccountName: ca-staleness-monitor
                    automountServiceAccountToken: true
                    restartPolicy: Never
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                        runAsGroup: 1000
                        fsGroup: 1000
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: scan
                          image: ghcr.io/kbve/kubectl:0.1.8
                          imagePullPolicy: IfNotPresent
                          securityContext:
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                  drop:
                                      - ALL
                          resources:
                              limits:
                                  cpu: 100m
                                  memory: 128Mi
                              requests:
                                  cpu: 25m
                                  memory: 32Mi
                          env:
                              - name: SCAN_ID
                                valueFrom:
                                    fieldRef:
                                        fieldPath: metadata.name
                          volumeMounts:
                              - name: tmp
                                mountPath: /tmp
                          command:
                              - /bin/bash
                              - -c
                              - "set -euo pipefail\n\n# Parse the current cluster CA cert's notBefore.\n\
                                # Any pod older than this value was started against\n# a previous CA\
                                \ and has a stale in-memory client.\nCA_PEM=$(kubectl get configmap\
                                \ kube-root-ca.crt -n kube-system -o jsonpath='{.data.ca\\.crt}')\n\
                                CA_NOT_BEFORE=$(printf '%s' \"${CA_PEM}\" | openssl x509 -noout -startdate\
                                \ | cut -d= -f2)\nCA_EPOCH=$(date -u -d \"${CA_NOT_BEFORE}\" +%s)\n\
                                NOW=$(date -u +%s)\nCA_AGE_S=$((NOW - CA_EPOCH))\nSCAN_TS=$(date -u\
                                \ +%Y-%m-%dT%H:%M:%SZ)\n\nSTALE_COUNT=0\nTOTAL_COUNT=0\nSKIPPED_COUNT=0\n\
                                \n# Single pod list call, TSV-delimited for safe parsing.\n# Pipe '|'\
                                \ is safe: pod/namespace/SA names can't contain it.\nPODS=$(kubectl\
                                \ get pods --all-namespaces \\\n    -o jsonpath='{range .items[*]}{.metadata.namespace}|{.metadata.name}|{.status.phase}|{.metadata.creationTimestamp}|{.spec.serviceAccountName}|{.spec.automountServiceAccountToken}{\"\
                                \\n\"}{end}' \\\n    2>/dev/null || echo \"\")\n\nwhile IFS='|' read\
                                \ -r NS NAME PHASE CREATED SA AUTOMOUNT; do\n    [ -z \"${NAME}\" ]\
                                \ && continue\n    TOTAL_COUNT=$((TOTAL_COUNT + 1))\n\n    # Only Running\
                                \ pods matter; Completed/Failed\n    # pods won't try to hit the API\
                                \ again.\n    if [ \"${PHASE}\" != \"Running\" ]; then\n        SKIPPED_COUNT=$((SKIPPED_COUNT\
                                \ + 1))\n        continue\n    fi\n\n    # automountServiceAccountToken\
                                \ defaults to true\n    # when unset, so empty string = still mounted.\n\
                                \    if [ \"${AUTOMOUNT}\" = \"false\" ]; then\n        SKIPPED_COUNT=$((SKIPPED_COUNT\
                                \ + 1))\n        continue\n    fi\n\n    CREATED_EPOCH=$(date -u -d\
                                \ \"${CREATED}\" +%s 2>/dev/null || echo 0)\n    [ \"${CREATED_EPOCH}\"\
                                \ = \"0\" ] && continue\n\n    if [ \"${CREATED_EPOCH}\" -lt \"${CA_EPOCH}\"\
                                \ ]; then\n        POD_AGE_S=$((NOW - CREATED_EPOCH))\n        STALENESS_S=$((CA_EPOCH\
                                \ - CREATED_EPOCH))\n        jq -cn \\\n            --arg ts \"${SCAN_TS}\"\
                                \ \\\n            --arg ns \"${NS}\" \\\n            --arg pod \"${NAME}\"\
                                \ \\\n            --arg sa \"${SA:-default}\" \\\n            --argjson\
                                \ pod_age \"${POD_AGE_S}\" \\\n            --argjson ca_age \"${CA_AGE_S}\"\
                                \ \\\n            --argjson staleness \"${STALENESS_S}\" \\\n      \
                                \      '{level:\"warn\",component:\"ca-staleness-monitor\",event:\"\
                                stale_ca_pod\",scan_ts:$ts,namespace:$ns,pod:$pod,service_account:$sa,pod_age_seconds:$pod_age,ca_age_seconds:$ca_age,staleness_seconds:$staleness,recommendation:\"\
                                kubectl rollout restart the owning Deployment/DaemonSet\"}'\n      \
                                \  STALE_COUNT=$((STALE_COUNT + 1))\n    fi\ndone <<< \"${PODS}\"\n\n\
                                jq -cn \\\n    --arg ts \"${SCAN_TS}\" \\\n    --arg not_before \"${CA_NOT_BEFORE}\"\
                                \ \\\n    --argjson stale \"${STALE_COUNT}\" \\\n    --argjson total\
                                \ \"${TOTAL_COUNT}\" \\\n    --argjson skipped \"${SKIPPED_COUNT}\"\
                                \ \\\n    --argjson ca_age \"${CA_AGE_S}\" \\\n    '{level:\"info\"\
                                ,component:\"ca-staleness-monitor\",event:\"ca_scan_complete\",scan_ts:$ts,ca_not_before:$not_before,ca_age_seconds:$ca_age,stale_pods:$stale,total_pods:$total,skipped_pods:$skipped}'\n\
                                \n# ── ArgoCD sync stall detection ────────────────\n# Any Application\
                                \ stuck in a Running sync phase\n# for over 1 hour is likely deadlocked\
                                \ (health\n# check wait on a resource that will never heal).\nSTUCK_THRESHOLD=3600\n\
                                STUCK_COUNT=0\n\nAPPS=$(kubectl get applications.argoproj.io -n argocd\
                                \ \\\n    -o jsonpath='{range .items[*]}{.metadata.name}|{.status.operationState.phase}|{.status.operationState.startedAt}|{.status.sync.status}|{.status.operationState.message}{\"\
                                \\n\"}{end}' \\\n    2>/dev/null || echo \"\")\n\nwhile IFS='|' read\
                                \ -r APP_NAME PHASE STARTED SYNC_STATUS MSG; do\n    [ -z \"${APP_NAME}\"\
                                \ ] && continue\n    [ \"${PHASE}\" != \"Running\" ] && continue\n\n\
                                \    STARTED_EPOCH=$(date -u -d \"${STARTED}\" +%s 2>/dev/null || echo\
                                \ 0)\n    [ \"${STARTED_EPOCH}\" = \"0\" ] && continue\n\n    ELAPSED=$((NOW\
                                \ - STARTED_EPOCH))\n    if [ \"${ELAPSED}\" -ge \"${STUCK_THRESHOLD}\"\
                                \ ]; then\n        jq -cn \\\n            --arg ts \"${SCAN_TS}\" \\\
                                \n            --arg app \"${APP_NAME}\" \\\n            --arg sync \"\
                                ${SYNC_STATUS}\" \\\n            --arg msg \"${MSG}\" \\\n         \
                                \   --argjson elapsed \"${ELAPSED}\" \\\n            '{level:\"warn\"\
                                ,component:\"ca-staleness-monitor\",event:\"argocd_sync_stuck\",scan_ts:$ts,application:$app,sync_status:$sync,elapsed_seconds:$elapsed,blocking_message:$msg,recommendation:\"\
                                Terminate the stuck operation and investigate the blocking resource\"\
                                }'\n        STUCK_COUNT=$((STUCK_COUNT + 1))\n    fi\ndone <<< \"${APPS}\"\
                                \n\njq -cn \\\n    --arg ts \"${SCAN_TS}\" \\\n    --argjson stuck \"\
                                ${STUCK_COUNT}\" \\\n    '{level:\"info\",component:\"ca-staleness-monitor\"\
                                ,event:\"argocd_scan_complete\",scan_ts:$ts,stuck_syncs:$stuck}'\n"
                    volumes:
                        - name: tmp
                          emptyDir: {}
