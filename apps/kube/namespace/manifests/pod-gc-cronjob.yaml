apiVersion: v1
kind: ServiceAccount
metadata:
    name: pod-gc
    namespace: kube-system
    labels:
        app.kubernetes.io/name: pod-gc
        app.kubernetes.io/component: cluster-ops
        app.kubernetes.io/managed-by: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: pod-gc
    labels:
        app.kubernetes.io/name: pod-gc
        app.kubernetes.io/component: cluster-ops
        app.kubernetes.io/managed-by: argocd
rules:
    - apiGroups:
          - ''
      resources:
          - pods
      verbs:
          - get
          - list
          - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: pod-gc
    labels:
        app.kubernetes.io/name: pod-gc
        app.kubernetes.io/component: cluster-ops
        app.kubernetes.io/managed-by: argocd
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: pod-gc
subjects:
    - kind: ServiceAccount
      name: pod-gc
      namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
    name: pod-gc
    namespace: kube-system
    labels:
        app.kubernetes.io/name: pod-gc
        app.kubernetes.io/component: cluster-ops
        app.kubernetes.io/managed-by: argocd
        kbve.com/category: infrastructure
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    schedule: 15 */6 * * *
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    jobTemplate:
        metadata:
            labels:
                app.kubernetes.io/name: pod-gc
                app.kubernetes.io/component: cluster-ops
        spec:
            activeDeadlineSeconds: 300
            ttlSecondsAfterFinished: 86400
            backoffLimit: 0
            template:
                metadata:
                    labels:
                        app.kubernetes.io/name: pod-gc
                        app.kubernetes.io/component: cluster-ops
                spec:
                    serviceAccountName: pod-gc
                    automountServiceAccountToken: true
                    restartPolicy: Never
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                        runAsGroup: 1000
                        fsGroup: 1000
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: gc
                          image: ghcr.io/kbve/kubectl:0.1.8
                          securityContext:
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                  drop:
                                      - ALL
                          resources:
                              limits:
                                  cpu: 100m
                                  memory: 128Mi
                              requests:
                                  cpu: 50m
                                  memory: 64Mi
                          command:
                              - /bin/bash
                              - -c
                              - "set -euo pipefail\n\nMAX_SUCCEEDED_AGE=3600       # 1 hour\nMAX_FAILED_AGE=21600\
                                \         # 6 hours\nMAX_IMAGE_PULL_AGE=21600     # 6 hours\n\necho\
                                \ \"=== Pod Garbage Collection ===\"\necho \"Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)\"\
                                \necho \"\"\n\nNOW=$(date +%s)\nDELETED=0\n\n# ── Clean up Succeeded\
                                \ (Completed) pods ─────────\necho \"Scanning for Succeeded pods older\
                                \ than $((MAX_SUCCEEDED_AGE / 3600))h...\"\nwhile IFS='|' read -r ns\
                                \ name created; do\n    [ -z \"${name}\" ] && continue\n    CREATED_EPOCH=$(date\
                                \ -d \"${created}\" +%s 2>/dev/null || \\\n                    date\
                                \ -j -f \"%Y-%m-%dT%H:%M:%SZ\" \"${created}\" +%s 2>/dev/null || \\\n\
                                \                    echo \"0\")\n    AGE=$((NOW - CREATED_EPOCH))\n\
                                \    if [ \"${AGE}\" -ge \"${MAX_SUCCEEDED_AGE}\" ]; then\n        echo\
                                \ \"  Deleting ${ns}/${name} (Succeeded, $((AGE / 3600))h old)\"\n \
                                \       kubectl delete pod \"${name}\" -n \"${ns}\" --ignore-not-found\n\
                                \        DELETED=$((DELETED + 1))\n    fi\ndone <<< \"$(kubectl get\
                                \ pods --all-namespaces --field-selector=status.phase=Succeeded \\\n\
                                \    -o jsonpath='{range .items[*]}{.metadata.namespace}|{.metadata.name}|{.metadata.creationTimestamp}{\"\
                                \\n\"}{end}' 2>/dev/null || echo \"\")\"\n\n# ── Clean up Failed pods\
                                \ ────────────────────────\necho \"\"\necho \"Scanning for Failed pods\
                                \ older than $((MAX_FAILED_AGE / 3600))h...\"\nwhile IFS='|' read -r\
                                \ ns name created; do\n    [ -z \"${name}\" ] && continue\n    CREATED_EPOCH=$(date\
                                \ -d \"${created}\" +%s 2>/dev/null || \\\n                    date\
                                \ -j -f \"%Y-%m-%dT%H:%M:%SZ\" \"${created}\" +%s 2>/dev/null || \\\n\
                                \                    echo \"0\")\n    AGE=$((NOW - CREATED_EPOCH))\n\
                                \    if [ \"${AGE}\" -ge \"${MAX_FAILED_AGE}\" ]; then\n        echo\
                                \ \"  Deleting ${ns}/${name} (Failed, $((AGE / 3600))h old)\"\n    \
                                \    kubectl delete pod \"${name}\" -n \"${ns}\" --ignore-not-found\n\
                                \        DELETED=$((DELETED + 1))\n    fi\ndone <<< \"$(kubectl get\
                                \ pods --all-namespaces --field-selector=status.phase=Failed \\\n  \
                                \  -o jsonpath='{range .items[*]}{.metadata.namespace}|{.metadata.name}|{.metadata.creationTimestamp}{\"\
                                \\n\"}{end}' 2>/dev/null || echo \"\")\"\n\n# ── Clean up ImagePullBackOff\
                                \ pods ──────────────\necho \"\"\necho \"Scanning for ImagePullBackOff\
                                \ pods older than $((MAX_IMAGE_PULL_AGE / 3600))h...\"\nwhile IFS='|'\
                                \ read -r ns name created reasons; do\n    [ -z \"${name}\" ] && continue\n\
                                \    echo \"${reasons}\" | grep -qiE \"ImagePullBackOff|ErrImagePull\"\
                                \ || continue\n    CREATED_EPOCH=$(date -d \"${created}\" +%s 2>/dev/null\
                                \ || \\\n                    date -j -f \"%Y-%m-%dT%H:%M:%SZ\" \"${created}\"\
                                \ +%s 2>/dev/null || \\\n                    echo \"0\")\n    AGE=$((NOW\
                                \ - CREATED_EPOCH))\n    if [ \"${AGE}\" -ge \"${MAX_IMAGE_PULL_AGE}\"\
                                \ ]; then\n        echo \"  Deleting ${ns}/${name} (ImagePullBackOff,\
                                \ $((AGE / 3600))h old)\"\n        kubectl delete pod \"${name}\" -n\
                                \ \"${ns}\" --ignore-not-found\n        DELETED=$((DELETED + 1))\n \
                                \   fi\ndone <<< \"$(kubectl get pods --all-namespaces \\\n    -o jsonpath='{range\
                                \ .items[*]}{.metadata.namespace}|{.metadata.name}|{.metadata.creationTimestamp}|{range\
                                \ .status.containerStatuses[*]}{.state.waiting.reason}{\" \"}{end}{\"\
                                \\n\"}{end}' 2>/dev/null || echo \"\")\"\n\n# ── Summary ─────────────────────────────────────\n\
                                echo \"\"\nTOTAL_PODS=$(kubectl get pods --all-namespaces --no-headers\
                                \ 2>/dev/null | wc -l | tr -d ' ')\necho \"=== Pod GC Complete ===\"\
                                \necho \"  Deleted: ${DELETED} stale pods\"\necho \"  Remaining: ${TOTAL_PODS}\
                                \ pods cluster-wide\"\necho \"  Node capacity: 110\"\necho \"Timestamp:\
                                \ $(date -u +%Y-%m-%dT%H:%M:%SZ)\"\n"
