apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: gateway-api-crds
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: '-1'
        kbve.com/source-path: kube/gateway-api
        kbve.com/manifest-path: config/crd/standard
        kbve.com/application-file: kube/gateway-api/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: infrastructure
        kbve.com/stack: core
spec:
    project: default
    source:
        repoURL: https://github.com/kubernetes-sigs/gateway-api
        targetRevision: v1.2.0
        path: config/crd/standard
    destination:
        server: https://kubernetes.default.svc
    syncPolicy:
        automated:
            selfHeal: true
            prune: false
        syncOptions:
            - CreateNamespace=false
            - ServerSideApply=true
            - Replace=true
        retry:
            limit: 3
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
