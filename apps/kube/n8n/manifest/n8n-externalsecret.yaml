# ServiceAccount for ExternalSecrets cross-namespace access
apiVersion: v1
kind: ServiceAccount
metadata:
    name: n8n-external-secrets
    namespace: n8n
---
# SecretStore: Kilobase namespace (for supabase-postgres password)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: n8n-supabase-secret-store
    namespace: n8n
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: n8n-external-secrets
                    namespace: n8n
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: Pull Supabase PostgreSQL password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: n8n-supabase-secrets
    namespace: n8n
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: n8n-supabase-secret-store
        kind: SecretStore
    target:
        name: n8n-supabase-shared
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                db-password: '{{ .dbpassword }}'
    data:
        - secretKey: dbpassword
          remoteRef:
              key: supabase-postgres
              property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: n8n-gate-supabase-jwt
    namespace: n8n
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: n8n-supabase-secret-store
        kind: SecretStore
    target:
        name: n8n-gate-supabase-jwt
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                SUPABASE_JWT_SECRET: '{{ .jwt_secret }}'
                anon-key: '{{ .anonkey }}'
    data:
        - secretKey: jwt_secret
          remoteRef:
              key: supabase-jwt
              property: secret
        - secretKey: anonkey
          remoteRef:
              key: supabase-jwt
              property: anon-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: n8n-supabase-workflow
    namespace: n8n
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: n8n-supabase-secret-store
        kind: SecretStore
    target:
        name: n8n-supabase-workflow
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                supabase-url: 'http://kong.kilobase.svc.cluster.local:8000'
                anon-key: '{{ .anonkey }}'
                service-key: '{{ .servicekey }}'
    data:
        - secretKey: anonkey
          remoteRef:
              key: supabase-jwt
              property: anon-key
        - secretKey: servicekey
          remoteRef:
              key: supabase-service-key
              property: hash
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: n8n-rabbitmq-secret-store
    namespace: n8n
spec:
    provider:
        kubernetes:
            remoteNamespace: rabbitmq-system
            auth:
                serviceAccount:
                    name: n8n-external-secrets
                    namespace: n8n
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: n8n-rabbitmq-secrets
    namespace: n8n
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: n8n-rabbitmq-secret-store
        kind: SecretStore
    target:
        name: n8n-rabbitmq-credentials
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                username: '{{ .username }}'
                password: '{{ .password }}'
                host: '{{ .host }}'
                amqp-url: 'amqp://{{ .username }}:{{ .password }}@{{ .host }}:5672'
    data:
        - secretKey: username
          remoteRef:
              key: rabbitmq-default-user
              property: username
        - secretKey: password
          remoteRef:
              key: rabbitmq-default-user
              property: password
        - secretKey: host
          remoteRef:
              key: rabbitmq-default-user
              property: host
---
# n8n-encryption-secret: Run ../seal-encryption-key.sh before first deployment.
# The script generates a random key, seals it via kubeseal, and writes
# n8n-encryption-sealedsecret.yaml into this directory. Plaintext never touches disk.
