# ServiceAccount for ExternalSecrets cross-namespace access
apiVersion: v1
kind: ServiceAccount
metadata:
    name: n8n-external-secrets
    namespace: n8n
---
# SecretStore: Kilobase namespace (for supabase-postgres password)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: n8n-supabase-secret-store
    namespace: n8n
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: n8n-external-secrets
                    namespace: n8n
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: Pull Supabase PostgreSQL password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: n8n-supabase-secrets
    namespace: n8n
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: n8n-supabase-secret-store
        kind: SecretStore
    target:
        name: n8n-supabase-shared
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                db-password: '{{ .dbpassword }}'
    data:
        - secretKey: dbpassword
          remoteRef:
              key: supabase-postgres
              property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: n8n-gate-supabase-jwt
    namespace: n8n
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: n8n-supabase-secret-store
        kind: SecretStore
    target:
        name: n8n-gate-supabase-jwt
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                SUPABASE_JWT_SECRET: '{{ .jwt_secret }}'
    data:
        - secretKey: jwt_secret
          remoteRef:
              key: supabase-jwt
              property: secret
---
# n8n-encryption-secret: Run ../seal-encryption-key.sh before first deployment.
# The script generates a random key, seals it via kubeseal, and writes
# n8n-encryption-sealedsecret.yaml into this directory. Plaintext never touches disk.
