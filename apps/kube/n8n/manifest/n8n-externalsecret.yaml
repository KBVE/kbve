# ServiceAccount for ExternalSecrets cross-namespace access
apiVersion: v1
kind: ServiceAccount
metadata:
    name: n8n-external-secrets
    namespace: n8n
---
# SecretStore: Redis namespace (for redis-auth password)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: n8n-redis-secret-store
    namespace: n8n
spec:
    provider:
        kubernetes:
            remoteNamespace: redis
            auth:
                serviceAccount:
                    name: n8n-external-secrets
                    namespace: n8n
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: Pull Redis password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: n8n-redis-secrets
    namespace: n8n
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: n8n-redis-secret-store
        kind: SecretStore
    target:
        name: n8n-redis-secret
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                REDIS_PASSWORD: '{{ .redispassword }}'
    data:
        - secretKey: redispassword
          remoteRef:
              key: redis-auth
              property: redis-password
---
# SecretStore: Kilobase namespace (for supabase-postgres password)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: n8n-supabase-secret-store
    namespace: n8n
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: n8n-external-secrets
                    namespace: n8n
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: Pull Supabase PostgreSQL password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: n8n-supabase-secrets
    namespace: n8n
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: n8n-supabase-secret-store
        kind: SecretStore
    target:
        name: n8n-supabase-shared
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                db-password: '{{ .dbpassword }}'
    data:
        - secretKey: dbpassword
          remoteRef:
              key: supabase-postgres
              property: password
---
