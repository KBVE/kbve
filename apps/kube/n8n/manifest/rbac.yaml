# ServiceAccount used by the n8n Deployment pod.
# The pod does not call the kube API — token mount is disabled here at
# the SA level; the Deployment specs also set the field at the pod
# level so any future template that re-binds this SA still inherits the
# safe default.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: n8n-sa
    namespace: n8n
automountServiceAccountToken: false
---
# Role: Allow n8n ExternalSecrets SA to read supabase-postgres secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: n8n-supabase-access
    namespace: kilobase
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['supabase-postgres']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: n8n-supabase-access-binding
    namespace: kilobase
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: n8n-supabase-access
subjects:
    - kind: ServiceAccount
      name: n8n-external-secrets
      namespace: n8n
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: discordsh-n8n-hmac-access
    namespace: n8n
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['discordsh-n8n-hmac']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: discordsh-n8n-hmac-access-binding
    namespace: n8n
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: discordsh-n8n-hmac-access
subjects:
    - kind: ServiceAccount
      name: discordsh-external-secrets
      namespace: discordsh
