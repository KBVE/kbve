apiVersion: apps/v1
kind: Deployment
metadata:
    name: n8n
    namespace: n8n
    labels:
        app: n8n
spec:
    replicas: 1
    selector:
        matchLabels:
            app: n8n
    template:
        metadata:
            labels:
                app: n8n
        spec:
            serviceAccountName: n8n-sa
            containers:
                - name: n8n
                  image: n8nio/n8n:2.9.4
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: http
                        containerPort: 5678
                        protocol: TCP
                  envFrom:
                      - secretRef:
                            name: n8n-redis-secret
                  env:
                      # PostgreSQL (shared supabase database, dedicated n8n schema)
                      - name: DB_TYPE
                        value: 'postgresdb'
                      - name: DB_POSTGRESDB_HOST
                        value: 'supabase-cluster-rw.kilobase.svc.cluster.local'
                      - name: DB_POSTGRESDB_PORT
                        value: '5432'
                      - name: DB_POSTGRESDB_DATABASE
                        value: 'supabase'
                      - name: DB_POSTGRESDB_USER
                        value: 'postgres'
                      - name: DB_POSTGRESDB_SCHEMA
                        value: 'n8n'
                      - name: DB_POSTGRESDB_POOL_SIZE
                        value: '10'
                      - name: DB_POSTGRESDB_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: n8n-supabase-shared
                                key: db-password
                      # Redis (queue-based execution)
                      - name: EXECUTIONS_MODE
                        value: 'queue'
                      - name: QUEUE_BULL_REDIS_HOST
                        value: 'redis-master.redis.svc.cluster.local'
                      - name: QUEUE_BULL_REDIS_PORT
                        value: '6379'
                      # n8n configuration
                      - name: N8N_TRUST_PROXY
                        value: 'true'
                      - name: N8N_PORT
                        value: '5678'
                      - name: WEBHOOK_URL
                        value: 'https://n8n.kbve.com/'
                      - name: GENERIC_TIMEZONE
                        value: 'UTC'
                      - name: N8N_ENCRYPTION_KEY
                        valueFrom:
                            secretKeyRef:
                                name: n8n-encryption-secret
                                key: encryption-key
                      - name: N8N_LICENSE_ACTIVATION_KEY
                        valueFrom:
                            secretKeyRef:
                                name: n8n-license-secret
                                key: activation-key
                  resources:
                      requests:
                          memory: '512Mi'
                          cpu: '500m'
                      limits:
                          memory: '1024Mi'
                          cpu: '1000m'
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
