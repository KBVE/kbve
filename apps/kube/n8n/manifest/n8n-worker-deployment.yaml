apiVersion: apps/v1
kind: Deployment
metadata:
    name: n8n-worker
    namespace: n8n
    labels:
        app: n8n-worker
spec:
    replicas: 1
    selector:
        matchLabels:
            app: n8n-worker
    template:
        metadata:
            labels:
                app: n8n-worker
        spec:
            serviceAccountName: n8n-sa
            affinity:
                podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - weight: 100
                          podAffinityTerm:
                              labelSelector:
                                  matchExpressions:
                                      - key: app
                                        operator: In
                                        values:
                                            - n8n
                                            - n8n-worker
                              topologyKey: kubernetes.io/hostname
            containers:
                - name: n8n-worker
                  image: n8nio/n8n:2.9.4
                  imagePullPolicy: IfNotPresent
                  command: ['n8n', 'worker', '--concurrency=10']
                  ports:
                      - name: health
                        containerPort: 5678
                        protocol: TCP
                      - name: broker
                        containerPort: 5679
                        protocol: TCP
                  envFrom:
                      - secretRef:
                            name: n8n-redis-secret
                  env:
                      # PostgreSQL (same DB as main instance)
                      - name: DB_TYPE
                        value: 'postgresdb'
                      - name: DB_POSTGRESDB_HOST
                        value: 'supabase-cluster-rw.kilobase.svc.cluster.local'
                      - name: DB_POSTGRESDB_PORT
                        value: '5432'
                      - name: DB_POSTGRESDB_DATABASE
                        value: 'supabase'
                      - name: DB_POSTGRESDB_USER
                        value: 'postgres'
                      - name: DB_POSTGRESDB_SCHEMA
                        value: 'n8n'
                      - name: DB_POSTGRESDB_POOL_SIZE
                        value: '25'
                      - name: DB_POSTGRESDB_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: n8n-supabase-shared
                                key: db-password
                      # Redis (pull jobs from queue)
                      - name: EXECUTIONS_MODE
                        value: 'queue'
                      - name: QUEUE_BULL_REDIS_HOST
                        value: 'redis-master.redis.svc.cluster.local'
                      - name: QUEUE_BULL_REDIS_PORT
                        value: '6379'
                      - name: QUEUE_BULL_REDIS_DB
                        value: '2'
                      - name: QUEUE_BULL_PREFIX
                        value: 'n8n-bull'
                      # Worker configuration
                      - name: QUEUE_HEALTH_CHECK_ACTIVE
                        value: 'true'
                      - name: QUEUE_WORKER_STALLED_INTERVAL
                        value: '15000'
                      # Execution tuning
                      - name: EXECUTIONS_DATA_SAVE_ON_ERROR
                        value: 'all'
                      - name: EXECUTIONS_DATA_SAVE_ON_SUCCESS
                        value: 'none'
                      - name: EXECUTIONS_DATA_SAVE_ON_PROGRESS
                        value: 'false'
                      - name: EXECUTIONS_DATA_PRUNE
                        value: 'true'
                      - name: EXECUTIONS_DATA_MAX_AGE
                        value: '168'
                      - name: EXECUTIONS_DATA_PRUNE_MAX_COUNT
                        value: '5000'
                      - name: EXECUTIONS_TIMEOUT
                        value: '300'
                      - name: EXECUTIONS_TIMEOUT_MAX
                        value: '600'
                      - name: GENERIC_TIMEZONE
                        value: 'UTC'
                      - name: N8N_ENCRYPTION_KEY
                        valueFrom:
                            secretKeyRef:
                                name: n8n-encryption-secret
                                key: encryption-key
                      - name: N8N_LICENSE_ACTIVATION_KEY
                        valueFrom:
                            secretKeyRef:
                                name: n8n-license-secret
                                key: activation-key
                      # Observability
                      - name: N8N_METRICS
                        value: 'true'
                      - name: N8N_METRICS_INCLUDE_QUEUE_METRICS
                        value: 'true'
                      - name: N8N_LOG_LEVEL
                        value: 'warn'
                      # Security
                      - name: N8N_PERSONALIZATION_ENABLED
                        value: 'false'
                      - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
                        value: 'true'
                      # Task runner (external mode — sidecar container)
                      - name: N8N_RUNNERS_ENABLED
                        value: 'true'
                      - name: N8N_RUNNERS_MODE
                        value: 'external'
                      - name: N8N_RUNNERS_BROKER_LISTEN_ADDRESS
                        value: '0.0.0.0'
                      - name: N8N_RUNNERS_AUTH_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: n8n-runner-auth
                                key: auth-token
                  resources:
                      requests:
                          memory: '1Gi'
                          cpu: '1000m'
                      limits:
                          memory: '4Gi'
                          cpu: '2000m'
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: health
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: health
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                # Task runner sidecar (executes Code node JS/Python)
                - name: n8n-runner
                  image: n8nio/runners:2.9.4
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: launcher-health
                        containerPort: 5680
                        protocol: TCP
                  env:
                      - name: N8N_RUNNERS_AUTH_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: n8n-runner-auth
                                key: auth-token
                      - name: N8N_RUNNERS_TASK_BROKER_URI
                        value: 'http://localhost:5679'
                      - name: N8N_RUNNERS_MAX_CONCURRENCY
                        value: '5'
                  resources:
                      requests:
                          memory: '512Mi'
                          cpu: '500m'
                      limits:
                          memory: '1Gi'
                          cpu: '1000m'
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: launcher-health
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: launcher-health
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
