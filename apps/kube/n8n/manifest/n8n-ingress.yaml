# Ingress: Route n8n.kbve.com to n8n service
#
# Auth model:
#   - /webhook/* : open (external triggers from GitHub, etc.)
#   - /*         : n8n built-in auth (login page gates access)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: n8n-ingress
    namespace: n8n
    annotations:
        kubernetes.io/ingress.class: nginx
        cert-manager.io/cluster-issuer: letsencrypt-http
        nginx.ingress.kubernetes.io/proxy-body-size: '16m'
        nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
        nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
spec:
    tls:
        - hosts:
              - n8n.kbve.com
          secretName: n8n-kbve-tls
    rules:
        - host: n8n.kbve.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n-service
                            port:
                                number: 5678
