# Ingress: n8n.kbve.com routing
#
# Single ingress — n8n's built-in auth (owner account) protects the
# editor. Webhook paths are open by design for external triggers.
#
# Basic auth was removed because it breaks n8n's SPA: modern fetch()
# calls don't inherit browser-cached basic auth credentials, causing
# all /rest/* API calls to 401.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: n8n-ingress
    namespace: n8n
    annotations:
        kubernetes.io/ingress.class: nginx
        cert-manager.io/cluster-issuer: letsencrypt-http
        nginx.ingress.kubernetes.io/proxy-body-size: '16m'
        nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
        nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
spec:
    tls:
        - hosts:
              - n8n.kbve.com
          secretName: n8n-kbve-tls
    rules:
        - host: n8n.kbve.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
