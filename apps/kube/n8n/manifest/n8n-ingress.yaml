# Ingress: n8n.kbve.com routing
#
# Split into two ingress resources:
#   1. Webhook ingress — open, no auth (GitHub, external triggers)
#   2. Editor ingress — basic auth + n8n built-in auth (double layer)
#
# Basic auth credentials stored in n8n-basic-auth SealedSecret.

# --- Webhook ingress (open) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: n8n-webhook-ingress
    namespace: n8n
    annotations:
        kubernetes.io/ingress.class: nginx
        cert-manager.io/cluster-issuer: letsencrypt-http
        nginx.ingress.kubernetes.io/proxy-body-size: '16m'
        nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
        nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
spec:
    tls:
        - hosts:
              - n8n.kbve.com
          secretName: n8n-kbve-tls
    rules:
        - host: n8n.kbve.com
          http:
              paths:
                  - path: /webhook
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n-service
                            port:
                                number: 5678
                  - path: /webhook-test
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n-service
                            port:
                                number: 5678
---
# --- Editor ingress (basic auth protected) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: n8n-editor-ingress
    namespace: n8n
    annotations:
        kubernetes.io/ingress.class: nginx
        cert-manager.io/cluster-issuer: letsencrypt-http
        nginx.ingress.kubernetes.io/auth-type: basic
        nginx.ingress.kubernetes.io/auth-secret: n8n-basic-auth
        nginx.ingress.kubernetes.io/auth-realm: 'n8n - Authentication Required'
        nginx.ingress.kubernetes.io/proxy-body-size: '16m'
        nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
        nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
spec:
    tls:
        - hosts:
              - n8n.kbve.com
          secretName: n8n-kbve-tls
    rules:
        - host: n8n.kbve.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n-service
                            port:
                                number: 5678
