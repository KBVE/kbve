# Ingress: n8n.kbve.com routing
#
# Split into two ingress resources:
#   1. Open ingress — webhooks, API, assets, static files (no auth)
#   2. Editor ingress — basic auth on the root HTML page only
#
# n8n's SPA makes fetch() calls to /rest/*, loads JS from /assets/*,
# etc. These must bypass basic auth because n8n's own 401 responses
# (login flow) conflict with NGINX basic auth 401 and cause infinite
# re-prompts. By routing all SPA paths through the open ingress,
# only the initial page load triggers the basic auth prompt.
#
# Basic auth credentials stored in n8n-basic-auth SealedSecret.

# --- Open ingress (webhooks + SPA assets/API) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: n8n-open-ingress
    namespace: n8n
    annotations:
        kubernetes.io/ingress.class: nginx
        cert-manager.io/cluster-issuer: letsencrypt-http
        nginx.ingress.kubernetes.io/proxy-body-size: '16m'
        nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
        nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
spec:
    tls:
        - hosts:
              - n8n.kbve.com
          secretName: n8n-kbve-tls
    rules:
        - host: n8n.kbve.com
          http:
              paths:
                  # Webhooks (external triggers)
                  - path: /webhook
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
                  - path: /webhook-test
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
                  # SPA API + assets (must bypass basic auth)
                  - path: /rest
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
                  - path: /assets
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
                  - path: /static
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
                  - path: /healthz
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
                  - path: /icons
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
                  - path: /types
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
---
# --- Editor ingress (basic auth on root page only) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: n8n-editor-ingress
    namespace: n8n
    annotations:
        kubernetes.io/ingress.class: nginx
        cert-manager.io/cluster-issuer: letsencrypt-http
        nginx.ingress.kubernetes.io/auth-type: basic
        nginx.ingress.kubernetes.io/auth-secret: n8n-basic-auth
        nginx.ingress.kubernetes.io/auth-realm: 'n8n - Authentication Required'
        nginx.ingress.kubernetes.io/proxy-body-size: '16m'
        nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
        nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
spec:
    tls:
        - hosts:
              - n8n.kbve.com
          secretName: n8n-kbve-tls
    rules:
        - host: n8n.kbve.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: n8n
                            port:
                                number: 5678
