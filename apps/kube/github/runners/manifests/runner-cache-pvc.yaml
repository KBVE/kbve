apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: arc-runner-cache-sdb
    namespace: arc-runners
    labels:
        app.kubernetes.io/component: runner-cache
        app.kubernetes.io/part-of: arc-runner-set
        kbve.com/category: ci-cd
        kbve.com/stack: github-actions
        kbve.com/managed-by: argocd
spec:
    accessModes:
        - ReadWriteMany
    storageClassName: longhorn-sdb
    resources:
        requests:
            storage: 200Gi
