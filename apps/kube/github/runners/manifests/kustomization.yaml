apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
    name: arc-runners-manifests
    annotations:
        description: 'ExternalSecret to pull GitHub PAT from arc-systems namespace'

resources:
    - namespace.yaml
    - github-arc-externalsecret.yaml
    - longhorn-sdb-storageclass.yaml
    - runner-cache-pvc.yaml
    - ue-dind-cache-pvc.yaml
    - ows-server-build-pvc.yaml
    - ows-build-reporter-configmap.yaml
    - cache-cleanup-cronjob.yaml
    - registry-mirror.yaml
    - registry-mirror-ghcr.yaml
    - buildkitd.yaml
    - valkey-sccache-externalsecret.yaml
    - vm-starter-rbac.yaml
    - runner-reaper.yaml
    - runner-networkpolicy.yaml
    - runner-apiserver-egress.yaml
