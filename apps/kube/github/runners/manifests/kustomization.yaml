apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
    name: arc-runners-manifests
    annotations:
        description: 'ExternalSecret to pull GitHub PAT from arc-systems namespace'

resources:
    - namespace.yaml
    - github-arc-externalsecret.yaml
    - longhorn-sdb-storageclass.yaml
    - runner-cache-pvc.yaml
    - docker-cache-pvc.yaml
    - dind-cache-pvc.yaml
    - engine-cache-pvc.yaml
    - ows-server-build-pvc.yaml
    - ows-launcher-secrets.yaml
    - ows-instance-launcher.yaml
    - cache-cleanup-cronjob.yaml
