# Persistent /var/lib/docker for the general arc-runner-set scale set.
# Caches pulled images (notably unityci/editor at ~5GB) so they survive
# pod restarts. Mirrors the UE runner pattern (arc-dind-ue-cache) but
# scoped to the general runners that drive ci-unity / ci-docker /
# ci-bevy etc.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: arc-dind-cache
    namespace: arc-runners
    labels:
        app.kubernetes.io/component: dind-cache
        app.kubernetes.io/part-of: arc-runner-set
spec:
    accessModes:
        - ReadWriteMany
    storageClassName: longhorn-sdb
    resources:
        requests:
            storage: 150Gi
