# ghcr.io pull-through cache for arc-runner-ue DinD.
#
# The UE image (ghcr.io/epicgames/unreal-engine, ~20GB) is re-pulled from the
# internet by every Unreal build job (~25min each) because arc-runner-ue dind
# uses an emptyDir data-root and the existing registry-mirror only proxies
# Docker Hub. This registry:2 in proxy mode caches ghcr layers on a Longhorn
# PVC so the first pull fills it once and every later pull is LAN speed.
#
# Auth: proxies the PRIVATE epicgames image, so it authenticates upstream with
# the GitHub PAT already in the cluster (github-arc-token / github_token,
# owner h0lybyte — verified read:packages + EpicGames org access).
#
# Retention (janitor sidecar, Task 3): 7-day TTL + soft/hard size limits with
# a whitelist. Proxy mode is pull-only; clients cannot push. Online GC is safe
# because every blob is reconstructable from ghcr (a wrong collect = re-pull).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: registry-mirror-ghcr-data
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror-ghcr
        app.kubernetes.io/part-of: arc-runner-set
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 100Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: registry-mirror-ghcr-config
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror-ghcr
        app.kubernetes.io/part-of: arc-runner-set
data:
    config.yml: |
        version: 0.1
        log:
          level: info
          fields:
            service: registry
        storage:
          filesystem:
            rootdirectory: /var/lib/registry
          cache:
            blobdescriptor: inmemory
          delete:
            enabled: true
        http:
          addr: :5000
          headers:
            X-Content-Type-Options: [nosniff]
        proxy:
          remoteurl: https://ghcr.io
          ttl: 168h
          # username/password supplied via REGISTRY_PROXY_* env so the PAT
          # never lands in this ConfigMap.
        health:
          storagedriver:
            enabled: true
            interval: 10s
            threshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: registry-mirror-ghcr
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror-ghcr
        app.kubernetes.io/part-of: arc-runner-set
spec:
    replicas: 1
    strategy:
        # RWO PVC + single replica: Recreate avoids the rolling-update deadlock
        # where the new pod can't attach the volume the old pod still holds.
        type: Recreate
    selector:
        matchLabels:
            app.kubernetes.io/name: registry-mirror-ghcr
    template:
        metadata:
            labels:
                app.kubernetes.io/name: registry-mirror-ghcr
                app.kubernetes.io/part-of: arc-runner-set
        spec:
            containers:
                - name: registry
                  image: registry:2.8.3
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: http
                        containerPort: 5000
                  env:
                      - name: REGISTRY_HTTP_ADDR
                        value: ':5000'
                      - name: REGISTRY_PROXY_REMOTEURL
                        value: 'https://ghcr.io'
                      - name: REGISTRY_PROXY_USERNAME
                        value: 'h0lybyte'
                      - name: REGISTRY_PROXY_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: github-arc-token
                                key: github_token
                  volumeMounts:
                      - name: config
                        mountPath: /etc/docker/registry
                        readOnly: true
                      - name: data
                        mountPath: /var/lib/registry
                  resources:
                      limits:
                          cpu: '2'
                          memory: 2Gi
                      requests:
                          cpu: 100m
                          memory: 256Mi
                  readinessProbe:
                      httpGet:
                          path: /
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 30
                - name: janitor
                  image: registry:2.8.3
                  imagePullPolicy: IfNotPresent
                  command: ['/bin/sh', '/opt/janitor/janitor.sh']
                  env:
                      - name: SOFT_PCT
                        value: '80'
                      - name: HARD_PCT
                        value: '95'
                      - name: INTERVAL_SECONDS
                        value: '3600'
                  volumeMounts:
                      - name: config
                        mountPath: /etc/docker/registry
                        readOnly: true
                      - name: data
                        mountPath: /var/lib/registry
                      - name: janitor
                        mountPath: /opt/janitor
                        readOnly: true
                      - name: whitelist
                        mountPath: /etc/janitor
                        readOnly: true
                  resources:
                      limits:
                          cpu: '1'
                          memory: 256Mi
                      requests:
                          cpu: 50m
                          memory: 64Mi
            volumes:
                - name: config
                  configMap:
                      name: registry-mirror-ghcr-config
                      items:
                          - key: config.yml
                            path: config.yml
                - name: data
                  persistentVolumeClaim:
                      claimName: registry-mirror-ghcr-data
                - name: janitor
                  configMap:
                      name: registry-mirror-ghcr-janitor
                      items:
                          - key: janitor.sh
                            path: janitor.sh
                - name: whitelist
                  configMap:
                      name: registry-mirror-ghcr-whitelist
                      items:
                          - key: whitelist
                            path: whitelist
---
apiVersion: v1
kind: Service
metadata:
    name: registry-mirror-ghcr
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror-ghcr
        app.kubernetes.io/part-of: arc-runner-set
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: registry-mirror-ghcr
    ports:
        - name: http
          port: 5000
          targetPort: http
          protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: registry-mirror-ghcr-whitelist
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror-ghcr
        app.kubernetes.io/part-of: arc-runner-set
data:
    # One "<repo>:<tag>" per line (cache path — no ghcr.io/ host prefix).
    # These are never pruned under the SOFT limit; only sacrificed (oldest
    # first) under the HARD limit to avoid a full disk.
    whitelist: |
        epicgames/unreal-engine:dev-5.8.0
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: registry-mirror-ghcr-janitor
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror-ghcr
        app.kubernetes.io/part-of: arc-runner-set
data:
    janitor.sh: |
        #!/bin/sh
        # Size-bounded retention for the ghcr pull-through cache. Shares the
        # registry's data PVC; talks to the registry on localhost. Online GC is
        # safe: this is a proxy, so any over-collected blob is just re-pulled.
        set -eu
        REG="http://127.0.0.1:5000"
        DATA="/var/lib/registry"
        CONFIG="/etc/docker/registry/config.yml"
        WL="/etc/janitor/whitelist"
        SOFT="${SOFT_PCT:-80}"
        HARD="${HARD_PCT:-95}"
        INTERVAL="${INTERVAL_SECONDS:-3600}"

        command -v jq >/dev/null 2>&1 || apk add --no-cache jq curl >/dev/null 2>&1 || true

        usage() { df -P "$DATA" | awk 'NR==2{gsub("%","",$5);print $5}'; }
        wl() { grep -qxF "$1:$2" "$WL" 2>/dev/null; }
        # GC runs online. Blob loss is safe (proxy cache is reconstructable from
        # ghcr). A blob being written by a concurrent pull could be collected
        # mid-flight, failing THAT one pull; it self-heals on retry. Fires only
        # at >= SOFT usage.
        gc() { registry garbage-collect --delete-untagged "$CONFIG" >/dev/null 2>&1 || true; }

        # NOTE: _catalog and tags/list are single-page (registry default ~100).
        # Fine for the few large images cached today; a multi-repo cache would
        # need Link-header pagination here.
        # emit "mtime<TAB>repo<TAB>tag<TAB>digest", oldest first
        tags() {
          curl -fsS "$REG/v2/_catalog" | jq -r '.repositories[]?' | while read -r r; do
            curl -fsS "$REG/v2/$r/tags/list" | jq -r '.tags[]?' | while read -r t; do
              d=$(curl -fsS -o /dev/null -D - \
                   -H 'Accept: application/vnd.docker.distribution.manifest.v2+json' \
                   "$REG/v2/$r/manifests/$t" \
                   | awk -F': ' 'tolower($1)=="docker-content-digest"{gsub("\r","",$2);print $2}')
              [ -n "$d" ] || continue
              m=$(stat -c %Y "$DATA/docker/registry/v2/repositories/$r/_manifests/tags/$t" 2>/dev/null || echo 0)
              printf '%s\t%s\t%s\t%s\n' "$m" "$r" "$t" "$d"
            done
          done | sort -n
        }
        del() { curl -fsS -X DELETE \
                 -H 'Accept: application/vnd.docker.distribution.manifest.v2+json' \
                 "$REG/v2/$1/manifests/$2" >/dev/null 2>&1 || true; }

        while :; do
          if ! command -v jq >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
            echo "janitor: ERROR jq/curl unavailable - size pruning DISABLED; retention falls back to proxy.ttl(168h). Bake jq+curl into the image to restore."
            apk add --no-cache jq curl >/dev/null 2>&1 || true
            sleep "$INTERVAL"; continue
          fi
          U=$(usage)
          if [ "$U" -ge "$HARD" ]; then
            echo "janitor: HARD ${U}% >= ${HARD}% — drop non-whitelisted, then oldest until under"
            tags | while IFS="$(printf '\t')" read -r m r t d; do wl "$r" "$t" && continue; echo "  del $r:$t"; del "$r" "$d"; done
            gc
            while [ "$(usage)" -ge "$HARD" ]; do
              line=$(tags | head -1); [ -z "$line" ] && break
              r=$(echo "$line" | cut -f2); t=$(echo "$line" | cut -f3); d=$(echo "$line" | cut -f4)
              echo "  HARD del (whitelisted ok) $r:$t"; del "$r" "$d"; gc
            done
          elif [ "$U" -ge "$SOFT" ]; then
            echo "janitor: SOFT ${U}% >= ${SOFT}% — drop all non-whitelisted"
            tags | while IFS="$(printf '\t')" read -r m r t d; do wl "$r" "$t" && continue; echo "  del $r:$t"; del "$r" "$d"; done
            gc
          else
            echo "janitor: usage ${U}% OK"
          fi
          sleep "$INTERVAL"
        done
