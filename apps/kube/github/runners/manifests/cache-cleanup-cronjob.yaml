# Tiered cache cleanup strategy for ARC runner PVC.
#
# Three tiers run the same script with TIER env, gated on phases:
#   1. Light  (every 6h)  — Phase 1 only: per-cache age prune (parallel)
#   2. Medium (daily)     — Phase 1 + Phase 2: cap enforcement
#   3. Heavy  (every 3d)  — Phase 1 + 2 + 3: capacity gate (>80% → LRU prune largest)
#
# Per-cache policy via CACHE_POLICIES (space-separated NAME:MODE:CAP_GB):
#   - mode=age:          age out files older than AGE_DAYS, then file-level LRU
#   - mode=cap:          NEVER age out; file-level LRU when over CAP_GB
#                        (use only for caches WITHOUT internal manifests)
#   - mode=cap-project:  NEVER age out; per-subdir LRU when over CAP_GB —
#                        evicts whole project subdirs (safe for Unity Library
#                        which has ArtifactDB/SourceAssetDB integrity)
#
# Unity Library structure: /cache/unity-library/<project-platform>/{ArtifactDB,
# SourceAssetDB, Artifacts/, ShaderCache/, ...}. File-level LRU on the inner
# Artifacts/ would orphan ArtifactDB entries → corruption on next import.
# cap-project drops whole platform dirs; Unity reimports that platform once.
#
# Uses mtime (not atime) because Longhorn/NFS may mount with noatime.
# All three share the same PVC mount at /cache.
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: arc-cache-cleanup-script
    namespace: arc-runners
data:
    cleanup.sh: |
        #!/bin/sh
        set -u
        CACHE="${CACHE:-/cache}"
        TIER="${TIER:-light}"
        AGE_DAYS="${AGE_DAYS:-3}"
        CAPACITY_PCT="${CAPACITY_PCT:-80}"
        # Per-cache policy: NAME:MODE:CAP_GB (space-separated)
        # NEVER age unity-library — Unity rebuilds the entire Library on cache miss (~30min)
        CACHE_POLICIES="${CACHE_POLICIES:-cargo:age:20 lfs:age:5 unity-library:cap-project:80}"

        echo "=== ${TIER} cleanup starting ==="
        echo "  age=${AGE_DAYS}d  policies='${CACHE_POLICIES}'"
        df -h "${CACHE}" || true
        echo ""

        age_prune() {
            DIR="$1"
            [ -d "$DIR" ] || return 0
            START=$(date +%s)
            find "$DIR" -type f -mtime +"${AGE_DAYS}" -delete 2>/dev/null || true
            find "$DIR" -type d -empty -delete 2>/dev/null || true
            ELAPSED=$(( $(date +%s) - START ))
            echo "  age-pruned $(basename "$DIR") in ${ELAPSED}s"
        }

        # BusyBox-safe LRU: sort by mtime via `stat`, drop oldest until under cap.
        cap_prune() {
            DIR="$1"
            CAP_GB="$2"
            [ -d "$DIR" ] || return 0
            CAP_KB=$(( CAP_GB * 1024 * 1024 ))
            DIR_KB=$(du -sk "$DIR" 2>/dev/null | cut -f1)
            [ -z "${DIR_KB}" ] && return 0
            if [ "${DIR_KB}" -le "${CAP_KB}" ]; then
                echo "  $(basename "$DIR"): $(( DIR_KB / 1024 ))Mi under ${CAP_GB}Gi cap"
                return 0
            fi
            OVER_KB=$(( DIR_KB - CAP_KB ))
            echo "  $(basename "$DIR"): $(( DIR_KB / 1024 ))Mi over cap by $(( OVER_KB / 1024 ))Mi — LRU pruning"
            START=$(date +%s)
            # Headroom: prune to 90% of cap to avoid thrashing on next run
            HEADROOM_KB=$(( CAP_KB / 10 ))
            TARGET_PRUNE_KB=$(( OVER_KB + HEADROOM_KB ))
            find "$DIR" -type f -exec stat -c '%Y %s %n' {} + 2>/dev/null \
                | sort -n \
                | awk -v target="${TARGET_PRUNE_KB}" '
                    {
                        size_kb = int($2 / 1024) + 1
                        cum += size_kb
                        # %Y %s name — print everything after column 2
                        sub(/^[0-9]+ [0-9]+ /, "")
                        print
                        if (cum >= target) exit
                    }
                  ' \
                | xargs -r rm -f 2>/dev/null || true
            find "$DIR" -type d -empty -delete 2>/dev/null || true
            ELAPSED=$(( $(date +%s) - START ))
            NEW_KB=$(du -sk "$DIR" 2>/dev/null | cut -f1)
            echo "  $(basename "$DIR"): now $(( NEW_KB / 1024 ))Mi (cap-prune ${ELAPSED}s)"
        }

        # Per-subdir LRU: when DIR exceeds cap, drop whole oldest subdirs
        # (one nesting level). Used for caches with internal manifests where
        # file-level deletion would corrupt state (e.g., Unity Library).
        # Subdir freshness tracked via the most-recently-touched file inside.
        cap_project_prune() {
            DIR="$1"
            CAP_GB="$2"
            [ -d "$DIR" ] || return 0
            CAP_KB=$(( CAP_GB * 1024 * 1024 ))
            DIR_KB=$(du -sk "$DIR" 2>/dev/null | cut -f1)
            [ -z "${DIR_KB}" ] && return 0
            if [ "${DIR_KB}" -le "${CAP_KB}" ]; then
                echo "  $(basename "$DIR"): $(( DIR_KB / 1024 ))Mi under ${CAP_GB}Gi cap (project-LRU)"
                return 0
            fi
            OVER_KB=$(( DIR_KB - CAP_KB ))
            HEADROOM_KB=$(( CAP_KB / 10 ))
            TARGET_PRUNE_KB=$(( OVER_KB + HEADROOM_KB ))
            echo "  $(basename "$DIR"): $(( DIR_KB / 1024 ))Mi over by $(( OVER_KB / 1024 ))Mi — evicting oldest projects"
            START=$(date +%s)
            # awk picks subdirs to evict via cumulative size; while executes rm.
            # Freshness via -maxdepth 2 (Unity touches ArtifactDB/SourceAssetDB
            # on every import — captures activity without walking 350K artifacts).
            for SUB in "$DIR"/*/; do
                [ -d "$SUB" ] || continue
                NEWEST=$(find "$SUB" -maxdepth 2 -type f -exec stat -c '%Y' {} + 2>/dev/null \
                    | sort -rn | head -1)
                [ -z "${NEWEST}" ] && NEWEST=$(stat -c '%Y' "$SUB" 2>/dev/null || echo 0)
                SUB_KB=$(du -sk "$SUB" 2>/dev/null | cut -f1)
                [ -z "${SUB_KB}" ] && SUB_KB=0
                printf '%s\t%s\t%s\n' "${NEWEST}" "${SUB_KB}" "$SUB"
            done | sort -n | awk -v target="${TARGET_PRUNE_KB}" -F'\t' '
                {
                    cum += $2
                    print $3
                    if (cum >= target) exit
                }
              ' | while IFS= read -r EVICT_PATH; do
                [ -d "$EVICT_PATH" ] || continue
                EVICT_KB=$(du -sk "$EVICT_PATH" 2>/dev/null | cut -f1)
                echo "  evict $(basename "$EVICT_PATH") ($(( EVICT_KB / 1024 ))Mi)"
                rm -rf "$EVICT_PATH"
            done
            ELAPSED=$(( $(date +%s) - START ))
            NEW_KB=$(du -sk "$DIR" 2>/dev/null | cut -f1)
            echo "  $(basename "$DIR"): now $(( NEW_KB / 1024 ))Mi (project-LRU ${ELAPSED}s)"
        }

        # Phase 1: per-cache age prune (parallel; only for mode=age)
        echo "Phase 1: age prune (parallel)"
        for ENTRY in ${CACHE_POLICIES}; do
            NAME=$(echo "${ENTRY}" | cut -d: -f1)
            MODE=$(echo "${ENTRY}" | cut -d: -f2)
            if [ "${MODE}" = "age" ]; then
                age_prune "${CACHE}/${NAME}" &
            fi
        done
        wait
        echo ""

        # Phase 2: cap enforcement (medium + heavy)
        if [ "${TIER}" = "medium" ] || [ "${TIER}" = "heavy" ]; then
            echo "Phase 2: cap enforcement"
            for ENTRY in ${CACHE_POLICIES}; do
                NAME=$(echo "${ENTRY}" | cut -d: -f1)
                MODE=$(echo "${ENTRY}" | cut -d: -f2)
                CAP=$(echo "${ENTRY}" | cut -d: -f3)
                case "${MODE}" in
                    age|cap)
                        cap_prune "${CACHE}/${NAME}" "${CAP}"
                        ;;
                    cap-project)
                        cap_project_prune "${CACHE}/${NAME}" "${CAP}"
                        ;;
                    *)
                        echo "  $(basename "${CACHE}/${NAME}"): unknown mode '${MODE}' — skipping"
                        ;;
                esac
            done
            echo ""
        fi

        # Phase 3: capacity gate — heavy only
        # Last-resort: cache fills despite caps (new dir not in policy?). Nuke largest.
        if [ "${TIER}" = "heavy" ]; then
            echo "Phase 3: capacity gate (>${CAPACITY_PCT}%)"
            USAGE=$(df "${CACHE}" | tail -1 | awk '{gsub(/%/,""); print $5}')
            echo "  current usage: ${USAGE}%"
            ATTEMPTS=0
            while [ "${USAGE}" -gt "${CAPACITY_PCT}" ] && [ "${ATTEMPTS}" -lt 5 ]; do
                ATTEMPTS=$(( ATTEMPTS + 1 ))
                LARGEST=$(du -sk "${CACHE}"/*/ 2>/dev/null | sort -rn | head -1 | cut -f2)
                if [ -z "${LARGEST}" ]; then
                    echo "  no cache dirs remain"
                    break
                fi
                LNAME=$(basename "${LARGEST}")
                LKB=$(du -sk "${LARGEST}" 2>/dev/null | cut -f1)
                echo "  emergency: clearing ${LNAME} ($(( LKB / 1024 ))Mi) at ${USAGE}%"
                rm -rf "${LARGEST:?}"/* 2>/dev/null || true
                USAGE=$(df "${CACHE}" | tail -1 | awk '{gsub(/%/,""); print $5}')
            done
            echo ""
        fi

        df -h "${CACHE}" || true
        echo "=== ${TIER} cleanup done ==="
---
# ── Tier 1: Light — every 6 hours ──────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
    name: arc-cache-cleanup-light
    namespace: arc-runners
spec:
    schedule: '0 */6 * * *'
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    jobTemplate:
        spec:
            activeDeadlineSeconds: 1800
            ttlSecondsAfterFinished: 86400
            backoffLimit: 0
            template:
                spec:
                    restartPolicy: Never
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                        runAsGroup: 1000
                        fsGroup: 1000
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: cache-cleanup
                          image: alpine:3.21
                          env:
                              - name: TIER
                                value: light
                              - name: AGE_DAYS
                                value: '3'
                          securityContext:
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                  drop:
                                      - ALL
                          command:
                              - /bin/sh
                              - /scripts/cleanup.sh
                          resources:
                              limits:
                                  cpu: 200m
                                  memory: 128Mi
                              requests:
                                  cpu: 50m
                                  memory: 64Mi
                          volumeMounts:
                              - name: runner-cache
                                mountPath: /cache
                              - name: cleanup-script
                                mountPath: /scripts
                                readOnly: true
                    volumes:
                        - name: runner-cache
                          persistentVolumeClaim:
                              claimName: arc-runner-cache-sdb
                        - name: cleanup-script
                          configMap:
                              name: arc-cache-cleanup-script
                              defaultMode: 0755
---
# ── Tier 2: Medium — daily at 3 AM UTC ────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
    name: arc-cache-cleanup-medium
    namespace: arc-runners
spec:
    schedule: '0 3 * * *'
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    jobTemplate:
        spec:
            activeDeadlineSeconds: 2400
            ttlSecondsAfterFinished: 86400
            backoffLimit: 0
            template:
                spec:
                    restartPolicy: Never
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                        runAsGroup: 1000
                        fsGroup: 1000
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: cache-cleanup
                          image: alpine:3.21
                          env:
                              - name: TIER
                                value: medium
                              - name: AGE_DAYS
                                value: '3'
                          securityContext:
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                  drop:
                                      - ALL
                          command:
                              - /bin/sh
                              - /scripts/cleanup.sh
                          resources:
                              limits:
                                  cpu: 300m
                                  memory: 256Mi
                              requests:
                                  cpu: 50m
                                  memory: 64Mi
                          volumeMounts:
                              - name: runner-cache
                                mountPath: /cache
                              - name: cleanup-script
                                mountPath: /scripts
                                readOnly: true
                    volumes:
                        - name: runner-cache
                          persistentVolumeClaim:
                              claimName: arc-runner-cache-sdb
                        - name: cleanup-script
                          configMap:
                              name: arc-cache-cleanup-script
                              defaultMode: 0755
---
# ── Tier 3: Heavy — every 3 days at 4 AM UTC ──────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
    name: arc-cache-cleanup-heavy
    namespace: arc-runners
spec:
    schedule: '0 4 */3 * *'
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    jobTemplate:
        spec:
            activeDeadlineSeconds: 3600
            ttlSecondsAfterFinished: 86400
            backoffLimit: 0
            template:
                spec:
                    restartPolicy: Never
                    securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                        runAsGroup: 1000
                        fsGroup: 1000
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: cache-cleanup
                          image: alpine:3.21
                          env:
                              - name: TIER
                                value: heavy
                              - name: AGE_DAYS
                                value: '3'
                              - name: CAPACITY_PCT
                                value: '80'
                          securityContext:
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                  drop:
                                      - ALL
                          command:
                              - /bin/sh
                              - /scripts/cleanup.sh
                          resources:
                              limits:
                                  cpu: 300m
                                  memory: 256Mi
                              requests:
                                  cpu: 50m
                                  memory: 64Mi
                          volumeMounts:
                              - name: runner-cache
                                mountPath: /cache
                              - name: cleanup-script
                                mountPath: /scripts
                                readOnly: true
                    volumes:
                        - name: runner-cache
                          persistentVolumeClaim:
                              claimName: arc-runner-cache-sdb
                        - name: cleanup-script
                          configMap:
                              name: arc-cache-cleanup-script
                              defaultMode: 0755
