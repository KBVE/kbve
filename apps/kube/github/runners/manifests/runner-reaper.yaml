apiVersion: v1
kind: ServiceAccount
metadata:
    name: arc-runner-reaper
    namespace: arc-runners
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: arc-runner-reaper
    namespace: arc-runners
rules:
    - apiGroups:
          - actions.github.com
      resources:
          - ephemeralrunners
      verbs:
          - get
          - list
          - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: arc-runner-reaper
    namespace: arc-runners
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: arc-runner-reaper
subjects:
    - kind: ServiceAccount
      name: arc-runner-reaper
      namespace: arc-runners
---
apiVersion: batch/v1
kind: CronJob
metadata:
    name: arc-runner-reaper
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: arc-runner-reaper
        app.kubernetes.io/component: maintenance
        kbve.com/category: ci-cd
        kbve.com/stack: github-actions
        kbve.com/managed-by: argocd
spec:
    schedule: '*/10 * * * *'
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    jobTemplate:
        spec:
            backoffLimit: 2
            ttlSecondsAfterFinished: 600
            template:
                spec:
                    serviceAccountName: arc-runner-reaper
                    restartPolicy: OnFailure
                    containers:
                        - name: reaper
                          image: ghcr.io/kbve/kubectl:0.1.4
                          command:
                              - /bin/sh
                              - -c
                          args:
                              - "set -eu\nNS=arc-runners\nFAILED=$(kubectl get ephemeralrunner -n \"\
                                $NS\" -o json \\\n  | jq -r '.items[] | select(.status.phase == \"Failed\"\
                                ) | .metadata.name')\nif [ -z \"$FAILED\" ]; then\n  echo \"No Failed\
                                \ ephemeralrunners; nothing to reap.\"\n  exit 0\nfi\necho \"Reaping\
                                \ Failed ephemeralrunners:\"\necho \"$FAILED\"\necho \"$FAILED\" | xargs\
                                \ -r kubectl delete ephemeralrunner -n \"$NS\"\n"
                          resources:
                              requests:
                                  cpu: 25m
                                  memory: 64Mi
                              limits:
                                  cpu: 100m
                                  memory: 128Mi
