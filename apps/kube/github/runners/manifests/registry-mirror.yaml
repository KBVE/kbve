apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: registry-mirror-data
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror
        app.kubernetes.io/part-of: arc-runner-set
        kbve.com/category: ci-cd
        kbve.com/stack: github-actions
        kbve.com/managed-by: argocd
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 200Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: registry-mirror-config
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror
        app.kubernetes.io/part-of: arc-runner-set
        kbve.com/category: ci-cd
        kbve.com/stack: github-actions
        kbve.com/managed-by: argocd
data:
    config.yml:
        "version: 0.1\nlog:\n  level: info\n  fields:\n    service: registry\n\
        storage:\n  filesystem:\n    rootdirectory: /var/lib/registry\n  cache:\n    blobdescriptor:\
        \ inmemory\n  delete:\n    enabled: true\nhttp:\n  addr: :5000\n  headers:\n \
        \   X-Content-Type-Options: [nosniff]\nproxy:\n  remoteurl: https://registry-1.docker.io\n\
        \  # Hub creds (bypass the anon 100/6h pull cap) come from the optional\n  # registry-mirror-hub-creds\
        \ secret via REGISTRY_PROXY_USERNAME /\n  # REGISTRY_PROXY_PASSWORD env. Absent\
        \ secret -> anonymous pulls.\nhealth:\n  storagedriver:\n    enabled: true\n \
        \   interval: 10s\n    threshold: 3\n"
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: registry-mirror
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror
        app.kubernetes.io/part-of: arc-runner-set
        kbve.com/category: ci-cd
        kbve.com/stack: github-actions
        kbve.com/managed-by: argocd
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app.kubernetes.io/name: registry-mirror
    template:
        metadata:
            labels:
                app.kubernetes.io/name: registry-mirror
                app.kubernetes.io/part-of: arc-runner-set
        spec:
            containers:
                - name: registry
                  image: registry:2.8.3
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: http
                        containerPort: 5000
                  env:
                      - name: REGISTRY_HTTP_ADDR
                        value: :5000
                      - name: REGISTRY_PROXY_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: registry-mirror-hub-creds
                                key: username
                                optional: true
                      - name: REGISTRY_PROXY_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: registry-mirror-hub-creds
                                key: password
                                optional: true
                  volumeMounts:
                      - name: config
                        mountPath: /etc/docker/registry
                        readOnly: true
                      - name: data
                        mountPath: /var/lib/registry
                  resources:
                      limits:
                          cpu: '2'
                          memory: 2Gi
                      requests:
                          cpu: 100m
                          memory: 256Mi
                  readinessProbe:
                      httpGet:
                          path: /
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 30
            volumes:
                - name: config
                  configMap:
                      name: registry-mirror-config
                      items:
                          - key: config.yml
                            path: config.yml
                - name: data
                  persistentVolumeClaim:
                      claimName: registry-mirror-data
---
apiVersion: v1
kind: Service
metadata:
    name: registry-mirror
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror
        app.kubernetes.io/part-of: arc-runner-set
        kbve.com/category: ci-cd
        kbve.com/stack: github-actions
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: registry-mirror
    ports:
        - name: http
          port: 5000
          targetPort: http
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: registry-mirror-ingress
    namespace: arc-runners
    labels:
        app.kubernetes.io/name: registry-mirror
        app.kubernetes.io/part-of: arc-runner-set
spec:
    podSelector:
        matchLabels:
            app.kubernetes.io/name: registry-mirror
    policyTypes:
        - Ingress
    ingress:
        - from:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: arc-runners
          ports:
              - port: http
                protocol: TCP
