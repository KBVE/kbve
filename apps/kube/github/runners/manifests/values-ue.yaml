# ARC Runner Scale Set — Unreal Engine builds
# Dedicated runner with persistent DinD cache for UE container images.
# Workflows use: runs-on: arc-runner-ue

runnerScaleSetName: 'arc-runner-ue'

# GitHub configuration
githubConfigUrl: 'https://github.com/kbve'
githubConfigSecret: github-arc-token

# Controller service account reference
controllerServiceAccount:
    name: arc-controller
    namespace: arc-systems

# Scaling — UE builds are heavy, keep pool small
minRunners: 0
maxRunners: 1

# Bump RESTART_TRIGGER to force a pod rollout without changing images.
template:
    metadata:
        annotations:
            kbve.com/restart-trigger: '20260624-pvc-dind-tiered'
    spec:
        initContainers:
            - name: init-dind-externals
              image: ghcr.io/kbve/arc-runner:0.1.7
              command:
                  [
                      'cp',
                      '-r',
                      '-v',
                      '/home/runner/externals/.',
                      '/home/runner/tmpDir/',
                  ]
              volumeMounts:
                  - name: dind-externals
                    mountPath: /home/runner/tmpDir
        containers:
            - name: runner
              image: ghcr.io/kbve/arc-runner:0.1.7
              command: ['/home/runner/run.sh']
              env:
                  - name: DOCKER_HOST
                    value: tcp://localhost:2376
                  - name: FORGEJO_API_TOKEN
                    valueFrom:
                        secretKeyRef:
                            name: forgejo-lfs-credentials
                            key: api-token
              resources:
                  limits:
                      cpu: '16'
                      memory: 96Gi
                  requests:
                      cpu: '4'
                      memory: 24Gi
              securityContext:
                  runAsUser: 1000
                  runAsGroup: 1000
              volumeMounts:
                  - name: work
                    mountPath: /home/runner/_work
                  - name: dind-sock
                    mountPath: /var/run
                  - name: dind-externals
                    mountPath: /home/runner/externals
                  # OWS cooked server output
                  - name: ows-server-build
                    mountPath: /mnt/longhorn/ows-server
                  # Shared scratch so docker-in-docker -v mounts resolve: the
                  # runner materializes the project + reads build output here,
                  # and dind's containers bind-mount the same /tmp paths.
                  - name: shared-tmp
                    mountPath: /tmp
            # Docker-in-Docker sidecar with persistent image cache
            - name: dind
              image: docker:29.3.0-dind
              # Lift fd limits for heavy Linux toolchains (Unity headless,
              # UE5 cooked builds). Mono / clang both assert when fd
              # exceeds RLIMIT_NOFILE → exit code 134.
              command: ['sh', '-c']
              args:
                  - 'ulimit -n 1048576 && exec dockerd --host=unix:///var/run/docker.sock --host=tcp://0.0.0.0:2376 --tls=false --default-ulimit=nofile=1048576:1048576 --feature=containerd-snapshotter=false --insecure-registry=registry-mirror-ghcr.arc-runners.svc.cluster.local:5000'
              securityContext:
                  privileged: true
              resources:
                  limits:
                      cpu: '4'
                      memory: 80Gi
                  requests:
                      cpu: '1'
                      memory: 8Gi
              volumeMounts:
                  - name: work
                    mountPath: /home/runner/_work
                  - name: dind-sock
                    mountPath: /var/run
                  - name: dind-externals
                    mountPath: /home/runner/externals
                  - name: dind-storage
                    mountPath: /var/lib/docker
                  - name: shared-tmp
                    mountPath: /tmp
        volumes:
            - name: work
              emptyDir:
                  medium: Memory
                  sizeLimit: 24Gi
            - name: dind-sock
              emptyDir: {}
            - name: dind-externals
              emptyDir: {}
            # Persistent docker image store on longhorn-sdb (ext4 block → overlay2
            # mounts cleanly; RWX would EINVAL). RWO is safe: maxRunners:1 = single
            # attach. The 50GB UE image is pulled once and stays resident across
            # ephemeral runner pods instead of re-extracting into RAM every job.
            # Frees the 64Gi RAM the old tmpfs store burned; write-heavy UE caches
            # (DDC) are tiered onto a per-build /ram tmpfs in ci-unreal-build.yml.
            - name: dind-storage
              persistentVolumeClaim:
                  claimName: arc-ue-dind-cache
            - name: shared-tmp
              emptyDir:
                  medium: Memory
                  sizeLimit: 16Gi
            - name: ows-server-build
              persistentVolumeClaim:
                  claimName: ows-server-build

listenerTemplate:
    spec:
        containers:
            - name: listener
              resources:
                  limits:
                      cpu: 250m
                      memory: 256Mi
                  requests:
                      cpu: 50m
                      memory: 64Mi
              securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  capabilities:
                      drop:
                          - ALL
