# ARC Runner Scale Set (gha-runner-scale-set) values
# Docs: https://docs.github.com/en/actions/hosting-your-own-runners/managing-self-hosted-runners-with-actions-runner-controller

# IMPORTANT: This name becomes the `runs-on` label in your workflows
# Example: runs-on: arc-runner-set
runnerScaleSetName: 'arc-runner-set'

# GitHub configuration
# Use organization URL for org-wide runners, or repo URL for repo-specific
githubConfigUrl: 'https://github.com/kbve'

# Authentication - reference existing Kubernetes secret with GitHub PAT
# The secret is created by ExternalSecret from arc-systems namespace
# Secret must have key: github_token
githubConfigSecret: github-arc-token

# Controller service account reference
controllerServiceAccount:
    name: arc-controller
    namespace: arc-systems

# Scaling configuration
minRunners: 0
maxRunners: 10

# Runner group (optional - for enterprise/org runners)
# runnerGroup: "default"

# Runner container configuration with Docker-in-Docker support
# Bump RESTART_TRIGGER to force a pod rollout without changing images.
template:
    metadata:
        annotations:
            kbve.com/restart-trigger: '20260502-dind-snapshotter-off'
    spec:
        # Init container to copy externals for DinD
        initContainers:
            - name: init-dind-externals
              image: ghcr.io/actions/actions-runner:2.334.0
              command:
                  [
                      'cp',
                      '-r',
                      '-v',
                      '/home/runner/externals/.',
                      '/home/runner/tmpDir/',
                  ]
              volumeMounts:
                  - name: dind-externals
                    mountPath: /home/runner/tmpDir
        containers:
            - name: runner
              image: ghcr.io/actions/actions-runner:2.334.0
              # Fix sudoers for root before starting runner (Unity builder uses sudo)
              command:
                  [
                      '/bin/bash',
                      '-c',
                      "echo 'root ALL=(ALL) NOPASSWD:ALL' >> /etc/sudoers && /home/runner/run.sh",
                  ]
              env:
                  - name: DOCKER_HOST
                    value: tcp://localhost:2376
                  - name: RUNNER_ALLOW_RUNASROOT
                    value: '1'
              resources:
                  limits:
                      cpu: '12'
                      memory: 24Gi
                  requests:
                      # Idle runners only burn ~100m. Reserve 1 CPU so the pod
                      # schedules but doesn't squat on capacity. Heavy jobs still
                      # burst up to the 12-CPU limit.
                      cpu: '1'
                      memory: 4Gi
              securityContext:
                  # Run as root for sudo/apt-get (Unity builder requirement)
                  # Not privileged - no host access, just root inside container
                  runAsUser: 0
                  runAsGroup: 0
              volumeMounts:
                  - name: work
                    mountPath: /home/runner/_work
                  - name: dind-sock
                    mountPath: /var/run
                  - name: dind-externals
                    mountPath: /home/runner/externals
                  - name: runner-cache
                    mountPath: /home/runner/_cache
            # Docker-in-Docker sidecar
            # Note: Unity builds request high resources, DinD needs headroom
            - name: dind
              image: docker:29.3.0-dind
              # Unity headless on Linux opens many fds during a Windows build
              # (Burst codegen, asset import, IL2CPP). Mono asserts in
              # pal_utilities.h:160 if fd >= RLIMIT_NOFILE → exit code 134.
              # Lift dind's own nofile + propagate via dockerd's
              # --default-ulimit so every container the runner spawns
              # (game-ci/unity-builder) inherits the higher cap.
              #
              # /var/lib/docker is now emptyDir (per-pod ephemeral) because
              # Longhorn RWX (NFS share-manager) breaks overlayfs with
              # EINVAL. Image layers are cached upstream by the in-cluster
              # registry-mirror.arc-runners.svc proxy of Docker Hub, so
              # cold pods pull from LAN instead of hitting Hub each time.
              #
              # Docker 29 defaults to containerd-snapshotter=true, which
              # deeply nests one overlay snapshot per pulled layer. Talos
              # nodes (kernel 6.18, host rootfs already overlayfs) reject
              # the resulting overlay-on-overlay mount with EINVAL during
              # `docker run`. Disable the snapshotter so dockerd falls
              # back to the legacy overlay2 graphdriver, which uses a
              # flatter merged-diff layout that mounts cleanly.
              command: ['sh', '-c']
              args:
                  - 'ulimit -n 1048576 && mkdir -p /var/lib/docker && echo "dind starting; data-root contents:" && ls -la /var/lib/docker && exec dockerd --host=unix:///var/run/docker.sock --host=tcp://0.0.0.0:2376 --tls=false --default-ulimit=nofile=1048576:1048576 --feature=containerd-snapshotter=false --registry-mirror=http://registry-mirror.arc-runners.svc.cluster.local:5000 --insecure-registry=registry-mirror.arc-runners.svc.cluster.local:5000'
              securityContext:
                  privileged: true
              resources:
                  limits:
                      cpu: '12'
                      memory: 32Gi
                  requests:
                      cpu: 500m
                      memory: 2Gi
              volumeMounts:
                  - name: work
                    mountPath: /home/runner/_work
                  - name: dind-sock
                    mountPath: /var/run
                  - name: dind-externals
                    mountPath: /home/runner/externals
                  - name: runner-cache
                    mountPath: /home/runner/_cache
                  - name: dind-storage
                    mountPath: /var/lib/docker
        volumes:
            - name: work
              emptyDir: {}
            - name: dind-sock
              emptyDir: {}
            - name: dind-externals
              emptyDir: {}
            # Per-pod ephemeral /var/lib/docker. Longhorn RWX (NFS) cannot
            # back overlayfs lower dirs (EINVAL). Cold pulls hit the
            # in-cluster Docker Hub mirror at registry-mirror:5000.
            - name: dind-storage
              emptyDir:
                  sizeLimit: 100Gi
            - name: runner-cache
              persistentVolumeClaim:
                  claimName: arc-runner-cache-sdb

# Pod-level configuration
# nodeSelector: {}
# tolerations: []
# affinity: {}

# Listener pod configuration (the component that listens for jobs)
listenerTemplate:
    spec:
        containers:
            - name: listener
              resources:
                  limits:
                      cpu: 250m
                      memory: 256Mi
                  requests:
                      cpu: 50m
                      memory: 64Mi
              securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  capabilities:
                      drop:
                          - ALL
