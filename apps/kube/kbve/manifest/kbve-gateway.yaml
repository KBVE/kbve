## Shared Cilium Gateway — all namespaces route through this.
## Cloudflare terminates TLS on the edge. Origin listeners handle
## both HTTP (80) and HTTPS (443) for Full/Strict SSL modes.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
    name: kbve-gateway
    namespace: kbve
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-dns
spec:
    gatewayClassName: cilium
    infrastructure:
        labels:
            node.kbve.com/type: dedicated-server
    listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
              namespaces:
                  from: All
        # Generic HTTPS listener — serves all domains.
        # Each domain's cert is referenced here; ReferenceGrant allows
        # cross-namespace cert access from chuckrpg, ows, etc.
        # No hostname filter — Envoy uses SNI to select the right cert.
        - name: https
          protocol: HTTPS
          port: 443
          tls:
              mode: Terminate
              certificateRefs:
                  - name: kbve-wt-tls
                  - name: chuckrpg-tls
                    namespace: chuckrpg
                  - name: chuckrpg-api-tls
                    namespace: chuckrpg
                  - name: game-chuckrpg-tls
                    namespace: chuckrpg
          allowedRoutes:
              namespaces:
                  from: All
---
## kbve.com routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: kbve-routes
    namespace: kbve
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - kbve.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /ws
          timeouts:
              # WebSocket connections are long-lived — set a generous
              # backend timeout so the Cilium proxy doesn't kill them.
              # Default Cilium/Envoy timeout is ~15s which breaks game sessions.
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 5000
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: kbve-service
                port: 4321
