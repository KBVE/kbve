## Shared Cilium Gateway — all namespaces route through this.
## Cloudflare terminates TLS on the edge. Origin listeners handle
## both HTTP (80) and HTTPS (443) for Full/Strict SSL modes.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
    name: kbve-gateway
    namespace: kbve
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-dns
spec:
    gatewayClassName: cilium
    infrastructure:
        labels:
            node.kbve.com/type: dedicated-server
    listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
              namespaces:
                  from: All
        # HTTPS listeners — one per cert/hostname so Envoy can route TLS
        # by SNI to the matching certificate. Cilium gateway does NOT
        # perform SNI-based selection across multiple certificateRefs on
        # a single listener (it uses only the first ref), so each cert
        # gets its own listener with an explicit hostname filter.
        # Cloudflare terminates public TLS at the edge; origin certs must
        # match the SNI CF sends for Full/Strict SSL modes.
        - name: https-kbve
          protocol: HTTPS
          port: 443
          hostname: '*.kbve.com'
          tls:
              mode: Terminate
              certificateRefs:
                  - name: kbve-wt-tls
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-kbve-root
          protocol: HTTPS
          port: 443
          hostname: kbve.com
          tls:
              mode: Terminate
              certificateRefs:
                  - name: kbve-wt-tls
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-memes
          protocol: HTTPS
          port: 443
          hostname: meme.sh
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: memes-tls
                    namespace: memes
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-memes-www
          protocol: HTTPS
          port: 443
          hostname: www.meme.sh
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: memes-tls
                    namespace: memes
          allowedRoutes:
              namespaces:
                  from: All
---
## kbve.com routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: kbve-routes
    namespace: kbve
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - kbve.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /ws
          timeouts:
              # WebSocket connections are long-lived — set a generous
              # backend timeout so the Cilium proxy doesn't kill them.
              # Default Cilium/Envoy timeout is ~15s which breaks game sessions.
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 5000
        # Dashboard WebSocket paths — VNC (noVNC), Guacamole (RDP),
        # KASM proxy. These are long-lived WebSocket connections that
        # need the same generous timeout as the game /ws path.
        - matches:
              - path:
                    type: PathPrefix
                    value: /dashboard/vm/vnc
              - path:
                    type: PathPrefix
                    value: /dashboard/guac/proxy/guacamole/websocket-tunnel
          timeouts:
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 4321
        # Firecracker persistent endpoints — user-deployed HTTP servers
        # routed by name into the firecracker-ctl-net pod. May stream,
        # upgrade to WebSocket, or run long-polling handlers, so they
        # need the same generous timeout as other long-lived routes.
        - matches:
              - path:
                    type: PathPrefix
                    value: /fc/
          timeouts:
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 4321
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: kbve-service
                port: 4321
