apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
    name: kbve-gateway
    namespace: kbve
spec:
    gatewayClassName: cilium
    infrastructure:
        labels:
            node.kbve.com/type: dedicated-server
            kbve.com/lb-pool: public
        annotations:
            io.cilium/lb-ipam-ips: '142.132.206.71'
            lbipam.cilium.io/sharing-key: public-71
            lbipam.cilium.io/sharing-cross-namespace: arpg
    listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-kbve
          protocol: HTTPS
          port: 443
          hostname: '*.kbve.com'
          tls:
              mode: Terminate
              certificateRefs:
                  - name: kbve-wt-tls
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-kbve-root
          protocol: HTTPS
          port: 443
          hostname: kbve.com
          tls:
              mode: Terminate
              certificateRefs:
                  - name: kbve-wt-tls
          allowedRoutes:
              namespaces:
                  from: All
        # direct.git.kbve.com — DNS-only (grey-cloud) host for Forgejo git/LFS,
        # bypassing Cloudflare's request-body cap so large LFS pushes reach the
        # gateway. Two labels under kbve.com, so the *.kbve.com wildcard cert
        # doesn't cover it — own listener + cert-manager-issued cert.
        - name: https-direct-git
          protocol: HTTPS
          port: 443
          hostname: direct.git.kbve.com
          tls:
              mode: Terminate
              certificateRefs:
                  - name: direct-git-tls
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-memes
          protocol: HTTPS
          port: 443
          hostname: meme.sh
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: memes-tls
                    namespace: memes
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-rareicon
          protocol: HTTPS
          port: 443
          hostname: rareicon.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: rareicon-tls
                    namespace: rareicon
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-rareicon-api
          protocol: HTTPS
          port: 443
          hostname: api.rareicon.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: rareicon-api-tls
                    namespace: rareicon
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-cryptothrone
          protocol: HTTPS
          port: 443
          hostname: cryptothrone.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: cryptothrone-tls
                    namespace: cryptothrone
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-cryptothrone-game
          protocol: HTTPS
          port: 443
          hostname: game.cryptothrone.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: cryptothrone-game-tls
                    namespace: cryptothrone
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-chuckrpg
          protocol: HTTPS
          port: 443
          hostname: chuckrpg.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: chuckrpg-tls
                    namespace: chuckrpg
          allowedRoutes:
              namespaces:
                  from: All
        # Per-tenant ROWS API hosts. Each environment terminates origin TLS with
        # its own tenant cert (cert-manager / letsencrypt-http) in its namespace:
        #   api-dev.chuckrpg.com   -> rows-chuckrpg-dev   (live)
        #   api-beta.chuckrpg.com  -> rows-chuckrpg-beta  (live)
        #   api-prod.chuckrpg.com  -> rows-chuckrpg-prod  (scaffolded, DISABLED — see below)
        # The bare api.chuckrpg.com host was removed to avoid env ambiguity.
        - name: https-rows-chuckrpg-dev
          protocol: HTTPS
          port: 443
          hostname: api-dev.chuckrpg.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: rows-chuckrpg-dev-api-tls
                    namespace: rows-chuckrpg-dev
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-rows-chuckrpg-beta
          protocol: HTTPS
          port: 443
          hostname: api-beta.chuckrpg.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: rows-chuckrpg-beta-api-tls
                    namespace: rows-chuckrpg-beta
          allowedRoutes:
              namespaces:
                  from: All
        # DISABLED — prod tenant is scaffolded but not deployed yet. Uncomment this
        # listener when enabling the chuckrpg-prod tenant (after sealing its secrets,
        # applying its ArgoCD Application, and adding the api-prod.chuckrpg.com DNS
        # record). Until then the rows-chuckrpg-prod cert/namespace do not exist, so a
        # live listener here would sit unprogrammed.
        # - name: https-rows-chuckrpg-prod
        #   protocol: HTTPS
        #   port: 443
        #   hostname: api-prod.chuckrpg.com
        #   tls:
        #       mode: Terminate
        #       certificateRefs:
        #           - kind: Secret
        #             group: ''
        #             name: rows-chuckrpg-prod-api-tls
        #             namespace: rows-chuckrpg-prod
        #   allowedRoutes:
        #       namespaces:
        #           from: All
        - name: https-cityvote
          protocol: HTTPS
          port: 443
          hostname: cityvote.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: cityvote-tls
                    namespace: cityvote
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-discordsh
          protocol: HTTPS
          port: 443
          hostname: discord.sh
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: discordsh-tls
                    namespace: discordsh
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-rentearth
          protocol: HTTPS
          port: 443
          hostname: rentearth.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: rentearth-tls
                    namespace: rentearth
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-rentearth-www
          protocol: HTTPS
          port: 443
          hostname: www.rentearth.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: rentearth-tls
                    namespace: rentearth
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-herbmail
          protocol: HTTPS
          port: 443
          hostname: herbmail.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: herbmail-tls
                    namespace: herbmail
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-herbmail-www
          protocol: HTTPS
          port: 443
          hostname: www.herbmail.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: herbmail-tls
                    namespace: herbmail
          allowedRoutes:
              namespaces:
                  from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: kbve-routes
    namespace: kbve
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - kbve.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /ws
          timeouts:
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 5000
        - matches:
              - path:
                    type: PathPrefix
                    value: /dashboard/vm/vnc
              - path:
                    type: PathPrefix
                    value: /dashboard/guac/proxy/guacamole/websocket-tunnel
          timeouts:
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 4321
        - matches:
              - path:
                    type: PathPrefix
                    value: /fc/
          timeouts:
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 4321
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: kbve-service
                port: 4321
