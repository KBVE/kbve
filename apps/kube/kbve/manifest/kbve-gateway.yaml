apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
    name: kbve-gateway
    namespace: kbve
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-dns
spec:
    gatewayClassName: cilium
    infrastructure:
        labels:
            node.kbve.com/type: dedicated-server
        annotations:
            io.cilium/lb-ipam-ips: '142.132.206.71'
    listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-kbve
          protocol: HTTPS
          port: 443
          hostname: '*.kbve.com'
          tls:
              mode: Terminate
              certificateRefs:
                  - name: kbve-wt-tls
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-kbve-root
          protocol: HTTPS
          port: 443
          hostname: kbve.com
          tls:
              mode: Terminate
              certificateRefs:
                  - name: kbve-wt-tls
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-memes
          protocol: HTTPS
          port: 443
          hostname: meme.sh
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: memes-tls
                    namespace: memes
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-rareicon
          protocol: HTTPS
          port: 443
          hostname: rareicon.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: rareicon-tls
                    namespace: rareicon
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-rareicon-api
          protocol: HTTPS
          port: 443
          hostname: api.rareicon.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: rareicon-api-tls
                    namespace: rareicon
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-cryptothrone
          protocol: HTTPS
          port: 443
          hostname: cryptothrone.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: cryptothrone-tls
                    namespace: cryptothrone
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-chuckrpg
          protocol: HTTPS
          port: 443
          hostname: chuckrpg.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: chuckrpg-tls
                    namespace: chuckrpg
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-chuckrpg-api
          protocol: HTTPS
          port: 443
          hostname: api.chuckrpg.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: chuckrpg-api-tls
                    namespace: rows
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-cityvote
          protocol: HTTPS
          port: 443
          hostname: cityvote.com
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: cityvote-tls
                    namespace: cityvote
          allowedRoutes:
              namespaces:
                  from: All
        - name: https-discordsh
          protocol: HTTPS
          port: 443
          hostname: discord.sh
          tls:
              mode: Terminate
              certificateRefs:
                  - kind: Secret
                    group: ''
                    name: discordsh-tls
                    namespace: discordsh
          allowedRoutes:
              namespaces:
                  from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: kbve-routes
    namespace: kbve
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - kbve.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /ws
          timeouts:
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 5000
        - matches:
              - path:
                    type: PathPrefix
                    value: /dashboard/vm/vnc
              - path:
                    type: PathPrefix
                    value: /dashboard/guac/proxy/guacamole/websocket-tunnel
          timeouts:
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 4321
        - matches:
              - path:
                    type: PathPrefix
                    value: /fc/
          timeouts:
              backendRequest: 3600s
          backendRefs:
              - name: kbve-service
                port: 4321
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: kbve-service
                port: 4321
