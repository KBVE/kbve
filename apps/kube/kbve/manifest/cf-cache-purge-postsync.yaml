apiVersion: batch/v1
kind: Job
metadata:
    name: cf-cache-purge
    namespace: kbve
    annotations:
        argocd.argoproj.io/hook: PostSync
        argocd.argoproj.io/hook-delete-policy: HookSucceeded
    labels:
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    ttlSecondsAfterFinished: 120
    backoffLimit: 1
    template:
        spec:
            restartPolicy: Never
            containers:
                - name: purge
                  image: curlimages/curl:8.12.1
                  command:
                      - /bin/sh
                      - -c
                      - "echo \"Waiting 30s for rollout to stabilize...\"\nsleep 30\necho \"Purging\
                        \ Cloudflare cache for kbve.com...\"\nHTTP_CODE=$(curl -s -o /tmp/resp.json\
                        \ -w \"%{http_code}\" \\\n  -X POST \\\n  \"https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache\"\
                        \ \\\n  -H \"Authorization: Bearer ${CF_API_TOKEN}\" \\\n  -H \"Content-Type:\
                        \ application/json\" \\\n  --data '{\"purge_everything\":true}')\ncat /tmp/resp.json\n\
                        echo \"\"\nif [ \"$HTTP_CODE\" -ne 200 ]; then\n  echo \"ERROR: Cloudflare\
                        \ returned HTTP $HTTP_CODE\"\n  exit 1\nfi\necho \"Cache purge successful.\"\
                        \n"
                  env:
                      - name: CF_ZONE_ID
                        value: fd91a229c151a7af5c93ffa409c1b91c
                      - name: CF_API_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: cloudflare-cache-purge
                                key: api-token
