# SecretStore: pull secrets from forgejo namespace via kbve-external-secrets SA
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: forgejo-remote-secret-store
    namespace: kbve
spec:
    provider:
        kubernetes:
            remoteNamespace: forgejo
            auth:
                serviceAccount:
                    name: kbve-external-secrets
                    namespace: kbve
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: sync forgejo api-token into kbve namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: kbve-forgejo-deploy-keys
    namespace: kbve
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: forgejo-remote-secret-store
        kind: SecretStore
    target:
        name: forgejo-deploy-keys
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                api-token: '{{ .apitoken }}'
    data:
        - secretKey: apitoken
          remoteRef:
              key: forgejo-deploy-keys
              property: api-token
