apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: kbve-wt-cert
    namespace: kbve
spec:
    secretName: kbve-wt-tls
    issuerRef:
        name: letsencrypt-dns
        kind: ClusterIssuer
    dnsNames:
        - kbve.com
    privateKey:
        algorithm: ECDSA
        size: 256
    duration: 2160h # 90 days
    renewBefore: 720h # 30 days
