apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: kbve-wt-tls
    namespace: kbve
spec:
    secretName: kbve-wt-tls
    issuerRef:
        name: letsencrypt-dns
        kind: ClusterIssuer
        group: cert-manager.io
    commonName: '*.kbve.com'
    dnsNames:
        - '*.kbve.com'
        - kbve.com
    duration: 2160h
    renewBefore: 720h
    privateKey:
        algorithm: ECDSA
        size: 256
