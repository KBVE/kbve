apiVersion: v1
kind: Service
metadata:
    name: kbve-wt-lb
    namespace: kbve
    labels:
        app: kbve
    annotations:
        metallb.io/loadBalancerIPs: '142.132.206.71'
spec:
    type: LoadBalancer
    externalTrafficPolicy: Local
    selector:
        app: kbve
    ports:
        - name: wt
          port: 5001
          targetPort: 5001
          protocol: UDP
