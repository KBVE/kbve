apiVersion: v1
kind: Service
metadata:
    name: kbve-wt-lb
    namespace: kbve
    labels:
        app: kbve
    annotations:
        lbipam.cilium.io/ips: '142.132.206.74'
        lbipam.cilium.io/sharing-key: kbve-public
spec:
    type: LoadBalancer
    externalTrafficPolicy: Local
    selector:
        app: kbve
    ports:
        - name: wt
          port: 5001
          targetPort: 5001
          protocol: UDP
