# reel service token for the axum-kbve same-origin proxy (/api/v1/reel/*).
# Single source of truth: the sealed `reel-api` Secret in ns `reel`
# (apps/kube/reel/manifest/sealedsecret.yaml, key REEL_API_TOKEN). axum-kbve
# reads it cross-namespace via ESO — this materializes `reel-config` (key
# `api-token`) in ns kbve, which kbve-deployment.yaml maps to REEL_API_TOKEN
# (optional: true) and injects as the upstream bearer to reel. No second sealed
# copy — rotate the token once in ns reel and ESO propagates it here.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: kbve-reel-external-secrets
    namespace: kbve
    labels:
        app: kbve
        component: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: kbve-read-reel-api
    namespace: reel
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['reel-api']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: kbve-read-reel-api
    namespace: reel
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: kbve-read-reel-api
subjects:
    - kind: ServiceAccount
      name: kbve-reel-external-secrets
      namespace: kbve
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: reel-secret-store
    namespace: kbve
    labels:
        app: kbve
        component: external-secrets
spec:
    provider:
        kubernetes:
            auth:
                serviceAccount:
                    name: kbve-reel-external-secrets
            remoteNamespace: reel
            server:
                url: 'https://kubernetes.default.svc'
                caProvider:
                    key: ca.crt
                    name: kube-root-ca.crt
                    namespace: kube-system
                    type: ConfigMap
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: reel-config
    namespace: kbve
    labels:
        app: kbve
        component: external-secrets
spec:
    refreshInterval: 1h
    secretStoreRef:
        kind: SecretStore
        name: reel-secret-store
    target:
        name: reel-config
        creationPolicy: Owner
    data:
        - secretKey: api-token
          remoteRef:
              key: reel-api
              property: REEL_API_TOKEN
