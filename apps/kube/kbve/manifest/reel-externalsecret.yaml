# reel service token for the axum-kbve same-origin proxy (/api/v1/reel/*).
# Single source of truth: the sealed `reel-api` Secret in ns `reel`
# (apps/kube/reel/manifest/sealedsecret.yaml, key REEL_API_TOKEN). axum-kbve
# reads it cross-namespace via ESO — this materializes `reel-config` (key
# `api-token`) in ns kbve, which kbve-deployment.yaml maps to REEL_API_TOKEN
# (optional: true) and injects as the upstream bearer to reel. No second sealed
# copy — rotate the token once in ns reel and ESO propagates it here.
#
# NOTE: the Role/RoleBinding that grant this SA `get` on reel/reel-api live in
# the reel app (apps/kube/reel/manifest/reel-api-reader-rbac.yaml), NOT here —
# this kustomization forces `namespace: kbve`, which would rewrite ns-reel RBAC
# into ns kbve and break the cross-namespace read.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: kbve-reel-external-secrets
    namespace: kbve
    labels:
        app: kbve
        component: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: reel-secret-store
    namespace: kbve
    labels:
        app: kbve
        component: external-secrets
spec:
    provider:
        kubernetes:
            auth:
                serviceAccount:
                    name: kbve-reel-external-secrets
            remoteNamespace: reel
            server:
                url: 'https://kubernetes.default.svc'
                caProvider:
                    key: ca.crt
                    name: kube-root-ca.crt
                    namespace: kube-system
                    type: ConfigMap
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: reel-config
    namespace: kbve
    labels:
        app: kbve
        component: external-secrets
spec:
    refreshInterval: 1h
    secretStoreRef:
        kind: SecretStore
        name: reel-secret-store
    target:
        name: reel-config
        creationPolicy: Owner
    data:
        - secretKey: api-token
          remoteRef:
              key: reel-api
              property: REEL_API_TOKEN
