# Scoped Vibeshine tokens for the Windows game-stream host (wg peer 10.10.0.3).
# axum-kbve reads both from this secret (see kbve-deployment.yaml, both marked
# `optional: true`):
#   api-token    → VIBESHINE_API_TOKEN — dashboard proxy; curated reads +
#                  apps/close + playnite/launch
#   webrtc-token → VIBESHINE_WEBRTC_TOKEN — signaling relay; /api/webrtc/*
#                  session lifecycle only, cannot launch/stop apps or touch
#                  settings/users/tokens
# Tokens are minted on the host via Client Management UI or POST /api/token.
#
# Reseal one key after rotating it on the host (merge keeps the other):
#
#   kubectl create secret generic vibeshine-config -n kbve \
#       --from-literal=<key>='<token>' --dry-run=client -o json \
#   | kubeseal --controller-name=sealed-secrets-controller \
#       --controller-namespace=kube-system \
#       --merge-into apps/kube/kbve/manifest/vibeshine-sealedsecret.yaml
#
# NOTE: --merge-into rewrites the file as comment-less JSON; restore this
# header and the YAML shape after merging.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
    name: vibeshine-config
    namespace: kbve
spec:
    encryptedData:
        api-token: 
        webrtc-token: 
    template:
        metadata:
            name: vibeshine-config
            namespace: kbve
