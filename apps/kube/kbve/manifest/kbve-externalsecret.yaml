apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: kilobase-remote-secret-store
    namespace: kbve
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: kbve-external-secrets
                    namespace: kbve
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: kbve-supabase-secrets
    namespace: kbve
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: supabase-shared
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                jwt-secret: '{{ .jwtsecret }}'
                anon-key: '{{ .anonkey }}'
                service-role-key: '{{ .servicekey }}'
                db-url: 'postgres://postgres:{{ .dbpassword }}@supabase-cluster-rw.kilobase.svc.cluster.local:5432/supabase'
                db-url-ro: 'postgres://postgres:{{ .dbpassword }}@supabase-cluster-pooler-ro.kilobase.svc.cluster.local:5432/supabase'
                twitch-client-id: '{{ .twitchclientid }}'
                twitch-client-secret: '{{ .twitchclientsecret }}'
    data:
        - secretKey: jwtsecret
          remoteRef:
              key: supabase-jwt
              property: secret
        - secretKey: anonkey
          remoteRef:
              key: supabase-jwt
              property: anon-key
        - secretKey: servicekey
          remoteRef:
              key: supabase-jwt
              property: service-key
        - secretKey: dbpassword
          remoteRef:
              key: supabase-postgres
              property: password
        - secretKey: twitchclientid
          remoteRef:
              key: twitch-oauth-config
              property: client-id
        - secretKey: twitchclientsecret
          remoteRef:
              key: twitch-oauth-config
              property: client-secret
---
# HMAC key for the referral handler's IP / subnet hashing. axum-kbve
# reads REFERRAL_HASH_SECRET from this secret's `hash-secret` key (see
# kbve-deployment.yaml). When the remote `referral-hash` secret in
# kilobase doesn't exist yet, ExternalSecrets keeps the local secret
# absent and the deployment env stays unset (the deployment marks the
# key as `optional: true`), so the routes 503 with a clear log line
# until operator runs:
#
#   kubectl -n kilobase create secret generic referral-hash \
#       --from-literal=secret="$(openssl rand -base64 48)"
#
# Once that's in place the ExternalSecrets controller materializes
# `referral-config` in the kbve namespace and Reloader rolls the
# kbve deployment.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: kbve-referral-secrets
    namespace: kbve
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: referral-config
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                hash-secret: '{{ .hashsecret }}'
    data:
        - secretKey: hashsecret
          remoteRef:
              key: referral-hash
              property: secret
