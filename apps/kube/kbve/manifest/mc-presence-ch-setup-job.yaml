apiVersion: v1
kind: ConfigMap
metadata:
    name: mc-presence-ch-setup-script
    namespace: kbve
    labels:
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
data:
    setup.sh:
        "#!/bin/sh\nset -eu\n\necho \"Verifying ClickHouse connectivity...\"\n\
        curl -sf --max-time 10 \\\n  \"${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}\"\
        \ \\\n  -d \"SELECT 1\" >/dev/null || {\n  echo \"ERROR: Cannot connect to ClickHouse\
        \ at ${CLICKHOUSE_ENDPOINT}\"\n  exit 1\n}\necho \"ClickHouse connection OK.\"\
        \n\necho \"Creating mc database...\"\ncurl -sf --max-time 10 \\\n  \"${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}\"\
        \ \\\n  -d \"CREATE DATABASE IF NOT EXISTS mc ON CLUSTER 'cluster'\" >/dev/null\
        \ || {\n  echo \"ERROR: Failed to create mc database\"\n  exit 1\n}\necho \"Database\
        \ 'mc' ready.\"\n\necho \"Creating player_snapshots table (ReplicatedMergeTree)...\"\
        \ncurl -sf --max-time 30 \\\n  \"${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}\"\
        \ \\\n  -d \"\nCREATE TABLE IF NOT EXISTS mc.player_snapshots ON CLUSTER 'cluster'\n\
        (\n    timestamp     DateTime64(3, 'UTC'),\n    server        LowCardinality(String),\n\
        \    name          String,\n    uuid          String DEFAULT '',\n    online_count\
        \  UInt32,\n    max_slots     UInt32,\n    ingested_at   DateTime64(3, 'UTC')\
        \ DEFAULT now64(3)\n)\nENGINE = ReplicatedMergeTree('/clickhouse/tables/{shard}/mc/player_snapshots',\
        \ '{replica}')\nORDER BY (server, timestamp, name)\nPARTITION BY toYYYYMMDD(timestamp)\n\
        TTL toDateTime(timestamp) + INTERVAL 30 DAY\n\" >/dev/null || {\n  echo \"ERROR:\
        \ Failed to create player_snapshots table\"\n  exit 1\n}\necho \"Table 'mc.player_snapshots'\
        \ ready.\"\n\necho \"Creating player_snapshots_distributed table (Distributed)...\"\
        \ncurl -sf --max-time 30 \\\n  \"${CLICKHOUSE_ENDPOINT}/?user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}\"\
        \ \\\n  -d \"\nCREATE TABLE IF NOT EXISTS mc.player_snapshots_distributed ON CLUSTER\
        \ 'cluster'\nAS mc.player_snapshots\nENGINE = Distributed('cluster', 'mc', 'player_snapshots',\
        \ rand())\n\" >/dev/null || {\n  echo \"ERROR: Failed to create player_snapshots_distributed\
        \ table\"\n  exit 1\n}\necho \"Table 'mc.player_snapshots_distributed' ready.\"\
        \n\necho \"\"\necho \"MC presence schema setup complete.\"\n"
---
apiVersion: batch/v1
kind: Job
metadata:
    name: mc-presence-ch-setup
    namespace: kbve
    labels:
        app: mc-presence-ch-setup
        app.kubernetes.io/part-of: mc
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        argocd.argoproj.io/hook: PostSync
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
    ttlSecondsAfterFinished: 86400
    backoffLimit: 3
    template:
        metadata:
            labels:
                app: mc-presence-ch-setup
        spec:
            restartPolicy: OnFailure
            containers:
                - name: setup
                  image: curlimages/curl:8.12.1
                  command:
                      - /bin/sh
                      - /scripts/setup.sh
                  env:
                      - name: CLICKHOUSE_ENDPOINT
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-credentials
                                key: endpoint
                      - name: CLICKHOUSE_USER
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-credentials
                                key: username
                      - name: CLICKHOUSE_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-credentials
                                key: password
                  volumeMounts:
                      - name: setup-script
                        mountPath: /scripts
                        readOnly: true
                  resources:
                      requests:
                          memory: 32Mi
                          cpu: 50m
                      limits:
                          memory: 64Mi
                          cpu: 100m
                  securityContext:
                      runAsNonRoot: true
                      runAsUser: 1000
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
            volumes:
                - name: setup-script
                  configMap:
                      name: mc-presence-ch-setup-script
                      defaultMode: 365
