# Cross-namespace: reads arpg-discord-credentials from the arpg namespace
# (RBAC in apps/kube/agones/arpg/manifests/discord-eso-rbac.yaml) and
# remaps it into an arpg-discord Secret here with the env-var keys
# axum-kbve's /api/v1/discord/session bridge expects.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: arpg-remote-secret-store
    namespace: kbve
spec:
    provider:
        kubernetes:
            remoteNamespace: arpg
            auth:
                serviceAccount:
                    name: kbve-external-secrets
                    namespace: kbve
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: kbve-arpg-discord-secrets
    namespace: kbve
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: arpg-remote-secret-store
        kind: SecretStore
    target:
        name: arpg-discord
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                DISCORD_CLIENT_ID: '{{ .clientid }}'
                DISCORD_CLIENT_SECRET: '{{ .clientsecret }}'
    data:
        - secretKey: clientid
          remoteRef:
              key: arpg-discord-credentials
              property: client_id
        - secretKey: clientsecret
          remoteRef:
              key: arpg-discord-credentials
              property: secret_key
