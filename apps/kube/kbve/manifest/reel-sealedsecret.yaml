# Reel service token for the axum-kbve same-origin proxy (/api/v1/reel/*).
# axum-kbve reads REEL_API_TOKEN from this secret (kbve-deployment.yaml,
# `optional: true`) and injects it as the upstream bearer to reel. Its value
# MUST equal REEL_API_TOKEN in the reel namespace's `reel-api` secret
# (apps/kube/reel/manifest/sealedsecret.yaml) — same token, sealed for two ns.
#
# Seal against the live controller (replace the stub below):
#
#   kubectl create secret generic reel-config -n kbve \
#       --from-literal=api-token='<REEL_API_TOKEN>' --dry-run=client -o json \
#   | kubeseal --controller-name=sealed-secrets-controller \
#       --controller-namespace=kube-system \
#       --merge-into apps/kube/kbve/manifest/reel-sealedsecret.yaml
#
# NOTE: --merge-into rewrites the file as comment-less JSON; restore this
# header and the YAML shape after merging.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
    name: reel-config
    namespace: kbve
spec:
    encryptedData:
        api-token: REPLACE_WITH_KUBESEAL_OUTPUT
    template:
        metadata:
            name: reel-config
            namespace: kbve
