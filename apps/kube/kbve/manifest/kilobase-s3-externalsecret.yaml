# Cross-namespace: reads kilobase-s3-secret from the kilobase namespace
# (RBAC in apps/kube/kilobase/manifests/kbve-s3-eso-rbac.yaml) and remaps it
# into a kilobase-s3 Secret here with the AWS SDK env-var keys axum-kbve's
# S3 backup viewer expects. Reuses the existing kilobase-remote-secret-store
# SecretStore defined in kbve-externalsecret.yaml.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: kbve-kilobase-s3-secrets
    namespace: kbve
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: kilobase-s3
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                AWS_ACCESS_KEY_ID: '{{ .keyId }}'
                AWS_SECRET_ACCESS_KEY: '{{ .accessKey }}'
    data:
        - secretKey: keyId
          remoteRef:
              key: kilobase-s3-secret
              property: keyId
        - secretKey: accessKey
          remoteRef:
              key: kilobase-s3-secret
              property: accessKey
