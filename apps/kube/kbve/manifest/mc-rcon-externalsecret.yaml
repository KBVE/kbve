# SecretStore: pull secrets from mc namespace via kbve-external-secrets SA
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: mc-remote-secret-store
    namespace: kbve
spec:
    provider:
        kubernetes:
            remoteNamespace: mc
            auth:
                serviceAccount:
                    name: kbve-external-secrets
                    namespace: kbve
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: sync mc-rcon-secret from mc namespace into kbve namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: kbve-mc-rcon-secret
    namespace: kbve
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: mc-remote-secret-store
        kind: SecretStore
    target:
        name: mc-rcon
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                rcon-password: '{{ .rconpassword }}'
    data:
        - secretKey: rconpassword
          remoteRef:
              key: mc-rcon-secret
              property: rcon-password
