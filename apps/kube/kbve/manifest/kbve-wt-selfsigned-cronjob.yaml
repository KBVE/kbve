apiVersion: v1
kind: ServiceAccount
metadata:
    name: kbve-wt-cert-rotator
    namespace: kbve
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: kbve-wt-cert-rotator
    namespace: kbve
rules:
    - apiGroups:
          - ''
      resources:
          - secrets
      resourceNames:
          - kbve-wt-selfsigned
      verbs:
          - get
          - update
          - patch
    - apiGroups:
          - ''
      resources:
          - secrets
      verbs:
          - create
    - apiGroups:
          - apps
      resources:
          - deployments
      resourceNames:
          - kbve-deployment
      verbs:
          - get
          - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: kbve-wt-cert-rotator
    namespace: kbve
subjects:
    - kind: ServiceAccount
      name: kbve-wt-cert-rotator
      namespace: kbve
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: kbve-wt-cert-rotator
---
apiVersion: batch/v1
kind: CronJob
metadata:
    name: kbve-wt-cert-rotator
    namespace: kbve
    labels:
        app: kbve
        component: webtransport-cert-rotator
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    schedule: 0 3 1,13,25 * *
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 2
    failedJobsHistoryLimit: 3
    jobTemplate:
        spec:
            backoffLimit: 2
            activeDeadlineSeconds: 300
            template:
                spec:
                    serviceAccountName: kbve-wt-cert-rotator
                    restartPolicy: OnFailure
                    containers:
                        - name: certgen
                          image: alpine/openssl:latest
                          command:
                              - /bin/sh
                              - -c
                              - "set -e\n\n# Install kubectl\napk add --no-cache curl\ncurl -LO \"https://dl.k8s.io/release/$(curl\
                                \ -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl\"\
                                \nchmod +x kubectl && mv kubectl /usr/local/bin/\n\nHOSTNAME=\"wt.kbve.com\"\
                                \nPUBLIC_IP=\"142.132.206.71\"\nSECRET_NAME=\"kbve-wt-selfsigned\"\n\
                                DEPLOY_NAME=\"kbve-deployment\"\nDAYS=13\n\necho \"Generating self-signed\
                                \ cert for ${HOSTNAME} / ${PUBLIC_IP} (${DAYS} days)\"\n\n# Generate\
                                \ ECDSA key + self-signed cert with SANs\nopenssl req -x509 -newkey\
                                \ ec -pkeyopt ec_paramgen_curve:prime256v1 \\\n  -keyout /tmp/tls.key\
                                \ -out /tmp/tls.crt \\\n  -days ${DAYS} -nodes \\\n  -subj \"/CN=${HOSTNAME}\"\
                                \ \\\n  -addext \"subjectAltName=DNS:${HOSTNAME},DNS:localhost,IP:${PUBLIC_IP},IP:127.0.0.1\"\
                                \n\necho \"Cert generated:\"\nopenssl x509 -in /tmp/tls.crt -noout -subject\
                                \ -dates -ext subjectAltName\n\n# Create or update the Secret\nkubectl\
                                \ create secret tls \"${SECRET_NAME}\" \\\n  --cert=/tmp/tls.crt --key=/tmp/tls.key\
                                \ \\\n  --dry-run=client -o yaml | kubectl apply -f -\n\necho \"Secret\
                                \ ${SECRET_NAME} updated\"\n\n# Trigger rollout restart by patching\
                                \ annotation\nTIMESTAMP=$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\nkubectl\
                                \ patch deployment \"${DEPLOY_NAME}\" \\\n  -p \"{\\\"spec\\\":{\\\"\
                                template\\\":{\\\"metadata\\\":{\\\"annotations\\\":{\\\"wt-cert-rotated\\\
                                \":\\\"${TIMESTAMP}\\\"}}}}}\"\n\necho \"Deployment ${DEPLOY_NAME} rollout\
                                \ triggered at ${TIMESTAMP}\"\n"
