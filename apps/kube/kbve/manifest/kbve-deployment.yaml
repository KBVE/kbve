apiVersion: apps/v1
kind: Deployment
metadata:
    name: kbve-deployment
    namespace: kbve
    labels:
        app: kbve
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        configmap.reloader.stakater.com/reload: kube-root-ca.crt
        secret.reloader.stakater.com/reload: supabase-shared,forgejo-deploy-keys,valkey-auth,arpg-discord,clickhouse-credentials,vibeshine-config,cube-credentials
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: kbve
    template:
        metadata:
            annotations:
                rollout-restart: '2026-06-13T16:30:00Z'
            labels:
                app: kbve
                version: 1.0.209
        spec:
            serviceAccountName: kbve-app
            affinity:
                podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - weight: 100
                          podAffinityTerm:
                              labelSelector:
                                  matchLabels:
                                      app: kbve
                              topologyKey: kubernetes.io/hostname
            containers:
                - name: kbve
                  image: ghcr.io/kbve/kbve:1.0.245
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 4321
                        protocol: TCP
                      - name: ws
                        containerPort: 5000
                        protocol: TCP
                      - name: wt
                        containerPort: 5001
                        protocol: UDP
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  env:
                      - name: PORT
                        value: '4321'
                      - name: SUPABASE_URL
                        value: http://kong.kilobase.svc.cluster.local:8000
                      - name: GOTRUE_INTERNAL_URL
                        value: http://auth.kilobase.svc.cluster.local:9999
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: service-role-key
                      - name: TWITCH_CLIENT_ID
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: twitch-client-id
                      - name: TWITCH_APP_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: twitch-client-secret
                      - name: GRAFANA_UPSTREAM_URL
                        value: http://monitoring-grafana.monitoring.svc.cluster.local:80
                      - name: ARGOCD_UPSTREAM_URL
                        value: https://argocd-server.argocd.svc.cluster.local:443
                      - name: ARGOCD_AUTH_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: argocd-auth
                                key: argocd-auth-token
                      - name: ARGOCD_CA_CERT_PATH
                        value: /etc/ssl/argocd/ca.crt
                      - name: FORGEJO_UPSTREAM_URL
                        value: http://forgejo-http.forgejo.svc.cluster.local:3000
                      - name: FORGEJO_AUTH_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: forgejo-deploy-keys
                                key: api-token
                      - name: CUBE_UPSTREAM_URL
                        value: http://cube.cube.svc.cluster.local:4000
                      - name: CUBE_API_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: cube-credentials
                                key: api-token
                      - name: KUBEVIRT_API_URL
                        value: https://kubernetes.default.svc
                      - name: KUBEVIRT_CA_CERT_PATH
                        value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                      - name: GAME_WS_PLAIN
                        value: '1'
                      - name: GAME_SERVER_HOST
                        value: wt.kbve.com
                      - name: GAME_WT_CERT
                        value: /etc/ssl/webtransport/tls.crt
                      - name: GAME_WT_KEY
                        value: /etc/ssl/webtransport/tls.key
                      - name: GAME_WT_SELFSIGNED_CERT
                        value: /etc/ssl/webtransport-selfsigned/tls.crt
                      - name: GAME_WT_SELFSIGNED_KEY
                        value: /etc/ssl/webtransport-selfsigned/tls.key
                      - name: CHUCKRPG_TENANTS
                        value:
                            '[{"id":"chuckrpg-dev","label":"ChuckRPG Dev","upstream":"http://rows.rows-chuckrpg-dev.svc.cluster.local:4322","docs":"http://rows.rows-chuckrpg-dev.svc.cluster.local:4323","guid_env":"CHUCKRPG_GUID_DEV"},{"id":"chuckrpg-beta","label":"ChuckRPG
                            Beta","upstream":"http://rows.rows-chuckrpg-beta.svc.cluster.local:4322","docs":"http://rows.rows-chuckrpg-beta.svc.cluster.local:4323","guid_env":"CHUCKRPG_GUID_BETA"}]'
                      - name: CHUCKRPG_GUID_DEV
                        valueFrom:
                            secretKeyRef:
                                name: chuckrpg-guid-dev
                                key: customer-guid
                      - name: CHUCKRPG_GUID_BETA
                        valueFrom:
                            secretKeyRef:
                                name: chuckrpg-guid-beta
                                key: customer-guid
                      - name: MC_RCON_LOBBY_HOST
                        value: mc-lobby-backend.arc-runners.svc.cluster.local
                      - name: MC_RCON_LOBBY_PORT
                        value: '25575'
                      - name: MC_RCON_LOBBY_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: mc-rcon-credentials
                                key: rcon-password
                      - name: MC_RCON_SURVIVAL_HOST
                        value: mc-fabric-backend.arc-runners.svc.cluster.local
                      - name: MC_RCON_SURVIVAL_PORT
                        value: '25575'
                      - name: MC_RCON_SURVIVAL_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: mc-rcon-credentials
                                key: rcon-password
                      - name: CLICKHOUSE_ENDPOINT
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-credentials
                                key: endpoint
                      - name: CLICKHOUSE_USER
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-credentials
                                key: username
                      - name: CLICKHOUSE_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: clickhouse-credentials
                                key: password
                      - name: CLICKHOUSE_DATABASE
                        value: observability
                      - name: WALLET_DATABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: db-url
                      - name: WALLET_DATABASE_URL_RO
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: db-url-ro
                      - name: KBVE_PG_RW_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: db-url
                      - name: KBVE_PG_RO_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: db-url-ro
                      - name: KBVE_PG_ANY_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: db-url-any
                      - name: KBVE_PG_CA_PEM_FILE
                        value: /etc/ssl/pgca/ca.crt
                      - name: VALKEY_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: valkey-auth
                                key: valkey-password
                      - name: KBVE_KV_URL
                        value: redis://default:$(VALKEY_PASSWORD)@valkey.valkey.svc.cluster.local:6379/3
                      - name: REFERRAL_HASH_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: referral-config
                                key: hash-secret
                                optional: true
                      - name: VIBESHINE_UPSTREAM_URL
                        value: https://10.10.0.3:47990
                      - name: VIBESHINE_API_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: vibeshine-config
                                key: api-token
                                optional: true
                      - name: VIBESHINE_WEBRTC_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: vibeshine-config
                                key: webrtc-token
                                optional: true
                      - name: DISCORD_CLIENT_ID
                        valueFrom:
                            secretKeyRef:
                                name: arpg-discord
                                key: DISCORD_CLIENT_ID
                                optional: true
                      - name: DISCORD_CLIENT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: arpg-discord
                                key: DISCORD_CLIENT_SECRET
                                optional: true
                      # Discord Activity token exchange must send the redirect_uri
                      # the OAuth code was bound to (a redirect IS registered on the
                      # app), else Discord rejects with invalid_grant. Must match the
                      # portal's registered redirect for the arpg Activity.
                      - name: DISCORD_REDIRECT_URI
                        value: https://arpg.kbve.com
                      - name: SUPABASE_JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: jwt-secret
                      - name: AWS_ACCESS_KEY_ID
                        valueFrom:
                            secretKeyRef:
                                name: kilobase-s3
                                key: AWS_ACCESS_KEY_ID
                      - name: AWS_SECRET_ACCESS_KEY
                        valueFrom:
                            secretKeyRef:
                                name: kilobase-s3
                                key: AWS_SECRET_ACCESS_KEY
                  volumeMounts:
                      - name: pg-ca
                        mountPath: /etc/ssl/pgca
                        readOnly: true
                      - name: argocd-ca
                        mountPath: /etc/ssl/argocd
                        readOnly: true
                      - name: wt-tls
                        mountPath: /etc/ssl/webtransport
                        readOnly: true
                      - name: wt-selfsigned-tls
                        mountPath: /etc/ssl/webtransport-selfsigned
                        readOnly: true
                  resources:
                      requests:
                          memory: 512Mi
                          cpu: 250m
                      limits:
                          memory: 1024Mi
                          cpu: 2000m
            volumes:
                - name: pg-ca
                  secret:
                      secretName: supabase-shared
                      items:
                          - key: db-ca-crt
                            path: ca.crt
                - name: argocd-ca
                  secret:
                      secretName: kbve-internal-ca-tls
                      items:
                          - key: ca.crt
                            path: ca.crt
                - name: wt-tls
                  secret:
                      secretName: kbve-wt-tls
                - name: wt-selfsigned-tls
                  secret:
                      secretName: kbve-wt-selfsigned
                      optional: true
---
apiVersion: v1
kind: Service
metadata:
    name: kbve-service
    namespace: kbve
    labels:
        app: kbve
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: kbve
    ports:
        - name: http
          port: 4321
          targetPort: 4321
          protocol: TCP
        - name: ws
          port: 5000
          targetPort: 5000
          protocol: TCP
        - name: wt
          port: 5001
          targetPort: 5001
          protocol: UDP
