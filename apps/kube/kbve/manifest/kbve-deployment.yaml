apiVersion: apps/v1
kind: Deployment
metadata:
    name: kbve-deployment
    namespace: kbve
    labels:
        app: kbve
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: kbve
    template:
        metadata:
            annotations:
                rollout-restart: '2026-01-31T17:38:01Z'
            labels:
                app: kbve
                version: '1.0.22'
        spec:
            serviceAccountName: kbve-app
            affinity:
                podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - weight: 100
                          podAffinityTerm:
                              labelSelector:
                                  matchLabels:
                                      app: kbve
                              topologyKey: kubernetes.io/hostname
            containers:
                - name: kbve
                  image: ghcr.io/kbve/kbve:1.0.80
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 4321
                        protocol: TCP
                      - name: ws
                        containerPort: 5000
                        protocol: TCP
                      - name: wt
                        containerPort: 5001
                        protocol: UDP
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  env:
                      - name: PORT
                        value: '4321'
                      - name: SUPABASE_URL
                        value: 'http://kong.kilobase.svc.cluster.local:8000'
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: service-role-key
                      - name: TWITCH_CLIENT_ID
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: twitch-client-id
                      - name: TWITCH_APP_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: twitch-client-secret
                      - name: GRAFANA_UPSTREAM_URL
                        value: 'http://monitoring-grafana.monitoring.svc.cluster.local:80'
                      - name: ARGOCD_UPSTREAM_URL
                        value: 'https://argocd-server.argocd.svc.cluster.local:443'
                      - name: ARGOCD_AUTH_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: argocd-auth
                                key: argocd-auth-token
                      - name: ARGOCD_CA_CERT_PATH
                        value: '/etc/ssl/argocd/ca.crt'
                      - name: FORGEJO_UPSTREAM_URL
                        value: 'http://forgejo-http.forgejo.svc.cluster.local:3000'
                      - name: FORGEJO_AUTH_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: forgejo-deploy-keys
                                key: api-token
                      - name: KUBEVIRT_API_URL
                        value: 'https://kubernetes.default.svc'
                      - name: KUBEVIRT_CA_CERT_PATH
                        value: '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'
                      - name: GAME_WS_PLAIN
                        value: '1'
                      - name: GAME_SERVER_HOST
                        value: 'wt.kbve.com'
                      - name: GAME_WT_CERT
                        value: '/etc/ssl/webtransport/tls.crt'
                      - name: GAME_WT_KEY
                        value: '/etc/ssl/webtransport/tls.key'
                      - name: GAME_WT_SELFSIGNED_CERT
                        value: '/etc/ssl/webtransport-selfsigned/tls.crt'
                      - name: GAME_WT_SELFSIGNED_KEY
                        value: '/etc/ssl/webtransport-selfsigned/tls.key'
                      - name: CHUCKRPG_UPSTREAM_URL
                        value: 'http://rows.ows.svc.cluster.local:4322'
                  volumeMounts:
                      - name: argocd-ca
                        mountPath: /etc/ssl/argocd
                        readOnly: true
                      - name: wt-tls
                        mountPath: /etc/ssl/webtransport
                        readOnly: true
                      - name: wt-selfsigned-tls
                        mountPath: /etc/ssl/webtransport-selfsigned
                        readOnly: true
                  resources:
                      requests:
                          memory: '512Mi'
                          cpu: '2000m'
                      limits:
                          memory: '1024Mi'
                          cpu: '4000m'
            volumes:
                - name: argocd-ca
                  secret:
                      secretName: kbve-internal-ca-tls
                      items:
                          - key: ca.crt
                            path: ca.crt
                - name: wt-tls
                  secret:
                      secretName: kbve-wt-tls
                - name: wt-selfsigned-tls
                  secret:
                      secretName: kbve-wt-selfsigned
                      optional: true
---
apiVersion: v1
kind: Service
metadata:
    name: kbve-service
    namespace: kbve
    labels:
        app: kbve
spec:
    type: ClusterIP
    selector:
        app: kbve
    ports:
        - name: http
          port: 4321
          targetPort: 4321
          protocol: TCP
        - name: ws
          port: 5000
          targetPort: 5000
          protocol: TCP
        - name: wt
          port: 5001
          targetPort: 5001
          protocol: UDP
