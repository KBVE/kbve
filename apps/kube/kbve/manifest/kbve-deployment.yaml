apiVersion: apps/v1
kind: Deployment
metadata:
    name: kbve-deployment
    namespace: kbve
    labels:
        app: kbve
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: kbve
    template:
        metadata:
            annotations:
                rollout-restart: '2026-01-31T17:38:01Z'
            labels:
                app: kbve
                version: '1.0.22'
        spec:
            containers:
                - name: kbve
                  image: ghcr.io/kbve/kbve:1.0.34
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 4321
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  env:
                      - name: PORT
                        value: '4321'
                      - name: SUPABASE_URL
                        value: 'http://kong.kilobase.svc.cluster.local:8000'
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: service-role-key
                      - name: TWITCH_CLIENT_ID
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: twitch-client-id
                      - name: TWITCH_APP_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: twitch-client-secret
                      - name: MC_RCON_HOST
                        value: 'mc-service.mc.svc.cluster.local'
                      - name: MC_RCON_PORT
                        value: '25575'
                      - name: MC_RCON_PASSWORD
                        value: 'kbve-rcon'
                      - name: GRAFANA_UPSTREAM_URL
                        value: 'http://monitoring-grafana.monitoring.svc.cluster.local:80'
                      - name: ARGOCD_UPSTREAM_URL
                        value: 'https://argocd-server.argocd.svc.cluster.local:443'
                      - name: ARGOCD_AUTH_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: argocd-auth
                                key: argocd-auth-token
                  resources:
                      requests:
                          memory: '512Mi'
                          cpu: '2000m'
                      limits:
                          memory: '1024Mi'
                          cpu: '4000m'
---
apiVersion: v1
kind: Service
metadata:
    name: kbve-service
    namespace: kbve
    labels:
        app: kbve
spec:
    type: ClusterIP
    selector:
        app: kbve
    ports:
        - port: 4321
          targetPort: 4321
          protocol: TCP
