apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: kyverno
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: '-1'
        kbve.com/source-path: kube/kyverno
        kbve.com/manifest-path: kube/kyverno
        kbve.com/application-file: kube/kyverno/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: operator
        kbve.com/stack: core
spec:
    project: default
    source:
        repoURL: https://kyverno.github.io/kyverno
        chart: kyverno
        targetRevision: 3.8.0
        helm:
            values:
                "fullnameOverride: kyverno\nadmissionController:\n    replicas: 2\n\
                \    container:\n        resources:\n            limits: { cpu: 1000m, memory:\
                \ 1Gi }\n            requests: { cpu: 500m, memory: 256Mi }\n    livenessProbe:\n\
                \        timeoutSeconds: 10\n        failureThreshold: 6\n    readinessProbe:\n\
                \        timeoutSeconds: 10\n        failureThreshold: 10\nbackgroundController:\n\
                \    replicas: 1\n    container:\n        resources:\n            limits:\
                \ { cpu: 500m, memory: 512Mi }\n            requests: { cpu: 100m, memory:\
                \ 128Mi }\ncleanupController:\n    replicas: 1\n    container:\n        resources:\n\
                \            limits: { cpu: 500m, memory: 256Mi }\n            requests: {\
                \ cpu: 100m, memory: 128Mi }\nreportsController:\n    replicas: 1\n    container:\n\
                \        resources:\n            limits: { cpu: 500m, memory: 512Mi }\n  \
                \          requests: { cpu: 100m, memory: 128Mi }\nconfig:\n    excludeKyvernoNamespace:\
                \ true\n    resourceFilters:\n        - '[Event,*,*]'\n        - '[Node,*,*]'\n\
                \        - '[Node/*,*,*]'\n        - '[APIService,*,*]'\n        - '[APIService/*,*,*]'\n\
                \        - '[TokenReview,*,*]'\n        - '[SubjectAccessReview,*,*]'\n  \
                \      - '[SelfSubjectAccessReview,*,*]'\n        - '[Binding,*,*]'\n    \
                \    - '[ReplicaSet,*,*]'\n        - '[ReplicaSet/*,*,*]'\n        - '[AdmissionReport,*,*]'\n\
                \        - '[ClusterAdmissionReport,*,*]'\n        - '[BackgroundScanReport,*,*]'\n\
                \        - '[ClusterBackgroundScanReport,*,*]'\n        - '[ClusterRole,*,system:*]'\n\
                \        - '[ClusterRoleBinding,*,system:*]'\n        - '[Role,*,system:*]'\n\
                \        - '[RoleBinding,*,system:*]'\n        - '[*,kube-system,*]'\n   \
                \     - '[*,kube-public,*]'\n        - '[*,kube-node-lease,*]'\n        -\
                \ '[*,argocd,*]'\n"
    destination:
        server: https://kubernetes.default.svc
        namespace: kyverno
    ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
              - /metadata/labels
              - /metadata/annotations
          managedFieldsManagers:
              - kubectl-kyverno
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
