apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: kyverno
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: '-1'
spec:
    project: default
    source:
        repoURL: https://kyverno.github.io/kyverno
        chart: kyverno
        targetRevision: 3.8.0
        helm:
            values: |
                fullnameOverride: kyverno
                admissionController:
                    replicas: 2
                    container:
                        resources:
                            limits: { cpu: 1000m, memory: 1Gi }
                            requests: { cpu: 500m, memory: 256Mi }
                    livenessProbe:
                        timeoutSeconds: 10
                        failureThreshold: 6
                    readinessProbe:
                        timeoutSeconds: 10
                        failureThreshold: 10
                backgroundController:
                    replicas: 1
                    container:
                        resources:
                            limits: { cpu: 500m, memory: 512Mi }
                            requests: { cpu: 100m, memory: 128Mi }
                cleanupController:
                    replicas: 1
                    container:
                        resources:
                            limits: { cpu: 500m, memory: 256Mi }
                            requests: { cpu: 100m, memory: 128Mi }
                reportsController:
                    replicas: 1
                    container:
                        resources:
                            limits: { cpu: 500m, memory: 512Mi }
                            requests: { cpu: 100m, memory: 128Mi }
                config:
                    excludeKyvernoNamespace: true
                    resourceFilters:
                        - '[Event,*,*]'
                        - '[Node,*,*]'
                        - '[Node/*,*,*]'
                        - '[APIService,*,*]'
                        - '[APIService/*,*,*]'
                        - '[TokenReview,*,*]'
                        - '[SubjectAccessReview,*,*]'
                        - '[SelfSubjectAccessReview,*,*]'
                        - '[Binding,*,*]'
                        - '[ReplicaSet,*,*]'
                        - '[ReplicaSet/*,*,*]'
                        - '[AdmissionReport,*,*]'
                        - '[ClusterAdmissionReport,*,*]'
                        - '[BackgroundScanReport,*,*]'
                        - '[ClusterBackgroundScanReport,*,*]'
                        - '[ClusterRole,*,system:*]'
                        - '[ClusterRoleBinding,*,system:*]'
                        - '[Role,*,system:*]'
                        - '[RoleBinding,*,system:*]'
                        - '[*,kube-system,*]'
                        - '[*,kube-public,*]'
                        - '[*,kube-node-lease,*]'
                        - '[*,argocd,*]'
    destination:
        server: https://kubernetes.default.svc
        namespace: kyverno
    ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
              - /metadata/labels
              - /metadata/annotations
          managedFieldsManagers:
              - kubectl-kyverno
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
