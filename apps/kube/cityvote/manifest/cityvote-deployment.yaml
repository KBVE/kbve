apiVersion: apps/v1
kind: Deployment
metadata:
    name: cityvote-deployment
    namespace: cityvote
    labels:
        app: cityvote
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    replicas: 1
    selector:
        matchLabels:
            app: cityvote
    template:
        metadata:
            annotations:
                rollout-restart: '2025-11-20T23:30:00Z'
            labels:
                app: cityvote
                version: 1.0.3
        spec:
            serviceAccountName: cityvote-sa
            automountServiceAccountToken: false
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: cityvote
                  image: ghcr.io/kbve/cityvote:1.0.3
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 4321
                        protocol: TCP
                  env:
                      - name: PORT
                        value: '4321'
                  resources:
                      requests:
                          memory: 128Mi
                          cpu: 100m
                      limits:
                          memory: 256Mi
                          cpu: 200m
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
            volumes:
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
    name: cityvote-service
    namespace: cityvote
    labels:
        app: cityvote
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: cityvote
    ports:
        - port: 4321
          targetPort: 4321
          protocol: TCP
