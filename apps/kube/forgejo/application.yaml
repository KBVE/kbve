apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: forgejo
    namespace: argocd
    annotations:
        kbve.com/source-path: kube/forgejo
        kbve.com/manifest-path: kube/forgejo
        kbve.com/application-file: kube/forgejo/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: ci-cd
        kbve.com/stack: core
spec:
    project: default
    sources:
        - chart: forgejo
          repoURL: oci://code.forgejo.org/forgejo-helm/forgejo
          targetRevision: 13.0.1
          helm:
              valuesObject:
                  global:
                      storageClass: longhorn
                  replicaCount: 1
                  image:
                      registry: codeberg.org
                      repository: forgejo/forgejo
                      tag: '15'
                  service:
                      http:
                          type: ClusterIP
                          port: 3000
                      ssh:
                          type: NodePort
                          port: 2222
                          nodePort: 30022
                  ingress:
                      enabled: false
                  persistence:
                      enabled: true
                      size: 50Gi
                      storageClass: longhorn
                      accessModes:
                          - ReadWriteOnce
                  podAnnotations:
                      kbve.com/config-revision: 2026-07-16-log-level-warn
                  gitea:
                      admin:
                          existingSecret: forgejo-admin
                      config:
                          log:
                              LEVEL: warn
                          server:
                              DISABLE_ROUTER_LOG: true
                              DOMAIN: git.kbve.com
                              ROOT_URL: https://git.kbve.com
                              SSH_DOMAIN: forgejo.kbve.com
                              SSH_PORT: 2222
                              SSH_LISTEN_PORT: 2222
                              LFS_START_SERVER: true
                              LFS_JWT_SECRET: ''
                              LFS_MAX_FILE_SIZE: 524288000
                          database:
                              DB_TYPE: postgres
                              HOST: kilobase-rw.kilobase.svc.cluster.local:5432
                              NAME: supabase
                              USER: forgejo
                              SSL_MODE: require
                              SCHEMA: forgejo
                          lfs:
                              STORAGE_TYPE: local
                              PATH: /data/lfs
                          service:
                              DISABLE_REGISTRATION: false
                              REQUIRE_SIGNIN_VIEW: true
                              ALLOW_ONLY_EXTERNAL_REGISTRATION: true
                              SHOW_REGISTRATION_BUTTON: false
                              # New accounts (incl. OAuth auto-registrations) are
                              # restricted by default: they can only interact with
                              # repos/orgs where they are explicitly added as a
                              # collaborator, and cannot access public repos on
                              # this instance.
                              DEFAULT_USER_IS_RESTRICTED: true
                              # New users cannot create organizations by default
                              # (org creation must be granted per-user by an admin).
                              DEFAULT_ALLOW_CREATE_ORGANIZATION: false
                          openid:
                              ENABLE_OPENID_SIGNIN: true
                              ENABLE_OPENID_SIGNUP: true
                          oauth2_client:
                              ENABLE_AUTO_REGISTRATION: true
                              ACCOUNT_LINKING: auto
                              UPDATE_AVATAR: true
                              USERNAME: preferred_username
                          actions:
                              ENABLED: true
                          repository:
                              DEFAULT_PRIVATE: private
                              ENABLE_PUSH_CREATE_USER: true
                          cache:
                              ADAPTER: redis
                          session:
                              PROVIDER: redis
                          queue:
                              TYPE: redis
                          mirror:
                              ENABLED: true
                              DEFAULT_INTERVAL: 10m
                          quota:
                              ENABLED: true
                          cron:
                              git_gc_repos:
                                  ENABLED: true
                                  RUN_AT_START: false
                                  SCHEDULE: '@every 24h'
                                  TIMEOUT: 120s
                              gc_lfs:
                                  ENABLED: true
                                  RUN_AT_START: false
                                  SCHEDULE: 0 1 * * 0
                                  OLDER_THAN: 168h
                      additionalConfigFromEnvs:
                          - name: FORGEJO__SERVER__LFS_JWT_SECRET
                            valueFrom:
                                secretKeyRef:
                                    name: forgejo-lfs-jwt
                                    key: secret
                          - name: FORGEJO__DATABASE__PASSWD
                            valueFrom:
                                secretKeyRef:
                                    name: forgejo-db
                                    key: password
                          - name: REDIS_PASSWORD
                            valueFrom:
                                secretKeyRef:
                                    name: valkey-auth
                                    key: valkey-password
                          - name: FORGEJO__CACHE__HOST
                            value: redis://default:$(REDIS_PASSWORD)@valkey.valkey.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s
                          - name: FORGEJO__SESSION__PROVIDER_CONFIG
                            value: redis://default:$(REDIS_PASSWORD)@valkey.valkey.svc.cluster.local:6379/2?pool_size=100&idle_timeout=180s
                          - name: FORGEJO__QUEUE__CONN_STR
                            value: redis://default:$(REDIS_PASSWORD)@valkey.valkey.svc.cluster.local:6379/1
                  valkey-cluster:
                      enabled: false
                  redis-cluster:
                      enabled: false
                  postgresql:
                      enabled: false
                  postgresql-ha:
                      enabled: false
        - repoURL: https://github.com/KBVE/kbve.git
          targetRevision: main
          path: apps/kube/forgejo/manifest
    destination:
        server: https://kubernetes.default.svc
        namespace: forgejo
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
