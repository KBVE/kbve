apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: forgejo
    namespace: argocd
spec:
    project: default
    sources:
        - chart: forgejo
          repoURL: oci://code.forgejo.org/forgejo-helm/forgejo
          targetRevision: 13.0.1
          helm:
              valuesObject:
                  global:
                      storageClass: longhorn

                  replicaCount: 1

                  image:
                      registry: codeberg.org
                      repository: forgejo/forgejo
                      tag: '12'

                  service:
                      http:
                          type: ClusterIP
                          port: 3000
                      ssh:
                          type: NodePort
                          port: 2222
                          nodePort: 30022

                  ingress:
                      enabled: false

                  persistence:
                      enabled: true
                      size: 50Gi
                      storageClass: longhorn
                      accessModes:
                          - ReadWriteOnce

                  deployment:
                      annotations:
                          # Bump this value to force a pod rollout when config/secrets change.
                          # ArgoCD detects the annotation change → new ReplicaSet → pod restart.
                          kbve.com/config-revision: '2026-04-25-git-canonical-url'

                  gitea:
                      admin:
                          existingSecret: forgejo-admin
                      config:
                          server:
                              # Canonical user-facing URL is git.kbve.com (CNAME →
                              # talos.kbve.com, ingress-nginx on .74). The Cilium
                              # gateway HTTPRoute on forgejo.kbve.com (.71) is kept
                              # alive but Cloudflare's path to .71 returns 522 on
                              # the LFS batch endpoint, so all generated URLs
                              # (clone, LFS batch, LFS upload) must point at
                              # git.kbve.com to avoid a redirect into the broken
                              # path. SSH continues to use forgejo.kbve.com on
                              # port 2222 (SSH bypasses Cloudflare entirely).
                              DOMAIN: git.kbve.com
                              ROOT_URL: https://git.kbve.com
                              SSH_DOMAIN: forgejo.kbve.com
                              SSH_PORT: 2222
                              SSH_LISTEN_PORT: 2222
                              LFS_START_SERVER: true
                              # LFS_JWT_SECRET is injected at runtime via the
                              # additionalConfigFromEnvs block below — sealed
                              # in apps/kube/forgejo/manifest/sealed-lfs-jwt.yaml.
                              # Leaving blank here means Helm won't render a
                              # value into the auto-generated Secret; the env
                              # var override (FORGEJO__SERVER__LFS_JWT_SECRET)
                              # is what Forgejo actually reads at startup.
                              LFS_JWT_SECRET: ''
                          database:
                              DB_TYPE: postgres
                              HOST: supabase-cluster-rw.kilobase.svc.cluster.local:5432
                              NAME: supabase
                              USER: forgejo
                              SSL_MODE: require
                              SCHEMA: forgejo
                          lfs:
                              STORAGE_TYPE: local
                              PATH: /data/lfs
                          service:
                              DISABLE_REGISTRATION: true
                              REQUIRE_SIGNIN_VIEW: true
                          actions:
                              ENABLED: true
                          repository:
                              DEFAULT_PRIVATE: private
                              ENABLE_PUSH_CREATE_USER: true
                          cache:
                              ADAPTER: redis
                          session:
                              PROVIDER: redis
                          queue:
                              TYPE: redis
                          mirror:
                              ENABLED: true
                              DEFAULT_INTERVAL: 10m
                      additionalConfigFromEnvs:
                          - name: FORGEJO__SERVER__LFS_JWT_SECRET
                            valueFrom:
                                secretKeyRef:
                                    name: forgejo-lfs-jwt
                                    key: secret
                          - name: FORGEJO__DATABASE__PASSWD
                            valueFrom:
                                secretKeyRef:
                                    name: forgejo-db
                                    key: password
                          - name: REDIS_PASSWORD
                            valueFrom:
                                secretKeyRef:
                                    name: forgejo-redis
                                    key: password
                          - name: FORGEJO__CACHE__HOST
                            value: redis://default:$(REDIS_PASSWORD)@redis-master.redis.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s
                          - name: FORGEJO__SESSION__PROVIDER_CONFIG
                            value: redis://default:$(REDIS_PASSWORD)@redis-master.redis.svc.cluster.local:6379/2?pool_size=100&idle_timeout=180s
                          - name: FORGEJO__QUEUE__CONN_STR
                            value: redis://default:$(REDIS_PASSWORD)@redis-master.redis.svc.cluster.local:6379/1

                  valkey-cluster:
                      enabled: false

                  redis-cluster:
                      enabled: false

                  postgresql:
                      enabled: false

                  postgresql-ha:
                      enabled: false

        - repoURL: https://github.com/KBVE/kbve.git
          targetRevision: main
          path: apps/kube/forgejo/manifest

    destination:
        server: https://kubernetes.default.svc
        namespace: forgejo
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
