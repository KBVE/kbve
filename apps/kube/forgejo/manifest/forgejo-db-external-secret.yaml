apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: forgejo-db
    namespace: forgejo
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kubernetes-secret-store
        kind: ClusterSecretStore
    target:
        name: forgejo-db
        creationPolicy: Owner
    data:
        - secretKey: password
          remoteRef:
              key: supabase-cluster-app
              property: password
              metadataPolicy: None
