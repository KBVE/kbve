apiVersion: v1
kind: ServiceAccount
metadata:
    name: forgejo-gate-sa
    namespace: forgejo
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: forgejo-gate-external-secrets
    namespace: forgejo
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: forgejo-gate-supabase-secret-store
    namespace: forgejo
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: forgejo-gate-external-secrets
                    namespace: forgejo
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: forgejo-gate-supabase-jwt
    namespace: forgejo
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: forgejo-gate-supabase-secret-store
        kind: SecretStore
    target:
        name: forgejo-gate-supabase-jwt
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                SUPABASE_JWT_SECRET: '{{ .jwt_secret }}'
                anon-key: '{{ .anonkey }}'
    data:
        - secretKey: jwt_secret
          remoteRef:
              key: supabase-jwt
              property: secret
        - secretKey: anonkey
          remoteRef:
              key: supabase-jwt
              property: anon-key
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: forgejo-gate-supabase-access
    namespace: kilobase
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['supabase-jwt']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: forgejo-gate-supabase-access-binding
    namespace: kilobase
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: forgejo-gate-supabase-access
subjects:
    - kind: ServiceAccount
      name: forgejo-gate-external-secrets
      namespace: forgejo
