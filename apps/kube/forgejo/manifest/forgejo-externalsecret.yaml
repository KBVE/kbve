# ServiceAccount for ExternalSecrets cross-namespace access
apiVersion: v1
kind: ServiceAccount
metadata:
    name: forgejo-external-secrets
    namespace: forgejo
---
# SecretStore: Kilobase namespace (for supabase-cluster-app password)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: forgejo-supabase-secret-store
    namespace: forgejo
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: forgejo-external-secrets
                    namespace: forgejo
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: Pull Supabase PostgreSQL password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: forgejo-db
    namespace: forgejo
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: forgejo-supabase-secret-store
        kind: SecretStore
    target:
        name: forgejo-db
        creationPolicy: Owner
    data:
        - secretKey: password
          remoteRef:
              key: supabase-cluster-app
              property: password
---
# SecretStore: Redis namespace (for redis-auth password)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: forgejo-redis-secret-store
    namespace: forgejo
spec:
    provider:
        kubernetes:
            remoteNamespace: redis
            auth:
                serviceAccount:
                    name: forgejo-external-secrets
                    namespace: forgejo
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# ExternalSecret: Pull Redis password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: forgejo-redis
    namespace: forgejo
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: forgejo-redis-secret-store
        kind: SecretStore
    target:
        name: forgejo-redis
        creationPolicy: Owner
    data:
        - secretKey: password
          remoteRef:
              key: redis-auth
              property: redis-password
