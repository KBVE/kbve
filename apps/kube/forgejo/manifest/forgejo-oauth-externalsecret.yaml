apiVersion: v1
kind: ServiceAccount
metadata:
    name: forgejo-oauth-external-secrets
    namespace: forgejo
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: forgejo-oauth-secret-store
    namespace: forgejo
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: forgejo-oauth-external-secrets
                    namespace: forgejo
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: forgejo-oauth-credentials
    namespace: forgejo
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: forgejo-oauth-secret-store
        kind: SecretStore
    target:
        name: forgejo-oauth-credentials
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                client-id: '{{ .client_id }}'
                client-secret: '{{ .client_secret }}'
    data:
        - secretKey: client_id
          remoteRef:
              key: forgejo-oauth-credentials
              property: client-id
        - secretKey: client_secret
          remoteRef:
              key: forgejo-oauth-credentials
              property: client-secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: forgejo-oauth-access
    namespace: kilobase
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['forgejo-oauth-credentials']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: forgejo-oauth-access-binding
    namespace: kilobase
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: forgejo-oauth-access
subjects:
    - kind: ServiceAccount
      name: forgejo-oauth-external-secrets
      namespace: forgejo
