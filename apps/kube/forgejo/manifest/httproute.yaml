apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: forgejo-route
    namespace: forgejo
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - forgejo.kbve.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: forgejo-http
                port: 3000
