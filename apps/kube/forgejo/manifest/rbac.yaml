# Role: Allow forgejo ExternalSecrets SA to read DB secrets in kilobase
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: forgejo-supabase-access
    namespace: kilobase
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['supabase-postgres', 'forgejo-db-credentials']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: forgejo-supabase-access-binding
    namespace: kilobase
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: forgejo-supabase-access
subjects:
    - kind: ServiceAccount
      name: forgejo-external-secrets
      namespace: forgejo
---
# Role: Allow ARC runners to read forgejo-deploy-keys + forgejo-kbve-ci secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
