    namespace: forgejo
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['forgejo-deploy-keys', 'forgejo-kbve-ci']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: arc-runners-forgejo-access-binding
    namespace: forgejo
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: arc-runners-forgejo-access
subjects:
    - kind: ServiceAccount
