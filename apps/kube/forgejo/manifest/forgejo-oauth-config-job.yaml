apiVersion: batch/v1
kind: Job
metadata:
    name: forgejo-oauth-config
    namespace: forgejo
    labels:
        app: forgejo-oauth-config
        kbve.com/category: development
        kbve.com/stack: core
    annotations:
        argocd.argoproj.io/hook: PostSync
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
    backoffLimit: 5
    template:
        metadata:
            labels:
                app: forgejo-oauth-config
        spec:
            restartPolicy: Never
            securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                fsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault
            initContainers:
                - name: wait-for-forgejo
                  image: curlimages/curl:8.11.1
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                      readOnlyRootFilesystem: true
                  command:
                      - /bin/sh
                      - -c
                      - |
                          echo "Waiting for Forgejo to be ready..."
                          until curl -sf http://forgejo-http.forgejo.svc.cluster.local:3000/api/healthz; do
                              echo "Forgejo not ready yet, waiting..."
                              sleep 5
                          done
                          echo "Forgejo is ready!"
                - name: init-directories
                  image: codeberg.org/forgejo/forgejo:12
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                  command:
                      - /usr/sbin/init_directory_structure.sh
                  env:
                      - name: GITEA_APP_INI
                        value: /data/gitea/conf/app.ini
                      - name: GITEA_CUSTOM
                        value: /data/gitea
                      - name: GITEA_WORK_DIR
                        value: /data
                      - name: GITEA_TEMP
                        value: /tmp/gitea
                  volumeMounts:
                      - name: init
                        mountPath: /usr/sbin
                      - name: temp
                        mountPath: /tmp
                      - name: data
                        mountPath: /data
                - name: init-app-ini
                  image: codeberg.org/forgejo/forgejo:12
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                  command:
                      - /usr/sbin/config_environment.sh
                  env:
                      - name: GITEA_APP_INI
                        value: /data/gitea/conf/app.ini
                      - name: GITEA_CUSTOM
                        value: /data/gitea
                      - name: GITEA_WORK_DIR
                        value: /data
                      - name: GITEA_TEMP
                        value: /tmp/gitea
                      - name: FORGEJO__DATABASE__PASSWD
                        valueFrom:
                            secretKeyRef:
                                name: forgejo-db
                                key: password
                      - name: FORGEJO__SERVER__LFS_JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: forgejo-lfs-jwt
                                key: secret
                      - name: REDIS_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: valkey-auth
                                key: valkey-password
                      - name: FORGEJO__CACHE__HOST
                        value: redis://default:$(REDIS_PASSWORD)@valkey.valkey.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s
                      - name: FORGEJO__SESSION__PROVIDER_CONFIG
                        value: redis://default:$(REDIS_PASSWORD)@valkey.valkey.svc.cluster.local:6379/2?pool_size=100&idle_timeout=180s
                      - name: FORGEJO__QUEUE__CONN_STR
                        value: redis://default:$(REDIS_PASSWORD)@valkey.valkey.svc.cluster.local:6379/1
                  volumeMounts:
                      - name: config
                        mountPath: /usr/sbin
                      - name: inline-config-sources
                        mountPath: /env-to-ini-mounts/inlines/
                      - name: temp
                        mountPath: /tmp
                      - name: data
                        mountPath: /data
            containers:
                - name: configure-oauth
                  image: codeberg.org/forgejo/forgejo:12
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                  env:
                      - name: GITEA_APP_INI
                        value: /data/gitea/conf/app.ini
                      - name: GITEA_CUSTOM
                        value: /data/gitea
                      - name: GITEA_WORK_DIR
                        value: /data
                      - name: GITEA_TEMP
                        value: /tmp/gitea
                      - name: OAUTH_CLIENT_ID
                        valueFrom:
                            secretKeyRef:
                                name: forgejo-oauth-credentials
                                key: client-id
                      - name: OAUTH_CLIENT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: forgejo-oauth-credentials
                                key: client-secret
                  command:
                      - /bin/sh
                      - -c
                      - |
                          set -e

                          echo "==> Checking if OAuth source 'kbve' already exists..."
                          if /usr/local/bin/forgejo admin auth list 2>/dev/null | grep -q "kbve"; then
                              echo "OAuth authentication source 'kbve' already exists. Skipping configuration."
                              exit 0
                          fi

                          echo "==> Adding OAuth authentication source..."
                          /usr/local/bin/forgejo admin auth add-oauth \
                              --name kbve \
                              --provider openidConnect \
                              --key "${OAUTH_CLIENT_ID}" \
                              --secret "${OAUTH_CLIENT_SECRET}" \
                              --auto-discover-url "https://supabase.kbve.com/auth/v1/.well-known/openid-configuration" \
                              --scopes "openid email profile"

                          echo "==> OAuth authentication source 'kbve' configured successfully!"
                          echo "==> Users can now sign in with KBVE credentials"
                  volumeMounts:
                      - name: data
                        mountPath: /data
                      - name: temp
                        mountPath: /tmp
            volumes:
                - name: init
                  secret:
                      secretName: forgejo-init
                      defaultMode: 0755
                - name: config
                  secret:
                      secretName: forgejo
                      defaultMode: 0755
                - name: inline-config-sources
                  secret:
                      secretName: forgejo-inline-config
                - name: temp
                  emptyDir: {}
                - name: data
                  emptyDir: {}
