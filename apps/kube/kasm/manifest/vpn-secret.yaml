# Placeholder — replace with SealedSecret or ExternalSecret in production.
#
# To create the real secret from a WireGuard config:
#   kubectl create secret generic vpn-wireguard \
#     --namespace=kasm \
#     --from-file=wg0.conf=/path/to/your/wg0.conf \
#     --dry-run=client -o yaml | kubeseal --format yaml > vpn-secret-sealed.yaml
#
# Required keys:
#   VPN_SERVICE_PROVIDER: provider name (mullvad, protonvpn, surfshark, custom, etc.)
#   WIREGUARD_PRIVATE_KEY: your WireGuard private key
#   WIREGUARD_ADDRESSES: tunnel IP (e.g., 10.64.0.1/32)
#   SERVER_COUNTRIES: exit country (e.g., US, DE, NL)
#
# See https://github.com/qdm12/gluetun-wiki for provider-specific env vars.

apiVersion: v1
kind: Secret
metadata:
    name: vpn-wireguard
    namespace: kasm
    labels:
        app.kubernetes.io/part-of: kasm
        app.kubernetes.io/component: vpn
type: Opaque
stringData:
    VPN_SERVICE_PROVIDER: 'custom'
    VPN_TYPE: 'wireguard'
    WIREGUARD_PRIVATE_KEY: 'REPLACE_ME'
    WIREGUARD_ADDRESSES: '10.0.0.1/32'
    WIREGUARD_PUBLIC_KEY: 'REPLACE_ME'
    WIREGUARD_ENDPOINT_IP: 'REPLACE_ME'
    WIREGUARD_ENDPOINT_PORT: '51820'
