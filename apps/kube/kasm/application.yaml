apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: kasm
    namespace: argocd
    annotations:
        kbve.com/source-path: kube/kasm
        kbve.com/manifest-path: apps/kube/kasm/manifest
        kbve.com/application-file: kube/kasm/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: virtualization
        kbve.com/stack: core
spec:
    project: default
    source:
        repoURL: https://github.com/KBVE/kbve
        targetRevision: main
        path: apps/kube/kasm/manifest
    destination:
        server: https://kubernetes.default.svc
        namespace: kasm
    ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
              - /spec/replicas
        - group: ''
          kind: Secret
          name: kasm-vnc-pw
          jsonPointers:
              - /data/password
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - RespectIgnoreDifferences=true
