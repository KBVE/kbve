apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: meta
    namespace: argocd
    annotations:
        kbve.com/source-path: kube/meta
        kbve.com/manifest-path: apps/kube/meta/manifests
        kbve.com/application-file: kube/meta/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: application
        kbve.com/stack: supabase
spec:
    project: default
    source:
        repoURL: https://github.com/kbve/kbve
        targetRevision: main
        path: apps/kube/meta/manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: kilobase
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - Replace=true
            - Force=true
            - RespectIgnoreDifferences=true
        retry:
            limit: 3
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
