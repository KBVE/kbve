apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: valkey-allow-consumers
    namespace: valkey
spec:
    podSelector:
        matchLabels:
            app.kubernetes.io/name: valkey
    policyTypes:
        - Ingress
    ingress:
        - from:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: arc-runners
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: forgejo
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: discordsh
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: kbve
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: cryptothrone
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: irc
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: keda
          ports:
              - port: 6379
                protocol: TCP
