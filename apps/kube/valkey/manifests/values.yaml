# Valkey configuration — secondary key-value store alongside Redis
# Official valkey-io/valkey-helm chart (not Bitnami)

# Stakater Reloader watches workloads with this annotation and rolls
# the pod when any referenced ConfigMap/Secret changes. valkey-helm
# 0.9.4 added `workloadAnnotations` which lands the annotation on the
# Deployment metadata itself — that is the surface Reloader watches by
# default, so a rotation of the valkey-auth SealedSecret triggers an
# automatic roll of the master pod.
workloadAnnotations:
    reloader.stakater.com/auto: 'true'

auth:
    enabled: true
    aclUsers:
        default:
            permissions: '~* &* +@all'
            passwordKey: valkey-password
    usersExistingSecret: valkey-auth

dataStorage:
    enabled: true
    # Sized for sccache Rust object cache (Bevy + axum-kbve workspace).
    # Cold-build populates ~2-5GB of cache entries; 32Gi leaves headroom
    # for additional projects + LRU churn.
    requestedSize: 32Gi
    className: longhorn
    accessModes:
        - ReadWriteOnce

resources:
    requests:
        memory: '1Gi'
        cpu: '200m'
    limits:
        memory: '4Gi'
        cpu: '1000m'

# maxmemory caps in-memory working set under the pod limit so OOMKiller
# doesn't fire; allkeys-lru evicts oldest sccache entries first.
valkeyConfig: |-
    maxmemory 3gb
    maxmemory-policy allkeys-lru

metrics:
    enabled: true
    serviceMonitor:
        enabled: true
