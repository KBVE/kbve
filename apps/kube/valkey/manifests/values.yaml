# Valkey configuration — secondary key-value store alongside Redis
# Official valkey-io/valkey-helm chart (not Bitnami)

auth:
    enabled: true
    aclUsers:
        default:
            permissions: '~* &* +@all'
            passwordKey: valkey-password
    usersExistingSecret: valkey-auth

dataStorage:
    enabled: true
    requestedSize: 8Gi
    className: longhorn
    accessModes:
        - ReadWriteOnce

resources:
    requests:
        memory: '256Mi'
        cpu: '100m'
    limits:
        memory: '512Mi'
        cpu: '500m'

metrics:
    enabled: true
    serviceMonitor:
        enabled: true
