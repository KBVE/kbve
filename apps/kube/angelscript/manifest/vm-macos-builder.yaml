apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: macos-builder-rootdisk
    namespace: angelscript
    labels:
        app: angelscript
        component: macos-builder
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 256Gi
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
    name: macos-builder
    namespace: angelscript
    labels:
        app: angelscript
        component: macos-builder
spec:
    runStrategy: Manual
    template:
        metadata:
            labels:
                app: angelscript
                component: macos-builder
                kubevirt.io/domain: macos-builder
        spec:
            evictionStrategy: None
            domain:
                cpu:
                    cores: 8
                    sockets: 1
                    threads: 2
                    model: Penryn
                    features:
                        - name: invtsc
                          policy: require
                        - name: ssse3
                          policy: require
                        - name: sse4.1
                          policy: require
                        - name: sse4.2
                          policy: require
                        - name: avx
                          policy: require
                        - name: avx2
                          policy: require
                devices:
                    disks:
                        - name: opencore
                          disk:
                              bus: sata
                          bootOrder: 1
                        - name: rootdisk
                          disk:
                              bus: sata
                          bootOrder: 2
                        - name: installer
                          disk:
                              bus: sata
                          bootOrder: 3
                        - name: shared-storage
                          disk:
                              bus: sata
                    interfaces:
                        - name: default
                          masquerade: {}
                    inputs:
                        - type: tablet
                          bus: usb
                          name: tablet
                    useVirtioTransitional: true
                firmware:
                    bootloader:
                        efi:
                            secureBoot: false
                features:
                    acpi: {}
                    smm:
                        enabled: true
                clock:
                    utc: {}
                machine:
                    type: q35
                memory:
                    guest: 16Gi
                resources:
                    requests:
                        memory: 16Gi
                        cpu: '8'
                    limits:
                        memory: 20Gi
                        cpu: '10'
            networks:
                - name: default
                  pod: {}
            terminationGracePeriodSeconds: 60
            volumes:
                - name: opencore
                  dataVolume:
                      name: macos-opencore
                - name: rootdisk
                  persistentVolumeClaim:
                      claimName: macos-builder-rootdisk
                - name: installer
                  dataVolume:
                      name: macos-sonoma-installer
                - name: shared-storage
                  persistentVolumeClaim:
                      claimName: builder-shared-storage
