# macOS Tahoe installer ISO — uploaded via virtctl image-upload.
# CDI manages the lifecycle; the VM references this as a cdrom disk.
#
# Upload command (after port-forwarding CDI upload proxy):
#   kubectl port-forward -n cdi svc/cdi-uploadproxy 8443:443
#   virtctl image-upload dv macos-tahoe-builder-iso \
#     --size=16Gi \
#     --image-path=BaseSystem-tahoe.img \
#     --storage-class=longhorn \
#     --namespace=angelscript \
#     --uploadproxy-url=https://localhost:8443 \
#     --insecure
#
# The DataVolume is created here so ArgoCD tracks it. The actual image
# content is uploaded manually via virtctl (one-time provisioning step).
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
    name: macos-tahoe-builder-iso
    namespace: angelscript
    labels:
        app: angelscript
        component: macos-builder
    annotations:
        # Prevent ArgoCD from pruning — content is uploaded out-of-band
        argocd.argoproj.io/sync-options: Prune=false
spec:
    source:
        # blank source — content uploaded via virtctl image-upload
        blank: {}
    storage:
        accessModes:
            - ReadWriteOnce
        storageClassName: longhorn
        resources:
            requests:
                storage: 16Gi
