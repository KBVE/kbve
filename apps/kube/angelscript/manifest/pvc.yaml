apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: angelscript-server-data
    namespace: angelscript
    labels:
        app: angelscript
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 50Gi
