# Longhorn PVC for caching the UnrealEngine-Angelscript source.
# Mounted at /mnt/longhorn/angelscript-engine on ARC runner nodes.
# Avoids re-cloning ~50GB+ engine source on every build.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: angelscript-engine-cache
    namespace: arc-runners
    labels:
        app: angelscript
        purpose: engine-cache
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 200Gi
