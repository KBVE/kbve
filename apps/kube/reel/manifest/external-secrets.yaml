apiVersion: v1
kind: ServiceAccount
metadata:
    name: reel-external-secrets
    namespace: reel
    labels:
        app: reel
        component: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: reel-read-vpn-wireguard
    namespace: kasm
rules:
    - apiGroups: ['']
      resources: ['secrets']
      resourceNames: ['vpn-wireguard']
      verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: reel-read-vpn-wireguard
    namespace: kasm
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: reel-read-vpn-wireguard
subjects:
    - kind: ServiceAccount
      name: reel-external-secrets
      namespace: reel
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: kasm-secret-store
    namespace: reel
    labels:
        app: reel
        component: external-secrets
spec:
    provider:
        kubernetes:
            auth:
                serviceAccount:
                    name: reel-external-secrets
            remoteNamespace: kasm
            server:
                url: 'https://kubernetes.default.svc'
                caProvider:
                    key: ca.crt
                    name: kube-root-ca.crt
                    namespace: kube-system
                    type: ConfigMap
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: vpn-wireguard
    namespace: reel
    labels:
        app: reel
        component: external-secrets
spec:
    refreshInterval: 1h
    secretStoreRef:
        kind: SecretStore
        name: kasm-secret-store
    target:
        name: vpn-wireguard
        creationPolicy: Owner
    dataFrom:
        - extract:
              key: vpn-wireguard
