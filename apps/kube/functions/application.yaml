apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: functions
    namespace: argocd
    finalizers:
        - resources-finalizer.argocd.argoproj.io
    annotations:
        kbve.com/source-path: kube/functions
        kbve.com/manifest-path: apps/kube/functions/manifests
        kbve.com/application-file: kube/functions/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: application
        kbve.com/stack: supabase
spec:
    project: default
    source:
        repoURL: https://github.com/kbve/kbve
        targetRevision: HEAD
        path: apps/kube/functions/manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: kilobase
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=false
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
