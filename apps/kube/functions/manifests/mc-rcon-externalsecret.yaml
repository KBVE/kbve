# ServiceAccount used by the SecretStore to read RCON password from mc namespace
apiVersion: v1
kind: ServiceAccount
metadata:
    name: functions-mc-external-secrets
    namespace: kilobase
---
# SecretStore: reads secrets from mc namespace into kilobase
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: mc-rcon-secret-store
    namespace: kilobase
spec:
    provider:
        kubernetes:
            remoteNamespace: mc
            auth:
                serviceAccount:
                    name: functions-mc-external-secrets
                    namespace: kilobase
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
# Sync mc-rcon-password from mc namespace into kilobase as mc-rcon-credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: mc-rcon-credentials
    namespace: kilobase
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: mc-rcon-secret-store
        kind: SecretStore
    target:
        name: mc-rcon-credentials
        creationPolicy: Owner
    data:
        - secretKey: rcon-password
          remoteRef:
              key: mc-rcon-password
              property: rcon-password
