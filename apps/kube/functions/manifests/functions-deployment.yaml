apiVersion: apps/v1
kind: Deployment
metadata:
    name: functions
    namespace: kilobase
spec:
    replicas: 1
    selector:
        matchLabels:
            app: functions
    template:
        metadata:
            labels:
                app: functions
            annotations:
                rollout-restart: '2026-04-04T09:00:00Z'
        spec:
            containers:
                - name: edge-functions
                  image: ghcr.io/kbve/edge:0.1.37
                  imagePullPolicy: Always
                  command:
                      - 'edge-runtime'
                      - 'start'
                      - '--main-service'
                      - '/home/deno/functions/main'
                  env:
                      - name: JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: jwt-secret
                      - name: SUPABASE_URL
                        value: 'http://kong:8000'
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: service-role-key
                      - name: SUPABASE_DB_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: db-url
                      - name: SUPABASE_DB_URL_RO
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: db-url-ro
                      - name: HCAPTCHA_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: hcaptcha-config
                                key: secret-key
                      - name: VERIFY_JWT
                        value: 'true'
                      - name: FIRECRACKER_URL
                        value: 'http://firecracker-ctl.firecracker.svc.cluster.local:9001'
                      - name: CLICKHOUSE_ENDPOINT
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: clickhouse-endpoint
                      - name: CLICKHOUSE_USER
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: clickhouse-username
                      - name: CLICKHOUSE_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: clickhouse-password
                      # MC RCON — service DNS resolves dynamically to current pods
                      - name: MC_RCON_LOBBY_HOST
                        value: 'mc-lobby-backend.arc-runners.svc.cluster.local'
                      - name: MC_RCON_LOBBY_PORT
                        value: '25575'
                      - name: MC_RCON_LOBBY_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: mc-rcon-credentials
                                key: rcon-password
                      - name: MC_RCON_SURVIVAL_HOST
                        value: 'mc-fabric-backend.arc-runners.svc.cluster.local'
                      - name: MC_RCON_SURVIVAL_PORT
                        value: '25575'
                      - name: MC_RCON_SURVIVAL_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: mc-rcon-credentials
                                key: rcon-password
                  resources:
                      requests:
                          memory: '256Mi'
                          cpu: '100m'
                      limits:
                          memory: '512Mi'
                          cpu: '500m'
