apiVersion: apps/v1
kind: Deployment
metadata:
    name: axum-rentearth-deployment
    namespace: rentearth
    labels:
        app: axum-rentearth
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: axum-rentearth
    template:
        metadata:
            labels:
                app: axum-rentearth
            annotations:
                kbve.com/config-revision: 2026-07-16-log-warn
        spec:
            serviceAccountName: rentearth-sa
            automountServiceAccountToken: false
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: axum-rentearth
                  image: ghcr.io/kbve/axum-rentearth:0.1.1
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 4323
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /api/health
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  envFrom:
                      - configMapRef:
                            name: axum-rentearth-config
                      - secretRef:
                            name: axum-rentearth-secrets
                            optional: true
                  resources:
                      requests:
                          memory: 128Mi
                          cpu: 100m
                      limits:
                          memory: 256Mi
                          cpu: 500m
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
            volumes:
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
    name: axum-rentearth-service
    namespace: rentearth
    labels:
        app: axum-rentearth
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: axum-rentearth
    ports:
        - name: http
          port: 4323
          targetPort: 4323
          protocol: TCP
