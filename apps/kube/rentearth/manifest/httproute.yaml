apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: rentearth-route
    namespace: rentearth
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - rentearth.com
        - www.rentearth.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: rentearth-service
                port: 4321
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
