apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: axum-rentearth-route
    namespace: rentearth
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - play.rentearth.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: axum-rentearth-service
                port: 4323
