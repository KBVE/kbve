apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: firecracker-ctl
    namespace: argocd
    finalizers:
        - resources-finalizer.argocd.argoproj.io
    annotations:
        kbve.com/source-path: kube/firecracker
        kbve.com/manifest-path: apps/kube/firecracker/manifests
        kbve.com/application-file: kube/firecracker/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: virtualization
        kbve.com/stack: core
spec:
    project: default
    source:
        repoURL: https://github.com/kbve/kbve
        targetRevision: HEAD
        path: apps/kube/firecracker/manifests
        kustomize: {}
    destination:
        server: https://kubernetes.default.svc
        namespace: firecracker
    syncPolicy:
        automated:
            prune: true
            selfHeal: false
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
