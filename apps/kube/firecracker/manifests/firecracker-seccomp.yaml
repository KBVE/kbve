# Custom seccomp profile for the Firecracker jailer.
# Extends the default container runtime profile with only the syscalls
# the jailer needs for pivot_root, mount namespaces, and device creation.
#
# Requires: Security Profiles Operator (security-profiles-operator namespace)
#
# Once SPO is deployed and this profile is active, update the deployment
# securityContext from:
#   seccompProfile: { type: Unconfined }
# to:
#   seccompProfile:
#     type: Localhost
#     localhostProfile: operator/firecracker/firecracker-jailer.json
apiVersion: security-profiles-operator.x-k8s.io/v1beta1
kind: SeccompProfile
metadata:
    name: firecracker-jailer
    namespace: firecracker
    labels:
        app: firecracker-ctl
spec:
    defaultAction: SCMP_ACT_ERRNO
    architectures:
        - SCMP_ARCH_X86_64
    syscalls:
        # --- Default runtime profile (allowlist) ---
        # Core syscalls allowed by the default Docker/containerd profile.
        # This is the standard set minus the privileged syscalls.
        - names:
              - accept
              - accept4
              - access
              - adjtimex
              - alarm
              - arch_prctl
              - bind
              - brk
              - capget
              - capset
              - chdir
              - chmod
              - chown
              - chown32
              - clock_adjtime
              - clock_getres
              - clock_gettime
              - clock_nanosleep
              - close
              - close_range
              - connect
              - copy_file_range
              - creat
              - dup
              - dup2
              - dup3
              - epoll_create
              - epoll_create1
              - epoll_ctl
              - epoll_ctl_old
              - epoll_pwait
              - epoll_pwait2
              - epoll_wait
              - epoll_wait_old
              - eventfd
              - eventfd2
              - execve
              - execveat
              - exit
              - exit_group
              - faccessat
              - faccessat2
              - fadvise64
              - fallocate
              - fanotify_mark
              - fchdir
              - fchmod
              - fchmodat
              - fchown
              - fchown32
              - fchownat
              - fcntl
              - fdatasync
              - fgetxattr
              - flistxattr
              - flock
              - fork
              - fsetxattr
              - fstat
              - fstatfs
              - fsync
              - ftruncate
              - futex
              - futex_waitv
              - futimesat
              - get_robust_list
              - get_thread_area
              - getcpu
              - getcwd
              - getdents
              - getdents64
              - getegid
              - getegid32
              - geteuid
              - geteuid32
              - getgid
              - getgid32
              - getgroups
              - getgroups32
              - getitimer
              - getpeername
              - getpgid
              - getpgrp
              - getpid
              - getppid
              - getpriority
              - getrandom
              - getresgid
              - getresgid32
              - getresuid
              - getresuid32
              - getrlimit
              - getrusage
              - getsid
              - getsockname
              - getsockopt
              - gettid
              - gettimeofday
              - getuid
              - getuid32
              - getxattr
              - inotify_add_watch
              - inotify_init
              - inotify_init1
              - inotify_rm_watch
              - io_cancel
              - io_destroy
              - io_getevents
              - io_pgetevents
              - io_setup
              - io_submit
              - io_uring_enter
              - io_uring_register
              - io_uring_setup
              - ioctl
              - ioprio_get
              - ioprio_set
              - ipc
              - kill
              - landlock_add_rule
              - landlock_create_ruleset
              - landlock_restrict_self
              - lchown
              - lchown32
              - lgetxattr
              - link
              - linkat
              - listen
              - listxattr
              - llistxattr
              - lremovexattr
              - lseek
              - lsetxattr
              - lstat
              - madvise
              - membarrier
              - memfd_create
              - memfd_secret
              - mincore
              - mkdir
              - mkdirat
              - mlock
              - mlock2
              - mlockall
              - mmap
              - mprotect
              - mq_getsetattr
              - mq_notify
              - mq_open
              - mq_timedreceive
              - mq_timedsend
              - mq_unlink
              - mremap
              - msgctl
              - msgget
              - msgrcv
              - msgsnd
              - msync
              - munlock
              - munlockall
              - munmap
              - nanosleep
              - newfstatat
              - open
              - openat
              - openat2
              - pause
              - pidfd_open
              - pidfd_send_signal
              - pipe
              - pipe2
              - poll
              - ppoll
              - prctl
              - pread64
              - preadv
              - preadv2
              - prlimit64
              - process_mrelease
              - pselect6
              - pwrite64
              - pwritev
              - pwritev2
              - read
              - readahead
              - readlink
              - readlinkat
              - readv
              - recvfrom
              - recvmmsg
              - recvmsg
              - remap_file_pages
              - removexattr
              - rename
              - renameat
              - renameat2
              - restart_syscall
              - rmdir
              - rseq
              - rt_sigaction
              - rt_sigpending
              - rt_sigprocmask
              - rt_sigqueueinfo
              - rt_sigreturn
              - rt_sigsuspend
              - rt_sigtimedwait
              - rt_tgsigqueueinfo
              - sched_get_priority_max
              - sched_get_priority_min
              - sched_getaffinity
              - sched_getattr
              - sched_getparam
              - sched_getscheduler
              - sched_setaffinity
              - sched_setattr
              - sched_setparam
              - sched_setscheduler
              - sched_yield
              - seccomp
              - select
              - semctl
              - semget
              - semop
              - semtimedop
              - sendfile
              - sendmmsg
              - sendmsg
              - sendto
              - set_robust_list
              - set_thread_area
              - set_tid_address
              - setfsgid
              - setfsgid32
              - setfsuid
              - setfsuid32
              - setgid
              - setgid32
              - setgroups
              - setgroups32
              - setitimer
              - setpgid
              - setpriority
              - setregid
              - setregid32
              - setresgid
              - setresgid32
              - setresuid
              - setresuid32
              - setreuid
              - setreuid32
              - setrlimit
              - setsid
              - setsockopt
              - setuid
              - setuid32
              - setxattr
              - shmat
              - shmctl
              - shmdt
              - shmget
              - shutdown
              - sigaltstack
              - signalfd
              - signalfd4
              - socket
              - socketcall
              - socketpair
              - splice
              - stat
              - statfs
              - statx
              - symlink
              - symlinkat
              - sync
              - sync_file_range
              - syncfs
              - sysinfo
              - tee
              - tgkill
              - time
              - timer_create
              - timer_delete
              - timer_getoverrun
              - timer_gettime
              - timer_settime
              - timerfd_create
              - timerfd_gettime
              - timerfd_settime
              - times
              - tkill
              - truncate
              - ugetrlimit
              - umask
              - uname
              - unlink
              - unlinkat
              - utime
              - utimensat
              - utimes
              - vfork
              - vmsplice
              - wait4
              - waitid
              - waitpid
              - write
              - writev
          action: SCMP_ACT_ALLOW
        # --- Jailer-specific syscalls (beyond default profile) ---
        # These are normally blocked but required for Firecracker jailer
        # to set up per-VM chroot, mount namespace, and PID namespace.
        - names:
              - pivot_root
              - mount
              - umount2
              - unshare
              - chroot
              - clone
              - clone3
              - setns
              - mknod
              - mknodat
          action: SCMP_ACT_ALLOW
