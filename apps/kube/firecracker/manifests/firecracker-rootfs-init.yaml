apiVersion: batch/v1
kind: Job
metadata:
    name: firecracker-rootfs-init-v16
    namespace: firecracker
    labels:
        app: firecracker-rootfs-init
        kbve.com/category: virtualization
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        argocd.argoproj.io/hook: PostSync
        argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
    backoffLimit: 3
    ttlSecondsAfterFinished: 3600
    template:
        metadata:
            labels:
                app: firecracker-rootfs-init
        spec:
            restartPolicy: OnFailure
            containers:
                - name: init
                  image: alpine:3.21
                  securityContext:
                      runAsUser: 0
                  command:
                      - /bin/sh
                      - -c
                  args:
                      - "set -eu\nOUTPUT=\"/rootfs\"\nKERNEL_URL=\"https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/v1.15/x86_64/vmlinux-6.1.155\"\
                        \n\necho \"=== Firecracker rootfs init ===\"\n\napk add --no-cache curl\
                        \ e2fsprogs\n\n# --- vmlinux kernel ---\nrm -f \"${OUTPUT}/vmlinux\"\nif [ ! -f \"${OUTPUT}/vmlinux\"\
                        \ ]; then\n    echo \"[1/4] Downloading vmlinux kernel...\"\n    curl -fSL\
                        \ \"${KERNEL_URL}\" -o \"${OUTPUT}/vmlinux\"\n    chmod 644 \"${OUTPUT}/vmlinux\"\
                        \n    echo \"  Kernel: $(wc -c < ${OUTPUT}/vmlinux) bytes\"\nelse\n    echo\
                        \ \"[1/4] vmlinux already exists, skipping\"\nfi\n\n# --- Helper: build\
                        \ an ext4 rootfs ---\nbuild_rootfs() {\n    NAME=\"$1\"\n    SIZE_MB=\"\
                        $2\"\n    shift 2\n    PKGS=\"$*\"\n    TARGET=\"${OUTPUT}/${NAME}.ext4\"\
                        \n\n    if [ -f \"${TARGET}\" ]; then\n        echo \"  ${NAME}.ext4 already\
                        \ exists, skipping\"\n        return\n    fi\n\n    echo \"  Building ${NAME}\
                        \ rootfs (${SIZE_MB}MB, packages: ${PKGS})...\"\n    WORK=$(mktemp -d)\n\
                        \    ROOTFS=\"${WORK}/rootfs\"\n    mkdir -p \"${ROOTFS}\"\n\n    # Configure\
                        \ Alpine repos and keys in the chroot\n    mkdir -p \"${ROOTFS}/etc/apk\"\
                        \n    cp -a /etc/apk/keys \"${ROOTFS}/etc/apk/\"\n    echo \"https://dl-cdn.alpinelinux.org/alpine/v3.21/main\"\
                        \ > \"${ROOTFS}/etc/apk/repositories\"\n    echo \"https://dl-cdn.alpinelinux.org/alpine/v3.21/community\"\
                        \ >> \"${ROOTFS}/etc/apk/repositories\"\n\n    # Install Alpine packages\
                        \ into rootfs\n    apk add --root \"${ROOTFS}\" --initdb --no-cache \\\n\
                        \        alpine-baselayout busybox musl ca-certificates-bundle ${PKGS}\n\
                        \n    # Create required directories\n    mkdir -p \"${ROOTFS}/dev\" \"${ROOTFS}/proc\"\
                        \ \"${ROOTFS}/sys\" \\\n             \"${ROOTFS}/tmp\" \"${ROOTFS}/run\"\
                        \ \"${ROOTFS}/var/log\"\n\n    # Copy init script from ConfigMap\n    cp\
                        \ /vm-init/init \"${ROOTFS}/init\"\n    chmod +x \"${ROOTFS}/init\"\n\n\
                        \    # Create sparse ext4 image and populate from rootfs directory\n   \
                        \ dd if=/dev/zero of=\"${TARGET}\" bs=1M count=0 seek=\"${SIZE_MB}\" 2>/dev/null\n\
                        \    mkfs.ext4 -F -d \"${ROOTFS}\" \"${TARGET}\"\n\n    rm -rf \"${WORK}\"\
                        \n    echo \"  ${NAME}.ext4: $(du -h ${TARGET} | cut -f1)\"\n}\n\n# ---\
                        \ alpine-minimal ---\necho \"[2/4] alpine-minimal...\"\nbuild_rootfs \"\
                        alpine-minimal\" 32\n\n# --- alpine-python ---\necho \"[3/4] alpine-python...\"\
                        \nbuild_rootfs \"alpine-python\" 128 python3\n\n# --- alpine-node ---\n\
                        echo \"[4/5] alpine-node...\"\nbuild_rootfs \"alpine-node\" 128 nodejs\n\
                        \n# --- pip package cache ---\n# Reads package list from ConfigMap (firecracker-pip-packages).\n\
                        # Rebuild triggered when init job name is bumped (v10 → v11).\n# NOTE: firecracker-python-net.ext4\
                        \ is staged by a\n# dedicated Job (firecracker-net-rootfs-stage.yaml)\n\
                        # that runs the published GHCR image directly.\necho \"[5/6] pip-cache...\"\
                        \n# Bumping the init job name forces a pip-cache rebuild\n# so that newly\
                        \ added entries in firecracker-pip-packages\n# land without waiting for\
                        \ the weekly refresh CronJob.\nrm -f \"${OUTPUT}/pip-cache.ext4\"\nif [\
                        \ ! -f \"${OUTPUT}/pip-cache.ext4\" ]; then\n    apk add --no-cache python3\
                        \ py3-pip\n    PIPCACHE=$(mktemp -d)\n    mkdir -p \"${PIPCACHE}/pip\"\n\
                        \    PACKAGES=$(grep -v '^\\s*$' /pip-packages/packages.txt | tr '\\n' '\
                        \ ')\n    echo \"  Downloading: ${PACKAGES}\"\n    pip3 download --dest\
                        \ \"${PIPCACHE}/pip\" \\\n        --only-binary=:all: \\\n        --platform=musllinux_1_2_x86_64\
                        \ \\\n        --platform=musllinux_1_1_x86_64 \\\n        --platform=any\
                        \ \\\n        --python-version=3.12 \\\n        ${PACKAGES} 2>&1 || \\\n\
                        \    pip3 download --dest \"${PIPCACHE}/pip\" ${PACKAGES} 2>&1 || true\n\
                        \    WHEEL_COUNT=$(ls \"${PIPCACHE}/pip/\"*.whl \"${PIPCACHE}/pip/\"*.tar.gz\
                        \ 2>/dev/null | wc -l)\n    if [ \"$WHEEL_COUNT\" -gt 0 ]; then\n      \
                        \  dd if=/dev/zero of=\"${OUTPUT}/pip-cache.ext4\" bs=1M count=0 seek=384\
                        \ 2>/dev/null\n        mkfs.ext4 -F -d \"${PIPCACHE}\" \"${OUTPUT}/pip-cache.ext4\"\
                        \n        echo \"  pip-cache.ext4: $(du -h ${OUTPUT}/pip-cache.ext4 | cut\
                        \ -f1) (${WHEEL_COUNT} packages)\"\n    else\n        echo \"  WARNING:\
                        \ No pip packages downloaded, skipping pip-cache\"\n    fi\n    rm -rf \"\
                        ${PIPCACHE}\"\nelse\n    echo \"  pip-cache.ext4 already exists, skipping\"\
                        \nfi\n\n# --- npm package cache ---\n# Reads package list from ConfigMap\
                        \ (firecracker-npm-packages).\n# Builds a pre-resolved node_modules tree\
                        \ and ships it as the\n# ext4 root. VMs cp this into /usr/lib/node_modules\
                        \ at boot\n# so `require('fastify')` resolves without a registry hop.\n\
                        echo \"[6/6] npm-cache...\"\nrm -f \"${OUTPUT}/npm-cache.ext4\"\nif [ !\
                        \ -f \"${OUTPUT}/npm-cache.ext4\" ]; then\n    apk add --no-cache nodejs\
                        \ npm\n    NPMCACHE=$(mktemp -d)\n    cd \"${NPMCACHE}\"\n    NPM_PACKAGES=$(grep\
                        \ -v '^\\s*$' /npm-packages/packages.txt | tr '\\n' ' ')\n    echo \"  Resolving:\
                        \ ${NPM_PACKAGES}\"\n    npm init -y > /dev/null\n    npm install --no-audit\
                        \ --no-fund --omit=dev --prefer-online ${NPM_PACKAGES} 2>&1 || \\\n    npm\
                        \ install --no-audit --no-fund --omit=dev ${NPM_PACKAGES} 2>&1 || true\n\
                        \    if [ -d \"${NPMCACHE}/node_modules\" ]; then\n        STAGE=$(mktemp\
                        \ -d)\n        mv \"${NPMCACHE}/node_modules\" \"${STAGE}/node_modules\"\
                        \n        PKG_COUNT=$(ls -1 \"${STAGE}/node_modules\" 2>/dev/null | wc -l)\n\
                        \        dd if=/dev/zero of=\"${OUTPUT}/npm-cache.ext4\" bs=1M count=0 seek=384\
                        \ 2>/dev/null\n        mkfs.ext4 -F -d \"${STAGE}\" \"${OUTPUT}/npm-cache.ext4\"\
                        \n        echo \"  npm-cache.ext4: $(du -h ${OUTPUT}/npm-cache.ext4 | cut\
                        \ -f1) (${PKG_COUNT} packages)\"\n        rm -rf \"${STAGE}\"\n    else\n\
                        \        echo \"  WARNING: node_modules not produced, skipping npm-cache\"\
                        \n    fi\n    rm -rf \"${NPMCACHE}\"\n    cd /\nelse\n    echo \"  npm-cache.ext4\
                        \ already exists, skipping\"\nfi\n\necho \"=== Done ===\"\nls -lh \"${OUTPUT}/\"\
                        \n"
                  resources:
                      requests:
                          cpu: 250m
                          memory: 512Mi
                      limits:
                          cpu: '1'
                          memory: 1Gi
                  volumeMounts:
                      - name: rootfs
                        mountPath: /rootfs
                      - name: vm-init
                        mountPath: /vm-init
                        readOnly: true
                      - name: pip-packages
                        mountPath: /pip-packages
                        readOnly: true
                      - name: npm-packages
                        mountPath: /npm-packages
                        readOnly: true
            volumes:
                - name: rootfs
                  persistentVolumeClaim:
                      claimName: firecracker-rootfs
                - name: vm-init
                  configMap:
                      name: firecracker-vm-init
                - name: pip-packages
                  configMap:
                      name: firecracker-pip-packages
                - name: npm-packages
                  configMap:
                      name: firecracker-npm-packages
