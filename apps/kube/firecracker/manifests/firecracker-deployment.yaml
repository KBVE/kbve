apiVersion: apps/v1
kind: Deployment
metadata:
    name: firecracker-ctl
    namespace: firecracker
    labels:
        app: firecracker-ctl
spec:
    replicas: 1
    selector:
        matchLabels:
            app: firecracker-ctl
    template:
        metadata:
            labels:
                app: firecracker-ctl
        spec:
            nodeSelector:
                kvm: 'true'
            automountServiceAccountToken: false
            containers:
                - name: firecracker-ctl
                  image: ghcr.io/kbve/firecracker-ctl:0.1.27
                  ports:
                      - containerPort: 9001
                        name: api
                        protocol: TCP
                  resources:
                      requests:
                          cpu: 250m
                          memory: 512Mi
                          devices.kubevirt.io/kvm: '1'
                      limits:
                          cpu: '2'
                          memory: 2Gi
                          devices.kubevirt.io/kvm: '1'
                  env:
                      - name: FC_USE_JAILER
                        value: 'true'
                      - name: FC_JAILER_UID
                        value: '10001'
                      - name: FC_JAILER_GID
                        value: '10001'
                  securityContext:
                      # The jailer's pivot_root syscall is blocked by the default
                      # seccomp profile. Unconfined is required because:
                      #   - Talos does not support Localhost seccomp profiles
                      #   - No Security Profiles Operator is installed
                      # Mitigations: NetworkPolicy default-deny, KVM hardware
                      # isolation, jailer per-VM cgroup+chroot+PID namespace,
                      # read-only rootfs, no outbound network for VMs.
                      seccompProfile:
                          type: Unconfined
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                          add:
                              - CHOWN
                              - DAC_OVERRIDE
                              - FOWNER
                              - KILL
                              - MKNOD
                              - NET_ADMIN
                              - SETGID
                              - SETUID
                              - SYS_ADMIN
                              - SYS_CHROOT
                  volumeMounts:
                      - name: rootfs-cache
                        mountPath: /var/lib/firecracker/rootfs
                        readOnly: true
                      - name: vm-scratch
                        mountPath: /var/lib/firecracker/scratch
                      - name: tmp
                        mountPath: /tmp
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: api
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: api
                      initialDelaySeconds: 3
                      periodSeconds: 5
            volumes:
                - name: rootfs-cache
                  persistentVolumeClaim:
                      claimName: firecracker-rootfs
                - name: vm-scratch
                  emptyDir:
                      sizeLimit: 8Gi
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
