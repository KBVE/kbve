apiVersion: apps/v1
kind: Deployment
metadata:
    name: firecracker-ctl
    namespace: firecracker
    labels:
        app: firecracker-ctl
        kbve.com/category: virtualization
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    replicas: 1
    selector:
        matchLabels:
            app: firecracker-ctl
    template:
        metadata:
            labels:
                app: firecracker-ctl
        spec:
            nodeSelector:
                kvm: 'true'
            automountServiceAccountToken: false
            initContainers:
                - name: wait-rootfs
                  image: busybox:1.37
                  command:
                      - /bin/sh
                      - -c
                      - "for i in $(seq 1 60); do\n  if [ -f /var/lib/firecracker/rootfs/vmlinux\
                        \ ] && \\\n     [ -f /var/lib/firecracker/rootfs/alpine-minimal.ext4 ];\
                        \ then\n    echo \"rootfs ready after ${i}s\"\n    exit 0\n  fi\n  echo\
                        \ \"waiting for rootfs init job... ${i}/60\"\n  sleep 2\ndone\necho \"rootfs\
                        \ not ready after 120s, proceeding anyway\"\nexit 0\n"
                  volumeMounts:
                      - name: rootfs-cache
                        mountPath: /var/lib/firecracker/rootfs
                        readOnly: true
                  resources:
                      requests:
                          cpu: 10m
                          memory: 16Mi
                      limits:
                          cpu: 100m
                          memory: 32Mi
            containers:
                - name: firecracker-ctl
                  image: ghcr.io/kbve/firecracker-ctl:0.1.42
                  ports:
                      - containerPort: 9001
                        name: api
                        protocol: TCP
                  resources:
                      requests:
                          cpu: 250m
                          memory: 512Mi
                          devices.kubevirt.io/kvm: '1'
                      limits:
                          cpu: '2'
                          memory: 2Gi
                          devices.kubevirt.io/kvm: '1'
                  env:
                      - name: FC_USE_JAILER
                        value: 'true'
                      - name: FC_JAILER_UID
                        value: '10001'
                      - name: FC_JAILER_GID
                        value: '10001'
                      - name: RUST_LOG
                        value: 'info,tower_http=warn'
                  securityContext:
                      seccompProfile:
                          type: Localhost
                          localhostProfile: operator/firecracker-jailer.json
                      readOnlyRootFilesystem: true
                      # Firecracker jailer requires SYS_ADMIN (mount --make-private for
                      # pivot_root on shared-propagation emptyDir), SYS_CHROOT + MKNOD
                      # (create /dev/kvm, /dev/net/tun inside the chroot). These replace
                      # privileged: true — not removable without a rootless-jailer rearchitect.
                      capabilities:
                          drop:
                              - ALL
                          add:
                              - CHOWN
                              - DAC_OVERRIDE
                              - FOWNER
                              - KILL
                              - MKNOD
                              - NET_ADMIN
                              - SETGID
                              - SETUID
                              - SYS_ADMIN
                              - SYS_CHROOT
                  volumeMounts:
                      - name: rootfs-cache
                        mountPath: /var/lib/firecracker/rootfs
                        readOnly: true
                      - name: vm-scratch
                        mountPath: /var/lib/firecracker/scratch
                      - name: tmp
                        mountPath: /tmp
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: api
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: api
                      initialDelaySeconds: 3
                      periodSeconds: 5
            volumes:
                - name: rootfs-cache
                  persistentVolumeClaim:
                      claimName: firecracker-rootfs
                - name: vm-scratch
                  emptyDir:
                      sizeLimit: 8Gi
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
