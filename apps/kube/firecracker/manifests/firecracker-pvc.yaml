apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: firecracker-rootfs
    namespace: firecracker
    labels:
        app: firecracker-ctl
        kbve.com/category: virtualization
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    accessModes:
        - ReadWriteMany
    storageClassName: longhorn
    resources:
        requests:
            storage: 2Gi
