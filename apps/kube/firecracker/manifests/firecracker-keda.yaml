apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    name: firecracker-ctl-scaler
    namespace: firecracker
spec:
    scaleTargetRef:
        name: firecracker-ctl
    pollingInterval: 15
    cooldownPeriod: 300
    minReplicaCount: 1
    maxReplicaCount: 3
    triggers:
        # Cron-based scale-up during peak hours (2 replicas).
        # Outside this window, minReplicaCount keeps 1 replica alive.
        - type: cron
          metadata:
              timezone: UTC
              start: 0 6 * * *
              end: 0 22 * * *
              desiredReplicas: '2'
