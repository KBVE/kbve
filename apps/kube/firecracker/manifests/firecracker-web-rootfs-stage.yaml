apiVersion: batch/v1
kind: Job
metadata:
    name: firecracker-web-rootfs-stage
    namespace: firecracker
    labels:
        app: firecracker-rootfs-init
        kbve.com/category: virtualization
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        argocd.argoproj.io/hook: PostSync
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookFailed
spec:
    backoffLimit: 3
    ttlSecondsAfterFinished: 3600
    template:
        metadata:
            labels:
                app: firecracker-rootfs-init
        spec:
            restartPolicy: OnFailure
            containers:
                - name: stage
                  image: ghcr.io/kbve/firecracker-python-web:0.1.0
                  imagePullPolicy: IfNotPresent
                  args:
                      - /rootfs.ext4
                      - /dest/firecracker-python-web.ext4
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  volumeMounts:
                      - name: rootfs
                        mountPath: /dest
                  securityContext:
                      runAsUser: 0
            volumes:
                - name: rootfs
                  persistentVolumeClaim:
                      claimName: firecracker-rootfs
