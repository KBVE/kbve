apiVersion: batch/v1
kind: CronJob
metadata:
    name: firecracker-pip-cache-refresh
    namespace: firecracker
    labels:
        app: firecracker-pip-cache
        kbve.com/category: virtualization
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    schedule: 0 4 * * 0
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 3
    jobTemplate:
        spec:
            backoffLimit: 2
            ttlSecondsAfterFinished: 86400
            template:
                metadata:
                    labels:
                        app: firecracker-rootfs-init
                spec:
                    restartPolicy: OnFailure
                    containers:
                        - name: pip-refresh
                          image: alpine:3.21
                          securityContext:
                              runAsUser: 0
                          command:
                              - /bin/sh
                              - -c
                          args:
                              - "set -eu\nOUTPUT=\"/rootfs\"\nTARGET=\"${OUTPUT}/pip-cache.ext4\"\n\n\
                                echo \"=== Pip cache refresh ===\"\n\napk add --no-cache python3 py3-pip\
                                \ e2fsprogs\n\nPIPCACHE=$(mktemp -d)\nmkdir -p \"${PIPCACHE}/pip\"\n\
                                \nPACKAGES=$(grep -v '^\\s*$' /pip-packages/packages.txt | tr '\\n'\
                                \ ' ')\necho \"Downloading latest wheels: ${PACKAGES}\"\npip3 download\
                                \ --dest \"${PIPCACHE}/pip\" \\\n    --only-binary=:all: \\\n    --platform=musllinux_1_2_x86_64\
                                \ \\\n    --platform=musllinux_1_1_x86_64 \\\n    --platform=any \\\n\
                                \    --python-version=3.12 \\\n    ${PACKAGES} 2>&1 || \\\npip3 download\
                                \ --dest \"${PIPCACHE}/pip\" ${PACKAGES} 2>&1 || true\n\nWHEEL_COUNT=$(ls\
                                \ \"${PIPCACHE}/pip/\"*.whl \"${PIPCACHE}/pip/\"*.tar.gz 2>/dev/null\
                                \ | wc -l)\n\nif [ \"$WHEEL_COUNT\" -eq 0 ]; then\n    echo \"WARNING:\
                                \ No packages downloaded, keeping existing cache\"\n    rm -rf \"${PIPCACHE}\"\
                                \n    exit 0\nfi\n\necho \"Downloaded ${WHEEL_COUNT} packages\"\n\n\
                                # Build new cache image to a temp file first, then atomic swap\nTMPIMG=$(mktemp\
                                \ -p \"${OUTPUT}\" pip-cache.XXXXXX)\ndd if=/dev/zero of=\"${TMPIMG}\"\
                                \ bs=1M count=0 seek=384 2>/dev/null\nmkfs.ext4 -F -d \"${PIPCACHE}\"\
                                \ \"${TMPIMG}\"\n\n# Atomic replace — prevents partial reads by firecracker-ctl\n\
                                mv \"${TMPIMG}\" \"${TARGET}\"\n\nrm -rf \"${PIPCACHE}\"\necho \"pip-cache.ext4\
                                \ refreshed: $(du -h ${TARGET} | cut -f1) (${WHEEL_COUNT} packages)\"\
                                \necho \"=== Done ===\"\n"
                          resources:
                              requests:
                                  cpu: 250m
                                  memory: 256Mi
                              limits:
                                  cpu: 500m
                                  memory: 512Mi
                          volumeMounts:
                              - name: rootfs
                                mountPath: /rootfs
                              - name: pip-packages
                                mountPath: /pip-packages
                                readOnly: true
                    volumes:
                        - name: rootfs
                          persistentVolumeClaim:
                              claimName: firecracker-rootfs
                        - name: pip-packages
                          configMap:
                              name: firecracker-pip-packages
