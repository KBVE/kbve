apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: firecracker-ctl-ingress
    namespace: firecracker
spec:
    podSelector:
        matchLabels:
            app: firecracker-ctl
    policyTypes:
        - Ingress
        - Egress
    ingress:
        # Edge functions (kilobase/functions) → firecracker-ctl API
        - from:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: kilobase
                podSelector:
                    matchLabels:
                        app: functions
          ports:
              - protocol: TCP
                port: 9001
        # Dashboard proxy (kbve/app:kbve) → firecracker-ctl API
        - from:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: kbve
                podSelector:
                    matchLabels:
                        app: kbve
          ports:
              - protocol: TCP
                port: 9001
    egress:
        # DNS resolution (required for any service discovery)
        - to:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: kube-system
          ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
---
# Default deny all traffic for any other pods in the firecracker namespace.
# MicroVMs spawned by firecracker-ctl inherit the host network stack inside
# the pod — this policy ensures they cannot reach cluster services.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: default-deny-all
    namespace: firecracker
spec:
    podSelector: {}
    policyTypes:
        - Ingress
        - Egress
    # No ingress or egress rules = deny everything by default.
    # The firecracker-ctl-ingress policy above adds explicit exceptions.
---
# Allow rootfs init job to reach the internet for downloading packages/kernel.
# This pod only runs during ArgoCD PostSync hooks and is short-lived.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: firecracker-rootfs-init-egress
    namespace: firecracker
spec:
    podSelector:
        matchLabels:
            app: firecracker-rootfs-init
    policyTypes:
        - Egress
    egress:
        # DNS resolution
        - to:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: kube-system
          ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
        # HTTPS for downloading Alpine packages and vmlinux kernel
        - ports:
              - protocol: TCP
                port: 443
