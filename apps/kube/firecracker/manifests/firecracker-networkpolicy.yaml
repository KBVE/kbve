apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: firecracker-ctl-ingress
    namespace: firecracker
spec:
    podSelector:
        matchLabels:
            app: firecracker-ctl
    policyTypes:
        - Ingress
    ingress:
        # Edge functions (kilobase/functions) → firecracker-ctl
        - from:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: kilobase
                podSelector:
                    matchLabels:
                        app: functions
          ports:
              - protocol: TCP
                port: 9001
        # Dashboard proxy (kbve/kbve-deployment) → firecracker-ctl
        - from:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: kbve
          ports:
              - protocol: TCP
                port: 9001
