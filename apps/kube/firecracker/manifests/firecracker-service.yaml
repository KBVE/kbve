apiVersion: v1
kind: Service
metadata:
    name: firecracker-ctl
    namespace: firecracker
    labels:
        app: firecracker-ctl
        kbve.com/category: virtualization
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    type: ClusterIP
    selector:
        app: firecracker-ctl
    ports:
        - port: 9001
          targetPort: api
          protocol: TCP
          name: api
