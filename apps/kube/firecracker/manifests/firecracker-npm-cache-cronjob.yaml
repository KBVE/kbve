apiVersion: batch/v1
kind: CronJob
metadata:
    name: firecracker-npm-cache-refresh
    namespace: firecracker
    labels:
        app: firecracker-npm-cache
        kbve.com/category: virtualization
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    schedule: 15 4 * * 0
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 3
    jobTemplate:
        spec:
            backoffLimit: 2
            ttlSecondsAfterFinished: 86400
            template:
                metadata:
                    labels:
                        app: firecracker-rootfs-init
                spec:
                    restartPolicy: OnFailure
                    containers:
                        - name: npm-refresh
                          image: alpine:3.21
                          securityContext:
                              runAsUser: 0
                          command:
                              - /bin/sh
                              - -c
                          args:
                              - "set -eu\nOUTPUT=\"/rootfs\"\nTARGET=\"${OUTPUT}/npm-cache.ext4\"\n\n\
                                echo \"=== Npm cache refresh ===\"\n\napk add --no-cache nodejs npm\
                                \ e2fsprogs\n\nNPMCACHE=$(mktemp -d)\ncd \"${NPMCACHE}\"\n\nPACKAGES=$(grep\
                                \ -v '^\\s*$' /npm-packages/packages.txt | tr '\\n' ' ')\necho \"Resolving:\
                                \ ${PACKAGES}\"\n\n# Bootstrap a throwaway project and install everything\
                                \ into it.\n# The resulting node_modules tree is what gets shipped on\
                                \ the\n# ext4 — at runtime the VM cp's it into /usr/lib/node_modules\n\
                                # so `require('fastify')` resolves without a registry hop.\nnpm init\
                                \ -y > /dev/null\nnpm install --no-audit --no-fund --omit=dev --prefer-online\
                                \ ${PACKAGES} 2>&1 || \\\nnpm install --no-audit --no-fund --omit=dev\
                                \ ${PACKAGES} 2>&1 || true\n\nif [ ! -d \"${NPMCACHE}/node_modules\"\
                                \ ]; then\n    echo \"WARNING: node_modules not produced, keeping existing\
                                \ cache\"\n    rm -rf \"${NPMCACHE}\"\n    exit 0\nfi\n\nPKG_COUNT=$(ls\
                                \ -1 \"${NPMCACHE}/node_modules\" 2>/dev/null | wc -l)\necho \"Resolved\
                                \ ${PKG_COUNT} top-level package entries\"\n\n# Stage just the node_modules\
                                \ dir into a clean parent so the\n# ext4 layout is /node_modules at\
                                \ the root and nothing else.\nSTAGE=$(mktemp -d)\nmv \"${NPMCACHE}/node_modules\"\
                                \ \"${STAGE}/node_modules\"\n\n# Atomic-swap build: temp file, then\
                                \ mv.\nTMPIMG=$(mktemp -p \"${OUTPUT}\" npm-cache.XXXXXX)\ndd if=/dev/zero\
                                \ of=\"${TMPIMG}\" bs=1M count=0 seek=384 2>/dev/null\nmkfs.ext4 -F\
                                \ -d \"${STAGE}\" \"${TMPIMG}\"\nmv \"${TMPIMG}\" \"${TARGET}\"\n\n\
                                rm -rf \"${NPMCACHE}\" \"${STAGE}\"\necho \"npm-cache.ext4 refreshed:\
                                \ $(du -h ${TARGET} | cut -f1) (${PKG_COUNT} packages)\"\necho \"===\
                                \ Done ===\"\n"
                          resources:
                              requests:
                                  cpu: 250m
                                  memory: 512Mi
                              limits:
                                  cpu: 500m
                                  memory: 1Gi
                          volumeMounts:
                              - name: rootfs
                                mountPath: /rootfs
                              - name: npm-packages
                                mountPath: /npm-packages
                                readOnly: true
                    volumes:
                        - name: rootfs
                          persistentVolumeClaim:
                              claimName: firecracker-rootfs
                        - name: npm-packages
                          configMap:
                              name: firecracker-npm-packages
