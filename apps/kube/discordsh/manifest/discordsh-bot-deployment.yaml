apiVersion: v1
kind: Service
metadata:
    name: discordsh-bot-headless
    namespace: discordsh
    labels:
        app: discordsh-bot
spec:
    clusterIP: None
    selector:
        app: discordsh-bot
    ports:
        - name: health
          port: 4322
          targetPort: 4322
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: discordsh-bot
    namespace: discordsh
    labels:
        app: discordsh-bot
spec:
    serviceName: discordsh-bot-headless
    replicas: 1
    selector:
        matchLabels:
            app: discordsh-bot
    template:
        metadata:
            labels:
                app: discordsh-bot
        spec:
            serviceAccountName: discordsh-sa
            containers:
                - name: discordsh-bot
                  image: ghcr.io/kbve/discordsh-bot:0.1.4
                  imagePullPolicy: Always
                  envFrom:
                      - configMapRef:
                            name: discordsh-config
                      - secretRef:
                            name: discordsh-redis-secret
                  env:
                      - name: RUST_LOG
                        value: 'discordsh_bot=debug,kbve=debug'
                      - name: FONT_PATH
                        value: '/app/alagard.ttf'
                      - name: SYMBOL_FONT_PATH
                        value: '/app/NotoSansSymbols-Regular.ttf'
                      - name: SHARD_COUNT
                        value: '1'
                      # DISCORD_TOKEN is resolved at runtime from Supabase Vault.
                      # Set DISCORD_TOKEN env var to override (dev/testing).
                      - name: REDIS_HOST
                        value: 'redis-master.redis.svc.cluster.local'
                      - name: REDIS_PORT
                        value: '6379'
                      - name: SUPABASE_URL
                        value: 'http://kong.kilobase.svc.cluster.local:8000'
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: discordsh-supabase-shared
                                key: service-role-key
                  resources:
                      requests:
                          memory: '256Mi'
                          cpu: '100m'
                      limits:
                          memory: '512Mi'
                          cpu: '500m'
                  ports:
                      - name: health
                        containerPort: 4322
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 4322
                      initialDelaySeconds: 30
                      periodSeconds: 30
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: 4322
                      initialDelaySeconds: 10
                      periodSeconds: 10
