apiVersion: v1
kind: Service
metadata:
    name: discordsh-bot-headless
    namespace: discordsh
    labels:
        app: discordsh-bot
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    clusterIP: None
    selector:
        app: discordsh-bot
    ports:
        - name: health
          port: 4322
          targetPort: 4322
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: discordsh-bot
    namespace: discordsh
    labels:
        app: discordsh-bot
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        reloader.stakater.com/auto: 'true'
spec:
    serviceName: discordsh-bot-headless
    replicas: 1
    selector:
        matchLabels:
            app: discordsh-bot
    template:
        metadata:
            labels:
                app: discordsh-bot
        spec:
            serviceAccountName: discordsh-sa
            automountServiceAccountToken: false
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: discordsh-bot
                  image: ghcr.io/kbve/discordsh-bot:0.1.25
                  imagePullPolicy: Always
                  envFrom:
                      - configMapRef:
                            name: discordsh-config
                      - secretRef:
                            name: discordsh-windmill-token
                            optional: true
                  env:
                      - name: RUST_LOG
                        value: discordsh_bot=warn,kbve=warn
                      - name: FONT_PATH
                        value: /app/alagard.ttf
                      - name: SYMBOL_FONT_PATH
                        value: /app/NotoSansSymbols-Regular.ttf
                      - name: SHARD_COUNT
                        value: '1'
                      - name: REDIS_HOST
                        value: valkey.valkey.svc.cluster.local
                      - name: REDIS_PORT
                        value: '6379'
                      - name: REDIS_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: valkey-auth
                                key: valkey-password
                      - name: KBVE_KV_URL
                        valueFrom:
                            secretKeyRef:
                                name: discordsh-bot-valkey
                                key: KBVE_KV_URL
                                optional: true
                      - name: SUPABASE_URL
                        value: http://kong.kilobase.svc.cluster.local:8000
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: discordsh-supabase-shared
                                key: service-role-key
                      - name: DB_PATH
                        value: /data/discordsh.redb
                      - name: IRC_HOST
                        value: ergo-irc-service.irc.svc.cluster.local
                      - name: IRC_PORT
                        value: '6667'
                      - name: IRC_NICK
                        value: discordsh-bot
                      - name: IRC_CHANNELS
                        value: '#general'
                      - name: RELAY_GUILD_ID
                        value: '342732838598082562'
                      - name: RELAY_CHANNEL_ID
                        value: '935690630657638422'
                      - name: RELAY_IRC_CHANNEL
                        value: '#general'
                      - name: GH_SYNC_LOCK_ON_CLOSE
                        value: 'true'
                      - name: GH_SYNC_BACKFILL_ON_START
                        value: 'true'
                  resources:
                      requests:
                          memory: 256Mi
                          cpu: 100m
                      limits:
                          memory: 512Mi
                          cpu: 500m
                  ports:
                      - name: health
                        containerPort: 4322
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
                      - name: data
                        mountPath: /data
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 4322
                      initialDelaySeconds: 30
                      periodSeconds: 30
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: 4322
                      initialDelaySeconds: 10
                      periodSeconds: 10
            volumes:
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
    volumeClaimTemplates:
        - metadata:
              name: data
          spec:
              accessModes:
                  - ReadWriteOnce
              storageClassName: longhorn
              resources:
                  requests:
                      storage: 1Gi
