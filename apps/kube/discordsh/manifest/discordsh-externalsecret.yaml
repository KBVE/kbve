apiVersion: v1
kind: ServiceAccount
metadata:
    name: discordsh-external-secrets
    namespace: discordsh
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: discordsh-supabase-secret-store
    namespace: discordsh
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: discordsh-external-secrets
                    namespace: discordsh
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: discordsh-supabase-secrets
    namespace: discordsh
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: discordsh-supabase-secret-store
        kind: SecretStore
    target:
        name: discordsh-supabase-shared
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                service-role-key: '{{ .servicekey }}'
    data:
        - secretKey: servicekey
          remoteRef:
              key: supabase-jwt
              property: service-key
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: discordsh-postgres-store
    namespace: discordsh
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: discordsh-external-secrets
                    namespace: discordsh
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: discordsh-postgres-password
    namespace: discordsh
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: discordsh-postgres-store
        kind: SecretStore
    target:
        name: supabase-postgres-password
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                rw_url: 'postgresql://postgres:{{ .password }}@kilobase-rw.kilobase.svc.cluster.local:5432/postgres?sslmode=disable'
                ro_url: 'postgresql://postgres:{{ .password }}@kilobase-ro.kilobase.svc.cluster.local:5432/postgres?sslmode=disable'
    data:
        - secretKey: password
          remoteRef:
              key: supabase-cluster-app
              property: password
---
# Valkey password from the valkey namespace, composed into a full KBVE_KV_URL
# for jedi KvCache (gh reverse-sync L2). Needs discordsh-external-secrets granted
# read on valkey-auth (apps/kube/valkey/manifests/discordsh-valkey-rbac.yaml).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: discordsh-valkey-secret-store
    namespace: discordsh
spec:
    provider:
        kubernetes:
            remoteNamespace: valkey
            auth:
                serviceAccount:
                    name: discordsh-external-secrets
                    namespace: discordsh
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: discordsh-bot-valkey
    namespace: discordsh
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: discordsh-valkey-secret-store
        kind: SecretStore
    target:
        name: discordsh-bot-valkey
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                KBVE_KV_URL: 'redis://:{{ .valkeypassword | urlquery }}@valkey.valkey.svc.cluster.local:6379'
    data:
        - secretKey: valkeypassword
          remoteRef:
              key: valkey-auth
              property: valkey-password
---
# Windmill superadmin token from the windmill namespace, used by the
# /wm command's WindmillConfig::from_env() to authenticate run_wait_result
# calls. Needs discordsh-external-secrets granted read on
# windmill-superadmin-token (apps/kube/windmill/manifest/discordsh-windmill-token-rbac.yaml).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: discordsh-windmill-token-store
    namespace: discordsh
spec:
    provider:
        kubernetes:
            remoteNamespace: windmill
            auth:
                serviceAccount:
                    name: discordsh-external-secrets
                    namespace: discordsh
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: discordsh-windmill-token
    namespace: discordsh
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: discordsh-windmill-token-store
        kind: SecretStore
    target:
        name: discordsh-windmill-token
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                WINDMILL_TOKEN: '{{ .token }}'
    data:
        - secretKey: token
          remoteRef:
              key: windmill-superadmin-token
              property: token
