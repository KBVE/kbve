apiVersion: v1
kind: ConfigMap
metadata:
    name: discordsh-config
    namespace: discordsh
    labels:
        app: discordsh
data:
    PUBLIC_SUPABASE_URL: 'https://api.kbve.com'
    PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'
    PUBLIC_API_URL: 'https://api.kbve.com'
    PUBLIC_WS_URL: 'wss://ws.kbve.com'
    PUBLIC_DISCORD_CLIENT_ID: 'placeholder-discord-client-id'
    PUBLIC_ENV: 'production'
    RUST_LOG: 'debug'
    N8N_BASE_URL: 'http://n8n.n8n.svc.cluster.local:5678/webhook/'
    N8N_ALLOWED_PATHS: 'kbve/*,deploy-*'
    N8N_RATE_LIMIT: '1'
    N8N_RATE_WINDOW: '5'
