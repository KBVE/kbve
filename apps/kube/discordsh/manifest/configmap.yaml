apiVersion: v1
kind: ConfigMap
metadata:
    name: discordsh-config
    namespace: discordsh
    labels:
        app: discordsh
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
data:
    PUBLIC_SUPABASE_URL: https://api.kbve.com
    PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    PUBLIC_API_URL: https://api.kbve.com
    PUBLIC_WS_URL: wss://ws.kbve.com
    PUBLIC_DISCORD_CLIENT_ID: placeholder-discord-client-id
    PUBLIC_ENV: production
    RUST_LOG: warn
    WINDMILL_BASE_URL: http://windmill-app.windmill.svc.cluster.local:8000
    WINDMILL_WORKSPACE: kbve
    WINDMILL_ALLOWED_PATHS: 'f/discordsh/*'
    WM_RATE_LIMIT: '1'
    WM_RATE_WINDOW: '5'
