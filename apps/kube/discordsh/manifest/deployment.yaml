apiVersion: v1
kind: Service
metadata:
    name: discordsh-headless
    namespace: discordsh
    labels:
        app: discordsh
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    clusterIP: None
    selector:
        app: discordsh
    ports:
        - name: http
          port: 4321
          targetPort: 4321
          protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: discordsh
    namespace: discordsh
    labels:
        app: discordsh
        tier: frontend
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
    annotations:
        reloader.stakater.com/auto: 'true'
spec:
    serviceName: discordsh-headless
    replicas: 1
    selector:
        matchLabels:
            app: discordsh
    template:
        metadata:
            labels:
                app: discordsh
                tier: frontend
            annotations:
                kbve.com/config-revision: 2026-07-16-log-warn
        spec:
            serviceAccountName: discordsh-sa
            automountServiceAccountToken: false
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: discordsh
                  image: ghcr.io/kbve/discordsh:0.1.45
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 4321
                        protocol: TCP
                  envFrom:
                      - configMapRef:
                            name: discordsh-config
                  env:
                      - name: REDIS_HOST
                        value: valkey.valkey.svc.cluster.local
                      - name: REDIS_PORT
                        value: '6379'
                      - name: REDIS_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: valkey-auth
                                key: valkey-password
                      - name: SUPABASE_URL
                        value: http://kong.kilobase.svc.cluster.local:8000
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: discordsh-supabase-shared
                                key: service-role-key
                      - name: SHARD_COUNT
                        value: '1'
                      - name: IRC_HOST
                        value: ergo-irc-service.irc.svc.cluster.local
                      - name: IRC_PORT
                        value: '6667'
                      - name: IRC_NICK
                        value: mud-discordsh
                      - name: IRC_CHANNELS
                        value: '#global,#world-events,#dungeon'
                      - name: KBVE_PG_RW_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-postgres-password
                                key: rw_url
                      - name: KBVE_PG_RO_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-postgres-password
                                key: ro_url
                      - name: KBVE_PG_APPLICATION_NAME
                        value: axum-discordsh
                  resources:
                      requests:
                          memory: 256Mi
                          cpu: 100m
                      limits:
                          memory: 512Mi
                          cpu: 500m
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
            volumes:
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
