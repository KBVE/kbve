apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: ergo-data-pvc
    namespace: irc
    labels:
        kbve.com/category: application
        kbve.com/stack: core
        kbve.com/managed-by: argocd
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 1Gi
