apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: irc-gateway-route
    namespace: irc
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - chat.kbve.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: irc-gateway-service
                port: 4321
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: irc-redirect-route
    namespace: irc
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - irc.kbve.com
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: irc-redirect-service
                port: 80
