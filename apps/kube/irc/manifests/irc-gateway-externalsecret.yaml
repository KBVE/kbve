apiVersion: v1
kind: ServiceAccount
metadata:
    name: irc-gateway-external-secrets
    namespace: irc
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: kilobase-remote-secret-store
    namespace: irc
spec:
    provider:
        kubernetes:
            remoteNamespace: kilobase
            auth:
                serviceAccount:
                    name: irc-gateway-external-secrets
                    namespace: irc
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: irc-gateway-supabase-secrets
    namespace: irc
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: kilobase-remote-secret-store
        kind: SecretStore
    target:
        name: supabase-shared
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                jwt-secret: '{{ .jwtsecret }}'
                anon-key: '{{ .anonkey }}'
                service-role-key: '{{ .servicekey }}'
    data:
        - secretKey: jwtsecret
          remoteRef:
              key: supabase-jwt
              property: secret
        - secretKey: anonkey
          remoteRef:
              key: supabase-jwt
              property: anon-key
        - secretKey: servicekey
          remoteRef:
              key: supabase-jwt
              property: service-key
---
# Valkey password from the valkey namespace, composed into a full KBVE_KV_URL
# for jedi KvCache (shared anti-spam counters). Needs irc-gateway-external-secrets
# granted read on valkey-auth (apps/kube/valkey/manifests/irc-gateway-valkey-rbac.yaml).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
    name: valkey-remote-secret-store
    namespace: irc
spec:
    provider:
        kubernetes:
            remoteNamespace: valkey
            auth:
                serviceAccount:
                    name: irc-gateway-external-secrets
                    namespace: irc
            server:
                url: https://kubernetes.default.svc
                caProvider:
                    type: ConfigMap
                    name: kube-root-ca.crt
                    key: ca.crt
                    namespace: kube-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
    name: irc-gateway-valkey-secrets
    namespace: irc
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: valkey-remote-secret-store
        kind: SecretStore
    target:
        name: irc-gateway-valkey
        creationPolicy: Owner
        template:
            engineVersion: v2
            data:
                KBVE_KV_URL: 'redis://:{{ .valkeypassword | urlquery }}@valkey.valkey.svc.cluster.local:6379'
    data:
        - secretKey: valkeypassword
          remoteRef:
              key: valkey-auth
              property: valkey-password
