apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: memes-route
    namespace: memes
spec:
    parentRefs:
        - name: kbve-gateway
          namespace: kbve
    hostnames:
        - meme.sh
        - www.meme.sh
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: memes-service
                port: 4321
