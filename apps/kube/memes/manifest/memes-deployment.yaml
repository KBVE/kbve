apiVersion: apps/v1
kind: Deployment
metadata:
    name: memes-deployment
    namespace: memes
    labels:
        app: memes
    annotations:
        # Reloader rolls this Deployment whenever supabase-shared
        # rotates (rendered hourly by memes-supabase-secrets
        # ExternalSecret) — Supabase JWT/key rotations propagate
        # without a manual kubectl rollout restart.
        reloader.stakater.com/auto: 'true'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: memes
    template:
        metadata:
            annotations:
                # Manual rollout-restart trigger preserved as a fallback
                # if Reloader misses a Secret rotation — bump the value
                # to force the Deployment controller to roll the pods.
                rollout-restart: '2026-04-03T22:25:16Z'
            labels:
                app: memes
                version: '0.1.8'
        spec:
            serviceAccountName: memes-sa
            automountServiceAccountToken: false
            terminationGracePeriodSeconds: 30
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: memes
                  image: ghcr.io/kbve/memes:0.1.8
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 4321
                        protocol: TCP
                  env:
                      - name: PORT
                        value: '4321'
                      - name: SUPABASE_URL
                        value: 'http://kong.kilobase.svc.cluster.local:8000'
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-shared
                                key: service-role-key
                  resources:
                      requests:
                          memory: '512Mi'
                          cpu: '250m'
                      limits:
                          memory: '1024Mi'
                          cpu: '2000m'
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
            volumes:
                # Writable scratch for the axum binary while the
                # rootfs itself stays read-only.
                - name: tmp
                  emptyDir:
                      sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
    name: memes-service
    namespace: memes
    labels:
        app: memes
spec:
    type: ClusterIP
    selector:
        app: memes
    ports:
        - port: 4321
          targetPort: 4321
          protocol: TCP
