apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
    name: kibana
    namespace: elastic-stack
    labels:
        kbve.sh/app: elk
        kbve.sh/component: kibana
    annotations:
        kbve.sh/last-updated: '2026-03-20'
        kbve.sh/rollout-restart: '2026-03-20T00:00:00Z'
spec:
    version: 8.19.13
    count: 1
    elasticsearchRef:
        name: elasticsearch
    podTemplate:
        spec:
            containers:
                - name: kibana
                  resources:
                      limits:
                          cpu: '1'
                          memory: 1Gi
                      requests:
                          cpu: 250m
                          memory: 512Mi
