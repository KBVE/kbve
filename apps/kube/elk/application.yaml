apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: eck-operator
    namespace: argocd
    labels:
        kbve.sh/app: elk
        kbve.sh/component: operator
    annotations:
        argocd.argoproj.io/sync-wave: '2'
        kbve.sh/last-updated: '2026-03-20'
        kbve.com/source-path: kube/elk
        kbve.com/manifest-path: kube/elk
        kbve.com/application-file: kube/elk/application.yaml
        kbve.com/managed-by: argocd
        kbve.com/schema-version: v1
        kbve.com/category: observability
        kbve.com/stack: core
spec:
    project: default
    sources:
        - repoURL: https://helm.elastic.co
          targetRevision: 3.3.1
          chart: eck-operator
          helm:
              releaseName: eck-operator
              valueFiles:
                  - $values/apps/kube/elk/manifests/values.yaml
        - repoURL: https://github.com/kbve/kbve
          targetRevision: main
          ref: values
    destination:
        server: https://kubernetes.default.svc
        namespace: elastic-system
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
