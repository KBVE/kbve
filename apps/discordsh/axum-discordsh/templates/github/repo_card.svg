<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="4" height="200" fill="#238636" rx="2"/>

  <!-- Repo icon (book shape) -->
  <g transform="translate(28, 28)">
    <rect x="0" y="0" width="24" height="30" rx="3" fill="none" stroke="#8b949e" stroke-width="2"/>
    <line x1="7" y1="0" x2="7" y2="30" stroke="#8b949e" stroke-width="2"/>
  </g>

  <!-- Repo name -->
  <text x="68" y="52" font-family="sans-serif" font-size="22" font-weight="bold" fill="#58a6ff">{{ full_name }}</text>

  <!-- Description -->
  <text x="68" y="80" font-family="sans-serif" font-size="14" fill="#8b949e">{{ description }}</text>

  <!-- Stats row -->
  <g transform="translate(68, 110)">
    <!-- Open issues -->
    <g>
      <circle cx="8" cy="8" r="6" fill="none" stroke="#3fb950" stroke-width="1.5"/>
      <circle cx="8" cy="8" r="2" fill="#3fb950"/>
      <text x="20" y="12" font-family="sans-serif" font-size="13" fill="#c9d1d9">{{ open_issues }} open issues</text>
    </g>

    <!-- Default branch -->
    <g transform="translate(200, 0)">
      <line x1="4" y1="0" x2="4" y2="16" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
      <circle cx="4" cy="4" r="3" fill="none" stroke="#8b949e" stroke-width="1.5"/>
      <text x="16" y="12" font-family="sans-serif" font-size="13" fill="#c9d1d9">{{ default_branch }}</text>
    </g>
  </g>

  <!-- URL -->
  <text x="68" y="160" font-family="sans-serif" font-size="12" fill="#484f58">{{ url }}</text>

  <!-- Footer accent -->
  <rect x="0" y="192" width="800" height="8" fill="#238636" opacity="0.3" rx="0"/>

  <!-- discord.sh branding -->
  <text x="760" y="186" font-family="sans-serif" font-size="10" fill="#30363d" text-anchor="end">discord.sh</text>
</svg>
