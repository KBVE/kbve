<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="header-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="{{ header_color }}"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="52" fill="url(#header-bg)" rx="12"/>
  <rect x="0" y="40" width="800" height="12" fill="url(#header-bg)"/>

  <!-- Header: warning icon (triangle) -->
  <g transform="translate(20, 14)">
    <polygon points="12,2 22,22 2,22" fill="none" stroke="#f0883e" stroke-width="2" stroke-linejoin="round"/>
    <line x1="12" y1="10" x2="12" y2="16" stroke="#f0883e" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="19" r="1" fill="#f0883e"/>
  </g>

  <!-- Header text -->
  <text x="52" y="36" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c9d1d9">{{ repo_name }} — Notice Board</text>

  <!-- Priority summary badges -->
  {% if critical_count > 0 %}
  <rect x="540" y="14" width="60" height="22" rx="11" fill="#da3633" opacity="0.9"/>
  <text x="570" y="29" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">{{ critical_count }} crit</text>
  {% endif %}
  {% if high_count > 0 %}
  <rect x="610" y="14" width="56" height="22" rx="11" fill="#d29922" opacity="0.9"/>
  <text x="638" y="29" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">{{ high_count }} high</text>
  {% endif %}
  <text x="780" y="36" font-family="sans-serif" font-size="14" fill="#8b949e" text-anchor="end">{{ notice_count }}</text>

  <!-- Divider -->
  <line x1="16" y1="52" x2="784" y2="52" stroke="#21262d" stroke-width="1"/>

  <!-- Notice rows -->
  {% for notice in notices %}
  <g transform="translate(0, {{ 60 + loop.index0 * 34 }})">
    <!-- Priority bar -->
    <rect x="0" y="2" width="4" height="28" fill="{{ notice.priority_color }}" rx="1"/>

    <!-- Priority label -->
    <rect x="12" y="5" width="52" height="18" rx="9" fill="{{ notice.priority_color }}" opacity="0.2"/>
    <text x="38" y="18" font-family="sans-serif" font-size="9" font-weight="bold" fill="{{ notice.priority_color }}" text-anchor="middle">{{ notice.priority_label }}</text>

    <!-- Issue number -->
    <text x="74" y="22" font-family="monospace" font-size="13" fill="#484f58">#{{ notice.number }}</text>

    <!-- Title -->
    <text x="126" y="22" font-family="sans-serif" font-size="13" fill="#c9d1d9">{{ notice.title }}</text>

    <!-- Stale badge -->
    {% if notice.stale_days > 0 %}
    <rect x="620" y="5" width="56" height="18" rx="9" fill="#30363d"/>
    <text x="648" y="18" font-family="sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">{{ notice.stale_days }}d stale</text>
    {% endif %}

    <!-- Reporter -->
    <text x="780" y="22" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="end">{{ notice.reporter }}</text>
  </g>
  {% endfor %}

  <!-- Footer -->
  <rect x="0" y="380" width="800" height="20" fill="#0d1117" rx="0"/>
  <rect x="0" y="380" width="800" height="1" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="394" font-family="sans-serif" font-size="10" fill="#30363d" text-anchor="middle">discord.sh</text>
</svg>
