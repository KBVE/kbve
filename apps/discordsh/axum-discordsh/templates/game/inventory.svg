<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="inv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#inv-bg)" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="400" height="36" fill="#2a2a4a" rx="12"/>
  <rect x="0" y="18" width="400" height="18" fill="#2a2a4a"/>
  <text x="200" y="17" text-anchor="middle" font-family="Alagard, sans-serif" font-size="13" fill="#e0e0e0" font-weight="bold">{{ player_name }}'s Inventory</text>
  <text x="200" y="31" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#95a5a6">{{ slots_used }}/{{ slots_max }} slots</text>

  <!-- Equipment Section -->
  <!-- Weapon slot -->
  <rect x="16" y="44" width="176" height="88" rx="8" fill="#1e1e38" stroke="{{ weapon_slot.rarity_color }}" stroke-width="2"/>
  <text x="24" y="60" font-family="sans-serif" font-size="10" fill="#95a5a6" font-weight="bold">WEAPON</text>
  {% if weapon_slot.equipped %}
  <!-- Sword icon -->
  <line x1="28" y1="78" x2="42" y2="92" stroke="{{ weapon_slot.rarity_color }}" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="90" x2="42" y2="84" stroke="{{ weapon_slot.rarity_color }}" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="93" x2="34" y2="87" stroke="{{ weapon_slot.rarity_color }}" stroke-width="1.5" stroke-linecap="round"/>
  <text x="52" y="82" font-family="Alagard, sans-serif" font-size="12" fill="#e0e0e0">{{ weapon_slot.gear_name }}</text>
  <text x="52" y="96" font-family="sans-serif" font-size="10" fill="{{ weapon_slot.rarity_color }}">{{ weapon_slot.stat_line }}</text>
  {% if !weapon_slot.special_line.is_empty() %}
  <text x="52" y="110" font-family="sans-serif" font-size="9" fill="#f1c40f">{{ weapon_slot.special_line }}</text>
  {% endif %}
  {% else %}
  <text x="104" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3a3a5a">Empty</text>
  {% endif %}

  <!-- Armor slot -->
  <rect x="208" y="44" width="176" height="88" rx="8" fill="#1e1e38" stroke="{{ armor_slot.rarity_color }}" stroke-width="2"/>
  <text x="216" y="60" font-family="sans-serif" font-size="10" fill="#95a5a6" font-weight="bold">ARMOR</text>
  {% if armor_slot.equipped %}
  <!-- Shield icon -->
  <path d="M 228,76 L 228,92 Q 228,100 236,104 Q 244,100 244,92 L 244,76 Z" fill="none" stroke="{{ armor_slot.rarity_color }}" stroke-width="2" stroke-linejoin="round"/>
  <text x="252" y="82" font-family="Alagard, sans-serif" font-size="12" fill="#e0e0e0">{{ armor_slot.gear_name }}</text>
  <text x="252" y="96" font-family="sans-serif" font-size="10" fill="{{ armor_slot.rarity_color }}">{{ armor_slot.stat_line }}</text>
  {% if !armor_slot.special_line.is_empty() %}
  <text x="252" y="110" font-family="sans-serif" font-size="9" fill="#f1c40f">{{ armor_slot.special_line }}</text>
  {% endif %}
  {% else %}
  <text x="296" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3a3a5a">Empty</text>
  {% endif %}

  <!-- Divider -->
  <line x1="20" y1="142" x2="380" y2="142" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Inventory grid: 4x4, 80x66 cells, 8px gap -->
  {% for item in items %}
  {% if item.occupied %}
  <rect x="{{ item.x }}" y="{{ item.y }}" width="80" height="66" rx="6" fill="#1e1e38" stroke="{{ item.rarity_color }}" stroke-width="1.5"/>
  <text x="{{ item.x + 40 }}" y="{{ item.y + 30 }}" text-anchor="middle" font-family="Alagard, sans-serif" font-size="11" fill="#e0e0e0">{{ item.item_name }}</text>
  {% if item.is_gear %}
  <!-- Gear marker: small diamond -->
  <polygon points="{{ item.x + 6 }},{{ item.y + 8 }} {{ item.x + 10 }},{{ item.y + 4 }} {{ item.x + 14 }},{{ item.y + 8 }} {{ item.x + 10 }},{{ item.y + 12 }}" fill="{{ item.rarity_color }}"/>
  {% endif %}
  {% if item.qty > 1 %}
  <rect x="{{ item.x + 56 }}" y="{{ item.y + 46 }}" width="22" height="16" rx="4" fill="#2a2a4a"/>
  <text x="{{ item.x + 67 }}" y="{{ item.y + 58 }}" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e0e0e0">x{{ item.qty }}</text>
  {% endif %}
  {% else %}
  <rect x="{{ item.x }}" y="{{ item.y }}" width="80" height="66" rx="6" fill="none" stroke="#3a3a5a" stroke-width="1" stroke-dasharray="4,3"/>
  {% endif %}
  {% endfor %}

  <!-- Footer -->
  <rect x="0" y="464" width="400" height="36" fill="#2a2a4a" rx="12"/>
  <rect x="0" y="464" width="400" height="18" fill="#2a2a4a"/>
  <!-- Gold coin icon -->
  <circle cx="172" cy="482" r="8" fill="none" stroke="#f1c40f" stroke-width="1.5"/>
  <text x="172" y="486" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f1c40f" font-weight="bold">G</text>
  <text x="200" y="486" font-family="Alagard, sans-serif" font-size="14" fill="#f1c40f">{{ gold }}</text>
</svg>
