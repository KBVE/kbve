<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="header-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="48" fill="url(#header-bg)" rx="12"/>
  <rect x="0" y="36" width="800" height="12" fill="url(#header-bg)"/>

  <!-- Header: commit icon (dot with lines) -->
  <g transform="translate(20, 14)">
    <circle cx="12" cy="10" r="5" fill="none" stroke="#2ea043" stroke-width="2"/>
    <line x1="0" y1="10" x2="7" y2="10" stroke="#2ea043" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="10" x2="24" y2="10" stroke="#2ea043" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Header text -->
  <text x="52" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c9d1d9">{{ repo_name }}</text>
  <text x="780" y="32" font-family="sans-serif" font-size="14" fill="#8b949e" text-anchor="end">{{ commit_count }} commits</text>

  <!-- Divider -->
  <line x1="16" y1="48" x2="784" y2="48" stroke="#21262d" stroke-width="1"/>

  <!-- Commit rows -->
  {% for commit in commits %}
  <g transform="translate(0, {{ 56 + loop.index0 * 32 }})">
    <!-- Timeline dot -->
    <circle cx="24" cy="16" r="4" fill="#2ea043"/>
    {% if !loop.last %}
    <line x1="24" y1="20" x2="24" y2="32" stroke="#21262d" stroke-width="2"/>
    {% endif %}

    <!-- SHA -->
    <text x="40" y="20" font-family="monospace" font-size="12" fill="#58a6ff">{{ commit.short_sha }}</text>

    <!-- Message -->
    <text x="110" y="20" font-family="sans-serif" font-size="13" fill="#c9d1d9">{{ commit.message }}</text>

    <!-- Author -->
    <text x="780" y="20" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="end">{{ commit.author }}</text>
  </g>
  {% endfor %}

  <!-- Footer -->
  <rect x="0" y="380" width="800" height="20" fill="#0d1117" rx="0"/>
  <rect x="0" y="380" width="800" height="1" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="394" font-family="sans-serif" font-size="10" fill="#30363d" text-anchor="middle">discord.sh</text>
</svg>
