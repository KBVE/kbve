<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="header-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="48" fill="url(#header-bg)" rx="12"/>
  <rect x="0" y="36" width="800" height="12" fill="url(#header-bg)"/>

  <!-- Header: PR icon (merge arrow) -->
  <g transform="translate(20, 12)">
    <circle cx="8" cy="8" r="5" fill="none" stroke="#8957e5" stroke-width="2"/>
    <line x1="8" y1="13" x2="8" y2="20" stroke="#8957e5" stroke-width="2" stroke-linecap="round"/>
    <circle cx="16" cy="8" r="5" fill="none" stroke="#8957e5" stroke-width="2"/>
    <line x1="16" y1="13" x2="16" y2="20" stroke="#8957e5" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Header text -->
  <text x="48" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c9d1d9">{{ repo_name }}</text>
  <text x="780" y="32" font-family="sans-serif" font-size="14" fill="#8b949e" text-anchor="end">{{ pull_count }} open</text>

  <!-- Divider -->
  <line x1="16" y1="48" x2="784" y2="48" stroke="#21262d" stroke-width="1"/>

  <!-- PR rows -->
  {% for pr in pulls %}
  <g transform="translate(0, {{ 56 + loop.index0 * 32 }})">
    <!-- Status stripe -->
    <rect x="0" y="2" width="4" height="28" fill="{{ pr.status_color }}" rx="1"/>

    <!-- PR number -->
    <text x="16" y="22" font-family="monospace" font-size="13" fill="#484f58">#{{ pr.number }}</text>

    <!-- Draft badge -->
    {% if pr.is_draft %}
    <rect x="64" y="6" width="46" height="16" rx="8" fill="#30363d"/>
    <text x="87" y="18" font-family="sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">DRAFT</text>
    {% endif %}

    <!-- Title -->
    <text x="{{ pr.title_x }}" y="22" font-family="sans-serif" font-size="13" fill="#c9d1d9">{{ pr.title }}</text>

    <!-- Branch -->
    <text x="580" y="22" font-family="monospace" font-size="10" fill="#58a6ff">{{ pr.branch }}</text>

    <!-- Author -->
    <text x="780" y="22" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="end">{{ pr.author }}</text>
  </g>
  {% endfor %}

  <!-- Footer -->
  <rect x="0" y="380" width="800" height="20" fill="#0d1117" rx="0"/>
  <rect x="0" y="380" width="800" height="1" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="394" font-family="sans-serif" font-size="10" fill="#30363d" text-anchor="middle">discord.sh</text>
</svg>
