<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="header-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="48" fill="url(#header-bg)" rx="12"/>
  <rect x="0" y="36" width="800" height="12" fill="url(#header-bg)"/>

  <!-- Header: issue icon -->
  <g transform="translate(20, 12)">
    <circle cx="12" cy="12" r="9" fill="none" stroke="#3fb950" stroke-width="2"/>
    <circle cx="12" cy="12" r="3" fill="#3fb950"/>
  </g>

  <!-- Header text -->
  <text x="48" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c9d1d9">{{ repo_name }}</text>
  <text x="780" y="32" font-family="sans-serif" font-size="14" fill="#8b949e" text-anchor="end">{{ issue_count }} open</text>

  <!-- Divider -->
  <line x1="16" y1="48" x2="784" y2="48" stroke="#21262d" stroke-width="1"/>

  <!-- Issue rows -->
  {% for issue in issues %}
  <g transform="translate(0, {{ 56 + loop.index0 * 32 }})">
    <!-- Priority stripe -->
    <rect x="0" y="2" width="4" height="28" fill="{{ issue.priority_color }}" rx="1"/>

    <!-- Issue number -->
    <text x="16" y="22" font-family="monospace" font-size="13" fill="#484f58">#{{ issue.number }}</text>

    <!-- Title -->
    <text x="72" y="22" font-family="sans-serif" font-size="13" fill="#c9d1d9">{{ issue.title }}</text>

    <!-- Labels -->
    {% for label in issue.labels %}
    <rect x="{{ 500 + loop.index0 * 72 }}" y="6" width="64" height="18" rx="9" fill="{{ label.bg_color }}" opacity="0.8"/>
    <text x="{{ 532 + loop.index0 * 72 }}" y="19" font-family="sans-serif" font-size="10" fill="{{ label.text_color }}" text-anchor="middle">{{ label.name }}</text>
    {% endfor %}

    <!-- Assignee -->
    {% if !issue.assignee.is_empty() %}
    <text x="780" y="22" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="end">{{ issue.assignee }}</text>
    {% endif %}
  </g>
  {% endfor %}

  <!-- Footer -->
  <rect x="0" y="380" width="800" height="20" fill="#0d1117" rx="0"/>
  <rect x="0" y="380" width="800" height="1" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="394" font-family="sans-serif" font-size="10" fill="#30363d" text-anchor="middle">discord.sh</text>
</svg>
