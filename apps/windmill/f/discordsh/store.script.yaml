summary: KBVE store — view products, check credits, list owned, buy with credits (/wm store)
description: >-
  args[0] is a subcommand router: empty/view/catalog shows the storefront embed
  with the current products and a deep link to kbve.com/store; balance shows the
  caller's credits via axum /api/v1/wallet/service/balance-discord; inventory
  lists owned collectibles via axum /api/v1/store/service/inventory-discord; buy
  [slug] spends the caller's credits and mints the entitlement via axum
  /api/v1/store/service/buy-discord (all resolve discord.user_id -> KBVE
  account, buy defaults to the featured card); help lists the subcommands.
  balance + inventory + buy require Windmill variables f/discordsh/axum_base_url and
  f/discordsh/axum_service_token (secret service_role JWT); view/help/catalog are
  static.
kind: script
lock: ''
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - args
    - discord
  properties:
    args:
      type: array
      description: Space-separated args from /wm; args[0] is the subcommand.
      items:
        type: string
      default: []
    discord:
      type: object
      description: Discord invocation context injected by the bot.
      properties:
        user_id: { type: string }
        username: { type: string }
        guild_id: { type: string }
        channel_id: { type: string }
  required: []
