<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KBVE Isometric</title>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                /* Transparent so the underlying wgpu surface (Bevy render in
                 * Tauri's native webview) shows through. The browser/WASM
                 * path covers this with the bevy-canvas element anyway. */
                background: transparent;
                overflow: hidden;
                width: 100%;
                height: 100%;
                user-select: none;
                -webkit-user-select: none;
            }
            #bevy-canvas {
                position: fixed;
                z-index: 0;
                outline: none;
                /* Lock to 16:9 aspect ratio, centered with letterboxing */
                aspect-ratio: 16 / 9;
                max-width: 100%;
                max-height: 100%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                image-rendering: pixelated;
            }
            #root {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
                /* Force a compositor layer so WKWebView paints the React
                 * overlay on top of the wgpu surface from the first frame
                 * instead of deferring until devtools opens. */
                transform: translateZ(0);
                will-change: transform, opacity;
                isolation: isolate;
                /* WKWebView only schedules DOM composition when something
                 * is animating or interactive. A no-op infinite animation
                 * keeps the compositor layer "live" from boot so React UI
                 * is visible without the inspect-element workaround. */
                animation: _wkwebview_keepalive 60s linear infinite;
            }
            @keyframes _wkwebview_keepalive {
                0% { opacity: 0.99999; }
                100% { opacity: 1; }
            }
            /* pointer-events managed per-component via Tailwind pointer-events-auto */
        </style>
    </head>
    <body>
        <canvas id="bevy-canvas" tabindex="0"></canvas>
        <div id="root"></div>
        <script src="bug-report-shim.js"></script>
        <script src="safari-shim.js"></script>
        <script>
            // Tauri macOS WKWebView treats desktop clicks as touch with
            // ~500ms delay; block touch listeners before they're attached.
            // https://github.com/orgs/tauri-apps/discussions/11957
            (function () {
                if (!/Mac|Macintosh/i.test(navigator.userAgent)) return;
                var origAdd = EventTarget.prototype.addEventListener;
                EventTarget.prototype.addEventListener = function (type, listener, options) {
                    if (type === 'touchstart' || type === 'touchend' || type === 'touchmove') return;
                    if (type === 'click' && options && options.capture === true && options.once === true) return;
                    return origAdd.call(this, type, listener, options);
                };
            })();
        </script>
        <script>
            // Native Tauri renders Bevy onto the webview surface; capture
            // pointer/key events at window level and forward them via
            // Tauri commands so Bevy receives them regardless of which DOM
            // element has focus. The DOM stays interactive (no pointer-
            // events: none on html/body) so WKWebView keeps compositing.
            var isTauri = !!(window.__TAURI_INTERNALS__ || window.__TAURI__);
            if (isTauri) {
                var canvas = document.getElementById('bevy-canvas');
                if (canvas) canvas.style.pointerEvents = 'none';

                var dpr = window.devicePixelRatio || 1;

                var invokeRef = null;
                var loggedErr = false;
                var call = function (cmd, args) {
                    if (!invokeRef) {
                        invokeRef = (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke)
                            || (window.__TAURI__ && window.__TAURI__.invoke)
                            || (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke);
                        if (!invokeRef) {
                            if (!loggedErr) {
                                console.error('[native-input] no invoke fn');
                                loggedErr = true;
                            }
                            return;
                        }
                    }
                    try {
                        var p = invokeRef(cmd, args);
                        if (p && p.catch) {
                            p.catch(function (err) {
                                if (!loggedErr) {
                                    console.error('[native-input] invoke failed', cmd, err);
                                    loggedErr = true;
                                }
                            });
                        }
                    } catch (err) {
                        if (!loggedErr) {
                            console.error('[native-input] invoke threw', cmd, err);
                            loggedErr = true;
                        }
                    }
                };

                var reportViewport = function () {
                    call('forward_viewport', {
                        cssW: window.innerWidth,
                        cssH: window.innerHeight,
                        dpr: window.devicePixelRatio || 1,
                    });
                };
                reportViewport();
                window.addEventListener('resize', reportViewport, true);

                window.addEventListener('pointermove', function (e) {
                    call('forward_pointer_move', { x: e.clientX * dpr, y: e.clientY * dpr });
                }, true);
                window.addEventListener('pointerover', function (e) {
                    if (e.target === document.documentElement || e.target === document.body) {
                        call('forward_pointer_enter', { x: e.clientX * dpr, y: e.clientY * dpr });
                    }
                }, true);
                window.addEventListener('pointerout', function (e) {
                    if (!e.relatedTarget) {
                        call('forward_pointer_leave', {});
                    }
                }, true);
                var isDragRegion = function (e) {
                    var t = e.target;
                    while (t && t !== document.body) {
                        if (t.hasAttribute && t.hasAttribute('data-tauri-drag-region')) {
                            return true;
                        }
                        t = t.parentNode;
                    }
                    return false;
                };
                window.addEventListener('pointerdown', function (e) {
                    if (isDragRegion(e)) return;
                    call('forward_pointer_button', { button: e.button, pressed: true });
                }, true);
                window.addEventListener('pointerup', function (e) {
                    if (isDragRegion(e)) return;
                    call('forward_pointer_button', { button: e.button, pressed: false });
                }, true);
                window.addEventListener('wheel', function (e) {
                    call('forward_wheel', { dx: e.deltaX, dy: -e.deltaY });
                }, { capture: true, passive: true });
                // Don't forward keys to Bevy when focus is on a text widget
                // — React chat etc. need raw input without triggering game
                // hotkeys (typing `i` while in chat opening the inventory).
                var keyTargetIsEditable = function (e) {
                    var t = e.target;
                    if (!t || !t.tagName) return false;
                    var tag = t.tagName;
                    return (
                        tag === 'INPUT' ||
                        tag === 'TEXTAREA' ||
                        tag === 'SELECT' ||
                        (t.isContentEditable === true)
                    );
                };
                window.addEventListener('keydown', function (e) {
                    if (keyTargetIsEditable(e)) return;
                    call('forward_key', { code: e.code, pressed: true, repeat: e.repeat });
                }, true);
                window.addEventListener('keyup', function (e) {
                    if (keyTargetIsEditable(e)) return;
                    call('forward_key', { code: e.code, pressed: false, repeat: false });
                }, true);
            } else {
                // WASM browser build: keep canvas focused so winit gets keys.
                document.addEventListener('pointerup', function() {
                    var c = document.getElementById('bevy-canvas');
                    if (c && document.activeElement !== c) c.focus();
                });
                document.addEventListener('keydown', function() {
                    var c = document.getElementById('bevy-canvas');
                    if (c && document.activeElement !== c) c.focus();
                });
            }
        </script>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
