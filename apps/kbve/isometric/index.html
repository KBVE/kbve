<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KBVE Isometric</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                background: transparent;
                overflow: hidden;
                width: 100%;
                height: 100%;
            }
            #root {
                width: 100%;
                height: 100%;
                pointer-events: none;
            }
            #root > * {
                pointer-events: auto;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
