<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KBVE Isometric</title>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                /* Transparent so the underlying wgpu surface (Bevy render in
                 * Tauri's native webview) shows through. The browser/WASM
                 * path covers this with the bevy-canvas element anyway. */
                background: transparent;
                overflow: hidden;
                width: 100%;
                height: 100%;
            }
            #bevy-canvas {
                position: fixed;
                z-index: 0;
                outline: none;
                /* Lock to 16:9 aspect ratio, centered with letterboxing */
                aspect-ratio: 16 / 9;
                max-width: 100%;
                max-height: 100%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                image-rendering: pixelated;
            }
            #root {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
                pointer-events: none;
            }
            /* pointer-events managed per-component via Tailwind pointer-events-auto */
        </style>
    </head>
    <body>
        <canvas id="bevy-canvas" tabindex="0"></canvas>
        <div id="root"></div>
        <script src="bug-report-shim.js"></script>
        <script src="safari-shim.js"></script>
        <script>
            // Native Tauri build renders Bevy directly to the webview's wgpu
            // surface (no canvas attachment). The bevy-canvas element + body
            // would otherwise eat clicks before tao forwards them to Bevy.
            // Detect Tauri and make the DOM click-through; React UI children
            // opt back in via pointer-events: auto when needed.
            if (window.__TAURI_INTERNALS__ || window.__TAURI__) {
                document.documentElement.style.pointerEvents = 'none';
                document.body.style.pointerEvents = 'none';
                var c = document.getElementById('bevy-canvas');
                if (c) c.style.pointerEvents = 'none';

                // Tauri webview eats pointer/keyboard events before tao can
                // forward them. Re-publish DOM events to Rust commands so the
                // native Bevy app sees them. Capture phase so we beat any
                // React handlers (those re-arm pointer-events: auto on their
                // own children).
                var ti = window.__TAURI_INTERNALS__;
                var rawInvoke = (ti && ti.invoke) || (window.__TAURI__ && window.__TAURI__.invoke);
                if (rawInvoke) {
                    var logged = false;
                    var call = function (cmd, args) {
                        try {
                            var p = rawInvoke(cmd, args);
                            if (p && p.catch) {
                                p.catch(function (err) {
                                    if (!logged) {
                                        console.error('[native-input] invoke failed', cmd, err);
                                        logged = true;
                                    }
                                });
                            }
                        } catch (err) {
                            if (!logged) {
                                console.error('[native-input] invoke threw', cmd, err);
                                logged = true;
                            }
                        }
                    };
                    var dpr = window.devicePixelRatio || 1;
                    window.addEventListener('pointermove', function (e) {
                        call('forward_pointer_move', { x: e.clientX * dpr, y: e.clientY * dpr });
                    }, true);
                    window.addEventListener('pointerdown', function (e) {
                        call('forward_pointer_button', { button: e.button, pressed: true });
                    }, true);
                    window.addEventListener('pointerup', function (e) {
                        call('forward_pointer_button', { button: e.button, pressed: false });
                    }, true);
                    window.addEventListener('wheel', function (e) {
                        call('forward_wheel', { dx: e.deltaX, dy: -e.deltaY });
                    }, { capture: true, passive: true });
                    window.addEventListener('keydown', function (e) {
                        call('forward_key', { code: e.code, pressed: true, repeat: e.repeat });
                    }, true);
                    window.addEventListener('keyup', function (e) {
                        call('forward_key', { code: e.code, pressed: false, repeat: false });
                    }, true);
                    console.log('[native-input] forwarder armed');
                } else {
                    console.warn('[native-input] no tauri invoke available; input wont reach Bevy');
                }
            } else {
                // WASM browser build keeps the canvas focused so winit's web
                // backend receives keyboard events.
                document.addEventListener('pointerup', function() {
                    var c = document.getElementById('bevy-canvas');
                    if (c && document.activeElement !== c) c.focus();
                });
                document.addEventListener('keydown', function() {
                    var c = document.getElementById('bevy-canvas');
                    if (c && document.activeElement !== c) c.focus();
                });
            }
        </script>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
