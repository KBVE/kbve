<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KBVE Isometric</title>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                background: #1a1a26;
                overflow: hidden;
                width: 100%;
                height: 100%;
            }
            #bevy-canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
                outline: none;
            }
            #root {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
                pointer-events: none;
            }
            /* pointer-events managed per-component via Tailwind pointer-events-auto */
        </style>
    </head>
    <body>
        <canvas id="bevy-canvas" tabindex="0"></canvas>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
