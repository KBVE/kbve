[package]
name = "isometric-game"
version = "0.1.0"
edition = "2021"
description = "KBVE isometric multiplayer game — Bevy 0.18 + lightyear + avian3d, builds to WASM and Tauri desktop"
repository = "https://github.com/KBVE/kbve"
license = "SEE https://kbve.com/legal/"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory", "--enable-nontrapping-float-to-int", "--enable-sign-ext", "--enable-mutable-globals", "--enable-threads", "--enable-simd", "--enable-reference-types"]

[package.metadata.wasm-pack.profile.dev]
wasm-opt = false

[lib]
name = "isometric_game"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "isometric-game"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

# --- Shared dependencies ---
[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "bevy_asset",
    "bevy_render",
    "bevy_core_pipeline",
    "bevy_sprite",
    "bevy_pbr",
    "bevy_text",
    "bevy_ui",
    "bevy_ui_render",
    "bevy_state",
    "bevy_color",
    "bevy_winit",
    "tonemapping_luts",
    "png",
    "zstd_rust",
    "bevy_picking",
    "mesh_picking",
    "bevy_gizmos",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
avian3d = { version = "0.5", default-features = false, features = ["3d", "f32", "parry-f32", "debug-plugin"] }
bevy_inventory = { path = "../../../../packages/rust/bevy/bevy_inventory" }
bevy_cam = { path = "../../../../packages/rust/bevy/bevy_cam" }
bevy_kbve_net = { path = "../../../../packages/rust/bevy/bevy_kbve_net", features = ["npcdb"] }
lightyear = { version = "0.26", default-features = false, features = [
    "client",
    "replication",
    "prediction",
    "interpolation",
    "input_native",
    "websocket",
    "netcode",
    "webtransport",
] }
base64 = "0.22"
rand = "0.9"
bevy_tasker = { path = "../../../../packages/rust/bevy/bevy_tasker" }
crossbeam-channel = "0.5"
dashmap = "6"
log = "0.4"

# --- Desktop-only dependencies ---
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
wgpu = "27"
pollster = "0.4"

# --- Linux-only Bevy features (x11/wayland) ---
[target.'cfg(target_os = "linux")'.dependencies.bevy]
version = "0.18"
features = ["x11", "wayland"]

# --- WASM-only Bevy features (WebGPU backend) ---
[target.'cfg(target_arch = "wasm32")'.dependencies.bevy]
version = "0.18"
features = ["webgpu"]

# --- WASM-only dependencies ---
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
wasm-bindgen = "=0.2.114"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Document", "Window", "HtmlCanvasElement",
    "Request", "RequestInit", "RequestMode", "Response", "Headers",
] }
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"
console_log = { version = "1", features = ["color"] }
