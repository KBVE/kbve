[package]
name = "isometric-game"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api"] }
tauri-plugin-opener = "2"
bevy = { version = "0.18", default-features = false, features = [
    "bevy_asset",
    "bevy_render",
    "bevy_core_pipeline",
    "bevy_sprite",
    "bevy_pbr",
    "bevy_text",
    "bevy_ui",
    "bevy_state",
    "bevy_color",
    "bevy_winit",
    "tonemapping_luts",
    "png",
    "x11",
    "wayland",
    "zstd_rust",
    "bevy_picking",
    "mesh_picking",
    "bevy_gizmos",
] }
wgpu = "27"
pollster = "0.4"
dashmap = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
