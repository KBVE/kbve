[workspace]
resolver = "2"
members = [
    "apps/kbve/axum-kbve",
    "packages/rust/jedi",
    "packages/rust/kbve",
    "packages/rust/holy",
    "packages/rust/bevy/bevy_kbve_net",
    "packages/rust/bevy/bevy_npc",
    "packages/rust/bevy/bevy_inventory",
    "packages/rust/bevy/bevy_items",
    "packages/rust/bevy/bevy_skills",
]

[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1
panic = "abort"
