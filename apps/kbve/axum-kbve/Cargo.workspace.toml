[workspace]
resolver = "2"
members = [
    "apps/kbve/axum-kbve",
    "packages/rust/jedi",
    "packages/rust/kbve",
    "packages/rust/holy",
    "packages/rust/bevy/bevy_kbve_net",
    "packages/rust/bevy/bevy_npc",
]

[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1
panic = "abort"

[profile.release-ci]
inherits = "release"
opt-level = 2
lto = "off"
codegen-units = 16
