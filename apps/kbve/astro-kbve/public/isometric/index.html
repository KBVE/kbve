<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KBVE Isometric</title>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                background: #1a1a26;
                overflow: hidden;
                width: 100%;
                height: 100%;
            }
            #bevy-canvas {
                position: fixed;
                z-index: 0;
                outline: none;
                /* Lock to 16:9 aspect ratio, centered with letterboxing */
                aspect-ratio: 16 / 9;
                max-width: 100%;
                max-height: 100%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                image-rendering: pixelated;
            }
            #root {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
                pointer-events: none;
            }
            /* pointer-events managed per-component via Tailwind pointer-events-auto */
        </style>
      <script type="module" crossorigin src="/isometric/assets/index.js"></script>
      <link rel="stylesheet" crossorigin href="/isometric/assets/index.css">
    </head>
    <body>
        <canvas id="bevy-canvas" tabindex="0"></canvas>
        <div id="root"></div>
        <script src="bug-report-shim.js"></script>
        <script src="safari-shim.js"></script>
        <script>
            // Auto-focus the Bevy canvas so keyboard events reach winit.
            // Re-focus after any click on the page (React buttons steal focus).
            document.addEventListener('pointerup', function() {
                var c = document.getElementById('bevy-canvas');
                if (c && document.activeElement !== c) c.focus();
            });
            // Focus on first keydown if canvas isn't focused
            document.addEventListener('keydown', function() {
                var c = document.getElementById('bevy-canvas');
                if (c && document.activeElement !== c) c.focus();
            });
        </script>
    </body>
</html>
