# Standalone workspace root: kept OUT of the monorepo workspace so its heavy,
# divergent ML deps (transcribe-rs/ndarray/ort) resolve independently instead of
# being version-unified with the 50+ crates in the root workspace.
[workspace]
members = ["."]
exclude = [
    "sidecars/llm-sidecar",
    "sidecars/tts-sidecar",
    "sidecars/memory-sidecar",
]

[workspace.package]
rust-version = "1.96"

[package]
name = "kbve-desktop"
version = "0.1.0"
edition = "2021"
rust-version.workspace = true
description = "KBVE cross-platform desktop application — Tauri 2 + React"
repository = "https://github.com/KBVE/kbve"
license = "MIT"

[lib]
name = "kbve_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "kbve-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
erust = { path = "../../../../packages/rust/erust", default-features = false, features = ["tauri"] }
tauri = { version = "2.9", features = [
  "protocol-asset",
  "macos-private-api",
  "tray-icon",
  "image-png",
] }
tauri-plugin-opener = "2"
tauri-plugin-store = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-single-instance = { version = "2", features = ["deep-link"] }
tauri-plugin-log = "2"
tauri-plugin-os = "2"
tauri-plugin-fs = "2"
tauri-plugin-shell = "2"
tauri-plugin-process = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-macos-permissions = "2"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
dashmap = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.9"
base64 = "0.22"

# Type-safe IPC bindings (rust -> ts). Version pair must stay in lockstep.
specta = { version = "=2.0.0-rc.22", features = ["serde_json"] }
specta-typescript = "0.0.9"
tauri-specta = { version = "=2.0.0-rc.21", features = ["derive", "typescript"] }

# Audio capture + resample + STT pipeline (in-process, latency-sensitive).
cpal = "0.16.0"
rubato = "0.16.2"
hound = "3.5.1"
rustfft = "6.4.0"
rodio = { git = "https://github.com/cjpais/rodio.git" }
# Pin to the exact commit handy locks: vad-rs 0.1.5 uses ort rc10 (ndarray 0.16).
# HEAD (0.1.6) bumped to ort rc12 (ndarray 0.17), which breaks transcribe-rs 0.2.1.
vad-rs = { git = "https://github.com/cjpais/vad-rs", rev = "88b3a01f72f83a5d80d0e7ea9bacfc0d897fd03f", default-features = false }
transcribe-rs = { version = "=0.2.1", features = ["whisper", "parakeet", "moonshine"] }
ferrous-opencc = "0.2.3"
# Pin ort (transitive via transcribe-rs + vad-rs) to the version handy locks.
# Newer ort (rc.12) pulls ndarray 0.17 which breaks transcribe-rs 0.2.1's
# ndarray-0.16 expectations. rc.10 keeps a single ndarray 0.16 in the graph.
ort = "=2.0.0-rc.10"

# Global hotkey action chain: capture keyboard, simulate paste.
enigo = "0.6.1"
rdev = { git = "https://github.com/rustdesk-org/rdev" }

# Model download + extraction + assorted helpers.
reqwest = { version = "0.12", features = ["json", "stream", "blocking"] }
futures-util = "0.3"
tar = "0.4.44"
flate2 = "1.0"
anyhow = "1.0"
log = "0.4"
once_cell = "1"
chrono = "0.4"
regex = "1"
tempfile = "3.8"

[target.'cfg(unix)'.dependencies]
signal-hook = "0.3"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-autostart = "2"
tauri-plugin-global-shortcut = "2"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.61.3", features = [
  "Win32_Media_Audio_Endpoints",
  "Win32_System_Com_StructuredStorage",
  "Win32_System_Variant",
  "Win32_Foundation",
  "Win32_UI_WindowsAndMessaging",
] }

[target.'cfg(target_os = "macos")'.dependencies]
tauri-nspanel = { git = "https://github.com/ahkohd/tauri-nspanel", branch = "v2.1" }
