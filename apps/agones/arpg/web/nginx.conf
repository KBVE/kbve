server {
    listen 5402;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets + game art (sprites/tilesets). Immutable, and the art
    # is loaded cross-origin by kbve.com/arcade/arpg + the Discord embed, so it
    # needs a permissive CORS header (public static art — safe).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # CDN: the embed bundle is loaded cross-origin by kbve.com/arcade/arpg.
    location = /arpg-embed.js {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # Discord Activity bundle is content-hashed (arpg.<hash>.js) — immutable, so
    # cache hard. Each deploy emits a new hash, so a stale copy can never pin an
    # old build at any Cloudflare colo. Make the header explicit rather than
    # leaning on CF's by-extension default TTL (~4h) that caused stale serves.
    location ~ ^/discord/arpg/.+\.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML entry points MUST always revalidate so a fresh deploy's hashed bundle
    # reference is picked up immediately — never let an edge/browser cache pin an
    # index.html that points at a stale arpg.<hash>.js. (CF skips .html by
    # default, but state it so behavior doesn't depend on CF defaults.)
    location = /discord/arpg/index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA: serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
