server {
    listen 5402;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets + game art (sprites/tilesets). Immutable, and the art
    # is loaded cross-origin by kbve.com/arcade/arpg + the Discord embed, so it
    # needs a permissive CORS header (public static art — safe).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # CDN: the embed bundle is loaded cross-origin by kbve.com/arcade/arpg.
    location = /arpg-embed.js {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # SPA: serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
