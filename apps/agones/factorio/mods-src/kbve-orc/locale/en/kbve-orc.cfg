[mod-name]
kbve-orc=KBVE Orc

[mod-description]
kbve-orc=Adds a pre-rendered isometric Orc Warrior as a neutral creature with a per-force reputation system. Kill orcs to lower reputation; gift items (or buy a KBVE Orc Tribute from the Exchange) to raise it. Reputation tier flips orc cease-fire automatically. Model by engvee.

[entity-name]
kbve-orc=Orc Warrior

[entity-description]
kbve-orc=A wild orc, member of the kbve-orcs faction. Starts neutral toward every player force. Kill one and the faction lowers its opinion of your team; drop a whitelisted item nearby and they warm up. 120 HP, 14 melee damage. Roar animation plays when an orc accepts a gift.

[item-name]
kbve-orc-tribute=KBVE Orc Tribute

[item-description]
kbve-orc-tribute=A ritual offering the orcs recognize. Drop one near any orc to gain +15 reputation per item with the orc faction. Buy from the KBVE Exchange — no crafting recipe.

[mod-setting-name]
kbve-orc-rep-kill-penalty=Reputation lost per kill
kbve-orc-rep-daily-decay=Daily reputation decay
kbve-orc-tier-hostile-max=Hostile tier upper bound
kbve-orc-tier-wary-max=Wary tier upper bound
kbve-orc-tier-neutral-max=Neutral tier upper bound
kbve-orc-tier-friendly-max=Friendly tier upper bound
kbve-orc-gift-scan-radius=Gift scan radius (tiles)
kbve-orc-max-health=Orc max HP
kbve-orc-melee-damage=Orc melee damage

[mod-setting-description]
kbve-orc-rep-kill-penalty=Reputation deducted from a player force every time one of its units kills an orc.
kbve-orc-rep-daily-decay=Absolute amount each player force's orc reputation drifts back toward 0 every 60 real-time minutes. Keeps long games from being permanently locked into a tier.
kbve-orc-tier-hostile-max=Reputation at or below this value puts the player force in the Hated tier (orcs attack on sight).
kbve-orc-tier-wary-max=Reputation at or below this value (and above the Hostile cap) puts the player force in the Wary tier.
kbve-orc-tier-neutral-max=Reputation at or below this value (and above the Wary cap) keeps the player force at the Neutral tier (orcs ignore until attacked).
kbve-orc-tier-friendly-max=Reputation at or below this value (and above the Neutral cap) puts the player force in the Friendly tier. Anything higher is Revered.
kbve-orc-gift-scan-radius=Tile radius around each orc that the 1 Hz gift sweep scans for dropped whitelisted items.
kbve-orc-max-health=HP value applied to the Orc prototype at data-stage. Default 120.
kbve-orc-melee-damage=Damage per orc melee swing applied at data-stage. Default 14.

[mod-setting-section]
kbve-orc-runtime=Orc reputation tuning
kbve-orc-startup=Orc unit tuning
