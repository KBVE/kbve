; KBVESupabase plugin config for ChuckRPG.
;
; Fill in ProjectURL + AnonKey before launching. Both can be edited in the
; editor at: Project Settings → Plugins → KBVE Supabase (changes write back
; to this file). The anon key is safe to ship — RLS gates the actual access.
;
; For local dev, override values via Config/LocalKBVESupabase.ini (gitignored)
; or via the editor; do NOT commit a personal AnonKey here.

[/Script/KBVESupabase.KBVESupabaseSettings]
ProjectURL=https://supabase.kbve.com
AnonKey=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzU1NDAzMjAwLCJleHAiOjE5MTMxNjk2MDB9.oietJI22ZytbghFywvdYMSJp7rcsBdBYbcciJxeGWrg
AuthCallbackBaseURL=http://localhost:4321
bPersistSession=True
bAutoRefreshOn401=True
RefreshLeadSeconds=60
RequestTimeoutSeconds=20

; OAuth deep-link fallback. Used when the HTTP loopback (FHttpServer, then raw
; socket) cannot open a listening socket — notably packaged macOS Shipping.
; Redirect handed to Supabase becomes <DeepLinkScheme>://auth/callback. Register
; the scheme with the OS (macOS Info.plist) and allowlist the URI in Supabase.
DeepLinkScheme=kbve
bEnableDeepLinkFallback=True
bPreferDeepLink=False

; Chat (irc-gateway) defaults — wss://chat.kbve.com/ws + auto-join #global.
; Token in query param survives Cloudflare WS upgrade (Authorization header
; gets stripped by some CF configs).
ChatURL="wss://chat.kbve.com/ws"
bChatTokenInQueryParam=False
bChatRespondToPing=True
bChatAutoReconnect=True
ChatReconnectInitialDelaySeconds=2
ChatReconnectMaxDelaySeconds=60
+ChatAutoJoinChannels=#general
