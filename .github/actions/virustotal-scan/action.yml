name: 'VirusTotal Scan'
description: 'Upload a file to VirusTotal via the large-file URL flow (up to 650 MB) and post the report link to the job summary.'
branding:
    color: 'red'
    icon: 'shield'

inputs:
    vt_api_key:
        description: 'VirusTotal API key'
        required: true
    file:
        description: 'Path to the file to scan'
        required: true
    label:
        description: 'Label shown in the job summary heading'
        required: false
        default: 'binary'
    poll_seconds:
        description: 'Total seconds to wait for analysis to complete'
        required: false
        default: '180'

outputs:
    analysis_id:
        description: 'VirusTotal analysis id (empty if upload failed)'
        value: ${{ steps.scan.outputs.analysis_id }}
    report_url:
        description: 'URL to the VirusTotal report'
        value: ${{ steps.scan.outputs.report_url }}
    stats:
        description: 'Analysis stats JSON (empty if scan did not complete)'
        value: ${{ steps.scan.outputs.stats }}

runs:
    using: 'composite'
    steps:
        - name: Repository scope guard
          shell: bash
          run: |
              if [ "$GITHUB_REPOSITORY" != "KBVE/kbve" ]; then
                  echo "::error::This composite action is scoped to KBVE/kbve only (got: $GITHUB_REPOSITORY)"
                  exit 1
              fi

        - id: scan
          shell: bash
          env:
              VT_API_KEY: ${{ inputs.vt_api_key }}
              FILE: ${{ inputs.file }}
              LABEL: ${{ inputs.label }}
              POLL_SECONDS: ${{ inputs.poll_seconds }}
          run: |
              set -u

              if [ -z "${VT_API_KEY:-}" ]; then
                echo "::warning::vt_api_key not set; skipping."
                exit 0
              fi
              if [ -z "${FILE:-}" ] || [ ! -f "$FILE" ]; then
                echo "::notice::file not found at '$FILE'; skipping."
                exit 0
              fi

              SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
              echo "Scanning $FILE ($SIZE bytes) on VirusTotal."

              UPLOAD_URL=$(curl -fsS \
                'https://www.virustotal.com/api/v3/files/upload_url' \
                -H "x-apikey: $VT_API_KEY" \
                | jq -r '.data')
              if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
                echo "::warning::failed to obtain VT upload URL; skipping."
                exit 0
              fi

              ANALYSIS_ID=$(curl -fsS -X POST "$UPLOAD_URL" \
                -H "x-apikey: $VT_API_KEY" \
                -F "file=@${FILE}" \
                | jq -r '.data.id')
              if [ -z "$ANALYSIS_ID" ] || [ "$ANALYSIS_ID" = "null" ]; then
                echo "::warning::VT upload returned no analysis id; skipping."
                exit 0
              fi

              REPORT_URL="https://www.virustotal.com/gui/file-analysis/$ANALYSIS_ID"
              echo "analysis_id=$ANALYSIS_ID" >> "$GITHUB_OUTPUT"
              echo "report_url=$REPORT_URL"  >> "$GITHUB_OUTPUT"
              echo "VT analysis id: $ANALYSIS_ID"
              echo "Report: $REPORT_URL"

              ITERS=$(( POLL_SECONDS / 10 ))
              [ "$ITERS" -lt 1 ] && ITERS=1
              for i in $(seq 1 "$ITERS"); do
                sleep 10
                STATUS=$(curl -fsS \
                  "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
                  -H "x-apikey: $VT_API_KEY" \
                  | jq -r '.data.attributes.status // "unknown"')
                echo "  poll $i: status=$STATUS"
                if [ "$STATUS" = "completed" ]; then break; fi
              done

              STATS=$(curl -fsS \
                "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
                -H "x-apikey: $VT_API_KEY" \
                | jq -c '.data.attributes.stats // {}')
              echo "stats=$STATS" >> "$GITHUB_OUTPUT"
              echo "VT stats for $LABEL: $STATS"

              {
                echo "### VirusTotal — $LABEL"
                echo ""
                echo '```json'
                echo "$STATS"
                echo '```'
                echo "[Open report]($REPORT_URL)"
              } >> "$GITHUB_STEP_SUMMARY"
