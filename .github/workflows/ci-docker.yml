name: CI - Docker

on:
    workflow_dispatch:
        inputs:
            app_name:
                description: 'App name to build (e.g. axum-kbve, discordsh, mc)'
                required: true
                type: string
            sha:
                description: 'Git SHA that triggered this dispatch'
                required: true
                type: string
            dispatched_at:
                description: 'Unix timestamp when this was dispatched (queue guard)'
                required: true
                type: string

# Per-app concurrency — never cancel in-progress runs.
# GitHub Actions keeps one pending slot: if two runs queue for the same app,
# the latest pending replaces the older pending, but the running job is safe.
concurrency:
    group: ci-docker-${{ inputs.app_name }}
    cancel-in-progress: false

permissions: {}

jobs:
    # ---------------------------------------------------------------------------
    # Queue Guard — fail loudly if this run has been waiting > 2 hours.
    # Prevents stale deploys: if axum-kbve v5.0.10 queues behind v5.0.11,
    # the v5.0.10 run should give up rather than deploy an older image.
    # ---------------------------------------------------------------------------
    queue_guard:
        name: Queue Guard
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Check queue age
              run: |
                  NOW=$(date +%s)
                  DISPATCHED="${{ inputs.dispatched_at }}"
                  AGE=$(( NOW - DISPATCHED ))
                  echo "App: ${{ inputs.app_name }}"
                  echo "SHA: ${{ inputs.sha }}"
                  echo "Queued for ${AGE}s (dispatched_at=$DISPATCHED, now=$NOW)"
                  if [ "$AGE" -gt 7200 ]; then
                    echo "::error::Queue timeout: ${{ inputs.app_name }} waited ${AGE}s (> 2h). Failing to prevent stale deploy."
                    exit 1
                  fi
                  echo "Queue age OK: ${AGE}s"

    # ---------------------------------------------------------------------------
    # Version Gate — check if the image version is already published to GHCR.
    # Tests always run. Publish + kube update only run when should_publish == 'true'.
    # Prevents wasted builds when the version hasn't bumped (#8270).
    # ---------------------------------------------------------------------------
    version_gate:
        name: Version Gate
        needs: [queue_guard]
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        outputs:
            should_publish: ${{ steps.check.outputs.should_publish }}
            local_version: ${{ steps.check.outputs.local_version }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Check version against version.toml
              id: check
              run: |
                  APP="${{ inputs.app_name }}"
                  MANIFEST=".github/ci-dispatch-manifest.json"

                  # Look up version_source and version_toml from manifest
                  ENTRY=$(jq -c --arg app "$APP" '.docker[] | select(.app_name == $app)' "$MANIFEST" 2>/dev/null)
                  if [ -z "$ENTRY" ]; then
                    echo "::notice::${APP} not found in manifest — will always publish."
                    echo "should_publish=true" >> "$GITHUB_OUTPUT"
                    echo "local_version=unknown" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  SRC=$(echo "$ENTRY" | jq -r '.version_source // empty')
                  VTOML=$(echo "$ENTRY" | jq -r '.version_toml // empty')

                  if [ -z "$SRC" ]; then
                    echo "::notice::${APP} has no version source — will always publish on file changes."
                    echo "should_publish=true" >> "$GITHUB_OUTPUT"
                    echo "local_version=unknown" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  case "$SRC" in
                    *.json) LOCAL=$(jq -r '.version // "0.0.0"' "$SRC" 2>/dev/null || echo "0.0.0") ;;
                    *.mdx)  LOCAL=$(sed -n 's/^version: *"\([^"]*\)"/\1/p' "$SRC" | head -1); [ -z "$LOCAL" ] && LOCAL="0.0.0" ;;
                    *)      LOCAL=$(grep -m1 '^version' "$SRC" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0") ;;
                  esac
                  PUBLISHED="0.0.0"
                  PUBLISH_FLAG="true"
                  if [ -f "$VTOML" ]; then
                    PUBLISHED=$(grep -m1 '^version' "$VTOML" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0")
                    PUBLISH_FLAG=$(grep -m1 '^publish' "$VTOML" | sed 's/publish = //' | tr -d ' "' 2>/dev/null || echo "true")
                  fi

                  echo "local_version=${LOCAL}" >> "$GITHUB_OUTPUT"

                  # Belt: explicit publish flag
                  if [ "$PUBLISH_FLAG" = "false" ]; then
                    echo "::notice::${APP} has publish = false in version.toml — skipping."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ -z "$LOCAL" ] || [ "$LOCAL" = "0.0.0" ]; then
                    echo "::notice::${APP} local version is ${LOCAL:-empty} — skipping publish."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  elif [ -z "$PUBLISHED" ] || [ "$PUBLISHED" = "0.0.0" ]; then
                    echo "::notice::${APP} version.toml is ${PUBLISHED:-empty} — skipping publish (not initialized)."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  elif [ "$LOCAL" = "$PUBLISHED" ]; then
                    echo "::notice::${APP} v${LOCAL} matches version.toml — tests will run, publish will be skipped."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  else
                    HIGHEST=$(printf '%s\n%s' "$LOCAL" "$PUBLISHED" | sort -V | tail -1)
                    if [ "$HIGHEST" != "$LOCAL" ]; then
                      echo "::warning::${APP} v${LOCAL} is OLDER than version.toml v${PUBLISHED} — skipping. Bump local version."
                      echo "should_publish=false" >> "$GITHUB_OUTPUT"
                    else
                      echo "::notice::${APP} v${LOCAL} > version.toml v${PUBLISHED} — will publish after tests pass."
                      echo "should_publish=true" >> "$GITHUB_OUTPUT"
                    fi
                  fi

    # ---------------------------------------------------------------------------
    # Config — resolve all per-app settings from a single case statement.
    # Single source of truth for runner, image, e2e, cargo_toml, kube manifest,
    # and whether a docker-test step should run.
    # ---------------------------------------------------------------------------
    config:
        name: Resolve App Config
        needs: [queue_guard]
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
            runner: ${{ steps.resolve.outputs.runner }}
            image: ${{ steps.resolve.outputs.image }}
            e2e_name: ${{ steps.resolve.outputs.e2e_name }}
            cargo_toml: ${{ steps.resolve.outputs.cargo_toml }}
            deployment_yaml: ${{ steps.resolve.outputs.deployment_yaml }}
            has_test: ${{ steps.resolve.outputs.has_test }}
            version_toml: ${{ steps.resolve.outputs.version_toml }}
            version_source: ${{ steps.resolve.outputs.version_source }}
            version_target: ${{ steps.resolve.outputs.version_target }}
        steps:
            - name: Resolve config for ${{ inputs.app_name }}
              id: resolve
              run: |
                  case "${{ inputs.app_name }}" in
                    axum-kbve)
                      echo "runner=arc-runner-set"                                                         >> "$GITHUB_OUTPUT"
                      echo "image=kbve/kbve"                                                               >> "$GITHUB_OUTPUT"
                      echo "e2e_name=axum-kbve-e2e"                                                        >> "$GITHUB_OUTPUT"
                      echo "cargo_toml=apps/kbve/astro-kbve/src/content/docs/project/api.mdx"              >> "$GITHUB_OUTPUT"
                      echo "deployment_yaml=apps/kube/kbve/manifest/kbve-deployment.yaml"                 >> "$GITHUB_OUTPUT"
                      echo "has_test=true"                                                                 >> "$GITHUB_OUTPUT"
                      echo "version_toml=apps/kbve/axum-kbve/version.toml"                                >> "$GITHUB_OUTPUT"
                      echo "version_source=apps/kbve/astro-kbve/src/content/docs/project/api.mdx"         >> "$GITHUB_OUTPUT"
                      echo "version_target=apps/kbve/axum-kbve/Cargo.toml"                                >> "$GITHUB_OUTPUT"
                      ;;
                    herbmail)
                      echo "runner=ubuntu-latest"                                                          >> "$GITHUB_OUTPUT"
                      echo "image=kbve/herbmail"                                                           >> "$GITHUB_OUTPUT"
                      echo "e2e_name=herbmail"                                                             >> "$GITHUB_OUTPUT"
                      echo "cargo_toml=apps/herbmail/axum-herbmail/Cargo.toml"                             >> "$GITHUB_OUTPUT"
                      echo "deployment_yaml=apps/kube/herbmail/manifest/herbmail-deployment.yaml"          >> "$GITHUB_OUTPUT"
                      echo "has_test=true"                                                                 >> "$GITHUB_OUTPUT"
                      echo "version_toml=apps/herbmail/version.toml"                                       >> "$GITHUB_OUTPUT"
                      ;;
                    memes)
                      echo "runner=ubuntu-latest"                                                          >> "$GITHUB_OUTPUT"
                      echo "image=kbve/memes"                                                              >> "$GITHUB_OUTPUT"
                      echo "e2e_name=memes"                                                                >> "$GITHUB_OUTPUT"
                      echo "cargo_toml=apps/memes/axum-memes/Cargo.toml"                                   >> "$GITHUB_OUTPUT"
                      echo "deployment_yaml=apps/kube/memes/manifest/memes-deployment.yaml"               >> "$GITHUB_OUTPUT"
                      echo "has_test=true"                                                                 >> "$GITHUB_OUTPUT"
                      echo "version_toml=apps/memes/version.toml"                                          >> "$GITHUB_OUTPUT"
                      ;;
                    irc-gateway)
                      echo "runner=ubuntu-latest"                                                          >> "$GITHUB_OUTPUT"
                      echo "image=kbve/irc-gateway"                                                        >> "$GITHUB_OUTPUT"
                      echo "e2e_name=irc"                                                                  >> "$GITHUB_OUTPUT"
                      echo "cargo_toml=apps/irc/irc-gateway/Cargo.toml"                                   >> "$GITHUB_OUTPUT"
                      echo "deployment_yaml=apps/kube/irc/manifests/irc-gateway-deployment.yaml"          >> "$GITHUB_OUTPUT"
                      echo "has_test=true"                                                                 >> "$GITHUB_OUTPUT"
                      echo "version_toml=apps/irc/version.toml"                                            >> "$GITHUB_OUTPUT"
                      ;;
                    discordsh)
                      echo "runner=ubuntu-latest"                                                          >> "$GITHUB_OUTPUT"
                      echo "image=kbve/discordsh"                                                          >> "$GITHUB_OUTPUT"
                      echo "e2e_name=discordsh"                                                            >> "$GITHUB_OUTPUT"
                      echo "cargo_toml=apps/kbve/astro-kbve/src/content/docs/project/discordsh.mdx"       >> "$GITHUB_OUTPUT"
                      echo "deployment_yaml=apps/kube/discordsh/manifest/deployment.yaml"                 >> "$GITHUB_OUTPUT"
                      echo "has_test=true"                                                                 >> "$GITHUB_OUTPUT"
                      echo "version_toml=apps/discordsh/version.toml"                                      >> "$GITHUB_OUTPUT"
                      echo "version_source=apps/kbve/astro-kbve/src/content/docs/project/discordsh.mdx"   >> "$GITHUB_OUTPUT"
                      echo "version_target=apps/discordsh/axum-discordsh/Cargo.toml"                      >> "$GITHUB_OUTPUT"
                      ;;
                    mc)
                      echo "runner=ubuntu-latest"                                                          >> "$GITHUB_OUTPUT"
                      echo "image=kbve/mc"                                                                 >> "$GITHUB_OUTPUT"
                      echo "e2e_name=mc"                                                                   >> "$GITHUB_OUTPUT"
                      echo "cargo_toml=apps/mc/plugins/kbve-mc-plugin/Cargo.toml"                         >> "$GITHUB_OUTPUT"
                      echo "deployment_yaml=apps/kube/mc/manifest/deployment.yaml"                        >> "$GITHUB_OUTPUT"
                      echo "has_test=true"                                                                 >> "$GITHUB_OUTPUT"
                      echo "version_toml=apps/mc/version.toml"                                             >> "$GITHUB_OUTPUT"
                      ;;
                    edge)
                      echo "runner=ubuntu-latest"                                                          >> "$GITHUB_OUTPUT"
                      echo "image=kbve/edge"                                                               >> "$GITHUB_OUTPUT"
                      echo "e2e_name=edge"                                                                 >> "$GITHUB_OUTPUT"
                      echo "cargo_toml=apps/kbve/astro-kbve/src/content/docs/project/edge.mdx"            >> "$GITHUB_OUTPUT"
                      echo "deployment_yaml=apps/kube/functions/manifests/functions-deployment.yaml"      >> "$GITHUB_OUTPUT"
                      echo "has_test=true"                                                                 >> "$GITHUB_OUTPUT"
                      echo "version_toml=apps/kbve/edge/version.toml"                                      >> "$GITHUB_OUTPUT"
                      echo "version_source=apps/kbve/astro-kbve/src/content/docs/project/edge.mdx"        >> "$GITHUB_OUTPUT"
                      echo "version_target=apps/kbve/edge/deno.json"                                      >> "$GITHUB_OUTPUT"
                      ;;
                    cryptothrone)
                      echo "runner=ubuntu-latest"                                                          >> "$GITHUB_OUTPUT"
                      echo "image=kbve/cryptothrone"                                                       >> "$GITHUB_OUTPUT"
                      echo "e2e_name=cryptothrone"                                                         >> "$GITHUB_OUTPUT"
                      echo "cargo_toml=apps/cryptothrone/axum-cryptothrone/Cargo.toml"                    >> "$GITHUB_OUTPUT"
                      echo "deployment_yaml=apps/kube/cryptothrone/manifest/cryptothrone-deployment.yaml" >> "$GITHUB_OUTPUT"
                      echo "has_test=true"                                                                 >> "$GITHUB_OUTPUT"
                      echo "version_toml=apps/cryptothrone/version.toml"                                   >> "$GITHUB_OUTPUT"
                      ;;
                    kilobase)
                      echo "runner=ubuntu-latest"                                                          >> "$GITHUB_OUTPUT"
                      echo "image=kbve/kilobase"                                                           >> "$GITHUB_OUTPUT"
                      echo "e2e_name="                                                                     >> "$GITHUB_OUTPUT"
                      echo "cargo_toml="                                                                   >> "$GITHUB_OUTPUT"
                      echo "deployment_yaml="                                                              >> "$GITHUB_OUTPUT"
                      echo "has_test=false"                                                                >> "$GITHUB_OUTPUT"
                      echo "version_toml="                                                                 >> "$GITHUB_OUTPUT"
                      ;;
                    *)
                      echo "::error::Unknown app_name: ${{ inputs.app_name }}"
                      exit 1
                      ;;
                  esac

    # ---------------------------------------------------------------------------
    # Test — builds the app image, tags as ci-{sha} in GHCR, runs e2e tests.
    # Skipped for apps that have no e2e suite (e.g. kilobase).
    # The ci-{sha} tag is what publish promotes — no second full build needed.
    # ---------------------------------------------------------------------------
    test:
        name: Test Docker
        needs: [config]
        if: |
            always() &&
            needs.config.result == 'success' &&
            needs.config.outputs.has_test == 'true' &&
            !cancelled()
        permissions:
            contents: read
            packages: write
        uses: KBVE/kbve/.github/workflows/docker-test-app.yml@main
        with:
            project: ${{ needs.config.outputs.e2e_name }}
            runner: ${{ needs.config.outputs.runner }}
            image: ${{ needs.config.outputs.image }}
            version_source: ${{ needs.config.outputs.version_source }}
            version_target: ${{ needs.config.outputs.version_target }}

    # ---------------------------------------------------------------------------
    # Publish — promotes the ci-{sha} tag built in test to the release tag.
    # Falls back to a full rebuild only if the ci-{sha} image is not in GHCR.
    # For apps without a test step (kilobase) this is the primary build path.
    # ---------------------------------------------------------------------------
    publish:
        name: Publish Docker
        needs: [config, test, version_gate]
        if: |
            always() &&
            !cancelled() &&
            needs.config.result == 'success' &&
            needs.version_gate.outputs.should_publish == 'true' &&
            (needs.test.result == 'success' || needs.test.result == 'skipped')
        permissions:
            contents: read
            packages: write
        uses: KBVE/kbve/.github/workflows/utils-publish-docker-image.yml@main
        with:
            project: ${{ inputs.app_name }}
            target: container
            image: ${{ needs.config.outputs.image }}
            cargo_toml: ${{ needs.config.outputs.cargo_toml }}
            version_source: ${{ needs.config.outputs.version_source }}
            version_target: ${{ needs.config.outputs.version_target }}
        secrets:
            DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
            DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
            MY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ---------------------------------------------------------------------------
    # Update Kube — bumps the image tag in the app's deployment YAML and opens a PR.
    # Skipped for apps without a kube deployment (kilobase, edge-less apps).
    # ---------------------------------------------------------------------------
    update_kube:
        name: Update Kube Manifest
        needs: [config, publish]
        if: |
            always() &&
            needs.publish.result == 'success' &&
            needs.config.outputs.deployment_yaml != ''
        permissions:
            contents: write
            pull-requests: write
        uses: KBVE/kbve/.github/workflows/utils-update-kube-manifest.yml@main
        with:
            app_name: ${{ inputs.app_name }}
            image_name: ghcr.io/${{ needs.config.outputs.image }}
            cargo_toml: ${{ needs.config.outputs.cargo_toml }}
            deployment_yaml: ${{ needs.config.outputs.deployment_yaml }}

    # ---------------------------------------------------------------------------
    # Post-publish — update version.toml after successful Docker publish.
    # Closes the feedback loop so version_gate skips re-publishing the same tag.
    # ---------------------------------------------------------------------------
    update_version_docker:
        name: Update version.toml (docker)
        needs: [config, version_gate, publish]
        if: |
            always() &&
            needs.publish.result == 'success' &&
            needs.version_gate.outputs.should_publish == 'true' &&
            needs.config.outputs.version_toml != ''
        permissions:
            contents: write
            pull-requests: write
        uses: KBVE/kbve/.github/workflows/utils-update-version-toml.yml@dev
        with:
            package_type: docker
            package_name: ${{ inputs.app_name }}
            version: ${{ needs.version_gate.outputs.local_version }}
            version_toml_path: ${{ needs.config.outputs.version_toml }}

    # ---------------------------------------------------------------------------
    # Failure Tracker — opens a GitHub issue on any pipeline failure (#8186).
    # Per-app job_name makes the issue title actionable: "CI - Docker / axum-kbve"
    # ---------------------------------------------------------------------------
    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') }}
        needs: [version_gate, test, publish, update_kube, update_version_docker]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Docker'
            job_name: ${{ inputs.app_name }}
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'
