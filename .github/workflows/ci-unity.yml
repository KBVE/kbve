name: CI - Unity

run-name: 'CI - Unity / ${{ inputs.app_name }}'

on:
    workflow_dispatch:
        inputs:
            key:
                description: 'Manifest key'
                required: true
                type: string
            app_name:
                description: 'Unity project / build name'
                required: true
                type: string
            project_path:
                description: 'Unity project path (containing Assets/, ProjectSettings/)'
                required: true
                type: string
            engine_version:
                description: 'Unity version pin (e.g. 6000.0.30f1)'
                required: true
                type: string
            build_targets:
                description: 'JSON array of Unity build targets (e.g. ["StandaloneLinux64","WebGL"])'
                required: false
                type: string
                default: '["StandaloneLinux64"]'
            external_repo_url:
                description: 'Optional Azure DevOps repo URL when project lives outside the monorepo'
                required: false
                type: string
                default: ''
            license_method:
                description: 'unity license method: personal | professional | serial'
                required: false
                type: string
                default: 'personal'
            version_source:
                description: 'Path to version source file (mdx)'
                required: false
                type: string
                default: ''
            version_toml:
                description: 'Path to version.toml (PUBLISHED tracker)'
                required: false
                type: string
                default: ''
            manifest_version:
                description: 'Version from manifest (LOCAL)'
                required: false
                type: string
                default: ''
            deploy_to_itch:
                description: 'Deploy artefacts to itch.io after build'
                required: false
                type: boolean
                default: false
            itch_user:
                description: 'Itch.io publisher user'
                required: false
                type: string
                default: ''
            itch_game:
                description: 'Itch.io game slug'
                required: false
                type: string
                default: ''
            dispatched_at:
                description: 'Unix timestamp when this was dispatched (queue guard)'
                required: true
                type: string

permissions: {}

jobs:
    queue_guard:
        name: Queue Guard
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - run: |
                  AGE=$(( $(date +%s) - ${{ inputs.dispatched_at }} ))
                  echo "unity/${{ inputs.app_name }} queued ${AGE}s"
                  if [ "$AGE" -gt 7200 ]; then
                    echo "::error::Queue timeout: ${AGE}s > 2h"
                    exit 1
                  fi

    version_gate:
        name: Version Gate
        needs: [queue_guard]
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        outputs:
            should_publish: ${{ steps.check.outputs.should_publish }}
            local_version: ${{ steps.check.outputs.local }}
        steps:
            - uses: actions/checkout@v6
            - id: check
              run: |
                  LOCAL="${{ inputs.manifest_version }}"
                  VTOML="${{ inputs.version_toml }}"
                  PUB="0.0.0"
                  if [ -n "$VTOML" ] && [ -f "$VTOML" ]; then
                    PUB=$(grep -m1 '^version' "$VTOML" | sed 's/version = "\(.*\)"/\1/' || echo "0.0.0")
                  fi
                  echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
                  if [ -z "$LOCAL" ] || [ "$LOCAL" = "0.0.0" ] || [ "$LOCAL" = "$PUB" ]; then
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                    echo "::notice::No version bump (local=$LOCAL, published=$PUB) — publish skipped."
                  else
                    echo "should_publish=true" >> "$GITHUB_OUTPUT"
                    echo "::notice::v$LOCAL > v$PUB — will publish."
                  fi

    # Delegates the actual Unity build to the existing reusable util
    # (utils-unity-azure-deployment.yml) which already wraps GameCI +
    # the unity_license / unity_email / unity_password secrets and the
    # itch.io deployment path.
    build:
        name: Build (${{ inputs.engine_version }})
        needs: [version_gate]
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-unity-azure-deployment.yml@main
        with:
            unity_version: ${{ inputs.engine_version }}
            project_path: ${{ inputs.project_path }}
            azure_repo_url: ${{ inputs.external_repo_url }}
            target_platforms: ${{ inputs.build_targets }}
            deploy_to_itch: ${{ inputs.deploy_to_itch }}
            itch_username: ${{ inputs.itch_user }}
            itch_gameid: ${{ inputs.itch_game }}
        secrets:
            unity_license: ${{ secrets.UNITY_LICENSE }}
            unity_email: ${{ secrets.UNITY_EMAIL }}
            unity_password: ${{ secrets.UNITY_PASSWORD }}

    post_publish_sync:
        name: Post-publish version sync
        needs: [version_gate, build]
        if: needs.version_gate.outputs.should_publish == 'true' && needs.build.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
            - if: ${{ inputs.version_toml != '' }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  BRANCH="unity-sync-${{ inputs.app_name }}-${{ inputs.manifest_version }}"
                  git checkout -b "$BRANCH"
                  sed -i.bak "s/^version = \".*\"/version = \"${{ inputs.manifest_version }}\"/" "${{ inputs.version_toml }}"
                  rm -f "${{ inputs.version_toml }}.bak"
                  git add "${{ inputs.version_toml }}"
                  git commit -m "chore(${{ inputs.app_name }}): post-publish sync to v${{ inputs.manifest_version }}" || exit 0
                  git push origin "$BRANCH"
                  gh pr create --title "chore(${{ inputs.app_name }}): post-publish sync v${{ inputs.manifest_version }}" \
                    --body "Auto-generated post-publish sync." --base main --head "$BRANCH"
