name: CI - Unity

run-name: 'CI - Unity / ${{ inputs.app_name }}'

on:
    workflow_dispatch:
        inputs:
            key:
                description: 'Manifest key'
                required: true
                type: string
            app_name:
                description: 'Unity project / build name'
                required: true
                type: string
            project_path:
                description: 'Unity project path (containing Assets/, ProjectSettings/)'
                required: true
                type: string
            engine_version:
                description: 'Unity version pin (e.g. 6000.0.30f1)'
                required: true
                type: string
            build_targets:
                description: 'JSON array of Unity build targets (e.g. ["StandaloneLinux64","StandaloneWindows64","StandaloneOSX"])'
                required: false
                type: string
                default: '["StandaloneLinux64"]'
            external_repo_url:
                description: 'Optional Azure DevOps repo URL when project lives outside the monorepo'
                required: false
                type: string
                default: ''
            license_method:
                description: 'unity license method: personal | professional | serial'
                required: false
                type: string
                default: 'personal'
            version_source:
                description: 'Path to version source file (mdx)'
                required: false
                type: string
                default: ''
            version_toml:
                description: 'Path to version.toml (PUBLISHED tracker)'
                required: false
                type: string
                default: ''
            manifest_version:
                description: 'Version from manifest (LOCAL)'
                required: false
                type: string
                default: ''
            deploy_to_itch:
                description: 'Deploy artefacts to itch.io after build'
                required: false
                type: boolean
                default: false
            itch_user:
                description: 'Itch.io publisher user'
                required: false
                type: string
                default: ''
            itch_game:
                description: 'Itch.io game slug'
                required: false
                type: string
                default: ''
            deploy_to_steam:
                description: 'Run the Steam upload step after build'
                required: false
                type: boolean
                default: false
            steam_apps:
                description: 'JSON array of SteamApp entries from external_publish.steam_apps'
                required: false
                type: string
                default: '[]'
            dispatched_at:
                description: 'Unix timestamp when this was dispatched (queue guard)'
                required: true
                type: string

permissions: {}

jobs:
    queue_guard:
        name: Queue Guard
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - run: |
                  AGE=$(( $(date +%s) - ${{ inputs.dispatched_at }} ))
                  echo "unity/${{ inputs.app_name }} queued ${AGE}s"
                  if [ "$AGE" -gt 7200 ]; then
                    echo "::error::Queue timeout: ${AGE}s > 2h"
                    exit 1
                  fi

    version_gate:
        name: Version Gate
        needs: [queue_guard]
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        outputs:
            should_publish: ${{ steps.check.outputs.should_publish }}
            local_version: ${{ steps.check.outputs.local }}
        steps:
            - uses: actions/checkout@v6
            - id: check
              run: |
                  LOCAL="${{ inputs.manifest_version }}"
                  VTOML="${{ inputs.version_toml }}"
                  PUB="0.0.0"
                  if [ -n "$VTOML" ] && [ -f "$VTOML" ]; then
                    PUB=$(grep -m1 '^version' "$VTOML" | sed 's/version = "\(.*\)"/\1/' || echo "0.0.0")
                  fi
                  echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
                  if [ -z "$LOCAL" ] || [ "$LOCAL" = "0.0.0" ] || [ "$LOCAL" = "$PUB" ]; then
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                    echo "::notice::No version bump (local=$LOCAL, published=$PUB) — publish skipped."
                  else
                    echo "should_publish=true" >> "$GITHUB_OUTPUT"
                    echo "::notice::v$LOCAL > v$PUB — will publish."
                  fi

    build_matrix:
        name: Build Matrix Setup
        needs: [version_gate]
        runs-on: ubuntu-latest
        timeout-minutes: 2
        outputs:
            matrix: ${{ steps.set.outputs.matrix }}
        steps:
            - id: set
              run: echo "matrix=$(echo '${{ inputs.build_targets }}' | jq -c .)" >> "$GITHUB_OUTPUT"

    build:
        name: Build ${{ matrix.target }}
        needs: [build_matrix]
        runs-on: arc-runner-set
        timeout-minutes: 180
        permissions:
            contents: read
        strategy:
            fail-fast: false
            # Personal Unity licenses cap at 2 active seats. max-parallel: 2
            # keeps the matrix from blowing past that and starving the 3rd job
            # of activation. Bump to len(build_targets) once on Pro / Plus.
            max-parallel: 2
            matrix:
                target: ${{ fromJson(needs.build_matrix.outputs.matrix) }}
        steps:
            - name: Install git-lfs
              run: |
                  if command -v git-lfs >/dev/null 2>&1; then
                    git-lfs version
                  else
                    apt-get update -qq
                    apt-get install -y -qq --no-install-recommends git-lfs
                    git-lfs version
                  fi

            - name: Configure Forgejo LFS credentials
              env:
                  FORGEJO_USER: ${{ secrets.FORGEJO_USER }}
                  FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
              run: |
                  if [ -z "$FORGEJO_USER" ] || [ -z "$FORGEJO_TOKEN" ]; then
                    echo "::error::FORGEJO_USER / FORGEJO_TOKEN missing — cannot pull LFS from git.kbve.com"
                    exit 1
                  fi
                  printf 'machine git.kbve.com\nlogin %s\npassword %s\n' \
                    "$FORGEJO_USER" "$FORGEJO_TOKEN" > "$HOME/.netrc"
                  chmod 600 "$HOME/.netrc"

            - name: Checkout monorepo (no LFS smudge)
              uses: actions/checkout@v6
              with:
                  lfs: false

            - name: Pull LFS objects (rareicon scope only)
              run: |
                  git lfs install --local
                  git lfs pull --include="${{ inputs.project_path }}/**" --exclude=""

            - name: Seed Unity Library from PVC
              run: |
                  CACHE_DIR="/home/runner/_cache/unity-library/${{ inputs.app_name }}-${{ matrix.target }}"
                  LIB_DIR="${{ inputs.project_path }}/Library"
                  mkdir -p "$CACHE_DIR" "$LIB_DIR"
                  if command -v rsync >/dev/null 2>&1; then
                      rsync -a --delete "$CACHE_DIR"/ "$LIB_DIR"/
                  else
                      apt-get update -qq && apt-get install -y -qq --no-install-recommends rsync
                      rsync -a --delete "$CACHE_DIR"/ "$LIB_DIR"/
                  fi
                  echo "Seeded Library from $CACHE_DIR ($(du -sh "$LIB_DIR" 2>/dev/null | cut -f1))"

            - name: Build with Unity
              uses: game-ci/unity-builder@v4
              env:
                  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
                  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
                  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
                  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
              with:
                  projectPath: ${{ inputs.project_path }}
                  unityVersion: ${{ inputs.engine_version }}
                  targetPlatform: ${{ matrix.target }}
                  buildName: ${{ inputs.app_name }}

            - name: Save Unity Library to PVC
              if: always()
              run: |
                  CACHE_DIR="/home/runner/_cache/unity-library/${{ inputs.app_name }}-${{ matrix.target }}"
                  LIB_DIR="${{ inputs.project_path }}/Library"
                  if [ ! -d "$LIB_DIR" ]; then
                      echo "No Library/ to save (build may have failed before generation)"
                      exit 0
                  fi
                  mkdir -p "$CACHE_DIR"
                  rsync -a --delete "$LIB_DIR"/ "$CACHE_DIR"/
                  echo "Saved Library to $CACHE_DIR ($(du -sh "$CACHE_DIR" 2>/dev/null | cut -f1))"

            # Strip Unity's ship-blocked debug folders before zipping so
            # the artifact carries only what end-users would actually run.
            # `*_BackUpThisFolder_ButDontShipItWithYourGame*` holds IL2CPP
            # native debug symbols (Android/iOS); `*_BurstDebugInformation_DoNotShip*`
            # holds Burst-compiled debug data; both are useful for symbolicating
            # crashes locally but Unity explicitly tells you not to ship them.
            - name: Strip Unity DoNotShip folders
              run: |
                  find "build/${{ matrix.target }}" -type d \
                    \( -name "*_BackUpThisFolder_ButDontShipItWithYourGame*" \
                    -o -name "*_BurstDebugInformation_DoNotShip*" \) \
                    -prune -exec rm -rf {} + 2>/dev/null || true
                  echo "build/${{ matrix.target }} after strip:"
                  du -sh "build/${{ matrix.target }}" || true
                  ls -la "build/${{ matrix.target }}" || true

            - name: Upload build artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ inputs.app_name }}-${{ matrix.target }}
                  path: build/${{ matrix.target }}
                  retention-days: 3

            - name: Wipe Forgejo netrc
              if: always()
              run: rm -f "$HOME/.netrc"

    deploy_itch:
        name: Itch deploy ${{ matrix.target }}
        needs: [version_gate, build_matrix, build]
        if: ${{ inputs.deploy_to_itch && needs.version_gate.outputs.should_publish == 'true' && needs.build.result == 'success' }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                target: ${{ fromJson(needs.build_matrix.outputs.matrix) }}
        steps:
            # Skip iOS — itch.io has no iOS channel; Unity only exports an
            # unsigned Xcode project for that target anyway.
            - name: Skip iOS
              if: ${{ matrix.target == 'iOS' }}
              run: echo "iOS target has no itch channel; skipping."

            - name: Map target → itch channel
              if: ${{ matrix.target != 'iOS' }}
              id: chan
              run: |
                  case "${{ matrix.target }}" in
                    StandaloneLinux64)   echo "channel=linux"   >> "$GITHUB_OUTPUT" ;;
                    StandaloneWindows64) echo "channel=windows" >> "$GITHUB_OUTPUT" ;;
                    StandaloneOSX)       echo "channel=osx"     >> "$GITHUB_OUTPUT" ;;
                    WebGL)               echo "channel=webgl"   >> "$GITHUB_OUTPUT" ;;
                    Android)             echo "channel=android" >> "$GITHUB_OUTPUT" ;;
                    *)                   echo "channel=${{ matrix.target }}" >> "$GITHUB_OUTPUT" ;;
                  esac

            - name: Download build artifact
              if: ${{ matrix.target != 'iOS' }}
              uses: actions/download-artifact@v8
              with:
                  name: ${{ inputs.app_name }}-${{ matrix.target }}
                  path: build/${{ matrix.target }}

            - name: Push to itch.io via butler
              if: ${{ matrix.target != 'iOS' }}
              env:
                  BUTLER_API_KEY: ${{ secrets.ITCH_API }}
              run: |
                  curl -sL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
                  unzip -q butler.zip
                  chmod +x butler
                  ./butler -V

                  # Android publishes a single .apk; everything else
                  # publishes the build directory (executable + data
                  # folder). The DoNotShip dirs were already stripped
                  # before artifact upload, so the dir push is clean.
                  if [ "${{ matrix.target }}" = "Android" ]; then
                    APK=$(find "build/Android" -maxdepth 2 -name "*.apk" -type f | head -n 1)
                    if [ -z "$APK" ]; then
                      echo "::error::No .apk found under build/Android"
                      exit 1
                    fi
                    echo "Pushing $APK to itch"
                    ./butler push "$APK" \
                      "${{ inputs.itch_user }}/${{ inputs.itch_game }}:${{ steps.chan.outputs.channel }}" \
                      --userversion "${{ inputs.manifest_version }}"
                  else
                    ./butler push "build/${{ matrix.target }}" \
                      "${{ inputs.itch_user }}/${{ inputs.itch_game }}:${{ steps.chan.outputs.channel }}" \
                      --userversion "${{ inputs.manifest_version }}"
                  fi

    deploy_steam:
        name: Steam deploy ${{ matrix.app.label || matrix.app.app_id }}
        needs: [version_gate, build_matrix, build]
        # Independent of deploy_itch — runs in parallel after build.
        # One job per SteamApp entry. Each entry expects a matching
        # apps/<project>/Steam/app_build_<label>.vdf — missing files
        # log + skip so dormant entries (e.g. main game queued for
        # later release) can sit in the manifest without breaking the
        # matrix.
        if: ${{ inputs.deploy_to_steam && needs.version_gate.outputs.should_publish == 'true' && needs.build.result == 'success' && inputs.steam_apps != '[]' }}
        runs-on: ubuntu-latest
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                app: ${{ fromJson(inputs.steam_apps) }}
        steps:
            - name: Checkout monorepo
              uses: actions/checkout@v6
              with:
                  lfs: false

            - name: Resolve VDF
              id: vdf
              run: |
                  LABEL="${{ matrix.app.label }}"
                  if [ -z "$LABEL" ]; then
                      LABEL="${{ matrix.app.app_id }}"
                  fi
                  VDF="${{ inputs.project_path }}/Steam/app_build_${LABEL}.vdf"
                  if [ ! -f "$VDF" ]; then
                      echo "::notice::Skipping Steam upload for app ${{ matrix.app.app_id }} — VDF missing at $VDF"
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi
                  echo "skip=false" >> "$GITHUB_OUTPUT"
                  echo "label=$LABEL" >> "$GITHUB_OUTPUT"

            - name: Download all build artifacts
              if: steps.vdf.outputs.skip != 'true'
              uses: actions/download-artifact@v8
              with:
                  pattern: ${{ inputs.app_name }}-*
                  path: ${{ inputs.project_path }}/build/
                  merge-multiple: false

            - name: Flatten artifact paths into VDF ContentRoot layout
              if: steps.vdf.outputs.skip != 'true'
              run: |
                  # download-artifact creates build/<app>-<target>/ for each
                  # build artifact; the VDFs reference build/<target>/, so
                  # rename each subdir back to the bare target name.
                  cd "${{ inputs.project_path }}/build"
                  for d in "${{ inputs.app_name }}-"*/; do
                      [ -d "$d" ] || continue
                      target="${d#${{ inputs.app_name }}-}"
                      target="${target%/}"
                      if [ ! -d "$target" ]; then
                          mv "$d" "$target/"
                      fi
                  done
                  ls -la

            - name: Generate Steam Guard TOTP
              if: steps.vdf.outputs.skip != 'true'
              id: steam_totp
              uses: CyberAndrii/steam-totp@v1
              with:
                  shared_secret: ${{ secrets.STEAM_TOTP_SECRET }}

            - name: Upload via SteamPipe (game-ci/steam-deploy)
              if: steps.vdf.outputs.skip != 'true'
              uses: game-ci/steam-deploy@v3
              with:
                  username: ${{ secrets.STEAM_USERNAME }}
                  password: ${{ secrets.STEAM_PASSWORD }}
                  totp: ${{ steps.steam_totp.outputs.code }}
                  appId: ${{ matrix.app.app_id }}
                  buildDescription: '${{ github.sha }} (${{ steps.vdf.outputs.label }})'
                  rootPath: ${{ inputs.project_path }}/build
                  depot1Path: StandaloneLinux64
                  depot2Path: StandaloneWindows64
                  depot3Path: StandaloneOSX
                  releaseBranch: ${{ matrix.app.branch }}

    post_publish_sync:
        name: Post-publish version sync
        needs: [version_gate, build, deploy_itch, deploy_steam]
        if: ${{ always() && needs.version_gate.outputs.should_publish == 'true' && needs.build.result == 'success' && (needs.deploy_itch.result == 'success' || needs.deploy_itch.result == 'skipped') && (needs.deploy_steam.result == 'success' || needs.deploy_steam.result == 'skipped') }}
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
            - if: ${{ inputs.version_toml != '' }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  BRANCH="unity-sync-${{ inputs.app_name }}-${{ inputs.manifest_version }}"
                  git checkout -b "$BRANCH"
                  sed -i.bak "s/^version = \".*\"/version = \"${{ inputs.manifest_version }}\"/" "${{ inputs.version_toml }}"
                  rm -f "${{ inputs.version_toml }}.bak"
                  git add "${{ inputs.version_toml }}"
                  git commit -m "chore(${{ inputs.app_name }}): post-publish sync to v${{ inputs.manifest_version }}" || exit 0
                  git push origin "$BRANCH"
                  gh pr create --title "chore(${{ inputs.app_name }}): post-publish sync v${{ inputs.manifest_version }}" \
                    --body "Auto-generated post-publish sync." --base main --head "$BRANCH"

    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') }}
        needs:
            [
                queue_guard,
                version_gate,
                build_matrix,
                build,
                deploy_itch,
                deploy_steam,
                post_publish_sync,
            ]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Unity'
            job_name: ${{ inputs.app_name }}
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'

    track_success:
        name: Track Success (close resolved)
        if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        needs:
            [
                queue_guard,
                version_gate,
                build_matrix,
                build,
                deploy_itch,
                deploy_steam,
                post_publish_sync,
            ]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Unity'
            job_name: ${{ inputs.app_name }}
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'success'
