name: CI - Uniti

on:
    pull_request:
        paths:
            - 'packages/rust/bevy/uniti/**'
            - 'packages/rust/bevy/bevy_pathfinder/**'
            - 'packages/rust/bevy/bevy_inventory/**'
            - 'packages/rust/bevy/bevy_battle/**'
            - 'packages/rust/bevy/bevy_skills/**'
            - '.github/workflows/ci-uniti.yml'
    push:
        branches:
            - main
        paths:
            - 'packages/rust/bevy/uniti/**'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read

# Belt: make every cargo/rustup registry fetch in this workflow retry transient
# network failures (e.g. "Could not resolve host: index.crates.io" on a runner
# with a DNS blip). Suspenders: the cross-compile build steps below also wrap
# their build command in a shell retry loop, since a hard DNS failure can abort
# cargo before net.retry engages.
env:
    CARGO_NET_RETRY: '10'
    CARGO_NET_TIMEOUT: '60'
    RUSTUP_MAX_RETRIES: '10'

jobs:
    verify:
        name: Verify (fmt + clippy + tests)
        runs-on: arc-runner-set
        timeout-minutes: 30
        env:
            CARGO_HOME: /home/runner/_cache/cargo/home/verify
            CARGO_TARGET_DIR: /home/runner/_cache/cargo/target/verify
            RUSTUP_HOME: /home/runner/_cache/cargo/rustup/verify
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Install build prerequisites
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends build-essential pkg-config protobuf-compiler
            - name: Bootstrap rustup (serialized)
              run: |
                  mkdir -p "$CARGO_HOME/bin"
                  exec 9>/home/runner/_cache/cargo/.rustup-bootstrap.lock
                  flock 9
                  if [ ! -x "$CARGO_HOME/bin/rustup" ]; then
                      curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -sSf https://sh.rustup.rs | sh -s -- --default-toolchain none -y
                  fi
                  echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

            - name: Setup Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: cargo fmt
              run: cargo fmt -p uniti -- --check

            - name: cargo clippy
              run: cargo clippy -p uniti --all-targets -- -D warnings

            - name: cargo test
              run: cargo test -p uniti --no-fail-fast

    asan:
        name: Address Sanitizer
        needs: [verify]
        runs-on: arc-runner-set
        timeout-minutes: 45
        env:
            CARGO_HOME: /home/runner/_cache/cargo/home/asan
            CARGO_TARGET_DIR: /home/runner/_cache/cargo/target/asan
            RUSTUP_HOME: /home/runner/_cache/cargo/rustup/asan
        steps:
            - uses: actions/checkout@v7
            - name: Install build prerequisites
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends build-essential pkg-config protobuf-compiler
            - name: Bootstrap rustup (serialized)
              run: |
                  mkdir -p "$CARGO_HOME/bin"
                  exec 9>/home/runner/_cache/cargo/.rustup-bootstrap.lock
                  flock 9
                  if [ ! -x "$CARGO_HOME/bin/rustup" ]; then
                      curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -sSf https://sh.rustup.rs | sh -s -- --default-toolchain none -y
                  fi
                  echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
            - name: Setup Rust nightly (asan)
              uses: dtolnay/rust-toolchain@nightly
              with:
                  components: rust-src
            - name: cargo test (asan)
              env:
                  RUSTFLAGS: '-Z sanitizer=address'
                  RUSTDOCFLAGS: '-Z sanitizer=address'
                  ASAN_OPTIONS: 'detect_leaks=0'
                  LSAN_OPTIONS: 'detect_leaks=0'
              run: |
                  cargo +nightly test -p uniti \
                      -Z build-std \
                      --target x86_64-unknown-linux-gnu \
                      --no-fail-fast

    miri:
        name: Miri (UB detector)
        needs: [verify]
        runs-on: arc-runner-set
        timeout-minutes: 60
        env:
            CARGO_HOME: /home/runner/_cache/cargo/home/miri
            CARGO_TARGET_DIR: /home/runner/_cache/cargo/target/miri
            RUSTUP_HOME: /home/runner/_cache/cargo/rustup/miri
        steps:
            - uses: actions/checkout@v7
            - name: Install build prerequisites
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends build-essential pkg-config protobuf-compiler
            - name: Bootstrap rustup (serialized)
              run: |
                  mkdir -p "$CARGO_HOME/bin"
                  exec 9>/home/runner/_cache/cargo/.rustup-bootstrap.lock
                  flock 9
                  if [ ! -x "$CARGO_HOME/bin/rustup" ]; then
                      curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -sSf https://sh.rustup.rs | sh -s -- --default-toolchain none -y
                  fi
                  echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
            - name: Setup Rust nightly + miri
              uses: dtolnay/rust-toolchain@nightly
              with:
                  components: miri
            - name: cargo miri test
              env:
                  MIRIFLAGS: '-Zmiri-disable-isolation'
              continue-on-error: true
              run: |
                  cargo +nightly miri setup
                  cargo +nightly miri test -p uniti --test ffi_chunk_summary

    fuzz:
        name: Fuzz (round-trip, smoke run)
        needs: [verify]
        runs-on: arc-runner-set
        timeout-minutes: 30
        env:
            CARGO_HOME: /home/runner/_cache/cargo/home/fuzz
            CARGO_TARGET_DIR: /home/runner/_cache/cargo/target/fuzz
            RUSTUP_HOME: /home/runner/_cache/cargo/rustup/fuzz
        steps:
            - uses: actions/checkout@v7
            - name: Install build prerequisites
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends build-essential pkg-config protobuf-compiler
            - name: Bootstrap rustup (serialized)
              run: |
                  mkdir -p "$CARGO_HOME/bin"
                  exec 9>/home/runner/_cache/cargo/.rustup-bootstrap.lock
                  flock 9
                  if [ ! -x "$CARGO_HOME/bin/rustup" ]; then
                      curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -sSf https://sh.rustup.rs | sh -s -- --default-toolchain none -y
                  fi
                  echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
            - name: Setup Rust nightly (fuzz)
              uses: dtolnay/rust-toolchain@nightly
            - name: Install cargo-fuzz
              run: cargo install cargo-fuzz --locked
            - name: Smoke fuzz (60s)
              continue-on-error: true
              working-directory: packages/rust/bevy/uniti
              run: |
                  cargo +nightly fuzz run chunk_touch_roundtrip -- -max_total_time=60

    build_linux:
        name: Build Linux x86_64 (cdylib)
        needs: [verify]
        runs-on: arc-runner-set
        timeout-minutes: 30
        env:
            CARGO_HOME: /home/runner/_cache/cargo/home/build_linux
            CARGO_TARGET_DIR: /home/runner/_cache/cargo/target/build_linux
            RUSTUP_HOME: /home/runner/_cache/cargo/rustup/build_linux
        steps:
            - uses: actions/checkout@v7

            - name: Install build prerequisites
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends build-essential pkg-config protobuf-compiler
            - name: Bootstrap rustup (serialized)
              run: |
                  mkdir -p "$CARGO_HOME/bin"
                  exec 9>/home/runner/_cache/cargo/.rustup-bootstrap.lock
                  flock 9
                  if [ ! -x "$CARGO_HOME/bin/rustup" ]; then
                      curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -sSf https://sh.rustup.rs | sh -s -- --default-toolchain none -y
                  fi
                  echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

            - name: Setup Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-unknown-linux-gnu

            - name: cargo build (release)
              run: |
                  n=0
                  until cargo build -p uniti --release --target x86_64-unknown-linux-gnu; do
                      n=$((n + 1))
                      [ "$n" -ge 4 ] && { echo "::error::cargo build failed after $n attempts"; exit 1; }
                      echo "::warning::cargo build attempt $n failed (transient network?); retrying in 20s"
                      sleep 20
                  done

            - name: Upload Linux libuniti.so
              uses: actions/upload-artifact@v7
              with:
                  name: uniti-linux-x86_64
                  path: ${{ env.CARGO_TARGET_DIR }}/x86_64-unknown-linux-gnu/release/libuniti.so
                  if-no-files-found: error

    build_android:
        name: Build Android (4 ABIs)
        needs: [verify]
        runs-on: arc-runner-set
        timeout-minutes: 45
        env:
            CARGO_HOME: /home/runner/_cache/cargo/home/build_android
            CARGO_TARGET_DIR: /home/runner/_cache/cargo/target/build_android
            RUSTUP_HOME: /home/runner/_cache/cargo/rustup/build_android
        steps:
            - uses: actions/checkout@v7

            - name: Install build prerequisites
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends build-essential pkg-config protobuf-compiler
            - name: Bootstrap rustup (serialized)
              run: |
                  mkdir -p "$CARGO_HOME/bin"
                  exec 9>/home/runner/_cache/cargo/.rustup-bootstrap.lock
                  flock 9
                  if [ ! -x "$CARGO_HOME/bin/rustup" ]; then
                      curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -sSf https://sh.rustup.rs | sh -s -- --default-toolchain none -y
                  fi
                  echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

            - name: Setup Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

            - name: Setup NDK
              uses: nttld/setup-ndk@v1
              id: ndk
              with:
                  ndk-version: r28
                  add-to-path: true

            - name: Install cargo-ndk
              env:
                  CARGO_NET_RETRY: '10'
              run: command -v cargo-ndk >/dev/null || cargo install cargo-ndk --locked

            - name: cargo ndk build
              env:
                  ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
                  ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
              run: |
                  cd packages/rust/bevy/uniti
                  n=0
                  until cargo ndk -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 \
                      -o ./android-out build -p uniti --release; do
                      n=$((n + 1))
                      [ "$n" -ge 4 ] && { echo "::error::cargo ndk build failed after $n attempts"; exit 1; }
                      echo "::warning::cargo ndk build attempt $n failed (transient network?); retrying in 20s"
                      sleep 20
                  done

            - name: Upload Android per-ABI .so
              uses: actions/upload-artifact@v7
              with:
                  name: uniti-android
                  path: packages/rust/bevy/uniti/android-out
                  if-no-files-found: error

    build_ios:
        name: Build iOS XCFramework (device + sim)
        needs: [verify]
        runs-on: macos-latest
        timeout-minutes: 45
        steps:
            - uses: actions/checkout@v7

            - name: Install protoc (macOS)
              run: brew install protobuf

            - name: Setup Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-ios,aarch64-apple-ios-sim

            - name: Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: '.'
                  key: ios
                  cache-on-failure: true

            - name: cargo build (device + sim)
              run: |
                  cd packages/rust/bevy/uniti
                  n=0
                  until cargo build -p uniti --release --target aarch64-apple-ios \
                      && cargo build -p uniti --release --target aarch64-apple-ios-sim; do
                      n=$((n + 1))
                      [ "$n" -ge 4 ] && { echo "::error::cargo build (ios) failed after $n attempts"; exit 1; }
                      echo "::warning::cargo build (ios) attempt $n failed (transient network?); retrying in 20s"
                      sleep 20
                  done

            - name: Build XCFramework
              run: |
                  rm -rf ios-out/uniti.xcframework
                  mkdir -p ios-out
                  xcodebuild -create-xcframework \
                      -library dist/target/aarch64-apple-ios/release/libuniti.a \
                      -library dist/target/aarch64-apple-ios-sim/release/libuniti.a \
                      -output ios-out/uniti.xcframework

            - name: Upload iOS XCFramework
              uses: actions/upload-artifact@v7
              with:
                  name: uniti-ios
                  path: ios-out/uniti.xcframework
                  if-no-files-found: error
