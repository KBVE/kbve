name: Auto-merge bot PRs

on:
    workflow_dispatch:
        inputs:
            pr_number:
                description: 'PR number to auto-merge'
                required: true
                type: string
    workflow_call:
        inputs:
            pr_number:
                description: 'PR number to auto-merge'
                required: true
                type: string

jobs:
    auto-merge:
        if: github.repository == 'KBVE/kbve'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Validate PR
              id: validate
              run: |
                  PR=$(gh pr view ${{ inputs.pr_number }} --json author,baseRefName,labels,title,files --repo ${{ github.repository }})

                  AUTHOR=$(echo "$PR" | jq -r '.author.login')
                  BASE=$(echo "$PR" | jq -r '.baseRefName')
                  TITLE=$(echo "$PR" | jq -r '.title')
                  LABELS=$(echo "$PR" | jq -r '.labels[].name' 2>/dev/null)

                  echo "PR #${{ inputs.pr_number }}: author=$AUTHOR base=$BASE title=$TITLE"

                  # Author check
                  if [ "$AUTHOR" != "github-actions" ]; then
                    echo "::error::Author '$AUTHOR' is not github-actions — aborting."
                    exit 1
                  fi

                  # Base branch check
                  if [ "$BASE" != "dev" ]; then
                    echo "::error::Base branch '$BASE' is not dev — aborting."
                    exit 1
                  fi

                  # Label check
                  if ! echo "$LABELS" | grep -qE "^(atomic|auto-pr)$"; then
                    echo "::error::Missing required label (atomic or auto-pr). Labels: $LABELS"
                    exit 1
                  fi

                  # Title check
                  TITLE_OK=false
                  for PREFIX in "chore(ows-" "chore(axum-" "chore(edge" "chore(discordsh" "chore(herbmail" "chore(cryptothrone" "chore(cityvote" "Atomic: kube"; do
                    if echo "$TITLE" | grep -q "^$PREFIX"; then
                      TITLE_OK=true
                      break
                    fi
                  done
                  if [ "$TITLE_OK" != "true" ]; then
                    echo "::error::Title '$TITLE' does not match any allowed prefix — aborting."
                    exit 1
                  fi

                  # File allowlist check
                  FILES=$(echo "$PR" | jq -r '.files[].path')
                  echo "Changed files:"
                  ALLOWED=true
                  while IFS= read -r f; do
                    case "$f" in
                      */version.toml|*/deployment.yaml|*/manifest/*.yaml)
                        echo "  OK: $f"
                        ;;
                      *)
                        echo "  BLOCKED: $f"
                        ALLOWED=false
                        ;;
                    esac
                  done <<< "$FILES"

                  if [ "$ALLOWED" != "true" ]; then
                    echo "::error::PR modifies files outside the allowlist — aborting."
                    exit 1
                  fi

                  echo "All checks passed."
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Approve PR
              run: gh pr review ${{ inputs.pr_number }} --approve --repo ${{ github.repository }}
              env:
                  GH_TOKEN: ${{ secrets.UNITY_PAT }}

            - name: Enable auto-merge
              run: gh pr merge ${{ inputs.pr_number }} --auto --squash --repo ${{ github.repository }}
              env:
                  GH_TOKEN: ${{ secrets.UNITY_PAT }}
