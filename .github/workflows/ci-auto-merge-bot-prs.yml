name: Auto-merge bot PRs

on:
    pull_request:
        types: [opened]

jobs:
    auto-merge:
        # Guard: only KBVE/kbve repo, only github-actions[bot], only targeting dev
        if: >-
            github.repository == 'KBVE/kbve' &&
            github.actor == 'github-actions[bot]' &&
            github.event.pull_request.base.ref == 'dev' &&
            (startsWith(github.event.pull_request.title, 'chore(ows-') ||
             startsWith(github.event.pull_request.title, 'chore(axum-') ||
             startsWith(github.event.pull_request.title, 'chore(edge') ||
             startsWith(github.event.pull_request.title, 'chore(discordsh') ||
             startsWith(github.event.pull_request.title, 'chore(herbmail') ||
             startsWith(github.event.pull_request.title, 'chore(cryptothrone') ||
             startsWith(github.event.pull_request.title, 'chore(cityvote') ||
             startsWith(github.event.pull_request.title, 'Atomic: kube'))
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout for file validation
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  fetch-depth: 2

            - name: Validate changed files
              id: validate
              run: |
                  # Only allow version.toml and deployment YAML changes
                  FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only --repo ${{ github.repository }})
                  echo "Changed files:"
                  echo "$FILES"

                  ALLOWED=true
                  while IFS= read -r f; do
                    case "$f" in
                      */version.toml|*/deployment.yaml|*/manifest/*.yaml)
                        echo "  OK: $f"
                        ;;
                      *)
                        echo "  BLOCKED: $f — not in allowlist"
                        ALLOWED=false
                        ;;
                    esac
                  done <<< "$FILES"

                  if [ "$ALLOWED" != "true" ]; then
                    echo "::error::PR modifies files outside the allowlist — skipping auto-merge."
                    exit 1
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Verify PR labels
              run: |
                  LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' --repo ${{ github.repository }})
                  if echo "$LABELS" | grep -qE "^(atomic|auto-pr)$"; then
                    echo "Label check passed: $LABELS"
                  else
                    echo "::error::PR missing required label (atomic or auto-pr). Labels: $LABELS"
                    exit 1
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Approve PR
              run: gh pr review ${{ github.event.pull_request.number }} --approve --repo ${{ github.repository }}
              env:
                  GH_TOKEN: ${{ secrets.UNITY_PAT }}

            - name: Enable auto-merge
              run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --repo ${{ github.repository }}
              env:
                  GH_TOKEN: ${{ secrets.UNITY_PAT }}
