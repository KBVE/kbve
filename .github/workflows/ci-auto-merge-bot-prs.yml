name: Auto-merge bot PRs

on:
    workflow_dispatch:
        inputs:
            pr_number:
                description: 'PR number to auto-merge'
                required: true
                type: string
    workflow_call:
        inputs:
            pr_number:
                description: 'PR number to auto-merge'
                required: true
                type: string

jobs:
    # ── Job 0: Quick author gate (skips entire workflow for non-bot PRs) ─────
    pre-check:
        if: github.repository == 'KBVE/kbve'
        runs-on: ubuntu-latest
        timeout-minutes: 2
        outputs:
            is_bot: ${{ steps.gate.outputs.is_bot }}
        steps:
            - name: Check PR author
              id: gate
              uses: actions/github-script@v9
              with:
                  script: |
                      const { data: pr } = await github.rest.pulls.get({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: parseInt('${{ inputs.pr_number }}'),
                      });
                      const author = pr.user.login;
                      const isBot = author === 'github-actions[bot]';
                      core.setOutput('is_bot', isBot ? 'true' : 'false');
                      if (!isBot) {
                        core.notice(`PR #${{ inputs.pr_number }} authored by '${author}' — skipping auto-merge (not a bot PR).`);
                      }

    # ── Job 1: Read-only validation (GITHUB_TOKEN only) ──────────────────────
    # Fetches PR metadata via API, validates against dispatch manifest.
    # No write permissions — cannot approve, merge, or modify anything.
    validate:
        needs: [pre-check]
        if: needs.pre-check.outputs.is_bot == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
            approved: ${{ steps.check.outputs.approved }}
            app_name: ${{ steps.check.outputs.app_name }}
        steps:
            - name: Checkout manifest
              uses: actions/checkout@v7
              with:
                  ref: dev
                  sparse-checkout: .github/ci-dispatch-manifest.json
                  sparse-checkout-cone-mode: false

            - name: Validate PR against manifest
              id: check
              uses: actions/github-script@v9
              with:
                  script: |
                      const fs = require('fs');
                      const prNumber = parseInt('${{ inputs.pr_number }}');

                      // Fetch PR data via API — no shell interpolation of untrusted fields
                      const { data: pr } = await github.rest.pulls.get({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: prNumber,
                      });
                      const { data: files } = await github.rest.pulls.listFiles({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: prNumber,
                      });

                      // Three-pass sanitizer (English ASCII only):
                      // Pass 1: reject non-ASCII entirely (Unicode homoglyphs, Arabic,
                      //         Cyrillic, CJK, RTL overrides, zero-width, punycode xn--)
                      // Pass 2 (blocklist): strip known-dangerous control characters
                      // Pass 3 (allowlist): strip anything not in the safe ASCII set
                      const sanitize = (s) => {
                        const asciiOnly = s.replace(/[^\x20-\x7E]/g, '');
                        const stripped = asciiOnly.replace(/[\u0000-\u001F\u007F-\u009F]/g, '');
                        return stripped.replace(/[^a-zA-Z0-9\-_.\/@: ()\[\]]/g, '');
                      };

                      // Sanitize and verify every field — reject if ANY field
                      // contained characters that were stripped. Also reject punycode.
                      const verifiedSanitize = (raw, fieldName) => {
                        // Reject punycode / IDN attacks
                        if (/xn--/i.test(raw)) {
                          core.setFailed(
                            `Field '${fieldName}' contains punycode/IDN pattern (xn--) — aborting.`
                          );
                          return null;
                        }
                        // Reject any non-ASCII (homoglyphs, RTL, zero-width, etc.)
                        if (/[^\x20-\x7E]/.test(raw)) {
                          core.setFailed(
                            `Field '${fieldName}' contains non-ASCII characters — only English ASCII allowed. ` +
                            `Raw bytes: ${JSON.stringify(raw)}`
                          );
                          return null;
                        }
                        const clean = sanitize(raw);
                        if (clean !== raw) {
                          core.setFailed(
                            `Field '${fieldName}' contains invalid characters — aborting. ` +
                            `Raw: '${JSON.stringify(raw)}' Clean: '${clean}'`
                          );
                          return null;
                        }
                        return clean;
                      };

                      const author = verifiedSanitize(pr.user.login, 'author');
                      if (author === null) return;
                      const base = verifiedSanitize(pr.base.ref, 'base');
                      if (base === null) return;
                      const title = verifiedSanitize(pr.title, 'title');
                      if (title === null) return;

                      const rawLabels = (pr.labels || []).map(l => l.name);
                      const labels = [];
                      for (const raw of rawLabels) {
                        const clean = verifiedSanitize(raw, `label '${sanitize(raw)}'`);
                        if (clean === null) return;
                        labels.push(clean);
                      }

                      const rawFiles = files.map(f => f.filename);
                      const changedFiles = [];
                      for (const raw of rawFiles) {
                        const clean = verifiedSanitize(raw, `file '${sanitize(raw)}'`);
                        if (clean === null) return;
                        changedFiles.push(clean);
                      }

                      core.info(`PR #${prNumber}: author=${author} base=${base} title=${title}`);
                      core.info(`Labels: ${labels.join(', ')}`);
                      core.info(`Changed files: ${changedFiles.join(', ')}`);

                      // 1. Author — only github-actions bot
                      if (author !== 'github-actions[bot]') {
                        core.setFailed(`Author '${author}' is not github-actions[bot]`);
                        return;
                      }

                      // 2. Base branch — only dev
                      if (base !== 'dev') {
                        core.setFailed(`Base branch '${base}' is not dev`);
                        return;
                      }

                      // 3. Labels — must have atomic or auto-pr
                      if (!labels.some(l => l === 'atomic' || l === 'auto-pr')) {
                        core.setFailed(`Missing required label (atomic or auto-pr). Labels: ${labels}`);
                        return;
                      }

                      // 4. Title — four supported patterns:
                      //    a) "Atomic: <APP> v<VER> ..." — post-publish sync (manifest-validated)
                      //    b) "chore(<PKG>): update version.toml to <VER>" — post-publish version sync
                      //    c) "deploy(<SCOPE>): ..." — automated deploy PRs (path-prefix-validated)
                      //    d) "chore(ci): sync ci-dispatch-manifest" — leading-edge manifest
                      //       regen (ci-manifest-sync.yml). Manifest-only; closes the publish
                      //       deadlock where a bumped MDX never triggers a publish because the
                      //       manifest that gates it is still stale.
                      const atomicMatch = title.match(/^Atomic:\s+(.+?)\s+v(\d+\.\d+\.\d+)/);
                      const choreMatch = title.match(/^chore\(([a-zA-Z0-9_-]+)\):\s+update version\.toml to (\d+\.\d+\.\d+)/);
                      const deployMatch = title.match(/^deploy\(([a-zA-Z0-9_-]+)\):/);
                      const manifestSyncMatch = title.match(/^chore\(ci\):\s+sync ci-dispatch-manifest$/);
                      const contentMatch = title.match(/^chore\(content\):\s+daily\s+([a-z0-9-]+)\s+scaffold$/);

                      if (!atomicMatch && !choreMatch && !deployMatch && !manifestSyncMatch && !contentMatch) {
                        core.setFailed(
                          `Title '${title}' does not match "Atomic: <app> v<semver> ...", ` +
                          `"chore(<pkg>): update version.toml to <semver>", ` +
                          `"deploy(<scope>): ...", ` +
                          `"chore(ci): sync ci-dispatch-manifest", ` +
                          `or "chore(content): daily <route> scaffold" — aborting.`
                        );
                        return;
                      }

                      let blocked = [];
                      // Shared identifier — set by whichever path matches
                      let appName = '';

                      if (atomicMatch || choreMatch) {
                        // --- Path A: post-publish sync (manifest-validated) ---
                        // Both "Atomic: <app> v<ver>" and "chore(<pkg>): update version.toml to <ver>"
                        // follow the same validation — look up the app/package in the manifest.
                        appName = atomicMatch ? atomicMatch[1] : choreMatch[1];
                        core.info(`[post-publish] Extracted app name: '${appName}'`);

                        const manifestPath = '.github/ci-dispatch-manifest.json';
                        if (!fs.existsSync(manifestPath)) {
                          core.setFailed(`Manifest not found at ${manifestPath}`);
                          return;
                        }
                        const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

                        const allEntries = [
                          ...(manifest.docker || []),
                          ...(manifest.npm || []),
                          ...(manifest.crates || []),
                          ...(manifest.python || []),
                          ...(manifest.unreal || []),
                          ...(manifest.ue5_server || []),
                          ...(manifest.unreal_game || []),
                          ...(manifest.unity || []),
                          ...(manifest.godot || []),
                          ...(manifest.bevy_game || []),
                          ...(manifest.vite_game || []),
                        ];
                        const entry = allEntries.find(
                          e => e.app_name === appName || e.package_name === appName
                        );

                        if (!entry) {
                          core.setFailed(`App '${appName}' not found in dispatch manifest`);
                          return;
                        }
                        core.info(`Found '${appName}' in manifest (pipeline: ${entry.pipeline})`);

                        // utils-post-publish.yml + utils-update-version-toml.yml
                        // both bump Cargo.lock alongside Cargo.toml for crate
                        // releases so fresh checkouts don't regenerate the
                        // lock on the first `cargo` run. Allow it here when
                        // the app's version_target is a Cargo.toml — without
                        // this gate, post-publish atom PRs for any axum/bevy
                        // crate fail validation on the lockfile.
                        const versionTargetIsCargo =
                          typeof entry.version_target === 'string' &&
                          entry.version_target.endsWith('Cargo.toml');

                        const allowedFiles = new Set(
                          [
                            entry.version_toml,
                            entry.version_target,
                            entry.deployment_yaml,
                            ...(Array.isArray(entry.deployment_yamls) ? entry.deployment_yamls : []),
                            '.github/ci-dispatch-manifest.json',
                            ...(versionTargetIsCargo ? ['Cargo.lock'] : []),
                          ]
                            .filter(Boolean)
                            .map(sanitize)
                        );
                        core.info(`Allowed files: ${[...allowedFiles].join(', ')}`);

                        if (allowedFiles.size === 0) {
                          core.setFailed(`App '${appName}' has no tracked files in manifest`);
                          return;
                        }

                        blocked = changedFiles.filter(f => !allowedFiles.has(f));
                      } else if (manifestSyncMatch) {
                        // --- Path C: leading-edge manifest sync (manifest-only) ---
                        // ci-manifest-sync.yml regenerates the dispatch manifest on
                        // dev when the MDX bumps a version the stale manifest hasn't
                        // caught up to. The ONLY permitted change is the manifest file
                        // itself — anything else is out of scope and blocks.
                        appName = 'ci-dispatch-manifest';
                        core.info('[manifest-sync] manifest-only regen PR');
                        const allowedFiles = new Set(
                          ['.github/ci-dispatch-manifest.json'].map(sanitize)
                        );
                        blocked = changedFiles.filter(f => !allowedFiles.has(f));
                      } else if (deployMatch) {
                        // --- Path B: deploy PRs (path-prefix-validated) ---
                        // Allowed deploy scopes and their permitted file prefixes.
                        // Each scope maps to a directory — all files must be under it.
                        const deployAllowlist = {
                          'isometric': 'apps/kbve/astro-kbve/public/isometric/',
                        };

                        const scope = deployMatch[1];
                        appName = `deploy:${scope}`;
                        core.info(`[deploy] Extracted scope: '${scope}'`);

                        const allowedPrefix = deployAllowlist[scope];
                        if (!allowedPrefix) {
                          core.setFailed(
                            `Deploy scope '${scope}' is not in the allowlist. ` +
                            `Allowed: ${Object.keys(deployAllowlist).join(', ')}`
                          );
                          return;
                        }
                        core.info(`[deploy] Allowed prefix: '${allowedPrefix}'`);

                        blocked = changedFiles.filter(f => !f.startsWith(allowedPrefix));
                      } else {
                        // --- Path D: daily content routes (path-prefix-validated) ---
                        // kbve.nx router→builder (ci-daily-content.yml) generates docs
                        // MDX + companion JSON. All changed files must live under the
                        // content docs tree or the public nx-data dir — nothing else.
                        const route = contentMatch[1];
                        appName = `content:${route}`;
                        core.info(`[content] Extracted route: '${route}'`);

                        const allowedPrefixes = [
                          'apps/kbve/astro-kbve/src/content/docs/',
                          'apps/kbve/astro-kbve/public/data/nx/',
                        ];
                        core.info(`[content] Allowed prefixes: ${allowedPrefixes.join(', ')}`);

                        blocked = changedFiles.filter(
                          f => !allowedPrefixes.some(p => f.startsWith(p))
                        );
                      }
                      if (blocked.length > 0) {
                        core.setFailed(
                          `PR modifies files not in manifest for '${appName}': ${blocked.join(', ')}`
                        );
                        return;
                      }

                      for (const f of changedFiles) {
                        core.info(`  OK: ${f}`);
                      }

                      core.info(`All manifest-driven checks passed for '${appName}'.`);
                      core.setOutput('approved', 'true');
                      core.setOutput('app_name', appName);

    # ── Job 2: Approve + merge (UNITY_PAT, gated on validation) ──────────────
    # Only runs when validation job explicitly outputs approved=true.
    # UNITY_PAT is never exposed to the validation logic.
    merge:
        needs: [validate]
        if: needs.validate.outputs.approved == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Approve PR
              uses: actions/github-script@v9
              with:
                  github-token: ${{ secrets.UNITY_PAT }}
                  script: |
                      const prNumber = parseInt('${{ inputs.pr_number }}');
                      const appName = '${{ needs.validate.outputs.app_name }}';

                      await github.rest.pulls.createReview({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: prNumber,
                        event: 'APPROVE',
                        body: `Auto-approved — \`${appName}\` is registered in dispatch manifest.`,
                      });
                      core.info(`PR #${prNumber} approved for ${appName}`);

            - name: Enable auto-merge
              uses: actions/github-script@v9
              with:
                  github-token: ${{ secrets.UNITY_PAT }}
                  script: |
                      const prNumber = parseInt('${{ inputs.pr_number }}');

                      try {
                        await github.rest.pulls.enableAutoMerge({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: prNumber,
                          merge_method: 'squash',
                        });
                        core.info(`Auto-merge (squash) enabled for PR #${prNumber}`);
                      } catch (err) {
                        core.info(`enableAutoMerge unavailable (${err.message}), attempting direct merge`);

                        const attempts = [0, 60, 120, 120];
                        let merged = false;
                        let lastErr = null;
                        for (let i = 0; i < attempts.length; i++) {
                          if (attempts[i] > 0) {
                            core.info(`Waiting ${attempts[i]}s before retry ${i}/${attempts.length - 1}…`);
                            await new Promise(r => setTimeout(r, attempts[i] * 1000));
                          }
                          try {
                            await github.rest.pulls.merge({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              pull_number: prNumber,
                              merge_method: 'squash',
                            });
                            core.info(`PR #${prNumber} squash-merged directly (attempt ${i + 1}).`);
                            merged = true;
                            break;
                          } catch (mergeErr) {
                            lastErr = mergeErr;
                            const status = mergeErr.status ?? mergeErr.response?.status;
                            const transient = status === 405 || status === 409 || status === 422;
                            if (!transient || i === attempts.length - 1) {
                              throw mergeErr;
                            }
                            core.warning(`Merge attempt ${i + 1} failed (status ${status}): ${mergeErr.message}. Retrying…`);
                          }
                        }
                        if (!merged) throw lastErr;
                      }

    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') }}
        needs: [pre-check, validate, merge]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'Auto-merge bot PRs'
            job_name: 'auto-merge'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'

    track_success:
        name: Track Success
        if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        needs: [pre-check, validate, merge]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'Auto-merge bot PRs'
            job_name: 'auto-merge'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'success'
