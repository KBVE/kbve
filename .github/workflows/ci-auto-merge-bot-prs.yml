name: Auto-merge bot PRs

on:
    workflow_dispatch:
        inputs:
            pr_number:
                description: 'PR number to auto-merge'
                required: true
                type: string
    workflow_call:
        inputs:
            pr_number:
                description: 'PR number to auto-merge'
                required: true
                type: string

jobs:
    auto-merge:
        if: github.repository == 'KBVE/kbve'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout manifest
              uses: actions/checkout@v6
              with:
                  ref: dev
                  sparse-checkout: .github/ci-dispatch-manifest.json
                  sparse-checkout-cone-mode: false

            - name: Validate PR against manifest
              id: validate
              run: |
                  PR=$(gh pr view ${{ inputs.pr_number }} --json author,baseRefName,labels,title,files --repo ${{ github.repository }})

                  AUTHOR=$(echo "$PR" | jq -r '.author.login')
                  BASE=$(echo "$PR" | jq -r '.baseRefName')
                  TITLE=$(echo "$PR" | jq -r '.title')
                  LABELS=$(echo "$PR" | jq -r '.labels[].name' 2>/dev/null)

                  echo "PR #${{ inputs.pr_number }}: author=$AUTHOR base=$BASE title=$TITLE"

                  # Author check — only github-actions bot
                  if [ "$AUTHOR" != "github-actions" ]; then
                    echo "::error::Author '$AUTHOR' is not github-actions — aborting."
                    exit 1
                  fi

                  # Base branch check — only dev
                  if [ "$BASE" != "dev" ]; then
                    echo "::error::Base branch '$BASE' is not dev — aborting."
                    exit 1
                  fi

                  # Label check — must have atomic or auto-pr
                  if ! echo "$LABELS" | grep -qE "^(atomic|auto-pr)$"; then
                    echo "::error::Missing required label (atomic or auto-pr). Labels: $LABELS"
                    exit 1
                  fi

                  # Title must match post-publish pattern: "Atomic: <APP> v<VER> post-publish sync"
                  if ! echo "$TITLE" | grep -qE "^Atomic: .+ v[0-9]"; then
                    echo "::error::Title '$TITLE' does not match expected pattern — aborting."
                    exit 1
                  fi

                  # Extract app name from title
                  APP_NAME=$(echo "$TITLE" | sed -n 's/^Atomic: \(.*\) v[0-9].*/\1/p')
                  echo "Extracted app name: '$APP_NAME'"

                  if [ -z "$APP_NAME" ]; then
                    echo "::error::Could not extract app name from title — aborting."
                    exit 1
                  fi

                  # Build allowed-file set from manifest for this app
                  MANIFEST=".github/ci-dispatch-manifest.json"
                  if [ ! -f "$MANIFEST" ]; then
                    echo "::error::Manifest not found at $MANIFEST — aborting."
                    exit 1
                  fi

                  # Search all pipeline arrays for this app_name or package_name
                  ENTRY=$(jq -r --arg app "$APP_NAME" '
                    [.docker[]?, .npm[]?, .crates[]?, .python[]?, .unreal[]?]
                    | map(select(.app_name == $app or .package_name == $app))
                    | first // empty
                  ' "$MANIFEST")

                  if [ -z "$ENTRY" ] || [ "$ENTRY" = "null" ]; then
                    echo "::error::App '$APP_NAME' not found in dispatch manifest — aborting."
                    exit 1
                  fi

                  echo "Found app in manifest: $APP_NAME"

                  # Collect all known paths for this app from the manifest
                  ALLOWED_FILES=$(echo "$ENTRY" | jq -r '[
                    .version_toml // empty,
                    .version_target // empty,
                    .deployment_yaml // empty
                  ] | map(select(. != "")) | .[]')

                  echo "Allowed files from manifest:"
                  echo "$ALLOWED_FILES" | while read -r af; do echo "  $af"; done

                  # Validate every changed file is in the allowed set
                  FILES=$(echo "$PR" | jq -r '.files[].path')
                  echo "Changed files:"
                  ALL_OK=true
                  while IFS= read -r f; do
                    MATCH=false
                    while IFS= read -r allowed; do
                      if [ "$f" = "$allowed" ]; then
                        MATCH=true
                        break
                      fi
                    done <<< "$ALLOWED_FILES"
                    if [ "$MATCH" = "true" ]; then
                      echo "  OK: $f"
                    else
                      echo "  BLOCKED: $f (not in manifest for $APP_NAME)"
                      ALL_OK=false
                    fi
                  done <<< "$FILES"

                  if [ "$ALL_OK" != "true" ]; then
                    echo "::error::PR modifies files not registered in manifest for '$APP_NAME' — aborting."
                    exit 1
                  fi

                  echo "All manifest-driven checks passed for '$APP_NAME'."
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Approve PR
              run: gh pr review ${{ inputs.pr_number }} --approve --body "Auto-approved — app registered in dispatch manifest." --repo ${{ github.repository }}
              env:
                  GH_TOKEN: ${{ secrets.UNITY_PAT }}

            - name: Enable auto-merge
              run: gh pr merge ${{ inputs.pr_number }} --auto --squash --repo ${{ github.repository }}
              env:
                  GH_TOKEN: ${{ secrets.UNITY_PAT }}
