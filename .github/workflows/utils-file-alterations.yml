name: File Alterations

on:
    workflow_call:
        inputs:
            branch:
                description: 'Branch to check out'
                required: false
                type: string
                default: 'main'

        outputs:
            # ? Rust
            q_crate:
                description: 'Q package changed'
                value: ${{ jobs.alter.outputs.q_crate }}
            jedi_crate:
                description: 'Jedi package changed'
                value: ${{ jobs.alter.outputs.jedi_crate }}
            soul_crate:
                description: 'Soul package changed'
                value: ${{ jobs.alter.outputs.soul_crate }}
            kbve_crate:
                description: 'KBVE Crate package changed'
                value: ${{ jobs.alter.outputs.kbve_crate }}
            erust_crate:
                description: 'ERust Crate package changed'
                value: ${{ jobs.alter.outputs.erust_crate }}
            holy_crate:
                description: 'Holy Crate package changed'
                value: ${{ jobs.alter.outputs.holy_crate }}
            # ? Bevy Crates
            bevy_battle_crate:
                description: 'bevy_battle crate changed'
                value: ${{ jobs.alter.outputs.bevy_battle_crate }}
            bevy_cam_crate:
                description: 'bevy_cam crate changed'
                value: ${{ jobs.alter.outputs.bevy_cam_crate }}
            bevy_inventory_crate:
                description: 'bevy_inventory crate changed'
                value: ${{ jobs.alter.outputs.bevy_inventory_crate }}
            bevy_items_crate:
                description: 'bevy_items crate changed'
                value: ${{ jobs.alter.outputs.bevy_items_crate }}
            bevy_kbve_net_crate:
                description: 'bevy_kbve_net crate changed'
                value: ${{ jobs.alter.outputs.bevy_kbve_net_crate }}
            bevy_mapdb_crate:
                description: 'bevy_mapdb crate changed'
                value: ${{ jobs.alter.outputs.bevy_mapdb_crate }}
            bevy_npc_crate:
                description: 'bevy_npc crate changed'
                value: ${{ jobs.alter.outputs.bevy_npc_crate }}
            bevy_player_crate:
                description: 'bevy_player crate changed'
                value: ${{ jobs.alter.outputs.bevy_player_crate }}
            bevy_quests_crate:
                description: 'bevy_quests crate changed'
                value: ${{ jobs.alter.outputs.bevy_quests_crate }}
            bevy_skills_crate:
                description: 'bevy_skills crate changed'
                value: ${{ jobs.alter.outputs.bevy_skills_crate }}
            bevy_statemachine_crate:
                description: 'bevy_statemachine crate changed'
                value: ${{ jobs.alter.outputs.bevy_statemachine_crate }}
            bevy_tasker_crate:
                description: 'bevy_tasker crate changed'
                value: ${{ jobs.alter.outputs.bevy_tasker_crate }}
            # ? Docker
            kilobase:
                description: 'Kilobase package changed'
                value: ${{ jobs.alter.outputs.kilobase }}
            # NOTE: Atlas has been migrated into pydesk. Disabled.
            # py_atlas:
            #   description: "Atlas changed"
            #   value: ${{ jobs.alter.outputs.py_atlas }}
            py_lib_fudster:
                description: 'Python Fudster library changed'
                value: ${{ jobs.alter.outputs.py_lib_fudster }}
            py_lib_kbve:
                description: 'Python KBVE library changed'
                value: ${{ jobs.alter.outputs.py_lib_kbve }}
            # ? Astro
            astro_kbve:
                description: 'KBVE.com changed'
                value: ${{ jobs.alter.outputs.astro_kbve }}
            chuckrpg:
                description: 'ChuckRPG app changed'
                value: ${{ jobs.alter.outputs.chuckrpg }}
            astro_herbmail:
                description: 'Herbmail.com changed'
                value: ${{ jobs.alter.outputs.astro_herbmail }}
            herbmail:
                description: 'Herbmail app changed'
                value: ${{ jobs.alter.outputs.herbmail }}
            memes:
                description: 'Memes app changed'
                value: ${{ jobs.alter.outputs.memes }}
            irc_gateway:
                description: 'IRC Gateway changed'
                value: ${{ jobs.alter.outputs.irc_gateway }}
            # ? NPM
            droid:
                description: 'Droid Package changed'
                value: ${{ jobs.alter.outputs.droid }}
            discordsh:
                description: 'Discordsh app changed'
                value: ${{ jobs.alter.outputs.discordsh }}
            discordsh_bot:
                description: 'Discordsh Bot changed'
                value: ${{ jobs.alter.outputs.discordsh_bot }}
            proxy:
                description: 'Proxy changed'
                value: ${{ jobs.alter.outputs.proxy }}
            saber:
                description: 'Saber changed'
                value: ${{ jobs.alter.outputs.saber }}
            cryptothrone:
                description: 'CryptoThrone changed'
                value: ${{ jobs.alter.outputs.cryptothrone }}
            docker_void:
                description: 'Dockervoid changed'
                value: ${{ jobs.alter.outputs.docker_void }}
            khashvault:
                description: 'Khashvault changed'
                value: ${{ jobs.alter.outputs.khashvault }}
            devops:
                description: 'DevOps changed'
                value: ${{ jobs.alter.outputs.devops }}
            laser:
                description: 'Laser package changed'
                value: ${{ jobs.alter.outputs.laser }}
            worker:
                description: 'Worker changed'
                value: ${{ jobs.alter.outputs.worker }}
            edge:
                description: 'Edge functions changed'
                value: ${{ jobs.alter.outputs.edge }}
            # ? Bevy
            isometric:
                description: 'Isometric game changed'
                value: ${{ jobs.alter.outputs.isometric }}
            # ? Unreal
            ue_devops:
                description: 'UEDevOps plugin changed'
                value: ${{ jobs.alter.outputs.ue_devops }}
            ue_kbvewasm:
                description: 'KBVEWASM plugin changed'
                value: ${{ jobs.alter.outputs.ue_kbvewasm }}
            ue_kbvexxhash:
                description: 'KBVEXXHash plugin changed'
                value: ${{ jobs.alter.outputs.ue_kbvexxhash }}
            ue_kbveyyjson:
                description: 'KBVEYYJson plugin changed'
                value: ${{ jobs.alter.outputs.ue_kbveyyjson }}
            ue_kbvezstd:
                description: 'KBVEZstd plugin changed'
                value: ${{ jobs.alter.outputs.ue_kbvezstd }}
            ue_kbvesqlite:
                description: 'KBVESQLite plugin changed'
                value: ${{ jobs.alter.outputs.ue_kbvesqlite }}

jobs:
    alter:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        name: File Alterations
        outputs:
            q_crate: ${{ steps.delta.outputs.q_crate_any_changed }}
            jedi_crate: ${{ steps.delta.outputs.jedi_crate_any_changed }}
            soul_crate: ${{ steps.delta.outputs.soul_crate_any_changed }}
            kbve_crate: ${{ steps.delta.outputs.kbve_crate_any_changed_files }}
            erust_crate: ${{ steps.delta.outputs.erust_crate_any_changed }}
            holy_crate: ${{ steps.delta.outputs.holy_crate_any_changed }}
            bevy_battle_crate: ${{ steps.delta.outputs.bevy_battle_crate_any_changed }}
            bevy_cam_crate: ${{ steps.delta.outputs.bevy_cam_crate_any_changed }}
            bevy_inventory_crate: ${{ steps.delta.outputs.bevy_inventory_crate_any_changed }}
            bevy_items_crate: ${{ steps.delta.outputs.bevy_items_crate_any_changed }}
            bevy_kbve_net_crate: ${{ steps.delta.outputs.bevy_kbve_net_crate_any_changed }}
            bevy_mapdb_crate: ${{ steps.delta.outputs.bevy_mapdb_crate_any_changed }}
            bevy_npc_crate: ${{ steps.delta.outputs.bevy_npc_crate_any_changed }}
            bevy_player_crate: ${{ steps.delta.outputs.bevy_player_crate_any_changed }}
            bevy_quests_crate: ${{ steps.delta.outputs.bevy_quests_crate_any_changed }}
            bevy_skills_crate: ${{ steps.delta.outputs.bevy_skills_crate_any_changed }}
            bevy_statemachine_crate: ${{ steps.delta.outputs.bevy_statemachine_crate_any_changed }}
            bevy_tasker_crate: ${{ steps.delta.outputs.bevy_tasker_crate_any_changed }}
            kilobase: ${{ steps.delta.outputs.kilobase_any_changed }}
            # py_atlas: ${{ steps.delta.outputs.py_atlas_any_changed }}  # Atlas migrated into pydesk
            py_lib_fudster: ${{ steps.delta.outputs.py_lib_fudster_any_changed }}
            py_lib_kbve: ${{ steps.delta.outputs.py_lib_kbve_any_changed }}
            astro_kbve: ${{ steps.delta.outputs.astro_kbve_any_changed }}
            chuckrpg: ${{ steps.delta.outputs.chuckrpg_any_changed }}
            astro_herbmail: ${{ steps.delta.outputs.astro_herbmail_any_changed }}
            herbmail: ${{ steps.delta.outputs.herbmail_any_changed }}
            memes: ${{ steps.delta.outputs.memes_any_changed }}
            irc_gateway: ${{ steps.delta.outputs.irc_gateway_any_changed }}
            droid: ${{ steps.delta.outputs.droid_any_changed }}
            discordsh: ${{ steps.delta.outputs.discordsh_any_changed}}
            discordsh_bot: ${{ steps.delta.outputs.discordsh_bot_any_changed }}
            proxy: ${{ steps.delta.outputs.proxy_any_changed }}
            saber: ${{ steps.delta.outputs.saber_any_changed }}
            cryptothrone: ${{ steps.delta.outputs.cryptothrone_any_changed }}
            docker_void: ${{ steps.delta.outputs.docker_void_any_changed }}
            khashvault: ${{ steps.delta.outputs.khashvault_any_changed }}
            devops: ${{ steps.delta.outputs.devops_any_changed }}
            laser: ${{ steps.delta.outputs.laser_any_changed }}
            edge: ${{ steps.delta.outputs.edge_any_changed }}
            isometric: ${{ steps.delta.outputs.isometric_any_changed }}
            ue_devops: ${{ steps.delta.outputs.ue_devops_any_changed }}
            ue_kbvewasm: ${{ steps.delta.outputs.ue_kbvewasm_any_changed }}
            ue_kbvexxhash: ${{ steps.delta.outputs.ue_kbvexxhash_any_changed }}
            ue_kbveyyjson: ${{ steps.delta.outputs.ue_kbveyyjson_any_changed }}
            ue_kbvezstd: ${{ steps.delta.outputs.ue_kbvezstd_any_changed }}
            ue_kbvesqlite: ${{ steps.delta.outputs.ue_kbvesqlite_any_changed }}

        steps:
            - name: Checkout the repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: File Changes
              id: delta
              uses: step-security/changed-files@v47
              with:
                  files_yaml: |
                      q_crate:
                          - 'packages/rust/q/README.md'
                      jedi_crate:
                          - 'packages/rust/jedi/README.md'
                      soul_crate:
                          - 'packages/rust/soul/src/**'
                      kbve_crate:
                          - 'packages/rust/kbve/src/**'
                      erust_crate:
                          - 'packages/rust/erust/src/**'
                      holy_crate:
                          - 'packages/rust/holy/src/**'
                      bevy_battle_crate:
                          - 'packages/rust/bevy/bevy_battle/src/**'
                      bevy_cam_crate:
                          - 'packages/rust/bevy/bevy_cam/src/**'
                      bevy_inventory_crate:
                          - 'packages/rust/bevy/bevy_inventory/src/**'
                      bevy_items_crate:
                          - 'packages/rust/bevy/bevy_items/src/**'
                      bevy_kbve_net_crate:
                          - 'packages/rust/bevy/bevy_kbve_net/src/**'
                      bevy_mapdb_crate:
                          - 'packages/rust/bevy/bevy_mapdb/src/**'
                      bevy_npc_crate:
                          - 'packages/rust/bevy/bevy_npc/src/**'
                      bevy_player_crate:
                          - 'packages/rust/bevy/bevy_player/src/**'
                      bevy_quests_crate:
                          - 'packages/rust/bevy/bevy_quests/src/**'
                      bevy_skills_crate:
                          - 'packages/rust/bevy/bevy_skills/src/**'
                      bevy_statemachine_crate:
                          - 'packages/rust/bevy/bevy_statemachine/src/**'
                      bevy_tasker_crate:
                          - 'packages/rust/bevy/bevy_tasker/src/**'
                      kilobase:
                          -  'apps/kbve/kilobase/README.md'
                      droid:
                          - 'packages/npm/droid/README.md'
                      # py_atlas:  # Atlas migrated into pydesk
                      #     - 'apps/atlas/kbve_atlas/**'
                      py_lib_fudster:
                          - 'packages/python/fudster/fudster/**'
                      py_lib_kbve:
                          - 'packages/python/kbve/kbve/**'
                      chuckrpg:
                          - 'apps/chuckrpg/**'
                          - 'apps/kbve/astro-kbve/src/content/docs/project/chuckrpg.mdx'
                      astro_herbmail:
                          - 'apps/herbmail/README.md'
                      herbmail:
                          - 'apps/herbmail/**'
                      memes:
                          - 'apps/memes/**'
                      irc_gateway:
                          - 'apps/irc/**'
                      mc:
                          - 'apps/mc/**'
                      discordsh:
                          - 'apps/discordsh/**'
                      discordsh_bot:
                          - 'apps/discordsh/discordsh-bot/**'
                      proxy:
                          - 'apps/proxy/**'
                      saber:
                          - 'apps/saber/**'
                      dockervoid:
                          - 'migrations/docker/v01d/**'
                      khashvault:
                          - 'packages/khashvault/package.json'
                      devops:
                          - 'packages/npm/devops/package.json'
                      astro_kbve:
                          - 'apps/kbve/astro-kbve/**'
                          - 'apps/kbve/axum-kbve/**'
                          - 'packages/npm/astro/**'
                          - 'packages/npm/droid/**'
                          - 'packages/npm/laser/**'
                      cryptothrone:
                          - 'apps/cryptothrone/**'
                      laser:
                          - 'packages/npm/laser/package.json'
                      edge:
                          - 'apps/kbve/edge/functions/**'
                          - 'apps/kbve/edge/Dockerfile'
                          - 'apps/kbve/edge/project.json'
                          - 'apps/kbve/edge/deno.json'
                          - 'apps/kbve/edge/version.toml'
                      ows_publicapi:
                          - 'apps/ows/**'
                          - 'apps/kbve/astro-kbve/src/content/docs/project/ows-publicapi.mdx'
                      ows_instancemanagement:
                          - 'apps/ows/**'
                          - 'apps/kbve/astro-kbve/src/content/docs/project/ows-instancemanagement.mdx'
                      ows_characterpersistence:
                          - 'apps/ows/**'
                          - 'apps/kbve/astro-kbve/src/content/docs/project/ows-characterpersistence.mdx'
                      ows_globaldata:
                          - 'apps/ows/**'
                          - 'apps/kbve/astro-kbve/src/content/docs/project/ows-globaldata.mdx'
                      ows_management:
                          - 'apps/ows/**'
                          - 'apps/kbve/astro-kbve/src/content/docs/project/ows-management.mdx'
                      isometric:
                          - 'apps/kbve/isometric/src/**'
                          - 'apps/kbve/isometric/public/**'
                          - 'apps/kbve/isometric/src-tauri/src/**'
                          - 'apps/kbve/isometric/src-tauri/Cargo.toml'
                          - 'apps/kbve/isometric/src-tauri/.cargo/**'
                          - 'apps/kbve/isometric/src-tauri/rust-toolchain.toml'
                          - 'apps/kbve/isometric/src-tauri/tauri.conf.json'
                          - 'apps/kbve/isometric/package.json'
                          - 'apps/kbve/isometric/vite.config.ts'
                          - 'packages/rust/bevy/bevy_tasker/**'
                      ue_devops:
                          - 'packages/unreal/UEDevOps/Source/**'
                          - 'packages/unreal/UEDevOps/UEDevOps.uplugin'
                      ue_kbvewasm:
                          - 'packages/unreal/KBVEWASM/Source/**'
                          - 'packages/unreal/KBVEWASM/KBVEWASM.uplugin'
                      ue_kbvexxhash:
                          - 'packages/unreal/KBVEXXHash/Source/**'
                          - 'packages/unreal/KBVEXXHash/KBVEXXHash.uplugin'
                      ue_kbveyyjson:
                          - 'packages/unreal/KBVEYYJson/Source/**'
                          - 'packages/unreal/KBVEYYJson/KBVEYYJson.uplugin'
                      ue_kbvezstd:
                          - 'packages/unreal/KBVEZstd/Source/**'
                          - 'packages/unreal/KBVEZstd/KBVEZstd.uplugin'
                      ue_kbvesqlite:
                          - 'packages/unreal/KBVESQLite/Source/**'
                          - 'packages/unreal/KBVESQLite/KBVESQLite.uplugin'
