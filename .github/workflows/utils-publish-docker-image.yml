name: Docker Image Publish

on:
    workflow_call:
        inputs:
            project:
                required: true
                type: string
            target:
                required: true
                type: string
            image:
                required: false
                type: string
                default: ''
            cargo_toml:
                description: 'Path to TOML file with version = "x.y.z" (Cargo.toml or version.toml)'
                required: false
                type: string
                default: ''
            branch:
                required: false
                type: string
                default: main
            version_source:
                description: 'Path to MDX/JSON file with version field (for pre-build sync)'
                required: false
                type: string
                default: ''
            version_target:
                description: 'Path to Cargo.toml/package.json to write version into before build'
                required: false
                type: string
                default: ''
            source_path:
                description: 'Project source path (e.g. apps/cryptothrone). Used to detect Forgejo LFS assets for the rebuild fallback.'
                required: false
                type: string
                default: ''
        secrets:
            MY_GITHUB_TOKEN:
                required: true
            FORGEJO_USER:
                required: false
            FORGEJO_TOKEN:
                required: false

jobs:
    publish:
        runs-on: ubuntu-latest
        timeout-minutes: 60
        env:
            NX_NO_CLOUD: true
        permissions:
            contents: read
            packages: write

        steps:
            - name: Free disk space
              uses: jlumbroso/free-disk-space@main
              with:
                  tool-cache: false
                  android: true
                  dotnet: true
                  haskell: true
                  large-packages: false
                  swap-storage: false
                  docker-images: true

            - name: Checkout Repository
              uses: actions/checkout@v7
              continue-on-error: true
              with:
                  ref: ${{ inputs.branch }}

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.MY_GITHUB_TOKEN }}

            - name: Check version against GHCR
              id: version_check
              if: ${{ inputs.image != '' && inputs.cargo_toml != '' }}
              run: |
                  CARGO_TOML="${{ inputs.cargo_toml }}"
                  case "$CARGO_TOML" in
                    *.json) LOCAL_VERSION=$(jq -r '.version // "0.0.0"' "$CARGO_TOML" 2>/dev/null) ;;
                    *.mdx)  LOCAL_VERSION=$(sed -n 's/^version: *"\([^"]*\)"/\1/p' "$CARGO_TOML" | head -1) ;;
                    *)      LOCAL_VERSION=$(grep -m1 '^version' "$CARGO_TOML" | sed 's/version = "\(.*\)"/\1/') ;;
                  esac
                  echo "Local version: $LOCAL_VERSION"

                  IMAGE="${{ inputs.image }}"
                  GHCR_IMAGE="ghcr.io/${IMAGE#ghcr.io/}"

                  echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"

                  if docker manifest inspect "${GHCR_IMAGE}:${LOCAL_VERSION}" >/dev/null 2>&1; then
                    echo "Tag $LOCAL_VERSION already exists on GHCR — skipping."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "Tag $LOCAL_VERSION not found on GHCR — publishing."
                    echo "should_publish=true" >> "$GITHUB_OUTPUT"
                  fi

            # --- Promote CI image (build-once pattern) ---
            # Try to pull the CI-tagged image pushed by the test job.
            # If found, retag it for release and skip the full rebuild.

            - name: Promote CI image (skip rebuild)
              id: promote
              if: ${{ steps.version_check.outputs.should_publish != 'false' && inputs.image != '' && inputs.cargo_toml != '' }}
              run: |
                  SHORT_SHA="${GITHUB_SHA::8}"
                  CI_IMAGE="ghcr.io/${{ inputs.image }}:ci-${SHORT_SHA}"
                  echo "Attempting to pull CI image: ${CI_IMAGE}"
                  if docker pull "${CI_IMAGE}" 2>/dev/null; then
                    echo "found=true" >> "$GITHUB_OUTPUT"
                    CARGO_TOML="${{ inputs.cargo_toml }}"
                    case "$CARGO_TOML" in
                      *.json) LOCAL_VERSION=$(jq -r '.version // "0.0.0"' "$CARGO_TOML" 2>/dev/null) ;;
                      *.mdx)  LOCAL_VERSION=$(sed -n 's/^version: *"\([^"]*\)"/\1/p' "$CARGO_TOML" | head -1) ;;
                      *)      LOCAL_VERSION=$(grep -m1 '^version' "$CARGO_TOML" | sed 's/version = "\(.*\)"/\1/') ;;
                    esac

                    docker tag "${CI_IMAGE}" "ghcr.io/${{ inputs.image }}:latest"
                    docker tag "${CI_IMAGE}" "ghcr.io/${{ inputs.image }}:${LOCAL_VERSION}"
                    echo "Promoted ${CI_IMAGE} → ghcr.io/${{ inputs.image }}:{latest,${LOCAL_VERSION}}"
                  else
                    echo "CI image not found, will build from scratch"
                    echo "found=false" >> "$GITHUB_OUTPUT"
                  fi

            # --- Full build path (fallback when no CI image available) ---

            - name: Setup Node v24
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' }}
              uses: actions/setup-node@v7
              with:
                  node-version: 24

            - name: Setup pnpm v10
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' }}
              uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0
                  run_install: false

            - name: Get pnpm Store
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' }}
              id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm Cache
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' }}
              uses: actions/cache@v6
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install pnpm Dependencies
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' }}
              run: pnpm install --frozen-lockfile
              env:
                  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

            - name: Set up QEMU
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' }}
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' }}
              uses: Wandalen/wretry.action@v3.8.0
              with:
                  action: docker/setup-buildx-action@v4
                  attempt_limit: 3
                  attempt_delay: 15000

            - name: Sync version from MDX to build manifest
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' && inputs.version_source != '' && inputs.version_target != '' }}
              run: |
                  SRC="${{ inputs.version_source }}"
                  TGT="${{ inputs.version_target }}"
                  case "$SRC" in
                    *.mdx) VER=$(sed -n 's/^version: *"\([^"]*\)"/\1/p' "$SRC" | head -1) ;;
                    *.json) VER=$(jq -r '.version // ""' "$SRC" 2>/dev/null) ;;
                    *) VER="" ;;
                  esac
                  if [ -n "$VER" ]; then
                    sed -i "s/^version = .*/version = \"${VER}\"/" "$TGT"
                    echo "Synced version ${VER} → ${TGT}"
                  fi

            - name: Detect Forgejo LFS assets
              id: lfs_detect
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' }}
              run: |
                  SCOPE="${{ inputs.source_path }}"
                  if [ -n "$SCOPE" ] && git lfs ls-files -I "$SCOPE/**" 2>/dev/null | grep -q .; then
                    echo "uses_lfs=true" >> "$GITHUB_OUTPUT"
                    echo "Forgejo LFS assets present under $SCOPE"
                  else
                    echo "uses_lfs=false" >> "$GITHUB_OUTPUT"
                    echo "No LFS assets under '${SCOPE:-<unset>}' — skipping Forgejo credential setup"
                  fi

            - name: Configure Forgejo LFS credentials
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' && steps.lfs_detect.outputs.uses_lfs == 'true' }}
              env:
                  FORGEJO_USER: ${{ secrets.FORGEJO_USER }}
                  FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
              run: |
                  if [ -z "$FORGEJO_USER" ] || [ -z "$FORGEJO_TOKEN" ]; then
                    echo "::error::FORGEJO_USER / FORGEJO_TOKEN missing — cannot pull LFS from git.kbve.com (assets would ship as pointer stubs)"
                    exit 1
                  fi
                  printf 'machine git.kbve.com\nlogin %s\npassword %s\n' \
                    "$FORGEJO_USER" "$FORGEJO_TOKEN" > "$HOME/.netrc"
                  chmod 600 "$HOME/.netrc"
                  echo "Forgejo LFS credentials configured for git.kbve.com"

            - name: Pull per-game Forgejo LFS blobs
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' && steps.lfs_detect.outputs.uses_lfs == 'true' }}
              run: |
                  set -euo pipefail
                  # Stock git-lfs only resolves the repo-root .lfsconfig (rareicon
                  # endpoint). Games whose blobs live on other Forgejo repos (arpg,
                  # chuck, cryptothrone, ...) must be pulled via the kbve.sh wrapper,
                  # which injects the correct per-game lfs.url. Pull every game whose
                  # asset tree falls under this build's source_path so the rebuild
                  # fallback bundles real binaries, not ~130-byte pointer stubs.
                  SCOPE="${{ inputs.source_path }}"
                  PREFIXES=""
                  for game in chuck rareicon rentearth arpg cryptothrone; do
                    prefix="$(./kbve.sh -lfs "$game" path 2>/dev/null || true)"
                    [ -n "$prefix" ] || continue
                    case "$prefix" in
                      "$SCOPE"|"$SCOPE"/*)
                        if git lfs ls-files -I "$prefix/**" 2>/dev/null | grep -q .; then
                          echo "→ pulling $game LFS under $prefix"
                          ./kbve.sh -lfs "$game" pull --include="$prefix/**"
                          PREFIXES="$PREFIXES $prefix"
                        fi
                        ;;
                    esac
                  done
                  if [ -n "$PREFIXES" ]; then
                    STUBS="$(grep -rlI 'git-lfs.github.com/spec' $PREFIXES 2>/dev/null || true)"
                    if [ -n "$STUBS" ]; then
                      echo "::error::Forgejo LFS blobs unresolved — these would ship as pointer stubs:"
                      echo "$STUBS"
                      exit 1
                    fi
                  fi

            - name: Build Docker Image with Nx
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' }}
              env:
                  INPUT_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
                  # Resolved release version (the value the image is tagged with),
                  # forwarded into builds that declare a value-less PUBLIC_ARPG_VERSION
                  # build-arg (arpg-web) so the bundle's baked version matches the tag
                  # instead of the lagging committed version.toml. Other images ignore it.
                  PUBLIC_ARPG_VERSION: ${{ steps.version_check.outputs.local_version }}
              run: |
                  pnpm nx run ${{ inputs.project }}:${{ inputs.target }} --configuration=production --no-cloud

            - name: Ensure image is in Docker daemon
              if: ${{ steps.version_check.outputs.should_publish != 'false' && steps.promote.outputs.found != 'true' && inputs.image != '' }}
              run: |
                  VERSION="${{ steps.version_check.outputs.local_version }}"
                  IMAGE="${{ inputs.image }}"

                  # Try to find the versioned image first, then tag as latest
                  if docker image inspect "${IMAGE}:${VERSION}" >/dev/null 2>&1; then
                    echo "Found ${IMAGE}:${VERSION}, tagging as latest"
                    docker tag "${IMAGE}:${VERSION}" "${IMAGE}:latest"
                  elif ! docker image inspect "${IMAGE}:latest" >/dev/null 2>&1; then
                    echo "Image not in Docker daemon (buildx docker-container driver). Re-exporting..."
                    docker buildx build --platform linux/amd64 \
                      -f $(find . -path "*/${{ inputs.project }}/Dockerfile" -print -quit) \
                      -t "${IMAGE}:latest" \
                      --load \
                      . 2>/dev/null || echo "::warning::Could not re-export image for daemon"
                  fi

            # Trivy removed 03/26/2026 — supply chain compromise (aquasecurity/trivy#10425)
            # Re-evaluate alternative scanners (grype, docker scout) before re-adding.

            - name: Push Docker Images
              if: ${{ steps.version_check.outputs.should_publish != 'false' && inputs.image != '' }}
              run: |
                  IMAGE="${{ inputs.image }}"
                  VERSION="${{ steps.version_check.outputs.local_version }}"
                  GHCR_IMAGE="ghcr.io/${IMAGE#ghcr.io/}"

                  # Ensure latest tag exists
                  if docker image inspect "${IMAGE}:${VERSION}" >/dev/null 2>&1; then
                    docker tag "${IMAGE}:${VERSION}" "${IMAGE}:latest"
                  fi

                  # Ensure GHCR has version + latest tags
                  for TAG in "${VERSION}" "latest"; do
                    if ! docker image inspect "${GHCR_IMAGE}:${TAG}" >/dev/null 2>&1; then
                      # Try to create the tag from whichever source exists
                      for SRC in "${IMAGE}:${TAG}" "${IMAGE}:latest" "${GHCR_IMAGE}:latest"; do
                        if docker image inspect "${SRC}" >/dev/null 2>&1; then
                          docker tag "${SRC}" "${GHCR_IMAGE}:${TAG}"
                          break
                        fi
                      done
                    fi
                  done

                  IMAGES=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E "^${GHCR_IMAGE}:" | sort -u || true)
                  if [ -z "$IMAGES" ]; then
                    echo "::error::No images found matching '${IMAGE}'. Listing all images:"
                    docker images
                    exit 1
                  fi
                  echo "Pushing images:"
                  echo "$IMAGES"
                  for IMG in $IMAGES; do
                    docker push "$IMG"
                  done
