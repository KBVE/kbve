name: CI — UEDevOps

on:
    workflow_dispatch:
        inputs:
            deploy_to_itch:
                description: 'Deploy to itch.io after successful build'
                required: false
                type: boolean
                default: false
            ue_image_tag:
                description: 'Epic UE container image tag'
                required: false
                type: string
                default: 'dev-5.7'
    push:
        branches: [dev]
        paths:
            - 'packages/unreal/UEDevOps/**'

jobs:
    uedevops:
        name: UEDevOps
        uses: ./.github/workflows/utils-unreal-plugin-cicd.yml
        with:
            plugin_path: packages/unreal/UEDevOps
            plugin_name: UEDevOps
            ue_image_tag: ${{ inputs.ue_image_tag || 'dev-5.7' }}
            target_platforms: Linux
            deploy_to_itch: ${{ inputs.deploy_to_itch || false }}
            itch_username: kbve
            itch_game_id: uedevops
            itch_channel: plugin
        secrets:
            epic_pat: ${{ secrets.UNITY_PAT }}
            butler_api: ${{ secrets.butler_api }}
