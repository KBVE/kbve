# =============================================================================
# CI: dbmate-validate
#
# Stands up the kilobase prod-replica postgres image (supabase/postgres
# base + KBVE pgsodium key + zz_* init seeds), applies every dbmate
# migration top-to-bottom, exercises rollback on the head migration,
# re-applies to confirm idempotency. NO production contact.
#
# Why kilobase (not vanilla postgres:17-alpine):
#   Real prod-shape auth.* / extensions / pgsodium / vault / role
#   ownership chain. Shallow vanilla stubs silently masked an OWNER
#   service_role bug that nuked the dashboard in prod
#   (PR #12033 retro). Vanilla validation earned nothing here.
#
# Triggered on every PR that touches packages/data/sql/dbmate/** so
# regressions are caught at review time.
# =============================================================================
name: CI - dbmate validate

on:
    push:
        branches: [main]
        paths:
            - 'packages/data/sql/**'
            - '.github/workflows/ci-dbmate-validate.yml'
    pull_request:
        paths:
            - 'packages/data/sql/**'
            - '.github/workflows/ci-dbmate-validate.yml'
    workflow_dispatch:

jobs:
    kilobase-rollout:
        name: Apply all migrations on kilobase prod-replica
        runs-on: ubuntu-latest
        timeout-minutes: 15

        env:
            # Opt into destructive-rollback guards so the rollback step
            # can exercise migrate:down on heads that refuse unguarded
            # rollbacks (inventory schema, marketplace listing wire).
            # Prod URLs never set these GUCs, so a stray rollback against
            # prod still aborts before any drop.
            PGOPTIONS: >-
                -c app.allow_destructive_inventory_down=true
                -c app.allow_marketplace_unsafe_down=on
                -c app.allow_legacy_marketplace_proxy_restore=on

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Install dbmate + psql client + docker compose v2
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends postgresql-client
                  curl -fsSL -o /usr/local/bin/dbmate \
                      https://github.com/amacneil/dbmate/releases/download/v2.28.0/dbmate-linux-amd64
                  chmod +x /usr/local/bin/dbmate
                  # ARC runner image ships docker CLI but not the compose
                  # subcommand plugin. Drop the official v2 plugin binary
                  # into the standard plugin path so `docker compose ...`
                  # resolves.
                  if ! docker compose version >/dev/null 2>&1; then
                      sudo mkdir -p /usr/local/lib/docker/cli-plugins
                      sudo curl -fsSL -o /usr/local/lib/docker/cli-plugins/docker-compose \
                          https://github.com/docker/compose/releases/download/v2.31.0/docker-compose-linux-x86_64
                      sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
                  fi
                  dbmate --version
                  psql --version
                  docker compose version

            - name: Wait for docker daemon
              run: |
                  for i in $(seq 1 60); do
                    if docker info >/dev/null 2>&1; then
                      echo "docker daemon ready after $i attempts"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "::error::docker daemon (dind sidecar) never came up in 120s"
                  exit 1

            - name: Bring up kilobase compose stack
              working-directory: packages/data/sql/dbmate
              run: |
                  docker compose -f kilobase-docker-compose.yml up -d
                  docker compose -f kilobase-docker-compose.yml ps

            - name: Wait for supabase init to settle (auth.users queryable)
              run: |
                  for i in $(seq 1 90); do
                    if PGPASSWORD=postgres psql \
                        -h localhost -p 54322 -U supabase_admin -d supabase \
                        -c 'SELECT 1 FROM auth.users LIMIT 0' >/dev/null 2>&1; then
                      echo "ready after $i attempts"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "::error::kilobase did not become ready in 180s"
                  docker compose -f packages/data/sql/dbmate/kilobase-docker-compose.yml logs --tail=60
                  exit 1

            - name: Apply all migrations
              working-directory: packages/data/sql/dbmate
              env:
                  DATABASE_URL: postgresql://supabase_admin:postgres@localhost:54322/supabase?sslmode=disable&search_path=dbmate,public
              run: dbmate --no-dump-schema --migrations-dir migrations up

            - name: Confirm tracker has every migration
              working-directory: packages/data/sql/dbmate
              env:
                  DATABASE_URL: postgresql://supabase_admin:postgres@localhost:54322/supabase?sslmode=disable&search_path=dbmate,public
              run: |
                  applied=$(dbmate --migrations-dir migrations status \
                            | grep -c "^\[X\]" || true)
                  files=$(ls migrations/*.sql | wc -l)
                  echo "applied=$applied files=$files"
                  if [ "$applied" -ne "$files" ]; then
                    echo "::error::dbmate tracker drift — $applied applied vs $files files"
                    exit 1
                  fi

            - name: Roll back the most recent migration (verifies migrate:down)
              working-directory: packages/data/sql/dbmate
              env:
                  DATABASE_URL: postgresql://supabase_admin:postgres@localhost:54322/supabase?sslmode=disable&search_path=dbmate,public
              run: dbmate --no-dump-schema --migrations-dir migrations rollback

            - name: Re-apply to confirm idempotency
              working-directory: packages/data/sql/dbmate
              env:
                  DATABASE_URL: postgresql://supabase_admin:postgres@localhost:54322/supabase?sslmode=disable&search_path=dbmate,public
              run: dbmate --no-dump-schema --migrations-dir migrations up

            # Store money-path invariant tests. The DB is fully migrated here, so
            # we run each companion .test.sql's SEED + ASSERT_AFTER_UP against it
            # (the ASSERT_AFTER_DOWN sections are exercised by test-migration.sh
            # locally; the up/rollback/up steps above already prove down applies).
            - name: Store invariant tests
              working-directory: packages/data/sql/dbmate
              run: |
                  set -euo pipefail
                  for base in 20260708120000_store_schema_init 20260709170000_store_topup_pod; do
                    echo "== store invariant test: ${base} =="
                    awk '
                      /^-- (SEED|ASSERT_AFTER_UP) *$/ { on=1; next }
                      /^-- ASSERT_AFTER_DOWN *$/      { on=0 }
                      on { print }
                    ' "migration-tests/${base}.test.sql" \
                      | PGPASSWORD=postgres psql -h localhost -p 54322 \
                          -U supabase_admin -d supabase -v ON_ERROR_STOP=1 -X -q
                  done

            - name: Tear down kilobase
              if: always()
              working-directory: packages/data/sql/dbmate
              run: |
                  if docker info >/dev/null 2>&1; then
                    docker compose -f kilobase-docker-compose.yml down -v
                  else
                    echo "docker daemon unreachable; nothing to tear down"
                  fi
