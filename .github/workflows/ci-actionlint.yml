name: CI - Actionlint

on:
    pull_request:
        branches:
            - dev
            - main
        paths:
            - '.github/workflows/**'
            - '.github/actions/**'
            - '.github/workflows/ci-actionlint.yml'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions: {}

jobs:
    actionlint:
        name: actionlint + shellcheck
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Download actionlint
              id: actionlint
              run: |
                  set -euo pipefail
                  bash <(curl --silent --show-error --fail \
                      https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
                  echo "bin=$PWD/actionlint" >> "$GITHUB_OUTPUT"

            - name: Verify shellcheck is on PATH
              run: shellcheck --version

            - name: Run actionlint
              env:
                  ACTIONLINT: ${{ steps.actionlint.outputs.bin }}
              run: |
                  set -euo pipefail
                  "$ACTIONLINT" -color -shellcheck 'shellcheck -S error'

    zizmor:
        name: zizmor (informational)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  github-token: ${{ github.token }}

            - name: Run zizmor (offline audits only, informational)
              # GitHub's default bash invocation is `bash --noprofile --norc -eo
              # pipefail {0}`, so `-e` would abort this step on zizmor's
              # non-zero exit before we get to inspect the code. `set +e` here
              # overrides that so we can always exit 0 from this step.
              run: |
                  set +e
                  uvx zizmor==1.25.2 --persona=regular --no-online-audits \
                      --format plain .github/workflows
                  EC=$?
                  set -u
                  # zizmor exit codes:
                  #   0  → no findings
                  #   14 → findings detected (expected; the repo has a baseline)
                  #   *  → crash or real error
                  # Always exit 0 so the job stays green — the gate is explicitly
                  # informational and a red ✗ here is misleading (looks like a
                  # security incident on every PR). Findings still print to the
                  # job log; crashes get an annotation but do not fail the run.
                  if [ "$EC" -eq 14 ]; then
                      echo "::notice::zizmor reported findings (exit 14) — informational, baseline cleanup tracked separately"
                  elif [ "$EC" -ne 0 ]; then
                      echo "::warning::zizmor exited with $EC (likely a crash) — see logs above; surfacing as warning, not failure"
                  fi
                  exit 0

    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') }}
        needs: [actionlint]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Actionlint'
            job_name: 'actionlint'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'

    track_success:
        name: Track Success
        if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        needs: [actionlint]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Actionlint'
            job_name: 'actionlint'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'success'
