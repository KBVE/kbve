name: CI - Actionlint

on:
    pull_request:
        branches:
            - dev
            - main
        paths:
            - '.github/workflows/**'
            - '.github/actions/**'
            - '.github/workflows/ci-actionlint.yml'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions: {}

jobs:
    actionlint:
        name: actionlint + shellcheck
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Download actionlint
              id: actionlint
              run: |
                  set -euo pipefail
                  bash <(curl --silent --show-error --fail \
                      https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
                  echo "bin=$PWD/actionlint" >> "$GITHUB_OUTPUT"

            - name: Verify shellcheck is on PATH
              run: shellcheck --version

            - name: Run actionlint
              env:
                  ACTIONLINT: ${{ steps.actionlint.outputs.bin }}
              run: |
                  set -euo pipefail
                  "$ACTIONLINT" -color -shellcheck 'shellcheck -S error'

    zizmor:
        name: zizmor (informational)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  github-token: ${{ github.token }}

            - name: Run zizmor (offline audits only, informational)
              run: |
                  set -uo pipefail
                  uvx zizmor==1.25.2 --persona=regular --no-online-audits \
                      --format plain .github/workflows
                  EC=$?
                  # zizmor exit codes:
                  #   0  → no findings
                  #   14 → findings detected (expected, informational only)
                  #   *  → real error / crash → propagate so the tracker fires
                  if [ "$EC" -eq 0 ] || [ "$EC" -eq 14 ]; then
                      [ "$EC" -eq 14 ] && echo "::notice::zizmor reported findings (exit 14) — informational, not blocking"
                      exit 0
                  fi
                  echo "::error::zizmor exited with $EC (not a findings exit) — likely a crash"
                  exit "$EC"

    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') }}
        needs: [actionlint]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Actionlint'
            job_name: 'actionlint'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'

    track_success:
        name: Track Success
        if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        needs: [actionlint]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Actionlint'
            job_name: 'actionlint'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'success'

    track_zizmor_failure:
        name: Track Zizmor Failures
        if: ${{ always() && needs.zizmor.result == 'failure' }}
        needs: [zizmor]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Actionlint'
            job_name: 'zizmor'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'

    track_zizmor_success:
        name: Track Zizmor Success
        if: ${{ always() && needs.zizmor.result == 'success' }}
        needs: [zizmor]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Actionlint'
            job_name: 'zizmor'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'success'
