name: CI - Blender

run-name: 'CI - Blender / ${{ inputs.task }} ${{ inputs.app_name }}'

on:
    workflow_dispatch:
        inputs:
            task:
                description: 'render | export | batch-export | script | validate'
                required: true
                type: choice
                default: validate
                options:
                    - render
                    - export
                    - batch-export
                    - script
                    - validate
            app_name:
                description: 'Project name or identifier'
                required: false
                type: string
                default: 'blender-project'
            blend_file:
                description: 'Path to .blend file (relative to repo root)'
                required: false
                type: string
                default: ''
            output_path:
                description: 'Output directory for renders/exports'
                required: false
                type: string
                default: '/tmp/blender-output'
            script_path:
                description: '[script] Path to Python script to execute'
                required: false
                type: string
                default: ''
            render_engine:
                description: '[render] CYCLES | BLENDER_EEVEE | BLENDER_WORKBENCH'
                required: false
                type: choice
                default: CYCLES
                options:
                    - CYCLES
                    - BLENDER_EEVEE
                    - BLENDER_WORKBENCH
            render_device:
                description: '[render] CPU | GPU'
                required: false
                type: choice
                default: GPU
                options:
                    - CPU
                    - GPU
            render_format:
                description: '[render] Output format'
                required: false
                type: choice
                default: PNG
                options:
                    - PNG
                    - JPEG
                    - OPEN_EXR
                    - TIFF
            frame_range:
                description: '[render] Frame range (e.g., "1", "1-100", "1,5,10")'
                required: false
                type: string
                default: '1'
            samples:
                description: '[render] Render samples (overrides blend file)'
                required: false
                type: string
                default: ''
            resolution_scale:
                description: '[render] Resolution % (50, 100, etc.)'
                required: false
                type: string
                default: '100'
            export_format:
                description: '[export] FBX | GLTF | OBJ | USD | ALEMBIC | STL'
                required: false
                type: choice
                default: FBX
                options:
                    - FBX
                    - GLTF
                    - OBJ
                    - USD
                    - ALEMBIC
                    - STL
            export_selection_only:
                description: '[export] Export selected objects only'
                required: false
                type: boolean
                default: false
            export_apply_modifiers:
                description: '[export] Apply modifiers on export'
                required: false
                type: boolean
                default: true
            batch_objects:
                description: '[batch-export] Export each object separately'
                required: false
                type: boolean
                default: true
            runner_label:
                description: 'GitHub runner label (macos-latest or self-hosted tag)'
                required: false
                type: string
                default: 'macos-latest'
            dispatched_at:
                description: 'Unix timestamp when dispatched (queue guard)'
                required: false
                type: string
                default: ''

permissions:
    contents: write
    issues: write
    pull-requests: write
    actions: write

jobs:
    queue_guard:
        name: Queue Guard
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Check queue age
              if: inputs.dispatched_at != ''
              run: |
                  AGE=$(( $(date +%s) - ${{ inputs.dispatched_at }} ))
                  echo "blender/${{ inputs.app_name }} queued ${AGE}s"
                  if [ "$AGE" -gt 7200 ]; then
                    echo "::error::Queue timeout: ${AGE}s > 2h"
                    exit 1
                  fi

    validate:
        name: Validate Blend File
        if: inputs.task == 'validate'
        needs: [queue_guard]
        runs-on: ${{ inputs.runner_label }}
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v7

            - name: Install Blender (if needed)
              id: blender_check
              run: |
                  if command -v blender &> /dev/null; then
                    BLENDER_BIN="blender"
                  elif [ -d "/Applications/Blender.app" ]; then
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  else
                    echo "::notice::Blender not found, installing via Homebrew..."
                    brew install --cask blender
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  fi
                  echo "binary=$BLENDER_BIN" >> "$GITHUB_OUTPUT"
                  "$BLENDER_BIN" --version

            - name: Validate blend file exists
              if: inputs.blend_file != ''
              run: |
                  if [ ! -f "${{ inputs.blend_file }}" ]; then
                    echo "::error::Blend file not found: ${{ inputs.blend_file }}"
                    exit 1
                  fi
                  echo "::notice::Found blend file: ${{ inputs.blend_file }}"

            - name: Test headless launch
              if: inputs.blend_file != ''
              run: |
                  ${{ steps.blender_check.outputs.binary }} -b "${{ inputs.blend_file }}" \
                    --python-expr "import bpy; print(f'Scene: {bpy.context.scene.name}'); print(f'Objects: {len(bpy.data.objects)}')"

    render:
        name: Render (${{ inputs.render_engine }} / ${{ inputs.render_device }})
        if: inputs.task == 'render'
        needs: [queue_guard]
        runs-on: ${{ inputs.runner_label }}
        timeout-minutes: 120
        steps:
            - uses: actions/checkout@v7

            - name: Install Blender (if needed)
              id: setup
              run: |
                  if command -v blender &> /dev/null; then
                    BLENDER_BIN="blender"
                  elif [ -d "/Applications/Blender.app" ]; then
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  else
                    echo "::notice::Blender not found, installing via Homebrew..."
                    brew install --cask blender
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  fi
                  echo "binary=$BLENDER_BIN" >> "$GITHUB_OUTPUT"
                  "$BLENDER_BIN" --version

            - name: Validate blend file
              run: |
                  if [ ! -f "${{ inputs.blend_file }}" ]; then
                    echo "::error::Blend file required for render task"
                    exit 1
                  fi

            - name: Create output directory
              run: mkdir -p "${{ inputs.output_path }}"

            - name: Generate render script
              run: |
                  cat > /tmp/blender_render.py <<'RENDER_SCRIPT'
                  import bpy
                  import sys
                  import os

                  # Parse args
                  argv = sys.argv
                  argv = argv[argv.index("--") + 1:] if "--" in argv else []

                  output_path = argv[0] if len(argv) > 0 else "/tmp/blender-output"
                  render_engine = argv[1] if len(argv) > 1 else "CYCLES"
                  render_device = argv[2] if len(argv) > 2 else "GPU"
                  render_format = argv[3] if len(argv) > 3 else "PNG"
                  samples = argv[4] if len(argv) > 4 else ""
                  resolution_scale = int(argv[5]) if len(argv) > 5 else 100

                  # Configure render settings
                  scene = bpy.context.scene
                  scene.render.engine = render_engine
                  scene.render.image_settings.file_format = render_format
                  scene.render.resolution_percentage = resolution_scale
                  scene.render.filepath = os.path.join(output_path, "render_")

                  # Cycles-specific settings
                  if render_engine == 'CYCLES':
                      scene.cycles.device = render_device
                      if samples:
                          scene.cycles.samples = int(samples)

                      # Enable GPU if requested
                      if render_device == 'GPU':
                          prefs = bpy.context.preferences.addons['cycles'].preferences
                          # Try Metal (macOS), then CUDA, then fallback
                          if hasattr(prefs, 'compute_device_type'):
                              try:
                                  prefs.compute_device_type = 'METAL'
                                  prefs.get_devices()
                                  for device in prefs.devices:
                                      if device.type == 'METAL':
                                          device.use = True
                                          print(f"Enabled GPU: {device.name}")
                              except:
                                  print("Metal GPU not available, falling back to CPU")
                                  scene.cycles.device = 'CPU'

                  print(f"Render Engine: {render_engine}")
                  print(f"Render Device: {scene.cycles.device if render_engine == 'CYCLES' else 'N/A'}")
                  print(f"Output Format: {render_format}")
                  print(f"Resolution: {resolution_scale}%")
                  print(f"Output Path: {scene.render.filepath}")

                  # Render
                  bpy.ops.render.render(write_still=True)
                  print("Render complete")
                  RENDER_SCRIPT

            - name: Execute render
              run: |
                  ${{ steps.setup.outputs.binary }} -b "${{ inputs.blend_file }}" \
                    --python /tmp/blender_render.py \
                    -- "${{ inputs.output_path }}" \
                       "${{ inputs.render_engine }}" \
                       "${{ inputs.render_device }}" \
                       "${{ inputs.render_format }}" \
                       "${{ inputs.samples }}" \
                       "${{ inputs.resolution_scale }}"

            - name: Render animation frames
              if: contains(inputs.frame_range, '-') || contains(inputs.frame_range, ',')
              run: |
                  # Parse frame range
                  RANGE="${{ inputs.frame_range }}"

                  if [[ "$RANGE" == *"-"* ]]; then
                    # Range format: 1-100
                    START=$(echo "$RANGE" | cut -d'-' -f1)
                    END=$(echo "$RANGE" | cut -d'-' -f2)
                    ${{ steps.setup.outputs.binary }} -b "${{ inputs.blend_file }}" \
                      -o "${{ inputs.output_path }}/frame_####" \
                      -F ${{ inputs.render_format }} \
                      -s "$START" -e "$END" -a
                  else
                    # Comma-separated frames: 1,5,10
                    IFS=',' read -ra FRAMES <<< "$RANGE"
                    for frame in "${FRAMES[@]}"; do
                      ${{ steps.setup.outputs.binary }} -b "${{ inputs.blend_file }}" \
                        -o "${{ inputs.output_path }}/frame_$(printf "%04d" $frame)" \
                        -F ${{ inputs.render_format }} \
                        -f "$frame"
                    done
                  fi

            - name: Upload renders
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ inputs.app_name }}-renders
                  path: ${{ inputs.output_path }}
                  if-no-files-found: error

    export:
        name: Export (${{ inputs.export_format }})
        if: inputs.task == 'export'
        needs: [queue_guard]
        runs-on: ${{ inputs.runner_label }}
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v7

            - name: Install Blender (if needed)
              id: setup
              run: |
                  if command -v blender &> /dev/null; then
                    BLENDER_BIN="blender"
                  elif [ -d "/Applications/Blender.app" ]; then
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  else
                    echo "::notice::Blender not found, installing via Homebrew..."
                    brew install --cask blender
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  fi
                  echo "binary=$BLENDER_BIN" >> "$GITHUB_OUTPUT"
                  "$BLENDER_BIN" --version

            - name: Create output directory
              run: mkdir -p "${{ inputs.output_path }}"

            - name: Generate export script
              run: |
                  cat > /tmp/blender_export.py <<'EXPORT_SCRIPT'
                  import bpy
                  import sys
                  import os

                  argv = sys.argv[sys.argv.index("--") + 1:] if "--" in sys.argv else []

                  output_path = argv[0] if len(argv) > 0 else "/tmp/blender-output"
                  export_format = argv[1] if len(argv) > 1 else "FBX"
                  selection_only = argv[2].lower() == 'true' if len(argv) > 2 else False
                  apply_modifiers = argv[3].lower() == 'true' if len(argv) > 3 else True

                  # Determine export operator and extension
                  format_map = {
                      'FBX': ('export_scene.fbx', '.fbx'),
                      'GLTF': ('export_scene.gltf', '.gltf'),
                      'OBJ': ('wm.obj_export', '.obj'),
                      'USD': ('wm.usd_export', '.usd'),
                      'ALEMBIC': ('wm.alembic_export', '.abc'),
                      'STL': ('wm.stl_export', '.stl'),
                  }

                  if export_format not in format_map:
                      print(f"Unknown format: {export_format}")
                      sys.exit(1)

                  op_name, ext = format_map[export_format]
                  output_file = os.path.join(output_path, f"export{ext}")

                  print(f"Exporting as {export_format} to {output_file}")
                  print(f"Selection only: {selection_only}")
                  print(f"Apply modifiers: {apply_modifiers}")

                  # Execute export based on format
                  if export_format == 'FBX':
                      bpy.ops.export_scene.fbx(
                          filepath=output_file,
                          use_selection=selection_only,
                          apply_scale_options='FBX_SCALE_ALL',
                          use_mesh_modifiers=apply_modifiers,
                          bake_anim=True
                      )
                  elif export_format == 'GLTF':
                      bpy.ops.export_scene.gltf(
                          filepath=output_file,
                          use_selection=selection_only,
                          export_apply=apply_modifiers
                      )
                  elif export_format == 'OBJ':
                      bpy.ops.wm.obj_export(
                          filepath=output_file,
                          export_selected_objects=selection_only,
                          apply_modifiers=apply_modifiers
                      )
                  elif export_format == 'USD':
                      bpy.ops.wm.usd_export(
                          filepath=output_file,
                          selected_objects_only=selection_only,
                          export_meshes=True,
                          export_materials=True
                      )
                  elif export_format == 'ALEMBIC':
                      bpy.ops.wm.alembic_export(
                          filepath=output_file,
                          selected=selection_only,
                          apply_subdiv=apply_modifiers
                      )
                  elif export_format == 'STL':
                      bpy.ops.wm.stl_export(
                          filepath=output_file,
                          export_selected_objects=selection_only,
                          apply_modifiers=apply_modifiers
                      )

                  print(f"Export complete: {output_file}")
                  EXPORT_SCRIPT

            - name: Execute export
              run: |
                  ${{ steps.setup.outputs.binary }} -b "${{ inputs.blend_file }}" \
                    --python /tmp/blender_export.py \
                    -- "${{ inputs.output_path }}" \
                       "${{ inputs.export_format }}" \
                       "${{ inputs.export_selection_only }}" \
                       "${{ inputs.export_apply_modifiers }}"

            - name: Upload export
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ inputs.app_name }}-${{ inputs.export_format }}
                  path: ${{ inputs.output_path }}
                  if-no-files-found: error

    batch_export:
        name: Batch Export (per-object)
        if: inputs.task == 'batch-export'
        needs: [queue_guard]
        runs-on: ${{ inputs.runner_label }}
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v7

            - name: Install Blender (if needed)
              id: setup
              run: |
                  if command -v blender &> /dev/null; then
                    BLENDER_BIN="blender"
                  elif [ -d "/Applications/Blender.app" ]; then
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  else
                    echo "::notice::Blender not found, installing via Homebrew..."
                    brew install --cask blender
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  fi
                  echo "binary=$BLENDER_BIN" >> "$GITHUB_OUTPUT"
                  "$BLENDER_BIN" --version

            - name: Create output directory
              run: mkdir -p "${{ inputs.output_path }}"

            - name: Generate batch export script
              run: |
                  cat > /tmp/blender_batch_export.py <<'BATCH_SCRIPT'
                  import bpy
                  import sys
                  import os

                  argv = sys.argv[sys.argv.index("--") + 1:] if "--" in sys.argv else []

                  output_path = argv[0] if len(argv) > 0 else "/tmp/blender-output"
                  export_format = argv[1] if len(argv) > 1 else "FBX"

                  format_ext = {
                      'FBX': '.fbx',
                      'GLTF': '.gltf',
                      'OBJ': '.obj',
                      'USD': '.usd',
                      'ALEMBIC': '.abc',
                      'STL': '.stl',
                  }

                  ext = format_ext.get(export_format, '.fbx')
                  objects_to_export = [obj for obj in bpy.data.objects if obj.type == 'MESH']

                  print(f"Batch exporting {len(objects_to_export)} objects as {export_format}")

                  for obj in objects_to_export:
                      # Select only this object
                      bpy.ops.object.select_all(action='DESELECT')
                      obj.select_set(True)
                      bpy.context.view_layer.objects.active = obj

                      # Export
                      filepath = os.path.join(output_path, f"{obj.name}{ext}")

                      if export_format == 'FBX':
                          bpy.ops.export_scene.fbx(
                              filepath=filepath,
                              use_selection=True,
                              apply_scale_options='FBX_SCALE_ALL',
                              bake_anim=True
                          )
                      elif export_format == 'GLTF':
                          bpy.ops.export_scene.gltf(
                              filepath=filepath,
                              use_selection=True
                          )
                      elif export_format == 'OBJ':
                          bpy.ops.wm.obj_export(
                              filepath=filepath,
                              export_selected_objects=True
                          )

                      print(f"Exported: {filepath}")

                  print(f"Batch export complete: {len(objects_to_export)} files")
                  BATCH_SCRIPT

            - name: Execute batch export
              run: |
                  ${{ steps.setup.outputs.binary }} -b "${{ inputs.blend_file }}" \
                    --python /tmp/blender_batch_export.py \
                    -- "${{ inputs.output_path }}" "${{ inputs.export_format }}"

            - name: Upload batch exports
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ inputs.app_name }}-batch-${{ inputs.export_format }}
                  path: ${{ inputs.output_path }}
                  if-no-files-found: error

    script:
        name: Run Custom Script
        if: inputs.task == 'script'
        needs: [queue_guard]
        runs-on: ${{ inputs.runner_label }}
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v7

            - name: Install Blender (if needed)
              id: setup
              run: |
                  if command -v blender &> /dev/null; then
                    BLENDER_BIN="blender"
                  elif [ -d "/Applications/Blender.app" ]; then
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  else
                    echo "::notice::Blender not found, installing via Homebrew..."
                    brew install --cask blender
                    BLENDER_BIN="/Applications/Blender.app/Contents/MacOS/Blender"
                  fi
                  echo "binary=$BLENDER_BIN" >> "$GITHUB_OUTPUT"
                  "$BLENDER_BIN" --version

            - name: Validate script exists
              run: |
                  if [ ! -f "${{ inputs.script_path }}" ]; then
                    echo "::error::Script not found: ${{ inputs.script_path }}"
                    exit 1
                  fi

            - name: Execute custom script
              run: |
                  if [ -n "${{ inputs.blend_file }}" ] && [ -f "${{ inputs.blend_file }}" ]; then
                    # Run with blend file
                    ${{ steps.setup.outputs.binary }} -b "${{ inputs.blend_file }}" \
                      --python "${{ inputs.script_path }}"
                  else
                    # Run without blend file (factory startup)
                    ${{ steps.setup.outputs.binary }} -b --python "${{ inputs.script_path }}"
                  fi

            - name: Upload script output
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ inputs.app_name }}-script-output
                  path: ${{ inputs.output_path }}
                  if-no-files-found: ignore

    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') }}
        needs: [queue_guard, validate, render, export, batch_export, script]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Blender'
            job_name: ${{ inputs.app_name }}
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'

    track_success:
        name: Track Success
        if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        needs: [queue_guard, validate, render, export, batch_export, script]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Blender'
            job_name: ${{ inputs.app_name }}
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'success'
