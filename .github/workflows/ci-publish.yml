name: CI - Publish

on:
    workflow_dispatch:
        inputs:
            package_type:
                description: 'Package type: npm | crates | python'
                required: true
                type: string
            package_name:
                description: 'Package / project name (e.g. droid, q, python-fudster)'
                required: true
                type: string
            pypi_name:
                description: 'PyPI distribution name — python only (e.g. fudster, kbve)'
                required: false
                type: string
                default: ''
            dispatched_at:
                description: 'Unix timestamp when this was dispatched (queue guard)'
                required: true
                type: string

# Per-package concurrency — never cancel in-progress runs.
# The queue guard enforces a 2h stale-run limit; the running job is always safe.
concurrency:
    group: ci-publish-${{ inputs.package_type }}-${{ inputs.package_name }}
    cancel-in-progress: false

permissions: {}

jobs:
    # ---------------------------------------------------------------------------
    # Queue Guard — fail loudly if this run has been waiting > 2 hours.
    # ---------------------------------------------------------------------------
    queue_guard:
        name: Queue Guard
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Check queue age
              run: |
                  NOW=$(date +%s)
                  DISPATCHED="${{ inputs.dispatched_at }}"
                  AGE=$(( NOW - DISPATCHED ))
                  echo "Package: ${{ inputs.package_type }}/${{ inputs.package_name }}"
                  echo "Queued for ${AGE}s (dispatched_at=$DISPATCHED, now=$NOW)"
                  if [ "$AGE" -gt 7200 ]; then
                    echo "::error::Queue timeout: ${{ inputs.package_name }} waited ${AGE}s (> 2h). Failing to prevent stale publish."
                    exit 1
                  fi
                  echo "Queue age OK: ${AGE}s"

    # ===========================================================================
    # NPM — test then publish (only runs when package_type == 'npm')
    # ===========================================================================
    test_npm:
        name: Test NPM — ${{ inputs.package_name }}
        needs: [queue_guard]
        if: inputs.package_type == 'npm'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/npm-test-package.yml@main
        with:
            project: ${{ inputs.package_name }}

    publish_npm:
        name: Publish NPM — ${{ inputs.package_name }}
        needs: [test_npm]
        if: always() && inputs.package_type == 'npm' && needs.test_npm.result == 'success'
        permissions:
            contents: read
            id-token: write
        uses: KBVE/kbve/.github/workflows/utils-npm-publish.yml@main
        with:
            project: ${{ inputs.package_name }}
        secrets:
            NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    # ===========================================================================
    # Rust Crates — test then publish (only runs when package_type == 'crates')
    # ===========================================================================
    test_crates:
        name: Test Crate — ${{ inputs.package_name }}
        needs: [queue_guard]
        if: inputs.package_type == 'crates'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/rust-test-crate.yml@main
        with:
            package: ${{ inputs.package_name }}

    publish_crates:
        name: Publish Crate — ${{ inputs.package_name }}
        needs: [test_crates]
        if: always() && inputs.package_type == 'crates' && needs.test_crates.result == 'success'
        permissions:
            id-token: write
            contents: write
            packages: write
            issues: write
            pull-requests: write
        uses: KBVE/kbve/.github/workflows/rust-publish-crate.yml@main
        with:
            package: ${{ inputs.package_name }}
        secrets:
            CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}

    # ===========================================================================
    # Python — test then publish (only runs when package_type == 'python')
    # ===========================================================================
    test_python:
        name: Test Python — ${{ inputs.package_name }}
        needs: [queue_guard]
        if: inputs.package_type == 'python'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/python-test-package.yml@main
        with:
            project: ${{ inputs.package_name }}

    publish_python:
        name: Publish Python — ${{ inputs.package_name }}
        needs: [test_python]
        if: always() && inputs.package_type == 'python' && needs.test_python.result == 'success'
        permissions:
            contents: read
            id-token: write
        uses: KBVE/kbve/.github/workflows/utils-python-publish.yml@main
        with:
            project: ${{ inputs.package_name }}
            pypi_name: ${{ inputs.pypi_name }}
        secrets:
            PYPI_TOKEN: ${{ secrets.PYPI_API_SCOPE_TOKEN }}

    # ---------------------------------------------------------------------------
    # Failure Tracker — opens a GitHub issue on any pipeline failure (#8186).
    # Per-package job_name makes the issue title actionable.
    # ---------------------------------------------------------------------------
    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') }}
        needs:
            [
                test_npm,
                publish_npm,
                test_crates,
                publish_crates,
                test_python,
                publish_python,
            ]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Publish'
            job_name: '${{ inputs.package_type }}/${{ inputs.package_name }}'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'
