name: CI - Publish

on:
    workflow_dispatch:
        inputs:
            package_type:
                description: 'Package type: npm | crates | python | unreal'
                required: true
                type: string
            package_name:
                description: 'Package / project name (e.g. droid, q, python-fudster, UEDevOps)'
                required: true
                type: string
            pypi_name:
                description: 'PyPI distribution name — python only (e.g. fudster, kbve)'
                required: false
                type: string
                default: ''
            unreal_plugin_path:
                description: 'Path to Unreal plugin dir — unreal only (e.g. packages/unreal/UEDevOps)'
                required: false
                type: string
                default: ''
            ue_image_tags:
                description: 'JSON array of Epic UE image tags — unreal only (e.g. ["dev-5.7.4","dev-5.6.1"])'
                required: false
                type: string
                default: '["dev-5.7.4"]'
            deploy_to_itch:
                description: 'Deploy to itch.io — unreal only'
                required: false
                type: boolean
                default: false
            itch_game_id:
                description: 'Itch.io game ID — unreal only (e.g. uedevops)'
                required: false
                type: string
                default: ''
            unreal_dependency_plugins:
                description: 'Space-separated paths to dependency plugins — unreal only (e.g. packages/unreal/KBVEYYJson packages/unreal/KBVEZstd)'
                required: false
                type: string
                default: ''
            dispatched_at:
                description: 'Unix timestamp when this was dispatched (queue guard)'
                required: true
                type: string

# Per-package concurrency — never cancel in-progress runs.
# The queue guard enforces a 2h stale-run limit; the running job is always safe.
concurrency:
    group: ci-publish-${{ inputs.package_type }}-${{ inputs.package_name }}
    cancel-in-progress: false

permissions: {}

jobs:
    # ---------------------------------------------------------------------------
    # Queue Guard — fail loudly if this run has been waiting > 2 hours.
    # ---------------------------------------------------------------------------
    queue_guard:
        name: Queue Guard
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Check queue age
              run: |
                  NOW=$(date +%s)
                  DISPATCHED="${{ inputs.dispatched_at }}"
                  AGE=$(( NOW - DISPATCHED ))
                  echo "Package: ${{ inputs.package_type }}/${{ inputs.package_name }}"
                  echo "Queued for ${AGE}s (dispatched_at=$DISPATCHED, now=$NOW)"
                  if [ "$AGE" -gt 7200 ]; then
                    echo "::error::Queue timeout: ${{ inputs.package_name }} waited ${AGE}s (> 2h). Failing to prevent stale publish."
                    exit 1
                  fi
                  echo "Queue age OK: ${AGE}s"

    # ---------------------------------------------------------------------------
    # Version Gate — check if the version is already published.
    # Tests always run. Publish jobs only run when should_publish == 'true'.
    # This prevents wasted runner time and "already published" failures (#8270).
    # ---------------------------------------------------------------------------
    version_gate:
        name: Version Gate
        needs: [queue_guard]
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        outputs:
            should_publish: ${{ steps.check.outputs.should_publish }}
            local_version: ${{ steps.check.outputs.local_version }}
            registry_version: ${{ steps.check.outputs.registry_version }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Check version against version.toml
              id: check
              run: |
                  TYPE="${{ inputs.package_type }}"
                  NAME="${{ inputs.package_name }}"
                  LOCAL=""
                  PUBLISHED=""

                  case "$TYPE" in
                    npm)
                      LOCAL=$(jq -r '.version' "packages/npm/${NAME}/package.json" 2>/dev/null || echo "0.0.0")
                      VTOML="packages/npm/${NAME}/version.toml"
                      ;;
                    crates)
                      LOCAL=$(grep -m1 '^version' "packages/rust/${NAME}/Cargo.toml" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0")
                      VTOML="packages/rust/${NAME}/version.toml"
                      ;;
                    python)
                      PYPI="${{ inputs.pypi_name }}"
                      LOCAL=$(grep -m1 '^version' "packages/python/${PYPI}/pyproject.toml" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0")
                      VTOML="packages/python/${PYPI}/version.toml"
                      ;;
                    unreal)
                      UPLUGIN="${{ inputs.unreal_plugin_path }}/${NAME}.uplugin"
                      LOCAL=$(jq -r '.VersionName' "$UPLUGIN" 2>/dev/null || echo "0.0.0")
                      VTOML="${{ inputs.unreal_plugin_path }}/version.toml"
                      ;;
                    *)
                      echo "::error::Unknown package type: $TYPE"
                      exit 1
                      ;;
                  esac

                  PUBLISHED="0.0.0"
                  PUBLISH_FLAG="true"
                  if [ -f "$VTOML" ]; then
                    PUBLISHED=$(grep -m1 '^version' "$VTOML" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0")
                    PUBLISH_FLAG=$(grep -m1 '^publish' "$VTOML" | sed 's/publish = //' | tr -d ' "' 2>/dev/null || echo "true")
                  fi

                  echo "local_version=${LOCAL}" >> "$GITHUB_OUTPUT"
                  echo "registry_version=${PUBLISHED}" >> "$GITHUB_OUTPUT"

                  # Belt: explicit publish flag
                  if [ "$PUBLISH_FLAG" = "false" ]; then
                    echo "::notice::${TYPE}/${NAME} has publish = false in version.toml — skipping."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  # Suspenders: 0.0.0 means "not ready" — never publish
                  if [ -z "$LOCAL" ] || [ "$LOCAL" = "0.0.0" ]; then
                    echo "::notice::${TYPE}/${NAME} local version is ${LOCAL:-empty} — skipping publish."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  elif [ -z "$PUBLISHED" ] || [ "$PUBLISHED" = "0.0.0" ]; then
                    echo "::notice::${TYPE}/${NAME} version.toml is ${PUBLISHED:-empty} — skipping publish (not initialized)."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  elif [ "$LOCAL" = "$PUBLISHED" ]; then
                    echo "::notice::${TYPE}/${NAME} v${LOCAL} matches version.toml — tests will run, publish will be skipped."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  else
                    HIGHEST=$(printf '%s\n%s' "$LOCAL" "$PUBLISHED" | sort -V | tail -1)
                    if [ "$HIGHEST" != "$LOCAL" ]; then
                      echo "::warning::${TYPE}/${NAME} v${LOCAL} is OLDER than version.toml v${PUBLISHED} — skipping. Bump local version."
                      echo "should_publish=false" >> "$GITHUB_OUTPUT"
                    else
                      echo "::notice::${TYPE}/${NAME} v${LOCAL} > version.toml v${PUBLISHED} — will publish after tests pass."
                      echo "should_publish=true" >> "$GITHUB_OUTPUT"
                    fi
                  fi

    # ===========================================================================
    # NPM — test then publish (only runs when package_type == 'npm')
    # ===========================================================================
    test_npm:
        name: Test NPM — ${{ inputs.package_name }}
        needs: [queue_guard]
        if: inputs.package_type == 'npm'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/npm-test-package.yml@main
        with:
            project: ${{ inputs.package_name }}

    publish_npm:
        name: Publish NPM — ${{ inputs.package_name }}
        needs: [test_npm, version_gate]
        if: always() && inputs.package_type == 'npm' && needs.test_npm.result == 'success' && needs.version_gate.outputs.should_publish == 'true'
        permissions:
            contents: read
            id-token: write
        uses: KBVE/kbve/.github/workflows/utils-npm-publish.yml@main
        with:
            project: ${{ inputs.package_name }}
        secrets:
            NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    # ===========================================================================
    # Rust Crates — test then publish (only runs when package_type == 'crates')
    # ===========================================================================
    test_crates:
        name: Test Crate — ${{ inputs.package_name }}
        needs: [queue_guard]
        if: inputs.package_type == 'crates'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/rust-test-crate.yml@main
        with:
            package: ${{ inputs.package_name }}

    publish_crates:
        name: Publish Crate — ${{ inputs.package_name }}
        needs: [test_crates, version_gate]
        if: always() && inputs.package_type == 'crates' && needs.test_crates.result == 'success' && needs.version_gate.outputs.should_publish == 'true'
        permissions:
            id-token: write
            contents: write
            packages: write
            issues: write
            pull-requests: write
        uses: KBVE/kbve/.github/workflows/rust-publish-crate.yml@main
        with:
            package: ${{ inputs.package_name }}
        secrets:
            CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}

    # ===========================================================================
    # Python — test then publish (only runs when package_type == 'python')
    # ===========================================================================
    test_python:
        name: Test Python — ${{ inputs.package_name }}
        needs: [queue_guard]
        if: inputs.package_type == 'python'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/python-test-package.yml@main
        with:
            project: ${{ inputs.package_name }}

    publish_python:
        name: Publish Python — ${{ inputs.package_name }}
        needs: [test_python, version_gate]
        if: always() && inputs.package_type == 'python' && needs.test_python.result == 'success' && needs.version_gate.outputs.should_publish == 'true'
        permissions:
            contents: read
            id-token: write
        uses: KBVE/kbve/.github/workflows/utils-python-publish.yml@main
        with:
            project: ${{ inputs.package_name }}
            pypi_name: ${{ inputs.pypi_name }}
        secrets:
            PYPI_TOKEN: ${{ secrets.PYPI_API_SCOPE_TOKEN }}

    # ===========================================================================
    # Unreal — matrix across UE versions, build then publish
    # (only runs when package_type == 'unreal')
    # ===========================================================================
    publish_unreal:
        name: Publish Unreal — ${{ inputs.package_name }} (${{ matrix.ue_tag }})
        needs: [queue_guard, version_gate]
        if: inputs.package_type == 'unreal' && needs.version_gate.outputs.should_publish == 'true'
        strategy:
            fail-fast: false
            matrix:
                ue_tag: ${{ fromJson(inputs.ue_image_tags) }}
        permissions:
            contents: write
            packages: read
            issues: write
            pull-requests: write
        uses: ./.github/workflows/utils-unreal-plugin-cicd.yml
        with:
            plugin_path: ${{ inputs.unreal_plugin_path }}
            plugin_name: ${{ inputs.package_name }}
            ue_image_tag: ${{ matrix.ue_tag }}
            target_platforms: Linux
            deploy_to_itch: ${{ inputs.deploy_to_itch }}
            itch_username: kbve
            itch_game_id: ${{ inputs.itch_game_id }}
            itch_channel: plugin
            dependency_plugin_paths: ${{ inputs.unreal_dependency_plugins }}
        secrets:
            epic_pat: ${{ secrets.UNITY_PAT }}
            butler_api: ${{ secrets.butler_api }}

    # ---------------------------------------------------------------------------
    # Post-publish — update version.toml after successful publish.
    # Uses the version_gate output to know what version was published.
    # Unreal handles its own version.toml update inside utils-unreal-plugin-cicd.yml.
    # ---------------------------------------------------------------------------
    update_version_npm:
        name: Update version.toml (npm)
        needs: [publish_npm, version_gate]
        if: always() && needs.publish_npm.result == 'success' && needs.version_gate.outputs.should_publish == 'true'
        permissions:
            contents: write
            pull-requests: write
        uses: KBVE/kbve/.github/workflows/utils-update-version-toml.yml@dev
        with:
            package_type: npm
            package_name: ${{ inputs.package_name }}
            version: ${{ needs.version_gate.outputs.local_version }}
            version_toml_path: packages/npm/${{ inputs.package_name }}/version.toml

    update_version_crates:
        name: Update version.toml (crates)
        needs: [publish_crates, version_gate]
        if: always() && needs.publish_crates.result == 'success' && needs.version_gate.outputs.should_publish == 'true'
        permissions:
            contents: write
            pull-requests: write
        uses: KBVE/kbve/.github/workflows/utils-update-version-toml.yml@dev
        with:
            package_type: crates
            package_name: ${{ inputs.package_name }}
            version: ${{ needs.version_gate.outputs.local_version }}
            version_toml_path: packages/rust/${{ inputs.package_name }}/version.toml

    update_version_python:
        name: Update version.toml (python)
        needs: [publish_python, version_gate]
        if: always() && needs.publish_python.result == 'success' && needs.version_gate.outputs.should_publish == 'true'
        permissions:
            contents: write
            pull-requests: write
        uses: KBVE/kbve/.github/workflows/utils-update-version-toml.yml@dev
        with:
            package_type: python
            package_name: ${{ inputs.package_name }}
            version: ${{ needs.version_gate.outputs.local_version }}
            version_toml_path: packages/python/${{ inputs.pypi_name }}/version.toml

    # ---------------------------------------------------------------------------
    # Failure Tracker — opens a GitHub issue on any pipeline failure (#8186).
    # Per-package job_name makes the issue title actionable.
    # ---------------------------------------------------------------------------
    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') }}
        needs:
            [
                version_gate,
                test_npm,
                publish_npm,
                test_crates,
                publish_crates,
                test_python,
                publish_python,
                publish_unreal,
            ]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Publish'
            job_name: '${{ inputs.package_type }}/${{ inputs.package_name }}'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'
