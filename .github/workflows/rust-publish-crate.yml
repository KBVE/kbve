name: Rust Crate Publish

on:
    workflow_call:
        inputs:
            package:
                required: true
                type: string
            version:
                description: 'Target version from MDX manifest. When provided, Cargo.toml is patched to this version before publish.'
                required: false
                type: string
                default: ''
            version_source:
                description: 'Path to Cargo.toml (overrides default convention)'
                required: false
                type: string
                default: ''
        secrets:
            CRATES_TOKEN:
                required: true

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: write
            packages: write
            issues: write
            pull-requests: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Patch Cargo.toml with manifest version
              if: inputs.version != ''
              run: |
                  NAME="${{ inputs.package }}"
                  VERSION="${{ inputs.version }}"
                  SRC="${{ inputs.version_source }}"
                  CARGO="${SRC:-packages/rust/${NAME}/Cargo.toml}"

                  if [ ! -f "$CARGO" ]; then
                    echo "::error::Cargo.toml not found: $CARGO"
                    exit 1
                  fi

                  CURRENT=$(grep -m1 '^version' "$CARGO" | sed 's/version = "\(.*\)"/\1/')
                  echo "Cargo.toml version: $CURRENT → $VERSION"

                  if [ "$CURRENT" != "$VERSION" ]; then
                    sed -i "s/^version = \"$CURRENT\"/version = \"$VERSION\"/" "$CARGO"
                    echo "Patched $CARGO"
                  else
                    echo "Already at $VERSION — no patch needed"
                  fi

            - name: Rust ToolChain
              uses: dtolnay/rust-toolchain@stable

            - name: Check version against crates.io
              id: version_check
              run: |
                  LOCAL_VERSION=$(cargo metadata --no-deps --format-version 1 \
                    | jq -r '.packages[] | select(.name == "${{ inputs.package }}") | .version')
                  echo "Local version: $LOCAL_VERSION"

                  REGISTRY_VERSION=$(curl -s "https://crates.io/api/v1/crates/${{ inputs.package }}" \
                    | jq -r '.crate.max_version // "0.0.0"')
                  echo "Registry version: $REGISTRY_VERSION"

                  if [ "$LOCAL_VERSION" = "$REGISTRY_VERSION" ]; then
                    echo "Version $LOCAL_VERSION already published — skipping."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "New version $LOCAL_VERSION (registry has $REGISTRY_VERSION) — publishing."
                    echo "should_publish=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Cargo Login
              if: steps.version_check.outputs.should_publish == 'true'
              run: cargo login ${{ secrets.CRATES_TOKEN }}

            - name: Cargo Publish
              if: steps.version_check.outputs.should_publish == 'true'
              run: |
                  cargo publish -p ${{ inputs.package }} --allow-dirty
