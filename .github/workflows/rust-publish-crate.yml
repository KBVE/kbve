name: Rust Crate Publish

on:
    workflow_call:
        inputs:
            package:
                required: true
                type: string
            version_source:
                description: 'Path to MDX/JSON with version field (source of truth)'
                required: false
                type: string
                default: ''
            version_target:
                description: 'Path to Cargo.toml to patch with the version before publish'
                required: false
                type: string
                default: ''
        secrets:
            CRATES_TOKEN:
                required: true

env:
    CARGO_NET_RETRY: '10'
    CARGO_NET_TIMEOUT: '60'
    RUSTUP_MAX_RETRIES: '10'

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: write
            packages: write
            issues: write
            pull-requests: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Sync version from source to Cargo.toml
              if: ${{ inputs.version_source != '' && inputs.version_target != '' }}
              run: |
                  SRC="${{ inputs.version_source }}"
                  TGT="${{ inputs.version_target }}"

                  # Read version from source (MDX or JSON)
                  case "$SRC" in
                    *.mdx) VER=$(sed -n 's/^version: *"\([^"]*\)"/\1/p' "$SRC" | head -1) ;;
                    *.json) VER=$(jq -r '.version // ""' "$SRC" 2>/dev/null) ;;
                    *) VER=$(grep -m1 '^version' "$SRC" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null) ;;
                  esac

                  if [ -z "$VER" ]; then
                    echo "::warning::Could not read version from $SRC — skipping patch"
                    exit 0
                  fi

                  if [ ! -f "$TGT" ]; then
                    echo "::error::Target file not found: $TGT"
                    exit 1
                  fi

                  CURRENT=$(grep -m1 '^version' "$TGT" | sed 's/version = "\(.*\)"/\1/')
                  echo "Source ($SRC): $VER"
                  echo "Target ($TGT): $CURRENT"

                  if [ "$CURRENT" != "$VER" ]; then
                    sed -i "s/^version = \"$CURRENT\"/version = \"$VER\"/" "$TGT"
                    echo "Patched $TGT: $CURRENT → $VER"
                  else
                    echo "Already at $VER — no patch needed"
                  fi

            - name: Install system libraries (wry/webkit2gtk + diesel-postgres + protoc)
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                    pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
                    libpq-dev protobuf-compiler

            - name: Rust ToolChain (stable)
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: '1.96'

            - name: Check version against crates.io
              id: version_check
              run: |
                  LOCAL_VERSION=$(cargo metadata --no-deps --format-version 1 \
                    | jq -r '.packages[] | select(.name == "${{ inputs.package }}") | .version')
                  echo "Local version: $LOCAL_VERSION"

                  REGISTRY_VERSION=$(curl -s "https://crates.io/api/v1/crates/${{ inputs.package }}" \
                    | jq -r '.crate.max_version // "0.0.0"')
                  echo "Registry version: $REGISTRY_VERSION"

                  if [ "$LOCAL_VERSION" = "$REGISTRY_VERSION" ]; then
                    echo "Version $LOCAL_VERSION already published — skipping."
                    echo "should_publish=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "New version $LOCAL_VERSION (registry has $REGISTRY_VERSION) — publishing."
                    echo "should_publish=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Cargo Login
              if: steps.version_check.outputs.should_publish == 'true'
              run: cargo login ${{ secrets.CRATES_TOKEN }}

            - name: Cargo Publish
              if: steps.version_check.outputs.should_publish == 'true'
              run: |
                  set -o pipefail
                  max=6
                  attempt=0
                  while true; do
                    attempt=$((attempt + 1))
                    if cargo publish -p ${{ inputs.package }} --allow-dirty 2>publish.err; then
                      cat publish.err >&2 || true
                      exit 0
                    fi
                    cat publish.err >&2
                    if grep -qiE "already (exists|uploaded)|crate version .* is already" publish.err; then
                      echo "::notice::${{ inputs.package }} already published — treating as success."
                      exit 0
                    fi
                    if ! grep -qi "429 Too Many Requests" publish.err; then
                      echo "::error::cargo publish failed with a non-retryable error."
                      exit 1
                    fi
                    if [ "$attempt" -ge "$max" ]; then
                      echo "::error::cargo publish still rate-limited after $max attempts."
                      exit 1
                    fi
                    wait=$((attempt * 120))
                    echo "::warning::crates.io rate limit (429); attempt $attempt/$max — sleeping ${wait}s."
                    sleep "$wait"
                  done
