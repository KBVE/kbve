name: CI - Unreal Game

run-name: 'CI - Unreal Game / ${{ inputs.app_name }} (stub)'

# STUB — Win64 / Mac self-hosted runners are not yet provisioned. The
# workflow accepts the same dispatch shape as ci-unity / ci-godot so
# ci-main.yml can fan-out to it once runners come online. Until then it
# short-circuits with a notice; no actual build runs.

on:
    workflow_dispatch:
        inputs:
            key:
                description: 'Manifest key'
                required: true
                type: string
            app_name:
                description: 'UE project / build name'
                required: true
                type: string
            project_path:
                description: 'Path to dir containing the .uproject file'
                required: true
                type: string
            engine_version:
                description: 'UE version pin (e.g. 5.4.4)'
                required: true
                type: string
            build_targets:
                description: 'JSON array of UE platform targets (e.g. ["Win64","Linux"])'
                required: false
                type: string
                default: '["Linux"]'
            features:
                description: 'JSON array of UE plugin / feature toggles'
                required: false
                type: string
                default: '[]'
            external_repo_url:
                description: 'Optional external repo URL (e.g. private game repo)'
                required: false
                type: string
                default: ''
            version_source:
                description: 'Path to version source file (mdx)'
                required: false
                type: string
                default: ''
            version_toml:
                description: 'Path to version.toml (PUBLISHED tracker)'
                required: false
                type: string
                default: ''
            manifest_version:
                description: 'Version from manifest (LOCAL)'
                required: false
                type: string
                default: ''
            deploy_to_itch:
                description: 'Deploy artefacts to itch.io after build'
                required: false
                type: boolean
                default: false
            itch_user:
                description: 'Itch.io publisher user'
                required: false
                type: string
                default: ''
            itch_game:
                description: 'Itch.io game slug'
                required: false
                type: string
                default: ''
            dispatched_at:
                description: 'Unix timestamp when this was dispatched (queue guard)'
                required: true
                type: string

permissions: {}

jobs:
    stub:
        name: Stub (runners not provisioned)
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Notice
              run: |
                  echo "::warning::ci-unreal-game.yml is a STUB."
                  echo "Win64 + Mac self-hosted runners for UE standalone-game"
                  echo "builds are not yet provisioned. This dispatch is a no-op."
                  echo ""
                  echo "Inputs received (for dispatch trace):"
                  echo "  key=${{ inputs.key }}"
                  echo "  app_name=${{ inputs.app_name }}"
                  echo "  project_path=${{ inputs.project_path }}"
                  echo "  engine_version=${{ inputs.engine_version }}"
                  echo "  build_targets=${{ inputs.build_targets }}"
                  echo "  manifest_version=${{ inputs.manifest_version }}"
                  echo ""
                  echo "Once arc-runner-ue-win and arc-runner-ue-mac are online,"
                  echo "replace this stub with: queue_guard → version_gate →"
                  echo "matrix build via UAT (RunUAT.bat / RunUAT.sh) per target →"
                  echo "optional itch publish → post-publish sync."

    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') }}
        needs: [stub]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Unreal Game'
            job_name: ${{ inputs.app_name }}
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'

    track_success:
        name: Track Success
        if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        needs: [stub]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - Unreal Game'
            job_name: ${{ inputs.app_name }}
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'success'
