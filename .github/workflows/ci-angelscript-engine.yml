name: AngelScript Engine Build

on:
    workflow_dispatch:
        inputs:
            platforms:
                description: 'Platforms to build (comma-separated: windows,mac,linux)'
                required: true
                type: string
                default: 'windows,mac,linux'
            engine_ref:
                description: 'Branch or tag to build from UnrealEngine-Angelscript'
                required: false
                type: string
                default: 'angelscript-master'
            skip_version_gate:
                description: 'Skip version gate (force rebuild)'
                required: false
                type: boolean
                default: false
            build_dedicated_server:
                description: 'Build Linux dedicated server Docker image'
                required: false
                type: boolean
                default: true

concurrency:
    group: angelscript-engine-${{ github.ref }}
    cancel-in-progress: false

permissions: {}

env:
    ENGINE_REPO: KBVE/UnrealEngine-Angelscript
    DOCKER_IMAGE: ghcr.io/kbve/angelscript-server
    # Longhorn PVC mount path for cached engine source (set per-runner)
    ENGINE_CACHE_PATH: /mnt/longhorn/angelscript-engine

jobs:
    # ── Fork Guard ──────────────────────────────────────────────
    guard:
        name: Fork Guard
        runs-on: ubuntu-latest
        timeout-minutes: 2
        outputs:
            allowed: ${{ steps.check.outputs.allowed }}
        steps:
            - name: Verify origin and actor
              id: check
              uses: actions/github-script@v8
              with:
                  script: |
                      try {
                        const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          username: context.actor,
                        });
                        const level = data.permission;
                        if (level === 'admin' || level === 'write') {
                          core.setOutput('allowed', 'true');
                        } else {
                          core.error(`Actor ${context.actor} has ${level} access — insufficient`);
                          core.setOutput('allowed', 'false');
                        }
                      } catch (err) {
                        core.error(`Permission check failed: ${err.message}`);
                        core.setOutput('allowed', 'false');
                      }

    # ── Version Gate ────────────────────────────────────────────
    version-gate:
        name: Version Gate
        needs: guard
        if: needs.guard.outputs.allowed == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        outputs:
            version: ${{ steps.extract.outputs.version }}
            should_build: ${{ steps.compare.outputs.should_build }}
            tag: ${{ steps.compare.outputs.tag }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Extract version
              id: extract
              run: |
                  VERSION_TOML="apps/angelscript/version.toml"
                  if [ -f "${VERSION_TOML}" ]; then
                    VERSION=$(grep -m1 '^version' "${VERSION_TOML}" | sed 's/version = "\(.*\)"/\1/')
                  else
                    VERSION="0.0.0"
                  fi
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "::notice::Current version: ${VERSION}"

            - name: Compare versions
              id: compare
              env:
                  GH_TOKEN: ${{ secrets.UNITY_PAT }}
              run: |
                  VERSION="${{ steps.extract.outputs.version }}"
                  TAG="angelscript-v${VERSION}"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

                  if [ "${{ inputs.skip_version_gate }}" = "true" ]; then
                    echo "::notice::Version gate skipped (forced rebuild)"
                    echo "should_build=true" >> "$GITHUB_OUTPUT"
                  elif [ "${VERSION}" = "0.0.0" ]; then
                    echo "::notice::Version is 0.0.0 — initial build"
                    echo "should_build=true" >> "$GITHUB_OUTPUT"
                  elif gh release view "${TAG}" --repo "${{ env.ENGINE_REPO }}" --json tagName >/dev/null 2>&1; then
                    echo "::notice::Release ${TAG} already exists on ${{ env.ENGINE_REPO }} — skipping build"
                    echo "should_build=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "::notice::No existing release for ${TAG} on ${{ env.ENGINE_REPO }} — will build"
                    echo "should_build=true" >> "$GITHUB_OUTPUT"
                  fi

    # ── Windows Client Build (x86) ──────────────────────────────
    build-windows:
        name: Build Windows Client (x86)
        needs: [guard, version-gate]
        if: |
            needs.guard.outputs.allowed == 'true' &&
            needs.version-gate.outputs.should_build == 'true' &&
            contains(inputs.platforms, 'windows')
        runs-on: arc-runner-ue-win
        timeout-minutes: 360
        permissions:
            contents: read
        env:
            ENGINE_REF: ${{ inputs.engine_ref }}
        steps:
            - name: Audit log
              run: |
                  echo "::notice::Windows build: ref=${{ inputs.engine_ref }}, actor=${{ github.actor }}, version=${{ needs.version-gate.outputs.version }}"

            - name: Clone or update engine source
              env:
                  UNITY_PAT: ${{ secrets.UNITY_PAT }}
              shell: pwsh
              run: |
                  $CachePath = "${{ env.ENGINE_CACHE_PATH }}"

                  if (Test-Path "$CachePath\.git") {
                    Write-Host "::notice::Using cached engine source at $CachePath"
                    Push-Location $CachePath
                    git remote set-url origin "https://x-access-token:${env:UNITY_PAT}@github.com/${{ env.ENGINE_REPO }}.git"
                    git fetch origin ${{ inputs.engine_ref }}
                    git checkout FETCH_HEAD
                    git clean -fdx -e "Engine/Binaries" -e "Engine/Intermediate"
                    Pop-Location
                  } else {
                    # Clear non-git directory if it exists (e.g. empty PVC mount)
                    if (Test-Path $CachePath) {
                      Write-Host "::notice::Clearing non-git directory at $CachePath"
                      Remove-Item -Recurse -Force "$CachePath\*"
                    }
                    Write-Host "::notice::Fresh clone of engine source"
                    git clone --depth 1 --branch ${{ inputs.engine_ref }} `
                      "https://x-access-token:${env:UNITY_PAT}@github.com/${{ env.ENGINE_REPO }}.git" `
                      $CachePath
                  }

            - name: Run Setup
              shell: pwsh
              run: |
                  Push-Location "${{ env.ENGINE_CACHE_PATH }}"
                  .\Setup.bat
                  Pop-Location

            - name: Generate project files
              shell: pwsh
              run: |
                  Push-Location "${{ env.ENGINE_CACHE_PATH }}"
                  .\GenerateProjectFiles.bat
                  Pop-Location

            - name: Build Editor (Win64)
              shell: pwsh
              run: |
                  Push-Location "${{ env.ENGINE_CACHE_PATH }}"
                  .\Engine\Build\BatchFiles\RunUAT.bat BuildTarget `
                    -target=UnrealEditor `
                    -platform=Win64 `
                    -configuration=Development `
                    -notools `
                    -unattended `
                    -utf8output
                  Pop-Location

            - name: Package Windows client
              shell: pwsh
              run: |
                  $Version = "${{ needs.version-gate.outputs.version }}"
                  $OutDir = "angelscript-win64-v${Version}"
                  New-Item -ItemType Directory -Path $OutDir -Force | Out-Null

                  # Copy editor binaries
                  Copy-Item -Recurse "${{ env.ENGINE_CACHE_PATH }}\Engine\Binaries\Win64\*" "$OutDir\"

                  Compress-Archive -Path $OutDir -DestinationPath "angelscript-win64-v${Version}.zip"

            - name: Upload Windows artifact
              uses: actions/upload-artifact@v7
              with:
                  name: angelscript-win64-v${{ needs.version-gate.outputs.version }}
                  path: angelscript-win64-v${{ needs.version-gate.outputs.version }}.zip
                  retention-days: 30

            - name: Cleanup secrets
              if: always()
              shell: pwsh
              run: |
                  Push-Location "${{ env.ENGINE_CACHE_PATH }}"
                  git remote set-url origin "https://github.com/${{ env.ENGINE_REPO }}.git"
                  Pop-Location

    # ── Mac Client Build (x86) ──────────────────────────────────
    build-mac:
        name: Build Mac Client (x86)
        needs: [guard, version-gate]
        if: |
            needs.guard.outputs.allowed == 'true' &&
            needs.version-gate.outputs.should_build == 'true' &&
            contains(inputs.platforms, 'mac')
        runs-on: arc-runner-ue-mac
        timeout-minutes: 360
        permissions:
            contents: read
        steps:
            - name: Audit log
              run: |
                  echo "::notice::Mac build: ref=${{ inputs.engine_ref }}, actor=${{ github.actor }}, version=${{ needs.version-gate.outputs.version }}"

            - name: Clone or update engine source
              env:
                  UNITY_PAT: ${{ secrets.UNITY_PAT }}
              run: |
                  CACHE="${{ env.ENGINE_CACHE_PATH }}"

                  if [ -d "${CACHE}/.git" ]; then
                    echo "::notice::Using cached engine source at ${CACHE}"
                    cd "${CACHE}"
                    git remote set-url origin "https://x-access-token:${UNITY_PAT}@github.com/${{ env.ENGINE_REPO }}.git"
                    git fetch origin ${{ inputs.engine_ref }}
                    git checkout FETCH_HEAD
                    git clean -fdx -e "Engine/Binaries" -e "Engine/Intermediate"
                  else
                    # Clear non-git directory if it exists (e.g. empty PVC mount)
                    if [ -d "${CACHE}" ]; then
                      echo "::notice::Clearing non-git directory at ${CACHE}"
                      rm -rf "${CACHE:?}"/*
                    fi
                    echo "::notice::Fresh clone of engine source"
                    git clone --depth 1 --branch ${{ inputs.engine_ref }} \
                      "https://x-access-token:${UNITY_PAT}@github.com/${{ env.ENGINE_REPO }}.git" \
                      "${CACHE}"
                  fi

            - name: Run Setup
              run: |
                  cd "${{ env.ENGINE_CACHE_PATH }}"
                  chmod +x Setup.sh
                  ./Setup.sh

            - name: Generate project files
              run: |
                  cd "${{ env.ENGINE_CACHE_PATH }}"
                  chmod +x GenerateProjectFiles.sh
                  ./GenerateProjectFiles.sh

            - name: Build Editor (Mac)
              run: |
                  cd "${{ env.ENGINE_CACHE_PATH }}"
                  ./Engine/Build/BatchFiles/RunUAT.sh BuildTarget \
                    -target=UnrealEditor \
                    -platform=Mac \
                    -configuration=Development \
                    -notools \
                    -unattended \
                    -utf8output

            - name: Package Mac client
              run: |
                  VERSION="${{ needs.version-gate.outputs.version }}"
                  OUT_DIR="angelscript-mac-v${VERSION}"
                  mkdir -p "${OUT_DIR}"

                  # Copy editor binaries
                  cp -r "${{ env.ENGINE_CACHE_PATH }}/Engine/Binaries/Mac/"* "${OUT_DIR}/"

                  zip -r "angelscript-mac-v${VERSION}.zip" "${OUT_DIR}"

            - name: Upload Mac artifact
              uses: actions/upload-artifact@v7
              with:
                  name: angelscript-mac-v${{ needs.version-gate.outputs.version }}
                  path: angelscript-mac-v${{ needs.version-gate.outputs.version }}.zip
                  retention-days: 30

            - name: Cleanup secrets
              if: always()
              run: |
                  cd "${{ env.ENGINE_CACHE_PATH }}"
                  git remote set-url origin "https://github.com/${{ env.ENGINE_REPO }}.git"

    # ── Linux Dedicated Server Build (x86) ──────────────────────
    build-linux:
        name: Build Linux Dedicated Server (x86)
        needs: [guard, version-gate]
        if: |
            needs.guard.outputs.allowed == 'true' &&
            needs.version-gate.outputs.should_build == 'true' &&
            contains(inputs.platforms, 'linux')
        runs-on: arc-runner-ue
        timeout-minutes: 480
        permissions:
            contents: read
            packages: write
        steps:
            - name: Audit log
              run: |
                  echo "::notice::Linux build: ref=${{ inputs.engine_ref }}, actor=${{ github.actor }}, version=${{ needs.version-gate.outputs.version }}, docker_image=${{ env.DOCKER_IMAGE }}"

            - name: Checkout monorepo
              uses: actions/checkout@v6

            - name: Clone or update engine source
              env:
                  UNITY_PAT: ${{ secrets.UNITY_PAT }}
              run: |
                  CACHE="${{ env.ENGINE_CACHE_PATH }}"

                  if [ -d "${CACHE}/.git" ]; then
                    echo "::notice::Using cached engine source at ${CACHE}"
                    cd "${CACHE}"
                    git remote set-url origin "https://x-access-token:${UNITY_PAT}@github.com/${{ env.ENGINE_REPO }}.git"
                    git fetch origin ${{ inputs.engine_ref }}
                    git checkout FETCH_HEAD
                    git clean -fdx -e "Engine/Binaries" -e "Engine/Intermediate"
                  else
                    # Clear non-git directory if it exists (e.g. empty PVC mount)
                    if [ -d "${CACHE}" ]; then
                      echo "::notice::Clearing non-git directory at ${CACHE}"
                      rm -rf "${CACHE:?}"/*
                    fi
                    echo "::notice::Fresh clone of engine source"
                    git clone --depth 1 --branch ${{ inputs.engine_ref }} \
                      "https://x-access-token:${UNITY_PAT}@github.com/${{ env.ENGINE_REPO }}.git" \
                      "${CACHE}"
                  fi

            - name: Run Setup
              run: |
                  cd "${{ env.ENGINE_CACHE_PATH }}"
                  chmod +x Setup.sh
                  ./Setup.sh

            - name: Generate project files
              run: |
                  cd "${{ env.ENGINE_CACHE_PATH }}"
                  chmod +x GenerateProjectFiles.sh
                  ./GenerateProjectFiles.sh

            - name: Build Linux Dedicated Server
              run: |
                  cd "${{ env.ENGINE_CACHE_PATH }}"
                  ./Engine/Build/BatchFiles/RunUAT.sh BuildTarget \
                    -target=UnrealServer \
                    -platform=Linux \
                    -configuration=Development \
                    -notools \
                    -unattended \
                    -utf8output

            - name: Package Linux server
              run: |
                  VERSION="${{ needs.version-gate.outputs.version }}"
                  OUT_DIR="angelscript-linux-server-v${VERSION}"
                  mkdir -p "${OUT_DIR}"

                  cp -r "${{ env.ENGINE_CACHE_PATH }}/Engine/Binaries/Linux/"* "${OUT_DIR}/"

                  zip -r "angelscript-linux-server-v${VERSION}.zip" "${OUT_DIR}"

            - name: Upload Linux artifact
              uses: actions/upload-artifact@v7
              with:
                  name: angelscript-linux-server-v${{ needs.version-gate.outputs.version }}
                  path: angelscript-linux-server-v${{ needs.version-gate.outputs.version }}.zip
                  retention-days: 30

            - name: Build and push Docker image
              if: inputs.build_dedicated_server == true
              run: |
                  VERSION="${{ needs.version-gate.outputs.version }}"

                  # Prepare engine directory for Docker context
                  mkdir -p docker-context/engine
                  cp -r "${{ env.ENGINE_CACHE_PATH }}/Engine/Binaries/Linux" docker-context/engine/
                  cp apps/angelscript/Dockerfile.dedicated-server docker-context/Dockerfile

                  echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

                  docker build \
                    -t "${{ env.DOCKER_IMAGE }}:${VERSION}" \
                    -t "${{ env.DOCKER_IMAGE }}:latest" \
                    -f docker-context/Dockerfile \
                    docker-context/

                  docker push "${{ env.DOCKER_IMAGE }}:${VERSION}"
                  docker push "${{ env.DOCKER_IMAGE }}:latest"

                  echo "::notice::Pushed ${{ env.DOCKER_IMAGE }}:${VERSION}"

            - name: Cleanup
              if: always()
              run: |
                  cd "${{ env.ENGINE_CACHE_PATH }}" 2>/dev/null && \
                    git remote set-url origin "https://github.com/${{ env.ENGINE_REPO }}.git" || true
                  docker logout ghcr.io 2>/dev/null || true
                  docker system prune -f 2>/dev/null || true

    # ── GitHub Release (on KBVE/UnrealEngine-Angelscript) ───────
    release:
        name: Create GitHub Release
        needs: [version-gate, build-windows, build-mac, build-linux]
        if: |
            always() &&
            needs.version-gate.outputs.should_build == 'true' &&
            (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
            (needs.build-mac.result == 'success' || needs.build-mac.result == 'skipped') &&
            (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
            (needs.build-windows.result == 'success' || needs.build-mac.result == 'success' || needs.build-linux.result == 'success')
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  path: ./artifacts
                  pattern: angelscript-*
                  merge-multiple: false

            - name: Create release on private repo
              env:
                  GH_TOKEN: ${{ secrets.UNITY_PAT }}
              run: |
                  VERSION="${{ needs.version-gate.outputs.version }}"
                  TAG="${{ needs.version-gate.outputs.tag }}"

                  # Collect all zip files from artifact directories
                  find ./artifacts -name "*.zip" -type f > /tmp/release_files.txt

                  echo "::notice::Creating release ${TAG} on ${{ env.ENGINE_REPO }} with artifacts:"
                  cat /tmp/release_files.txt

                  RELEASE_NOTES="## AngelScript Engine v${VERSION}

                  Built from ref: \`${{ inputs.engine_ref }}\`

                  ### Artifacts
                  | Platform | Status |
                  |----------|--------|
                  | Windows x86 | ${{ needs.build-windows.result }} |
                  | Mac x86 | ${{ needs.build-mac.result }} |
                  | Linux Server | ${{ needs.build-linux.result }} |

                  ### Docker
                  Linux dedicated server image: \`${{ env.DOCKER_IMAGE }}:${VERSION}\`
                  "

                  # Build gh release create command with all files
                  UPLOAD_ARGS=""
                  while IFS= read -r file; do
                    UPLOAD_ARGS="${UPLOAD_ARGS} \"${file}\""
                  done < /tmp/release_files.txt

                  eval gh release create "${TAG}" \
                    --repo "${{ env.ENGINE_REPO }}" \
                    --title "AngelScript Engine v${VERSION}" \
                    --notes "'${RELEASE_NOTES}'" \
                    --prerelease \
                    ${UPLOAD_ARGS}

    # ── Update version.toml + kube image tag ──────────────────────
    update-version:
        name: PR version.toml + kube image update
        needs: [version-gate, release, build-linux]
        if: |
            always() &&
            needs.version-gate.outputs.should_build == 'true' &&
            needs.release.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: dev

            - name: Update version.toml
              run: |
                  echo 'version = "${{ needs.version-gate.outputs.version }}"' > apps/angelscript/version.toml
                  cat apps/angelscript/version.toml

            - name: Update kube deployment image tag
              if: needs.build-linux.result == 'success'
              run: |
                  VERSION="${{ needs.version-gate.outputs.version }}"
                  DEPLOY="apps/kube/angelscript/manifest/deployment.yaml"

                  sed -i "s|image: ghcr.io/kbve/angelscript-server:.*|image: ghcr.io/kbve/angelscript-server:${VERSION}|" "${DEPLOY}"
                  echo "::notice::Updated deployment image to ghcr.io/kbve/angelscript-server:${VERSION}"
                  grep "image:" "${DEPLOY}"

            - name: Create PR
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  VERSION="${{ needs.version-gate.outputs.version }}"
                  BRANCH="auto/update-angelscript-version-${VERSION}"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git checkout -b "${BRANCH}"
                  git add apps/angelscript/version.toml
                  git add apps/kube/angelscript/manifest/deployment.yaml
                  git commit -m "chore(angelscript): update version.toml + kube image to ${VERSION} [skip ci]"
                  git push origin "${BRANCH}"

                  gh pr create \
                    --base dev \
                    --head "${BRANCH}" \
                    --title "chore(angelscript): update to v${VERSION}" \
                    --body "Automated post-build update. AngelScript Engine v${VERSION} released on ${{ env.ENGINE_REPO }}. Docker image: \`${{ env.DOCKER_IMAGE }}:${VERSION}\`"
