name: CI - MC Smoke

# Three-job MC integration smoke:
#   1. client-smoke      — Loom runClient under xvfb, scans the boot log
#                          for Mixin spec violations / apply failures.
#                          Catches the class-load crash family that
#                          compileJava and docker image builds miss
#                          (non-private static fields in mixin classes,
#                          missing @At targets, signature drift after
#                          a yarn bump).
#   2. server-ping-smoke — boots a single fabric container (no velocity,
#                          no lobby) and probes it with itzg/mc-monitor
#                          (Server List Ping). Pure Go binary, no npm
#                          tree — chosen over mineflayer to avoid the
#                          prismarine-* transitive surface. SLP works
#                          pre-login so FabricProxy-Lite enforcement is
#                          irrelevant; a green ping proves the fabric
#                          mod stack reached "Done" without crashing.
#   3. dependency-review — gates new PR-introduced dependencies on the
#                          GH-native advisory DB (high+ blocks merge).

on:
    workflow_dispatch:
    pull_request:
        branches: [main, dev]
        paths:
            - 'apps/mc/**'
            - '!apps/mc/**/*.md'
            - '!apps/mc/**/*.mdx'
            - '.github/workflows/ci-mc-smoke.yml'
    push:
        branches: [main, dev]
        paths:
            - 'apps/mc/**'
            - '!apps/mc/**/*.md'
            - '!apps/mc/**/*.mdx'
            - '.github/workflows/ci-mc-smoke.yml'

concurrency:
    group: mc-smoke-${{ github.ref }}
    cancel-in-progress: false

permissions: {}

jobs:
    client-smoke:
        name: Headless Client Smoke (Loom runClient)
        runs-on: ubuntu-latest
        timeout-minutes: 25
        env:
            NX_NO_CLOUD: true
            GRADLE_OPTS: '-Xmx3g -Dorg.gradle.daemon=false'

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Java 21
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: '21'

            - name: Setup Node v24
              uses: actions/setup-node@v7
              with:
                  node-version: 24

            - name: Setup pnpm v10
              uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0
                  run_install: false

            - name: Cache Gradle (Loom MC + libs)
              uses: actions/cache@v6
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                      apps/mc/behavior_statetree/java/.gradle
                  key: ${{ runner.os }}-mc-loom-${{ hashFiles('apps/mc/behavior_statetree/java/build.gradle', 'apps/mc/behavior_statetree/java/settings.gradle', 'apps/mc/behavior_statetree/java/gradle/wrapper/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-mc-loom-

            - name: Install xvfb + Mesa software GL
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                      xvfb \
                      libgl1 \
                      libglu1-mesa \
                      libglx-mesa0 \
                      mesa-utils \
                      libxext6 libxrandr2 libxcursor1 libxi6 libxxf86vm1 \
                      libasound2t64 libpulse0

            - name: Run headless client smoke
              env:
                  TIMEOUT_SECS: '300'
              run: bash apps/mc/scripts/headless-client-smoke.sh

            - name: Upload client log on failure
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: client-smoke-log
                  path: /tmp/mc-headless-client.log
                  if-no-files-found: ignore
                  retention-days: 7

    server-ping-smoke:
        name: Server Ping Smoke (fabric + mc-monitor)
        runs-on: ubuntu-latest
        timeout-minutes: 25
        env:
            NX_NO_CLOUD: true
            MC_MONITOR_VERSION: '0.16.2'

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node v24
              uses: actions/setup-node@v7
              with:
                  node-version: 24

            - name: Setup pnpm v10
              uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0
                  run_install: false

            - name: Get pnpm Store Path
              id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm Cache
              uses: actions/cache@v6
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install pnpm Dependencies
              run: pnpm install --frozen-lockfile
              env:
                  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

            - name: Install mc-monitor (itzg)
              run: |
                  set -euo pipefail
                  ARCH=linux_amd64
                  V="${MC_MONITOR_VERSION}"
                  curl -fsSL -o /tmp/mc-monitor.tgz \
                      "https://github.com/itzg/mc-monitor/releases/download/${V}/mc-monitor_${V}_${ARCH}.tar.gz"
                  sudo tar -xzf /tmp/mc-monitor.tgz -C /usr/local/bin mc-monitor
                  sudo chmod +x /usr/local/bin/mc-monitor
                  command -v mc-monitor && file /usr/local/bin/mc-monitor

            - name: Login to GHCR (pull mc images)
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ github.token }}

            - name: Ensure ghcr.io/kbve/mc:latest present (pull or build)
              run: |
                  set -e
                  if docker pull ghcr.io/kbve/mc:latest 2>/dev/null; then
                      docker tag ghcr.io/kbve/mc:latest kbve/mc:latest
                  else
                      echo "[ensure] ghcr image missing, building locally"
                      pnpm nx run mc:container --configuration=local --no-cloud
                  fi
                  docker image inspect kbve/mc:latest >/dev/null

            - name: Boot fabric server (no velocity, SLP allowed pre-login)
              run: |
                  docker rm -f mc-smoke-fabric 2>/dev/null || true
                  docker run -d --name mc-smoke-fabric \
                      -p 25565:25565 \
                      -e EULA=TRUE \
                      -e ONLINE_MODE=false \
                      -e MEMORY=2G \
                      kbve/mc:latest

            - name: Wait for fabric server ready
              run: |
                  for i in $(seq 1 120); do
                      if docker logs mc-smoke-fabric 2>&1 | grep -q "Done ("; then
                          echo "fabric ready after ${i} polls"
                          break
                      fi
                      if [ "$i" -eq 120 ]; then
                          echo "[smoke] fabric never reached Done within 600s"
                          docker logs mc-smoke-fabric 2>&1 | tail -80
                          exit 1
                      fi
                      sleep 5
                  done

            - name: Probe fabric (mc-monitor SLP)
              env:
                  MC_HOST: 127.0.0.1
                  MC_PORT: '25565'
                  RETRY_INTERVAL: 5s
                  RETRY_LIMIT: '24'
              run: bash apps/mc/scripts/server-ping-smoke.sh

            - name: Dump fabric logs on failure
              if: failure()
              run: docker logs mc-smoke-fabric --tail 400 2>&1 || true

            - name: Tear down fabric
              if: always()
              run: docker rm -f mc-smoke-fabric 2>/dev/null || true

    dependency-review:
        name: Dependency Review (PR delta)
        if: ${{ github.event_name == 'pull_request' }}
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Dependency Review
              uses: actions/dependency-review-action@v5
              with:
                  fail-on-severity: high
                  comment-summary-in-pr: on-failure

    track_failure:
        name: Track Failures
        if: ${{ always() && contains(needs.*.result, 'failure') && github.event_name != 'pull_request' }}
        needs: [client-smoke, server-ping-smoke, dependency-review]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - MC Smoke'
            job_name: 'mc-smoke'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'failure'

    track_success:
        name: Track Success
        if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && github.event_name != 'pull_request' }}
        needs: [client-smoke, server-ping-smoke, dependency-review]
        permissions:
            issues: write
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@main
        with:
            workflow_name: 'CI - MC Smoke'
            job_name: 'mc-smoke'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: 'success'
