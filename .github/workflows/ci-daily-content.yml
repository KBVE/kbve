name: Daily Content

on:
    schedule:
        - cron: '0 1 * * *'
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: daily-content
    cancel-in-progress: false

jobs:
    router:
        name: Plan daily routes
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.plan.outputs.matrix }}
            has_work: ${{ steps.plan.outputs.has_work }}
        steps:
            - name: Checkout dev
              uses: actions/checkout@v7
              with:
                  ref: dev

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install uv
              uses: Wandalen/wretry.action@v3.8.0
              with:
                  action: astral-sh/setup-uv@v7
                  attempt_limit: 3
                  attempt_delay: 15000

            - name: Sync Python dependencies
              working-directory: packages/python/kbve
              run: uv sync

            - name: Plan routes
              id: plan
              working-directory: packages/python/kbve
              run: uv run kbve-nx-router --cadence daily --json

    builder:
        name: Build ${{ matrix.route }}
        needs: router
        if: needs.router.outputs.has_work == 'true'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.router.outputs.matrix) }}
        steps:
            - name: Checkout dev
              uses: actions/checkout@v7
              with:
                  ref: dev

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install uv
              uses: Wandalen/wretry.action@v3.8.0
              with:
                  action: astral-sh/setup-uv@v7
                  attempt_limit: 3
                  attempt_delay: 15000

            - name: Sync Python dependencies
              working-directory: packages/python/kbve
              run: uv sync

            - name: Build route ${{ matrix.route }}
              working-directory: packages/python/kbve
              run: uv run kbve-nx-build ${{ matrix.route }}

            - name: Create PR
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add apps/kbve/astro-kbve/src/content/docs
                  if git diff --cached --quiet; then
                    echo "::notice::No pending changes for route ${{ matrix.route }} — nothing to commit."
                    exit 0
                  fi

                  BRANCH="auto/daily-${{ matrix.route }}-$(date -u +%Y-%m-%d)"
                  git checkout -b "${BRANCH}"
                  git commit -m "chore(content): daily ${{ matrix.route }} scaffold [skip ci]"
                  git push origin "${BRANCH}"

                  gh pr create \
                    --base dev \
                    --head "${BRANCH}" \
                    --title "chore(content): daily ${{ matrix.route }} scaffold" \
                    --body "Automated daily content update for route \`${{ matrix.route }}\`. Review and fill in before merge." \
                    --label "auto-pr"
