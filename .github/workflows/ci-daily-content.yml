name: Daily Content

on:
    schedule:
        - cron: '0 1 * * *'
    workflow_dispatch:
        inputs:
            route:
                description: 'Build a single route (bypasses cadence). Blank = use cadence.'
                required: false
                type: string
            cadence:
                description: 'Cadence to run when route is blank.'
                required: false
                default: 'daily'
                type: string

permissions:
    contents: write
    pull-requests: write
    actions: write

concurrency:
    group: daily-content
    cancel-in-progress: false

jobs:
    router:
        name: Plan daily routes
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.plan.outputs.matrix }}
            has_work: ${{ steps.plan.outputs.has_work }}
        steps:
            - name: Checkout dev
              uses: actions/checkout@v7
              with:
                  ref: dev

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install uv
              uses: Wandalen/wretry.action@v3.8.0
              with:
                  action: astral-sh/setup-uv@v7
                  attempt_limit: 3
                  attempt_delay: 15000

            - name: Sync Python dependencies
              working-directory: packages/python/kbve
              run: uv sync

            - name: Plan routes
              id: plan
              working-directory: packages/python/kbve
              run: |
                  if [ -n "${{ github.event.inputs.route }}" ]; then
                    uv run kbve-nx-router --route "${{ github.event.inputs.route }}" --json
                  else
                    uv run kbve-nx-router --cadence "${{ github.event.inputs.cadence || 'daily' }}" --json
                  fi

    builder:
        name: Build ${{ matrix.route }}
        needs: router
        if: needs.router.outputs.has_work == 'true'
        runs-on: ubuntu-latest
        # report runs `nx run-many -t coverage` across several projects — slow.
        timeout-minutes: 120
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.router.outputs.matrix) }}
        steps:
            - name: Checkout dev
              uses: actions/checkout@v7
              with:
                  ref: dev

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install uv
              uses: Wandalen/wretry.action@v3.8.0
              with:
                  action: astral-sh/setup-uv@v7
                  attempt_limit: 3
                  attempt_delay: 15000

            - name: Sync Python dependencies
              working-directory: packages/python/kbve
              run: uv sync

            - name: Setup Node v24
              if: contains(matrix.needs, 'node')
              uses: actions/setup-node@v7
              with:
                  node-version: 24

            - name: Setup pnpm v10
              if: contains(matrix.needs, 'node')
              uses: pnpm/action-setup@v5
              with:
                  version: 11.15.0
                  run_install: false

            - name: Install pnpm Dependencies
              if: contains(matrix.needs, 'node')
              run: pnpm install --frozen-lockfile

            - name: Setup Rust toolchain
              if: contains(matrix.needs, 'rust')
              run: |
                  set -euo pipefail
                  if command -v rustup &>/dev/null; then
                    rustup update stable
                  else
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
                    echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
                  fi

            - name: Install cargo-audit
              if: contains(matrix.needs, 'rust')
              run: |
                  set -euo pipefail
                  if ! command -v cc &>/dev/null; then
                    apt-get update -qq && apt-get install -y -qq build-essential pkg-config libssl-dev
                  fi
                  if ! command -v cargo-audit &>/dev/null; then
                    cargo install cargo-audit --locked
                    echo "cargo-audit installed: $(cargo audit --version)"
                  else
                    echo "cargo-audit already available: $(cargo audit --version)"
                  fi

            - name: Install pip-audit
              if: contains(matrix.needs, 'python')
              run: |
                  set -euo pipefail
                  pip install pip-audit
                  echo "pip-audit installed: $(pip-audit --version)"

            - name: Install protoc
              if: contains(matrix.needs, 'protoc')
              run: |
                  set -euo pipefail
                  PROTOC_VERSION=29.5
                  curl -sLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
                  sudo unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local
                  protoc --version

            - name: Build route ${{ matrix.route }}
              working-directory: packages/python/kbve
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  UNITY_PAT: ${{ secrets.UNITY_PAT }}
              run: |
                  uv run kbve-nx-build "${{ matrix.route }}" \
                    --timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                    --workdir "${RUNNER_TEMP}" \
                    --public-dir "$GITHUB_WORKSPACE/apps/kbve/astro-kbve/public/data/nx" \
                    --content-root "$GITHUB_WORKSPACE/apps/kbve/astro-kbve/src/content/docs"

            - name: Create PR
              id: pr
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add apps/kbve/astro-kbve/src/content/docs apps/kbve/astro-kbve/public/data/nx apps/kbve/astro-kbve/src/data
                  if git diff --cached --quiet; then
                    echo "::notice::No pending changes for route ${{ matrix.route }} — nothing to commit."
                    exit 0
                  fi

                  # Stable per-route/day branch. Force-push so a same-day
                  # re-run (nightly + manual dispatch, or an Actions re-run)
                  # updates the existing branch in place instead of failing on
                  # a non-fast-forward push.
                  BRANCH="auto/daily-${{ matrix.route }}-$(date -u +%Y-%m-%d)"
                  git checkout -B "${BRANCH}"
                  git commit -m "chore(content): daily ${{ matrix.route }} scaffold [skip ci]"
                  git push --force origin "${BRANCH}"

                  # Reuse an already-open PR for this branch (force-push updated
                  # it in place) instead of opening a duplicate.
                  PR_NUM=$(gh pr list --head "${BRANCH}" --base dev --state open \
                    --json number --jq '.[0].number // empty')
                  if [ -z "${PR_NUM}" ]; then
                    PR_URL=$(gh pr create \
                      --base dev \
                      --head "${BRANCH}" \
                      --title "chore(content): daily ${{ matrix.route }} scaffold" \
                      --body "Automated daily content update for route \`${{ matrix.route }}\`." \
                      --label "auto-pr")
                    PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')
                    echo "Created PR #${PR_NUM}"
                  else
                    echo "Reusing open PR #${PR_NUM} (force-pushed update)"
                  fi
                  echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"

            - name: Dispatch auto-merge
              if: steps.pr.outputs.pr_number != ''
              uses: ./.github/actions/dispatch-auto-merge
              with:
                  pr_number: ${{ steps.pr.outputs.pr_number }}
                  ref: dev
                  github_token: ${{ github.token }}
