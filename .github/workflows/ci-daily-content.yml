name: Daily Content

on:
    schedule:
        - cron: '0 1 * * *'
    workflow_dispatch:
        inputs:
            route:
                description: 'Build a single route (bypasses cadence). Blank = use cadence.'
                required: false
                type: string
            cadence:
                description: 'Cadence to run when route is blank.'
                required: false
                default: 'daily'
                type: string

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: daily-content
    cancel-in-progress: false

jobs:
    router:
        name: Plan daily routes
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.plan.outputs.matrix }}
            has_work: ${{ steps.plan.outputs.has_work }}
        steps:
            - name: Checkout dev
              uses: actions/checkout@v7
              with:
                  ref: dev

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install uv
              uses: Wandalen/wretry.action@v3.8.0
              with:
                  action: astral-sh/setup-uv@v7
                  attempt_limit: 3
                  attempt_delay: 15000

            - name: Sync Python dependencies
              working-directory: packages/python/kbve
              run: uv sync

            - name: Plan routes
              id: plan
              working-directory: packages/python/kbve
              run: |
                  if [ -n "${{ github.event.inputs.route }}" ]; then
                    uv run kbve-nx-router --route "${{ github.event.inputs.route }}" --json
                  else
                    uv run kbve-nx-router --cadence "${{ github.event.inputs.cadence || 'daily' }}" --json
                  fi

    builder:
        name: Build ${{ matrix.route }}
        needs: router
        if: needs.router.outputs.has_work == 'true'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.router.outputs.matrix) }}
        steps:
            - name: Checkout dev
              uses: actions/checkout@v7
              with:
                  ref: dev

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install uv
              uses: Wandalen/wretry.action@v3.8.0
              with:
                  action: astral-sh/setup-uv@v7
                  attempt_limit: 3
                  attempt_delay: 15000

            - name: Sync Python dependencies
              working-directory: packages/python/kbve
              run: uv sync

            - name: Setup Node v24
              if: contains(matrix.needs, 'node')
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Setup pnpm v10
              if: contains(matrix.needs, 'node')
              uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0
                  run_install: false

            - name: Install pnpm Dependencies
              if: contains(matrix.needs, 'node')
              run: pnpm install --frozen-lockfile

            - name: Setup Rust toolchain
              if: contains(matrix.needs, 'rust')
              run: |
                  set -euo pipefail
                  if command -v rustup &>/dev/null; then
                    rustup update stable
                  else
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
                    echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
                  fi

            - name: Install cargo-audit
              if: contains(matrix.needs, 'rust')
              run: |
                  set -euo pipefail
                  if ! command -v cc &>/dev/null; then
                    apt-get update -qq && apt-get install -y -qq build-essential pkg-config libssl-dev
                  fi
                  if ! command -v cargo-audit &>/dev/null; then
                    cargo install cargo-audit --locked
                    echo "cargo-audit installed: $(cargo audit --version)"
                  else
                    echo "cargo-audit already available: $(cargo audit --version)"
                  fi

            - name: Install pip-audit
              if: contains(matrix.needs, 'python')
              run: |
                  set -euo pipefail
                  pip install pip-audit
                  echo "pip-audit installed: $(pip-audit --version)"

            - name: Build route ${{ matrix.route }}
              working-directory: packages/python/kbve
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  uv run kbve-nx-build "${{ matrix.route }}" \
                    --timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                    --workdir "${RUNNER_TEMP}" \
                    --public-dir "$GITHUB_WORKSPACE/apps/kbve/astro-kbve/public/data/nx" \
                    --content-root "$GITHUB_WORKSPACE/apps/kbve/astro-kbve/src/content/docs"

            - name: Create PR
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add apps/kbve/astro-kbve/src/content/docs apps/kbve/astro-kbve/public/data/nx
                  if git diff --cached --quiet; then
                    echo "::notice::No pending changes for route ${{ matrix.route }} — nothing to commit."
                    exit 0
                  fi

                  BRANCH="auto/daily-${{ matrix.route }}-$(date -u +%Y-%m-%d)"
                  git checkout -b "${BRANCH}"
                  git commit -m "chore(content): daily ${{ matrix.route }} scaffold [skip ci]"
                  git push origin "${BRANCH}"

                  gh pr create \
                    --base dev \
                    --head "${BRANCH}" \
                    --title "chore(content): daily ${{ matrix.route }} scaffold" \
                    --body "Automated daily content update for route \`${{ matrix.route }}\`. Review and fill in before merge." \
                    --label "auto-pr"
