name: External Publish

on:
    workflow_call:
        inputs:
            app_name:
                description: 'CI registry app key (e.g. mc)'
                required: true
                type: string
            version:
                description: 'Version that was published (semver)'
                required: true
                type: string
            source_path:
                description: 'Path to the app source directory (repo-relative)'
                required: true
                type: string
            external_publish:
                description: 'JSON-encoded ExternalPublish object from the dispatch manifest'
                required: true
                type: string
        secrets:
            MODRINTH_TOKEN:
                description: 'Modrinth PAT (mrp_…) with version:create scope — used for v2 uploads'
                required: false
            MODRINTH_SESSION:
                description: 'Modrinth session token (mra_…) — used for v3 server-listing PATCH on `minecraft_java_server` projects. Required when external_publish.modrinth_server_address is set.'
                required: false
            ITCH_API_KEY:
                description: 'butler API key for Itch.io uploads'
                required: false
            STEAM_USERNAME:
                description: 'Steamworks builder username'
                required: false
            STEAM_PASSWORD:
                description: 'Steamworks builder password'
                required: false
            CURSEFORGE_TOKEN:
                description: 'CurseForge upload API token'
                required: false
            FACTORIO:
                description: 'Factorio mod portal API key (ModPortal: Upload Mods scope)'
                required: false

jobs:
    modrinth:
        name: Modrinth (${{ inputs.app_name }} v${{ inputs.version }})
        if: |
            fromJson(inputs.external_publish).modrinth_mod_id != '' ||
            fromJson(inputs.external_publish).modrinth_pack_id != ''
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/kbve/mc:gradle
            env:
                GRADLE_USER_HOME: /home/gradle/.gradle
        timeout-minutes: 25
        permissions:
            contents: read
        defaults:
            run:
                shell: bash
        steps:
            - name: Install runtime dependencies (curl, jq, zip)
              run: |
                  set -euo pipefail
                  if ! command -v jq >/dev/null 2>&1 || ! command -v zip >/dev/null 2>&1; then
                    apt-get update -qq
                    apt-get install -y --no-install-recommends curl jq zip
                  fi

            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve external_publish fields
              id: ep
              run: |
                  EP='${{ inputs.external_publish }}'
                  echo "mod_id=$(echo "$EP" | jq -r '.modrinth_mod_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "pack_id=$(echo "$EP" | jq -r '.modrinth_pack_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "version_type=$(echo "$EP" | jq -r '.modrinth_version_type // "release"')" >> "$GITHUB_OUTPUT"
                  echo "loaders=$(echo "$EP" | jq -c '.modrinth_loaders // "[\"fabric\"]" | if type=="string" then fromjson else . end')" >> "$GITHUB_OUTPUT"
                  echo "game_versions=$(echo "$EP" | jq -c '.modrinth_game_versions // "[]" | if type=="string" then fromjson else . end')" >> "$GITHUB_OUTPUT"
                  echo "rolling_version=$(echo "$EP" | jq -r '.modrinth_rolling_version // ""')" >> "$GITHUB_OUTPUT"
                  echo "server_address=$(echo "$EP" | jq -r '.modrinth_server_address // ""')" >> "$GITHUB_OUTPUT"

            - name: Pin version.toml to publishing version
              env:
                  VERSION: ${{ inputs.version }}
              run: |
                  set -euo pipefail
                  VTOML="${{ inputs.source_path }}/version.toml"
                  if [ ! -f "$VTOML" ]; then
                    echo "::error::version.toml not found at $VTOML"
                    exit 1
                  fi
                  CURRENT=$(grep -E '^version' "$VTOML" | head -1 | sed 's/.*"\(.*\)"/\1/')
                  if [ "$CURRENT" != "$VERSION" ]; then
                    echo "Pinning $VTOML: $CURRENT → $VERSION (post_publish bump not yet applied)"
                    sed -i "s/^version = .*/version = \"${VERSION}\"/" "$VTOML"
                  fi

            - name: Build Fabric mod JAR
              run: |
                  cd "${{ inputs.source_path }}/behavior_statetree/java"
                  gradle build --no-daemon

            - name: Locate built JAR
              id: jar
              run: |
                  JAR=$(ls "${{ inputs.source_path }}/behavior_statetree/java/build/libs/"*.jar 2>/dev/null | head -1)
                  if [ -z "$JAR" ]; then
                    echo "::error::No JAR found under build/libs/"
                    exit 1
                  fi
                  echo "path=$JAR" >> "$GITHUB_OUTPUT"
                  echo "name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

            - name: Publish JAR to Modrinth mod project
              if: steps.ep.outputs.mod_id != ''
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  MOD_PROJECT_ID: ${{ steps.ep.outputs.mod_id }}
                  VERSION: ${{ inputs.version }}
                  VERSION_TYPE: ${{ steps.ep.outputs.version_type }}
                  LOADERS: ${{ steps.ep.outputs.loaders }}
                  GAME_VERSIONS: ${{ steps.ep.outputs.game_versions }}
                  ROLLING_VERSION: ${{ steps.ep.outputs.rolling_version }}
                  JAR_PATH: ${{ steps.jar.outputs.path }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_TOKEN:-}" ]; then
                    echo "::error::MODRINTH_TOKEN secret missing"
                    exit 1
                  fi

                  if [ -n "$ROLLING_VERSION" ]; then
                    EXISTING=$(curl -sSL --fail-with-body -H "Authorization: $MODRINTH_TOKEN" \
                      "https://api.modrinth.com/v2/project/$MOD_PROJECT_ID/version" \
                      | jq -r '[.[] | select(.featured == true)] | .[0].id // ""')
                  else
                    EXISTING=$(curl -sSL --fail-with-body -H "Authorization: $MODRINTH_TOKEN" \
                      "https://api.modrinth.com/v2/project/$MOD_PROJECT_ID/version" \
                      | jq -r --arg v "$VERSION" '.[] | select(.version_number == $v) | .id' \
                      | head -1)
                  fi

                  if [ -n "$EXISTING" ] && [ -z "$ROLLING_VERSION" ]; then
                    echo "::notice::JAR v$VERSION already on Modrinth (id=$EXISTING) — skipping."
                    exit 0
                  fi

                  if [ -n "$EXISTING" ] && [ -n "$ROLLING_VERSION" ]; then
                    echo "── Rolling JAR mode: replacing file on featured slot $EXISTING ──"
                    OLD_HASHES=$(curl -sSL --fail-with-body -H "Authorization: $MODRINTH_TOKEN" \
                      "https://api.modrinth.com/v2/version/$EXISTING" \
                      | jq -r '.files[].hashes.sha1')

                    printf '{"file_parts":["jar"]}' > /tmp/jar-add-data.json
                    HTTP_CODE=$(curl -sSL -o /tmp/jar-add.json -w '%{http_code}' \
                      -X POST "https://api.modrinth.com/v2/version/$EXISTING/file" \
                      -H "Authorization: $MODRINTH_TOKEN" \
                      -F "data=@/tmp/jar-add-data.json;type=application/json" \
                      -F "jar=@$JAR_PATH;type=application/java-archive")
                    if [ "$HTTP_CODE" != "204" ] && [ "$HTTP_CODE" != "200" ]; then
                      echo "::error::Modrinth JAR add-to-version failed (HTTP $HTTP_CODE)"
                      cat /tmp/jar-add.json
                      exit 1
                    fi
                    echo "Added new JAR file to slot $EXISTING"

                    for hash in $OLD_HASHES; do
                      [ -z "$hash" ] && continue
                      DEL_CODE=$(curl -sSL -o /tmp/del-resp.json -w '%{http_code}' \
                        -X DELETE "https://api.modrinth.com/v2/version_file/$hash" \
                        -H "Authorization: $MODRINTH_TOKEN")
                      if [ "$DEL_CODE" != "204" ]; then
                        echo "::warning::Delete old JAR file (sha1=$hash) failed HTTP $DEL_CODE"
                        cat /tmp/del-resp.json || true
                      else
                        echo "Removed old JAR file sha1=$hash"
                      fi
                    done

                    PATCH_CODE=$(curl -sSL -o /tmp/jar-patch.json -w '%{http_code}' \
                      -X PATCH "https://api.modrinth.com/v2/version/$EXISTING" \
                      -H "Authorization: $MODRINTH_TOKEN" \
                      -H "Content-Type: application/json" \
                      -d "{\"version_number\":\"$VERSION\",\"name\":\"behavior_statetree $VERSION\"}")
                    if [ "$PATCH_CODE" != "204" ]; then
                      echo "::warning::Failed to PATCH version_number to $VERSION (HTTP $PATCH_CODE)"
                      cat /tmp/jar-patch.json || true
                    else
                      echo "Renamed slot $EXISTING → version_number=$VERSION"
                    fi
                    exit 0
                  fi

                  cat > /tmp/data.json <<JSON
                  {
                    "name": "behavior_statetree $VERSION",
                    "version_number": "$VERSION",
                    "version_type": "$VERSION_TYPE",
                    "project_id": "$MOD_PROJECT_ID",
                    "loaders": $LOADERS,
                    "game_versions": $GAME_VERSIONS,
                    "featured": true,
                    "dependencies": [{"project_id":"P7dR8mSH","dependency_type":"required"}],
                    "file_parts": ["jar"]
                  }
                  JSON

                  HTTP_CODE=$(curl -sSL -o /tmp/jar-response.json -w '%{http_code}' \
                    -X POST "https://api.modrinth.com/v2/version" \
                    -H "Authorization: $MODRINTH_TOKEN" \
                    -F "data=@/tmp/data.json;type=application/json" \
                    -F "jar=@$JAR_PATH;type=application/java-archive")
                  if [ "$HTTP_CODE" != "200" ]; then
                    echo "::error::Modrinth JAR upload failed (HTTP $HTTP_CODE)"
                    cat /tmp/jar-response.json
                    exit 1
                  fi
                  jq -r '"Published JAR — version id \(.id)"' /tmp/jar-response.json

            - name: Build mrpack
              if: steps.ep.outputs.pack_id != ''
              run: |
                  cd "${{ inputs.source_path }}/behavior_statetree"
                  ./mrpack/build-mrpack.sh

            - name: Locate built mrpack
              if: steps.ep.outputs.pack_id != ''
              id: mrpack
              run: |
                  MRPACK=$(ls "${{ inputs.source_path }}/behavior_statetree/mrpack/dist/"*.mrpack 2>/dev/null | head -1)
                  if [ -z "$MRPACK" ]; then
                    echo "::error::No .mrpack produced"
                    exit 1
                  fi
                  echo "path=$MRPACK" >> "$GITHUB_OUTPUT"
                  echo "name=$(basename "$MRPACK")" >> "$GITHUB_OUTPUT"

            - name: Publish mrpack to Modrinth modpack project
              if: steps.ep.outputs.pack_id != ''
              id: pub_mrpack
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  PACK_PROJECT_ID: ${{ steps.ep.outputs.pack_id }}
                  VERSION: ${{ inputs.version }}
                  VERSION_TYPE: ${{ steps.ep.outputs.version_type }}
                  LOADERS: ${{ steps.ep.outputs.loaders }}
                  GAME_VERSIONS: ${{ steps.ep.outputs.game_versions }}
                  SERVER_ADDRESS: ${{ steps.ep.outputs.server_address }}
                  MRPACK_PATH: ${{ steps.mrpack.outputs.path }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_TOKEN:-}" ]; then
                    echo "::error::MODRINTH_TOKEN secret missing"
                    exit 1
                  fi

                  EXISTING=$(curl -sSL --fail-with-body -H "Authorization: $MODRINTH_TOKEN" \
                    "https://api.modrinth.com/v2/project/$PACK_PROJECT_ID/version" \
                    | jq -r --arg v "$VERSION" '.[] | select(.version_number == $v) | .id' \
                    | head -1)

                  if [ -n "$EXISTING" ]; then
                    echo "::notice::mrpack v$VERSION already on Modrinth (id=$EXISTING) — reusing for v3 listing PATCH."
                    echo "version_id=$EXISTING" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  cat > /tmp/pack-data.json <<JSON
                  {
                    "name": "KBVE MC Client $VERSION",
                    "version_number": "$VERSION",
                    "version_type": "$VERSION_TYPE",
                    "project_id": "$PACK_PROJECT_ID",
                    "loaders": $LOADERS,
                    "game_versions": $GAME_VERSIONS,
                    "featured": false,
                    "status": "listed",
                    "dependencies": [],
                    "file_parts": ["file"],
                    "primary_file": "file"
                  }
                  JSON

                  HTTP_CODE=$(curl -sSL -o /tmp/mrpack-response.json -w '%{http_code}' \
                    -X POST "https://api.modrinth.com/v2/version" \
                    -H "Authorization: $MODRINTH_TOKEN" \
                    -F "data=@/tmp/pack-data.json;type=application/json" \
                    -F "file=@$MRPACK_PATH;type=application/x-modrinth-modpack+zip")
                  if [ "$HTTP_CODE" != "200" ]; then
                    echo "::error::Modrinth mrpack upload failed (HTTP $HTTP_CODE)"
                    cat /tmp/mrpack-response.json
                    exit 1
                  fi
                  NEW_ID=$(jq -r '.id' /tmp/mrpack-response.json)
                  echo "Published mrpack — version id $NEW_ID"
                  echo "version_id=$NEW_ID" >> "$GITHUB_OUTPUT"

            - name: Update Modrinth `minecraft_java_server` listing → new version_id
              if: |
                  steps.ep.outputs.pack_id != '' &&
                  steps.ep.outputs.server_address != '' &&
                  steps.pub_mrpack.outputs.version_id != ''
              env:
                  MODRINTH_SESSION: ${{ secrets.MODRINTH_SESSION }}
                  PACK_PROJECT_ID: ${{ steps.ep.outputs.pack_id }}
                  SERVER_ADDRESS: ${{ steps.ep.outputs.server_address }}
                  NEW_VERSION_ID: ${{ steps.pub_mrpack.outputs.version_id }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_SESSION:-}" ]; then
                    echo "::error::MODRINTH_SESSION (mra_…) secret missing — required for v3 server listing PATCH"
                    exit 1
                  fi

                  cat > /tmp/v3-listing.json <<JSON
                  {
                    "minecraft_java_server": {
                      "address": "$SERVER_ADDRESS",
                      "content": {
                        "kind": "modpack",
                        "version_id": "$NEW_VERSION_ID",
                        "project_id": "$PACK_PROJECT_ID"
                      }
                    }
                  }
                  JSON

                  HTTP_CODE=$(curl -sSL -o /tmp/v3-resp.json -w '%{http_code}' \
                    -X PATCH "https://api.modrinth.com/v3/project/$PACK_PROJECT_ID" \
                    -H "Authorization: Bearer $MODRINTH_SESSION" \
                    -H "Content-Type: application/json" \
                    -H "User-Agent: kbve-ci/1.0" \
                    --data @/tmp/v3-listing.json)
                  if [ "$HTTP_CODE" != "204" ]; then
                    echo "::error::Modrinth v3 server-listing PATCH failed (HTTP $HTTP_CODE)"
                    cat /tmp/v3-resp.json
                    exit 1
                  fi
                  echo "Updated v3 server listing → version_id=$NEW_VERSION_ID address=$SERVER_ADDRESS"

                  ACTUAL=$(curl -sSL "https://api.modrinth.com/v3/project/$PACK_PROJECT_ID" \
                    | jq -r '.minecraft_java_server.content.version_id // ""')
                  if [ "$ACTUAL" != "$NEW_VERSION_ID" ]; then
                    echo "::warning::v3 listing reports version_id=$ACTUAL, expected $NEW_VERSION_ID"
                  else
                    echo "Verified: v3 listing.content.version_id == $NEW_VERSION_ID"
                  fi

    modrinth_verify:
        name: Modrinth Verify (${{ inputs.app_name }} v${{ inputs.version }})
        needs: [modrinth]
        if: needs.modrinth.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - name: Resolve external_publish fields
              id: ep
              run: |
                  EP='${{ inputs.external_publish }}'
                  echo "mod_id=$(echo "$EP" | jq -r '.modrinth_mod_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "pack_id=$(echo "$EP" | jq -r '.modrinth_pack_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "rolling_version=$(echo "$EP" | jq -r '.modrinth_rolling_version // ""')" >> "$GITHUB_OUTPUT"

            - name: Verify Modrinth published versions
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  MOD_PROJECT_ID: ${{ steps.ep.outputs.mod_id }}
                  PACK_PROJECT_ID: ${{ steps.ep.outputs.pack_id }}
                  VERSION: ${{ inputs.version }}
                  ROLLING_VERSION: ${{ steps.ep.outputs.rolling_version }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_TOKEN:-}" ]; then
                    echo "::error::MODRINTH_TOKEN missing — cannot verify."
                    exit 1
                  fi

                  TARGET_VERSION="$VERSION"

                  verify_project () {
                    local PROJECT_ID="$1"
                    local LABEL="$2"
                    if [ -z "$PROJECT_ID" ]; then
                      return 0
                    fi

                    echo "── Verifying $LABEL v$TARGET_VERSION on project $PROJECT_ID ──"

                    local META
                    META=$(curl -sSL --fail-with-body \
                      -H "Authorization: $MODRINTH_TOKEN" \
                      "https://api.modrinth.com/v2/project/$PROJECT_ID/version" \
                      | jq --arg v "$TARGET_VERSION" '[.[] | select(.version_number == $v)] | .[0]')

                    if [ "$META" = "null" ] || [ -z "$META" ]; then
                      echo "::error::$LABEL v$TARGET_VERSION NOT found on Modrinth"
                      exit 1
                    fi

                    local STATUS FNAME FURL FSIZE
                    STATUS=$(echo "$META" | jq -r '.status')
                    FNAME=$(echo "$META" | jq -r '.files[0].filename')
                    FURL=$(echo "$META" | jq -r '.files[0].url')
                    FSIZE=$(echo "$META" | jq -r '.files[0].size')

                    echo "  status:   $STATUS"
                    echo "  file:     $FNAME ($FSIZE bytes)"
                    echo "  url:      $FURL"

                    if [ "$STATUS" != "listed" ] && [ "$STATUS" != "unlisted" ]; then
                      echo "::error::$LABEL v$TARGET_VERSION status is '$STATUS' — expected 'listed' or 'unlisted'"
                      exit 1
                    fi

                    if [ -z "$ROLLING_VERSION" ] && [[ "$FNAME" != *"$VERSION"* ]]; then
                      echo "::warning::$LABEL v$VERSION file '$FNAME' does not contain version string '$VERSION'"
                    fi

                    local HTTP_CODE
                    HTTP_CODE=$(curl -sSL -o /dev/null -w '%{http_code}' -I "$FURL")
                    if [ "$HTTP_CODE" != "200" ]; then
                      echo "::error::$LABEL v$TARGET_VERSION CDN download HEAD returned HTTP $HTTP_CODE"
                      exit 1
                    fi

                    echo "  ✓ $LABEL v$TARGET_VERSION live + downloadable"
                  }

                  verify_project "$MOD_PROJECT_ID" "mod"
                  verify_project "$PACK_PROJECT_ID" "modpack"

            - name: Enforce single featured version
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  MOD_PROJECT_ID: ${{ steps.ep.outputs.mod_id }}
                  PACK_PROJECT_ID: ${{ steps.ep.outputs.pack_id }}
                  VERSION: ${{ inputs.version }}
                  ROLLING_VERSION: ${{ steps.ep.outputs.rolling_version }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_TOKEN:-}" ]; then
                    echo "::warning::MODRINTH_TOKEN missing — skipping unfeature sweep."
                    exit 0
                  fi

                  TARGET_VERSION="$VERSION"

                  unfeature_others () {
                    local PROJECT_ID="$1"
                    local LABEL="$2"
                    if [ -z "$PROJECT_ID" ]; then
                      return 0
                    fi

                    echo "── Unfeaturing older versions on $LABEL ──"

                    local LIST
                    LIST=$(curl -sSL --fail-with-body \
                      -H "Authorization: $MODRINTH_TOKEN" \
                      "https://api.modrinth.com/v2/project/$PROJECT_ID/version")

                    local OTHERS
                    OTHERS=$(echo "$LIST" | jq -r --arg v "$TARGET_VERSION" \
                      '.[] | select(.featured == true and .version_number != $v) | "\(.id)\t\(.version_number)"')

                    if [ -z "$OTHERS" ]; then
                      echo "  Only v$TARGET_VERSION is featured — nothing to do."
                      return 0
                    fi

                    while IFS=$'\t' read -r ID VER; do
                      [ -z "$ID" ] && continue
                      echo "  Unfeaturing $LABEL v$VER (id=$ID)"
                      HTTP_CODE=$(curl -sSL -o /tmp/patch-response.json -w '%{http_code}' \
                        -X PATCH "https://api.modrinth.com/v2/version/$ID" \
                        -H "Authorization: $MODRINTH_TOKEN" \
                        -H "Content-Type: application/json" \
                        -d '{"featured": false}')
                      if [ "$HTTP_CODE" != "204" ]; then
                        echo "::warning::Unfeature failed for $LABEL v$VER (HTTP $HTTP_CODE)"
                        cat /tmp/patch-response.json || true
                      fi
                    done <<< "$OTHERS"
                  }

                  unfeature_others "$MOD_PROJECT_ID" "mod"
                  unfeature_others "$PACK_PROJECT_ID" "modpack"

    modrinth_prune:
        name: Modrinth Prune (${{ inputs.app_name }})
        needs: [modrinth, modrinth_verify]
        if: |
            needs.modrinth.result == 'success' &&
            needs.modrinth_verify.result == 'success' &&
            fromJson(inputs.external_publish).modrinth_rolling_version == ''
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - name: Resolve external_publish fields
              id: ep
              run: |
                  EP='${{ inputs.external_publish }}'
                  echo "mod_id=$(echo "$EP" | jq -r '.modrinth_mod_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "pack_id=$(echo "$EP" | jq -r '.modrinth_pack_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "retain=$(echo "$EP" | jq -r '.modrinth_retain_count // 3 | tostring')" >> "$GITHUB_OUTPUT"

            - name: Prune older versions
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  MOD_PROJECT_ID: ${{ steps.ep.outputs.mod_id }}
                  PACK_PROJECT_ID: ${{ steps.ep.outputs.pack_id }}
                  RETAIN: ${{ steps.ep.outputs.retain }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_TOKEN:-}" ]; then
                    echo "::notice::MODRINTH_TOKEN missing — skipping prune."
                    exit 0
                  fi

                  prune_project () {
                    local PROJECT_ID="$1"
                    local LABEL="$2"
                    if [ -z "$PROJECT_ID" ]; then
                      return 0
                    fi
                    echo "── $LABEL ($PROJECT_ID) — retain newest $RETAIN ──"
                    local LIST
                    LIST=$(curl -sSL --fail-with-body \
                      -H "Authorization: $MODRINTH_TOKEN" \
                      "https://api.modrinth.com/v2/project/$PROJECT_ID/version")

                    local COUNT
                    COUNT=$(echo "$LIST" | jq 'length')
                    echo "Found $COUNT versions on Modrinth."
                    if [ "$COUNT" -le "$RETAIN" ]; then
                      echo "Nothing to prune."
                      return 0
                    fi

                    local TO_DELETE
                    TO_DELETE=$(echo "$LIST" \
                      | jq -r --argjson keep "$RETAIN" \
                          'sort_by(.date_published) | reverse | .[$keep:] | .[] | "\(.id)\t\(.version_number)"')

                    while IFS=$'\t' read -r ID VER; do
                      [ -z "$ID" ] && continue
                      echo "Deleting $LABEL v$VER (id=$ID)"
                      HTTP_CODE=$(curl -sSL -o /tmp/del-response.json -w '%{http_code}' \
                        -X DELETE "https://api.modrinth.com/v2/version/$ID" \
                        -H "Authorization: $MODRINTH_TOKEN")
                      if [ "$HTTP_CODE" != "204" ]; then
                        echo "::warning::Delete failed for $LABEL v$VER (HTTP $HTTP_CODE)"
                        cat /tmp/del-response.json || true
                      fi
                    done <<< "$TO_DELETE"
                  }

                  prune_project "$MOD_PROJECT_ID" "mod"
                  prune_project "$PACK_PROJECT_ID" "modpack"

    itch:
        name: Itch.io (stub)
        if: fromJson(inputs.external_publish).itch_game != ''
        runs-on: ubuntu-latest
        steps:
            - run: echo "::notice::Itch publish not yet implemented for ${{ inputs.app_name }}"

    steam:
        name: Steam (stub)
        # New shape: external_publish.steam_apps is an array of
        # { app_id, label, depot_id, branch } entries. Stub runs once per
        # entry so future steamcmd implementation already iterates the
        # right matrix.
        if: fromJson(inputs.external_publish).steam_apps != null
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                app: ${{ fromJson(inputs.external_publish).steam_apps }}
        steps:
            - run: |
                  echo "::notice::Steam publish stub — app=${{ matrix.app.app_id }} label=${{ matrix.app.label }} branch=${{ matrix.app.branch }} (not yet implemented for ${{ inputs.app_name }})"

    apple:
        name: Apple App Store (stub)
        if: fromJson(inputs.external_publish).apple_app_id != ''
        runs-on: ubuntu-latest
        steps:
            - run: echo "::notice::Apple App Store publish not yet implemented for ${{ inputs.app_name }}"

    google:
        name: Google Play (stub)
        if: fromJson(inputs.external_publish).google_play_package != ''
        runs-on: ubuntu-latest
        steps:
            - run: echo "::notice::Google Play publish not yet implemented for ${{ inputs.app_name }}"

    curseforge:
        name: CurseForge (stub)
        if: fromJson(inputs.external_publish).curseforge_project_id != ''
        runs-on: ubuntu-latest
        steps:
            - run: echo "::notice::CurseForge publish not yet implemented for ${{ inputs.app_name }}"

    factorio_mod_portal:
        name: Factorio Mod Portal (${{ inputs.app_name }} → ${{ matrix.mod.name }})
        # external_publish.factorio_mods is the canonical array shape — one
        # CI project can publish multiple mods (e.g. agones-factorio ships
        # both the main `kbve` server pack and the `kbve-spider` content mod
        # from the same Docker pipeline). The matrix runs this job once per
        # entry so each mod is gated + uploaded independently.
        if: fromJson(inputs.external_publish).factorio_mods != null
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                mod: ${{ fromJson(inputs.external_publish).factorio_mods }}
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Resolve mod metadata
              id: meta
              env:
                  MOD_NAME: ${{ matrix.mod.name }}
                  MOD_DIR: ${{ matrix.mod.source_path }}
              run: |
                  set -euo pipefail
                  if [ ! -f "${MOD_DIR}/info.json" ]; then
                    echo "::error::missing info.json at ${MOD_DIR}/info.json"
                    exit 1
                  fi
                  MOD_VERSION=$(jq -r .version "${MOD_DIR}/info.json")
                  echo "mod_name=${MOD_NAME}" >> "$GITHUB_OUTPUT"
                  echo "mod_dir=${MOD_DIR}" >> "$GITHUB_OUTPUT"
                  echo "mod_version=${MOD_VERSION}" >> "$GITHUB_OUTPUT"
                  echo "::notice::mod=${MOD_NAME} version=${MOD_VERSION} dir=${MOD_DIR}"

            - name: Check if version already published
              id: gate
              env:
                  MOD_NAME: ${{ steps.meta.outputs.mod_name }}
                  MOD_VERSION: ${{ steps.meta.outputs.mod_version }}
              run: |
                  set -euo pipefail
                  HTTP=$(curl -sS -o /tmp/portal.json -w "%{http_code}" \
                      "https://mods.factorio.com/api/mods/${MOD_NAME}")
                  if [ "$HTTP" = "404" ]; then
                    echo "::notice::mod not yet on portal — first publish path"
                    echo "publish=true" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  if [ "$HTTP" != "200" ]; then
                    echo "::error::portal lookup failed: HTTP $HTTP"
                    cat /tmp/portal.json
                    exit 1
                  fi
                  EXISTS=$(jq --arg v "$MOD_VERSION" '.releases | map(.version == $v) | any' /tmp/portal.json)
                  if [ "$EXISTS" = "true" ]; then
                    echo "::notice::version ${MOD_VERSION} already on portal — skipping upload"
                    echo "publish=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "publish=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Build mod zip
              if: steps.gate.outputs.publish == 'true'
              env:
                  MOD_NAME: ${{ steps.meta.outputs.mod_name }}
                  MOD_DIR: ${{ steps.meta.outputs.mod_dir }}
                  MOD_VERSION: ${{ steps.meta.outputs.mod_version }}
              run: |
                  set -euo pipefail
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends jq zip
                  WORK=$(mktemp -d)
                  INNER="${MOD_NAME}_${MOD_VERSION}"
                  cp -R "${MOD_DIR}" "${WORK}/${INNER}"
                  find "${WORK}/${INNER}" -name '.DS_Store' -delete
                  mkdir -p dist
                  (cd "${WORK}" && zip -qr "${GITHUB_WORKSPACE}/dist/${MOD_NAME}_${MOD_VERSION}.zip" "${INNER}")
                  ls -l "dist/${MOD_NAME}_${MOD_VERSION}.zip"

            - name: Upload to mods.factorio.com
              if: steps.gate.outputs.publish == 'true'
              env:
                  FACTORIO_API_KEY: ${{ secrets.FACTORIO }}
                  MOD_NAME: ${{ steps.meta.outputs.mod_name }}
                  MOD_VERSION: ${{ steps.meta.outputs.mod_version }}
              run: |
                  set -euo pipefail
                  if [ -z "${FACTORIO_API_KEY}" ]; then
                    echo "::error::secrets.FACTORIO is empty"
                    exit 1
                  fi
                  ZIP="dist/${MOD_NAME}_${MOD_VERSION}.zip"
                  INIT=$(curl -sS --fail-with-body -X POST \
                      -H "Authorization: Bearer ${FACTORIO_API_KEY}" \
                      -F "mod=${MOD_NAME}" \
                      "https://mods.factorio.com/api/v2/mods/releases/init_upload")
                  UPLOAD_URL=$(printf '%s' "$INIT" | jq -r '.upload_url // empty')
                  if [ -z "$UPLOAD_URL" ]; then
                    echo "::error::init_upload did not return upload_url"
                    echo "$INIT"
                    exit 1
                  fi
                  RESP=$(curl -sS --fail-with-body -X POST -F "file=@${ZIP}" "$UPLOAD_URL")
                  if printf '%s' "$RESP" | jq -e '.error // empty | length > 0' >/dev/null 2>&1; then
                    echo "::error::portal rejected the upload"
                    echo "$RESP"
                    exit 1
                  fi
                  echo "::notice::published ${MOD_NAME} ${MOD_VERSION} → https://mods.factorio.com/mod/${MOD_NAME}"
