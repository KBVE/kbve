name: External Publish

on:
    workflow_call:
        inputs:
            app_name:
                description: 'CI registry app key (e.g. mc)'
                required: true
                type: string
            version:
                description: 'Version that was published (semver)'
                required: true
                type: string
            source_path:
                description: 'Path to the app source directory (repo-relative)'
                required: true
                type: string
            external_publish:
                description: 'JSON-encoded ExternalPublish object from the dispatch manifest'
                required: true
                type: string
        secrets:
            MODRINTH_TOKEN:
                description: 'Modrinth PAT with version:create scope'
                required: false
            ITCH_API_KEY:
                description: 'butler API key for Itch.io uploads'
                required: false
            STEAM_USERNAME:
                description: 'Steamworks builder username'
                required: false
            STEAM_PASSWORD:
                description: 'Steamworks builder password'
                required: false
            CURSEFORGE_TOKEN:
                description: 'CurseForge upload API token'
                required: false

jobs:
    modrinth:
        name: Modrinth (${{ inputs.app_name }} v${{ inputs.version }})
        if: |
            fromJson(inputs.external_publish).modrinth_mod_id != '' ||
            fromJson(inputs.external_publish).modrinth_pack_id != ''
        runs-on: ubuntu-latest
        timeout-minutes: 25
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '21'

            - name: Resolve external_publish fields
              id: ep
              run: |
                  EP='${{ inputs.external_publish }}'
                  echo "mod_id=$(echo "$EP" | jq -r '.modrinth_mod_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "pack_id=$(echo "$EP" | jq -r '.modrinth_pack_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "version_type=$(echo "$EP" | jq -r '.modrinth_version_type // "release"')" >> "$GITHUB_OUTPUT"
                  echo "loaders=$(echo "$EP" | jq -c '.modrinth_loaders // "[\"fabric\"]" | if type=="string" then fromjson else . end')" >> "$GITHUB_OUTPUT"
                  echo "game_versions=$(echo "$EP" | jq -c '.modrinth_game_versions // "[]" | if type=="string" then fromjson else . end')" >> "$GITHUB_OUTPUT"

            - name: Pin version.toml to publishing version
              env:
                  VERSION: ${{ inputs.version }}
              run: |
                  set -euo pipefail
                  VTOML="${{ inputs.source_path }}/version.toml"
                  if [ ! -f "$VTOML" ]; then
                    echo "::error::version.toml not found at $VTOML"
                    exit 1
                  fi
                  CURRENT=$(grep -E '^version' "$VTOML" | head -1 | sed 's/.*"\(.*\)"/\1/')
                  if [ "$CURRENT" != "$VERSION" ]; then
                    echo "Pinning $VTOML: $CURRENT → $VERSION (post_publish bump not yet applied)"
                    sed -i "s/^version = .*/version = \"${VERSION}\"/" "$VTOML"
                  fi

            - name: Build Fabric mod JAR
              run: |
                  cd "${{ inputs.source_path }}/behavior_statetree/java"
                  ./gradlew build --no-daemon

            - name: Locate built JAR
              id: jar
              run: |
                  JAR=$(ls "${{ inputs.source_path }}/behavior_statetree/java/build/libs/"*.jar 2>/dev/null | head -1)
                  if [ -z "$JAR" ]; then
                    echo "::error::No JAR found under build/libs/"
                    exit 1
                  fi
                  echo "path=$JAR" >> "$GITHUB_OUTPUT"
                  echo "name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

            - name: Publish JAR to Modrinth mod project
              if: steps.ep.outputs.mod_id != ''
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  MOD_PROJECT_ID: ${{ steps.ep.outputs.mod_id }}
                  VERSION: ${{ inputs.version }}
                  VERSION_TYPE: ${{ steps.ep.outputs.version_type }}
                  LOADERS: ${{ steps.ep.outputs.loaders }}
                  GAME_VERSIONS: ${{ steps.ep.outputs.game_versions }}
                  JAR_PATH: ${{ steps.jar.outputs.path }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_TOKEN:-}" ]; then
                    echo "::error::MODRINTH_TOKEN secret missing"
                    exit 1
                  fi

                  EXISTING=$(curl -sSL --fail-with-body -H "Authorization: $MODRINTH_TOKEN" \
                    "https://api.modrinth.com/v2/project/$MOD_PROJECT_ID/version" \
                    | jq -r --arg v "$VERSION" '.[] | select(.version_number == $v) | .id' \
                    | head -1)

                  if [ -n "$EXISTING" ]; then
                    echo "::notice::JAR v$VERSION already on Modrinth (id=$EXISTING) — skipping."
                    exit 0
                  fi

                  cat > /tmp/data.json <<JSON
                  {
                    "name": "behavior_statetree $VERSION",
                    "version_number": "$VERSION",
                    "version_type": "$VERSION_TYPE",
                    "project_id": "$MOD_PROJECT_ID",
                    "loaders": $LOADERS,
                    "game_versions": $GAME_VERSIONS,
                    "featured": false,
                    "dependencies": [{"project_id":"P7dR8mSH","dependency_type":"required"}],
                    "file_parts": ["jar"]
                  }
                  JSON

                  HTTP_CODE=$(curl -sSL -o /tmp/jar-response.json -w '%{http_code}' \
                    -X POST "https://api.modrinth.com/v2/version" \
                    -H "Authorization: $MODRINTH_TOKEN" \
                    -F "data=@/tmp/data.json;type=application/json" \
                    -F "jar=@$JAR_PATH;type=application/java-archive")
                  if [ "$HTTP_CODE" != "200" ]; then
                    echo "::error::Modrinth JAR upload failed (HTTP $HTTP_CODE)"
                    cat /tmp/jar-response.json
                    exit 1
                  fi
                  jq -r '"Published JAR — version id \(.id)"' /tmp/jar-response.json

            - name: Build mrpack
              if: steps.ep.outputs.pack_id != ''
              run: |
                  cd "${{ inputs.source_path }}/behavior_statetree"
                  ./mrpack/build-mrpack.sh

            - name: Locate built mrpack
              if: steps.ep.outputs.pack_id != ''
              id: mrpack
              run: |
                  MRPACK=$(ls "${{ inputs.source_path }}/behavior_statetree/mrpack/dist/"*.mrpack 2>/dev/null | head -1)
                  if [ -z "$MRPACK" ]; then
                    echo "::error::No .mrpack produced"
                    exit 1
                  fi
                  echo "path=$MRPACK" >> "$GITHUB_OUTPUT"
                  echo "name=$(basename "$MRPACK")" >> "$GITHUB_OUTPUT"

            - name: Publish mrpack to Modrinth modpack project
              if: steps.ep.outputs.pack_id != ''
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  PACK_PROJECT_ID: ${{ steps.ep.outputs.pack_id }}
                  VERSION: ${{ inputs.version }}
                  VERSION_TYPE: ${{ steps.ep.outputs.version_type }}
                  LOADERS: ${{ steps.ep.outputs.loaders }}
                  GAME_VERSIONS: ${{ steps.ep.outputs.game_versions }}
                  MRPACK_PATH: ${{ steps.mrpack.outputs.path }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_TOKEN:-}" ]; then
                    echo "::error::MODRINTH_TOKEN secret missing"
                    exit 1
                  fi

                  EXISTING=$(curl -sSL --fail-with-body -H "Authorization: $MODRINTH_TOKEN" \
                    "https://api.modrinth.com/v2/project/$PACK_PROJECT_ID/version" \
                    | jq -r --arg v "$VERSION" '.[] | select(.version_number == $v) | .id' \
                    | head -1)

                  if [ -n "$EXISTING" ]; then
                    echo "::notice::mrpack v$VERSION already on Modrinth (id=$EXISTING) — skipping."
                    exit 0
                  fi

                  cat > /tmp/pack-data.json <<JSON
                  {
                    "name": "KBVE MC Client $VERSION",
                    "version_number": "$VERSION",
                    "version_type": "$VERSION_TYPE",
                    "project_id": "$PACK_PROJECT_ID",
                    "loaders": $LOADERS,
                    "game_versions": $GAME_VERSIONS,
                    "featured": true,
                    "dependencies": [],
                    "file_parts": ["mrpack"]
                  }
                  JSON

                  HTTP_CODE=$(curl -sSL -o /tmp/mrpack-response.json -w '%{http_code}' \
                    -X POST "https://api.modrinth.com/v2/version" \
                    -H "Authorization: $MODRINTH_TOKEN" \
                    -F "data=@/tmp/pack-data.json;type=application/json" \
                    -F "mrpack=@$MRPACK_PATH;type=application/x-modrinth-modpack+zip")
                  if [ "$HTTP_CODE" != "200" ]; then
                    echo "::error::Modrinth mrpack upload failed (HTTP $HTTP_CODE)"
                    cat /tmp/mrpack-response.json
                    exit 1
                  fi
                  jq -r '"Published mrpack — version id \(.id)"' /tmp/mrpack-response.json

    modrinth_verify:
        name: Modrinth Verify (${{ inputs.app_name }} v${{ inputs.version }})
        needs: [modrinth]
        if: needs.modrinth.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - name: Resolve external_publish fields
              id: ep
              run: |
                  EP='${{ inputs.external_publish }}'
                  echo "mod_id=$(echo "$EP" | jq -r '.modrinth_mod_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "pack_id=$(echo "$EP" | jq -r '.modrinth_pack_id // ""')" >> "$GITHUB_OUTPUT"

            - name: Verify Modrinth published versions
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  MOD_PROJECT_ID: ${{ steps.ep.outputs.mod_id }}
                  PACK_PROJECT_ID: ${{ steps.ep.outputs.pack_id }}
                  VERSION: ${{ inputs.version }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_TOKEN:-}" ]; then
                    echo "::error::MODRINTH_TOKEN missing — cannot verify."
                    exit 1
                  fi

                  verify_project () {
                    local PROJECT_ID="$1"
                    local LABEL="$2"
                    if [ -z "$PROJECT_ID" ]; then
                      return 0
                    fi

                    echo "── Verifying $LABEL v$VERSION on project $PROJECT_ID ──"

                    local META
                    META=$(curl -sSL --fail-with-body \
                      -H "Authorization: $MODRINTH_TOKEN" \
                      "https://api.modrinth.com/v2/project/$PROJECT_ID/version" \
                      | jq --arg v "$VERSION" '[.[] | select(.version_number == $v)] | .[0]')

                    if [ "$META" = "null" ] || [ -z "$META" ]; then
                      echo "::error::$LABEL v$VERSION NOT found on Modrinth"
                      exit 1
                    fi

                    local STATUS FNAME FURL FSIZE
                    STATUS=$(echo "$META" | jq -r '.status')
                    FNAME=$(echo "$META" | jq -r '.files[0].filename')
                    FURL=$(echo "$META" | jq -r '.files[0].url')
                    FSIZE=$(echo "$META" | jq -r '.files[0].size')

                    echo "  status:   $STATUS"
                    echo "  file:     $FNAME ($FSIZE bytes)"
                    echo "  url:      $FURL"

                    if [ "$STATUS" != "listed" ] && [ "$STATUS" != "unlisted" ]; then
                      echo "::error::$LABEL v$VERSION status is '$STATUS' — expected 'listed' or 'unlisted'"
                      exit 1
                    fi

                    if [[ "$FNAME" != *"$VERSION"* ]]; then
                      echo "::warning::$LABEL v$VERSION file '$FNAME' does not contain version string '$VERSION'"
                    fi

                    local HTTP_CODE
                    HTTP_CODE=$(curl -sSL -o /dev/null -w '%{http_code}' -I "$FURL")
                    if [ "$HTTP_CODE" != "200" ]; then
                      echo "::error::$LABEL v$VERSION CDN download HEAD returned HTTP $HTTP_CODE"
                      exit 1
                    fi

                    echo "  ✓ $LABEL v$VERSION live + downloadable"
                  }

                  verify_project "$MOD_PROJECT_ID" "mod"
                  verify_project "$PACK_PROJECT_ID" "modpack"

    modrinth_prune:
        name: Modrinth Prune (${{ inputs.app_name }})
        needs: [modrinth, modrinth_verify]
        if: needs.modrinth.result == 'success' && needs.modrinth_verify.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - name: Resolve external_publish fields
              id: ep
              run: |
                  EP='${{ inputs.external_publish }}'
                  echo "mod_id=$(echo "$EP" | jq -r '.modrinth_mod_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "pack_id=$(echo "$EP" | jq -r '.modrinth_pack_id // ""')" >> "$GITHUB_OUTPUT"
                  echo "retain=$(echo "$EP" | jq -r '.modrinth_retain_count // 3 | tostring')" >> "$GITHUB_OUTPUT"

            - name: Prune older versions
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  MOD_PROJECT_ID: ${{ steps.ep.outputs.mod_id }}
                  PACK_PROJECT_ID: ${{ steps.ep.outputs.pack_id }}
                  RETAIN: ${{ steps.ep.outputs.retain }}
              run: |
                  set -euo pipefail
                  if [ -z "${MODRINTH_TOKEN:-}" ]; then
                    echo "::notice::MODRINTH_TOKEN missing — skipping prune."
                    exit 0
                  fi

                  prune_project () {
                    local PROJECT_ID="$1"
                    local LABEL="$2"
                    if [ -z "$PROJECT_ID" ]; then
                      return 0
                    fi
                    echo "── $LABEL ($PROJECT_ID) — retain newest $RETAIN ──"
                    local LIST
                    LIST=$(curl -sSL --fail-with-body \
                      -H "Authorization: $MODRINTH_TOKEN" \
                      "https://api.modrinth.com/v2/project/$PROJECT_ID/version")

                    local COUNT
                    COUNT=$(echo "$LIST" | jq 'length')
                    echo "Found $COUNT versions on Modrinth."
                    if [ "$COUNT" -le "$RETAIN" ]; then
                      echo "Nothing to prune."
                      return 0
                    fi

                    local TO_DELETE
                    TO_DELETE=$(echo "$LIST" \
                      | jq -r --argjson keep "$RETAIN" \
                          'sort_by(.date_published) | reverse | .[$keep:] | .[] | "\(.id)\t\(.version_number)"')

                    while IFS=$'\t' read -r ID VER; do
                      [ -z "$ID" ] && continue
                      echo "Deleting $LABEL v$VER (id=$ID)"
                      HTTP_CODE=$(curl -sSL -o /tmp/del-response.json -w '%{http_code}' \
                        -X DELETE "https://api.modrinth.com/v2/version/$ID" \
                        -H "Authorization: $MODRINTH_TOKEN")
                      if [ "$HTTP_CODE" != "204" ]; then
                        echo "::warning::Delete failed for $LABEL v$VER (HTTP $HTTP_CODE)"
                        cat /tmp/del-response.json || true
                      fi
                    done <<< "$TO_DELETE"
                  }

                  prune_project "$MOD_PROJECT_ID" "mod"
                  prune_project "$PACK_PROJECT_ID" "modpack"

    itch:
        name: Itch.io (stub)
        if: fromJson(inputs.external_publish).itch_game != ''
        runs-on: ubuntu-latest
        steps:
            - run: echo "::notice::Itch publish not yet implemented for ${{ inputs.app_name }}"

    steam:
        name: Steam (stub)
        if: fromJson(inputs.external_publish).steam_app_id != ''
        runs-on: ubuntu-latest
        steps:
            - run: echo "::notice::Steam publish not yet implemented for ${{ inputs.app_name }}"

    apple:
        name: Apple App Store (stub)
        if: fromJson(inputs.external_publish).apple_app_id != ''
        runs-on: ubuntu-latest
        steps:
            - run: echo "::notice::Apple App Store publish not yet implemented for ${{ inputs.app_name }}"

    google:
        name: Google Play (stub)
        if: fromJson(inputs.external_publish).google_play_package != ''
        runs-on: ubuntu-latest
        steps:
            - run: echo "::notice::Google Play publish not yet implemented for ${{ inputs.app_name }}"

    curseforge:
        name: CurseForge (stub)
        if: fromJson(inputs.external_publish).curseforge_project_id != ''
        runs-on: ubuntu-latest
        steps:
            - run: echo "::notice::CurseForge publish not yet implemented for ${{ inputs.app_name }}"
