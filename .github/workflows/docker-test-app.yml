name: Docker App Test

on:
    workflow_call:
        inputs:
            project:
                required: true
                type: string
            runner:
                description: 'Runner label (default: ubuntu-latest)'
                required: false
                type: string
                default: 'ubuntu-latest'
            image:
                description: 'Docker image name (e.g. kbve/kbve). If set, pushes CI image to GHCR after e2e passes.'
                required: false
                type: string
                default: ''
            install_playwright:
                description: 'Install Playwright browsers on host (default: true). Set false for vitest-only e2e projects.'
                required: false
                type: boolean
                default: true

jobs:
    test:
        name: Test ${{ inputs.project }} Docker App
        runs-on: ${{ inputs.runner }}
        timeout-minutes: 60
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout the monorepo
              uses: actions/checkout@v6
              continue-on-error: true
              with:
                  submodules: true

            - name: Init submodules (with retry)
              continue-on-error: true
              run: |
                  for i in 1 2 3; do
                    git submodule update --init --recursive && break
                    echo "Attempt $i failed, retrying in 10s..."
                    sleep 10
                  done

            - name: Verify critical submodules
              run: |
                  failed=0
                  for mod in apps/mc/pumpkin apps/postgres; do
                    if [ ! -f "$mod/.git" ] && [ ! -d "$mod/.git" ]; then
                      echo "::error::Critical submodule missing: $mod"
                      failed=1
                    else
                      echo "OK: $mod"
                    fi
                  done
                  exit $failed

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  driver: docker

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ github.token }}

            - name: Setup Node v24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Setup pnpm v10
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: false

            - name: Get pnpm Store Path
              id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm Cache
              uses: actions/cache@v5
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install pnpm Dependencies
              run: pnpm install

            - name: Install Playwright Browsers
              if: ${{ inputs.install_playwright }}
              run: pnpm exec playwright install --with-deps chromium

            - name: Nx e2e ${{ inputs.project }}
              env:
                  BUILDKIT_PROGRESS: plain
              run: pnpm nx e2e ${{ inputs.project }} --configuration=ci --no-cloud --output-style=stream

            - name: Mark test passed
              if: success()
              run: echo "${{ inputs.project }}" > /tmp/test-result.txt

            - name: Upload test result marker
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: test-passed-docker-${{ inputs.project }}
                  path: /tmp/test-result.txt
                  retention-days: 1

            - name: Push CI image to GHCR
              if: success() && inputs.image != ''
              run: |
                  SHORT_SHA="${GITHUB_SHA::8}"
                  CI_TAG="ci-${SHORT_SHA}"
                  docker tag "${{ inputs.image }}:latest" "ghcr.io/${{ inputs.image }}:${CI_TAG}"
                  docker push "ghcr.io/${{ inputs.image }}:${CI_TAG}"
                  echo "Pushed ghcr.io/${{ inputs.image }}:${CI_TAG}"
