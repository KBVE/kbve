name: Docker App Test

on:
    workflow_call:
        inputs:
            project:
                required: true
                type: string

jobs:
    test:
        name: Test ${{ inputs.project }} Docker App
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout the monorepo
              uses: actions/checkout@v6
              continue-on-error: true
              with:
                  submodules: true

            - name: Init submodules (with retry)
              continue-on-error: true
              run: |
                  for i in 1 2 3; do
                    git submodule update --init --recursive && break
                    echo "Attempt $i failed, retrying in 10s..."
                    sleep 10
                  done

            - name: Verify critical submodules
              run: |
                  failed=0
                  for mod in apps/mc/pumpkin apps/postgres; do
                    if [ ! -f "$mod/.git" ] && [ ! -d "$mod/.git" ]; then
                      echo "::error::Critical submodule missing: $mod"
                      failed=1
                    else
                      echo "OK: $mod"
                    fi
                  done
                  exit $failed

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  driver-opts: network=host

            - name: Rust ToolChain
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Cargo Cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-

            - name: Setup Node v24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Setup pnpm v10
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: false

            - name: Get pnpm Store Path
              id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm Cache
              uses: actions/cache@v5
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install pnpm Dependencies
              run: pnpm install

            - name: Install Playwright Browsers
              run: pnpm exec playwright install --with-deps chromium

            - name: Nx e2e ${{ inputs.project }}
              run: pnpm nx e2e ${{ inputs.project }} --configuration=ci --no-cloud

            - name: Mark test passed
              if: success()
              run: echo "passed" > /tmp/test-result.txt

            - name: Upload test result marker
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: test-passed-docker-${{ inputs.project }}
                  path: /tmp/test-result.txt
                  retention-days: 1
