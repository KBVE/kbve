name: Docker App Test

on:
    workflow_call:
        inputs:
            project:
                required: true
                type: string
            runner:
                description: 'Runner label (default: ubuntu-latest)'
                required: false
                type: string
                default: 'ubuntu-latest'
            image:
                description: 'Docker image name (e.g. kbve/kbve). If set, pushes CI image to GHCR after e2e passes.'
                required: false
                type: string
                default: ''
            install_playwright:
                description: 'Force-install Playwright browsers regardless of detection (default: auto). Leave empty to auto-detect from source_path.'
                required: false
                type: string
                default: 'auto'
            source_path:
                description: 'Project source path (e.g. apps/cryptothrone). Used to auto-detect @nx/playwright usage.'
                required: false
                type: string
                default: ''
            version_source:
                description: 'Path to MDX/JSON file with version field (for pre-build sync)'
                required: false
                type: string
                default: ''
            version_target:
                description: 'Path to Cargo.toml/package.json to write version into before build'
                required: false
                type: string
                default: ''

jobs:
    test:
        name: Test ${{ inputs.project }} Docker App
        runs-on: ${{ inputs.runner }}
        timeout-minutes: 180
        env:
            NX_NO_CLOUD: true
        permissions:
            contents: read
            packages: write

        steps:
            - name: Free disk space
              uses: jlumbroso/free-disk-space@main
              with:
                  tool-cache: false
                  android: true
                  dotnet: true
                  haskell: true
                  large-packages: false
                  swap-storage: false
                  docker-images: true

            - name: Checkout the monorepo
              uses: actions/checkout@v6
              continue-on-error: true

            - name: Sync version from MDX to build manifest
              if: ${{ inputs.version_source != '' && inputs.version_target != '' }}
              run: |
                  SRC="${{ inputs.version_source }}"
                  TGT="${{ inputs.version_target }}"
                  case "$SRC" in
                    *.mdx) VER=$(sed -n 's/^version: *"\([^"]*\)"/\1/p' "$SRC" | head -1) ;;
                    *.json) VER=$(jq -r '.version // ""' "$SRC" 2>/dev/null) ;;
                    *) VER="" ;;
                  esac
                  if [ -n "$VER" ]; then
                    case "$TGT" in
                      *.json)   jq --arg v "$VER" '.version = $v' "$TGT" > "${TGT}.tmp" && mv "${TGT}.tmp" "$TGT" ;;
                      *.csproj) sed -i "s|<Version>[^<]*</Version>|<Version>${VER}</Version>|" "$TGT" ;;
                      *)        sed -i "s/^version = .*/version = \"${VER}\"/" "$TGT" ;;
                    esac
                    echo "Synced version ${VER} → ${TGT}"
                  fi

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v4
              with:
                  driver: docker-container
                  driver-opts: |
                      image=moby/buildkit:v0.24.0
                      network=host

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ github.token }}

            - name: Setup Node v24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Setup pnpm v10
              uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0
                  run_install: false

            - name: Get pnpm Store Path
              id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm Cache
              uses: actions/cache@v5
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install pnpm Dependencies
              timeout-minutes: 10
              env:
                  UV_THREADPOOL_SIZE: '16'
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Setup Python + uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: false

            - name: Detect Playwright usage
              id: detect-playwright
              run: |
                  FORCE="${{ inputs.install_playwright }}"
                  if [ "$FORCE" = "true" ]; then
                    echo "uses_playwright=true" >> "$GITHUB_OUTPUT"
                    echo "Playwright forced ON via input"
                    exit 0
                  fi
                  if [ "$FORCE" = "false" ]; then
                    echo "uses_playwright=false" >> "$GITHUB_OUTPUT"
                    echo "Playwright forced OFF via input"
                    exit 0
                  fi
                  ROOT="${{ inputs.source_path }}"
                  if [ -z "$ROOT" ] || [ ! -d "$ROOT" ]; then
                    echo "uses_playwright=false" >> "$GITHUB_OUTPUT"
                    echo "No source_path provided — defaulting to no Playwright"
                    exit 0
                  fi
                  if grep -rlq '@nx/playwright:playwright' "$ROOT" 2>/dev/null; then
                    echo "uses_playwright=true" >> "$GITHUB_OUTPUT"
                    echo "Detected @nx/playwright:playwright executor under ${ROOT}"
                  else
                    echo "uses_playwright=false" >> "$GITHUB_OUTPUT"
                    echo "No Playwright executor under ${ROOT}"
                  fi

            - name: Resolve Playwright version
              if: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' }}
              id: playwright-version
              run: |
                  VER=$(node -e "console.log(require('./node_modules/playwright/package.json').version)" 2>/dev/null || echo "unknown")
                  echo "version=${VER}" >> "$GITHUB_OUTPUT"
                  echo "Resolved Playwright version: ${VER}"

            - name: Cache Playwright browsers
              if: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' }}
              id: playwright-cache
              uses: actions/cache@v5
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-chromium-webkit
                  restore-keys: |
                      ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-
                      ${{ runner.os }}-playwright-

            - name: Install Playwright Browsers
              if: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true' }}
              timeout-minutes: 15
              env:
                  UV_THREADPOOL_SIZE: '16'
              run: pnpm exec playwright install --with-deps chromium webkit

            - name: Install Playwright OS deps (cache hit)
              if: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' && steps.playwright-cache.outputs.cache-hit == 'true' }}
              timeout-minutes: 10
              run: pnpm exec playwright install-deps chromium webkit

            - name: Nx e2e ${{ inputs.project }}
              env:
                  BUILDKIT_PROGRESS: plain
                  INPUT_GITHUB_TOKEN: ${{ github.token }}
                  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' && '1' || '' }}
              run: pnpm nx e2e ${{ inputs.project }} --configuration=ci --no-cloud --output-style=stream

            - name: Mark test passed
              if: success()
              run: echo "${{ inputs.project }}" > /tmp/test-result.txt

            - name: Upload test result marker
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: test-passed-docker-${{ inputs.project }}
                  path: /tmp/test-result.txt
                  retention-days: 1

            - name: Push CI image to GHCR
              if: success() && inputs.image != ''
              run: |
                  SHORT_SHA="${GITHUB_SHA::8}"
                  CI_TAG="ci-${SHORT_SHA}"
                  docker tag "${{ inputs.image }}:latest" "ghcr.io/${{ inputs.image }}:${CI_TAG}"
                  docker push "ghcr.io/${{ inputs.image }}:${CI_TAG}"
                  echo "Pushed ghcr.io/${{ inputs.image }}:${CI_TAG}"
