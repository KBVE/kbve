name: Docker App Test

on:
    workflow_call:
        inputs:
            project:
                required: true
                type: string
            runner:
                description: 'Runner label (default: ubuntu-latest)'
                required: false
                type: string
                default: 'ubuntu-latest'
            image:
                description: 'Docker image name (e.g. kbve/kbve). If set, pushes CI image to GHCR after e2e passes.'
                required: false
                type: string
                default: ''
            install_playwright:
                description: 'Force-install Playwright browsers regardless of detection (default: auto). Leave empty to auto-detect from source_path.'
                required: false
                type: string
                default: 'auto'
            source_path:
                description: 'Project source path (e.g. apps/cryptothrone). Used to auto-detect @nx/playwright usage.'
                required: false
                type: string
                default: ''
            version_source:
                description: 'Path to MDX/JSON file with version field (for pre-build sync)'
                required: false
                type: string
                default: ''
            version_target:
                description: 'Path to Cargo.toml/package.json to write version into before build'
                required: false
                type: string
                default: ''

jobs:
    test:
        name: Test ${{ inputs.project }} Docker App
        runs-on: ${{ inputs.runner }}
        timeout-minutes: 180
        env:
            NX_NO_CLOUD: true
        permissions:
            contents: read
            packages: write

        steps:
            - name: Free disk space
              uses: jlumbroso/free-disk-space@main
              with:
                  tool-cache: false
                  android: true
                  dotnet: true
                  haskell: true
                  large-packages: false
                  swap-storage: false
                  docker-images: true

            - name: Checkout the monorepo
              uses: actions/checkout@v6
              continue-on-error: true

            - name: Sync version from MDX to build manifest
              if: ${{ inputs.version_source != '' && inputs.version_target != '' }}
              run: |
                  SRC="${{ inputs.version_source }}"
                  TGT="${{ inputs.version_target }}"
                  case "$SRC" in
                    *.mdx) VER=$(sed -n 's/^version: *"\([^"]*\)"/\1/p' "$SRC" | head -1) ;;
                    *.json) VER=$(jq -r '.version // ""' "$SRC" 2>/dev/null) ;;
                    *) VER="" ;;
                  esac
                  if [ -n "$VER" ]; then
                    case "$TGT" in
                      *.json)   jq --arg v "$VER" '.version = $v' "$TGT" > "${TGT}.tmp" && mv "${TGT}.tmp" "$TGT" ;;
                      *.csproj) sed -i "s|<Version>[^<]*</Version>|<Version>${VER}</Version>|" "$TGT" ;;
                      *)        sed -i "s/^version = .*/version = \"${VER}\"/" "$TGT" ;;
                    esac
                    echo "Synced version ${VER} → ${TGT}"
                  fi

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v4
              with:
                  driver: docker-container
                  driver-opts: |
                      image=moby/buildkit:v0.24.0
                      network=host

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ github.token }}

            - name: Setup Node v24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Setup pnpm v10
              uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0
                  run_install: false

            - name: Get pnpm Store Path
              id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm Cache
              uses: actions/cache@v5
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install pnpm Dependencies
              timeout-minutes: 10
              env:
                  UV_THREADPOOL_SIZE: '16'
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Setup Python + uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: false

            - name: Detect Playwright usage
              id: detect-playwright
              run: |
                  FORCE="${{ inputs.install_playwright }}"
                  if [ "$FORCE" = "true" ]; then
                    USES=true
                  elif [ "$FORCE" = "false" ]; then
                    USES=false
                  else
                    ROOT="${{ inputs.source_path }}"
                    if [ -z "$ROOT" ] || [ ! -d "$ROOT" ]; then
                      USES=false
                    elif grep -rlq '@nx/playwright:playwright' "$ROOT" 2>/dev/null; then
                      USES=true
                    else
                      USES=false
                    fi
                  fi
                  echo "uses_playwright=${USES}" >> "$GITHUB_OUTPUT"
                  if [ "$USES" != "true" ]; then
                    echo "Playwright OFF"
                    exit 0
                  fi
                  ROOT="${{ inputs.source_path }}"
                  BROWSERS=""
                  CFGS=$(find "$ROOT" -maxdepth 6 -type f -name "playwright.config.*" -not -path "*/node_modules/*" 2>/dev/null || true)
                  if [ -n "$CFGS" ]; then
                    add() {
                      case " $BROWSERS " in
                        *" $1 "*) ;;
                        *) BROWSERS="${BROWSERS:+$BROWSERS }$1" ;;
                      esac
                    }
                    if echo "$CFGS" | xargs grep -lqE "devices\['Desktop Chrome'|name: *'chromium|chromium.*channel|name: *'mobile-chrome" 2>/dev/null; then add chromium; fi
                    if echo "$CFGS" | xargs grep -lqE "devices\['Desktop Safari|name: *'webkit|name: *'mobile-safari" 2>/dev/null; then add webkit; fi
                    if echo "$CFGS" | xargs grep -lqE "devices\['Desktop Firefox|name: *'firefox" 2>/dev/null; then add firefox; fi
                  fi
                  if [ -z "$BROWSERS" ]; then BROWSERS=chromium; fi
                  KEY=$(echo "$BROWSERS" | tr ' ' '-')
                  echo "browsers=${BROWSERS}" >> "$GITHUB_OUTPUT"
                  echo "browsers_key=${KEY}" >> "$GITHUB_OUTPUT"
                  echo "Playwright ON — browsers: ${BROWSERS}"

            - name: Resolve Playwright version
              if: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' }}
              id: playwright-version
              run: |
                  VER=$(node -e "console.log(require('./node_modules/playwright/package.json').version)" 2>/dev/null || echo "unknown")
                  echo "version=${VER}" >> "$GITHUB_OUTPUT"
                  echo "Resolved Playwright version: ${VER}"

            - name: Check baked Playwright browsers
              if: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' }}
              id: baked-playwright
              env:
                  REQ_BROWSERS: ${{ steps.detect-playwright.outputs.browsers }}
              run: |
                  set -euo pipefail
                  BAKE_DIR="${PLAYWRIGHT_BROWSERS_PATH:-/opt/ms-playwright}"
                  MISSING=""
                  if [ ! -d "$BAKE_DIR" ]; then
                    echo "No baked browsers at ${BAKE_DIR} — falling back to install"
                    echo "all_present=false" >> "$GITHUB_OUTPUT"
                    echo "missing=${REQ_BROWSERS}" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  for b in $REQ_BROWSERS; do
                    case "$b" in
                      chromium) glob="${BAKE_DIR}/chromium-"*/chrome-linux*/chrome ;;
                      webkit)   glob="${BAKE_DIR}/webkit-"*/pw_run.sh ;;
                      firefox)  glob="${BAKE_DIR}/firefox-"*/firefox/firefox ;;
                      *)        glob="${BAKE_DIR}/${b}-"* ;;
                    esac
                    if compgen -G "$glob" >/dev/null; then
                      echo "  ${b}: baked"
                    else
                      echo "  ${b}: missing"
                      MISSING="${MISSING:+$MISSING }${b}"
                    fi
                  done
                  if [ -z "$MISSING" ]; then
                    echo "all_present=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "all_present=false" >> "$GITHUB_OUTPUT"
                    echo "missing=${MISSING}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Cache Playwright browsers
              if: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' && steps.baked-playwright.outputs.all_present != 'true' }}
              id: playwright-cache
              uses: actions/cache@v5
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ steps.detect-playwright.outputs.browsers_key }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-
                      ${{ runner.os }}-playwright-

            - name: Install Playwright Browsers
              if: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' && steps.baked-playwright.outputs.all_present != 'true' && steps.playwright-cache.outputs.cache-hit != 'true' }}
              timeout-minutes: 40
              env:
                  UV_THREADPOOL_SIZE: '16'
                  MISSING: ${{ steps.baked-playwright.outputs.missing || steps.detect-playwright.outputs.browsers }}
              run: |
                  set -euo pipefail
                  for try in 1 2 3; do
                    if pnpm exec playwright install --with-deps ${MISSING}; then
                      echo "playwright install succeeded on attempt ${try}"
                      exit 0
                    fi
                    echo "::warning::playwright install attempt ${try} failed; retrying in 15s"
                    sleep 15
                  done
                  echo "::error::playwright install failed after 3 attempts"
                  exit 1

            - name: Install Playwright OS deps (cache hit)
              if: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' && steps.baked-playwright.outputs.all_present != 'true' && steps.playwright-cache.outputs.cache-hit == 'true' }}
              timeout-minutes: 10
              run: pnpm exec playwright install-deps ${{ steps.detect-playwright.outputs.browsers }}

            - name: Nx e2e ${{ inputs.project }}
              env:
                  BUILDKIT_PROGRESS: plain
                  INPUT_GITHUB_TOKEN: ${{ github.token }}
                  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: ${{ steps.detect-playwright.outputs.uses_playwright == 'true' && '1' || '' }}
              run: pnpm nx e2e ${{ inputs.project }} --configuration=ci --no-cloud --output-style=stream

            - name: Mark test passed
              if: success()
              run: echo "${{ inputs.project }}" > /tmp/test-result.txt

            - name: Upload test result marker
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: test-passed-docker-${{ inputs.project }}
                  path: /tmp/test-result.txt
                  retention-days: 1

            - name: Push CI image to GHCR
              if: success() && inputs.image != ''
              run: |
                  SHORT_SHA="${GITHUB_SHA::8}"
                  CI_TAG="ci-${SHORT_SHA}"
                  docker tag "${{ inputs.image }}:latest" "ghcr.io/${{ inputs.image }}:${CI_TAG}"
                  docker push "ghcr.io/${{ inputs.image }}:${CI_TAG}"
                  echo "Pushed ghcr.io/${{ inputs.image }}:${CI_TAG}"
