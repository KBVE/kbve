name: NPM Package Test

on:
    workflow_call:
        inputs:
            project:
                required: true
                type: string

jobs:
    test:
        name: Test ${{ inputs.project }} NPM Package
        runs-on: ubuntu-latest
        env:
            NX_NO_CLOUD: true
        permissions:
            contents: read

        steps:
            - name: Checkout the monorepo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Node v24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Setup pnpm v10
              uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0
                  run_install: false

            - name: Get pnpm Store Path
              id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm Cache
              uses: actions/cache@v5
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install pnpm Dependencies
              timeout-minutes: 10
              env:
                  UV_THREADPOOL_SIZE: '16'
              run: pnpm install --frozen-lockfile --prefer-offline

            # Every NPM package the dispatcher fans into this workflow
            # (devops, droid, khashvault, laser) has a sibling `<pkg>-e2e`
            # Playwright suite, so always install chromium up front. The
            # `pnpm install` step's UV_THREADPOOL_SIZE bump carries over to
            # avoid the chromium-extract libuv-threadpool deadlock seen in
            # earlier runs.
            - name: Install Playwright Browsers
              timeout-minutes: 15
              env:
                  UV_THREADPOOL_SIZE: '16'
              run: pnpm exec playwright install --with-deps chromium

            - name: Nx e2e ${{ inputs.project }}
              run: pnpm nx e2e ${{ inputs.project }} --no-cloud

            - name: Mark test passed
              if: success()
              run: echo "${{ inputs.project }}" > /tmp/test-result.txt

            - name: Upload test result marker
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: test-passed-npm-${{ inputs.project }}
                  path: /tmp/test-result.txt
                  retention-days: 1
