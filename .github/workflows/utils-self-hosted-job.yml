name: Self-Hosted Runner Job

on:
    workflow_call:
        inputs:
            # ── Existing (backward-compatible) ────────────────────
            command:
                description: 'Shell command to execute on the self-hosted runner'
                required: true
                type: string
            timeout:
                description: 'Job timeout in minutes'
                required: false
                type: number
                default: 30
            runner:
                description: 'Runner label (default: arc-runner-set)'
                required: false
                type: string
                default: 'arc-runner-set'

            # ── Multi-step support ────────────────────────────────
            pre_command:
                description: 'Shell command to run BEFORE the main command'
                required: false
                type: string
                default: ''
            post_command:
                description: 'Shell command to run AFTER the main command'
                required: false
                type: string
                default: ''

            # ── Working directory ─────────────────────────────────
            working_directory:
                description: 'Working directory for commands (relative to repo root)'
                required: false
                type: string
                default: '.'

            # ── Toolchain toggles ─────────────────────────────────
            setup_node:
                description: 'Install Node v24 + pnpm v10 + run pnpm install'
                required: false
                type: boolean
                default: false
            setup_rust:
                description: 'Install stable Rust toolchain with cargo cache'
                required: false
                type: boolean
                default: false
            setup_docker:
                description: 'Set up QEMU + Docker Buildx'
                required: false
                type: boolean
                default: false

            # ── Checkout options ──────────────────────────────────
            checkout_submodules:
                description: 'Enable recursive submodule checkout with retry'
                required: false
                type: boolean
                default: false
            checkout_ref:
                description: 'Git ref to check out (default: triggering ref)'
                required: false
                type: string
                default: ''
            fetch_depth:
                description: 'Git fetch depth (0 = full history)'
                required: false
                type: number
                default: 1

            # ── Artifacts ─────────────────────────────────────────
            artifact_name:
                description: 'Name for uploaded artifact (empty = no upload)'
                required: false
                type: string
                default: ''
            artifact_path:
                description: 'Path(s) to upload as artifact'
                required: false
                type: string
                default: ''
            artifact_retention:
                description: 'Artifact retention in days'
                required: false
                type: number
                default: 7

permissions: {}

jobs:
    guard:
        name: Fork Guard
        runs-on: ubuntu-latest
        timeout-minutes: 2
        outputs:
            allowed: ${{ steps.check.outputs.allowed }}
        steps:
            - name: Verify origin and actor
              id: check
              uses: actions/github-script@v8
              with:
                  script: |
                      // 1. Fork check — block PRs from external repositories
                      if (context.eventName === 'pull_request' || context.eventName === 'pull_request_target') {
                        const headRepo = context.payload.pull_request?.head?.repo?.full_name;
                        const baseRepo = context.payload.repository?.full_name;
                        if (headRepo && headRepo !== baseRepo) {
                          core.error(`Blocked: fork PR from ${headRepo} cannot use self-hosted runners`);
                          core.setOutput('allowed', 'false');
                          return;
                        }
                      }

                      // 2. Actor collaborator check — require write or admin access
                      try {
                        const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          username: context.actor,
                        });
                        const level = data.permission;
                        if (level === 'admin' || level === 'write') {
                          core.info(`Actor ${context.actor} has ${level} access — allowed`);
                          core.setOutput('allowed', 'true');
                        } else {
                          core.error(`Actor ${context.actor} has ${level} access — insufficient for self-hosted runners`);
                          core.setOutput('allowed', 'false');
                        }
                      } catch (err) {
                        core.error(`Failed to verify actor permissions: ${err.message}`);
                        core.setOutput('allowed', 'false');
                      }

    run:
        name: Self-Hosted Run
        needs: guard
        if: needs.guard.outputs.allowed == 'true'
        runs-on: ${{ inputs.runner }}
        timeout-minutes: ${{ inputs.timeout }}
        permissions:
            contents: read
        steps:
            # ── Audit & Checkout ──────────────────────────────────
            - name: Audit log
              run: |
                  echo "::notice::Self-hosted job audit: actor=${{ github.actor }}, event=${{ github.event_name }}, ref=${{ github.ref }}, sha=${{ github.sha }}, runner=${{ inputs.runner }}, run_id=${{ github.run_id }}, time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.checkout_ref || github.ref }}
                  submodules: ${{ inputs.checkout_submodules }}
                  fetch-depth: ${{ inputs.fetch_depth }}

            # ── Toolchain: Node v24 + pnpm v10 ───────────────────
            - name: Setup Node v24
              if: inputs.setup_node
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Setup pnpm v10
              if: inputs.setup_node
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: false

            - name: Get pnpm Store Path
              if: inputs.setup_node
              id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm Cache
              if: inputs.setup_node
              uses: actions/cache@v5
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install pnpm Dependencies
              if: inputs.setup_node
              run: pnpm install

            - name: Setup Nx Cache
              if: inputs.setup_node
              uses: actions/cache@v5
              with:
                  path: .nx/cache
                  key: ${{ runner.os }}-nx-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-nx-${{ hashFiles('**/pnpm-lock.yaml') }}-
                      ${{ runner.os }}-nx-

            # ── Toolchain: Rust ───────────────────────────────────
            - name: Rust ToolChain
              if: inputs.setup_rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Cargo Cache
              if: inputs.setup_rust
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-

            # ── Toolchain: Docker ─────────────────────────────────
            - name: Set up QEMU
              if: inputs.setup_docker
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              if: inputs.setup_docker
              uses: docker/setup-buildx-action@v4

            - name: Restore Docker Buildx Cache
              if: inputs.setup_docker
              uses: actions/cache@v5
              with:
                  path: /tmp/.buildx-cache
                  key: ${{ runner.os }}-buildx-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-buildx-

            # ── Command Execution ─────────────────────────────────
            - name: Pre-command
              if: inputs.pre_command != ''
              working-directory: ${{ inputs.working_directory }}
              shell: bash
              env:
                  BUILDX_CACHE_DIR: /tmp/.buildx-cache
              run: |
                  set -euo pipefail
                  ${{ inputs.pre_command }}

            - name: Execute command
              working-directory: ${{ inputs.working_directory }}
              shell: bash
              env:
                  BUILDX_CACHE_DIR: /tmp/.buildx-cache
              run: |
                  set -euo pipefail
                  ${{ inputs.command }}

            - name: Post-command
              if: inputs.post_command != ''
              working-directory: ${{ inputs.working_directory }}
              shell: bash
              env:
                  BUILDX_CACHE_DIR: /tmp/.buildx-cache
              run: |
                  set -euo pipefail
                  ${{ inputs.post_command }}

            # ── Cache Housekeeping ────────────────────────────────
            - name: Rotate Docker Buildx Cache
              if: inputs.setup_docker && always()
              run: |
                  if [ -d /tmp/.buildx-cache-new ]; then
                    rm -rf /tmp/.buildx-cache
                    mv /tmp/.buildx-cache-new /tmp/.buildx-cache
                  fi

            # ── Artifacts ─────────────────────────────────────────
            - name: Upload artifact
              if: inputs.artifact_name != '' && inputs.artifact_path != ''
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ inputs.artifact_name }}
                  path: ${{ inputs.artifact_path }}
                  retention-days: ${{ inputs.artifact_retention }}

            # ── Cleanup ───────────────────────────────────────────
            - name: Cleanup workspace
              if: always()
              run: |
                  echo "Cleaning up workspace..."
                  rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* 2>/dev/null || true
                  docker system prune -f 2>/dev/null || true
