name: CI - Main

on:
    workflow_dispatch:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions: {}

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    globals:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        name: Global Variables
        outputs:
            sha256head: ${{ steps.hash.outputs.sha256head }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Calculate SHA-256 Hash
              id: hash
              run: |
                  echo "sha256head=$(echo -n ${{ github.sha }} | sha256sum | awk '{print $1}')" >> $GITHUB_OUTPUT

    call_sync:
        needs: ['globals']
        name: 'Call Sync Workflow'
        permissions:
            contents: write
            issues: write
        uses: KBVE/kbve/.github/workflows/ci-sync.yml@main
        secrets:
            UNITY_PAT: ${{ secrets.UNITY_PAT }}

    alter:
        needs: ['globals']
        name: 'Alpha Alters'
        if: github.repository == 'kbve/kbve'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-file-alterations.yml@main
        with:
            branch: 'main'

    ## Bevy / Isometric — moved to ci-bevy.yml (async, workflow_run triggered)
    ## Docker — moved to ci-docker.yml (async, workflow_run triggered)
    ## NPM / Crates / Python / Godot — moved to ci-publish.yml (async, workflow_run triggered)
