name: CI - Main

on:
    workflow_dispatch:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions: {}

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    globals:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        name: Global Variables
        outputs:
            sha256head: ${{ steps.hash.outputs.sha256head }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Calculate SHA-256 Hash
              id: hash
              run: |
                  echo "sha256head=$(echo -n ${{ github.sha }} | sha256sum | awk '{print $1}')" >> $GITHUB_OUTPUT

    call_sync:
        needs: ['globals']
        name: 'Call Sync Workflow'
        permissions:
            contents: write
            issues: write
        uses: KBVE/kbve/.github/workflows/ci-sync.yml@main
        secrets:
            UNITY_PAT: ${{ secrets.UNITY_PAT }}

    alter:
        needs: ['globals']
        name: 'Alpha Alters'
        if: github.repository == 'kbve/kbve'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-file-alterations.yml@main
        with:
            branch: 'main'

    ## Bevy / Isometric — moved to ci-bevy.yml (async, workflow_run triggered)
    ## NPM / Crates / Python / Godot — moved to ci-publish.yml (async, workflow_run triggered)

    # ---------------------------------------------------------------------------
    # Docker dispatch — fires one ci-docker.yml run per changed app.
    # Each run gets its own concurrency group (ci-docker-{app_name}) so apps
    # build fully in parallel and never block each other.
    # Queue guard inside ci-docker.yml drops stale runs that waited > 2h.
    # ---------------------------------------------------------------------------
    dispatch_docker:
        name: Dispatch Docker Apps
        needs: ['alter']
        if: github.repository == 'kbve/kbve' && needs.alter.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            actions: write
        steps:
            - name: Dispatch per changed app
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  DISPATCHED_AT=$(date +%s)
                  SHA="${{ github.sha }}"

                  dispatch() {
                    local app="$1"
                    echo "Dispatching ci-docker.yml for: $app"
                    gh workflow run ci-docker.yml \
                      --repo "${{ github.repository }}" \
                      --ref main \
                      --field app_name="$app" \
                      --field sha="$SHA" \
                      --field dispatched_at="$DISPATCHED_AT"
                  }

                  [ "${{ needs.alter.outputs.astro_kbve }}"   = "true" ] && dispatch "axum-kbve"
                  [ "${{ needs.alter.outputs.herbmail }}"      = "true" ] && dispatch "herbmail"
                  [ "${{ needs.alter.outputs.memes }}"         = "true" ] && dispatch "memes"
                  [ "${{ needs.alter.outputs.irc_gateway }}"   = "true" ] && dispatch "irc-gateway"
                  [ "${{ needs.alter.outputs.discordsh }}"     = "true" ] && dispatch "discordsh"
                  [ "${{ needs.alter.outputs.mc }}"            = "true" ] && dispatch "mc"
                  [ "${{ needs.alter.outputs.edge }}"          = "true" ] && dispatch "edge"
                  [ "${{ needs.alter.outputs.cryptothrone }}"  = "true" ] && dispatch "cryptothrone"
                  [ "${{ needs.alter.outputs.kilobase }}"      = "true" ] && dispatch "kilobase"

                  echo "All dispatches complete"

    # ---------------------------------------------------------------------------
    # Publish dispatch — fires one ci-publish.yml run per changed package.
    # Each run is isolated: npm/droid never blocks crates/q or python/fudster.
    # ---------------------------------------------------------------------------
    dispatch_publish:
        name: Dispatch Publish Packages
        needs: ['alter']
        if: github.repository == 'kbve/kbve' && needs.alter.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            actions: write
        steps:
            - name: Dispatch per changed package
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  DISPATCHED_AT=$(date +%s)
                  SHA="${{ github.sha }}"

                  dispatch_npm() {
                    echo "Dispatching ci-publish.yml npm/$1"
                    gh workflow run ci-publish.yml \
                      --repo "${{ github.repository }}" \
                      --ref main \
                      --field package_type="npm" \
                      --field package_name="$1" \
                      --field dispatched_at="$DISPATCHED_AT"
                  }

                  dispatch_crate() {
                    echo "Dispatching ci-publish.yml crates/$1"
                    gh workflow run ci-publish.yml \
                      --repo "${{ github.repository }}" \
                      --ref main \
                      --field package_type="crates" \
                      --field package_name="$1" \
                      --field dispatched_at="$DISPATCHED_AT"
                  }

                  dispatch_python() {
                    local project="$1"
                    local pypi="$2"
                    echo "Dispatching ci-publish.yml python/$project"
                    gh workflow run ci-publish.yml \
                      --repo "${{ github.repository }}" \
                      --ref main \
                      --field package_type="python" \
                      --field package_name="$project" \
                      --field pypi_name="$pypi" \
                      --field dispatched_at="$DISPATCHED_AT"
                  }

                  # NPM
                  [ "${{ needs.alter.outputs.droid }}"      = "true" ] && dispatch_npm "droid"
                  [ "${{ needs.alter.outputs.laser }}"      = "true" ] && dispatch_npm "laser"
                  [ "${{ needs.alter.outputs.devops }}"     = "true" ] && dispatch_npm "devops"
                  [ "${{ needs.alter.outputs.khashvault }}" = "true" ] && dispatch_npm "khashvault"

                  # Rust Crates
                  [ "${{ needs.alter.outputs.q_crate }}"     = "true" ] && dispatch_crate "q"
                  [ "${{ needs.alter.outputs.jedi_crate }}"  = "true" ] && dispatch_crate "jedi"
                  [ "${{ needs.alter.outputs.soul_crate }}"  = "true" ] && dispatch_crate "soul"
                  [ "${{ needs.alter.outputs.kbve_crate }}"  = "true" ] && dispatch_crate "kbve"
                  [ "${{ needs.alter.outputs.erust_crate }}" = "true" ] && dispatch_crate "erust"
                  [ "${{ needs.alter.outputs.holy_crate }}"  = "true" ] && dispatch_crate "holy"

                  # Python
                  [ "${{ needs.alter.outputs.py_lib_fudster }}" = "true" ] && dispatch_python "python-fudster" "fudster"
                  [ "${{ needs.alter.outputs.py_lib_kbve }}"    = "true" ] && dispatch_python "python-kbve"    "kbve"

                  echo "All publish dispatches complete"

    # ---------------------------------------------------------------------------
    # Failure tracker — surfaces failures as GitHub issues (#8186).
    # Release pipeline — failures here block deploys. Grouped by phase:
    #   - Infrastructure (globals, sync, alter)
    #   - Dispatch (docker, publish)
    # ---------------------------------------------------------------------------
    track-globals:
        name: Track Globals
        if: always()
        needs: [globals]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Global Variables'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.globals.result }}

    track-call-sync:
        name: Track Call Sync
        if: always()
        needs: [call_sync]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Call Sync Workflow'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.call_sync.result }}

    track-alter:
        name: Track Alter
        if: always()
        needs: [alter]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Alpha Alters'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.alter.result }}

    track-dispatch-docker:
        name: Track Dispatch Docker
        if: always()
        needs: [dispatch_docker]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Dispatch Docker Apps'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.dispatch_docker.result }}

    track-dispatch-publish:
        name: Track Dispatch Publish
        if: always()
        needs: [dispatch_publish]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Dispatch Publish Packages'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.dispatch_publish.result }}
