name: CI - Main

on:
    workflow_dispatch:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions: {}

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    globals:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        name: Global Variables
        outputs:
            sha256head: ${{ steps.hash.outputs.sha256head }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Calculate SHA-256 Hash
              id: hash
              run: |
                  echo "sha256head=$(echo -n ${{ github.sha }} | sha256sum | awk '{print $1}')" >> $GITHUB_OUTPUT

    call_sync:
        needs: ['globals']
        name: 'Call Sync Workflow'
        permissions:
            contents: write
            issues: write
        uses: KBVE/kbve/.github/workflows/ci-sync.yml@main
        secrets:
            UNITY_PAT: ${{ secrets.UNITY_PAT }}

    alter:
        needs: ['globals']
        name: 'Alpha Alters'
        if: github.repository == 'kbve/kbve'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-file-alterations.yml@main
        with:
            branch: 'main'

    ## Bevy / Isometric — moved to ci-bevy.yml (async, workflow_run triggered)
    ## NPM / Crates / Python / Godot — moved to ci-publish.yml (async, workflow_run triggered)

    # ---------------------------------------------------------------------------
    # Manifest-driven dispatch — reads .github/ci-dispatch-manifest.json and
    # dispatches ci-docker.yml / ci-publish.yml per entry.
    #
    # For each entry:
    #   1. Check file alteration output → dispatch if true
    #   2. If false, check local version vs registry → dispatch if unpublished
    #
    # This handles the edge case where a publish fails and no files change
    # on the next push — the unpublished version still gets re-dispatched.
    # ---------------------------------------------------------------------------
    dispatch:
        name: Manifest Dispatch
        needs: ['alter']
        if: github.repository == 'kbve/kbve' && needs.alter.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            actions: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Write alterations JSON
              uses: actions/github-script@v8
              with:
                  script: |
                      const fs = require('fs');
                      const outputs = ${{ toJson(needs.alter.outputs) }};
                      fs.writeFileSync('/tmp/alterations.json', JSON.stringify(outputs));
                      console.log(`Wrote ${Object.keys(outputs).length} alteration keys`);

            - name: Dispatch from manifest
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO: ${{ github.repository }}
                  SHA: ${{ github.sha }}
              run: |
                  set -euo pipefail
                  DISPATCHED_AT=$(date +%s)
                  MANIFEST=".github/ci-dispatch-manifest.json"
                  ALTER="/tmp/alterations.json"
                  DISPATCHED=0
                  SKIPPED=0

                  if [ ! -f "$MANIFEST" ]; then
                    echo "::error::Manifest not found: $MANIFEST"
                    exit 1
                  fi

                  # --- Semver comparison: returns "true" if local > registry ---
                  is_newer() {
                    local local_v="$1" reg_v="$2"
                    if [ "$local_v" = "$reg_v" ]; then echo "false"; return; fi
                    # sort -V puts the smaller version first; if local is last, it's newer
                    local highest=$(printf '%s\n%s' "$local_v" "$reg_v" | sort -V | tail -1)
                    [ "$highest" = "$local_v" ] && echo "true" || echo "false"
                  }

                  # --- Version check helpers (now use is_newer for semver) ---
                  check_npm_version() {
                    local pkg="$1"
                    local local_v=$(jq -r '.version' "packages/npm/${pkg}/package.json" 2>/dev/null || echo "0.0.0")
                    local reg_v=$(curl -sf "https://registry.npmjs.org/@kbve/${pkg}/latest" | jq -r '.version // "0.0.0"' 2>/dev/null || echo "0.0.0")
                    is_newer "$local_v" "$reg_v"
                  }

                  check_crate_version() {
                    local pkg="$1"
                    local local_v=$(grep -m1 '^version' "packages/rust/${pkg}/Cargo.toml" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0")
                    local reg_v=$(curl -sf "https://crates.io/api/v1/crates/${pkg}" | jq -r '.crate.max_version // "0.0.0"' 2>/dev/null || echo "0.0.0")
                    is_newer "$local_v" "$reg_v"
                  }

                  check_python_version() {
                    local pypi="$1"
                    local local_v=$(grep -m1 '^version' "packages/python/${pypi}/pyproject.toml" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0")
                    local reg_v=$(curl -sf "https://pypi.org/pypi/${pypi}/json" | jq -r '.info.version // "0.0.0"' 2>/dev/null || echo "0.0.0")
                    is_newer "$local_v" "$reg_v"
                  }

                  check_unreal_version() {
                    local plugin_path="$1" plugin_name="$2"
                    local local_v=$(jq -r '.VersionName' "${plugin_path}/${plugin_name}.uplugin" 2>/dev/null || echo "0.0.0")
                    local reg_v="0.0.0"
                    if [ -f "${plugin_path}/version.toml" ]; then
                      reg_v=$(grep -m1 '^version' "${plugin_path}/version.toml" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0")
                    fi
                    is_newer "$local_v" "$reg_v"
                  }

                  check_docker_version() {
                    local app="$1"
                    local toml=""
                    case "$app" in
                      axum-kbve)     toml="apps/kbve/axum-kbve/Cargo.toml" ;;
                      herbmail)      toml="apps/herbmail/axum-herbmail/Cargo.toml" ;;
                      memes)         toml="apps/memes/axum-memes/Cargo.toml" ;;
                      irc-gateway)   toml="apps/irc/irc-gateway/Cargo.toml" ;;
                      discordsh)     toml="apps/discordsh/axum-discordsh/Cargo.toml" ;;
                      mc)            toml="apps/mc/plugins/kbve-mc-plugin/Cargo.toml" ;;
                      edge)          toml="apps/kbve/edge/version.toml" ;;
                      cryptothrone)  toml="apps/cryptothrone/axum-cryptothrone/Cargo.toml" ;;
                      *)             echo "true"; return ;;
                    esac
                    if [ ! -f "$toml" ]; then echo "true"; return; fi
                    local local_v=$(grep -m1 '^version' "$toml" | sed 's/version = "\(.*\)"/\1/')
                    local image=""
                    case "$app" in
                      axum-kbve) image="kbve/kbve" ;; herbmail) image="kbve/herbmail" ;;
                      memes) image="kbve/memes" ;; irc-gateway) image="kbve/irc-gateway" ;;
                      discordsh) image="kbve/discordsh" ;; mc) image="kbve/mc" ;;
                      edge) image="kbve/edge" ;; cryptothrone) image="kbve/cryptothrone" ;;
                      kilobase) image="kbve/kilobase" ;; *) echo "true"; return ;;
                    esac
                    local hub_status=$(curl -sf -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/${image}/tags/${local_v}" 2>/dev/null || echo "000")
                    [ "$hub_status" != "200" ] && echo "true" || echo "false"
                  }

                  # --- Check if alteration key is true ---
                  is_altered() {
                    local key="$1"
                    jq -r --arg k "$key" '.[$k] // "false"' "$ALTER" 2>/dev/null
                  }

                  # --- Dispatch helpers ---
                  dispatch_docker() {
                    local app="$1"
                    gh workflow run ci-docker.yml --repo "$REPO" --ref main \
                      --field app_name="$app" --field sha="$SHA" --field dispatched_at="$DISPATCHED_AT"
                  }

                  dispatch_publish() {
                    local type="$1"; shift
                    gh workflow run ci-publish.yml --repo "$REPO" --ref main \
                      --field package_type="$type" --field dispatched_at="$DISPATCHED_AT" "$@"
                  }

                  # =================================================================
                  # Docker apps
                  # =================================================================
                  echo "=== Docker Apps ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    app=$(echo "$entry" | jq -r '.app_name')
                    altered=$(is_altered "$key")
                    if [ "$altered" = "true" ]; then
                      echo "  ✓ $app — files changed, dispatching"
                      dispatch_docker "$app"
                      DISPATCHED=$((DISPATCHED + 1))
                    elif [ "$(check_docker_version "$app")" = "true" ]; then
                      echo "  ✓ $app — unpublished version, dispatching"
                      dispatch_docker "$app"
                      DISPATCHED=$((DISPATCHED + 1))
                    else
                      echo "  · $app — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                    fi
                  done < <(jq -c '.docker[]' "$MANIFEST")

                  # =================================================================
                  # NPM packages
                  # =================================================================
                  echo "=== NPM Packages ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    pkg=$(echo "$entry" | jq -r '.package_name')
                    altered=$(is_altered "$key")
                    if [ "$altered" = "true" ]; then
                      echo "  ✓ $pkg — files changed, dispatching"
                      dispatch_publish npm --field package_name="$pkg"
                      DISPATCHED=$((DISPATCHED + 1))
                    elif [ "$(check_npm_version "$pkg")" = "true" ]; then
                      echo "  ✓ $pkg — unpublished version, dispatching"
                      dispatch_publish npm --field package_name="$pkg"
                      DISPATCHED=$((DISPATCHED + 1))
                    else
                      echo "  · $pkg — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                    fi
                  done < <(jq -c '.npm[]' "$MANIFEST")

                  # =================================================================
                  # Rust crates
                  # =================================================================
                  echo "=== Rust Crates ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    pkg=$(echo "$entry" | jq -r '.package_name')
                    altered=$(is_altered "$key")
                    if [ "$altered" = "true" ]; then
                      echo "  ✓ $pkg — files changed, dispatching"
                      dispatch_publish crates --field package_name="$pkg"
                      DISPATCHED=$((DISPATCHED + 1))
                    elif [ "$(check_crate_version "$pkg")" = "true" ]; then
                      echo "  ✓ $pkg — unpublished version, dispatching"
                      dispatch_publish crates --field package_name="$pkg"
                      DISPATCHED=$((DISPATCHED + 1))
                    else
                      echo "  · $pkg — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                    fi
                  done < <(jq -c '.crates[]' "$MANIFEST")

                  # =================================================================
                  # Python packages
                  # =================================================================
                  echo "=== Python Packages ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    pkg=$(echo "$entry" | jq -r '.package_name')
                    pypi=$(echo "$entry" | jq -r '.pypi_name')
                    altered=$(is_altered "$key")
                    if [ "$altered" = "true" ]; then
                      echo "  ✓ $pkg — files changed, dispatching"
                      dispatch_publish python --field package_name="$pkg" --field pypi_name="$pypi"
                      DISPATCHED=$((DISPATCHED + 1))
                    elif [ "$(check_python_version "$pypi")" = "true" ]; then
                      echo "  ✓ $pkg — unpublished version, dispatching"
                      dispatch_publish python --field package_name="$pkg" --field pypi_name="$pypi"
                      DISPATCHED=$((DISPATCHED + 1))
                    else
                      echo "  · $pkg — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                    fi
                  done < <(jq -c '.python[]' "$MANIFEST")

                  # =================================================================
                  # Unreal plugins
                  # =================================================================
                  echo "=== Unreal Plugins ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    name=$(echo "$entry" | jq -r '.plugin_name')
                    path=$(echo "$entry" | jq -r '.plugin_path')
                    deps=$(echo "$entry" | jq -r '.dependency_plugins // ""')
                    itch=$(echo "$entry" | jq -r '.itch_game_id // ""')
                    altered=$(is_altered "$key")
                    deploy_itch="false"
                    [ -n "$itch" ] && deploy_itch="true"
                    if [ "$altered" = "true" ]; then
                      echo "  ✓ $name — files changed, dispatching"
                    elif [ "$(check_unreal_version "$path" "$name")" = "true" ]; then
                      echo "  ✓ $name — unpublished version, dispatching"
                    else
                      echo "  · $name — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi
                    dispatch_publish unreal \
                      --field package_name="$name" \
                      --field unreal_plugin_path="$path" \
                      --field deploy_to_itch="$deploy_itch" \
                      --field itch_game_id="$itch" \
                      --field unreal_dependency_plugins="$deps"
                    DISPATCHED=$((DISPATCHED + 1))
                  done < <(jq -c '.unreal[]' "$MANIFEST")

                  echo ""
                  echo "=== Summary: ${DISPATCHED} dispatched, ${SKIPPED} skipped ==="

    # ---------------------------------------------------------------------------
    # Failure tracker — surfaces failures as GitHub issues (#8186).
    # Release pipeline — failures here block deploys. Grouped by phase:
    #   - Infrastructure (globals, sync, alter)
    #   - Dispatch (docker, publish)
    # ---------------------------------------------------------------------------
    track-globals:
        name: Track Globals
        if: always()
        needs: [globals]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Global Variables'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.globals.result }}

    track-call-sync:
        name: Track Call Sync
        if: always()
        needs: [call_sync]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Call Sync Workflow'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.call_sync.result }}

    track-alter:
        name: Track Alter
        if: always()
        needs: [alter]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Alpha Alters'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.alter.result }}

    track-dispatch:
        name: Track Dispatch
        if: always()
        needs: [dispatch]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Manifest Dispatch'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.dispatch.result }}
