name: CI - Main

on:
    workflow_dispatch:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions: {}

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    globals:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        name: Global Variables
        outputs:
            sha256head: ${{ steps.hash.outputs.sha256head }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}
                  lfs: false

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Calculate SHA-256 Hash
              id: hash
              run: |
                  echo "sha256head=$(echo -n ${{ github.sha }} | sha256sum | awk '{print $1}')" >> $GITHUB_OUTPUT

    call_sync:
        needs: ['globals']
        name: 'Call Sync Workflow'
        permissions:
            contents: write
            issues: write
        uses: KBVE/kbve/.github/workflows/ci-sync.yml@main
        secrets:
            UNITY_PAT: ${{ secrets.UNITY_PAT }}

    alter:
        needs: ['globals']
        name: 'Alpha Alters'
        if: github.repository == 'kbve/kbve'
        permissions:
            contents: read
        uses: KBVE/kbve/.github/workflows/utils-file-alterations.yml@main
        with:
            branch: 'main'

    ## Bevy / Isometric — moved to ci-bevy.yml (async, workflow_run triggered)
    ## NPM / Crates / Python / Godot — moved to ci-publish.yml (async, workflow_run triggered)

    # ---------------------------------------------------------------------------
    # Manifest-driven dispatch — reads .github/ci-dispatch-manifest.json and
    # dispatches ci-docker.yml / ci-publish.yml per entry.
    #
    # For each entry:
    #   1. Check file alteration output → dispatch if true
    #   2. If false, check local version vs registry → dispatch if unpublished
    #
    # This handles the edge case where a publish fails and no files change
    # on the next push — the unpublished version still gets re-dispatched.
    # ---------------------------------------------------------------------------
    dispatch:
        name: Manifest Dispatch
        needs: ['alter']
        if: github.repository == 'kbve/kbve' && needs.alter.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            actions: write
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  lfs: false

            - name: Write alterations JSON
              uses: actions/github-script@v9
              with:
                  script: |
                      const fs = require('fs');
                      const outputs = ${{ toJson(needs.alter.outputs) }};
                      fs.writeFileSync('/tmp/alterations.json', JSON.stringify(outputs));
                      console.log(`Wrote ${Object.keys(outputs).length} alteration keys`);

            - name: Dispatch from manifest
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO: ${{ github.repository }}
                  SHA: ${{ github.sha }}
              run: |
                  set -euo pipefail
                  DISPATCHED_AT=$(date +%s)
                  MANIFEST=".github/ci-dispatch-manifest.json"
                  ALTER="/tmp/alterations.json"
                  DISPATCHED=0
                  SKIPPED=0

                  if [ ! -f "$MANIFEST" ]; then
                    echo "::error::Manifest not found: $MANIFEST"
                    exit 1
                  fi

                  # --- Semver comparison: returns "true" if local > published ---
                  # Treats 0.0.0 as "not ready" — never publishes if either version is 0.0.0.
                  is_newer() {
                    local local_v="$1" pub_v="$2"
                    if [ -z "$local_v" ] || [ "$local_v" = "0.0.0" ]; then echo "false"; return; fi
                    if [ -z "$pub_v" ] || [ "$pub_v" = "0.0.0" ]; then echo "false"; return; fi
                    if [ "$local_v" = "$pub_v" ]; then echo "false"; return; fi
                    local highest=$(printf '%s\n%s' "$local_v" "$pub_v" | sort -V | tail -1)
                    [ "$highest" = "$local_v" ] && echo "true" || echo "false"
                  }

                  # --- Universal version check via version.toml ---
                  # Belt: checks publish flag. Suspenders: checks version + 0.0.0 guard.
                  # No external API calls — purely file-based.
                  check_version() {
                    local source_file="$1" version_toml="$2"
                    local local_v="0.0.0" pub_v="0.0.0" pub_flag="true"

                    # Belt: check publish flag
                    if [ -f "$version_toml" ]; then
                      pub_flag=$(grep -m1 '^publish' "$version_toml" | sed 's/publish = //' | tr -d ' "' 2>/dev/null || echo "true")
                    fi
                    if [ "$pub_flag" = "false" ]; then echo "false"; return; fi

                    # Read local version from source
                    if [ -f "$source_file" ]; then
                      case "$source_file" in
                        *.json)    local_v=$(jq -r '.version // "0.0.0"' "$source_file" 2>/dev/null || echo "0.0.0") ;;
                        *.uplugin) local_v=$(jq -r '.VersionName // "0.0.0"' "$source_file" 2>/dev/null || echo "0.0.0") ;;
                        *.mdx)     local_v=$(sed -n 's/^version: *"\([^"]*\)"/\1/p' "$source_file" | head -1); [ -z "$local_v" ] && local_v="0.0.0" ;;
                        *.csproj)  local_v=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' "$source_file" | head -1); [ -z "$local_v" ] && local_v="0.0.0" ;;
                        *)         local_v=$(grep -m1 '^version' "$source_file" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0") ;;
                      esac
                    fi

                    # Read published version from version.toml
                    if [ -f "$version_toml" ]; then
                      pub_v=$(grep -m1 '^version' "$version_toml" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0")
                    fi

                    # Suspenders: 0.0.0 or empty = not ready
                    is_newer "$local_v" "$pub_v"
                  }

                  # --- Version gate from a literal local version (unreal: MDX is the lever) ---
                  check_version_value() {
                    local local_v="$1" version_toml="$2"
                    local pub_v="0.0.0" pub_flag="true"
                    if [ -f "$version_toml" ]; then
                      pub_flag=$(grep -m1 '^publish' "$version_toml" | sed 's/publish = //' | tr -d ' "' 2>/dev/null || echo "true")
                    fi
                    if [ "$pub_flag" = "false" ]; then echo "false"; return; fi
                    if [ -f "$version_toml" ]; then
                      pub_v=$(grep -m1 '^version' "$version_toml" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0")
                    fi
                    is_newer "$local_v" "$pub_v"
                  }

                  read_source_version() {
                    local source_file="$1" v="0.0.0"
                    if [ -f "$source_file" ]; then
                      case "$source_file" in
                        *.json)    v=$(jq -r '.version // "0.0.0"' "$source_file" 2>/dev/null || echo "0.0.0") ;;
                        *.uplugin) v=$(jq -r '.VersionName // "0.0.0"' "$source_file" 2>/dev/null || echo "0.0.0") ;;
                        *.mdx)     v=$(sed -n 's/^version: *"\([^"]*\)"/\1/p' "$source_file" | head -1); [ -z "$v" ] && v="0.0.0" ;;
                        *.csproj)  v=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' "$source_file" | head -1); [ -z "$v" ] && v="0.0.0" ;;
                        *)         v=$(grep -m1 '^version' "$source_file" | sed 's/version = "\(.*\)"/\1/' 2>/dev/null || echo "0.0.0") ;;
                      esac
                    fi
                    echo "$v"
                  }

                  # --- Check if alteration key is true ---
                  is_altered() {
                    local key="$1"
                    jq -r --arg k "$key" '.[$k] // "false"' "$ALTER" 2>/dev/null
                  }

                  # --- In-flight check ---
                  # Returns "true" if any queued/in-progress ci-docker run already
                  # exists for this app_name. Prevents stacking multiple builds of
                  # the same app when several main commits land in quick succession.
                  # ci-docker.yml sets run-name to "CI - Docker / <app>", so we
                  # match on that exact string from gh run list.
                  is_docker_running() {
                    local app="$1"
                    local title="CI - Docker / ${app}"
                    local q ip
                    q=$(gh run list --workflow=ci-docker.yml --repo "$REPO" \
                      --status queued --limit 50 --json displayTitle \
                      --jq "[.[] | select(.displayTitle == \"$title\")] | length" 2>/dev/null || echo 0)
                    ip=$(gh run list --workflow=ci-docker.yml --repo "$REPO" \
                      --status in_progress --limit 50 --json displayTitle \
                      --jq "[.[] | select(.displayTitle == \"$title\")] | length" 2>/dev/null || echo 0)
                    if [ "$q" -gt 0 ] || [ "$ip" -gt 0 ]; then echo "true"; else echo "false"; fi
                  }

                  # Same idea for ci-publish.yml — its run-name is
                  # "CI - Publish / <type> / <name>".
                  is_publish_running() {
                    local type="$1" name="$2"
                    local title="CI - Publish / ${type} / ${name}"
                    local q ip
                    q=$(gh run list --workflow=ci-publish.yml --repo "$REPO" \
                      --status queued --limit 50 --json displayTitle \
                      --jq "[.[] | select(.displayTitle == \"$title\")] | length" 2>/dev/null || echo 0)
                    ip=$(gh run list --workflow=ci-publish.yml --repo "$REPO" \
                      --status in_progress --limit 50 --json displayTitle \
                      --jq "[.[] | select(.displayTitle == \"$title\")] | length" 2>/dev/null || echo 0)
                    if [ "$q" -gt 0 ] || [ "$ip" -gt 0 ]; then echo "true"; else echo "false"; fi
                  }

                  # --- Dispatch helpers ---
                  dispatch_docker() {
                    local app="$1"
                    gh workflow run ci-docker.yml --repo "$REPO" --ref main \
                      --field app_name="$app" --field sha="$SHA" --field dispatched_at="$DISPATCHED_AT"
                  }

                  dispatch_publish() {
                    local type="$1"; shift
                    gh workflow run ci-publish.yml --repo "$REPO" --ref main \
                      --field package_type="$type" --field dispatched_at="$DISPATCHED_AT" "$@"
                  }

                  # =================================================================
                  # Docker apps — version_source and version_toml read from manifest
                  # =================================================================
                  echo "=== Docker Apps ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    app=$(echo "$entry" | jq -r '.app_name')
                    SRC=$(echo "$entry" | jq -r '.version_source // empty')
                    VTOML=$(echo "$entry" | jq -r '.version_toml // empty')
                    altered=$(is_altered "$key")
                    needs_dispatch="false"
                    reason=""
                    if [ "$altered" = "true" ]; then
                      needs_dispatch="true"
                      reason="files changed"
                    elif [ -n "$SRC" ] && [ "$(check_version "$SRC" "$VTOML")" = "true" ]; then
                      needs_dispatch="true"
                      reason="unpublished version"
                    elif [ -z "$SRC" ]; then
                      echo "  · $app — no version source, skipping"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    else
                      echo "  · $app — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi
                    # Concurrency guard: skip if a build for this app is already
                    # queued or in progress. Prevents stacking duplicate runs when
                    # several main commits land in quick succession.
                    if [ "$(is_docker_running "$app")" = "true" ]; then
                      echo "  · $app — already running ($reason), skipping duplicate"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi
                    echo "  ✓ $app — $reason, dispatching"
                    dispatch_docker "$app"
                    DISPATCHED=$((DISPATCHED + 1))
                  done < <(jq -c '.docker[]' "$MANIFEST")

                  # =================================================================
                  # NPM packages
                  # =================================================================
                  echo "=== NPM Packages ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    pkg=$(echo "$entry" | jq -r '.package_name')
                    SRC=$(echo "$entry" | jq -r '.version_source // empty')
                    TGT=$(echo "$entry" | jq -r '.version_target // empty')
                    VTOML=$(echo "$entry" | jq -r '.version_toml // empty')
                    VER=$(echo "$entry" | jq -r '.version // empty')
                    altered=$(is_altered "$key")

                    npm_src="${SRC:-packages/npm/${pkg}/package.json}"
                    npm_vtoml="${VTOML:-packages/npm/${pkg}/version.toml}"

                    EXTRA_FIELDS=""
                    [ -n "$SRC" ] && EXTRA_FIELDS="$EXTRA_FIELDS --field version_source=${SRC}"
                    [ -n "$TGT" ] && EXTRA_FIELDS="$EXTRA_FIELDS --field version_target=${TGT}"
                    [ -n "$VER" ] && [ "$VER" != "0.0.0" ] && EXTRA_FIELDS="$EXTRA_FIELDS --field manifest_version=${VER}"

                    needs_dispatch="false"
                    reason=""
                    if [ "$altered" = "true" ]; then
                      needs_dispatch="true"
                      reason="files changed"
                    elif [ "$(check_version "$npm_src" "$npm_vtoml")" = "true" ]; then
                      needs_dispatch="true"
                      reason="unpublished version"
                    fi
                    if [ "$needs_dispatch" != "true" ]; then
                      echo "  · $pkg — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi
                    if [ "$(is_publish_running npm "$pkg")" = "true" ]; then
                      echo "  · $pkg — already running ($reason), skipping duplicate"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi
                    echo "  ✓ $pkg — $reason, dispatching (v$VER)"
                    dispatch_publish npm --field package_name="$pkg" $EXTRA_FIELDS
                    DISPATCHED=$((DISPATCHED + 1))
                  done < <(jq -c '.npm[]' "$MANIFEST")

                  # =================================================================
                  # Rust crates — supports version_source override for non-standard
                  # paths (e.g. bevy crates at packages/rust/bevy/*)
                  # =================================================================
                  echo "=== Rust Crates ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    pkg=$(echo "$entry" | jq -r '.package_name')
                    VER=$(echo "$entry" | jq -r '.version // empty')
                    SRC=$(echo "$entry" | jq -r '.version_source // empty')
                    TGT=$(echo "$entry" | jq -r '.version_target // empty')
                    VTOML=$(echo "$entry" | jq -r '.version_toml // empty')
                    altered=$(is_altered "$key")

                    # Resolve paths: version_source (MDX) for dispatch check,
                    # version_target (Cargo.toml) for patching before publish
                    cargo_src="${SRC:-packages/rust/${pkg}/Cargo.toml}"
                    cargo_vtoml="${VTOML:-packages/rust/${pkg}/version.toml}"

                    # Build dispatch fields — same pattern as Docker apps
                    EXTRA_FIELDS=""
                    if [ -n "$SRC" ]; then
                      EXTRA_FIELDS="--field version_source=${SRC}"
                    fi
                    if [ -n "$TGT" ]; then
                      EXTRA_FIELDS="$EXTRA_FIELDS --field version_target=${TGT}"
                    fi
                    if [ -n "$VTOML" ]; then
                      EXTRA_FIELDS="$EXTRA_FIELDS --field version_toml_path_override=${VTOML}"
                    fi
                    if [ -n "$VER" ] && [ "$VER" != "0.0.0" ]; then
                      EXTRA_FIELDS="$EXTRA_FIELDS --field manifest_version=${VER}"
                    fi

                    needs_dispatch="false"
                    reason=""
                    if [ "$altered" = "true" ]; then
                      needs_dispatch="true"
                      reason="files changed"
                    elif [ "$(check_version "$cargo_src" "$cargo_vtoml")" = "true" ]; then
                      needs_dispatch="true"
                      reason="unpublished version"
                    fi
                    if [ "$needs_dispatch" != "true" ]; then
                      echo "  · $pkg — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi
                    if [ "$(is_publish_running crates "$pkg")" = "true" ]; then
                      echo "  · $pkg — already running ($reason), skipping duplicate"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi
                    echo "  ✓ $pkg — $reason, dispatching (v$VER)"
                    dispatch_publish crates --field package_name="$pkg" $EXTRA_FIELDS
                    DISPATCHED=$((DISPATCHED + 1))
                  done < <(jq -c '.crates[]' "$MANIFEST")

                  # =================================================================
                  # Python packages
                  # =================================================================
                  echo "=== Python Packages ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    pkg=$(echo "$entry" | jq -r '.package_name')
                    pypi=$(echo "$entry" | jq -r '.pypi_name')
                    SRC=$(echo "$entry" | jq -r '.version_source // empty')
                    TGT=$(echo "$entry" | jq -r '.version_target // empty')
                    VTOML=$(echo "$entry" | jq -r '.version_toml // empty')
                    VER=$(echo "$entry" | jq -r '.version // empty')
                    altered=$(is_altered "$key")

                    py_src="${SRC:-packages/python/${pypi}/pyproject.toml}"
                    py_vtoml="${VTOML:-packages/python/${pypi}/version.toml}"

                    EXTRA_FIELDS="--field pypi_name=$pypi"
                    [ -n "$SRC" ] && EXTRA_FIELDS="$EXTRA_FIELDS --field version_source=${SRC}"
                    [ -n "$TGT" ] && EXTRA_FIELDS="$EXTRA_FIELDS --field version_target=${TGT}"
                    [ -n "$VER" ] && [ "$VER" != "0.0.0" ] && EXTRA_FIELDS="$EXTRA_FIELDS --field manifest_version=${VER}"

                    needs_dispatch="false"
                    reason=""
                    if [ "$altered" = "true" ]; then
                      needs_dispatch="true"
                      reason="files changed"
                    elif [ "$(check_version "$py_src" "$py_vtoml")" = "true" ]; then
                      needs_dispatch="true"
                      reason="unpublished version"
                    fi
                    if [ "$needs_dispatch" != "true" ]; then
                      echo "  · $pkg — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi
                    if [ "$(is_publish_running python "$pkg")" = "true" ]; then
                      echo "  · $pkg — already running ($reason), skipping duplicate"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi
                    echo "  ✓ $pkg — $reason, dispatching (v$VER)"
                    dispatch_publish python --field package_name="$pkg" $EXTRA_FIELDS
                    DISPATCHED=$((DISPATCHED + 1))
                  done < <(jq -c '.python[]' "$MANIFEST")

                  # =================================================================
                  # Unreal plugins
                  # =================================================================
                  echo "=== Unreal Plugins ==="
                  while IFS= read -r entry; do
                    key=$(echo "$entry" | jq -r '.key')
                    name=$(echo "$entry" | jq -r '.plugin_name')
                    path=$(echo "$entry" | jq -r '.plugin_path')
                    deps=$(echo "$entry" | jq -r '.dependency_plugins // ""')
                    itch=$(echo "$entry" | jq -r '.itch_game_id // ""')
                    tp=$(echo "$entry" | jq -r 'if (.supported_platforms // [] | length) > 0 then (.supported_platforms | join("+")) else "Linux" end')
                    # Read the version LIVE from MDX (version_source) so a bare MDX
                    # bump triggers without a manifest regen — same as game entries.
                    src=$(echo "$entry" | jq -r '.version_source // empty')
                    if [ -n "$src" ]; then
                      mdx_version=$(read_source_version "$src")
                    else
                      mdx_version=$(echo "$entry" | jq -r '.version')
                    fi
                    altered=$(is_altered "$key")
                    deploy_itch="false"
                    [ -n "$itch" ] && deploy_itch="true"
                    reason=""
                    if [ "$altered" = "true" ]; then
                      reason="files changed"
                    elif [ "$(check_version_value "$mdx_version" "${path}/version.toml")" = "true" ]; then
                      reason="unpublished version"
                    else
                      echo "  · $name — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                      continue
                    fi

                    # One dispatch per plugin version: the run fans out to all
                    # declared platforms (Linux/Mac/Win64) and only cuts the
                    # release when every one passes (gate lives in ci-unreal-build).
                    if [ "$(is_publish_running unreal "$name")" = "true" ]; then
                      echo "  · $name — already running ($reason), skipping duplicate"
                      SKIPPED=$((SKIPPED + 1))
                    else
                      echo "  ✓ $name ($tp) — $reason, dispatching"
                      uconfig=$(jq -nc \
                        --arg pp "$path" --arg itch "$itch" --arg deps "$deps" --arg tp "$tp" \
                        --argjson di "$deploy_itch" \
                        '{plugin_path:$pp, image_tags:["dev-5.8.0"], deploy_to_itch:$di, itch_game_id:$itch, dependency_plugins:$deps, target_platforms:$tp, skip_version_update:false}')
                      dispatch_publish unreal \
                        --field package_name="$name" \
                        --field manifest_version="$mdx_version" \
                        --field unreal_config="$uconfig"
                      DISPATCHED=$((DISPATCHED + 1))
                    fi
                  done < <(jq -c '.unreal[]' "$MANIFEST")

                  # =================================================================
                  # Game-engine pipelines — unity / godot / unreal_game.
                  # Same dispatch shape, one workflow file per engine. Reads the
                  # shared GameEngineConfig sub-object from the manifest entry.
                  # =================================================================
                  dispatch_game_engine() {
                    local pipeline="$1"; local workflow="$2"; local entry="$3"
                    local key app src vtoml ver sv vtgt run has_test shell_path
                    local engine_version proj_path build_targets features dotnet ext_repo lic
                    local itch_user itch_game itch_chan deploy_itch
                    key=$(echo "$entry" | jq -r '.key')
                    shell_path=$(echo "$entry" | jq -r '.shell_path // empty')
                    app=$(echo "$entry" | jq -r '.app_name')
                    src=$(echo "$entry" | jq -r '.version_source // empty')
                    vtoml=$(echo "$entry" | jq -r '.version_toml // empty')
                    ver=$(echo "$entry" | jq -r '.version // empty')
                    if [ -n "$src" ]; then
                      sv=$(read_source_version "$src")
                      [ -n "$sv" ] && [ "$sv" != "0.0.0" ] && ver="$sv"
                    fi
                    vtgt=$(echo "$entry" | jq -r '.version_target // empty')
                    run=$(echo "$entry" | jq -r '.runner // empty')
                    has_test=$(echo "$entry" | jq -r '.has_test // empty')
                    engine_version=$(echo "$entry" | jq -r '.engine.version // empty')
                    proj_path=$(echo "$entry" | jq -r '.engine.project_path // empty')
                    build_targets=$(echo "$entry" | jq -c '.engine.build_targets // []')
                    features=$(echo "$entry" | jq -c '.engine.features // []')
                    dotnet=$(echo "$entry" | jq -r '.engine.dotnet_enabled // false')
                    lic=$(echo "$entry" | jq -r '.engine.license_method // empty')
                    ext_repo=$(echo "$entry" | jq -r '.engine.external_repo_url // empty')
                    ext_ref=$(echo "$entry" | jq -r '.engine.external_repo_ref // empty')
                    srv_target=$(echo "$entry" | jq -r '.engine.server_target // empty')
                    srv_config=$(echo "$entry" | jq -r '.engine.server_config // empty')
                    cli_config=$(echo "$entry" | jq -r '.engine.client_config // empty')
                    game_mode=$(echo "$entry" | jq -r '.engine.game_mode // empty')
                    maps=$(echo "$entry" | jq -c '.engine.maps // []')
                    itch_user=$(echo "$entry" | jq -r '.external_publish.itch_user // empty')
                    itch_game=$(echo "$entry" | jq -r '.external_publish.itch_game // empty')
                    itch_chan=$(echo "$entry" | jq -r '.external_publish.itch_channel // empty')
                    deploy_itch="false"
                    [ -n "$itch_user" ] && [ -n "$itch_game" ] && deploy_itch="true"

                    local steam_apps deploy_steam
                    steam_apps=$(echo "$entry" | jq -c '.external_publish.steam_apps // []')
                    deploy_steam="false"
                    [ "$steam_apps" != "[]" ] && [ "$steam_apps" != "null" ] && deploy_steam="true"

                    local altered reason
                    altered=$(is_altered "$key")
                    reason=""
                    if [ "$altered" = "true" ]; then
                      reason="files changed"
                    elif [ -n "$src" ] && [ "$(check_version "$src" "$vtoml")" = "true" ]; then
                      reason="unpublished version"
                    else
                      echo "  · $app — no changes, version published, skipping"
                      SKIPPED=$((SKIPPED + 1))
                      return
                    fi
                    echo "  ✓ $app — $reason, dispatching ($pipeline)"

                    # Collapse per-game fields into JSON blobs so ci-unreal's
                    # workflow_dispatch stays under GitHub's 10-input cap; the
                    # engine workflow fromJSON-forwards into ci-unreal-build
                    # (workflow_call, no cap). ci-unity/ci-godot still expect the
                    # legacy per-field inputs — convert them before they get entries.
                    local engine_json version_json publish_json
                    engine_json=$(echo "$entry" | jq -c --arg app "$app" --arg sp "$shell_path" \
                      '(.engine // {}) + {app_name:$app, shell_path:$sp, build_targets:(.engine.build_targets // []), maps:(.engine.maps // [])}')
                    version_json=$(jq -nc --arg s "$src" --arg t "$vtoml" --arg m "$ver" \
                      '{source:$s, toml:$t, manifest:$m}')
                    publish_json=$(jq -nc --argjson d "$deploy_itch" --arg u "$itch_user" --arg g "$itch_game" --arg c "$itch_chan" \
                      '{deploy_to_itch:$d, itch_user:$u, itch_game:$g, itch_channel:$c}')

                    gh workflow run "$workflow" --repo "$REPO" --ref main \
                      --field key="$key" \
                      --field dispatched_at="$DISPATCHED_AT" \
                      --field engine="$engine_json" \
                      --field version="$version_json" \
                      --field publish="$publish_json"
                    DISPATCHED=$((DISPATCHED + 1))

                    # Bundled dedicated server: an unreal_game entry carrying a
                    # shell_path also ships a UE5 dedicated server off the SAME
                    # version gate (1:1 with the client). shell_path rides inside
                    # the engine blob; build.toml supplies repo / target / UE image.
                    if [ "$pipeline" = "unreal_game" ] && [ -n "$shell_path" ]; then
                      echo "  ✓ $app — bundled dedicated server, dispatching (ue5_server)"
                      gh workflow run ci-unreal.yml --repo "$REPO" --ref main \
                        --field task=server \
                        --field key="$key" \
                        --field dispatched_at="$DISPATCHED_AT" \
                        --field engine="$engine_json" \
                        --field version="$version_json"
                      DISPATCHED=$((DISPATCHED + 1))
                    fi
                  }

                  echo "=== Unity ==="
                  while IFS= read -r entry; do
                    dispatch_game_engine unity ci-unity.yml "$entry"
                  done < <(jq -c '.unity[]? // empty' "$MANIFEST")

                  echo "=== Godot ==="
                  while IFS= read -r entry; do
                    dispatch_game_engine godot ci-godot.yml "$entry"
                  done < <(jq -c '.godot[]? // empty' "$MANIFEST")

                  echo "=== Unreal Game ==="
                  while IFS= read -r entry; do
                    dispatch_game_engine unreal_game ci-unreal.yml "$entry"
                  done < <(jq -c '.unreal_game[]? // empty' "$MANIFEST")

                  echo "=== Vite Game ==="
                  while IFS= read -r entry; do
                    dispatch_game_engine vite_game ci-vite-game.yml "$entry"
                  done < <(jq -c '.vite_game[]? // empty' "$MANIFEST")

                  echo ""
                  echo "=== Summary: ${DISPATCHED} dispatched, ${SKIPPED} skipped ==="

    # ---------------------------------------------------------------------------
    # Failure tracker — surfaces failures as GitHub issues (#8186).
    # Release pipeline — failures here block deploys. Grouped by phase:
    #   - Infrastructure (globals, sync, alter)
    #   - Dispatch (docker, publish)
    # ---------------------------------------------------------------------------
    track-globals:
        name: Track Globals
        if: always()
        needs: [globals]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Global Variables'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.globals.result }}

    track-call-sync:
        name: Track Call Sync
        if: always()
        needs: [call_sync]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Call Sync Workflow'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.call_sync.result }}

    track-alter:
        name: Track Alter
        if: always()
        needs: [alter]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Alpha Alters'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.alter.result }}

    track-dispatch:
        name: Track Dispatch
        if: always()
        needs: [dispatch]
        permissions:
            issues: write
        uses: KBVE/kbve/.github/workflows/utils-ci-failure-tracker.yml@dev
        with:
            workflow_name: 'CI - Main'
            job_name: 'Manifest Dispatch'
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            status: ${{ needs.dispatch.result }}
