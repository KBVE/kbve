# =============================================================================
# CI: dbmate-deploy
#
# Two-stage prod deploy. ARC runner orchestrates; the actual dbmate
# binary runs INSIDE the kilobase namespace as a Kubernetes Job
# (apps/kube/kilobase/templates/dbmate-runner-job.yaml). The Job
# uses Postgres advisory locking so concurrent runs queue rather
# than collide, and the schema_migrations UNIQUE on version means
# re-applying an already-applied migration is a no-op.
#
# Stage 1 (status): read-only preview Job. Always runs.
# Stage 2 (apply): renders the up Job from the template. Gated by
#   GitHub Environment "kilobase-prod" — set required reviewers on
#   that environment in repo Settings → Environments before this
#   workflow can succeed.
#
# Pre-req: the validate workflow (ci-dbmate-validate.yml) MUST be
# green on the same SHA. We assert via a status-check guard.
# =============================================================================
name: CI - dbmate deploy

on:
    workflow_dispatch:
        inputs:
            confirm_sha:
                description: 'Short SHA you want to apply (must match HEAD)'
                required: true

permissions:
    contents: read

jobs:
    guard:
        name: Pre-flight checks
        runs-on: arc-runner-set
        timeout-minutes: 2
        outputs:
            sha: ${{ steps.sha.outputs.short }}
        steps:
            - uses: actions/checkout@v6
            - id: sha
              # --short=7 pins the length so operator-supplied 7-char
              # SHAs match regardless of local abbrev config drift.
              run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
            - name: Verify operator-supplied SHA matches HEAD
              run: |
                  SUPPLIED="${{ inputs.confirm_sha }}"
                  HEAD="${{ steps.sha.outputs.short }}"
                  # Accept either exact 7-char match or a longer prefix
                  # form (substring check against full HEAD) so users
                  # with --short=9 git config don't get bounced.
                  if [[ "${SUPPLIED:0:7}" != "$HEAD" ]]; then
                    echo "::error::SHA mismatch — supplied $SUPPLIED, HEAD $HEAD"
                    exit 1
                  fi

    status:
        name: dbmate status (preview)
        needs: guard
        runs-on: arc-runner-set
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v6

            - name: Install kubectl
              uses: azure/setup-kubectl@v4
              with:
                  version: v1.31.0
            - name: Install envsubst
              run: |
                  # gettext-base ships envsubst; runner image lacks it.
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends gettext-base

            - name: Build migrations ConfigMap (gzipped tarball)
              run: |
                  # Pack the migrations dir as a single gzip tarball
                  # before pushing into the ConfigMap. Raw files hit
                  # the 1 MiB ConfigMap cap once the tree grows past
                  # ~50 migrations; gzip drops 1.1 MiB of SQL to ~200
                  # KiB. The dbmate-runner Job's busybox initContainer
                  # extracts the tarball at startup. See follow-up
                  # issue #11250 for an OCI-image delivery that
                  # removes the cap entirely.
                  tar -czf migrations.tar.gz \
                      -C packages/data/sql/dbmate \
                      migrations/
                  ls -lh migrations.tar.gz
                  kubectl -n kilobase delete configmap dbmate-migrations \
                    --ignore-not-found
                  kubectl -n kilobase create configmap dbmate-migrations \
                    --from-file=migrations.tar.gz=migrations.tar.gz

            - name: Render + run a status Job
              env:
                  DBMATE_VERSION_TAG: status-${{ needs.guard.outputs.sha }}-${{ github.run_id }}
              run: |
                  envsubst < apps/kube/kilobase/templates/dbmate-runner-job.yaml \
                    | sed 's/dbmate up/dbmate status/' \
                    | sed 's/dbmate-up-/dbmate-status-/' \
                    | kubectl apply -f -

            - name: Stream Job logs until completion
              env:
                  DBMATE_VERSION_TAG: status-${{ needs.guard.outputs.sha }}-${{ github.run_id }}
              run: |
                  kubectl -n kilobase wait --for=condition=complete \
                    --timeout=300s job/dbmate-status-$DBMATE_VERSION_TAG
                  kubectl -n kilobase logs job/dbmate-status-$DBMATE_VERSION_TAG

    apply:
        name: dbmate up (apply)
        needs: [guard, status]
        runs-on: arc-runner-set
        environment:
            name: kilobase-prod
            url: https://kbve.com/forum/
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - name: Install kubectl
              uses: azure/setup-kubectl@v4
              with:
                  version: v1.31.0
            - name: Install envsubst
              run: |
                  # gettext-base ships envsubst; runner image lacks it.
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends gettext-base

            - name: Render + run the up Job
              env:
                  DBMATE_VERSION_TAG: ${{ needs.guard.outputs.sha }}-${{ github.run_id }}
              run: |
                  envsubst < apps/kube/kilobase/templates/dbmate-runner-job.yaml \
                    | kubectl apply -f -

            - name: Wait for completion + tail logs
              env:
                  DBMATE_VERSION_TAG: ${{ needs.guard.outputs.sha }}-${{ github.run_id }}
              run: |
                  set +e
                  kubectl -n kilobase wait --for=condition=complete \
                    --timeout=600s job/dbmate-up-$DBMATE_VERSION_TAG
                  RC=$?
                  echo "----- Job logs -----"
                  kubectl -n kilobase logs job/dbmate-up-$DBMATE_VERSION_TAG
                  if [ "$RC" -ne 0 ]; then
                    echo "----- Job description (failure path) -----"
                    kubectl -n kilobase describe job/dbmate-up-$DBMATE_VERSION_TAG
                    exit $RC
                  fi
