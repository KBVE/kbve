name: CI - Lint and Test

on:
    workflow_call:
        inputs:
            base-ref:
                required: true
                type: string
                description: 'Base ref for nx affected (e.g., origin/main)'
            head-ref:
                required: true
                type: string
                description: 'Head ref for nx affected (e.g., origin/dev)'
            check-conflicts:
                required: false
                type: boolean
                default: false
                description: 'Run merge conflict check before tests'

jobs:
    lint-and-test:
        name: 'Lint and Test'
        runs-on: ubuntu-latest
        timeout-minutes: 120
        env:
            NX_NO_CLOUD: true
        permissions:
            contents: read
        steps:
            - name: Free disk space
              uses: jlumbroso/free-disk-space@main
              with:
                  tool-cache: false
                  android: true
                  dotnet: true
                  haskell: true
                  large-packages: false
                  swap-storage: false
                  docker-images: true

            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Check for conflicts
              if: ${{ inputs.check-conflicts }}
              run: |
                  echo "Checking for merge conflicts..."
                  git config user.name "CI Bot"
                  git config user.email "ci@example.com"

                  if git merge --no-commit --no-ff origin/main; then
                    echo "No merge conflicts detected"
                    git merge --abort 2>/dev/null || git reset --hard HEAD
                  else
                    echo "Merge conflicts detected! Please resolve before merging."
                    git merge --abort 2>/dev/null || git reset --hard HEAD
                    exit 1
                  fi

            - name: Setup Node v24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  check-latest: false
                  token: ${{ github.token }}

            - name: Setup pnpm v10
              uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0
                  run_install: false

            - name: Get pnpm Store Path
              id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm Cache
              uses: actions/cache@v5
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install pnpm Dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'
                  check-latest: false
                  token: ${{ github.token }}

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  github-token: ${{ github.token }}

            - name: Setup Rust 1.94
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: '1.94'
                  components: clippy

            - name: Install system libraries for wry/webkit2gtk + protoc
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                    pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
                    protobuf-compiler libprotobuf-dev

            - name: Setup PostgreSQL 17 for pgrx
              run: |
                  sudo install -d /usr/share/postgresql-common/pgdg
                  sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
                  echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
                  sudo apt-get update
                  sudo apt-get install -y postgresql-server-dev-17 libclang-dev
                  mkdir -p ~/.pgrx
                  printf '[configs]\npg17 = "/usr/lib/postgresql/17/bin/pg_config"\n' > ~/.pgrx/config.toml

            # Godot 4.6.3 for nexus-defense:test / :test-e2e.
            #
            # Cached under /opt/godot so cold installs (~30 s, downloads
            # the ~80 MB linux release zip from godotengine/godot-builds)
            # only happen on the first run per cache key. Subsequent runs
            # are a no-op restore. scripts/test{,-e2e}.sh both honour the
            # GODOT_BIN env var the final step exports, so no script
            # change is needed for CI to start using the cached binary.
            #
            # When godot ships a new patch, bump GODOT_VERSION below and
            # cache key flips automatically.
            - name: Cache Godot 4.6.3 (Linux x86_64)
              id: godot-cache
              uses: actions/cache@v5
              with:
                  path: /opt/godot
                  key: godot-${{ runner.os }}-4.6.3-stable

            - name: Install Godot 4.6.3
              if: steps.godot-cache.outputs.cache-hit != 'true'
              env:
                  GODOT_VERSION: 4.6.3-stable
                  GODOT_BUILD: Godot_v4.6.3-stable_linux.x86_64
              run: |
                  set -euo pipefail
                  curl -fsSL --retry 3 -o /tmp/godot.zip \
                    "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/${GODOT_BUILD}.zip"
                  sudo mkdir -p /opt/godot
                  sudo unzip -q /tmp/godot.zip -d /opt/godot
                  sudo mv "/opt/godot/${GODOT_BUILD}" /opt/godot/godot
                  sudo chmod +x /opt/godot/godot
                  rm /tmp/godot.zip

            - name: Expose GODOT_BIN
              run: |
                  echo "GODOT_BIN=/opt/godot/godot" >> "$GITHUB_ENV"
                  /opt/godot/godot --version

            # Force a fresh nx project graph before affected lint/test runs.
            # Without this, the @nx/dependency-checks ESLint rule has a known
            # race when a dep + its first import land in back-to-back PRs:
            # the daemon's cached graph sees the dep in package.json but
            # not yet the import in src/, so it falsely flags the package
            # as unused (see #10607). `nx reset` clears the cache and stops
            # any stale daemon — the next nx invocation spawns a fresh daemon
            # and rebuilds the graph from disk, so daemon caching still helps
            # the rest of the run.
            - name: Reset nx graph
              run: pnpm nx reset

            - name: Lint affected projects
              run: pnpm nx affected --target=lint --base=${{ inputs.base-ref }} --head=${{ inputs.head-ref }} --no-cloud

            - name: Test affected projects
              run: pnpm nx affected --target=test --base=${{ inputs.base-ref }} --head=${{ inputs.head-ref }} --no-cloud
