name: Update version.toml

on:
    workflow_call:
        inputs:
            package_type:
                description: 'Package type (npm, crates, python, docker)'
                required: true
                type: string
            package_name:
                description: 'Package name for commit message'
                required: true
                type: string
            version:
                description: 'Version that was published'
                required: true
                type: string
            version_toml_path:
                description: 'Path to version.toml relative to repo root'
                required: true
                type: string
            version_target_path:
                description: 'Path to the actual version file (Cargo.toml, package.json) to sync — optional'
                required: false
                type: string
                default: ''

# Shared with utils-post-publish.yml. Both workflows commit to
# version.toml / Cargo.toml / Cargo.lock from per-release atom branches
# based on the same dev HEAD; without this group two crate releases
# firing in parallel race on Cargo.lock when their atom PRs auto-merge.
concurrency:
    group: version-sync
    cancel-in-progress: false

jobs:
    update:
        name: PR version.toml → ${{ inputs.version }}
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write
            pull-requests: write
            actions: write
        steps:
            - name: Checkout dev
              uses: actions/checkout@v6
              with:
                  ref: dev

            - name: Update version.toml
              run: |
                  VTOML="${{ inputs.version_toml_path }}"
                  VERSION="${{ inputs.version }}"

                  if [ -f "$VTOML" ] && grep -q '^version' "$VTOML"; then
                    # In-place update preserves all other content (e.g. function registry)
                    sed -i "s/^version = .*/version = \"${VERSION}\"/" "$VTOML"
                  else
                    # Fresh file — simple two-line version.toml
                    printf 'version = "%s"\npublish = true\n' "$VERSION" > "$VTOML"
                  fi
                  echo "Updated $VTOML:"
                  cat "$VTOML"

            - name: Sync version target file
              if: inputs.version_target_path != ''
              run: |
                  TARGET="${{ inputs.version_target_path }}"
                  VERSION="${{ inputs.version }}"

                  if [ ! -f "$TARGET" ]; then
                    echo "::warning::version_target_path '$TARGET' not found — skipping."
                    exit 0
                  fi

                  case "$TARGET" in
                    *.toml)
                      sed -i "s/^version = .*/version = \"${VERSION}\"/" "$TARGET"
                      ;;
                    *.json)
                      jq --arg v "$VERSION" '.version = $v' "$TARGET" > "$TARGET.tmp" && mv "$TARGET.tmp" "$TARGET"
                      ;;
                    *)
                      echo "::warning::Unknown file type for '$TARGET' — skipping."
                      exit 0
                      ;;
                  esac

                  echo "Synced $TARGET to $VERSION:"
                  grep -m1 'version' "$TARGET"

            # Mirror utils-post-publish.yml: keep Cargo.lock in sync with
            # the matching Cargo.toml bump so fresh checkouts don't
            # regenerate the lock on the first `cargo` invocation.
            - name: Sync Cargo.lock
              if: inputs.version_target_path != '' && endsWith(inputs.version_target_path, 'Cargo.toml')
              run: |
                  TARGET="${{ inputs.version_target_path }}"
                  VERSION="${{ inputs.version }}"

                  if [ ! -f Cargo.lock ]; then
                    echo "::notice::Cargo.lock not present at workspace root — skipping."
                    exit 0
                  fi

                  PKG_NAME=$(grep -m 1 '^name = "' "$TARGET" | sed 's/name = "\(.*\)"/\1/')
                  if [ -z "$PKG_NAME" ]; then
                    echo "::warning::Could not parse package name from '$TARGET' — skipping Cargo.lock sync."
                    exit 0
                  fi

                  awk -v pkg="$PKG_NAME" -v new="$VERSION" '
                    /^\[\[package\]\]$/ { in_pkg=1; matched=0 }
                    in_pkg && /^name = "/ {
                      n=$0; sub(/^name = "/, "", n); sub(/"$/, "", n);
                      if (n == pkg) matched=1
                    }
                    in_pkg && matched && /^version = "/ {
                      sub(/version = "[^"]+"/, "version = \"" new "\"")
                      matched=0
                    }
                    /^$/ { in_pkg=0; matched=0 }
                    { print }
                  ' Cargo.lock > Cargo.lock.tmp && mv Cargo.lock.tmp Cargo.lock
                  echo "Synced Cargo.lock entry for $PKG_NAME to $VERSION"

            - uses: actions/setup-node@v6
              with:
                  node-version: 24

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0
                  run_install: false

            - id: pnpm-store
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

            - uses: actions/cache@v5
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - run: pnpm install --frozen-lockfile

            - name: Regenerate ci-dispatch-manifest
              run: |
                  npx nx run astro-kbve:build
                  npx nx run astro-kbve:sync:ci-manifest

            - name: Create PR
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  PKG="${{ inputs.package_name }}"
                  VERSION="${{ inputs.version }}"
                  TYPE="${{ inputs.package_type }}"
                  BRANCH="auto/update-${TYPE}-${PKG}-v${VERSION}"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add "${{ inputs.version_toml_path }}"
                  if [ -n "${{ inputs.version_target_path }}" ] && [ -f "${{ inputs.version_target_path }}" ]; then
                    git add "${{ inputs.version_target_path }}"
                    case "${{ inputs.version_target_path }}" in
                      *Cargo.toml)
                        [ -f Cargo.lock ] && git add Cargo.lock
                        ;;
                    esac
                  fi
                  git add .github/ci-dispatch-manifest.json
                  if git diff --cached --quiet; then
                    echo "::notice::version.toml already at ${VERSION} on dev — nothing to commit."
                    exit 0
                  fi

                  git checkout -b "${BRANCH}"
                  git commit -m "chore(${PKG}): update version.toml to ${VERSION} [skip ci]"
                  git push origin "${BRANCH}"

                  PR_URL=$(gh pr create \
                    --base dev \
                    --head "${BRANCH}" \
                    --title "chore(${PKG}): update version.toml to ${VERSION}" \
                    --body "Automated post-publish update. ${TYPE}/${PKG} v${VERSION} has been published." \
                    --label "auto-pr")

                  PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')
                  echo "Created PR #${PR_NUM}, dispatching auto-merge..."
                  gh workflow run ci-auto-merge-bot-prs.yml --field pr_number="${PR_NUM}" --repo ${{ github.repository }} || true
