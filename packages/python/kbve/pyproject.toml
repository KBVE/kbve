[project]
name = "kbve"
version = "1.0.13"
description = "KBVE - API layer and complexity handler for async HTTP, WebSocket, gRPC, and broadcasting"
readme = "README.md"
license = "LicenseRef-Proprietary"
requires-python = ">=3.12,<3.14"
dependencies = [
    "pydantic>=1.10,<3.0",
    "aiohttp>=3.9,<4.0",
    "fastapi>=0.115,<1.0",
    "uvicorn[standard]>=0.32,<1.0",
    "grpcio>=1.62,<2.0",
    "protobuf>=4.25,<6.0",
    "pyyaml>=6.0,<7.0",
]

[project.optional-dependencies]
# ARPG sprite-baking toolchain (kbve.sprite.*). Kept off the core/server install
# so API consumers don't pull numpy/Pillow. Enable with: uv sync --extra sprite
sprite = [
    "pillow>=10.0,<12.0",
    "numpy>=1.26,<3.0",
]
# OSRS item-corpus analysis (kbve.osrs.*). Only needs PyYAML (already core),
# but kept behind an extra so corpus tooling stays opt-in. Enable with:
# uv sync --extra osrs
osrs = [
    "pyyaml>=6.0,<7.0",
]
# Whole-site SEO/SEM auditor (kbve.seo.*). Static frontmatter+MDX analysis;
# only needs PyYAML. Enable with: uv sync --extra seo
seo = [
    "pyyaml>=6.0,<7.0",
]

[project.scripts]
kbve-skin-variant = "kbve.sprite.skin_variant:main"
kbve-sprite-postprocess = "kbve.sprite.sprite_postprocess:main"
kbve-ship-footprint = "kbve.sprite.ship_footprint:main"
kbve-model-sprites = "kbve.sprite.model_sprites_cli:main"
kbve-osrs-survey = "kbve.osrs.survey:main"
kbve-osrs-audit = "kbve.osrs.audit:main"
kbve-osrs-families = "kbve.osrs.families:main"
kbve-nx-security = "kbve.nx.cli:security_main"
kbve-nx-graph = "kbve.nx.cli:graph_main"
kbve-nx-alerts = "kbve.nx.cli:alerts_main"
kbve-nx-router = "kbve.nx.cli:router_main"
kbve-nx-build = "kbve.nx.cli:build_main"
kbve-seo-audit = "kbve.seo.audit:main"
kbve-seo-report = "kbve.seo.report:main"
kbve-unreal-clangd = "kbve.unreal.clangd:main"
kbve-unreal-check = "kbve.unreal.check:main"
kbve-blender-retarget = "kbve.blender.cli:retarget_main"

[dependency-groups]
dev = [
    "autopep8==2.0.2",
    "flake8==6.0.0",
    "pytest==8.3.3",
    "pytest-sugar==0.9.7",
    "pytest-cov==4.1.0",
    "pytest-html==3.2.0",
    "pytest-asyncio>=0.23,<1.0",
    "grpcio-tools>=1.62,<2.0",
    "httpx>=0.27,<1.0",
]

[tool.coverage.run]
branch = true
source = [ "kbve" ]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
show_missing = true

[tool.pytest.ini_options]
addopts = "--cov --cov-report html:'../../../coverage/packages/python/kbve/html' --cov-report xml:'../../../coverage/packages/python/kbve/coverage.xml' --html='../../../reports/packages/python/kbve/unittests/html/index.html' --junitxml='../../../reports/packages/python/kbve/unittests/junit.xml'"
asyncio_mode = "auto"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
