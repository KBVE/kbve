[package]
name = "jedi"
authors = ["kbve", "h0lybyte"]
version = "0.2.2"
edition = "2024"
license = "MIT"
description = "Jedi is the Juggernaut Electronic Data Interchange package. This library provides a data exchange layer extended through the holy crate."
homepage = "https://kbve.com/application/rust/#jedi"
repository = "https://github.com/KBVE/kbve/tree/main/packages/jedi"
readme = "README.md"
rust-version.workspace = true


[build-dependencies]
tonic-prost-build = "0.14.5"

[dependencies]
bytes-utils = "0.1.4"
async-trait = "0.1.88"
prost-types = "0.14"
dashmap = { version = "6.1.0", features = ["serde", "rayon"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bytes = { version = "1", features = ["serde"] }
ammonia = "4.1.2"
bitflags = { version = "2.9.0", features = ["serde"] }
thiserror = "2"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tower = { version = "0.5.3", features = ["util", "timeout", "load-shed", "limit"] }
tokio = { version = "1.43", features = ["rt-multi-thread", "macros", "sync", "time", "net", "fs", "io-util"] }
tokio-postgres = { version = "0.7.2", optional = true, features = ["with-uuid-1", "with-chrono-0_4", "with-serde_json-1"] }
tracing = "0.1"
axum = { version = "0.8.9", features = ["ws", "macros"] }
bb8 ={ version = "0.9.0", optional = true }
bb8-postgres = { version = "0.9.0", optional = true }
tokio-postgres-rustls = { version = "0.13", optional = true }
rustls = { version = "0.23", optional = true, default-features = false, features = ["ring"] }
webpki-roots = { version = "0.26", optional = true }
url = { version = "2", optional = true }
uuid = { version = "1", optional = true, features = ["serde", "v4"] }
rustls-pemfile = { version = "2", optional = true }
fred = { version = "10", optional = true, features = [
  "i-keys", "i-lists", "i-pubsub", "i-std", "subscriber-client",
  "serde-json", "i-server", "i-scripts", "i-streams",
  "metrics", "enable-rustls", "i-tracking"
] }
prost = { version = "0.14", features = ["derive"] }
papaya = "0.2.1"
tonic = { version = "0.14.5", optional = true }
tonic-health = { version = "0.14.5", optional = true }
tonic-prost = { version = "0.14.5", optional = true }
tonic-reflection = { version = "0.14.5", optional = true }
ulid ={ version = "1", features = ["serde", "uuid"] }
chrono = { version = "0.4", features = ["serde"] }
futures-util = "0.3"
rustc-hash = "2.1.1"
flexbuffers = "25.2.10"
# Twitch
twitch-irc = { version = "5.0.1", optional = true, default-features = false, features = ["with-serde", "refreshing-token-rustls-webpki-roots", "transport-tcp", "transport-tcp-rustls-webpki-roots", "transport-ws", "transport-ws-rustls-webpki-roots"] }
# Replaceable
crossbeam = "0.8.4"
regex = "1.10.3"
# Local Supabase JWT verification (HS256 + ES256/JWKS) — rust_crypto for ES256.
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
# ClickHouse (optional)
clickhouse = { version = "0.14", optional = true }
# Prometheus metrics (optional)
axum-prometheus = { version = "0.10", optional = true }
metrics = { version = "0.24", optional = true }
lru = { version = "0.18", optional = true }
# AWS / cloud object storage (optional)
aws-config = { version = "1", optional = true, features = ["behavior-version-latest"] }
aws-sdk-s3 = { version = "1", optional = true }

[features]
default = []
clickhouse = ["dep:clickhouse"]
prometheus = ["dep:axum-prometheus", "dep:metrics"]
forgejo = []
itch = []
twitch = ["dep:twitch-irc"]
grpc = ["dep:tonic", "dep:tonic-prost", "dep:tonic-health", "dep:tonic-reflection"]
postgres = [
    "dep:tokio-postgres",
    "dep:bb8",
    "dep:bb8-postgres",
    "dep:tokio-postgres-rustls",
    "dep:rustls",
    "dep:rustls-pemfile",
    "dep:webpki-roots",
    "dep:url",
    "dep:uuid",
]
valkey = ["dep:lru", "dep:fred"]
observ = ["dep:tracing-subscriber"]
aws = ["dep:aws-config", "dep:aws-sdk-s3"]

[dependencies.tracing-subscriber]
version = "0.3"
optional = true
default-features = false
features = ["registry", "std"]

[dev-dependencies]
serial_test = "3"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
