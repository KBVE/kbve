[package]
name = "q"
authors = ["kbve", "h0lybyte"]
version = "0.1.1"
edition = "2024"
license = "MIT"
description = "Q is a Rust crate powering KBVE games. Default build is a Godot GDExtension (cdylib) with a tokio-backed game manager. Feature flags expose a parallel server flavor (bevy + axum + rapier2d) and per-game bundles."
homepage = "https://kbve.com/application/rust/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/q"
readme = "README.md"
rust-version = "1.88"
exclude = [
    "release/*",
    "docs/*",
]

[lib]
# cdylib for the Godot GDExtension flavor; rlib so server crates can pull q in as a library.
crate-type = ["cdylib", "rlib"]

# -----------------------------------------------------------------------------
# Features
# -----------------------------------------------------------------------------
[features]
# Keep existing q consumers (Rareicon etc.) compiling unchanged.
default = ["client"]

# Side selection — `client` and `server` are mutually exclusive (enforced by compile_error! in lib.rs).
client = ["dep:godot", "dep:dashmap", "dep:crossbeam-channel", "dep:bitflags", "dep:tokio"]
server = ["dep:tokio"]

# Protocol (postcard wire format + bincode for snapshot framing).
proto-shared = ["dep:postcard", "dep:bincode"]
proto-client = ["client", "proto-shared"]
proto-server = ["server", "proto-shared"]

# Physics — rapier2d for spatial queries (client) and authoritative sim step (server).
rapier2d-client = ["client", "dep:rapier2d"]
rapier2d-server = ["server", "dep:rapier2d"]

# Networking — WS client for the Godot extension, axum for the server.
# Both sides require proto-* for wire framing.
net-client = ["client", "proto-client", "dep:tokio-tungstenite", "dep:futures-util"]
net-server = ["server", "proto-server", "dep:axum", "dep:tokio-tungstenite", "dep:futures-util"]

# Bevy ECS app for server flavors. Server-only — clients use their host engine.
bevy-server = ["server", "dep:bevy"]

# Game bundles — convenience rollups consumed by build pipelines / sync scripts.
nexus-defense = ["client", "proto-client", "rapier2d-client", "net-client"]
nexus-defense-server = ["server", "proto-server", "rapier2d-server", "net-server", "bevy-server"]

# -----------------------------------------------------------------------------
# Dependencies
# -----------------------------------------------------------------------------
[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Client / shared infra (gated by features)
godot = { version = "0.4.5", optional = true, features = ["experimental-wasm", "experimental-threads"] }
dashmap = { version = "6.1.0", optional = true }
crossbeam-channel = { version = "0.5.15", optional = true }
bitflags = { version = "2.9.0", optional = true, features = ["serde"] }
tokio = { version = "1.49", optional = true, features = ["rt-multi-thread", "macros", "sync", "time"] }

# Protocol
postcard = { version = "1.0", optional = true, default-features = false, features = ["use-std"] }
bincode = { version = "2.0", optional = true, features = ["serde"] }

# Physics
rapier2d = { version = "0.22", optional = true }

# Bevy ECS — headless server. No render, no winit; we drive App::update from a tokio task.
bevy = { version = "0.18", optional = true, default-features = false, features = ["bevy_state"] }

# Networking
tokio-tungstenite = { version = "0.24", optional = true, default-features = false, features = ["rustls-tls-webpki-roots", "connect"] }
axum = { version = "0.7", optional = true, default-features = false, features = ["ws", "json"] }
futures-util = { version = "0.3", optional = true, default-features = false, features = ["sink", "std"] }

# -----------------------------------------------------------------------------
# Desktop platform deps — link in unconditionally on those OSes (target-cfg gated).
# Pulled in only by the `client` flavor's platform module (which is itself cfg-gated
# at the source level), so server-only builds on those OSes get them as link bloat
# we'll trim with an explicit `no-desktop` feature if it ever matters.
# -----------------------------------------------------------------------------
[target."cfg(all(target_os = \"macos\", not(target_family = \"wasm\")))".dependencies]
objc2 = "0.6.3"
wry = { version = "0.54.2", features = ["transparent", "devtools"] }
raw-window-handle = "0.6.2"
http = "1.4.0"
infer = "0.19.0"

[target."cfg(all(target_os = \"windows\", not(target_family = \"wasm\")))".dependencies]
windows = { version = "0.62.2", features = [
    "Data_Xml_Dom",
    "Win32_Security",
    "Win32_System_Threading",
    "Win32_UI_WindowsAndMessaging",
] }
wry = { version = "0.54.2", features = ["transparent", "devtools"] }
raw-window-handle = "0.6.2"
http = "1.4.0"
infer = "0.19.0"

[target."cfg(all(target_os = \"linux\", not(target_family = \"wasm\")))".dependencies]
wry = { version = "0.54.2", features = ["transparent", "devtools"] }
raw-window-handle = "0.6.2"
http = "1.4.0"
infer = "0.19.0"

# -----------------------------------------------------------------------------
# Profiles
# -----------------------------------------------------------------------------
[profile.release]
opt-level = 'z'
lto = "fat"
codegen-units = 1
debug = false
