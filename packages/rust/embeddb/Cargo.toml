[package]
name = "embeddb"
version = "0.1.0"
edition = "2021"
description = "Single-file embedded DB: Turso write path + DuckDB analytics read path"
license = "MIT"
homepage = "https://kbve.com/application/rust/#embeddb"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/embeddb"

[dependencies]
turso = "0.7"
duckdb = { version = "1", features = ["bundled"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
thiserror = "1"
embeddb-derive = { version = "0.1.0", path = "../embeddb-derive", optional = true }

[features]
default = ["derive"]
derive = ["dep:embeddb-derive"]

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
criterion = "0.5"

[[bench]]
name = "embeddb_bench"
harness = false
