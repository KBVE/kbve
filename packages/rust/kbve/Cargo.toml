[package]
name = "kbve"
authors = ["kbve", "h0lybyte"]
version = "0.1.26"
edition = "2021"
license = "MIT"
description = "KBVE is an Axum and Diesel Boilerplate that helps produce backend APIs for micro services."
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/kbve"
readme = "README.md"
rust-version = "1.78"

[features]
default = []
supabase = ["dep:lru", "dep:uuid"]
image-gen = ["dep:resvg"]
wallet = ["dep:uuid"]
legacy-sync-db = ["diesel/postgres", "diesel/r2d2", "dep:r2d2"]

[dependencies]
anyhow = "1.0"
ammonia = "4.1.2"
argon2 = "0.5.0"
pulldown-cmark = { version = "0.13", default-features = false, features = ["html"] }
url = "2.5"
askama = "0.15.6"
async-trait = "0.1.74"
chrono = { version = "0.4.44", features = ["serde"] }
diesel = { version = "2.3.7", default-features = false, features = [
    "chrono",
    "serde_json",
    "uuid",
] }
diesel-async = { version = "0.9", features = ["postgres", "bb8"] }
bb8 = "0.9"
futures-util = "0.3"
dotenvy = "0.15"
axum = { version = "0.8.9", features = ["macros"] }
axum-extra = { version = "0.12.6", features = ["cookie"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dashmap = { version = "6.1.0", features = ["serde"] }
jsonwebtoken = "10.3.0"
rand_core = { version = "0.6.4", features = ["std"] }
tokio = { version = "1.0", features = ["full"] }
thiserror = "2"
time = "0.3.47"
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
] }
tower = { version = "0.5.3", features = ["timeout", "util"] }
tower-http = { version = "0.6.8", features = ["cors", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
r2d2 = { version = "0.8.9", optional = true }
regex = "1.10.2"
once_cell = "1"
ulid = "1.2.1"
num-bigint = "0.4"
lru = { version = "0.16", optional = true }
resvg = { version = "0.47.0", optional = true }
uuid = { version = "1", features = ["v4", "serde"], optional = true }
jedi = { path = "../jedi" }
holy = { version = "0.2.1", path = "../holy" }

[dev-dependencies]
serial_test = "3"

[package.metadata.askama]
dirs = ["templates"]
