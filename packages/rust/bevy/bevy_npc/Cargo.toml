[package]
name = "bevy_npc"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Agnostic Bevy NPC plugin — data-driven NPC definitions, registry, and ECS components based on npcdb.proto."
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/bevy_npc"
keywords = ["bevy", "npc", "gamedev", "ecs", "plugin"]
categories = ["game-development", "game-engines"]

[features]
default = ["serde"]
serde = ["dep:serde", "dep:serde_json"]

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "bevy_state",
] }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
