[package]
name = "bevy_mapdb"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "Proto-driven map definitions for Bevy games — compiles mapdb.proto into typed Rust structs with a searchable registry."
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/bevy_mapdb"
keywords = ["bevy", "map", "gamedev", "protobuf", "plugin"]
categories = ["game-development", "game-engines"]
readme = "README.md"

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "bevy_state",
] }
prost = { version = "0.14", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
prost-build = "0.14"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
