[package]
name = "bevy_chat"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "IRC-backed chat and event bridge for MUD/game clients — headless async client with optional Bevy plugin."
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/bevy_chat"
keywords = ["bevy", "irc", "chat", "mud", "gamedev"]
categories = ["game-development", "network-programming"]
readme = "README.md"

[dependencies]
tokio = { version = "1", features = ["net", "io-util", "sync", "time", "rt"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"

# Optional Bevy plugin support (for isometric game)
bevy = { version = "0.18", default-features = false, features = ["bevy_state"], optional = true }
crossbeam-channel = { version = "0.5", optional = true }

[features]
default = []
## Enables the Bevy plugin (`ChatPlugin`) that bridges IRC messages into ECS events.
## Use this in the isometric game; omit for the Discord bot (which uses `ChatClient` directly).
plugin = ["dep:bevy", "dep:crossbeam-channel"]
