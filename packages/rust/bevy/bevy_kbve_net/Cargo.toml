[package]
name = "bevy_kbve_net"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "Shared lightyear protocol for KBVE multiplayer — replicated components, inputs, channels"
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/bevy_kbve_net"
keywords = ["bevy", "lightyear", "multiplayer", "networking", "gamedev"]
categories = ["game-development", "game-engines", "network-programming"]
readme = "README.md"

[features]
default = []
npcdb = ["bevy_npc/creature"]
client = ["lightyear/client", "lightyear/websocket", "lightyear/webtransport", "lightyear/udp", "dep:aeronet_webtransport", "dep:lightyear_aeronet"]
creatures = ["npcdb", "dep:bevy_tasker", "dep:crossbeam-channel", "dep:dashmap"]

[dependencies]
bevy = { version = "0.18", default-features = false, features = ["bevy_state", "bevy_render"] }
lightyear = { version = "0.26", default-features = false, features = [
    "replication",
    "prediction",
    "interpolation",
    "input_native",
    "netcode",
] }
avian3d = { version = "0.5", default-features = false, features = ["3d", "f32", "parry-f32", "serialize"] }
serde = { version = "1", features = ["derive"] }
base64 = "0.22"
hex = "0.4"
bevy_npc = { version = "0.1", path = "../bevy_npc", optional = true }
aeronet_webtransport = { version = "0.19", optional = true }
lightyear_aeronet = { version = "0.26", optional = true }
bevy_tasker = { version = "0.1", path = "../bevy_tasker", optional = true }
crossbeam-channel = { version = "0.5", optional = true }
dashmap = { version = "6", optional = true }
ulid = { version = "1", features = ["serde"] }
bytes = "1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom_03 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }
getrandom_04 = { package = "getrandom", version = "0.4", features = ["wasm_js"] }
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["WebSocket", "BinaryType", "MessageEvent", "CloseEvent", "Event"] }
js-sys = "0.3"
