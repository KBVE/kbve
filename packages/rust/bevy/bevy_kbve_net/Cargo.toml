[package]
name = "bevy_kbve_net"
version = "0.1.0"
edition = "2021"
description = "Shared lightyear protocol for KBVE multiplayer — replicated components, inputs, channels"

[features]
default = []
npcdb = ["bevy_npc/creature"]
client = ["lightyear/client", "lightyear/websocket", "lightyear/webtransport", "lightyear/udp", "dep:aeronet_webtransport", "dep:lightyear_aeronet"]

[dependencies]
bevy = { version = "0.18", default-features = false, features = ["bevy_state", "bevy_render"] }
lightyear = { version = "0.26", default-features = false, features = [
    "replication",
    "prediction",
    "interpolation",
    "input_native",
    "netcode",
] }
avian3d = { version = "0.5", default-features = false, features = ["3d", "f32", "parry-f32", "serialize"] }
serde = { version = "1", features = ["derive"] }
base64 = "0.22"
hex = "0.4"
bevy_npc = { path = "../bevy_npc", optional = true }
aeronet_webtransport = { version = "0.19", optional = true }
lightyear_aeronet = { version = "0.26", optional = true }
bytes = "1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["WebSocket", "BinaryType", "MessageEvent", "CloseEvent", "Event"] }
js-sys = "0.3"
