[package]
name = "bevy_kbve_player"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Bevy kinematic character controller plugin with gravity, jump, fall damage, and configurable movement."
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/bevy_kbve_player"

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "bevy_state",
    "bevy_asset",
    "bevy_render",
    "bevy_pbr",
] }
bevy_rapier3d = { version = "0.33" }
serde = { version = "1", features = ["derive"] }
