[package]
name = "bevy_skills"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "Skill progression system — pure Rust core with optional Bevy ECS integration"
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/bevy_skills"
keywords = ["bevy", "skills", "gamedev", "rpg", "plugin"]
categories = ["game-development", "game-engines"]
readme = "README.md"

[features]
# Default keeps existing consumers (rareicon bevy game) working out of
# the box. Disable with `default-features = false` from FFI / mobile
# crates that can't pull bevy_app + android-activity.
default = ["bevy"]

# Bevy ECS integration — adds Component / Resource / Message derives
# and the BevySkillsPlugin. Without this feature the crate is plain
# Rust with zero Bevy dependency, suitable for FFI cdylibs (uniti) and
# headless consumers (Discord bot sessions).
bevy = ["dep:bevy"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Bevy — only pulled in under the `bevy` feature.
bevy = { version = "0.18", default-features = false, features = [
    "bevy_state",
], optional = true }
