[package]
name = "bevy_skills"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "Skill progression system for Bevy games — tracks XP, levels, and gates interactions by skill requirements."
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/bevy_skills"
keywords = ["bevy", "skills", "gamedev", "rpg", "plugin"]
categories = ["game-development", "game-engines"]
readme = "README.md"

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "bevy_state",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
