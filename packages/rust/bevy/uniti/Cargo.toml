[package]
name = "uniti"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "C FFI bridge from KBVE game logic crates to Unity via csbindgen"
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/uniti"
keywords = ["ffi", "unity", "gamedev", "csbindgen"]
categories = ["game-development", "api-bindings"]
readme = "README.md"

[lib]
# cdylib + staticlib for Unity (desktop DllImport + iOS static link).
# rlib so integration tests under tests/ can link the crate directly.
crate-type = ["cdylib", "staticlib", "rlib"]

[build-dependencies]
csbindgen = "1.9"

[dependencies]
serde = { version = "1", features = ["derive"] }
# bundled = compile SQLite C source in — zero system-lib deps at runtime,
# works cross-platform inside the Unity cdylib without needing the host to
# ship libsqlite3.
rusqlite = { version = "0.31", features = ["bundled"] }
# Save-archive compression. Bundled pure-Rust backend keeps the cdylib
# cross-platform clean.
zstd = { version = "0.13", default-features = false }
# Pure data crates — default-features = false strips their optional bevy dep,
# keeping the compile mobile-friendly (no bevy_app / android-activity pull).
bevy_pathfinder = { version = "0.1", path = "../bevy_pathfinder", default-features = false }
bevy_inventory = { version = "0.1", path = "../bevy_inventory", default-features = false }
bevy_battle = { version = "0.1", path = "../bevy_battle", default-features = false }
bevy_skills = { version = "0.1", path = "../bevy_skills", default-features = false }

[dev-dependencies]
tempfile = "3"
criterion = { version = "0.5", default-features = false, features = ["plotters", "cargo_bench_support"] }
proptest = "1"

[[bench]]
name = "ffi_world_bench"
harness = false
