[package]
name = "bevy_cam"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Bevy isometric camera plugin with pixel snapping, multiplicative zoom, and two-stage render-to-texture pipeline for crisp pixel-art rendering."
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/bevy_cam"
keywords = ["bevy", "camera", "isometric", "pixel-art", "gamedev"]
categories = ["game-development", "rendering"]
readme = "README.md"

[features]
default = []
# Wire scroll-wheel zoom input + per-frame zoom interpolation. Off by
# default because most games using this plugin have a fixed isometric
# camera and don't want the wasted system dispatch.
zoom = []

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "bevy_asset",
    "bevy_render",
    "bevy_core_pipeline",
    "bevy_pbr",
] }
