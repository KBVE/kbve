[package]
name = "bevy_db"
authors = ["kbve", "h0lybyte"]
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "Cross-platform async key-value persistence for Bevy — redb on desktop, IndexedDB on WASM"
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/bevy/bevy_db"
keywords = ["bevy", "persistence", "wasm", "database", "gamedev"]
categories = ["game-development", "database"]
readme = "README.md"

[features]
default = ["bevy-plugin"]

# Bevy ECS plugin layer — `Db` resource, `DbRequest<T>` poller, `WriteBatch`
# builder. Without this feature the crate exposes only the platform-native
# async store directly (suitable for tokio-based services like
# discordsh-bot that don't run a Bevy `App`).
bevy-plugin = ["dep:bevy", "dep:bevy_tasker", "dep:crossbeam-channel"]

[dependencies]
serde = { version = "1", features = ["derive"] }
bincode = { version = "2", features = ["serde"] }

# Bevy plumbing — only when the `bevy-plugin` feature is on.
bevy = { version = "0.18", default-features = false, features = [
    "bevy_state",
], optional = true }
bevy_tasker = { version = "0.1", path = "../bevy_tasker", optional = true }
crossbeam-channel = { version = "0.5", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
redb = "4"
dirs = "6"

[target.'cfg(target_arch = "wasm32")'.dependencies]
rexie = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
once_cell = "1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu", "wasm32-unknown-unknown"]
rustdoc-args = ["--cfg", "docsrs"]
