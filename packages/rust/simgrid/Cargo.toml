[package]
name = "simgrid"
authors = ["kbve", "h0lybyte"]
version = "0.0.1"
edition = "2024"
rust-version.workspace = true
license = "MIT"
description = "Headless grid-authoritative multiplayer sim core for KBVE games — bevy ECS + axum WS + postcard wire + Supabase JWT. No godot, no rapier, no lightyear."
homepage = "https://kbve.com/"
repository = "https://github.com/KBVE/kbve/tree/main/packages/rust/simgrid"
keywords = ["bevy", "grid", "multiplayer", "gamedev", "axum"]
categories = ["game-development", "game-engines", "network-programming"]

[lib]
crate-type = ["rlib"]

[features]
default = ["supabase-auth"]
supabase-auth = ["dep:jsonwebtoken"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
postcard = { version = "1.0", default-features = false, features = ["use-std"] }
bevy = { version = "0.19", default-features = false, features = ["bevy_state"] }
bevy_spells = { path = "../bevy/bevy_spells" }
axum = { version = "0.8.9", default-features = false, features = ["ws"] }
tokio = { version = "1.49", features = ["rt-multi-thread", "macros", "sync", "time", "net"] }
futures-util = { version = "0.3", default-features = false, features = ["std"] }
dashmap = "6.1.0"
ulid = "1.2.1"
async-trait = "0.1.88"
jsonwebtoken = { version = "9.3", default-features = false, optional = true }
tracing = "0.1"
sha2 = "0.10"
hex = "0.4"
fastnoise-lite = "=1.1.1"
getrandom = "0.2"

[dev-dependencies]
# Integration tests spin the real axum WS router + sim loop and drive a client.
tokio = { version = "1.49", features = ["rt-multi-thread", "macros", "time", "net"] }
axum = { version = "0.8.9", features = ["ws", "tokio"] }
tokio-tungstenite = "0.24"
futures-util = "0.3"
serde_json = "1.0"
