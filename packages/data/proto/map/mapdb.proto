  TRADE_GOOD_LIVESTOCK     = 10;
  TRADE_GOOD_ARTIFACT      = 11;  // Quest-tier
  TRADE_GOOD_CONTRABAND    = 12;  // Smuggled / illegal
  TRADE_GOOD_SLAVE         = 13;  // Dark themes / opt-in
  TRADE_GOOD_RELIC         = 14;
  TRADE_GOOD_CURRENCY      = 15;  // Specie / bullion
