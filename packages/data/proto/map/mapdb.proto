  RELIGION_ALIGNMENT_UNSPECIFIED = 0;
  RELIGION_ALIGNMENT_LIGHT       = 1;
  RELIGION_ALIGNMENT_DARK        = 2;
  RELIGION_ALIGNMENT_NATURE      = 3;
  RELIGION_ALIGNMENT_ARCANE      = 4;
  RELIGION_ALIGNMENT_DEATH       = 5;
  RELIGION_ALIGNMENT_LIFE        = 6;
