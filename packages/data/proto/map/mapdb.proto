// =============================================================================
// Sub-messages — Spatial primitives
// =============================================================================

// 2D grid position (tile-based games)
message GridPos {
  int32 x = 1;
  int32 y = 2;
}

// 3D world position (continuous)
message WorldPos {
  float x = 1;
  float y = 2;  // Height / elevation
  float z = 3;
}

// Axis-aligned bounding box
message BoundsAABB {
  WorldPos min = 1;
  WorldPos max = 2;
}

// 2D bounding rectangle (for zones on a 2D map)
message Bounds2D {
  int32 min_x = 1;
  int32 min_y = 2;
  int32 max_x = 3;
  int32 max_y = 4;
}

// Color in linear sRGB (0.0–1.0)
message Color {
  float r = 1;
  float g = 2;
  float b = 3;
  optional float a = 4;  // Alpha (default 1.0)
}

// =============================================================================
// Sub-messages — Zone & Region
// =============================================================================

// Zone definition — a named region of the world
message Zone {
  string id = 1;                        // ULID
  string ref = 2;                       // URL-safe identifier, e.g. "crystal-caverns"
  string name = 3;
  optional string description = 4;
  optional string lore = 5;

  // Classification
  ZoneType type = 6;
  Biome biome = 7;
  repeated string tags = 8;

  // Spatial bounds
  optional Bounds2D bounds = 9;         // 2D region on world map
  optional BoundsAABB bounds_3d = 10;   // 3D bounding volume

  // Level range
  optional int32 level_min = 11;
  optional int32 level_max = 12;
  optional int32 recommended_party_size = 13;

  // Connections to other zones
  repeated ZoneConnection connections = 14;

  // Visual
  optional string img = 15;            // Map art / splash
  optional string icon = 16;           // Minimap icon
  optional string music_ref = 17;      // Background music track
  optional string ambient_ref = 18;    // Ambient sound loop

  // Behavior
  optional bool pvp_enabled = 19;
  optional bool safe_zone = 20;        // No combat allowed
  optional bool instanced = 21;        // Private per-party copy
  optional int32 max_players = 22;     // Player capacity

  // Terrain generation (for procedural zones)
  optional TerrainConfig terrain = 23;

  // Water
  optional WaterConfig water = 24;

  // Contents
  repeated PointOfInterest pois = 25;
  repeated SpawnPoint spawn_points = 26;
  repeated WorldObjectPlacement objects = 27;

  // Dungeon-specific (tile-based zones)
  optional DungeonConfig dungeon = 28;

  // Phasing / availability
  repeated string prerequisite_quest_refs = 29;
  optional string event_ref = 30;

  // Extensions
  repeated MapExtension extensions = 31;

  // World behavior policies
  optional GenerationMode generation = 39;
  optional PersistenceMode persistence = 34;
  optional StreamingHint streaming = 35;
  optional ReplicationHint replication = 36;

  // Environment / atmosphere
  optional EnvironmentConfig environment = 37;

  // Seed derivation
  optional SeedPolicy seed_policy = 38;

  // Empire / city / territory wiring
  optional string faction_ref = 40;            // Controlling faction
  repeated string settlement_refs = 41;        // Settlements anchored in this zone
  repeated string territory_claim_refs = 42;   // Active claims overlapping this zone
  repeated string landmark_refs = 43;          // Landmarks in this zone
  repeated string trade_route_refs = 44;       // Routes passing through

  // Cultural / religious flavour overrides
  optional string culture_ref = 45;
  optional string religion_ref = 46;

  // Climate authoring — overrides region climate when set
  optional ClimateConfig climate = 47;

  // Metadata
  optional string credits = 32;
  optional bool drafted = 33;
}

// Connection between two zones
message ZoneConnection {
  string target_zone_ref = 1;          // Zone slug or ULID
  optional string name = 2;            // e.g. "Northern Gate", "Cave Entrance"
  optional Direction direction = 3;
  optional WorldPos position = 4;      // Where the portal/entrance is
  optional int32 level_requirement = 5;
  optional string quest_requirement = 6;
  optional bool bidirectional = 7;     // Can travel both ways (default true)
}

// =============================================================================
// Sub-messages — Points of Interest
// =============================================================================

// A notable location within a zone
message PointOfInterest {
  string id = 1;                        // ULID
  string ref = 2;
  string name = 3;
  optional string description = 4;

  PoiType type = 5;
  optional WorldPos position = 6;
  optional GridPos grid_pos = 7;       // For tile-based maps
  optional float radius = 8;           // Interaction / discovery radius

  // Visual
  optional string icon = 9;
  optional string marker_icon = 10;    // Map marker

  // Linkage
  repeated string npc_refs = 11;       // NPCs stationed here
  repeated string quest_refs = 12;     // Quests available here
  optional string shop_ref = 13;       // Shop inventory
  optional string zone_ref = 14;       // Enters a sub-zone (dungeon, building)

  // Behavior
  optional bool discoverable = 15;     // Must be found before showing on map
  optional bool fast_travel = 16;      // Can teleport here once discovered
  optional bool respawn_point = 17;    // Player respawns here on death

  // Extensions
  repeated MapExtension extensions = 18;
}

// =============================================================================
// Sub-messages — Dungeon / Tile System
// =============================================================================

// Configuration for tile-based dungeons
message DungeonConfig {
  optional int64 seed = 1;             // Procedural generation seed
  optional int32 max_depth = 2;        // Maximum Manhattan distance from origin
  repeated int32 boss_ring_distances = 3; // Manhattan distances for boss spawns (e.g. 7, 14, 21)
  optional int32 bosses_per_ring = 4;  // Boss count per ring (default 1)
  repeated TileDef tile_templates = 5; // Pre-defined tile templates
  repeated RoomSpawnWeight room_weights = 6; // Room type distribution
}

// Room type spawn weight — probability of room type appearing
message RoomSpawnWeight {
  RoomType room_type = 1;
  float weight = 2;                    // Relative weight in spawn pool
  optional int32 min_depth = 3;        // Only at this depth or deeper
  optional int32 max_depth = 4;
}

// A single tile definition in a tile-based map
message TileDef {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  RoomType room_type = 4;
  repeated Direction exits = 5;        // Available exits from this tile

  // Modifiers & hazards
  repeated RoomModifier modifiers = 6;
  repeated TileHazard hazards = 7;

  // Content
  repeated string enemy_refs = 8;      // NPC refs for combat rooms
  repeated string loot_refs = 9;       // Item refs for treasure rooms
  optional string merchant_ref = 10;   // NPC ref for merchant rooms
  optional string story_event_ref = 11; // Quest/event ref for story rooms

  // Visual
  optional string template_name = 12;  // Room template slug (e.g. "shattered_gallery")
  optional string img = 13;
  optional string music_override = 14;
}

// Environmental hazard on a tile
message TileHazard {
  string type = 1;                     // e.g. "spikes", "gas", "fire"
  optional int32 damage = 2;          // Damage on trigger
  optional string effect_kind = 3;    // Status effect slug
  optional int32 effect_stacks = 4;
  optional int32 effect_turns = 5;
  optional float trigger_chance = 6;  // 0.0–1.0 (default 1.0)
}

// =============================================================================
// Sub-messages — Terrain & Procedural Generation
// =============================================================================

// Terrain generation configuration
message TerrainConfig {
  // Noise parameters
  optional int64 seed = 1;
  optional float noise_scale = 2;      // Frequency of terrain variation
  optional int32 octaves = 3;          // Noise complexity layers (default 2)
  optional float max_height = 4;       // Maximum terrain height in world units
  optional float persistence = 5;     // Amplitude decay per octave (0.0–1.0)
  optional float lacunarity = 6;      // Frequency growth per octave (default 2.0)

  // Chunk system
  optional int32 chunk_size = 7;       // Tiles per chunk side (default 16)
  optional int32 load_radius = 8;      // Chunks loaded around player (default 3)
  optional float tile_size = 9;        // World units per tile (default 1.0)

  // Height-based terrain bands
  repeated TerrainBandDef bands = 10;
}

// A height-based terrain band with visual properties
message TerrainBandDef {
  TerrainBand type = 1;
  float min_height = 2;               // Band starts at this height
  float max_height = 3;               // Band ends at this height
  repeated Color colors = 4;          // Shade variants for this band
  optional float body_darkness = 5;   // Cliff/side darkness factor (default 0.72)
}

// Water configuration
message WaterConfig {
  optional float water_level = 1;      // World height of water surface
  optional Color base_color = 2;       // Shallow water color
  optional Color deep_color = 3;       // Deep water color
  optional float ripple_speed = 4;
  optional float ripple_scale = 5;
  optional float highlight_strength = 6;
  optional float foam_intensity = 7;
  optional bool swimmable = 8;         // Can players swim (default true)
  optional int32 drown_damage = 9;     // Damage per tick if not swimmable
}

// =============================================================================
// Sub-messages — Capability specs (universal gameplay primitives)
// =============================================================================

// An item cost line — item_ref cross-links to the itemdb's canonical ref.
message IngredientSpec {
  string item_ref = 1;   // itemdb ref slug (e.g. "timber", "stone-block")
  int32 amount = 2;
}

// A service a structure provides to nearby units.
message ServiceCapability {
  ServiceKind kind = 1;
  int32 priority = 2;    // Tie-breaker — higher priority providers win
  int32 capacity = 3;    // Bed count (SLEEP), slot count (TRAINING), etc.
}

// A tender requirement — the structure needs a qualified worker within
// footprint_radius hexes (or sheltered inside) to function.
message TenderSpec {
  string profession_ref = 1;   // Skill / profession slug (e.g. "farmer", "lumberjack")
  int32 footprint_radius = 2;  // Grid distance from root; 0 = root cell only
  bool required = 3;           // If true, production halts without a tender
}

// A structure that radiates territorial / faction control around itself.
message TerritoryEmitterSpec {
  int32 radius = 1;   // Grid distance from root cell
}

// One recipe on a production structure — inputs consumed, outputs produced
// on a cycle. pulls_from_treasury=true draws inputs from the faction
// treasury instead of the structure's local ledger.
message ProductionRecipeSpec {
  repeated IngredientSpec inputs = 1;
  repeated IngredientSpec outputs = 2;
  float cycle_secs = 3;
  bool pulls_from_treasury = 4;
}

// Automatic surplus export — anything above `floor` ships to the treasury.
message SurplusExportSpec {
  string item_ref = 1;
  int32 floor = 2;
}

// Timed no-input production (e.g. passive fishing).
message PassiveProductionSpec {
  string output_item_ref = 1;
  int32 output_amount = 2;
  float cycle_secs = 3;
  string destination = 4;   // "local" or "treasury"
}

// Cooldown-gated ranged attack — universal tower/turret/outpost behaviour.
message RangedAttackSpec {
  float cooldown_secs = 1;
  float range = 2;
  int32 shots_per_volley = 3;
  int32 ammo_per_volley_cost = 4;
  float damage_per_shot = 5;
  float spread_half_angle_rad = 6;
  float projectile_speed = 7;
  float projectile_lifetime = 8;
  string projectile_ref = 9;   // itemdb / projectile slug
  int32 ammo_capacity = 10;    // Local ammo pool size; restocked from stockpile
}

// Cadence-based unit spawner — Goblin Cave, Barracks, dungeon spawner,
// MUD mob den. Consumes cost_per_spawn from a local buffer of size storage_cap.
message PopulationSpawnSpec {
  string spawn_entity_ref = 1;
  int32 cadence_turns = 2;
  optional IngredientSpec cost_per_spawn = 3;
  int32 storage_cap = 4;
}

// Periodic hostile raid emitter — Bandit Camp, dungeon boss timer.
message RaidSpec {
  int32 cadence_turns = 1;
  int32 party_size = 2;
  string party_unit_ref = 3;
  string target_kind = 4;   // "faction_capital" | "nearest_settlement" | "random_wild"
}

// Single step in an upgrade tier progression (Market → Trade House → Guild).
message UpgradeSpec {
  string next_def_ref = 1;   // ref of the upgraded WorldObjectDef
  repeated IngredientSpec costs = 2;
}

// Full tier progression chain for a building.
message UpgradeChainSpec {
  repeated UpgradeSpec tiers = 1;
}

// Turn-cadenced shrine grant. Anchored to WorldClock.TurnIndex so the
// shrine acts like passive production rather than a wall-clock cooldown.
// Bonus fires when (`territory_active` AND shrine is inside player
// territory) OR (`king_visit_active` AND the King's root hex == shrine
// hex), gated by `cadence_turns` between grants.
message ShrineSpec {
  int32 cadence_turns      = 1;          // turns between grants (3–4 typical)
  int32 reward_coin        = 2;
  repeated IngredientSpec reward_items = 3;
  bool  territory_active   = 4;          // grants while inside player territory
  bool  king_visit_active  = 5;          // grants while King is on shrine hex
  optional string xp_skill_ref     = 6;
  optional int32  xp_amount        = 7;
  optional string buff_ref         = 8;
  optional float  buff_duration_secs = 9;
}

// Shop offer — one tradable item line.
message ShopOffer {
  string item_ref = 1;                  // itemdb ref
  int32 buy_price = 2;                  // coin cost to buy from the shop
  optional int32 sell_price = 3;        // coin paid if player sells the item TO the shop
  optional int32 stock = 4;             // -1 = infinite, 0+ = finite
  optional int32 restock_seconds = 5;   // 0 = no restock
}

// A merchant landmark / building's stock list.
message ShopSpec {
  repeated ShopOffer inventory = 1;
}

// Dungeon entry — clicking the landmark transitions to the named scene.
message DungeonSpec {
  string scene_ref = 1;                 // scene slug to load
  optional int32 min_player_level = 2;
  optional int32 party_size_max = 3;
  optional string difficulty = 4;       // "normal" | "hard" | "legendary"
  optional string entry_quest_ref = 5;  // gates entry to a quest progression
}

// Quest-giver landmark — offers one or more quest scrolls on click.
message QuestGiverSpec {
  repeated string quest_refs = 1;
  optional string greeting_dialogue_ref = 2;
}

// Passive radius effect emitted by a living landmark / building.
// Bonus kind keys are gameplay slugs ("production", "movement_speed",
// "hp_regen", "mana_regen") so new aura types add without touching
// proto. multiplier is applied to the named stat for entities inside
// the radius.
message AuraSpec {
  int32 radius = 1;
  string bonus_kind = 2;
  float multiplier = 3;
}

// =============================================================================
// Sub-messages — World Objects
// =============================================================================

// A world object definition (archetype / template)
message WorldObjectDef {
  string id = 1;                        // ULID
  string ref = 2;
  string name = 3;
  optional string description = 4;

  WorldObjectType type = 5;
  optional string sub_kind = 6;        // Free-form variant (e.g. "coal", "oak", "ruby")

  // Typed subtypes — use the one matching the archetype in `type`
  optional ResourceType resource_type = 37;
  optional ContainerType container_type = 38;
  optional CraftingStationType crafting_station_type = 39;

  // Visual
  optional string model_ref = 7;
  optional string icon = 8;
  optional float scale = 9;           // Visual size multiplier
  repeated Color palette = 10;        // Color palette for procedural visuals
  optional string img = 25;           // Image / sprite path

  // Interaction
  optional bool interactable = 11;    // Can player click/interact
  optional bool destructible = 12;    // Can be destroyed / harvested
  optional string loot_item_ref = 13; // Item dropped when harvested
  optional int32 harvest_time_ms = 14; // Time to harvest in milliseconds
  optional string tool_required = 15; // Tool item ref needed
  optional int32 skill_level = 16;    // Minimum skill level to interact
  optional string skill_type = 17;    // Skill slug (e.g. "mining", "woodcutting")

  // Resource properties (for harvestable objects)
  optional int32 harvest_yield = 26;   // Amount gathered per harvest action
  optional int32 max_amount = 27;      // Maximum resource capacity
  optional int32 initial_amount = 28;  // Starting amount (defaults to max_amount)

  // Structure properties (for buildable / placed structures)
  optional int32 max_health = 29;              // Hit points
  optional int32 footprint_width = 30;         // Grid cells wide
  optional int32 footprint_height = 31;        // Grid cells tall
  optional bool blocks_placement = 32;         // Prevents placing other objects here
  optional float construction_time_secs = 33;  // Time to build in seconds
  repeated BuildCost build_costs = 34;         // Resources needed to construct

  // Spawn hints (archetype-level defaults)
  optional float spawn_weight = 35;    // Relative spawn probability (0.0–1.0)
  optional int32 spawn_count = 36;     // Target count per zone

  // Physics
  optional float collision_radius = 18;
  optional float collision_height = 19;
  optional bool blocks_movement = 20;
  optional bool occludes_player = 21; // Semi-transparent when between camera and player

  // Respawn
  optional int32 respawn_time_secs = 22;
  optional int32 respawn_variance = 23;

  // Extensions
  repeated MapExtension extensions = 24;

  // Metadata
  optional string credits = 40;
  optional bool drafted = 41;

  // Placement constraints ────────────────────────────────────────────────
  // Biome whitelist — entry values are Biome enum numeric values. Empty =
  // any biome (but BIOME_OCEAN is conventionally rejected by placement).
  repeated int32 allowed_biomes = 42;
  optional bool spawns_fully_built = 43;       // Skip construction phase
  optional bool requires_in_territory = 44;    // Placement restricted to faction territory
  optional FootprintShape footprint_shape = 45;
  repeated GridPos footprint_cells = 46;       // Used when footprint_shape = EXPLICIT
  optional CostSource cost_source = 47;

  // Universal capabilities ───────────────────────────────────────────────
  repeated ServiceCapability services = 48;
  optional TenderSpec tender = 49;
  optional TerritoryEmitterSpec territory = 50;
  repeated ProductionRecipeSpec recipes = 51;
  repeated SurplusExportSpec surplus = 52;
  optional PassiveProductionSpec passive_production = 53;

  // Gameplay behaviours (universal) ──────────────────────────────────────
  optional RangedAttackSpec ranged_attack = 54;
  optional PopulationSpawnSpec population_spawn = 55;
  optional RaidSpec raid = 56;
  optional UpgradeChainSpec upgrade_chain = 57;

  // Click interaction (landmark / shrine / shop / dungeon / quest-giver) ─
  // `interaction` is the discriminator; populate the matching spec block
  // (`shrine` for SHRINE, `shop` for SHOP, etc.). `interaction_cooldown_secs`
  // gates reuse on a per-instance basis. `aura` is independent of
  // interaction and runs as long as the landmark is alive. `faction`
  // identifies the landmark's allegiance ("neutral" | "hostile" |
  // "player" | named faction slug) — drives combat/aggression rules.
  optional InteractionKind interaction = 58;
  optional ShrineSpec shrine = 60;
  optional ShopSpec shop = 61;
  optional DungeonSpec dungeon = 62;
  optional QuestGiverSpec quest_giver = 63;
  optional AuraSpec aura = 64;
  optional string faction = 65;

  // Empire / city / culture wiring (added with the Faction/Settlement layer).
  // `faction` (above) stays as a slug for legacy use; `faction_ref` is the
  // canonical pointer to a Faction record. `settlement_ref` tags a structure
  // as belonging to a Settlement's roster (used by district / siege logic).
  optional string faction_ref = 66;
  optional string settlement_ref = 67;
  optional string district_ref = 68;
  optional string culture_ref = 69;
  optional string religion_ref = 70;
  optional string dialogue_tree_ref = 71;     // Upgrade for QuestGiverSpec / NPC dialog
  optional float interaction_cooldown_secs = 72;
}

// Resource cost for constructing a structure
message BuildCost {
  string resource_type = 1;            // e.g. "wood", "stone", "metal"
  int32 amount = 2;
}

// A placed instance of a world object in a zone
message WorldObjectPlacement {
  string object_def_ref = 1;           // Reference to WorldObjectDef
  optional WorldPos position = 2;
  optional GridPos grid_pos = 3;       // For tile-based placement
  optional float rotation_y = 4;       // Y-axis rotation in degrees
  optional float scale_override = 5;   // Override object def scale
  optional int64 seed = 6;            // Per-instance randomization seed
}

// =============================================================================
// Sub-messages — Spawn Points
// =============================================================================

// Where entities appear in the world
message SpawnPoint {
  string id = 1;
  SpawnCategory category = 2;
  optional string entity_ref = 3;      // NPC, item, or object def ref
  optional WorldPos position = 4;
  optional GridPos grid_pos = 5;
  optional float radius = 6;          // Random offset from position

  // Spawn rules
  optional float spawn_weight = 7;    // Relative probability
  optional int32 max_active = 8;      // Max concurrent instances
  optional int32 level_min = 9;
  optional int32 level_max = 10;
  optional int32 respawn_time_secs = 11;
  optional int32 respawn_variance = 12;

  // Conditions
  optional string time_of_day = 13;   // "day", "night", "dawn", "dusk"
  optional string weather = 14;       // "clear", "rain", "storm", "snow"
  optional string event_ref = 15;     // Only during this event
  optional string quest_ref = 16;     // Only during/after this quest
  repeated string required_flags = 17; // World-state flags

  // Group spawning
  optional int32 group_min = 18;      // Min entities per spawn
  optional int32 group_max = 19;      // Max entities per spawn
  optional float group_radius = 20;   // Spread radius for groups

  // Typed condition gates — preferred over the stringly-typed
  // `time_of_day` / `weather` fields above. Generators should set the
  // typed enums; the string fields stay for backward-compat reads.
  optional TimeOfDay time_of_day_kind = 21;
  optional WeatherKind weather_kind = 22;
  optional Season season = 23;

  // Faction / territory gating
  optional string faction_ref = 24;          // Only spawn while this faction owns the area
  optional string territory_claim_ref = 25;  // Only spawn inside this claim
  optional string settlement_ref = 26;       // Pinned to a specific settlement
}

// =============================================================================
// Sub-messages — Region (groups zones into continents/worlds)
// =============================================================================

// A region / continent / world that contains multiple zones
message Region {
  string id = 1;                        // ULID
  string ref = 2;
  string name = 3;
  optional string description = 4;
  optional string lore = 5;

  repeated string zone_refs = 6;       // Zones in this region
  optional string img = 7;             // World map image
  optional string icon = 8;

  // World-level settings
  optional float gravity = 9;          // World gravity (default 20.0)
  optional float day_cycle_secs = 10;  // Length of day/night cycle in seconds

  // Extensions
  repeated MapExtension extensions = 11;

  // Empire / city / culture wiring
  repeated string faction_refs = 12;          // Factions whose territory touches this region
  repeated string settlement_refs = 13;       // Settlements anchored in this region
  repeated string territory_claim_refs = 14;
  repeated string trade_route_refs = 15;
  repeated string landmark_refs = 16;
  repeated string culture_refs = 17;
  repeated string religion_refs = 18;
  optional ClimateConfig climate = 19;        // Default climate for child zones
  optional string dominant_culture_ref = 20;
  optional string dominant_religion_ref = 21;
}

// =============================================================================
// Hex Grid — Axial coordinate system for hex-based world topology
// =============================================================================

// Axial hex coordinate (cube coordinate S is implicit: s = -q - r)
message HexCoord {
  int32 q = 1;
  int32 r = 2;
}

// How a zone's content is generated / authored
enum GenerationMode {
  GENERATION_UNSPECIFIED             = 0;
  GENERATION_STATIC_AUTHORED         = 1;  // Hand-built, no procedural generation
  GENERATION_FINITE_PROCEDURAL       = 2;  // Generated once from seed, bounded area
  GENERATION_INFINITE_PROCEDURAL     = 3;  // Gateway to unbounded chunk-managed generation
  GENERATION_INSTANCED               = 4;  // Private copy per party (dungeons, raids)
  GENERATION_TRANSIT                 = 5;  // Transition zone (loading, portals)
}

// How a hex zone persists its state across sessions
enum PersistenceMode {
  PERSISTENCE_UNSPECIFIED            = 0;
  PERSISTENCE_CANONICAL              = 1;  // Saved as-is (authored content)
  PERSISTENCE_DETERMINISTIC_REGEN    = 2;  // Regenerated from seed; only deltas saved
  PERSISTENCE_DELTA                  = 3;  // Generated base + saved mutations
  PERSISTENCE_SESSION_ONLY           = 4;  // Lost on session end
}

// Hint for how a zone should be streamed / loaded
enum StreamingHint {
  STREAMING_UNSPECIFIED              = 0;
  STREAMING_PARTITIONED              = 1;  // Engine-managed spatial partition (e.g. World Partition)
  STREAMING_CHUNK_RING               = 2;  // Active ring of chunks around players
  STREAMING_DESCRIPTOR_ACTIVATED     = 3;  // Loaded on demand from descriptors
  STREAMING_INSTANCE_LOADED          = 4;  // Fully loaded as a private instance
}

// Hint for how zone actors should be replicated to clients
enum ReplicationHint {
  REPLICATION_UNSPECIFIED            = 0;
  REPLICATION_STATIC_ONLY            = 1;  // No dynamic replication; visuals only
  REPLICATION_LOCAL_DYNAMIC          = 2;  // Replicate nearby dynamic actors
  REPLICATION_CHUNK_SCOPED           = 3;  // Replicate within active chunk radius
  REPLICATION_FULL_INSTANCE          = 4;  // Replicate everything (instanced zones)
}

// Deterministic seed derivation policy for a zone
message SeedPolicy {
  int64 world_seed = 1;                    // Root world seed
  int32 content_version = 2;               // Content version for stable regeneration
  // Derived seeds: region = hash(world_seed, hex_q, hex_r, content_version)
  //                cell   = hash(region_seed, cell_x, cell_y, content_version)
}

// Travel link between two hex zones
message HexTravelLink {
  HexCoord from = 1;
  HexCoord to = 2;

  enum TravelType {
    TRAVEL_UNSPECIFIED = 0;
    TRAVEL_OPEN    = 1;                    // Freely traversable
    TRAVEL_GATED   = 2;                    // Requires key, quest, or level
    TRAVEL_ONE_WAY = 3;                    // From → To only
    TRAVEL_BLOCKED = 4;                    // Currently impassable
  }
  TravelType travel_type = 3;

  optional int32 level_requirement = 4;
  optional string quest_requirement = 5;
  optional string tag = 6;                 // Named route (e.g. "Northern Pass")
}

// Environment configuration — visual atmosphere for a zone
message EnvironmentConfig {
  // Sun / directional light
  optional float sun_pitch = 1;            // Elevation angle in degrees (-90 to 90)
  optional float sun_yaw = 2;             // Azimuth angle in degrees (0 to 360)
  optional float sun_intensity = 3;
  optional Color sun_color = 4;

  // Sky
  optional float sky_intensity = 5;
  optional float atmosphere_rayleigh_scale = 6;
  optional float atmosphere_mie_scale = 7;

  // Fog
  optional float fog_density = 8;
  optional float fog_height_falloff = 9;
  optional Color fog_color = 10;
  optional float fog_start_distance = 11;

  // Ambient
  optional string ambient_sound_ref = 12;
  optional string music_ref = 13;
}

// A hex zone record — one tile in the master hex world map
message HexZoneRecord {
  HexCoord coord = 1;
  string zone_ref = 2;                     // Links to Zone.ref for full zone data

  // Generation
  GenerationMode generation = 9;

  // Behavior policies
  PersistenceMode persistence = 3;
  StreamingHint streaming = 4;
  ReplicationHint replication = 5;

  // Generation
  optional SeedPolicy seed_policy = 6;

  // Environment override (if different from zone default)
  optional EnvironmentConfig environment = 7;

  // Travel links originating from this hex
  repeated HexTravelLink travel_links = 8;
}

// The master hex world map — top-level world topology
message HexWorldMap {
  string id = 1;
  string name = 2;
  optional string description = 3;
  SeedPolicy seed_policy = 4;             // Default seed policy for the world
  double hex_size = 5;                     // Hex size in world units (center to vertex)
  repeated HexZoneRecord hexes = 6;
}

// =============================================================================
// Sub-messages — Identity & Banners (faction + settlement visual identity)
// =============================================================================

// Visual identity block — banner / sigil / motto. Reused by Faction,
// Settlement, GuildHall, and any nameable owning entity.
message Banner {
  optional Color primary = 1;
  optional Color secondary = 2;
  optional Color tertiary = 3;
  optional string sigil_ref = 4;        // icon / sprite slug
  optional string motto = 5;
  optional string anthem_ref = 6;       // music ref
  optional string crest_pattern = 7;    // pattern slug ("checker", "rampant_lion")
}

// Generic resource ledger — used as treasury, granary, armoury,
// reserve. Maps free-form item slugs (itemdb refs) to integer
// quantities; per-item caps are optional.
message ResourceLedger {
  map<string, int64> resources = 1;             // item_ref → amount
  map<string, int64> capacity_per_item = 2;     // optional ceiling per item
  optional int64 total_capacity = 3;            // optional aggregate ceiling
  optional bool unlimited = 4;                  // sandbox / cheats / godmode
}

// Cultural identity — drives names, music, dialect, faction palettes.
message Culture {
  string id = 1;                                 // ULID
  string ref = 2;
  string name = 3;
  CultureArchetype archetype = 4;
  optional string description = 5;
  optional string lore = 6;
  optional string language_ref = 7;             // links to a language pack
  repeated string name_pool_refs = 8;            // NPC / settlement name pools
  optional Banner banner = 9;
  repeated MapExtension extensions = 10;
}

// Religion / pantheon — shrines, altars, holy units link via religion_ref.
message Religion {
  string id = 1;
  string ref = 2;
  string name = 3;
  ReligionAlignment alignment = 4;
  optional string description = 5;
  optional string lore = 6;
  repeated string deity_refs = 7;                // pantheon members
  repeated string holy_site_refs = 8;            // landmark / shrine refs
  repeated string forbidden_action_refs = 9;     // taboos (slug list)
  repeated string blessed_skill_refs = 10;       // skills with bonus
  optional Banner banner = 11;
  repeated MapExtension extensions = 12;
}

// =============================================================================
// Sub-messages — Faction & Diplomacy
// =============================================================================

// Single diplomatic relation between two factions.
message DiplomaticRelation {
  string from_faction_ref = 1;
  string to_faction_ref = 2;
  DiplomaticStance stance = 3;
  int32 reputation = 4;                          // -100..100
  optional string treaty_ref = 5;                // links to Treaty.ref
  optional int64 expires_at_turn = 6;            // 0 = permanent
  optional int64 established_at_turn = 7;
}

// Formal agreement between factions — gates wars, trade, marriages.
message Treaty {
  string id = 1;
  string ref = 2;
  string name = 3;
  repeated string signatory_faction_refs = 4;
  optional string description = 5;
  optional int64 signed_at_turn = 6;
  optional int64 expires_at_turn = 7;
  repeated string clause_refs = 8;               // game-defined clause types
  repeated MapExtension extensions = 9;
}

// Faction / empire / clan / guild — top-level political entity.
message Faction {
  string id = 1;                                 // ULID
  string ref = 2;
  string name = 3;
  optional string short_name = 4;                // For tags / mentions
  optional string description = 5;
  optional string lore = 6;

  // Identity
  GovernmentType government = 7;
  optional Banner banner = 8;
  optional string culture_ref = 9;
  optional string religion_ref = 10;
  optional CultureArchetype archetype = 11;      // Quick lookup w/o culture_ref

  // Leadership
  optional string ruler_unit_ref = 12;           // NPC / player unit ref
  optional string heir_unit_ref = 13;
  repeated string council_unit_refs = 14;        // Advisors / nobles
  optional string capital_settlement_ref = 15;

  // Membership
  repeated string member_settlement_refs = 16;
  repeated string member_zone_refs = 17;
  repeated string member_unit_refs = 18;          // Standing army roster
  repeated string vassal_faction_refs = 19;
  optional string overlord_faction_ref = 20;

  // Economy
  optional ResourceLedger treasury = 21;
  repeated string trade_route_refs = 22;
  optional float taxation_rate = 23;             // 0.0–1.0
  optional float tribute_rate = 24;              // Owed to overlord

  // Diplomacy
  repeated DiplomaticRelation relations = 25;
  repeated string allied_faction_refs = 26;       // Denormalized for fast reads
  repeated string hostile_faction_refs = 27;
  repeated string treaty_refs = 28;

  // Power / metrics
  optional int32 prestige = 29;
  optional int32 stability = 30;                 // -100..100, civil unrest gauge
  optional int32 tech_level = 31;
  optional int32 manpower = 32;                  // Recruitable population pool
  optional float aggression = 33;                // 0.0–1.0 AI temperament
  repeated string trait_refs = 34;               // "seafaring", "magical", etc.

  // Cosmetic / metadata
  optional string color_hex = 35;                // Quick map color (e.g. "#A22")
  optional bool destroyed = 36;
  optional int64 founded_at_turn = 37;
  optional int64 destroyed_at_turn = 38;
  optional string credits = 39;
  optional bool drafted = 40;

  repeated MapExtension extensions = 41;
}

// =============================================================================
// Sub-messages — Settlement & City
// =============================================================================

// Sub-region of a Settlement — districts let cities split into
// residential / commercial / military quarters with their own
// stats and building rosters.
message District {
  string id = 1;
  string ref = 2;
  string name = 3;
  DistrictType type = 4;
  optional string description = 5;

  optional Bounds2D bounds = 6;
  repeated GridPos grid_cells = 7;               // For tile-grid cities
  repeated HexCoord hexes = 8;                   // For hex-grid cities

  optional int32 population = 9;
  optional int32 population_cap = 10;
  optional float wealth_index = 11;              // 0.0–1.0
  optional float crime_rate = 12;                // 0.0–1.0
  optional float happiness = 13;                 // 0.0–1.0
  optional float pollution = 14;

  repeated string building_refs = 15;            // WorldObjectPlacement / building IDs
  repeated string npc_refs = 16;
  repeated string service_kinds = 17;            // Denormalized list of ServiceKind names

  optional string district_quest_ref = 18;       // District-tied storyline
  optional bool walled = 19;
  optional bool destroyed = 20;
  repeated MapExtension extensions = 21;
}

// Settlement / city / town / village — owns a footprint inside one
// or more zones, optionally split into districts. Ownership chains up
// to a Faction; supplied by TradeRoutes; defended by structures whose
// services list TerritoryEmitterSpec.
message Settlement {
  string id = 1;                                 // ULID
  string ref = 2;
  string name = 3;
  optional string description = 4;
  optional string lore = 5;

  // Class
  SettlementTier tier = 6;
  optional string faction_ref = 7;
  optional string culture_ref = 8;
  optional string religion_ref = 9;

  // Leadership
  optional string mayor_unit_ref = 10;
  repeated string council_unit_refs = 11;

  // Geography
  optional string region_ref = 12;
  optional string zone_ref = 13;                 // Primary zone the settlement sits in
  repeated string aux_zone_refs = 14;            // Secondary / sub-zones
  optional WorldPos position = 15;
  optional GridPos grid_pos = 16;
  optional HexCoord hex = 17;
  optional Bounds2D footprint_bounds = 18;
  repeated HexCoord footprint_hexes = 19;

  // Demographics
  optional int32 population = 20;
  optional int32 population_cap = 21;
  optional float growth_rate = 22;               // Per-turn or per-tick
  optional int32 garrison_size = 23;             // Defending militia
  optional int32 manpower_pool = 24;             // Recruitable

  // Economy
  optional ResourceLedger treasury = 25;
  optional ResourceLedger granary = 26;          // Food / supplies separate
  optional float tax_rate = 27;
  optional float tariff_rate = 28;               // For inbound trade
  repeated string trade_route_refs = 29;
  repeated string export_item_refs = 30;          // Denormalized: what this settlement produces
  repeated string import_item_refs = 31;          // Denormalized: what it needs

  // Districts & contents
  repeated District districts = 32;              // Inline sub-regions
  repeated string building_refs = 33;            // Building placement refs at settlement scope
  repeated string landmark_refs = 34;            // Featured landmarks within the settlement
  repeated string poi_refs = 35;                 // Featured POIs

  // Services denormalized for quick capability queries.
  repeated string service_kinds = 36;            // ServiceKind enum names

  // Defenses & status
  optional bool capital = 37;
  optional bool walled = 38;
  optional int32 wall_health = 39;
  optional bool besieged = 40;
  optional string besieging_faction_ref = 41;
  optional bool destroyed = 42;
  optional bool occupied = 43;
  optional string occupier_faction_ref = 44;

  // Phasing / unlock
  optional bool discoverable = 45;
  optional string discovery_quest_ref = 46;
  repeated string prerequisite_quest_refs = 47;

  // Visual / map
  optional Banner banner = 48;
  optional string icon = 49;
  optional string marker_icon = 50;
  optional string img = 51;

  // Lifecycle
  optional int64 founded_at_turn = 52;
  optional int64 destroyed_at_turn = 53;

  // Metadata
  optional string credits = 54;
  optional bool drafted = 55;
  repeated MapExtension extensions = 56;
}

// =============================================================================
// Sub-messages — Territory & Borders
// =============================================================================

// Faction territorial claim — explicit hex / rect / zone ownership
// with strength + contestation. Empire AI reads claims to drive
// expansion goals; rendering uses claims to draw map borders.
message TerritoryClaim {
  string id = 1;
  string ref = 2;
  string faction_ref = 3;
  TerritoryClaimKind kind = 4;

  // Claimed area — pick the form matching the world topology
  repeated HexCoord hexes = 5;
  optional Bounds2D bounds = 6;
  repeated string zone_refs = 7;                 // Whole-zone claims
  repeated string settlement_refs = 8;           // Anchored to specific cities

  optional int32 strength = 9;                   // 0..100 — defensive weight
  optional int32 garrison_size = 10;
  optional string contested_by_faction_ref = 11;
  optional int32 contest_progress = 12;          // 0..100 toward flip

  optional int64 claimed_at_turn = 13;
  optional int64 expires_at_turn = 14;           // 0 = permanent
  optional bool sacred = 15;                     // Religion-linked, non-military
  optional string casus_belli_ref = 16;          // Why it's claimed (lore / war goal)

  repeated MapExtension extensions = 17;
}

// =============================================================================
// Sub-messages — Trade & Economy
// =============================================================================

// One stop along a trade route — caravan halts here for `dwell_secs`
// before moving to the next stop.
message TradeRouteStop {
  optional string settlement_ref = 1;
  optional HexCoord hex = 2;
  optional WorldPos position = 3;
  optional float dwell_secs = 4;
  optional bool refuel = 5;                      // Restocks caravan supplies
  optional bool toll = 6;                        // Pays tariff to local faction
}

// One cargo line carried along a trade route.
message TradeCargo {
  string item_ref = 1;
  int32 amount_per_caravan = 2;
  TradeGoodCategory category = 3;
  optional int32 buy_price_at_origin = 4;
  optional int32 sell_price_at_destination = 5;
  optional bool perishable = 6;
  optional bool restricted = 7;                  // Faction-locked / contraband
}

// Recurring caravan / shipping line between settlements.
message TradeRoute {
  string id = 1;
  string ref = 2;
  string name = 3;
  optional string description = 4;

  string from_settlement_ref = 5;
  string to_settlement_ref = 6;
  repeated TradeRouteStop stops = 7;             // Optional waypoints

  RouteKind route_kind = 8;
  repeated TradeCargo cargo = 9;
  optional float cadence_secs = 10;              // How often a caravan launches
  optional float distance = 11;                  // World units / hex count
  optional int32 caravan_size = 12;              // Number of carriers
  optional int32 caravan_health = 13;
  optional float danger_level = 14;              // 0.0–1.0 — bandit / pirate density
  repeated string protection_unit_refs = 15;     // Escort unit refs

  optional string operator_faction_ref = 16;
  optional float profit_per_run = 17;            // Estimated, for AI evaluation
  optional bool active = 18;
  optional int64 established_at_turn = 19;
  optional int64 last_run_at_turn = 20;

  repeated MapExtension extensions = 21;
}

// =============================================================================
// Sub-messages — Landmarks (formalized)
// =============================================================================

// Landmark — a positioned, named, optionally interactive point of
// interest. Bridges PoiType.POI_LANDMARK + WorldObjectType.LANDMARK
// into a single addressable record. Click behavior is delegated to a
// referenced WorldObjectDef (via interaction_world_object_ref).
message Landmark {
  string id = 1;
  string ref = 2;
  string name = 3;
  optional string description = 4;
  optional string lore = 5;

  LandmarkSignificance significance = 6;
  optional string zone_ref = 7;
  optional string region_ref = 8;
  optional string settlement_ref = 9;            // If inside a settlement
  optional string faction_ref = 10;              // Owning faction (if any)
  optional string culture_ref = 11;
  optional string religion_ref = 12;

  // Position
  optional WorldPos position = 13;
  optional GridPos grid_pos = 14;
  optional HexCoord hex = 15;
  optional float discovery_radius = 16;          // Auto-discover within this range

  // Visual
  optional string img = 17;
  optional string icon = 18;
  optional string marker_icon = 19;
  optional Color marker_color = 20;

  // Behavior
  optional string interaction_world_object_ref = 21;  // WorldObjectDef.ref for click logic
  optional bool discoverable = 22;
  optional bool fast_travel = 23;
  optional bool respawn_point = 24;
  optional bool unique = 25;                     // One-of-a-kind landmark
  optional bool destroyed = 26;

  // Phasing / unlock
  optional string discovery_quest_ref = 27;
  repeated string prerequisite_quest_refs = 28;
  optional string event_ref = 29;

  // Linkage
  repeated string npc_refs = 30;
  repeated string quest_refs = 31;
  optional string dialogue_tree_ref = 32;
  optional string shop_ref = 33;
  optional string dungeon_zone_ref = 34;

  // Metadata
  optional string credits = 35;
  optional bool drafted = 36;
  repeated MapExtension extensions = 37;
}

// =============================================================================
// Sub-messages — Dialogue Trees (quest hub upgrades)
// =============================================================================

// A choice line within a CHOICE node.
message DialogueChoice {
  string text = 1;
  string next_node_id = 2;
  repeated string required_flag_refs = 3;        // Gating world flags
  optional string skill_check_ref = 4;           // e.g. "persuasion:30"
  optional string set_flag_ref = 5;              // Sets this flag when chosen
  optional int32 reputation_delta = 6;
  optional string faction_ref = 7;               // Reputation target
}

// One node in a dialogue tree.
message DialogueNode {
  string id = 1;
  DialogueNodeKind kind = 2;
  optional string speaker_ref = 3;               // NPC ref
  optional string text = 4;
  optional string voice_ref = 5;                 // Audio ref
  repeated DialogueChoice choices = 6;           // For CHOICE nodes
  optional string next_node_id = 7;              // For LINE / GOTO nodes
  optional string quest_ref = 8;                 // For QUEST_OFFER / QUEST_TURN_IN
  optional string shop_ref = 9;                  // For SHOP_OPEN
  optional string script_ref = 10;               // For SCRIPT
  repeated string required_flag_refs = 11;
  repeated string set_flag_refs = 12;
}

// A whole branching conversation tree, addressable by ref.
message DialogueTree {
  string id = 1;
  string ref = 2;
  string name = 3;
  optional string description = 4;
  string root_node_id = 5;
  repeated DialogueNode nodes = 6;
  optional string default_speaker_ref = 7;
  repeated MapExtension extensions = 8;
}

// =============================================================================
// Sub-messages — Climate & Schedule
// =============================================================================

// One entry in a weather rotation — weight-driven random pick that
// runs for `duration_secs` before a re-roll.
message WeatherProfile {
  WeatherKind kind = 1;
  float weight = 2;                              // Relative likelihood
  optional float duration_secs = 3;
  optional Season season_filter = 4;             // Only pick during this season
  optional TimeOfDay time_of_day_filter = 5;
  repeated string event_refs = 6;                // Seasonal event hooks
}

// Climate band for a zone — drives weather rotation, season cadence,
// crop yields, ambient music swap.
message ClimateConfig {
  optional Season default_season = 1;
  optional float season_cycle_secs = 2;          // Length of a full season cycle
  repeated WeatherProfile weather_rotation = 3;
  optional float baseline_temperature = 4;       // For survival games
  optional float temperature_variance = 5;
  repeated string holiday_event_refs = 6;        // Calendar events
  optional bool day_night_locked = 7;            // Eternal day / night zones
  optional TimeOfDay locked_time_of_day = 8;
}

// =============================================================================
// Extensibility
// =============================================================================

// Generic extension slot
message MapExtension {
  string key = 1;                       // Namespace, e.g. "isometric.chunk_load_radius"
  oneof value {
    string string_value = 2;
    int64 int_value = 3;
    double float_value = 4;
    bool bool_value = 5;
    bytes bytes_value = 6;
  }
}

// =============================================================================
// Registry
// =============================================================================

message MapRegistry {
  repeated Region regions = 1;
  repeated Zone zones = 2;
  repeated WorldObjectDef object_defs = 3;
  repeated HexWorldMap hex_worlds = 4;
  repeated Faction factions = 5;
  repeated Settlement settlements = 6;
  repeated TerritoryClaim territory_claims = 7;
  repeated TradeRoute trade_routes = 8;
  repeated Landmark landmarks = 9;
  repeated Culture cultures = 10;
  repeated Religion religions = 11;
  repeated Treaty treaties = 12;
  repeated DialogueTree dialogue_trees = 13;
  repeated ClimateConfig climates = 14;
}
