  GOVERNMENT_TYPE_UNSPECIFIED = 0;
  GOVERNMENT_TYPE_ANARCHY     = 1;
  GOVERNMENT_TYPE_TRIBAL      = 2;
  GOVERNMENT_TYPE_FEUDAL      = 3;
  GOVERNMENT_TYPE_MONARCHY    = 4;
  GOVERNMENT_TYPE_REPUBLIC    = 5;
  GOVERNMENT_TYPE_DEMOCRACY   = 6;
  GOVERNMENT_TYPE_OLIGARCHY   = 7;
  GOVERNMENT_TYPE_THEOCRACY   = 8;
  GOVERNMENT_TYPE_EMPIRE      = 9;
  GOVERNMENT_TYPE_GUILD       = 10;  // Mercantile / craft-guild rule
  GOVERNMENT_TYPE_HIVE_MIND   = 11;
  GOVERNMENT_TYPE_CORPORATE   = 12;  // Sci-fi / cyberpunk
  GOVERNMENT_TYPE_MERCENARY   = 13;
  GOVERNMENT_TYPE_OCCUPIED    = 14;  // Foreign rule — controlled by another faction
}

// Pair-wise diplomatic stance between two factions.
enum DiplomaticStance {
  DIPLOMATIC_STANCE_UNSPECIFIED = 0;
  DIPLOMATIC_STANCE_NEUTRAL     = 1;
  DIPLOMATIC_STANCE_FRIENDLY    = 2;
  DIPLOMATIC_STANCE_ALLIED      = 3;
  DIPLOMATIC_STANCE_TRADE       = 4;   // Trade-only agreement
  DIPLOMATIC_STANCE_NON_AGGRESSION = 5;
  DIPLOMATIC_STANCE_RIVAL       = 6;
  DIPLOMATIC_STANCE_HOSTILE     = 7;
  DIPLOMATIC_STANCE_AT_WAR      = 8;
  DIPLOMATIC_STANCE_VASSAL      = 9;   // Subordinate faction
  DIPLOMATIC_STANCE_OVERLORD    = 10;  // Dominant faction in vassalage
  DIPLOMATIC_STANCE_TRIBUTARY   = 11;  // Pays tribute, otherwise free
  DIPLOMATIC_STANCE_VENDETTA    = 12;  // Personal blood feud (clan / honour systems)
