syntax = "proto3";

package map;

option csharp_namespace = "KBVE.Proto.Map";

import "kbve/common.proto";

// =============================================================================
// Enums
// =============================================================================

// Biome classification — drives terrain generation, visuals, and spawn tables
enum Biome {
  BIOME_UNSPECIFIED   = 0;
  BIOME_GRASSLAND     = 1;
  BIOME_FOREST        = 2;
  BIOME_DESERT        = 3;
  BIOME_TUNDRA        = 4;
  BIOME_SWAMP         = 5;
  BIOME_MOUNTAIN      = 6;
  BIOME_VOLCANIC      = 7;
  BIOME_OCEAN         = 8;
  BIOME_CAVE          = 9;
  BIOME_DUNGEON       = 10;
  BIOME_CITY          = 11;
  BIOME_RUINS         = 12;
  BIOME_UNDERGROUND   = 13;
  BIOME_FLOATING      = 14;
  BIOME_VOID          = 15;
  BIOME_COASTAL       = 16;
  BIOME_RIVER         = 17;
  BIOME_DIRT          = 18;
  BIOME_SNOW          = 19;
  BIOME_STONE         = 20;
}

// Zone type — functional classification
enum ZoneType {
  ZONE_TYPE_UNSPECIFIED  = 0;
  ZONE_TYPE_OVERWORLD    = 1;
  ZONE_TYPE_DUNGEON      = 2;
  ZONE_TYPE_INSTANCE     = 3;    // Private per-party instance
  ZONE_TYPE_CITY         = 4;
  ZONE_TYPE_ARENA        = 5;    // PvP / challenge
  ZONE_TYPE_SAFE         = 6;    // No combat
  ZONE_TYPE_WILDERNESS   = 7;    // Open PvP / high danger
  ZONE_TYPE_RAID         = 8;
  ZONE_TYPE_TUTORIAL     = 9;
  ZONE_TYPE_EVENT        = 10;   // Seasonal / limited-time
}

// Room type — for tile-based dungeons (discordsh-style)
enum RoomType {
  ROOM_TYPE_UNSPECIFIED      = 0;
  ROOM_TYPE_EMPTY            = 1;
  ROOM_TYPE_COMBAT           = 2;
  ROOM_TYPE_TREASURE         = 3;
  ROOM_TYPE_TRAP             = 4;
  ROOM_TYPE_REST_SHRINE      = 5;
  ROOM_TYPE_MERCHANT         = 6;
  ROOM_TYPE_BOSS             = 7;
  ROOM_TYPE_STORY            = 8;
  ROOM_TYPE_HALLWAY          = 9;
  ROOM_TYPE_UNDERGROUND_CITY = 10;
  ROOM_TYPE_PUZZLE           = 11;
  ROOM_TYPE_SECRET           = 12;
  ROOM_TYPE_PORTAL           = 13;
}

// Compass direction for tile exits / adjacency
enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  DIRECTION_NORTH = 1;
  DIRECTION_SOUTH = 2;
  DIRECTION_EAST  = 3;
  DIRECTION_WEST  = 4;
  DIRECTION_UP    = 5;
  DIRECTION_DOWN  = 6;
}

// Room modifier — environmental effects on combat / exploration
enum RoomModifier {
  ROOM_MODIFIER_UNSPECIFIED = 0;
  ROOM_MODIFIER_NONE     = 1;
  ROOM_MODIFIER_FOG      = 2;    // Reduced accuracy / vision
  ROOM_MODIFIER_BLESSING = 3;    // Healing bonus
  ROOM_MODIFIER_CURSED   = 4;    // Damage multiplier on players
  ROOM_MODIFIER_FLOODED  = 5;    // Movement penalty
  ROOM_MODIFIER_BURNING  = 6;    // Periodic fire damage
  ROOM_MODIFIER_FROZEN   = 7;    // Slow / ice hazards
  ROOM_MODIFIER_TOXIC    = 8;    // Poison buildup
  ROOM_MODIFIER_DARK     = 9;    // Requires light source
  ROOM_MODIFIER_HOLY     = 10;   // Bonus vs undead, heal over time
  ROOM_MODIFIER_ARCANE   = 11;   // Magic amplification
}

// World object archetype — gameplay role, not physical shape.
// Use sub_kind for the specific variant (e.g. "oak", "coal", "furnace").
enum WorldObjectType {
  WORLD_OBJECT_UNSPECIFIED      = 0;

  // Harvestable / gatherable nodes (tree, rock, flower, mushroom, crystal, water)
  WORLD_OBJECT_RESOURCE_NODE    = 1;

  // Loot / storage containers (crate, chest, barrel)
  WORLD_OBJECT_CONTAINER        = 2;

  // Crafting stations (workbench, furnace, anvil)
  WORLD_OBJECT_CRAFTING_STATION = 3;

  // Decorative / utility props (statue, pillar, sign, campfire, etc.)
  WORLD_OBJECT_PROP             = 4;

  // Light sources — distinct for rendering/lighting system
  WORLD_OBJECT_LIGHT            = 5;

  // Navigation / movement
  WORLD_OBJECT_PORTAL           = 6;
  WORLD_OBJECT_BARRIER          = 7;

  // Gameplay markers
  WORLD_OBJECT_NPC_MARKER       = 8;   // Where an NPC stands
  WORLD_OBJECT_TRIGGER          = 9;   // Boss activation, quest zone, cutscene, spawn area

  // World structures
  WORLD_OBJECT_SETTLEMENT       = 10;  // City / outpost / bazaar (zone-level safe area)
  WORLD_OBJECT_BUILDING         = 11;  // Individual structure (inn, tavern, smithy)
  WORLD_OBJECT_ARENA            = 12;  // Boss encounter room
  WORLD_OBJECT_LANDMARK         = 13;  // Story / lore point of interest

  // Escape hatch
  WORLD_OBJECT_CUSTOM           = 100;
}

// Subtype for WORLD_OBJECT_RESOURCE_NODE — what resource the node yields
enum ResourceType {
  RESOURCE_UNSPECIFIED = 0;
  RESOURCE_WOOD        = 1;
  RESOURCE_STONE       = 2;
  RESOURCE_FLOWER      = 3;
  RESOURCE_MUSHROOM    = 4;
  RESOURCE_CRYSTAL     = 5;
  RESOURCE_WATER       = 6;
  RESOURCE_ORE         = 7;   // sub_kind further specifies: coal, iron, gold, etc.
}

// Subtype for WORLD_OBJECT_CONTAINER
enum ContainerType {
  CONTAINER_UNSPECIFIED = 0;
  CONTAINER_CRATE       = 1;
  CONTAINER_CHEST       = 2;
  CONTAINER_BARREL      = 3;
}

// Subtype for WORLD_OBJECT_CRAFTING_STATION
enum CraftingStationType {
  CRAFTING_STATION_UNSPECIFIED = 0;
  CRAFTING_STATION_WORKBENCH   = 1;
  CRAFTING_STATION_FURNACE     = 2;
  CRAFTING_STATION_ANVIL       = 3;
}

// How a structure's footprint occupies the grid. RECTANGULAR uses
// footprint_width × footprint_height; HEX_FLOWER claims centre + 6 axial
// neighbours (hex-grid games only); EXPLICIT uses footprint_cells.
enum FootprintShape {
  FOOTPRINT_SHAPE_UNSPECIFIED = 0;
  FOOTPRINT_SHAPE_RECTANGULAR = 1;
  FOOTPRINT_SHAPE_HEX_FLOWER  = 2;
  FOOTPRINT_SHAPE_EXPLICIT    = 3;
}

// Where the placement cost is paid from.
enum CostSource {
  COST_SOURCE_UNSPECIFIED      = 0;
  COST_SOURCE_FACTION_TREASURY = 1;  // Shared faction/empire stockpile
  COST_SOURCE_OWNER_INVENTORY  = 2;  // Placing unit's personal inventory
  COST_SOURCE_FREE             = 3;  // No cost (admin / cheats / narrative grant)
}

// Click-interaction kind for landmarks / buildings. Discriminator for
// the per-kind specs below (ShrineSpec / ShopSpec / DungeonSpec /
// QuestGiverSpec). UNSPECIFIED / NONE = inert object, no interaction.
enum InteractionKind {
  INTERACTION_KIND_UNSPECIFIED  = 0;
  INTERACTION_KIND_NONE         = 1;
  INTERACTION_KIND_SHRINE       = 2;
  INTERACTION_KIND_SHOP         = 3;
  INTERACTION_KIND_QUEST_GIVER  = 4;
  INTERACTION_KIND_DUNGEON      = 5;
  INTERACTION_KIND_NPC_DIALOG   = 6;
}

// Service a structure offers to nearby units. Service seekers read
// ServiceCapability.kind and pick the highest priority provider.
enum ServiceKind {
  SERVICE_KIND_UNSPECIFIED = 0;
  SERVICE_KIND_FOOD        = 1;
  SERVICE_KIND_SLEEP       = 2;
  SERVICE_KIND_HEALING     = 3;
  SERVICE_KIND_TRAINING    = 4;   // Skill / XP grinding station
  SERVICE_KIND_TELEPORT    = 5;   // Fast-travel endpoint
  SERVICE_KIND_STORAGE     = 6;   // Shared stockpile accessor
  SERVICE_KIND_MERCHANT    = 7;   // Buy/sell stall
  SERVICE_KIND_BANKER      = 8;   // Personal bank access (OSRS-style)
}

// Point of interest type
enum PoiType {
  POI_UNSPECIFIED  = 0;
  POI_CITY         = 1;
  POI_TOWN         = 2;
  POI_VILLAGE      = 3;
  POI_DUNGEON      = 4;
  POI_LANDMARK     = 5;
  POI_SHRINE       = 6;
  POI_MERCHANT     = 7;
  POI_CAMP         = 8;
  POI_RUINS        = 9;
  POI_MINE         = 10;
  POI_FARM         = 11;
  POI_PORT         = 12;
  POI_TOWER        = 13;
  POI_CAVE         = 14;
  POI_ARENA        = 15;
  POI_GUILD_HALL   = 16;
  POI_SPAWN_POINT  = 17;
  POI_QUEST_HUB    = 18;
  POI_CUSTOM       = 19;
}

// Terrain band type — height-based visual classification
enum TerrainBand {
  TERRAIN_BAND_UNSPECIFIED = 0;
  TERRAIN_BAND_WATER       = 1;
  TERRAIN_BAND_SAND        = 2;
  TERRAIN_BAND_GRASS       = 3;
  TERRAIN_BAND_DIRT        = 4;
  TERRAIN_BAND_STONE       = 5;
  TERRAIN_BAND_SNOW        = 6;
  TERRAIN_BAND_LAVA        = 7;
}

// Spawn category — what kind of entity spawns here
enum SpawnCategory {
  SPAWN_CATEGORY_UNSPECIFIED = 0;
  SPAWN_CATEGORY_NPC        = 1;
  SPAWN_CATEGORY_RESOURCE   = 2;   // Ore, tree, herb node
  SPAWN_CATEGORY_OBJECT     = 3;   // Chest, crate, decoration
  SPAWN_CATEGORY_ENEMY      = 4;
  SPAWN_CATEGORY_BOSS       = 5;
  SPAWN_CATEGORY_EVENT      = 6;   // Seasonal / triggered spawn
  SPAWN_CATEGORY_AMBIENT    = 7;   // Critters, birds, particles
}

// Time-of-day window — canonical replacement for stringly-typed
// SpawnPoint.time_of_day. Wired to WorldClock when available.
enum TimeOfDay {
  TIME_OF_DAY_UNSPECIFIED = 0;
  TIME_OF_DAY_DAWN        = 1;
  TIME_OF_DAY_DAY         = 2;
  TIME_OF_DAY_DUSK        = 3;
  TIME_OF_DAY_NIGHT       = 4;
  TIME_OF_DAY_MIDNIGHT    = 5;   // Deep night — special spawn window
}

// Weather state — climate / spawn / movement gating.
enum WeatherKind {
  WEATHER_KIND_UNSPECIFIED = 0;
  WEATHER_KIND_CLEAR       = 1;
  WEATHER_KIND_OVERCAST    = 2;
  WEATHER_KIND_RAIN        = 3;
  WEATHER_KIND_STORM       = 4;
  WEATHER_KIND_SNOW        = 5;
  WEATHER_KIND_BLIZZARD    = 6;
  WEATHER_KIND_FOG         = 7;
  WEATHER_KIND_SANDSTORM   = 8;
  WEATHER_KIND_HEATWAVE    = 9;
  WEATHER_KIND_ASHFALL     = 10;  // Volcanic / apocalyptic
  WEATHER_KIND_ARCANE      = 11;  // Magic storm — affects mana / spell mods
  WEATHER_KIND_CURSED      = 12;  // Story-flagged dread weather
}

// Season — long-cadence climate band. Drives crop yields, NPC mood,
// holiday events, world music, and ambient palettes.
enum Season {
  SEASON_UNSPECIFIED = 0;
  SEASON_SPRING      = 1;
  SEASON_SUMMER      = 2;
  SEASON_AUTUMN      = 3;
  SEASON_WINTER      = 4;
  SEASON_DRY         = 5;   // Equatorial / two-season worlds
  SEASON_WET         = 6;
  SEASON_HARVEST     = 7;   // Festival / event banding
  SEASON_DEAD        = 8;   // Apocalyptic / nuclear / undead overrun
}

// Settlement size tier — population class drives services, taxes,
// growth ceiling, and visual density.
enum SettlementTier {
  SETTLEMENT_TIER_UNSPECIFIED = 0;
  SETTLEMENT_TIER_OUTPOST     = 1;   // <50, frontier
  SETTLEMENT_TIER_HAMLET      = 2;   // 50–200
  SETTLEMENT_TIER_VILLAGE     = 3;   // 200–1000
  SETTLEMENT_TIER_TOWN        = 4;   // 1k–5k
  SETTLEMENT_TIER_CITY        = 5;   // 5k–50k
  SETTLEMENT_TIER_METROPOLIS  = 6;   // 50k+
  SETTLEMENT_TIER_CAPITAL     = 7;   // Faction seat (any pop class)
  SETTLEMENT_TIER_RUINED      = 8;   // Destroyed / abandoned
  SETTLEMENT_TIER_NOMADIC     = 9;   // Mobile camp (caravan / horde)
}

// District functional zoning inside a Settlement.
enum DistrictType {
  DISTRICT_TYPE_UNSPECIFIED   = 0;
  DISTRICT_TYPE_RESIDENTIAL   = 1;
  DISTRICT_TYPE_COMMERCIAL    = 2;   // Markets / shops
  DISTRICT_TYPE_INDUSTRIAL    = 3;   // Smithies, mills
  DISTRICT_TYPE_AGRICULTURAL  = 4;   // Farms within walls
  DISTRICT_TYPE_MILITARY      = 5;   // Barracks / training
  DISTRICT_TYPE_RELIGIOUS     = 6;   // Temples / shrines
  DISTRICT_TYPE_ADMINISTRATIVE = 7;  // Palace / town hall
  DISTRICT_TYPE_HARBOR        = 8;   // Docks / shipyards
  DISTRICT_TYPE_ARCANE        = 9;   // Mage quarter / library
  DISTRICT_TYPE_NOBLE         = 10;
  DISTRICT_TYPE_SLUM          = 11;
  DISTRICT_TYPE_UNDERCITY     = 12;  // Sewer / criminal
  DISTRICT_TYPE_GUILD         = 13;  // Faction lodges
  DISTRICT_TYPE_ENTERTAINMENT = 14;  // Arena / theatre / brothel
  DISTRICT_TYPE_GRAVEYARD     = 15;
  DISTRICT_TYPE_PARK          = 16;
  DISTRICT_TYPE_CUSTOM        = 100;
}

// Form of government — selects ruler model, succession rules, and
