// How a faction holds territory.
enum TerritoryClaimKind {
  TERRITORY_CLAIM_UNSPECIFIED = 0;
  TERRITORY_CLAIM_HARD        = 1;   // Owned, defended, patrolled
  TERRITORY_CLAIM_SOFT        = 2;   // Influence only, no garrison
  TERRITORY_CLAIM_CONTESTED   = 3;   // Two factions overlap claim
  TERRITORY_CLAIM_OCCUPIED    = 4;   // Held by enemy, original claimant survives
  TERRITORY_CLAIM_HISTORICAL  = 5;   // Lost long ago, used for casus belli
  TERRITORY_CLAIM_NEUTRAL     = 6;   // Unowned, recognized as neutral ground
  TERRITORY_CLAIM_SACRED      = 7;   // Religious / cultural — non-military claim
}

// Trade-good classification — drives tariffs, contraband checks, caravan AI.
