syntax = "proto3";

package item;

option csharp_namespace = "KBVE.Proto.Item";

import "kbve/common.proto";

// =============================================================================
// Enums
// =============================================================================

// Item archetype flags — bitmask so an item can be multiple types
enum ItemTypeFlag {
  ITEM_TYPE_NONE         = 0;
  ITEM_TYPE_WEAPON       = 0x00000001;
  ITEM_TYPE_ARMOR        = 0x00000002;
  ITEM_TYPE_TOOL         = 0x00000004;
  ITEM_TYPE_FOOD         = 0x00000008;
  ITEM_TYPE_DRINK        = 0x00000010;
  ITEM_TYPE_POTION       = 0x00000020;
  ITEM_TYPE_MATERIAL     = 0x00000040;
  ITEM_TYPE_RESOURCE     = 0x00000080;
  ITEM_TYPE_SKILLING     = 0x00000100;
  ITEM_TYPE_COMBAT       = 0x00000200;
  ITEM_TYPE_STRUCTURE    = 0x00000400;
  ITEM_TYPE_MAGIC        = 0x00000800;
  ITEM_TYPE_QUEST        = 0x00001000;
  ITEM_TYPE_UTILITY      = 0x00002000;
  ITEM_TYPE_DEPLETABLE   = 0x00004000;
  ITEM_TYPE_LEGENDARY    = 0x00008000;
  ITEM_TYPE_VEHICLE      = 0x00010000;
  ITEM_TYPE_PET          = 0x00020000;
  ITEM_TYPE_CURRENCY     = 0x00040000;
  ITEM_TYPE_COSMETIC     = 0x00080000;
  ITEM_TYPE_DEPLOYABLE   = 0x00100000;
  ITEM_TYPE_SOUL         = 0x40000000;
}

// Rarity tier
enum ItemRarity {
  ITEM_RARITY_COMMON     = 0;
  ITEM_RARITY_UNCOMMON   = 1;
  ITEM_RARITY_RARE       = 2;
  ITEM_RARITY_EPIC       = 3;
  ITEM_RARITY_LEGENDARY  = 4;
  ITEM_RARITY_MYTHIC     = 5;
}

// Equipment slot
enum EquipSlot {
  EQUIP_SLOT_UNSPECIFIED = 0;
  EQUIP_SLOT_HEAD        = 1;
  EQUIP_SLOT_CHEST       = 2;
  EQUIP_SLOT_LEGS        = 3;
  EQUIP_SLOT_FEET        = 4;
  EQUIP_SLOT_HANDS       = 5;
  EQUIP_SLOT_MAIN_HAND   = 6;
  EQUIP_SLOT_OFF_HAND    = 7;
  EQUIP_SLOT_NECK        = 8;
  EQUIP_SLOT_RING        = 9;
  EQUIP_SLOT_BACK        = 10;
  EQUIP_SLOT_TWO_HAND    = 11;
  EQUIP_SLOT_AMMO        = 12;
}

// Element / damage affinity (mirrors npc.Element for cross-referencing)
enum Element {
  ELEMENT_NONE           = 0;
  ELEMENT_FIRE           = 1;
  ELEMENT_ICE            = 2;
  ELEMENT_LIGHTNING      = 3;
  ELEMENT_POISON         = 4;
  ELEMENT_SHADOW         = 5;
  ELEMENT_HOLY           = 6;
  ELEMENT_ARCANE         = 7;
  ELEMENT_EARTH          = 8;
  ELEMENT_WIND           = 9;
}

// Use effect type — what happens when the item is consumed/activated
enum UseEffectType {
  USE_EFFECT_NONE                    = 0;
  USE_EFFECT_HEAL                    = 1;
  USE_EFFECT_DAMAGE_ENEMY            = 2;
  USE_EFFECT_APPLY_EFFECT            = 3;
  USE_EFFECT_REMOVE_EFFECT           = 4;
  USE_EFFECT_GUARANTEED_FLEE         = 5;
  USE_EFFECT_FULL_HEAL               = 6;
  USE_EFFECT_REMOVE_ALL_NEGATIVE     = 7;
  USE_EFFECT_CAMPFIRE_REST           = 8;
  USE_EFFECT_TELEPORT_CITY           = 9;
  USE_EFFECT_DAMAGE_AND_APPLY        = 10;
  USE_EFFECT_REVIVE_ALLY             = 11;
  USE_EFFECT_BUFF_PARTY              = 12;
  USE_EFFECT_SUMMON                  = 13;
  USE_EFFECT_TRANSFORM               = 14;
  USE_EFFECT_LEARN_RECIPE            = 15;   // Blueprints — teaches a CraftingRecipe
  USE_EFFECT_LEARN_SPELL             = 16;   // Tomes — adds a spell to the spellbook
  USE_EFFECT_UNLOCK_LORE             = 17;   // Lore pickups — reveals a codex entry
}

// Gear special passive
enum GearSpecialType {
  GEAR_SPECIAL_NONE             = 0;
  GEAR_SPECIAL_LIFE_STEAL       = 1;
  GEAR_SPECIAL_THORNS           = 2;
  GEAR_SPECIAL_CRIT_BONUS       = 3;
  GEAR_SPECIAL_DAMAGE_REDUCTION = 4;
}

// Status effect kind — codified effect types for structured lookups
enum StatusEffectKind {
  STATUS_EFFECT_UNSPECIFIED = 0;
  STATUS_EFFECT_POISON     = 1;
  STATUS_EFFECT_BURNING    = 2;
  STATUS_EFFECT_BLEED      = 3;
  STATUS_EFFECT_SHIELDED   = 4;
  STATUS_EFFECT_WEAKENED   = 5;
  STATUS_EFFECT_STUNNED    = 6;
  STATUS_EFFECT_SHARPENED  = 7;
  STATUS_EFFECT_THORNS     = 8;
  STATUS_EFFECT_REGEN      = 9;
  STATUS_EFFECT_HASTE      = 10;
  STATUS_EFFECT_SLOW       = 11;
  STATUS_EFFECT_FROZEN     = 12;
  STATUS_EFFECT_CURSED     = 13;
  STATUS_EFFECT_BLESSED    = 14;
}

// Skilling discipline
enum SkillingType {
  SKILLING_UNSPECIFIED  = 0;
  SKILLING_COOKING      = 1;
  SKILLING_SMITHING     = 2;
  SKILLING_CRAFTING     = 3;
  SKILLING_ALCHEMY      = 4;
  SKILLING_WOODCUTTING  = 5;
  SKILLING_MINING       = 6;
  SKILLING_FISHING      = 7;
  SKILLING_FARMING      = 8;
  SKILLING_HERBLORE     = 9;
  SKILLING_FLETCHING    = 10;
  SKILLING_HUNTING      = 11;
  SKILLING_FORAGING     = 12;
  SKILLING_ENCHANTING   = 13;
  SKILLING_TAILORING    = 14;
  SKILLING_CONSTRUCTION = 15;
}

// =============================================================================
// Sub-messages
// =============================================================================

// Stat bonuses granted by equipping or using an item
message ItemBonuses {
  // Common fixed stats (fast access, no map lookup)
  optional int32 armor        = 1;
  optional int32 attack       = 2;
  optional int32 defense      = 3;
  optional int32 strength     = 4;
  optional int32 intelligence = 5;
  optional int32 health       = 6;
  optional int32 mana         = 7;
  optional int32 energy       = 8;
  optional int32 speed        = 9;
  optional int32 agility      = 10;
  optional float crit_chance  = 11;     // 0.0–1.0
  optional float crit_damage  = 12;     // Multiplier (e.g. 1.5)
  optional int32 stamina      = 13;
  optional int32 charisma     = 14;
  optional int32 dexterity    = 15;
  optional int32 perception   = 16;

  // Arbitrary bonus map for game-specific stats (e.g. "cookingSpeed", "zeroG",
  // "fallDamageReduction", "fireResist"). Keeps the proto extensible without
  // adding a new field for every niche bonus across all games.
  map<string, double> extra = 17;
}

// Equipment properties — present when item can be equipped
message EquipmentInfo {
  EquipSlot slot = 1;
  ItemBonuses bonuses = 2;
  optional GearSpecialType special = 3;
  optional float special_value = 4;     // Magnitude for the special (e.g. 0.15 = 15% lifesteal)
  optional int32 durability = 5;
  optional int32 max_durability = 6;
  optional int32 enchantment_slots = 7; // Number of enchantments that can be applied
  repeated string enchantment_types = 8; // Accepted enchantment slugs (e.g. "gem", "rune", "sigil")
  optional bool cursed = 9;             // Cannot be unequipped without a remedy
  optional float movement_penalty = 10; // 0.0-1.0 speed reduction when worn (armor weight)
}

// Enchantment payload — describes what an enchantment grants when attached to
// a parent piece of equipment. Items carrying EnchantmentInfo (gems, runes,
// sigils, crafted enchantments) are eligible to occupy EquipmentInfo's slots.
message EnchantmentInfo {
  string slug = 1;                      // Namespace matching EquipmentInfo.enchantment_types
  optional ItemBonuses bonuses = 2;     // Stat bonuses added to the parent while attached
  repeated UseEffect on_use = 3;        // Effects triggered when the parent item is used
  repeated UseEffect while_equipped = 4; // Continuous effects while the parent is equipped
  optional int32 tier = 5;              // 1-N quality tier (matches rarity escalation)
  optional bool removable = 6;          // Can be extracted intact (false = destroys on removal)
  optional int32 level_requirement = 7;
  repeated ItemAffinity affinities = 8; // Elemental boosts granted while attached
  repeated ItemAffinity resistances = 9; // Elemental resistances granted while attached
}

// A single use effect definition
message UseEffect {
  UseEffectType type = 1;
  optional int32 amount = 2;            // Heal amount, damage amount, etc.
  optional StatusEffectKind status_effect = 3; // Structured effect type
  optional string effect_kind_custom = 4;     // Fallback: free-form effect slug for game-specific effects
  optional int32 stacks = 5;            // Number of effect stacks to apply
  optional int32 turns = 6;             // Duration in turns
  optional int32 percent = 7;           // Percentage value (e.g. campfire heal %)
  optional string summon_ref = 8;       // NPC ref for summon effects
  optional Element element = 9;         // Elemental affinity of the effect
}

// Crafting ingredient
message CraftingIngredient {
  string item_ref = 1;                  // ULID or item slug
  optional string name = 2;
  int32 amount = 3;                     // default: 1
  optional bool consumed = 4;           // Whether consumed in crafting (default: true)
}

// Crafting recipe — how to create this item
message CraftingRecipe {
  repeated CraftingIngredient ingredients = 1;
  repeated string required_tools = 2;   // Tool item refs needed (not consumed)
  optional string skill = 3;            // Required crafting skill slug
  optional int32 skill_level = 4;       // Required skill level
  optional float xp_reward = 5;         // XP granted on craft
  optional int32 output_quantity = 6;   // How many produced (default: 1)
  optional string facility = 7;         // Required crafting station (e.g. "furnace", "anvil")
  optional bool members_only = 8;
}

// Deployable configuration (for structure/placeable items)
message DeployableInfo {
  repeated int32 size = 1;              // [width, height] grid cells
  repeated float pivot = 2;             // [x, y] anchor point (0.0–1.0)
  optional string override_prefab = 3;  // Custom prefab reference
  optional float scale_multiplier = 4;  // Visual scale (default: 1.0)
  optional bool grid_snap = 5;          // Snap to grid (default: true)
  repeated ScriptBinding scripts = 6;   // Attached scripts with variable bindings
  optional string deployable_type = 7;  // Functional type (e.g. "cooker", "campfire", "workbench")
}

// Script binding — GUID-based script attachment with variable overrides
message ScriptBinding {
  string guid = 1;                      // 32-char hex GUID
  optional string name = 2;             // Human-readable script name
  map<string, string> vars = 3;         // Variable overrides (values stored as strings, parsed by runtime)
}

// Loot source — where this item can be found
message ItemSource {
  optional string source_type = 1;      // "drop", "shop", "craft", "quest", "gather"
  optional string source_ref = 2;       // NPC/shop/quest slug
  optional string source_name = 3;
  optional float drop_rate = 4;         // 0.0–1.0 probability
  optional int32 min_quantity = 5;
  optional int32 max_quantity = 6;
  optional int32 level_requirement = 7;
}

// Food / consumable properties
message FoodInfo {
  optional int32 heals = 1;             // HP restored on consumption
  optional int32 doses = 2;             // Number of doses (potions: 1-4)
  optional int32 cooking_level = 3;     // Cooking level required to prepare
  optional float cooking_xp = 4;        // XP awarded for cooking this item
  optional int32 burn_level = 5;        // Level at which burning stops
  optional int32 duration = 6;          // Buff duration in seconds/turns
  repeated UseEffect buff_effects = 7;  // Stat buffs granted on consumption
  optional int32 restore_energy = 8;    // Energy / hunger satiation restored on consumption
  optional int32 restore_mana = 9;      // Mana restored on consumption
  optional float regen_per_second = 10; // Post-consumption over-time regen rate (HP/sec)
  optional float regen_duration = 11;   // Seconds the regen buff lasts after consumption
  optional bool perishable = 12;        // Item decays over time if true
  optional int32 shelf_life_seconds = 13; // Time from creation/harvest until spoil
  optional string spoils_into_ref = 14; // Item produced on spoilage (e.g. "rotten-meat")
}

// Skilling properties — for items that interact with skill systems
message SkillingInfo {
  SkillingType skill = 1;               // Primary skill this item relates to
  optional int32 skill_level = 2;       // Level required to gather/use/process
  optional float xp_reward = 3;         // XP granted per gather/action
  optional string tool_required = 4;    // Tool item ref needed (e.g. "pickaxe" for ores)
  optional float gather_time = 5;       // Base time to gather/harvest in seconds
  optional int32 respawn_time = 6;      // Seconds before resource node respawns
  optional string resource_node = 7;    // World object ref (e.g. "oak_tree", "copper_vein")
  optional int32 harvest_weight = 8;    // 0-100 preference weight when the harvester has multiple eligible targets
}

// Compression / consolidation — many small stacks fuse into one bulk item.
// Used by storage consolidators, granaries, smelters that batch raw stock into
// construction-grade output.
message CompressInfo {
  string target_ref = 1;                // Output item ref (e.g. "timber" for wood-log compression)
  int32 ratio = 2;                      // Input units per single output unit
  optional string facility = 3;         // Required facility ref for the consolidation (optional)
}

// Stack / inventory handling hints that go beyond raw max_stack.
message StackingInfo {
  optional int32 pack_max = 1;          // Per-unit carried stack cap (distinct from storage max_stack)
  optional bool no_pack = 2;            // Cannot be carried by a unit (storage-only, e.g. gold bars)
  optional string pool_group = 3;       // Logical group (e.g. "food") — any item with the same pool_group substitutes
}

// Weapon properties — for items with ITEM_TYPE_WEAPON or ITEM_TYPE_COMBAT flag.
// Covers both melee and ranged; 0 range = melee. Ammo linkage is bow→arrow
// via ammo_ref (primary) and compatible_ammo (alternates).
message WeaponInfo {
  optional float range = 1;             // Reach in tiles/meters (0 or 1 = melee)
  optional float attack_speed = 2;      // Attacks per second; lower = slower
  optional string projectile_ref = 3;   // Visual/entity projectile ref for ranged
  optional string ammo_ref = 4;         // Primary consumed ammo item ref (e.g. "arrow")
  repeated string compatible_ammo = 5;  // Alternate ammo accepted
  optional Element damage_element = 6;
  optional int32 min_damage = 7;
  optional int32 max_damage = 8;
  optional float crit_chance = 9;
  optional float crit_damage = 10;
  optional int32 windup_ticks = 11;     // Ticks before the swing lands
  optional int32 recovery_ticks = 12;   // Post-swing lockout
  optional int32 aoe_radius = 13;       // Area of effect radius in tiles (0 = single-target)
  optional bool two_handed = 14;        // Occupies both hands even if slot = main_hand
  optional int32 charges = 15;          // Limited-use charges (wands, one-shots); 0 = unlimited
}

// Fuel / combustible — for items that burn in furnaces, cookfires, campfires.
message FuelInfo {
  int32 burn_seconds = 1;               // Base burn duration per unit
  optional int32 heat_output = 2;       // Relative heat rating (cookfire needs 1, smelter 3, etc.)
  optional string residue_ref = 3;      // Item left over after burn (e.g. "ash")
  optional float residue_chance = 4;    // 0.0-1.0 probability of producing residue per unit
  optional bool renewable = 5;          // Regrows/crafts indefinitely (wood vs coal)
}

// Container capacity — for pouches, bags, quivers, and deployed chests.
message ContainerInfo {
  optional int32 added_slots = 1;       // Extra pack slots granted when equipped
  optional float volume_multiplier = 2; // Multiplier applied to base pack capacity (default 1.0)
  optional float weight_reduction = 3;  // 0.0-1.0 fraction by which contained items weigh less
  repeated string category_filter = 4;  // Tag filter — only matching items can be stored (empty = any)
  optional int32 storage_slots = 5;     // For deployed chests: standalone storage capacity
  optional bool shared_inventory = 6;   // Deployed chests: contents visible to all allied units
  optional bool locked_by_default = 7;  // Requires key or owner to access
}

// Planting / farming — for seeds or saplings.
message PlantingInfo {
  string grows_into_ref = 1;            // Item produced when the plant matures
  int32 grow_seconds = 2;               // Growth time in seconds
  optional int32 yield_amount = 3;      // Output quantity per mature plant (default 1)
  optional string required_tile = 4;    // Tile type slug (e.g. "farmland", "desert-sand")
  optional int32 required_light = 5;    // 0-255 light level minimum
  optional float water_per_hour = 6;    // Water units consumed per hour (0 = rain-fed)
  optional bool multi_harvest = 7;      // If true, plant regrows rather than being destroyed
  optional int32 regrow_seconds = 8;    // Regrowth interval for multi-harvest plants
  optional string season = 9;           // Allowed season slug (e.g. "spring", "year-round")
  optional float frost_tolerance = 10;  // 0.0-1.0 survival in cold
}

// Projectile flight / impact — for arrows, bolts, thrown items, magic bolts.
message ProjectileInfo {
  optional float speed = 1;             // Travel speed in tiles/sec
  optional float gravity = 2;           // 0 = flat trajectory; higher = arcing
  optional int32 pierce_count = 3;      // Targets pierced before the projectile dies
  optional string impact_effect_ref = 4; // VFX slug on hit
  optional string trail_ref = 5;        // VFX slug during flight
  optional bool homing = 6;             // Tracks target in flight
  optional int32 splash_radius = 7;     // AoE on impact (0 = single-target)
  optional float splash_falloff = 8;    // 0.0-1.0 damage falloff at the edge
}

// Spell properties — for scrolls, tomes, wands, staves that cast or teach a spell.
message SpellInfo {
  string spell_ref = 1;                 // Spell slug (e.g. "fireball", "ice-shard")
  optional int32 mana_cost = 2;         // Mana consumed per cast
  optional float cast_seconds = 3;      // Channel / cast time before the spell fires
  optional float cooldown_seconds = 4;  // Post-cast lockout
  optional string scaling_stat = 5;     // Stat that scales damage (e.g. "intelligence")
  optional float scaling_multiplier = 6; // How much the stat contributes
  optional int32 base_damage = 7;
  optional Element element = 8;
  optional float range = 9;             // Max casting distance
  optional int32 aoe_radius = 10;
  optional bool teaches_permanent = 11; // True for tomes that add the spell to the caster's book
  optional bool consumed_on_cast = 12;  // True for one-shot scrolls
  optional int32 charges = 13;          // Remaining casts (0 = unlimited)
  repeated UseEffect side_effects = 14; // Additional effects applied on cast
}

// Book properties — for readable items (lore books, journals, recipe books).
message BookInfo {
  optional string body_text = 1;        // Full readable text
  optional string body_text_ref = 2;    // Reference to external MDX / markdown asset
  optional int32 reading_seconds = 3;   // Approximate time to read through
  optional string teaches_recipe_ref = 4; // Granted CraftingRecipe on first read
  optional string teaches_spell_ref = 5; // Granted SpellInfo on first read
  optional string unlocks_lore_ref = 6; // Codex entry slug to reveal
  optional bool consumed_on_read = 7;   // True when the book crumbles / is used up
  optional string language = 8;         // Language slug for locale gating
  repeated string chapters = 9;         // Ordered chapter/page slugs for paginated reading
}

// Key properties — for items that unlock specific world entities.
message KeyInfo {
  string unlocks_ref = 1;               // World entity / structure slug this key opens
  optional string unlock_category = 2;  // "door", "chest", "gate", "cell"
  optional bool consumed_on_use = 3;    // True if the key is destroyed on unlock
  optional string grant_item_ref = 4;   // Optional item granted when unlock succeeds
  optional int32 uses = 5;              // Number of unlocks before the key breaks (0 = unlimited)
  optional string faction_lock = 6;     // Faction slug required to use the key
}

// Vehicle / mount properties — for boats, carts, horses, mechanical conveyances.
message VehicleInfo {
  optional float max_speed = 1;         // Peak movement speed
  optional float acceleration = 2;
  optional float turn_rate = 3;
  optional int32 passenger_capacity = 4; // How many units can ride (driver + passengers)
  optional string fuel_ref = 5;         // Consumed fuel item ref (empty = self-propelled)
  optional float fuel_per_distance = 6; // Fuel units per tile / meter
  optional string terrain_type = 7;     // "water", "land", "air", "amphibious"
  optional int32 cargo_slots = 8;       // Independent cargo-hold slots
  optional float cargo_weight_capacity = 9;
  optional float damage_reduction = 10; // 0.0-1.0 hit absorption for riders
  optional bool requires_leash = 11;    // Mount must be tamed / leashed before use
}

// Trap / hazard — for placed items that trigger on contact.
message TrapInfo {
  optional string trigger = 1;          // "step", "proximity", "timer"
  optional int32 arming_seconds = 2;    // Time before the trap becomes active after placement
  optional int32 proximity_radius = 3;  // Activation radius for proximity traps
  optional int32 max_triggers = 4;      // Uses before the trap is spent (0 = unlimited)
  optional bool reusable = 5;           // Can be picked back up after triggering
  repeated UseEffect on_trigger = 6;    // Effects applied to anything caught
}

// Item set definition — bonuses for wearing multiple pieces
message ItemSet {
  string set_id = 1;                    // Unique set identifier
  string set_name = 2;
  repeated string item_refs = 3;        // All items in this set
  repeated SetBonus bonuses = 4;        // Tiered bonuses
}

// A single tier of a set bonus
message SetBonus {
  int32 pieces_required = 1;            // Minimum pieces equipped to activate
  optional string description = 2;      // Human-readable bonus description
  optional ItemBonuses stat_bonuses = 3; // Stat bonuses granted
  repeated UseEffect effects = 4;       // Special effects granted
}

// Resistance / affinity entry for items (e.g. fire resist boots)
message ItemAffinity {
  Element element = 1;
  float magnitude = 2;                  // 0.0–1.0 (0.3 = 30% resist/boost)
}

// Generic extension slot — arbitrary key-value pairs for game-specific data
message ItemExtension {
  string key = 1;                       // Namespace, e.g. "isometric.gather_time"
  oneof value {
    string string_value = 2;
    int64 int_value = 3;
    double float_value = 4;
    bool bool_value = 5;
    bytes bytes_value = 6;
  }
}

// =============================================================================
// Core Item Definition
// =============================================================================

message Item {
  // Identity
  string id = 1;                        // ULID
  string ref = 2;                       // URL-safe identifier, e.g. "fire-flask"
  string name = 3;
  optional string title = 4;            // Display title override
  optional string description = 5;
  optional string lore = 6;             // Extended flavor text / backstory

  // Classification — type_flags is a bitmask of ItemTypeFlag values
  int32 type_flags = 7;
  ItemRarity rarity = 8;
  optional Element element = 9;
  repeated string tags = 10;            // Free-form tags for filtering

  // Visual
  optional string img = 11;             // Sprite / icon path
  optional string icon = 12;            // Small icon for UI lists
  optional string emoji = 13;           // Unicode emoji representation
  optional int32 pixel_density = 14;    // Pixel density for rendering (8-512)
  optional string sorting_layer = 15;   // Rendering layer name
  optional int32 sorting_order = 16;    // Order within sorting layer
  optional string model_ref = 17;       // 3D model reference
  optional string animation_ref = 18;   // Use/equip animation reference
  optional string sound_ref = 19;       // Use/equip sound reference

  // Stacking & inventory
  optional int32 max_stack = 20;        // Max per inventory slot (default: 1)
  optional bool stackable = 21;         // Whether item can stack at all
  optional float weight = 22;           // Weight per unit

  // Requirements
  optional int32 level_requirement = 23;
  optional string quest_requirement = 24; // Quest slug that must be completed

  // Economy
  optional int32 buy_price = 25;        // Purchase cost in base currency
  optional int32 sell_price = 26;       // Sell value in base currency
  optional bool tradeable = 27;

  // Consumable / use
  optional bool consumable = 28;        // Consumed on use
  optional int32 cooldown = 29;         // Cooldown in seconds/turns
  optional string action = 30;          // Primary action verb (e.g. "consume", "deploy")
  repeated UseEffect use_effects = 31;  // Effects triggered on use (can chain multiple)

  // Equipment
  optional EquipmentInfo equipment = 32;

  // Food / consumable
  optional FoodInfo food = 41;

  // Skilling / gathering
  optional SkillingInfo skilling = 42;

  // Crafting
  repeated CraftingRecipe recipes = 33; // Ways to craft this item

  // Deployable
  optional DeployableInfo deployable = 34;

  // Resistances & affinities
  repeated ItemAffinity resistances = 43;
  repeated ItemAffinity affinities = 44;  // Elemental boosts this item grants

  // Item-level scripts (non-deployable items with scripted behavior)
  repeated ScriptBinding scripts = 45;

  // Sources — where this item comes from
  repeated ItemSource sources = 35;

  // Related items & sets
  repeated string related_item_refs = 36; // Variants, upgrades, set pieces
  optional string set_ref = 37;         // Item set this belongs to

  // Durability (for non-equipment items like tools)
  optional int32 durability = 46;
  optional int32 max_durability = 47;

  // Consolidation / compression — many → one
  optional CompressInfo compress = 48;

  // Stacking & carry-capacity hints (beyond raw max_stack)
  optional StackingInfo stacking = 49;

  // Logical pool this item belongs to (e.g. "food" — any member satisfies a
  // food-pool consumption). Shortcut for the common case where no other
  // StackingInfo fields are set.
  optional string pool_group = 50;

  // Weapon specifics — range, projectile, ammo linkage
  optional WeaponInfo weapon = 51;

  // Fuel / combustible behavior
  optional FuelInfo fuel = 52;

  // Container / storage expansion when equipped or deployed
  optional ContainerInfo container = 53;

  // Planting / farming data (seeds, saplings)
  optional PlantingInfo planting = 54;

  // Projectile flight properties (arrows, bolts, thrown items)
  optional ProjectileInfo projectile = 55;

  // Trap / hazard behavior
  optional TrapInfo trap = 56;

  // Enchantment payload — present when the item itself is an enchantment
  // (gem, rune, sigil) that can be attached to an EquipmentInfo slot.
  optional EnchantmentInfo enchantment = 57;

  // Physical volume (parallel to weight) for volume-aware containers
  optional float volume = 58;

  // Spell data — scrolls, tomes, wands, staves
  optional SpellInfo spell = 59;

  // Book data — readable lore, journals, recipe books
  optional BookInfo book = 60;

  // Key data — entity-unlocking items
  optional KeyInfo unlock = 61;

  // Vehicle / mount data — boats, carts, horses, conveyances
  optional VehicleInfo vehicle = 62;

  // Light emission — torches, lanterns, glowing items
  optional float light_radius = 63;     // Tiles/meters of light cast (0 = no light)
  optional string light_color = 64;     // Hex color ("#ffcc88") or named slug ("warm", "cold")

  // Extensions — game-specific key-value pairs
  repeated ItemExtension extensions = 38;

  // Metadata
  optional string credits = 39;
  optional bool drafted = 40;           // Hidden from production
}

// =============================================================================
// Registry
// =============================================================================

message ItemRegistry {
  repeated Item items = 1;
  repeated ItemSet sets = 2;            // Item set definitions (span multiple items)
}
