syntax = "proto3";

package kbve.ci;

// =============================================================================
// CI Registry — Source of truth for all tracked apps and packages.
//
// Every monorepo project that participates in CI dispatch (docker builds,
// npm/crate/python/unreal publishes) is described here. The generated Zod
// schemas power both Astro content validation and the dispatch manifest
// builder in @kbve/devops.
// =============================================================================

// The dispatch pipeline a tracked item belongs to.
enum DispatchPipeline {
  DISPATCH_PIPELINE_UNSPECIFIED = 0;
  DISPATCH_PIPELINE_DOCKER = 1;
  DISPATCH_PIPELINE_NPM = 2;
  DISPATCH_PIPELINE_CRATES = 3;
  DISPATCH_PIPELINE_PYTHON = 4;
  DISPATCH_PIPELINE_UNREAL = 5;       // UE plugin/marketplace publish
  DISPATCH_PIPELINE_UE5_SERVER = 6;   // UE dedicated server (linux container)
  DISPATCH_PIPELINE_UNITY = 7;        // Unity standalone game (GameCI / Azure DevOps)
  DISPATCH_PIPELINE_GODOT = 8;        // Godot game export (godot-ci docker)
  DISPATCH_PIPELINE_UNREAL_GAME = 9;  // UE standalone game build (vs server / vs plugin)
  DISPATCH_PIPELINE_BEVY_GAME = 10;   // Bevy game executable (vs library crate)
  DISPATCH_PIPELINE_VITE_GAME = 11;   // Vite/Nx web game bundle → itch.io html5
}

// Language / framework that determines which CI toolchain is needed for tests.
// Used by the E2E matrix to fan out with the correct runner setup.
enum TestFramework {
  TEST_FRAMEWORK_UNSPECIFIED = 0;
  TEST_FRAMEWORK_RUST = 1;            // Cargo test + optional wasm32 target (also covers Bevy)
  TEST_FRAMEWORK_TYPESCRIPT = 2;     // Vitest / Jest (Node)
  TEST_FRAMEWORK_ASTRO = 3;          // Astro build + Playwright
  TEST_FRAMEWORK_CSHARP = 4;         // dotnet test
  TEST_FRAMEWORK_PYTHON = 5;         // pytest / uv
  TEST_FRAMEWORK_DENO = 6;           // Deno test
  TEST_FRAMEWORK_CPP = 7;            // Plain C++ compile checks
  TEST_FRAMEWORK_UNITY = 8;          // Unity Test Runner (EditMode + PlayMode) via GameCI
  TEST_FRAMEWORK_GODOT = 9;          // godot --headless --quit-after N + GUT/Godot test scripts
  TEST_FRAMEWORK_UE_AUTOMATION = 10; // Unreal Automation Tests (vs raw CPP)
}

// Game-engine specific config — used by Unity / Godot / Unreal-Game / Bevy-Game
// / Vite-Game pipelines. One shared sub-message instead of per-engine fields
// keeps CiProject flat; engine-specific knowledge lives in the per-engine
// workflow. Vite-Game reuses project_path (the Nx app dir) + build_targets
// (["html5"]); version is unused (Vite/Nx, no engine pin).
message GameEngineConfig {
  // Engine version pin. Examples:
  //   Unity:  "6000.0.30f1"
  //   UE:     "5.4.4"
  //   Godot:  "4.3-stable"
  //   Bevy:   cargo crate version, e.g. "0.14"
  string version = 1;

  // Path to the engine project root, relative to repo root.
  // Unity: dir containing Assets/ + ProjectSettings/
  // UE:    dir containing the .uproject file
  // Godot: dir containing project.godot
  // Bevy:  dir containing Cargo.toml of the game crate
  string project_path = 2;

  // Build targets / export presets / cargo profiles to fan out into a matrix.
  //   Unity:  ["StandaloneWindows64", "StandaloneLinux64", "WebGL"]
  //   UE:     ["Win64", "Linux", "Mac"]
  //   Godot:  matches export_presets.cfg names, e.g. ["windows-x64", "html5"]
  //   Bevy:   target triples or named profiles, e.g. ["x86_64-pc-windows-gnu"]
  repeated string build_targets = 3;

  // Unity-specific licensing method. One of: "personal" | "professional" | "serial".
  optional string license_method = 4;

  // Godot-specific: true when the project uses the .NET / C# build (vs GDScript).
  optional bool dotnet_enabled = 5;

  // Extra args forwarded to the engine's test runner.
  repeated string test_args = 6;

  // Bevy / engine cargo features to enable per build.
  // UE plugin deps can also reuse this for build-time toggles.
  repeated string features = 7;

  // Optional source repo if the game lives outside this monorepo
  // (e.g. Azure DevOps repo for a private Unity project that ships
  // public artifacts).
  optional string external_repo_url = 8;

  // Branch / ref of external_repo_url to clone. Empty = repo default branch.
  optional string external_repo_ref = 9;

  // UE Server target name (e.g. chuckServerDev, chuckServerBeta). Drives -target and
  // the PVC artifact dir /ows-server/<server_target>/<version>. Empty = build.toml.
  optional string server_target = 10;

  // UE dedicated-server build config: Development | Shipping | Test | DebugGame | Debug.
  optional string server_config = 11;

  // UE game-client build config: Development | Shipping | Test | DebugGame | Debug.
  optional string client_config = 12;

  // Maps to cook. Empty = -allmaps.
  repeated string maps = 13;

  // Server launch game mode (e.g. /Script/Chuck.ChuckGameMode) for the Agones fleet.
  optional string game_mode = 14;

  // UE -CustomConfig client cook layer (e.g. Beta). Empty = no custom config.
  optional string custom_config = 15;
}

// One Steam application entry for [`ExternalPublish`]. Demos, the main
// game, and DLC each get their own SteamApp entry sharing a single CI
// project. The label disambiguates VDF filenames + log lines so a
// dispatch run targeting the demo doesn't collide with the main app.
message SteamApp {
  string app_id = 1;            // Steamworks numeric app ID (string for proto stability)
  optional string label = 2;    // "main" | "demo" | "dlc-foo" — used in VDF filenames + logs
  optional string depot_id = 3; // Optional inline depot override (usually depots live in the VDF files instead)
  optional string branch = 4;   // Steam branch (default | beta | preview); empty = default branch
  optional string promote_to_branch = 5; // Branch to flip live via ci-steam-promote.yml after upload; empty = no auto-promote
}

// One Factorio mod entry for [`ExternalPublish`]. A single CI project can
// publish multiple mods to mods.factorio.com — e.g. agones-factorio ships
// both the main `kbve` server pack and the `kbve-spider` content mod from
// the same Docker pipeline. Each entry is a portal slug + the repo path
// containing its `info.json`.
message FactorioMod {
  string name = 1;        // Portal slug (must match info.json::name and the URL on mods.factorio.com)
  string source_path = 2; // Repo-relative path to the mod folder containing info.json
}

// Kubernetes deployment metadata — drives label generation for pods, services,
// and Argo Applications. Maps to both standard app.kubernetes.io/* labels and
// custom kbve.com/* labels. Used for graph visualization, RBAC policies, and
// monitoring tag extraction.
//
// All fields optional. When unset, downstream tooling can infer defaults:
//   - stack: derived from pipeline or tags
//   - environment: derived from deployment_yaml path or instance suffix
//   - tier: inferred from pipeline (docker→api, unreal_game→web, etc.)
//   - owner: defaults to author field
//   - part_of: defaults to key field
message KubeMetadata {
  optional string stack = 1;         // kbve.com/stack — Infrastructure category
                                     // (agones, infrastructure, application, data, tooling)

  optional string environment = 2;   // kbve.com/environment — Deployment stage
                                     // (dev, beta, prod)

  optional string tier = 3;          // kbve.com/tier — Application layer
                                     // (web, api, worker, database, cache, gateway, server)

  optional string owner = 4;         // kbve.com/owner — Team or maintainer
                                     // (h0lybyte, platform-team, etc.)

  optional string criticality = 5;   // kbve.com/criticality — Service priority
                                     // (critical, high, medium, low)

  optional string component = 6;     // app.kubernetes.io/component — Sub-component
                                     // (rcon, graceful-restart, vnc-auth, etc.)

  optional string part_of = 7;       // app.kubernetes.io/part-of — Parent application
                                     // Defaults to key if unset
}

// External publish targets — storefronts, mod platforms, package indexes
// outside the GitHub/GHCR/PyPI core. Consumed by utils-external-publish.yml
// after a successful Docker / package build to fan out artifacts.
//
// Every field is optional. Empty / unset means "skip that target".
// Add new target sections here when expanding to additional platforms.
message ExternalPublish {
  // ── Modrinth (Minecraft mods + modpacks) ──────────────────────────
  optional string modrinth_mod_id = 1;          // Modrinth project ID for the mod (loader = fabric/forge/etc)
  optional string modrinth_pack_id = 2;         // Modrinth project ID for the modpack (loader = mrpack)
  optional string modrinth_version_type = 3;    // alpha | beta | release (default: release)
  optional string modrinth_game_versions = 4;   // JSON array string, e.g. '["1.21.11"]'
  optional string modrinth_loaders = 5;         // JSON array string, e.g. '["fabric"]'
  optional uint32 modrinth_retain_count = 6;    // Newest versions to keep; older ones are pruned. 0/unset = default 3.
  optional string modrinth_rolling_version = 7; // If set (any non-empty value, e.g. "latest"), CI keeps a single featured slot per project and replaces its file every publish, then PATCHes the slot's version_number to the current semver — version_id stays stable so Modrinth Servers / Pyro linkage never breaks while the displayed version stays current. Disables per-publish version creation + retain/prune.
  optional string modrinth_server_address = 8;  // For Modrinth `minecraft_java_server` projects (Pyro Custom modpack listing). When set, CI does per-release `POST /v2/version`, captures the new version_id, then PATCHes `/v3/project/{slug-or-id}/minecraft_java_server.content` so the server listing points at the latest mrpack. Address (e.g. `mc.kbve.com`) is preserved on the listing across publishes. Requires the `MODRINTH_SESSION` secret (an `mra_` session token; PATs cannot edit v3 server listings).

  // ── Itch.io (HTML5 / native game builds) ──────────────────────────
  optional string itch_user = 10;               // Itch.io user/publisher slug
  optional string itch_game = 11;               // Itch.io game slug (preferred over legacy itch_game_id)
  optional string itch_channel = 12;            // butler channel (e.g. "html5", "win64")

  // ── Steam (Steamworks app) ────────────────────────────────────────
  // List of Steam apps for this project — supports demo + main game +
  // future DLC sharing one CI entry. Each entry has its own AppID,
  // optional depot override, and target branch. Field numbers 20 / 21
  // / 22 retired with the migration to the repeated SteamApp shape.
  repeated SteamApp steam_apps = 23;

  // ── Apple App Store (iOS / macOS) ─────────────────────────────────
  optional string apple_bundle_id = 30;         // Bundle identifier (e.g. com.kbve.foo)
  optional string apple_app_id = 31;            // Numeric App Store ID
  optional string apple_team_id = 32;           // Apple developer team id

  // ── Google Play Store (Android) ───────────────────────────────────
  optional string google_play_package = 40;     // Package name (e.g. com.kbve.foo)
  optional string google_play_track = 41;       // Release track (internal | alpha | beta | production)

  // ── CurseForge (Minecraft mods + modpacks) ────────────────────────
  optional string curseforge_project_id = 50;   // Numeric CurseForge project id
  optional string curseforge_pack_id = 51;      // Optional separate modpack project id
  optional string curseforge_release_type = 52; // alpha | beta | release

  // ── Factorio Mod Portal (mods.factorio.com) ───────────────────────
  // List of Factorio mods this CI project publishes. Each entry is a
  // portal slug + the repo path to the mod folder. Field numbers 60 / 61
  // retired with the migration to the repeated FactorioMod shape.
  repeated FactorioMod factorio_mods = 62;
}

// ── Bento splash-doc presentation model ─────────────────────────────
// Data for the bento splash rendering of a project doc page, consumed by
// BentoDoc.astro. Presentation-only: ignored by CI dispatch tooling.
// Icon fields hold a named key (resolved to an SVG path by the component's
// icon map) or a raw SVG path string beginning with "M".
message BentoDoc {
  optional string badge = 1;                // Hero eyebrow pill text
  string title = 2;                         // Hero heading lead-in
  string accent = 3;                        // Gradient accent word/phrase
  optional string lede = 4;                 // Hero sub-paragraph (defaults to page description)
  repeated BentoCta ctas = 5;               // Hero CTA buttons
  optional BentoAside aside = 6;            // Optional hero highlight card
  repeated BentoStat stats = 7;             // Key-fact stat tiles
  repeated BentoFeature features = 8;       // Feature cards
  repeated BentoRelated related = 9;        // Cross-link cards
  optional BentoUsage usage = 10;           // Optional code panel
  repeated BentoFaq faqs = 11;              // FAQ cards (defaults to page jsonld.faq)
  optional BentoTheme theme = 12;           // Per-page accent retint knobs
  optional string features_eyebrow = 13;
  optional string features_heading = 14;
  optional string related_eyebrow = 15;
  optional string related_heading = 16;
  optional string usage_eyebrow = 17;
  optional string usage_heading = 18;
}

message BentoCta {
  string label = 1;
  string href = 2;
  optional bool primary = 3;
  optional bool external = 4;
}

message BentoAside {
  optional string icon = 1;
  optional string title = 2;
  optional string body = 3;                 // May contain inline HTML
  repeated string points = 4;               // Each may contain inline HTML
}

message BentoStat {
  string label = 1;
  string value = 2;
  string icon = 3;
}

message BentoFeature {
  string title = 1;
  string body = 2;                          // May contain inline HTML
  string icon = 3;
}

message BentoRelated {
  string href = 1;
  string title = 2;
  string copy = 3;
  string icon = 4;
  optional bool external = 5;
}

message BentoUsage {
  optional string label = 1;                // Filename-style label, e.g. "main.rs"
  string lang = 2;                          // Highlight language
  string code = 3;                          // Source to render
}

message BentoFaq {
  string question = 1;
  string answer = 2;
}

message BentoTheme {
  optional string accent = 1;
  optional string accent2 = 2;
  optional string btn_fg = 3;
  optional string live = 4;
  optional string hero_bg = 5;
}

// A tracked item in the CI dispatch registry.
// Each entry corresponds to one fan-out dispatch from ci-main.yml.
message CiProject {
  // --- Required fields (every tracked item) ---
  string key = 1;                           // Alteration output key (e.g. "droid", "ue_kbvezstd")
  string name = 2;                          // Human-readable project name
  DispatchPipeline pipeline = 3;            // Which CI pipeline handles this item

  // --- Identifiers (at least one per pipeline type) ---
  optional string app_name = 4;             // Docker app name (docker pipeline)
  optional string package_name = 5;         // Package/project name for publish (npm, crates, python)

  // --- Python-specific ---
  optional string pypi_name = 6;            // PyPI distribution name

  // --- Unreal-specific ---
  optional string plugin_name = 7;          // UE plugin name (matches .uplugin filename)
  optional string plugin_path = 8;          // Path to plugin dir relative to repo root
  optional string dependency_plugins = 9;   // Space-separated dependency plugin paths
  optional string itch_game_id = 10;        // Itch.io game ID for deployment

  // --- Documentation / metadata ---
  optional string description = 11;         // Short description for docs
  repeated string tags = 12;                // Categorization tags
  optional string source_path = 13;         // Path to source directory relative to repo root

  // --- CI version tracking ---
  optional string version_toml = 14;        // Path to version.toml relative to repo root
  optional string version = 15;             // Release version (semver x.y.z)
  optional string version_source = 33;      // Path to version source file (Cargo.toml, package.json, etc.) — overrides default path convention when the project lives in a non-standard location

  // --- Project metadata ---
  optional string author = 16;              // Primary maintainer
  optional string license = 17;             // SPDX license identifier (MIT, Apache-2.0, etc.)
  optional string repository_url = 18;      // Package or project URL
  optional string homepage_url = 19;        // Public-facing page
  optional string status = 20;              // Lifecycle: active, beta, deprecated, archived

  // --- Unreal-specific metadata ---
  optional string min_engine_version = 21;  // Minimum UE version (e.g. "5.4")
  repeated string supported_platforms = 22; // Win64, Linux, Mac, etc.

  // --- CI deployment config (drives docker/e2e workflows) ---
  optional string runner = 23;              // CI runner label (e.g. "ubuntu-latest", "arc-runner-set")
  optional string image = 24;              // Docker image name without registry (e.g. "kbve/edge")
  optional string e2e_name = 25;           // Nx e2e project name (e.g. "edge-e2e")
  optional string deployment_yaml = 26;    // Path to kube deployment YAML relative to repo root
  repeated string deployment_yamls = 36;   // Multi-pin variant: paths to manifests sharing the same image tag (arc-runner Helm values, etc.)
  optional string version_target = 27;     // Path to build manifest to sync version into (Cargo.toml, deno.json, etc.)
  optional bool has_test = 28;             // Whether this project has a test target
  optional string target = 29;             // Nx build target override (default: "build")
  optional string nx_project = 30;         // Nx project name if different from key

  // --- Test framework (E2E matrix fan-out) ---
  TestFramework test_framework = 31;       // Which CI toolchain to use for tests

  // --- UE5 server build config (ue5_server pipeline) ---
  optional string shell_path = 32;         // Monorepo shell project path (e.g. "apps/chuckrpg/unreal-chuck")

  // --- External publish targets (storefronts / mod platforms) -----------
  // Consumed by utils-external-publish.yml. Empty / unset = skip target.
  optional ExternalPublish external_publish = 34;

  // --- Game-engine config (unity / godot / unreal_game / bevy_game) ----
  // Required when pipeline is one of the four game-engine pipelines.
  // Drives the per-engine workflow's matrix, test runner, and build args.
  optional GameEngineConfig engine = 35;

  // --- Kubernetes deployment metadata (label generation) ----------------
  // Consumed by manifest generation tooling and graph visualization.
  // All fields optional; downstream tools can infer defaults from other fields.
  optional KubeMetadata kube = 37;

  // --- Bento splash-doc presentation (Astro rendering only) -------------
  // Consumed by BentoDoc.astro to render the project page as a bento
  // splash. Ignored by CI dispatch tooling.
  optional BentoDoc bento = 38;
}

// The full registry — a flat list of all tracked items.
message CiRegistry {
  repeated CiProject projects = 1;
}
