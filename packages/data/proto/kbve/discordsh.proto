syntax = "proto3";

package kbve.discordsh;

import "kbve/common.proto";

// =============================================================================
// Enums
// =============================================================================

// Server lifecycle / moderation status
enum ServerStatus {
  SERVER_STATUS_UNSPECIFIED = 0;
  SERVER_STATUS_ACTIVE = 1;       // Live and visible in directory
  SERVER_STATUS_PENDING = 2;      // Awaiting moderation review
  SERVER_STATUS_HIDDEN = 3;       // Hidden by owner or soft-removed
  SERVER_STATUS_BANNED = 4;       // Hard-removed by admin
}

// Server category (maps to SMALLINT in SQL)
enum ServerCategory {
  SERVER_CATEGORY_UNSPECIFIED = 0;
  SERVER_CATEGORY_GAMING = 1;
  SERVER_CATEGORY_ANIME = 2;
  SERVER_CATEGORY_MUSIC = 3;
  SERVER_CATEGORY_TECH = 4;
  SERVER_CATEGORY_ART = 5;
  SERVER_CATEGORY_EDUCATION = 6;
  SERVER_CATEGORY_SOCIAL = 7;
  SERVER_CATEGORY_PROGRAMMING = 8;
  SERVER_CATEGORY_MEMES = 9;
  SERVER_CATEGORY_CRYPTO = 10;
  SERVER_CATEGORY_ROLEPLAY = 11;
  SERVER_CATEGORY_NSFW = 12;
}

// Sort options for server listing
enum ServerSort {
  SERVER_SORT_UNSPECIFIED = 0;
  SERVER_SORT_VOTES = 1;          // Highest vote count
  SERVER_SORT_MEMBERS = 2;        // Highest member count
  SERVER_SORT_NEWEST = 3;         // Most recently submitted
  SERVER_SORT_BUMPED = 4;         // Most recently bumped
}

// =============================================================================
// Core Messages
// =============================================================================

// A Discord server listing in the directory
message DiscordServer {
  string server_id = 1;                  // Discord snowflake ID (TEXT PK)
  string owner_id = 2;                   // Supabase auth.users UUID
  string name = 3;                       // Server display name (1-100 chars)
  string summary = 4;                    // Short description (1-200 chars)
  optional string description = 5;       // Long description (up to 2000 chars)
  optional string icon_url = 6;          // Server icon CDN URL
  optional string banner_url = 7;        // Server banner CDN URL
  string invite_code = 8;                // Discord invite code (alphanumeric)

  // Categorization
  repeated ServerCategory categories = 9;  // Up to 3 categories (SMALLINT[] in SQL)
  repeated string tags = 10;              // Free-form tags (up to 10, TEXT[])

  // Denormalized counters
  int64 vote_count = 11;
  int64 member_count = 12;
  bool is_online = 13;

  // Status & timestamps
  ServerStatus status = 14;
  string created_at = 15;
  optional string updated_at = 16;
  optional string bumped_at = 17;
}

// A user's vote for a server
message ServerVote {
  string id = 1;                    // ULID PK
  string server_id = 2;            // Discord snowflake FK
  string user_id = 3;              // Supabase auth.users UUID FK
  string created_at = 4;
}

// A server tag (for free-text tagging)
message ServerTag {
  string tag = 1;                   // Lowercase slug (1-50 chars)
  int64 usage_count = 2;           // How many servers use this tag
}

// =============================================================================
// Dungeon — Player Persistence
// =============================================================================

// Session outcome for run history
enum DungeonOutcome {
  DUNGEON_OUTCOME_UNSPECIFIED = 0;
  DUNGEON_OUTCOME_VICTORY = 1;
  DUNGEON_OUTCOME_DEFEATED = 2;
  DUNGEON_OUTCOME_ESCAPED = 3;
  DUNGEON_OUTCOME_EXPIRED = 4;
}

// Player class (maps to ClassType in Rust game types)
enum DungeonClass {
  DUNGEON_CLASS_UNSPECIFIED = 0;
  DUNGEON_CLASS_WARRIOR = 1;
  DUNGEON_CLASS_ROGUE = 2;
  DUNGEON_CLASS_CLERIC = 3;
}

// Leaderboard sort category
enum LeaderboardCategory {
  LEADERBOARD_CATEGORY_UNSPECIFIED = 0;
  LEADERBOARD_CATEGORY_XP = 1;
  LEADERBOARD_CATEGORY_KILLS = 2;
  LEADERBOARD_CATEGORY_BOSSES = 3;
  LEADERBOARD_CATEGORY_ROOMS = 4;
  LEADERBOARD_CATEGORY_GOLD = 5;
}

// A single inventory slot (persisted as JSONB in SQL)
message DungeonInventorySlot {
  string item_id = 1;
  int32 qty = 2;
}

// Persistent player profile — one per Discord user (keyed on discord_id BIGINT)
message DungeonProfile {
  int64 discord_id = 1;                      // Discord snowflake (u64)
  string discord_name = 2;                   // Display name at last save
  DungeonClass class = 3;                    // Last played class
  int32 level = 4;                           // Player level (1+)
  int32 xp = 5;                             // Current XP
  int32 xp_to_next = 6;                     // XP needed for next level

  // Economy
  int32 gold = 7;

  // Lifetime stats (monotonically increasing)
  int32 lifetime_kills = 8;
  int32 lifetime_gold_earned = 9;
  int32 lifetime_rooms_cleared = 10;
  int32 lifetime_bosses_defeated = 11;
  int32 lifetime_deaths = 12;
  int32 lifetime_victories = 13;
  int32 lifetime_escapes = 14;

  // Equipment
  optional string weapon = 15;              // Gear ID or absent
  optional string armor_gear = 16;          // Gear ID or absent

  // Inventory & quests
  repeated DungeonInventorySlot inventory = 17;
  repeated string completed_quests = 18;    // Quest ref slugs

  // Timestamps (ISO 8601 strings from SQL)
  optional string created_at = 19;
  optional string updated_at = 20;
}

// A single completed dungeon run (append-only history)
message DungeonRun {
  int64 id = 1;                              // Auto-generated PK
  int64 discord_id = 2;                      // FK to DungeonProfile
  DungeonOutcome outcome = 3;
  int32 rooms_cleared = 4;
  int32 kills = 5;
  int32 gold_earned = 6;
  int32 gold_lost = 7;
  int32 bosses_defeated = 8;
  int32 xp_earned = 9;
  int32 level_at_end = 10;
  optional int32 duration_secs = 11;         // Wall time of session
  optional string ended_at = 12;             // ISO 8601
}

// A leaderboard entry (returned from ranking queries)
message LeaderboardEntry {
  int64 rank = 1;
  int64 discord_id = 2;
  string discord_name = 3;
  int32 level = 4;
  int64 value = 5;                           // Category-specific score
}

// =============================================================================
// Requests / Responses — Dungeon Persistence
// =============================================================================

message LoadProfileRequest {
  int64 discord_id = 1;
}

message LoadProfileResponse {
  bool found = 1;
  optional DungeonProfile profile = 2;
}

message SaveProfileRequest {
  DungeonProfile profile = 1;
  DungeonRun run = 2;                        // Run summary to log
}

message SaveProfileResponse {
  kbve.common.Result result = 1;
}

message LeaderboardRequest {
  LeaderboardCategory category = 1;
  int32 limit = 2;                           // Max entries (1-50, default 10)
}

message LeaderboardResponse {
  repeated LeaderboardEntry entries = 1;
}

// =============================================================================
// Requests / Responses — Server Directory
// =============================================================================

// --- List servers (feed) ---

message ListServersRequest {
  int32 limit = 1;                        // Items per page (1-50, default 24)
  int32 page = 2;                         // Page number (1-based, default 1)
  ServerSort sort = 3;                    // Sort order
  optional ServerCategory category = 4;   // Filter by category
  optional string search = 5;            // Full-text search on name/summary
}

message ListServersResponse {
  repeated DiscordServer servers = 1;
  int32 total = 2;
  bool has_more = 3;
}

// --- Get single server ---

message GetServerRequest {
  string server_id = 1;            // Discord snowflake
}

message GetServerResponse {
  bool found = 1;
  optional DiscordServer server = 2;
}

// --- Submit a new server ---

message SubmitServerRequest {
  string server_id = 1;            // Discord snowflake
  string name = 2;
  string summary = 3;
  optional string description = 4;
  optional string icon_url = 5;
  optional string banner_url = 6;
  string invite_code = 7;
  repeated ServerCategory categories = 8;
  repeated string tags = 9;
  int64 member_count = 10;
}

message SubmitServerResponse {
  kbve.common.Result result = 1;
  optional DiscordServer server = 2;
}

// --- Vote for a server ---

message VoteServerRequest {
  string server_id = 1;
}

message VoteServerResponse {
  kbve.common.Result result = 1;
  optional ServerVote vote = 2;
}

// --- Bump a server ---

message BumpServerRequest {
  string server_id = 1;
}

message BumpServerResponse {
  kbve.common.Result result = 1;
  optional string bumped_at = 2;
}

// =============================================================================
// Service
// =============================================================================

service DiscordShData {
  // Browse directory
  rpc ListServers (ListServersRequest) returns (ListServersResponse);
  rpc GetServer (GetServerRequest) returns (GetServerResponse);

  // Server management
  rpc SubmitServer (SubmitServerRequest) returns (SubmitServerResponse);

  // Engagement
  rpc VoteServer (VoteServerRequest) returns (VoteServerResponse);
  rpc BumpServer (BumpServerRequest) returns (BumpServerResponse);

  // Dungeon — Player persistence
  rpc LoadProfile (LoadProfileRequest) returns (LoadProfileResponse);
  rpc SaveProfile (SaveProfileRequest) returns (SaveProfileResponse);
  rpc GetLeaderboard (LeaderboardRequest) returns (LeaderboardResponse);
}
