# Production-replica Postgres for dbmate migration testing.
#
# Uses the CNPG production image (x86-only, Rosetta on ARM Macs)
# with the `supabase` database — same as production. Validates:
#   - All dbmate migrations apply cleanly on production image
#   - Rollback (migrate:down) works correctly
#   - RLS policies, triggers, and functions match production
#
# Usage:
#   cp kilobase-docker-compose.yml docker-compose.yml
#   docker compose up -d
#   # Wait for postgres health check, then apply migrations:
#   DATABASE_URL="postgresql://postgres:postgres@localhost:54322/supabase?sslmode=disable&search_path=dbmate,public" \
#     dbmate --no-dump-schema --migrations-dir migrations up
#   # Verify:
#   DATABASE_URL="postgresql://postgres:postgres@localhost:54322/supabase?sslmode=disable&search_path=dbmate,public" \
#     dbmate --migrations-dir migrations status
#   # Test rollback:
#   DATABASE_URL="postgresql://postgres:postgres@localhost:54322/supabase?sslmode=disable&search_path=dbmate,public" \
#     dbmate --no-dump-schema --migrations-dir migrations rollback
#   # Tear down:
#   docker compose down -v

services:
    postgres:
        image: ghcr.io/kbve/postgres:17.4.1.069-kilobase
        platform: linux/amd64
        ports:
            - '54322:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: supabase
        volumes:
            - ./init:/docker-entrypoint-initdb.d
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 3s
            retries: 10

volumes:
    pgdata:
