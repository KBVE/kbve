# Local Postgres + Forgejo for testing schema isolation.
#
# All-in-one: Postgres starts, dbmate runs all migrations (creates
# schemas + forgejo role), then Forgejo boots with the scoped role.
#
# Verifies:
#   - dbmate migrations apply cleanly
#   - forgejo role is created with schema ownership
#   - xorm creates all 125 tables in the forgejo schema
#   - Zero tables leak into public schema
#   - Forgejo web UI is accessible at http://localhost:3333
#
# Usage:
#   cd packages/data/sql/dbmate
#   cp forgejo-docker-compose.yml docker-compose.yml
#   docker compose up -d
#   # Wait ~30s, then verify:
#   psql "postgresql://forgejo:forgejo-local-dev@localhost:54322/postgres" \
#     -c "\dt forgejo.*"
#   open http://localhost:3333
#   # Tear down:
#   docker compose down -v

services:
    postgres:
        image: postgres:17-alpine
        ports:
            - '54322:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: postgres
        volumes:
            - ./init:/docker-entrypoint-initdb.d
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 3s
            retries: 5

    dbmate-init:
        image: ghcr.io/amacneil/dbmate:2
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DATABASE_URL: 'postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable&search_path=dbmate,public'
        volumes:
            - ./migrations:/db/migrations:ro
        command:
            ['--no-dump-schema', '--migrations-dir', '/db/migrations', 'up']

    forgejo:
        image: codeberg.org/forgejo/forgejo:12
        ports:
            - '3333:3000'
            - '2222:22'
        environment:
            - FORGEJO__database__DB_TYPE=postgres
            - FORGEJO__database__HOST=postgres:5432
            - FORGEJO__database__NAME=postgres
            - FORGEJO__database__USER=forgejo
            - FORGEJO__database__PASSWD=forgejo-local-dev
            - FORGEJO__database__SCHEMA=forgejo
            - FORGEJO__database__SSL_MODE=disable
            - FORGEJO__security__INSTALL_LOCK=true
            - FORGEJO__server__ROOT_URL=http://localhost:3333
            - FORGEJO__server__LFS_START_SERVER=false
            - FORGEJO__service__DISABLE_REGISTRATION=false
            - FORGEJO__actions__ENABLED=true
        volumes:
            - forgejo-data:/data
        depends_on:
            dbmate-init:
                condition: service_completed_successfully

volumes:
    pgdata:
    forgejo-data:
